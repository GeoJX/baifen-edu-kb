需不需要我们这边帮忙？\"\n\n4. 共同制定解决方案\n   - \"要不我们这样，[具体建议]，您觉得可以吗？\"\n\n5. 收尾\n   - \"好的，那我们就这样安排。您放心，我会继续关注[学员名]的情况。\"\n\n注意事项：\n- 语气温和关切，不是催债\n- 如果家长表达了情绪或困难，先倾听和共情\n- 如果发现深层问题（家庭变故、孩子心理状态等），记录后评估是否需要触发预警\n```\n\n### 作业催交注意事项\n\n| 原则 | 说明 |\n|------|------|\n| 不超过3次提醒 | 第三次后转为电话+日常关注，不再重复发消息 |\n| 不群发 | 催交必须一对一私聊 |\n| 不公开批评 | 绝不在班级群里点名未交作业的学员 |\n| 关注根因 | 持续不交作业往往有更深层原因，需要了解而非施压 |\n| 联动预警 | 连续2周完成率低于60%，触发黄色预警 |\n\n---\n\n## 三、课堂高光文案模板\n\n### 格式要求\n\n| 元素 | 规范 |\n|------|------|\n| 字数 | 50-150字 |\n| 隐私 | 用\"X同学\"代替全名，除非获得家长书面同意 |\n| 配图 | 建议搭配1-2张课堂照片或30秒视频 |\n| 标签 | 2-3个话题标签 |\n| 频率 | 每周至少发布2-3条 |\n\n### 风格A：叙事型（讲故事）\n\n```\n今天课上有个很触动的瞬间——\n\nX同学一开始对辅助线完全没思路，试了两种方法都走不通。但他没有放弃，第三次尝试的时候突然说：\"老师，我把这条线连到这里试试？\"\n\n然后，他自己把整道题解出来了。\n\n那一刻他脸上的表情，就是我们最想看到的。\n\n好思维，让学习更轻松。\n\n#百分教育 #课堂高光 #思维成长\n```\n\n### 风格B：感悟型（提炼教育理念）\n\n```\n今天初二数学班小测，全班8人中6人达到85分以上。\n\n不是因为题目简单，而是因为这些孩子已经学会了\"先审题再动笔\"的习惯。\n\n有时候，成绩的提升不在于刷更多题，而在于养成正确的思维方式。\n\n#百分教育 #好思维让学习更轻松 #数学思维\n```\n\n### 风格C：互动型（引发共鸣）\n\n```\n你家孩子做数学题的时候，会先读两遍题目吗？\n\n今天课上我们做了一个实验：同一道题，先花30秒认真读题再做的同学，正确率比直接动笔的高出40%。\n\nX同学以前总是\"看完就写\"，现在已经养成了\"读题-画重点-再动笔\"的习惯，这周小测进步了8分。\n\n方法对了，进步是自然的事。\n\n#百分教育 #学习方法 #审题习惯\n```\n\n### 风格D：日常温暖型（校区氛围）\n\n```\n今天课间，两个小朋友趴在桌上讨论一道奥数题，讨论了整整十分钟，最后一起找到了答案。\n\n看着他们击掌庆祝的样子，觉得这就是学习最好的模样——不是一个人苦思冥想，而是有伙伴一起探索。\n\n#百分教育 #学习的样子 #赤坎校区\n```\n\n### 文案撰写禁忌\n\n| 禁止 | 原因 |\n|------|------|\n| 出现学员全名 | 保护隐私 |\n| \"我们的老师很优秀\" | 空洞，应展示具体教学场景 |\n| 暗示其他机构不好 | 违反沟通红线 |\n| 夸大效果（\"一节课就开窍了\"） | 不实，损害专业形象 |\n| 群发式模板感太强 | 要有真实细节和温度 |\n| 制造焦虑（\"别的孩子已经在学了\"） | 禁止焦虑营销 |\n\n---\n\n## 四、使用指南\n\n### 学管师操作流程\n\n1. **收集数据**：每周五下午汇总本周各科教师反馈、出勤、作业数据\n2. **输入助手**：按照数据输入格式提交给学管自动化助手\n3. **审核修改**：助手生成初稿后，学管师根据对孩子的了解做个性化调整\n4. **发送家长**：周五晚间或周六上午发送（避免工作日晚间太晚打扰）\n5. **记录存档**：发送后在系统中标记\"本周已反馈\"\n\n### 发送时间建议\n\n| 内容 | 建议发送时间 |\n|------|------------|\n| 周报 | 周五 18:00-20:00 或 周六 9:00-11:00 |\n| 作业提醒（第一次） | 截止时间后4小时内 |\n| 课堂高光文案 | 当天课后2小时内 |\n| 高光视频 | 当天课后2小时内同步家长 |\n\n### 个性化调整要点\n\n模板是起点，不是终点。学管师应根据以下因素调整：\n\n- **家长风格**：有的家长喜欢详细反馈，有的喜欢简洁。观察家长回复习惯后调整\n- **学员性格**：内向型孩子的\"小进步\"更值得特别提及\n- **特殊时期**：考前、升学关键期，周报可增加备考建议\n- **家庭情况**：如已知家庭有特殊情况，语气更温和体贴\n", "lines": 347, "size": 14035}, "04_scripts__xiaoshengchu_99_marketing": {"id": "04_scripts__xiaoshengchu_99_marketing", "path": "04_scripts/xiaoshengchu_99_marketing.md", "name": "xiaoshengchu_99_marketing", "title": "小升初9.9元专业评估 · 营销话术集", "tags": "[话术, 小升初, 获客, 9.9评估, 私聊, 朋友圈, 群发]", "module": "04_scripts", "content": "---\ntitle: 小升初9.9元专业评估 - 营销话术集\ntags: [话术, 小升初, 获客, 9.9评估, 私聊, 朋友圈, 群发]\ncategory: 话术/小升初\nsource: 小升初9.9文案.docx\nlast_updated: 2026-03-22\nmaintainer: baifen-edu-ops\n---\n\n# 小升初9.9元专业评估 · 营销话术集\n\n> 本文件为小升初9.9元专业评估活动的全渠道营销话术，覆盖微信私聊、朋友圈、群发三个场景。\n\n## 产品概要\n\n| 项目 | 说明 |\n|------|------|\n| 产品名称 | 小升初专业评估 |\n| 价格 | 9.9元 |\n| 形式 | 1对1专业指导 |\n| 核心服务 | 择校匹配度分析 + 班型定位建议 + 初中学业路线图规划 |\n| 覆盖校区 | 湛江七大校区，就近安排 |\n\n---\n\n## 一、微信一对一私聊话术\n\n### 开场话术（口语化，降低防备）\n\n宝妈/宝爸您好~\n\n我是百分教育的XX老师，最近身边很多家长都在问小升初的事儿：不知道自家孩子到底适合哪所学校？进什么班型更合适？初中三年怎么规划才不踩坑？\n\n针对大部分家长的迷茫我们推出了**9.9元小升初专业评估**，包含3大核心服务：\n\n1. **择校匹配度分析**：帮孩子找到适配的学校管理模式与教学节奏\n2. **班型定位建议**：拒绝盲目冲重点，推荐\"能跟上、有提升\"的最优班\n3. **初中学业路线图规划**：从3科到7科的学科跨越、赋分制应对方案都给您理清楚\n\n一次评估就能明确定位，省时又高效，还能拿到可落地的三年学习方案。咱们湛江有七大校区，可以就近安排~\n\n现在就帮您预约一个吧，提前把升学路走稳？\n\n### 使用要点\n\n- 语气口语化，不要太正式，让家长卸下防备\n- 把\"XX老师\"替换为自己的姓名\n- 如果家长有进一步疑问，参考 `02_courses/xiaoshengchu/xiaoshengchu_99_assessment.md` 中的深度解读内容\n\n---\n\n## 二、朋友圈文案\n\n### 版本A：干货型（适合教育从业者人设）\n\n家有小升初娃的看过来！别再盲目择校、乱报班了！\n\n最近被问爆的「小升初专业评估」，只要9.9元，就能给孩子做3件关键事：\n\n- 择校匹配度分析：找到最适合孩子的学校与班型\n- 班型定位建议：拒绝\"冲重点\"误区，选能跟上、能提升的班\n- 初中三年学业规划：从3科到7科，提前布局不焦虑\n\n18年一线教学经验，专业规划师1对1分析，还能拿到可落地的学习方案。湛江七大校区可就近安排，名额有限，先到先得~\n\n扫码抢占名额，给孩子的升学路多一份保障！\n\n（配图：海报原图）\n\n### 版本B：宝妈身份型（适合家长转发或宝妈人设）\n\n小升初不是\"考高分就行\"，选对学校、班型和规划，比盲目刷题更重要！\n\n作为宝妈+教育从业者，我特别推荐百分教育这款9.9元小升初专业评估：\n\n- 不推销，只做客观分析：孩子适合哪所学校、什么班型，一目了然\n- 可落地的学习方案：从小学到初中的学科跨越、政策应对，都给你理得明明白白\n- 18年经验老师1对1，比自己瞎琢磨靠谱太多\n\n现在只要9.9元，就能给孩子的升学路踩个稳油门。湛江的家长们，别等摇号了才着急，提前规划才是王道！\n\n（配图：海报原图）\n\n---\n\n## 三、群发文案\n\n### 简洁版（微信群/企微群/短信）\n\n【百分教育·小升初福利】\n\n家有6年级孩子的家长注意啦！\n\n9.9元即可获得3大升学保障：择校匹配分析、班型定位建议、初中学业规划，1对1专业指导，帮孩子清晰定位，少走弯路。\n\n湛江七大校区就近安排，名额有限，扫码立即抢占！\n\n---\n\n## 四、话术使用注意事项\n\n| 注意项 | 说明 |\n|--------|------|\n| 禁止承诺 | 不说\"保证进XX学校/XX班\" |\n| 禁止贬低 | 不提及或贬低其他机构 |\n| 禁止焦虑营销 | \"名额有限\"可用于朋友圈/群发，但私聊中不要施压 |\n| 配图要求 | 使用官方海报原图，不自行修改价格等关键信息 |\n| 后续承接 | 家长预约后，引导到校区进行1对1评估，参考评估解读文档 |\n\n---\n\n## 关联文档\n\n- 评估产品深度解读：`02_courses/xiaoshengchu/xiaoshengchu_99_assessment.md`\n- 小升初课程定价：`06_ops/pricing/xiaoshengchu_pricing.md`\n- 小升初FAQ：`07_faq/faq_xiaoshengchu.md`\n- 小升初学习规划：`02_courses/xiaoshengchu/xiaoshengchu_study_plan.md`\n", "lines": 118, "size": 4438}, "05_campuses__campus_overview": {"id": "05_campuses__campus_overview", "path": "05_campuses/campus_overview.md", "name": "campus_overview", "title": "百分教育校区总览", "tags": "[校区, 总览, 赤坎, 霞山, 坡头]", "module": "05_campuses", "content": "---\ntitle: 百分教育校区总览\ntags: [校区, 总览, 赤坎, 霞山, 坡头]\nlast_updated: 2026-03-19\n---\n\n# 百分教育校区总览\n\n百分教育目前在湛江市设有 **7 个校区**，覆盖赤坎区、霞山区、坡头区三大区域，满足小学至高中全学段教学需求。\n\n**统一咨询电话：18933824497**\n\n---\n\n## 校区分布一览\n\n| 序号 | 校区名称 | 所在区域 | 地址 | 主要覆盖学段 |\n|------|---------|---------|------|-------------|\n| 1 | 虹都校区 | 赤坎区 | 海北路虹都大厦 | 初中、高中（主校区） |\n| 2 | 盛和园校区（百分阅读馆） | 赤坎区 | 人民大道北3号盛和园26号楼负一层15室 | 小学（蒙学~六年级） |\n| 3 | 京基校区 | 赤坎区 | 京基城商业街 | 小学（主校区）、部分初二课程 |\n| 4 | 国贸新天地校区 | 霞山区 | 人民大道南52号国贸新天地写字楼 | 初中、高中 |\n| 5 | 华都汇校区 | 霞山区 | 龙平南路与乐宾路交叉口东南80米 | 小学 |\n| 6 | 南油校区 | 坡头区 | 南油欧烟楼党群服务中心三楼 | 四年级~高二 |\n| 7 | 海东校区 | 坡头区 | 海东新区旦黎路与海湾南路交叉口北160米 | 小学~初三 |\n\n---\n\n## 学段与校区对应关系\n\n> **重要提示：** 家长选择校区时请注意学段对应关系，避免跑错校区。\n\n### 小学课程（一年级~六年级）\n\n小学课程主要安排在以下三个校区：\n\n- **京基校区**（赤坎区） —— 小学主校区，课程最全\n- **盛和园校区 / 百分阅读馆**（赤坎区） —— 含5000+藏书阅读馆，侧重阅读写作\n- **华都汇校区**（霞山区） —— 霞山区小学生首选\n\n### 初高中课程（初一~高三）\n\n初高中课程主要安排在以下校区：\n\n- **虹都大厦校区**（赤坎区） —— 初高中主校区，课程最全，名师集中\n- **国贸新天地校区**（霞山区） —— 霞山区初高中生首选\n\n### 坡头区全学段\n\n- **南油校区** —— 四年级至高二\n- **海东校区** —— 小学至初三\n\n---\n\n## 各区域选校建议\n\n| 家长所在区域 | 小学推荐 | 初高中推荐 |\n|------------|---------|-----------|\n| 赤坎区 | 京基校区、盛和园校区 | 虹都校区 |\n| 霞山区 | 华都汇校区 | 国贸新天地校区 |\n| 坡头区 | 海东校区、南油校区 | 南油校区、海东校区 |\n\n---\n\n## 联系方式\n\n所有校区统一咨询热线：**18933824497**\n\n如需了解具体校区课程安排，请参阅各校区详情页面，或直接拨打咨询电话获取最新课表。\n", "lines": 70, "size": 2573}, "05_campuses__guomao": {"id": "05_campuses__guomao", "path": "05_campuses/guomao.md", "name": "guomao", "title": "国贸新天地校区", "tags": "[校区, 霞山区, 国贸, 初中, 高中]", "module": "05_campuses", "content": "---\ntitle: 国贸新天地校区\ntags: [校区, 霞山区, 国贸, 初中, 高中]\nlast_updated: 2026-03-19\n---\n\n# 国贸新天地校区\n\n## 基本信息\n\n| 项目 | 详情 |\n|------|------|\n| 校区名称 | 国贸新天地校区 |\n| 所在区域 | 霞山区 |\n| 详细地址 | 人民大道南52号国贸新天地写字楼 |\n| 咨询电话 | 18933824497 |\n| 覆盖学段 | 初中、高中 |\n\n---\n\n## 校区定位\n\n国贸新天地校区是百分教育在霞山区的核心教学点，主要承担 **初中及高中学段** 的教学任务。校区位于人民大道南国贸新天地写字楼内，交通便利，周边配套设施完善，方便霞山区及周边家长接送。\n\n---\n\n## 学段覆盖\n\n- **初中**：初一至初三全年级课程\n- **高中**：高一至高三全年级课程\n\n---\n\n## 选校提示\n\n| 学段 | 推荐校区 |\n|------|---------|\n| 霞山区小学生 | 请前往 **华都汇校区**（龙平南路与乐宾路交叉口东南80米） |\n| 霞山区初高中生 | **本校区**（国贸新天地） |\n| 赤坎区初高中生 | 推荐前往 **虹都校区**（海北路虹都大厦） |\n\n---\n\n## 校区优势\n\n1. **地理位置优越**：位于霞山区主干道人民大道南，公交线路覆盖广，家长接送方便\n2. **写字楼环境**：教学环境安静、整洁，学习氛围浓厚\n3. **初高中专注**：校区资源集中服务初高中学段，教师配置针对性强\n\n---\n\n## 联系我们\n\n- 咨询电话：**18933824497**\n- 地址：湛江市霞山区人民大道南52号国贸新天地写字楼\n- 到校咨询前建议提前电话预约，以便安排学情诊断和课程规划\n", "lines": 57, "size": 1631}, "05_campuses__haidong": {"id": "05_campuses__haidong", "path": "05_campuses/haidong.md", "name": "haidong", "title": "海东校区", "tags": "[校区, 坡头区, 海东, 小学, 初中]", "module": "05_campuses", "content": "---\ntitle: 海东校区\ntags: [校区, 坡头区, 海东, 小学, 初中]\nlast_updated: 2026-03-19\n---\n\n# 海东校区\n\n## 基本信息\n\n| 项目 | 详情 |\n|------|------|\n| 校区名称 | 海东校区 |\n| 所在区域 | 坡头区 |\n| 详细地址 | 海东新区旦黎路与海湾南路交叉口北160米 |\n| 咨询电话 | 18933824497 |\n| 覆盖学段 | 小学（自然拼读~六年级）、初中（初一~初三） |\n\n---\n\n## 校区定位\n\n海东校区是百分教育在坡头区海东新区的教学点，覆盖 **小学至初三** 全学段，是海东新区及周边家庭的就近选择。校区位于旦黎路与海湾南路交叉口附近，服务海东新区快速增长的教育需求。\n\n---\n\n## 2026年春季课程表\n\n### 蒙学/低年级\n\n| 课程 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 自然拼读（班1） | -- | 周二 19:14-20:45 | 英语语音启蒙 |\n| 自然拼读（班2） | 王老师 | 周六 10:00-12:00 | 英语语音启蒙 |\n\n### 小学部\n\n| 年级 | 科目 | 授课教师 | 上课时间 | 备注 |\n|------|------|------ ted: 2026-03-19\n---\n\n# 虹都校区（初高中主校区）\n\n## 基本信息\n\n| 项目 | 详情 |\n|------|------|\n| 校区名称 | 虹都校区 |\n| 所在区域 | 赤坎区 |\n| 详细地址 | 海北路虹都大厦 |\n| 咨询电话 | 18933824497 |\n| 覆盖学段 | 初一~高三（百分教育初高中主校区） |\n\n---\n\n## 校区定位\n\n虹都校区是百分教育的 **初高中教学主阵地**，集中了最强的初高中师资力量，课程覆盖初一至高三全年级、全学科。校区位于赤坎区海北路虹都大厦，是赤坎区及周边初高中学生的首选校区。\n\n> **注意：小学课程不在本校区。** 小学生请前往 **京基校区** 或 **盛和园校区**。\n\n---\n\n## 2026年春季课程表\n\n### 高中部\n\n#### 高三\n\n| 科目 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 数学 | 尤老师 | 详询校区 | 高考冲刺 |\n| 数学 | 全老师 | 详询校区 | 高考冲刺 |\n\n#### 高二\n\n| 科目 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 物理 | 详询校区 | 详询校区 | 同步提升 |\n| 数学 | 详询校区 | 详询校区 | 同步提升 |\n| 化学 | 详询校区 | 详询校区 | 同步提升 |\n| 英语 | 详询校区 | 详询校区 | 同步提升 |\n\n#### 高一\n\n| 科目 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 数学 | 详询校区 | 详询校区 | 初高衔接+同步 |\n| 化学 | 详询校区 | 详询校区 | 同步提升 |\n| 物理 | 详询校区 | 详询校区 | 同步提升 |\n\n---\n\n### 初中部\n\n#### 初三\n\n| 科目 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 数学双语班 | 尤老师 | 详询校区 | 中考冲刺，双语教学 |\n| 数学培优 | 尤老师 | 详询校区 | 中考拔高 |\n| 化学 | 详询校区 | 详询校区 | 中考冲刺 |\n| 物理 | 详询校区 | 详询校区 | 中考冲刺 |\n| 英语 | 详询校区 | 详询校区 | 中考冲刺 |\n\n#### 初二\n\n| 科目 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 数学 | 详询校区 | 详询校区 | 同步提升 |\n| 物理 | 详询校区 | 详询校区 | 同步提升 |\n| 英语 | 详询校区 | 详询校区 | 同步提升 |\n| 生物冲刺 | 详询校区 | 详询校区 | 地生会考专项 |\n| 地理冲刺 | 详询校区 | 详询校区 | 地生会考专项 |\n\n#### 初一\n\n| 科目 | 授课教师 | 上课时间 | 备注 |\n|------|---------|---------|------|\n| 廉实班 | 尤老师 | 详询校区 | 廉江实验学校专项 |\n| 数学培优 | 详询校区 | 详询校区 | 拔高训练 |\n| 英语 | 详询校区 | 详询校区 | 同步提升 |\n| 物理实验班 | 详询校区 | 详询校区 | 超前学习，提前接触物理 |\n| 数学实验班 | 详询校区 | 详询校区 | 超前学习，思维拓展 |\n\n---\n\n## 名师介绍\n\n### 尤老师\n- 虹都校区核心数学教师\n- 负责课程：高三数学、初三数学双语班、初三数学培优、初一廉实班\n- 教学特色：高阶思维训练，注重逻辑构建与解题策略\n\n### 全老师\n- 高三数学教师\n- 负责课程：高三数学\n- 教学特色：高考备考经验丰富，题型归纳精准\n\n---\n\n## 特色班型说明\n\n### 初一廉实班（尤老师）\n面向廉江实验学校等重点班学生，课程难度高于常规培优班，注重数学竞赛思维与综合解题能力。\n\n### 初一/初二实验班\n物理实验班和数学实验班为超前学习班型，帮助学有余力的学生提前接触下一阶段知识，建立学科优势。\n\n### 初二地生会考冲刺\n针对初二地理、生物会考设置的专项冲刺课程，集中突破考试重点。\n\n---\n\n## 学段覆盖与选校提示\n\n| 学段 | 安排 |\n| -18:00 | 拔高训练 |\n| 初一 | 英语 | 符老师 | 周六 10:00-12:00 | 同步提升 |\n| 初二 | 英语 | 符老师 | 周六 8:00-10:00 | 同步提升 |\n| 初二 | 物理 | 谢老师 | 周六 16:00-18:00 | 同步提升 |\n| 初二 | 生地 | 陈老师 | 待定 | 生物地理会考备考 |\n| 初二 | 提高数学 | 祝老师 | 周六 14:00-16:00 | 拔高训练 |\n| 初二 | 强化数学 | 祝老师 | 周六 10:00-12:00 | 基础巩固 |\n| 初三 | 英语 | 郑老师 | 周六 16:15-18:15 | 中考冲刺 |\n| 初三 | 物理 | 谢老师 | 周六 14:00-16:00 | 中考冲刺 |\n| 初三 | 化学 | 邹老师 | 待定 | 中考冲刺 |\n| 初三 | 提高数学 | 祝老师 | 周日 8:00-10:00 | 拔高训练 |\n| 初三 | 强化数学 | 祝老师 | 周六 16:00-18:00 | 中考冲刺 |\n\n### 高中部\n\n| 年级 | 科目 | 授课教师 | 上课时间 | 备注 |\n|------|------|---------|---------|------|\n| 高一 | 同步数学 | 祝老师 | 周日 10:00-12:00 | 同步提升 |\n| 高一 | 数学2 | 祝老师 | 周日 8:00-10:00 | 第二班次 |\n| 高一 | 物理 | 林老师 | 周六 19:00-21:00 | 同步提升 |\n| 高二 | 数学 | 张老师 | 周日 10:00-12:00 | 同步提升 |\n| 高二 | 英语 | 郑校 | 周日 8:00-10:00 | 同步提升 |\n| 高二 | 物理 | 林老师 | 待定 | 同步提升 |\n| 高二 | 化学 | 邹老师 | 周日 10:15-12:15 | 同步提升 |\n\n---\n\n## 师资团队\n\n| 教师 | 主教科目 | 覆盖年级 |\n|------|---------|---------|\n| 梁老师 | 数学 | 四年级~六年级 |\n| 符老师 | 英语 | 四年级~初二 |\n| 麦老师 | 英语 | 五年级 |\n| 杨老师 | 数学 | 初一 |\n| 陈老师 | 数学/生地 | 初一~初二 |\n| 谢老师 | 物理 | 初二~初三 |\n| 祝老师 | 数学 | 初二~高一 |\n| 郑老师 | 英语 | 初三 |\n| 邹老师 | 化学 | 初三~高二 |\n| 林老师 | 物理 | 高一~高二 |\n| 张老师 | 数学 | 高二 |\n| 郑校 | 英语 | 高二 |\n\n---\n\n## 学段覆盖与选校提示\n\n| 学段 | 安排 |\n|------|------|\n| 一~三年级 | 南油校区暂不开设，坡头区低年级学生可前往 **海东校区** |\n| 四年级~高二 | **本校区**（南油） |\n| 高三 | 请咨询是否在本校区开设，或前往 **虹都校区** |\n\n---\n\n## 联系我们\n\n- 咨询电话：**18933824497**\n- 地址：湛江市坡头区南油欧烟楼党群服务中心三楼\n- 到校咨询前建议提前电话预约，以便安排学情诊断和课程规划\n", "lines": 107, "size": 3986}, "05_campuses__shengheyuan": {"id": "05_campuses__shengheyuan", "path": "05_campuses/shengheyuan.md", "name": "shengheyuan", "title": "盛和园校区（百分阅读馆）", "tags": "[校区, 赤坎区, 盛和园, 阅读馆, 小学]", "module": "05_campuses", "content": "---\ntitle: 盛和园校区（百分阅读馆）\ntags: [校区, 赤坎区, 盛和园, 阅读馆, 小学]\nlast_updated: 2026-03-19\n---\n\n# 盛和园校区（百分阅读馆）\n\n## 基本信息\n\n| 项目 | 详情 |\n|------|------|\n| 校区名称 | 盛和园校区 / 百分阅读馆 |\n| 所在区域 | 赤坎区 |\n| 详细地址 | 人民大道北3号盛和园26号楼负一层15室 |\n| 咨询电话 | 18933824497 |\n| 覆盖学段 | 蒙学~六年级 |\n\n---\n\n## 校区定位\n\n盛和园校区又名 **百分阅读馆**，是百分教育在赤坎区的小学教学点之一。校区最大特色是配备了 **5000+ 册藏书的阅读图书馆**，为学员提供丰富的课外阅读资源，营造浓厚的阅读氛围。\n\n---\n\n## 百分阅读馆\n\n- 馆内藏书 **5000+ 册**，涵盖绘本、桥梁书、儿童文学、科普百科等品类\n- 学员可在课余时间自由借阅\n- 定期举办阅读分享活动，培养学生的阅读兴趣与表达能力\n- 与阅读写作课程深度结合，实现\"读写一体化\"教学\n\n---\n\n## 2026年春季课程表\n\n### 蒙学系列（学前/低年级）\n\n| 课程 | 上课时间 | 备注 |\n|------|---------|------|\n| 自然拼读 | 详询校区 | 适合零基础学员，建立英语语音体系 |\n| 剑桥英语 | 详询校区 | 剑桥少儿英语系列，体系化学习 |\n\n### 一年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 看图写话 | 详询校区 | 语文启蒙，培养观察力与表达能力 |\n\n### 二年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 基础阅读理解+写作入门 |\n| 同步奥数 | 详询校区 | 数学思维启蒙 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 三年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 阅读理解技巧+作文训练 |\n| 同步奥数 | 详询校区 | 数学思维进阶 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 四年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 深度阅读+写作提升 |\n| 同步奥数 | 详询校区 | 竞赛思维衔接 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 五年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 小升初阅读备考 |\n| 同步奥数 | 详询校区 | 小升初数学备考 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 六年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 小升初冲刺，文学素养积累 |\n| 同步奥数 | 详询校区 | 小升初数学冲刺 |\n| 英语 | 详询校区 | 初中衔接准备 |\n\n> 具体上课时段请致电 **18933824497** 获取最新课表。\n\n---\n\n## 课程特色\n\n### 阅读写作一体化\n借助阅读馆5000+藏书资源，课程实行\"读写一体化\"教学模式：\n1. 课前指定阅读材料，培养输入习惯\n2. 课中教授阅读策略与写作技法\n3. 课后推荐拓展书目，持续积累\n\n### 蒙学启蒙系列\n- **自然拼读**：系统学习字母与字母组合发音规则，建立\"看词能读、听音能写\"能力\n- **剑桥英语**：对接剑桥少儿英语考试体系，分阶学习，目标清晰\n\n### 全年级覆盖\n从蒙学（学前）到六年级，完整覆盖小学阶段全部学习需求，方便家长就近选择。\n\n---\n\n## 学段覆盖与选校提示\n\n| 学段 | 安排 |\n|------|------|\n| 蒙学~六年级 | **本校区**（盛和园/百分阅读馆） |\n| 初中（初一~初三） | 请前往 **虹都校区**（海北路虹都大厦） |\n| 高中（高一~高三） | 请前往 **虹都校区**（海北路虹都大厦） |\n\n---\n\n## 联系我们\n\n- 咨询电话：**18933824497**\n- 地址：湛江市赤坎区人民大道北3号盛和园26号楼负一层15室\n- 到校咨询前建议提前电话预约，以便安排学情诊断和课程规划\n", "lines": 127, "size": 3877}, "06_ops__annual_events_2024": {"id": "06_ops__annual_events_2024", "path": "06_ops/annual_events_2024.md", "name": "annual_events_2024", "title": "2024年度大事件记录 (Annual Events 2024)", "tags": "", "module": "06_ops", "content": "# 2024年度大事件记录\n\n> 来源：2024年度大事件跟踪记录表更新.xlsx\n\n## 年度大事件列表\n\n### 1月\n- **勤学励行奖**：尤校亲自带领全体员工落实企业文化，目标达100分以上或年级前5名有惊喜奖励。激发学习动力，得到家长和学生高度认可。\n\n### 2月\n- **消防安全培训**：全员培训演练考核，大哥亲自指导灭火器/消防栓使用\n- **许新年愿望**：全体学生写许愿卡，每校区选20优秀贺卡送神秘礼物\n- **迎新春活动**：红包墙、打卡圣地、刮刮卡，盛和园校区设计糖画小摊\n\n### 3月\n- **女神节**：提前给所有员工送厚礼（巧克力、礼包、金珠手链等）\n- **种\"希望\"公益**：尤校/谢老师带队廉江乡村学校送树苗、植树、捐爱心助学树\n- **5次中考冲刺专题课**：英语、化学、生地引流专题课。生地满分冲刺营12次课\n\n### 4月\n- **年会**：总结过去展望未来，表彰+感恩答谢会，家长感受到百分社会担当\n- **团建**：全体员工户外团建，劳逸结合提高凝聚力\n- **三四星级老师分享会**：官丽平、祝柳春两位老师分享成长/教学/服务经验\n\n### 5月\n- **小升初集训冲刺营**：语数英三科12次冲刺课，各校区就近开班。大部分考入目标学校，20%获前100名奖学金\n- **母亲节公益**：招募全城学生为母亲做菜，视频美食PK赛，最高888元现金奖励\n\n### 6月\n- **香港研学考察**：尤校/谢老师带5位老师考察港澳深研学路线\n- **第一届咨询学业规划师技能大赛**：咨询/学管参赛PK，尤校奖励特色火龙果\n- **文昌庙祈福**：为中高考学子祈福。结果：30%考入一中/二中，40%考入四中/附中\n- **龙门节启动**：刘效均培训全体员工活动流程\n\n### 7月\n- **京基校区开业大酬宾**：集赞转发领奖品（拉杆箱/点读笔），上千家长参加\n- **京基校区开业满减**：满5000减500，满3000减200，多科折扣（第一科9.5折，二科9折，三科8.5折）\n- **暑假团报福利**：各年级指定科目5人团5折\n- **幼小衔接拼音班**：10天课程，1.5小时/天，2人团666元\n\n### 8月\n- **北京研学**：谢老师/恩姐带十几位学生游历天安门/故宫/长城\n- **新初一暑假衔接班**：每科8天，5人团优惠（第一科688.4，二科568.4，三科458）\n\n### 9月\n- **贵州团建**：尤校/谢老师带全体员工和家属，打破部门/校区壁垒\n\n### 10月\n- **中国好老师培训**：11位教学组老师参加朗培集团学习，带回先进教学方法\n\n### 11月\n- **双十二预告**：22抵222，66抵666屯券活动\n- **教师技能大赛**：教师+咨询/学管PK，投票评分表彰\n\n### 12月\n- **公益助学捐赠**：尤校与狮子会一起爱心助学，捐赠安徽黄桥小学\n", "lines": 57, "size": 2861}, "06_ops__churn_warning_system": {"id": "06_ops__churn_warning_system", "path": "06_ops/churn_warning_system.md", "name": "churn_warning_system", "title": "流失预警体系", "tags": "[type:sop, scene:churn, role:xueguan, role:consultant]", "module": "06_ops", "content": "---\ntitle: 流失预警体系\ntags: [type:sop, scene:churn, role:xueguan, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [04_scripts/exit_gracefully.md]\n---\n\n# 流失预警体系\n\n## 概述\n\n流失预警体系是百分教育留存管理的核心机制。通过三级预警（红/黄/绿），实现学员流失风险的早发现、早干预、早解决。目标：在学员/家长产生退费念头之前就介入，将流失扼杀在萌芽阶段。\n\n**核心原则：** 口碑至上——即使学生要走，也要体面结业，输出价值。\n\n---\n\n## 三级预警体系\n\n### 红色预警（紧急）——72小时内干预\n\n**风险等级：** 极高，流失概率 > 70%\n\n| 信号 | 具体表现 | 数据来源 |\n|------|---------|---------|\n| 连续缺课 | 连续2次以上无故缺课 | 出勤系统 |\n| 询问退费 | 家长主动提及退费/不想上了 | 学管师/咨询师反馈 |\n| 群内不满 | 家长在班级群表达不满或质疑 | 学管师监控 |\n| 公开抱怨 | 家长在外部平台（朋友圈/点评）表达不满 | 舆情监控 |\n| 明确投诉 | 正式投诉（电话/书面） | 投诉记录 |\n\n**响应流程：**\n\n| 步骤 | 时间 | 负责人 | 动作 |\n|------|------|--------|------|\n| 1. 学管上报 | 发现即报（不超过2h） | 学管 | 立即通知咨询师，同步教师 |\n| 2. 电话沟通 | 24h内 | 咨询师 | 电话联系家长，倾听诉求，不辩解 |\n| 3. 三方评估 | 48h内 | 咨询师+教师+学管 | 三方会议评估情况，查明原因 |\n| 4. 制定挽留方案 | 72h内 | 咨询师 | 教学调整/换班/换老师/加强服务 |\n| 5. 执行+跟踪 | 方案后1周 | 学管 | 持续跟踪方案执行效果 |\n| 6. 复盘 | 方案后2周 | 铁三角 | 评估效果，决定是否升级 |\n\n---\n\n### 黄色预警（关注）——1周内关注\n\n**风险等级：** 中等，流失概率 30%-70%\n\n| 信号 | 具体表现 | 数据来源 |\n|------|---------|---------|\n| 作业下降 | 作业完成率连续2周低于70% | 作业系统 |\n| 回复变慢 | 家长微信/消息回复明显变慢（>24h未读/48h未回复） | 学管师观察 |\n| 成绩连降 | 连续两次测评成绩下降 | 测评系统 |\n| 出勤异常 | 频繁请假（1个月内3次以上） | 出勤系统 |\n| 态度变冷 | 家长回复简短、不主动沟通 | 学管师观察 |\n| 课堂参与下降 | 学生上课参与度明显下降 | 教师观察 |\n\n**响应流程：**\n\n| 步骤 | 时间 | 负责人 | 动作 |\n|------|------|--------|------|\n| 1. 学管重点跟进 | 发现当天 | 学管 | 安排\"10分钟随心谈\"了解学生状态 |\n| 2. 教师加强互动 | 本周课堂 | 教师 | 课堂增加互动关注度，课后单独聊几句 |\n| 3. 咨询师主动沟通 | 1周内 | 咨询师 | 主动联系家长，用关心而非推销的方式 |\n| 4. 数据分析 | 1周内 | 教师+学管 | 分析成绩/行为数据，找出变化原因 |\n| 5. 发送高光视频 | 本周 | 学管 | 发送近期高光视频给家长，增强感知价值 |\n| 6. 观察升级 | 持续 | 学管 | 如信号持续或恶化，升级为红色预警 |\n\n---\n\n### 绿色预警（观察）——持续观察\n\n**风险等级：** 低，流失概率 < 30%\n\n| 信号 | 具体表现 | 数据来源 |\n|------|---------|---------|\n| 偶尔缺课 | 单次请假1次，有合理原因 | 出勤系统 |\n| 小幅波动 | 成绩单次下降（5分以内） | 测评系统 |\n| 偶尔不交作业 | 1次未完成作业 | 作业系统 |\n| 被动参与 | 课堂互动偶尔不积极 | 教师观察 |\n\n**响应方式：**\n- 记录在案，持续观察\n- 不主动干预，保持正常服务节奏\n- 如2周内出现第二个绿色信号 → 升级为黄色\n- 学管师在周报中标注观察项\n\n---\n\n## 预警升级机制\n\n```\n绿色（观察）\n    ↓ 连续出现2次以上\n黄色（关注）\n    ↓ 1周内未改善/出现红色信号\n红色（紧急）\n    ↓ 72h干预后仍无效\n退费处理（体面结业）\n```\n\n---\n\n## 自动预警规则\n\n| 规则 | 触发条件 | 预警等级 |\n|------|---------|:-------:|\n| 连续缺课 | 连续2次无故缺课 | 红色 |\n| 作业断崖 | 作业完成率连续2周低于50% | 黄色 |\n| 成绩连降 | 连续2次测评下降超过10% | 黄色 |\n| 长期请假 | 1个月内请假3次以上 | 黄色 |\n| 单次缺课 | 1次无故缺课 | 绿色 |\n| 单次波动 | 1次测评下降5%以内 | 绿色 |\n\n---\n\n## 投诉处理原则\n\n### 处理流程\n\n| 阶段 | 时间要求 | 负责人 | 动作 |\n|------|---------|--------|------|\n| 首接 | 24h内电话响应 | 咨询师 | 倾听诉求，不辩解不推诿，记录问题 |\n| 情绪处理 | 首接当场 | 咨询师 | **先处理情绪，再处理事情** |\n| 调查 | 24-48h | 咨询师+教师 | 查明原因，收集数据和事实 |\n| 方案回复 | 48h内 | 咨询师 | 给出明确解决方案+时间节点+责任人 |\n| 回访 | 48h后 | 学管 | 确认满意度，持续关注 |\n\n### 处理原则\n\n- **先情绪后事情**：不急于解释和辩驳，先让家长把话说完\n- **不推诿**：不说\"这不是我的职责\"\n- **不辩解**：不说\"您可能误会了\"\n- **有担当**：明确解决方案和时间节点，说到做到\n- **有记录**：所有投诉记录存档，月度复盘\n\n---\n\n## 退费处理：体面结业\n\n### 核心原则\n\n> 口碑 > 一时成交。即使学生要走，也要体面结业，输出价值。\n\n### 体面结业流程\n\n| 步骤 | 动作 | 负责人 |\n|------|------|--------|\n| 1. 接受决定 | 尊重家长选择，不追问\"为什么不学了\"，不表现不高兴 | 咨询师 |\n| 2. 整理成长手册 | 完整输出学员在学期间的成长数据、高光时刻、师生寄语 | 学管 |\n| 3. 结业会谈 | 正式会谈（15-20min），回顾成长，教师给出后续建议，送上祝福 | 咨询师+教师 |\n| 4. 退费办理 | 按未使用课次退款，5个工作日内完成 | 咨询师 |\n| 5. 保持联系 | 后续偶尔关心，节日问候，不推销 | 学管 |\n\n### 退费绝对禁止\n\n| 绝对不做 | 原因 |\n|---------|------|\n| 追问\"为什么不学了\" | 让家长为难，破坏口碑 |\n| 表现不高兴或冷淡 | 影响最后印象，断送转介绍可能 |\n| \"走了以后就没优惠了\" | 威胁式挽留，损害品牌形象 |\n| 用挽留话术让家长为难 | 尊重选择，口碑至上 |\n| 在孩子面前表现遗憾 | 避免给孩子造成心理压力 |\n| 反复追问考虑结果 | 过度施压适得其反 |\n\n---\n\n## 预警处理闭环\n\n每一条预警从触发到关闭，必须经历完整闭环：\n\n```\n1. 触发 → 系统/人工识别信号\n2. 记录 → 学管师在系统中标记\n3. 上报 → 按等级通知对应负责人\n4. 干预 → 执行对应等级的响应流程\n5. 跟踪 → 按时间节点回访\n6. 评估 → 判断升级/降级/关闭\n7. 关闭 → 记录结果和经验\n```\n\n---\n\n## 预警数据看板\n\n### 周度统计\n\n| 指标 | 本周 | 上周 | 变化 |\n|------|:----:|:----:|:----:|\n| 红色预警学员数 | -- | -- | -- |\n| 黄色预警学员数 | -- | -- | -- |\n| 绿色预警学员数 | -- | -- | -- |\n| 本周干预成功率 | -- | -- | -- |\n| 本周退费人数 | -- | -- | -- |\n\n### 月度复盘\n\n| 复盘维度 | 分析内容 |\n|---------|---------|\n| 预警总量 | 本月红/黄/绿各多少条 |\n| 转化率 | 红色预警→实际流失的比例 |\n| 干预有效率 | 干预后降级或关闭的比例 |\n| 高频信号 | 哪类信号出现最多 |\n| 教师分布 | 预警是否集中在某个教师的班级 |\n| 改进措施 | 针对复盘发现的问题制定优化方案 |\n\n**目标指标：**\n- 红色预警→实际流失率 < 30%（即70%挽留成功）\n- 黄色预警→升级为红色率 < 20%\n- 预警响应及时率 ≥ 95%\n\n---\n\n## 与续费的关系\n\n预警体系是续费管理的前置环节：\n\n```\n日常服务 → 预警识别 → 干预解决 → 续费准备 → 续费面谈\n```\n\n- 无预警记录的学员：续费面谈按标准流程\n- 有黄色预警记录的学员：续费前需额外安排一次教师面谈\n- 有红色预警记录的学员：续费前需咨询师亲自跟进，确认问题已解决\n\n---\n\n## 相关文档\n\n- 退费话术与结业流程：`04_scripts/exit_gracefully.md`\n- 续费SOP：`06_ops/renewal_sop.md`\n- 铁三角协作：`06_ops/teacher_consultant_service_triangle.md`\n", "lines": 234, "size": 8298}, "06_ops__consultation_sop": {"id": "06_ops__consultation_sop", "path": "06_ops/consultation_sop.md", "name": "consultation_sop", "title": "标准咨询流程 SOP（60分钟）", "tags": "[type:sop, scene:first-contact, role:consultant]", "module": "06_ops", "content": "---\ntitle: 标准咨询流程 SOP（60分钟）\ntags: [type:sop, scene:first-contact, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 标准咨询流程 SOP（60分钟）\n\n## 核心原则\n\n- **证据先行**：拒绝空洞承诺，用数据说话\n- **专业获客**：用专业服务（试卷深度分析、学业规划）获客，不做低价引流\n- **不强推成交**：让家长自己做决定，给充足考虑时间\n- **不承诺提分**：用同类学员数据说明预期改善周期，不承诺具体提分数字\n\n---\n\n## 咨询五步法（60分钟）\n\n### 第一步：倾听（10分钟）\n\n**目标：** 了解家庭背景、孩子情况、学习痛点，让家长充分表达诉求和焦虑，建立信任基础。不急于推课。\n\n**动作清单：**\n- 开场自我介绍（姓名+角色+今天的目的）\n- 提问引导：\"您最希望孩子在哪个方面有所改善？\"\n- 记录关键词：年级、科目、当前成绩、目标、家长最大担忧\n- 了解家庭教育背景：父母参与度、课外安排、孩子学习态度\n- 80%时间让家长说，20%时间回应确认\n\n**禁止动作：**\n- 不打断家长\n- 不急于介绍课程或推荐班型\n- 不评价其他机构\n- 不过早下结论（\"孩子基础太差\"等）\n\n**话术示例：**\n> \"我先了解一下孩子的情况，这样后面给您的建议会更有针对性。您先说，我做个记录。\"\n\n---\n\n### 第二步：诊断展示（15分钟）\n\n**目标：** 如有试卷，做逐题归因分析；展示错误簇、思维层次评估，用专业分析建立机构信任。\n\n**动作清单：**\n- 如家长带了试卷：现场快速分析（逐题归因，找出错误簇）\n- 如未带试卷：用同年级典型案例展示诊断方法\n- 展示诊断工具：错题归因表、模块得分率雷达图\n- 给出一句话诊断结论\n\n**诊断三大维度：**\n\n| 维度 | 内容 | 输出 |\n|------|------|------|\n| 逐题归因 | 概念性/计算性/审题性/方法性错误 | 错误归因表 |\n| 思维层次评估 | 布鲁姆分类：记忆→理解→应用→分析→综合→创造 | 思维层次分布图 |\n| 错误簇识别 | 连续出错的知识模块 | 模块得分率表 |\n\n**话术示例：**\n> \"从这张卷子看，孩子的计算能力没问题，主要问题集中在应用题的审题环节——6道应用题错了4道，其中3道是题意理解偏差。这不是基础问题，是思维方法问题，可以针对性训练。\"\n\n**参考文档：** `02_courses/course_selector.md`（课程匹配）\n\n---\n\n### 第三步：方案讲解（20分钟）\n\n**目标：** 根据诊断结果推荐课程，展示同类学员案例，提出个性化学习方案。\n\n**动作清单：**\n- 展示针对该学生的学习规划（短期/中期/长期）\n- 推荐匹配的班型和课时方案（参考 `02_courses/course_selector.md`）\n- 用同类学员案例说明预期效果（附数据）\n- 介绍铁三角服务体系（咨询师+教师+学管）\n\n**方案规划结构：**\n\n| 维度 | 短期（1个月） | 中期（1学期） | 长期（1学年） |\n|------|-------------|-------------|-------------|\n| 知识 | 核心考点突破、漏洞填补 | 模块系统梳理 | 完整知识体系 |\n| 能力 | 审题与规范训练 | 解题策略训练 | 高阶思维构建 |\n| 习惯 | 错题本启用 | 自主预习复习 | 自驱学习体系 |\n\n**话术示例：**\n> \"根据同类学员数据，这种审题类问题通过8-12次专项训练，预期改善周期为1-2个月。我们有一位初二学生，情况和您孩子很像，经过10次课，应用题正确率从40%提升到75%。\"\n\n---\n\n### 第四步：答疑（10分钟）\n\n**目标：** 回答家长疑问，展示教师视频/课堂实录，消除顾虑。\n\n**动作清单：**\n- 主动邀请提问：\"您有什么想了解的？\"\n- 逐一回应，不回避敏感问题（如退费、效果保证）\n- 展示教师课堂实录视频（30-60秒精华片段）\n- 如遇无法当场回答的问题，记录并承诺跟进时间\n\n**高频问题应答：**\n\n| 家长问题 | 标准应答 |\n|---------|---------|\n| \"能保证提多少分？\" | \"根据同类学员数据，预期改善周期为X。我们用阶段测评和成长手册追踪效果，您随时可以看到数据。\" |\n| \"和XX机构比有什么优势？\" | \"我们的差异化在于——（展示诊断报告、成长手册、视频反馈等具体服务）\" |\n| \"效果不好可以退费吗？\" | \"可以，我们有明确的退费政策，按未使用课次退款。更重要的是，我们有预警机制，效果不达标会主动调整方案。\" |\n| \"孩子基础很差怎么办？\" | \"目前有几个关键知识漏洞需要补，我们会按优先级逐个突破，先从得分率最低的模块开始。\" |\n\n---\n\n### 第五步：收尾（5分钟）\n\n**目标：** 自然结束，不强推成交，给家长考虑时间。\n\n**动作清单：**\n- 总结今天的沟通要点\n- 告知后续跟进安排\n- 留下诊断报告或学习建议（纸质或电子版）\n- 加微信，说明后续会发送资料\n\n**话术示例：**\n> \"今天先聊到这里。我把诊断报告整理好发给您，您和家人商量一下。有任何问题随时联系我，不着急做决定。\"\n\n**禁止动作：**\n- 不说\"名额有限，赶紧报名\"\n- 不说\"今天报名有优惠\"\n- 不反复追问\"考虑得怎么样\"\n- 不贬低其他机构\n- 不做焦虑营销\n\n---\n\n## 咨询后跟进节奏\n\n| 时间节点 | 方式 | 内容 | 性质 |\n|---------|------|------|------|\n| Day 0 | 微信 | 感谢到访 + 发送诊断报告/学习建议 | 主动跟进 |\n| Day 1 | 微信 | 发送一条针对性学习建议（与诊断相关） | 价值输出 |\n| Day 3 | 电话 | 回访，询问是否有新问题，不提报名 | 主动跟进 |\n| Day 7 | 微信 | 分享一个同类学员的成长案例 | 主动跟进 |\n| Day 14 | 微信 | 最后一次主动联系，表达\"随时欢迎\" | 最后联系 |\n| Day 14+ | 停止 | 转为内容营销（朋友圈、公众号），不再主动跟进 | 被动输出 |\n\n**铁律：主动跟进不超过3次（Day 0/3/7），其余为被动式内容输出。**\n\n---\n\n## 咨询禁忌清单\n\n| 禁止 | 替代 |\n|------|------|\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X\" |\n| \"别的机构不行\" | 展示自身差异化价值 |\n| \"赶紧报名，名额有限\" | \"建议尽早开始，以下是时间规划\" |\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" |\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据 |\n\n---\n\n## 咨询记录模板\n\n每次咨询后，咨询师须在当天完成以下记录：\n\n```\n【咨询记录】\n日期：\n学生姓名/年级：\n家长姓名/联系方式：\n当前成绩概况：\n家长核心诉求：\n诊断结论（一句话）：\n推荐方案：\n家长顾虑：\n下一步跟进计划：\n预计成交可能性：高/中/低\n```\n\n---\n\n## 关键指标\n\n| 指标 | 目标值 |\n|------|:-----:|\n| 咨询到店率 | ≥ 60% |\n| 咨询满意度 | ≥ 90% |\n| 首次咨询成交率 | ≥ 30% |\n| 7天内成交率 | ≥ 50% |\n| 14天内成交率 | ≥ 60% |\n", "lines": 190, "size": 7129}, "06_ops__content_calendar_guide": {"id": "06_ops__content_calendar_guide", "path": "06_ops/content_calendar_guide.md", "name": "content_calendar_guide", "title": "内容日历与排期指南 (Content Calendar Guide)", "tags": "[type:ops, role:marketing, role:ops]", "module": "06_ops", "content": "---\ntags: [type:ops, role:marketing, role:ops]\nlast_updated: 2026-03-22\nmaintainer: 运营团队\nrelated_files:\n  - 09_agents/content_factory_agent.md\n  - 04_scripts/content_templates.md\n  - 06_ops/annual_events_2024.md\n  - 08_rules/marketing_boundary.md\n---\n\n# 内容日历与排期指南\n\n本文件为百分教育多渠道内容矩阵提供月度排期框架、关键节点规划、发布频率建议和内容复用策略。\n\n---\n\n## 一、各平台每周发布频率\n\n| 平台 | 频率 | 最佳发布时间 | 备注 |\n|------|------|------------|------|\n| 微信公众号 | 2篇/周 | 周二、周五 20:00-21:00 | 深度内容为主，不追求高频 |\n| 小红书 | 4-5条/周 | 每天 12:00-13:00 或 20:00-22:00 | 干货笔记+课堂日常轮换 |\n| 朋友圈 | 每天1-2条 | 7:30-8:30 / 12:00-13:00 / 20:00-21:00 | 三种风格轮换（故事/数据/互动），不刷屏 |\n| 抖音 | 3-4条/周 | 18:00-20:00 | 优先错题拆解和教学理念类 |\n| 企微群 | 每天1条 | 早安8:00 / 干货12:00 / 通知随时 | 周末可减少，不打扰家长 |\n\n---\n\n## 二、学期节奏月度内容框架\n\n### 春季学期（2月-6月）\n\n| 月份 | 主题 | 内容重心 | 关键节点 |\n|------|------|---------|---------|\n| **2月** | 开学季 | 新学期规划、学习习惯养成、寒假收心 | 开学第一周 |\n| **3月** | 基础夯实 | 错题分析、学习方法、中考冲刺启动 | 女神节、植树节公益 |\n| **4月** | 期中备考 | 考前复习策略、审题技巧、家长心态调整 | 期中考试、年会 |\n| **5月** | 冲刺期 | 小升初冲刺、中考倒计时、期末预热 | 母亲节、小升初集训 |\n| **6月** | 考试季 | 考前减压、中高考祈福、暑假规划预告 | 中考、高考、龙门节 |\n\n### 暑假（7月-8月）\n\n| 月份 | 主题 | 内容重心 | 关键节点 |\n|------|------|---------|---------|\n| **7月** | 暑期开营 | 暑假课程亮点、衔接班启动、学习规划 | 校区活动、团报福利 |\n| **8月** | 收获+衔接 | 暑期成果展示、开学衔接、研学活动 | 研学、新学期预报名 |\n\n### 秋季学期（9月-1月）\n\n| 月份 | 主题 | 内容重心 | 关键节点 |\n|------|------|---------|---------|\n| **9月** | 开学季 | 新学期诊断、学习习惯建立、入学测评 | 开学第一周、团建 |\n| **10月** | 能力提升 | 教学理念传播、课堂高光、月考分析 | 国庆、教师培训 |\n| **11月** | 期中备考 | 期中复习、错题专项、家长教育 | 期中考试、双十二预告 |\n| **12月** | 年终冲刺 | 期末备考、年度回顾、寒假规划 | 公益活动、双十二 |\n| **1月** | 期末+寒假 | 期末冲刺、成绩分析、寒假课程 | 期末考试、勤学奖 |\n\n---\n\n## 三、关键节点内容规划\n\n### 3.1 开学季（2月/9月）\n\n**时间范围**：开学前1周 ~ 开学后2周\n\n| 时间 | 平台 | 内容 | 类型 |\n|------|------|------|------|\n| 开学前1周 | 公众号 | \"新学期学习规划指南：[年级]家长必读\" | 升学干货 |\n| 开学前1周 | 小红书 | \"开学收心清单：这5件事帮孩子快速进入状态\" | 家长教育 |\n| 开学前3天 | 朋友圈 | 数据型：\"去年开学第一个月，XX%的成绩波动发生在这个阶段\" | 数据型 |\n| 开学前3天 | 企微群 | 开学准备提醒+学习用品清单 | 实用信息 |\n| 开学第1天 | 朋友圈 | 故事型：课堂开学第一课场景 | 课堂高光 |\n| 开学第1周 | 抖音 | \"开学第一周，家长最该做的不是催作业\" | 家长教育 |\n| 开学第1周 | 公众号 | \"入学诊断报告解读：如何看懂孩子的学情\" | 错题分析 |\n| 开学第2周 | 小红书 | \"学习习惯养成的黄金21天\" | 家长教育 |\n\n---\n\n### 3.2 期中考试（4月/11月）\n\n**时间范围**：考前2周 ~ 考后1周\n\n| 时间 | 平台 | 内容 | 类型 |\n|------|------|------|------|\n| 考前2周 | 公众号 | \"期中考前：[学科]高频考点和易错点梳理\" | 升学干货 |\n| 考前2周 | 小红书 | \"期中考复习计划表（附模板）\" | 升学干货 |\n| 考前1周 | 朋友圈 | 互动型：\"考前最后一周，你家孩子在做什么？\" | 互动 |\n| 考前1周 | 企微群 | 考前提醒+审题技巧+家长心态建议 | 实用信息 |\n| 考前3天 | 抖音 | \"考前3天别做这3件事\" | 家长教育 |\n| 考前1天 | 朋友圈 | 故事型：老师备课/准备鼓励卡的场景 | 课堂高光 |\n| 考后1天 | 企微群 | \"考完了，先别急着问分数\" | 家长教育 |\n| 考后3天 | 公众号 | \"期中考试卷深度分析：这3道题错误率最高\" | 错题分析 |\n| 考后3天 | 小红书 | \"考完试，比对答案更重要的是这件事\" | 家长教育 |\n| 考后1周 | 抖音 | \"这道题XX%的学生做错了，拆解给你看\" | 错题分析 |\n\n---\n\n### 3.3 期末考试（1月/6月）\n\n与期中考试类似，但增加以下内容：\n- 学期成长回顾（学员案例类）\n- 寒/暑假规划指南（升学干货类）\n- 成长手册展示（学员案例类）\n\n---\n\n### 3.4 小升初（3月-6月）\n\n| 时间 | 平台 | 内容 | 类型 |\n|------|------|------|------|\n| 3月 | 公众号 | \"湛江小升初全攻略：时间线+备考策略\" | 升学干货 |\n| 3月 | 小红书 | \"五年级家长必看：小升初准备从现在开始\" | 升学干货 |\n| 4月 | 抖音 | \"小升初数学，这3个模块必须吃透\" | 升学干货 |\n| 4月 | 朋友圈 | 数据型：往年冲刺营学员录取数据 | 学员案例 |\n| 5月 | 公众号 | \"小升初冲刺最后1个月：做减法比做加法重要\" | 升学干货 |\n| 5月 | 企微群 | 冲刺营进度更新+家长配合建议 | 实用信息 |\n| 6月 | 朋友圈 | 故事型：考试结束后孩子们的表情 | 课堂高光 |\n| 6月 | 公众号 | \"录取喜报+初中衔接规划\" | 学员案例+升学干货 |\n\n---\n\n### 3.5 中考（4月-6月）\n\n| 时间 | 平台 | 内容 | 类型 |\n|------|------|------|------|\n| 4月 | 公众号 | \"中考数学压轴题拿分策略：从模型思维入手\" | 升学干货 |\n| 4月 | 抖音 | \"中考压轴题其实只考这几个模型\" | 升学干货 |\n| 5月 | 小红书 | \"中考倒计时30天：每天做好这3件事\" | 升学干货 |\n| 5月 | 企微群 | 每周冲刺进度+心理调适建议 | 实用信息 |\n| 6月 | 朋友圈 | 故事型：祈福活动/送考场景 | 课堂高光 |\n| 6月考后 | 公众号 | \"中考喜报+高中衔接建议\" | 学员案例 |\n\n---\n\n### 3.6 高考（5月-6月）\n\n| 时间 | 平台 | 内容 |\n|------|------|------|\n| 5月 | 公众号 | 高考冲刺心态管理+学科复习策略 |\n| 6月 | 朋友圈 | 祈福/送考+高考喜报 |\n| 6月考后 | 公众号 | 高考成果展示+暑假规划 |\n\n---\n\n### 3.7 寒暑假（1-2月/7-8月）\n\n| 阶段 | 平台 | 内容 | 类型 |\n|------|------|------|------|\n| 假期前2周 | 公众号 | \"寒/暑假学习规划：别让XX天白白浪费\" | 升学干货 |\n| 假期前2周 | 小红书 | \"假期学习时间表（可直接打印）\" | 升学干货 |\n| 假期前1周 | 企微群 | 假期课程安排+注意事项 | 实用信息 |\n| 假期第1周 | 朋友圈 | 课堂开营场景 | 课堂高光 |\n| 假期中期 | 抖音 | 课堂精彩片段/学员互动 | 课堂高光 |\n| 假期后期 | 公众号 | 假期学习成果展示 | 学员案例 |\n| 开学前1周 | 小红书 | \"收心指南：3天帮孩子切换到学习模式\" | 家长教育 |\n\n---\n\n## 四、每周内容排期模板\n\n以下为标准周排期（非考试周），团队可根据实际情况调整。\n\n### 周一\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 朋友圈 | 早安+新一周学习提醒（故事型） | 家长教育 |\n| 企微群 | 本周学习重点/课程安排 | 实用信息 |\n| 小红书 | 学习方法/习惯养成 | 家长教育 |\n\n### 周二\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 公众号 | 深度文章（错题分析/教学理念/升学干货，轮换） | 按排期 |\n| 朋友圈 | 配合公众号文章的精简版（数据型） | 同上 |\n| 抖音 | 错题拆解/学习技巧 | 错题分析 |\n\n### 周三\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 朋友圈 | 课堂瞬间/学生互动（故事型） | 课堂高光 |\n| 小红书 | 错题分析/考试技巧 | 错题分析 |\n| 企微群 | 干货分享（一题一拆） | 错题分析 |\n\n### 周四\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 朋友圈 | 家长教育/互动话题（互动型） | 家长教育 |\n| 小红书 | 学员案例/成长故事 | 学员案例 |\n| 抖音 | 教学理念/家长教育 | 教学理念 |\n\n### 周五\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 公众号 | 深度文章（学员案例/家长教育/课堂高光，轮换） | 按排期 |\n| 朋友圈 | 配合公众号的精简版（数据型） | 同上 |\n| 小红书 | 升学干货/政策解读 | 升学干货 |\n\n### 周六\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 朋友圈 | 周末课堂实拍（故事型） | 课堂高光 |\n| 抖音 | 课堂高光/精彩片段 | 课堂高光 |\n| 小红书 | 轻松实用（家长周末陪学建议） | 家长教育 |\n\n### 周日\n\n| 平台 | 内容 | 类型 |\n|------|------|------|\n| 朋友圈 | 周末总结/下周预告（互动型） | 互动 |\n| 企微群 | 下周课程提醒 | 实用信息 |\n\n---\n\n## 五、6大内容类型月度配比建议\n\n| 内容类型 | 月度占比 | 说明 |\n|---------|---------|------|\n| 错题分析类 | 25% | 核心干货，展示专业能力，获客效果最好 |\n| 学员案例类 | 15% | 真实案例最有说服力，但需要家长授权，产出较慢 |\n| 教学理念类 | 15% | 传递品牌定位，建立认知，适合公众号和抖音 |\n| 家长教育类 | 20% | 高互动，高分享，适合朋友圈和企微群 |\n| 升学干货类 | 15% | 在考试节点前后集中发布，时效性强 |\n| 课堂高光类 | 10% | 真实感强，适合朋友圈和小红书，需课堂素材支持 |\n\n在考试节点前后，升学干货类和错题分析类比例上升；日常阶段，家长教育类和教学理念类为主。\n\n---\n\n## 六、内容复用策略：一素材多平台\n\n### 核心原则\n\n一个好素材不应该只用一次。每个高质量素材至少适配3个平台。\n\n### 复用路径\n\n```\n素材产生（如：一份试卷分析/一个学员案例/一次课堂精彩瞬间）\n    │\n    ├──→ 公众号（最完整版本，1500-3000字深度文章）\n    │       │\n    │       ├──→ 小红书（提炼核心干货，300-800字，6-9图）\n    │       │       │\n    │       │       └──→ 朋友圈（取最亮的一个点，50-150字）\n    │       │\n    │       └──→ 企微群（取可操作建议，100-300字）\n    │\n    └──→ 抖音（基于核心观点，口语化改写，30-60秒脚本）\n```\n\n### 示例：一份期中考试卷分析的复用\n\n| 平台 | 适配内容 | 发布时间 |\n|------|---------|---------|\n| 公众号 | \"期中考数学丢分最多的3道题，逐题拆解\"（完整版） | 周二晚 |\n| 小红书 | \"这道题90%学生做错了\"（取错误率最高的1题，配图拆解） | 周三中午 |\n| 朋友圈 | \"200+份试卷分析，错误率最高的一道题，原因不是粗心\"（数据型，引导看公众号） | 周二晚/周三早 |\n| 抖音 | \"这道题90%都做错了，3秒告诉你为什么\"（口语化脚本） | 周三晚 |\n| 企微群 | \"本周易错题拆解+改善建议+练习建议\" | 周四 |\n\n### 复用节奏建议\n\n- 公众号和朋友圈可同天发布（朋友圈引流至公众号）\n- 小红书和抖音间隔1天（避免用户感知重复）\n- 企微群内容独立节奏，可在发布后1-2天推送精简版\n\n---\n\n## 七、特殊节日/活动内容规划\n\n基于百分教育2024年度大事件，以下节日和活动需提前准备内容：\n\n| 时间 | 节日/活动 | 内容方向 | 提前准备 |\n|------|---------|---------|---------|\n| 1月 | 勤学奖 | 优秀学员表彰+学习榜样故事 | 1周 |\n| 2月 | 春节/开学 | 新年祝福+开学收心 | 2周 |\n| 3月 | 女神节 | 致敬女教师/母亲+公益植树 | 1周 |\n| 3月 | 中考冲刺课 | 冲刺课招生+备考干货 | 2周 |\n| 4月 | 年会 | 品牌故事+教师风采+社会担当 | 2周 |\n| 5月 | 母亲节 | 亲子活动+感恩主题 | 1周 |\n| 5月 | 小升初集训 | 冲刺营进展+备考策略 | 3周 |\n| 6月 | 中高考 | 祈福+送考+成绩喜报 | 2周 |\n| 7月 | 暑假开营 | 课程亮点+团报福利+校区活动 | 3周 |\n| 8月 | 研学 | 研学记录+开学衔接 | 2周 |\n| 9月 | 开学季 | 入学诊断+学习规划 | 2周 |\n| 10月 | 国庆/教师培训 | 教师成长故事+教学理念 | 1周 |\n| 11月 | 期中考 | 备考+考后分析 | 2周 |\n| 12月 | 双十二/公益 | 优惠活动+公益品牌形象 | 2周 |\n\n---\n\n## 八、内容素材收集机制\n\n### 日常素材来源\n\n| 来源 | 负责人 | 收集频率 | 素材类型 |\n|------|--------|---------|---------|\n| 课堂教学 | 教师 | 每节课 | 精彩互动、学生发言、解题亮点 |\n| 试卷分析 | 教师/教研 | 每次考试后 | 错误率数据、典型错题、错因分布 |\n| 学员成长 | 学管 | 每月 | 成绩变化、习惯改善、家长反馈 |\n| 家长沟通 | 学管/咨询师 | 实时 | 家长好评、典型问题、常见困惑 |\n| 校区活动 | 校区负责人 | 活动时 | 活动照片、视频、学生作品 |\n\n### 素材管理要求\n\n- 所有涉及学生的素材必须匿名化\n- 使用前需获得家长书面授权\n- 建立共享素材库（按内容类型分类存储）\n- 每周由运营团队汇总可用素材，分配到内容排期\n\n---\n\n## 九、内容效果追踪\n\n### 关键指标\n\n| 平台 | 核心指标 | 目标值（参考） |\n|------|---------|-------------|\n| 公众号 | 阅读量、完读率、留言数 | 单篇阅读>500，完读率>40% |\n| 小红书 | 点赞、收藏、评论、涨粉 | 单篇互动>50 |\n| 朋友圈 | 点赞、评论、私信咨询 | 每条>10互动 |\n| 抖音 | 播放量、完播率、评论 | 单条播放>1000 |\n| 企微群 | 互动率、私信转化 | 话题互动率>20% |\n\n### 月度复盘\n\n每月最后一周，运营团队完成以下复盘：\n\n1. 各平台Top3内容分析（为什么效果好）\n2. 各平台Bottom3内容分析（为什么效果差）\n3. 下月内容方向调整建议\n4. 素材缺口识别（哪类素材不够用）\n5. 内容复用效率评估\n", "lines": 341, "size": 14376}, "06_ops__conversion_funnel": {"id": "06_ops__conversion_funnel", "path": "06_ops/conversion_funnel.md", "name": "conversion_funnel", "title": "转化漏斗模型", "tags": "[type:sop, scene:conversion, role:consultant]", "module": "06_ops", "content": "---\ntitle: 转化漏斗模型\ntags: [type:sop, scene:conversion, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/standardized_conversion_sop.md, 06_ops/consultation_sop.md, 06_ops/trial_class_sop.md]\n---\n\n# 转化漏斗模型\n\n## 概述\n\n百分教育的招生转化遵循五级漏斗模型：**线索获取 → 到店咨询 → 试听体验 → 成交报名 → 留存续费/转介绍**。每一级都有明确的动作、负责人和数据指标，确保转化过程可追踪、可优化。\n\n---\n\n## 漏斗全景\n\n```\n线索获取（试卷分析钩子/学业规划/公开课/短视频）\n    ↓ 到店率\n到店咨询（60分钟标准咨询）\n    ↓ 试听率\n试听体验（真实课堂 + 铁三角配合）\n    ↓ 成交率\n成交报名（选卡 + 缴费）\n    ↓ 续费率\n长期留存（成长手册驱动续费）\n    ↓ 转介绍率\n转介绍（三重好礼机制）\n```\n\n---\n\n## 各级漏斗详解\n\n### 第一级：线索获取\n\n**核心策略：用专业内容获客，不做焦虑营销。**\n\n**推荐钩子：**\n\n| 钩子类型 | 形式 | 目的 | 效果参考 |\n|---------|------|------|---------|\n| 试卷深度分析 | 图文报告 | 展示诊断能力，引导到店 | 专业钩子，高转化 |\n| 学业规划咨询 | 面对面/线上 | 建立深度信任 | 高意向线索 |\n| 学习方法公开课 | 线下，≤20人 | 面对面建立信任 | 精准获客 |\n| 考前诊断 | 专题分析 | 抓住考试节点需求 | 季节性爆发 |\n| 短视频内容 | 30-60秒 | 错题分析/课堂实录/学员案例 | 持续曝光 |\n\n**关键数据：**\n- 数学组《湛江中考几何高频错题模型库》已使到店率提升 **18%**\n- 视频内容的到店转化率是纯文字的 **2.3倍**\n\n**禁止内容：**\n- 低价体验课广告\n- \"名额有限，赶紧报名\"\n- 空洞的名师宣传（\"我们的老师很优秀\"）\n- 焦虑贩卖（\"孩子不补课就完了\"）\n\n---\n\n### 第二级：到店转化\n\n**核心策略：用诊断能力打动家长，自然引导试听。**\n\n| 动作 | 负责人 | 要点 |\n|------|--------|------|\n| 60分钟标准咨询 | 咨询师 | 倾听→诊断→方案→答疑→收尾 |\n| 试卷现场分析 | 咨询师/教师 | 逐题归因，展示专业度 |\n| 推荐试听 | 咨询师 | 自然过渡，不强推 |\n| 发送教师视频 | 学管师 | 试听前推送课堂实录 |\n\n**转化关键：**\n- 诊断报告的专业度直接影响试听意愿\n- \"我先试听一下再决定\"是最自然的转化路径\n- 不要在咨询环节就推成交\n\n---\n\n### 第三级：试听转化\n\n**核心策略：教师+咨询师+学管\"铁三角\"协作，真实课堂+即时反馈。**\n\n| 环节 | 动作 | 负责人 |\n|------|------|--------|\n| 试听前 | 推送教师视频/课堂实录/学员成果 | 咨询师 |\n| 试听中 | 铁三角配合，真实课堂不表演 | 教师+学管 |\n| 试听后 | 10分钟即时反馈 | 教师+咨询师 |\n| 跟进 | Day0报告→Day3回访→Day7案例 | 咨询师 |\n\n**参考数据：** 铁三角标准化配合上线后，试听转化率提升 **22%**\n\n---\n\n### 第四级：成交转化\n\n**核心策略：诊断驱动，用数据说话，不靠低价引流。**\n\n| 动作 | 频率 | 负责人 |\n|------|------|--------|\n| 诊断报告交付 | 首次咨询后 | 咨询师 |\n| 个性化方案推荐 | 试听后 | 咨询师 |\n| 同类学员案例分享 | 跟进中 | 咨询师 |\n| 选卡方案推荐 | 成交环节 | 咨询师 |\n\n---\n\n### 第五级：留存续费\n\n**核心策略：成长手册驱动续费，9000服务体系保障服务质量。**\n\n| 动作 | 频率 | 负责人 |\n|------|------|--------|\n| 阶段测评报告 | 每月 | 教师 |\n| 成长手册更新 | 每季度 | 学管师 |\n| 家长面谈 | 每学期 | 咨询师+教师 |\n| 续费面谈 | 到期前1个月 | 咨询师 |\n\n**关键数据：**\n- 标准化服务流程上线后，续费率从 **45%** 提升至 **72%**（参考深圳案例）\n- 拥有成长手册的学员续费率比无手册学员高 **35%**\n\n---\n\n### 第六级：转介绍\n\n**核心策略：三重好礼，口碑驱动。**\n\n| 好礼 | 内容 |\n|------|------|\n| 现金奖励 | 200元/成功推荐 |\n| 课时奖励 | 赠送2次课 |\n| 代金券 | 500元课程代金券 |\n\n**转介绍时机：** 续费后/阶段性成果反馈后，自然引导，不强求。\n\n---\n\n## 漏斗数据看板\n\n### 目标基准值\n\n| 漏斗层级 | 转化率目标 | 当前实际 | 差距 |\n|---------|:---------:|:-------:|:----:|\n| 曝光 → 到店 | ≥ 8% | 待测量 | -- |\n| 到店 → 试听 | ≥ 70% | 待测量 | -- |\n| 试听 → 成交 | ≥ 50% | 待测量 | -- |\n| 成交 → 续费 | ≥ 72% | 72% | 达标 |\n| **整体：曝光 → 成交** | ≥ 2.8% | 待测量 | -- |\n\n### 数据采集方式\n\n| 数据项 | 采集方式 | 频率 | 负责人 |\n|--------|---------|------|--------|\n| 视频曝光量 | 平台后台数据 | 每周 | 运营 |\n| 到店人数 | 前台登记 | 每日 | 学管师 |\n| 试听人数 | 试听登记表 | 每日 | 学管师 |\n| 成交人数 | 缴费系统 | 每日 | 咨询师 |\n| 续费率 | CRM系统 | 每月 | 咨询师 |\n\n---\n\n## 漏斗优化策略\n\n### 曝光 → 到店 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 曝光量不足 | 增加视频发布频率至每日1条 |\n| 到店率低 | 优化视频内容（加入诊断类钩子） |\n| 到店但非目标客户 | 精准定位内容标签，筛选高意向人群 |\n\n### 到店 → 试听 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 咨询后不愿试听 | 提升诊断报告质量，增加\"试听价值感\" |\n| 约了试听但未到 | 试听前1天提醒+发送教师视频预热 |\n\n### 试听 → 成交 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 试听满意但犹豫 | 加强课后反馈即时性，发送完整诊断报告 |\n| 价格顾虑 | 推荐启航卡低门槛体验，不急于推大单 |\n| 对比其他机构 | 展示差异化价值（诊断体系、成长手册、视频反馈） |\n\n### 成交 → 续费 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 效果不明显 | 启动流失预警机制，调整教学方案 |\n| 服务感知弱 | 增加阶段反馈频率，强化成长手册可视化 |\n| 价格敏感 | 推荐领航卡长期方案，展示课均价优势 |\n\n---\n\n## 案例数据\n\n### 几何错题模型库专项\n\n- 投放渠道：短视频平台\n- 内容形式：几何典型错题分析（30秒/条）\n- 曝光量：12,000次/月\n- 到店咨询：216人（到店率增幅 **18%**）\n- 试听转化：约108人\n- 最终成交：约54人\n\n### 标准化服务流程上线\n\n- 上线前续费率：**45%**\n- 上线后续费率：**72%**\n- 提升幅度：**+27个百分点**\n- 核心变量：成长手册 + 铁三角协作 + 标准化反馈节奏\n", "lines": 216, "size": 6748}, "06_ops__home_school_communication": {"id": "06_ops__home_school_communication", "path": "06_ops/home_school_communication.md", "name": "home_school_communication", "title": "家校沟通体系", "tags": "[type:sop, role:xueguan, role:consultant]", "module": "06_ops", "content": "---\ntitle: 家校沟通体系\ntags: [type:sop, role:xueguan, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 家校沟通体系\n\n## 核心理念\n\n> \"子不教父之过，教不严师之惰\"——实现两小时外教育。\n\n学生在机构的时间有限，真正的成长发生在课堂之外。家校沟通的目标是构建\"学生主导+家长引导+老师指导\"的**三力模型**，让教育效果从课堂延伸到家庭。\n\n---\n\n## 三力模型\n\n| 力 | 角色 | 职责 | 关键动作 |\n|------|------|------|---------|\n| 学生主导 | 学生 | 学习的第一责任人 | 完成作业、使用错题本、自主预习复习 |\n| 家长引导 | 家长 | 家庭学习环境的营造者 | 监督习惯、配合计划、参与活动 |\n| 老师指导 | 教师+学管 | 专业教学和服务保障 | 诊断→方案→执行→反馈→调整 |\n\n---\n\n## 沟通三段式（每次沟通必用）\n\n无论任何沟通场景，均遵循以下三段式结构：\n\n### 第一段：共情（30%）\n\n**目标：** 先理解家长焦虑，不急于反驳。\n\n- 倾听家长诉求，复述确认\n- 表达理解：\"您的担心完全可以理解\"\n- 不否定家长感受，不说\"您想多了\"或\"这很正常\"\n- 建立\"我们是同一战线\"的感觉\n\n**话术示例：**\n> \"我完全理解您的着急，成绩下降确实让人揪心。我先跟您说说我们观察到的情况。\"\n\n**禁止：**\n- 不急于反驳\n- 不说\"您别担心\"（家长会觉得不被重视）\n- 不说\"这很正常\"（家长会觉得被敷衍）\n\n---\n\n### 第二段：证据（40%）\n\n**目标：** 用具体数据和事实说话。\n\n- 展示入学vs当前的数据对比\n- 引用具体测评分数、作业完成率、课堂表现\n- 用错题归因分析说明问题所在\n- 避免空洞评价（\"孩子进步很大\"→\"数学从72分提升到85分\"）\n\n**证据来源：**\n- 阶段测评报告\n- 错题归因表\n- 课堂表现记录\n- 作业完成数据\n- 成长手册历史数据\n\n**话术示例：**\n> \"从数据来看，孩子入学时模块得分率：计算87%、应用题42%、几何65%。经过8次课，应用题得分率已提升到61%，提升了19个百分点。几何部分也从65%提升到78%。\"\n\n---\n\n### 第三段：行动（30%）\n\n**目标：** 明确下一步+时间节点+责任人。\n\n- 给出不超过3个优先行动方案\n- 每个方案明确：做什么、谁负责、什么时间、预期效果\n- 家长配合建议要具体、可操作\n\n**话术示例：**\n> \"接下来一个月，我们的计划是：1）教师每周增加1次应用题专项练习（王老师负责，每周三）；2）学管每周发送练习反馈给您（李老师负责，每周五）；3）请您在家监督孩子完成错题本整理（每天10分钟）。一个月后我们再看数据。\"\n\n---\n\n## 场景分流沟通策略\n\n### 场景一：首次咨询\n\n**策略：** 建立信任，不急推课。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 了解家长诉求和焦虑来源 | 80%时间让家长说 |\n| 证据 | 展示诊断能力（试卷分析/案例） | 用数据建立专业信任 |\n| 行动 | 提供一份免费学习建议，邀请试听 | 留下诊断报告，给考虑时间 |\n\n**关键原则：** 第一次见面只做诊断和建议，不谈报名和价格（除非家长主动问）。\n\n---\n\n### 场景二：阶段反馈\n\n**策略：** 入学vs当前的数据对比，用成长手册说话。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 肯定家长的配合和关注 | 先说家长做得好的地方 |\n| 证据 | 数据对比（入学→当前） | 模块得分率变化、能力图谱更新 |\n| 行动 | 下阶段计划+家长配合事项 | 明确时间和责任人 |\n\n**反馈频率：**\n- 日常：学管师每周1次微信简报\n- 正式：每月1次阶段测评报告\n- 面谈：每学期1次家长面谈\n\n---\n\n### 场景三：成绩下降\n\n**策略：** 不回避，共情→归因→调整方案。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 承认下降事实，理解家长焦虑 | \"成绩下降确实让人担心，我们一起看看原因\" |\n| 证据 | 拆分数据找根因 | 哪个模块下降、是否新增考点、是否非学习因素 |\n| 行动 | 调整方案（换教师/加课/调难度）+明确观察周期 | 1-2周后复盘，短期见效果 |\n\n**禁止说法：**\n- 不甩锅给学生（\"孩子不认真\"）\n- 不甩锅给家长（\"家里没配合\"）\n- 不找借口（\"这次考试偏难\"）\n- 不说\"孩子基础太差\"（替代：\"目前有几个关键知识漏洞需要补\"）\n\n---\n\n### 场景四：续费\n\n**策略：** 成长手册驱动，说\"继续\"不说\"续费\"。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 回顾共同走过的路程 | 感谢家长信任和配合 |\n| 证据 | 展示成长手册（数据+高光时刻） | 入学到当前的完整成长轨迹 |\n| 行动 | 下阶段规划+自然过渡 | 不强推，给家长决定空间 |\n\n**禁止：**\n- 不说\"续费\"（说\"继续\"）\n- 不制造紧迫感（\"不续费就退步\"）\n- 不打折促成交（用价值驱动，不用价格驱动）\n\n---\n\n### 场景五：投诉\n\n**策略：** 24h电话响应，先情绪后事情，48h回访。\n\n| 时间线 | 动作 | 负责人 |\n|--------|------|--------|\n| 0-24小时 | **电话响应**：倾听+道歉+承诺调查 | 咨询师 |\n| 24-48小时 | 内部调查+制定解决方案 | 咨询师+教师+学管 |\n| 48小时内 | **回访**：反馈调查结果+解决方案 | 咨询师 |\n| 1周后 | 跟踪回访，确认问题已解决 | 学管师 |\n\n**处理原则：**\n1. 24小时内必须电话响应（不是微信）\n2. 先处理情绪，再处理事情\n3. 不推诿，不找借口\n4. 48小时内给出明确解决方案\n5. 所有投诉记录存档，月度复盘\n\n---\n\n### 场景六：退费/体面告别\n\n**策略：** 接受决定，输出成长手册，保持联系。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 尊重家长决定，不强留 | 不追问原因、不施压挽留 |\n| 证据 | 整理完整成长手册 | 作为送给孩子的\"毕业礼物\" |\n| 行动 | 结业会谈+后续保持联系 | 口碑 > 一时成交 |\n\n**退费流程：**\n1. 接受退费意向，不反复挽留（最多1次真诚挽留）\n2. 整理成长手册（入学→离开的完整记录）\n3. 安排结业会谈（15分钟，教师参与）\n4. 计算退费金额，5个工作日内完成退款\n5. 后续：节日问候、学习资料分享（不推课）\n\n**铁律：** 即使学生要走，也要体面结业，输出价值。口碑 > 一时成交。\n\n---\n\n## 日常沟通方式：数字化/视频化\n\n| 方式 | 频率 | 内容 | 负责人 |\n|------|------|------|--------|\n| 30秒高光视频 | 每周 | 孩子课堂上的精彩瞬间，同步家长 | 学管师 |\n| 课堂片段实拍 | 每次课 | 教学过程真实记录 | 学管师 |\n| 每周微信简报 | 每周 | 本周学习情况+下周计划 | 学管师 |\n| 阶段数据报告 | 每月 | 模块得分率、能力图谱更新 | 教师 |\n| 成长手册更新 | 每季度 | 综合成长轨迹 | 学管师 |\n\n---\n\n## 家长教育：引导理念\n\n引导家长成为教育的合作伙伴，而非旁观者：\n\n- 分享家庭教育方法（如\"家庭几何探索游戏\"，让家长参与孩子的学习过程）\n- 推送适合家长的教育文章（不贩卖焦虑，传递正向理念）\n- 引导家长关注过程而非只看分数\n- 具体配合建议（\"每天10分钟错题整理\"而非\"多管管孩子\"）\n\n**参考案例：** 某校区通过家长教育活动（家庭几何探索游戏等），续费率提高 **35%**。\n\n---\n\n## 家长焦虑类型与应对\n\n| 焦虑类型 | 典型表现 | 应对策略 |\n|---------|---------|---------|\n| 成绩焦虑 | \"分数怎么还没提上去\" | 拆分数据，展示模块级进步 |\n| 对比焦虑 | \"别人家孩子在XX机构进步更快\" | 展示自身差异化价值，不评价其他机构 |\n| 投入焦虑 | \"花了这么多钱值不值\" | 量化投入产出比，展示成长数据 |\n| 时间焦虑 | \"升学就在眼前来不及了\" | 给出时间规划，说明优先级排序 |\n| 信任焦虑 | \"老师到底认不认真教\" | 提供课堂视频、作业批改记录等可视化证据 |\n\n---\n\n## 沟通禁忌\n\n| 禁止 | 替代 |\n|------|------|\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" |\n| \"进步很大\" | 用具体数据，如\"数学从72分提升到85分\" |\n| \"您多管管孩子\" | \"如果您能在家监督每天10分钟错题整理，效果会更好\" |\n| \"别的机构教的不好\" | 展示自身差异化价值 |\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X\" |\n| \"赶紧续费\" | \"建议继续下一阶段的学习，以下是规划\" |\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据 |\n\n---\n\n## 沟通记录规范\n\n每次重要沟通后，负责人须在当天记录：\n\n```\n【沟通记录】\n日期：\n学生姓名/年级：\n沟通人：家长姓名 / 关系\n沟通方式：面谈/电话/微信\n场景类型：首次咨询/阶段反馈/成绩下降/续费/投诉/退费\n共情要点：\n证据展示：\n行动方案：\n家长反馈：\n下次跟进时间：\n```\n", "lines": 262, "size": 9219}, "06_ops__new_employee_onboarding": {"id": "06_ops__new_employee_onboarding", "path": "06_ops/new_employee_onboarding.md", "name": "new_employee_onboarding", "title": "新人入职培训手册 (New Employee Onboarding)", "tags": "", "module": "06_ops", "content": "# 新人入职培训手册\n\n> 来源：百分教育新人入职培训手册.docx（初稿）\n> 核心原则：先磨心性，后教技能；先学做人，再学授课\n\n## 培训总原则\n\n1. **培养顺序**：试用期专注打磨心性与执行力，转正后再教授专业授课技能\n2. **核心目标**：先确认新人是否具备踏实做事、服从安排、抗压耐挫的职业心态\n3. **资源管控**：试用期不发放电子版核心教案/授课技巧等资料，转正后逐步开放\n\n## 试用期阶段（心性打磨期，1-2个月）\n\n### 阶段目标\n- 磨掉浮躁：培养耐心、细致、坚持的工作习惯\n- 考察人心：确认对百分的认可度、忠诚度与成长意愿\n- 基础贡献：通过刷题、录课辅助、班级服务等事务创造价值\n\n### 每日/每周核心任务\n\n| 任务模块 | 具体要求 | 交付标准 | 心性打磨重点 |\n|---------|---------|---------|------------|\n| 刷题 | 每日20-30题，逐题规范解题步骤，标注易错点与思路总结 | 每日22:00前提交，无跳步无敷衍 | 培养\"坐得住、做得细\"的耐心 |\n| 录课辅助 | 配合组长完成录课，剪辑/命名/归档素材，转化为教案初稿 | 守时配合，素材归档清晰 | 考察执行力与细节把控 |\n| 班级服务 | 群消息回复、作业批改、家长沟通、考勤数据整理 | 无投诉、数据准确、主动承担 | 理解\"教育即服务\" |\n| 心态沟通 | 每周1次校区沟通，主动反馈困难与心态变化 | 不抱怨不消极，认可百分理念 | 确认心性稳定性 |\n\n### 转正前三项核心考核\n1. **班级管理能力**：能配合维护课堂秩序\n2. **服务能力**：耐心对待学生与家长\n3. **用心度**：主动做事，无敷衍行为\n\n## 转正后阶段（技能教授期）\n\n### 阶段目标\n- 掌握授课技巧、教案设计、学情分析、规划能力\n- 开放核心资源，成为合格带班老师\n- 通过技能培训、带班升星与薪酬激励留住优质人才\n\n### 核心培训内容\n\n1. **标准化教案使用**\n   - 学习教案设计逻辑、课堂节奏把控、重难点突破\n   - 模拟试讲，打磨课堂语言与互动设计\n\n2. **授课技能培训**\n   - 课堂导入、提问、互动、总结等教学环节技巧\n   - 旁听资深老师带班课，记录复盘\n\n3. **学情与家校沟通**\n   - 分析学生薄弱点，制定个性化学习计划\n   - 掌握高效沟通话术与技巧\n\n4. **资源开放与发展**\n   - 逐步开放核心教案、录课视频、题型库\n   - 有真才实学者开放薪酬谈判与星级晋升\n\n### 发展路径\n助教 → 带班老师 → 资深老师 → 教研主管\n", "lines": 60, "size": 2669}, "06_ops__pricing__card_types_explained": {"id": "06_ops__pricing__card_types_explained", "path": "06_ops/pricing/card_types_explained.md", "name": "card_types_explained", "title": "课时卡类型详解", "tags": "[定价, 课时卡, 领航卡, 畅学卡, 启航卡]", "module": "06_ops", "content": "---\ntitle: 课时卡类型详解\ntags: [定价, 课时卡, 领航卡, 畅学卡, 启航卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 课时卡类型详解\n\n## 概述\n\n百分教育提供三种课时卡，满足不同家庭的学习节奏和预算需求。课时卡适用于精品小班（6-12人）和精英班（13-20人），一对一/一对二/圆桌课采用报课赠课制度。\n\n---\n\n## 三种卡型一览\n\n### 1. 领航卡 -- 最优惠\n\n| 维度 | 说明 |\n|------|------|\n| 课次 | 60次 |\n| 有效期 | **一年（自购卡之日起），上完即止** |\n| 赠送课次 | **5次**（含在卡内，不额外计费） |\n| 资料费 | 400元（一次性，含全学年教材及讲义） |\n| 核心优势 | **单价最低**，适合确定长期学习的家庭 |\n| 价格区间 | 80-180元/次（视年级和班型而定） |\n\n**适合人群：**\n- 确定在百分教育长期学习（至少一学年）\n- 每周能稳定安排1-2次课\n- 希望获得最大性价比\n\n**使用规则：**\n- 一年有效期内60+5=65次课需上完\n- 按每周2次计算，约33周可用完（含赠课）\n- 到期未用完的课次不予退还或延期\n- 因机构原因停课顺延有效期\n\n---\n\n### 2. 畅学卡 -- 最灵活\n\n| 维度 | 说明 |\n|------|------|\n| 课次 | 60次 |\n| 有效期 | **无时间限制**，按次划课 |\n| 赠送课次 | **3次**（含在卡内） |\n| 资料费 | 400元（一次性） |\n| 核心优势 | **最灵活**，不受时间压力 |\n| 价格区间 | 100-210元/次（视年级和班型而定） |\n\n**适合人群：**\n- 学习时间不固定（如课外活动多、经常出差的家庭）\n- 跨学期使用，不想被有效期约束\n- 希望保留灵活调课空间\n\n**使用规则：**\n- 无有效期限制，按次划课\n- 每次上课划1次，赠送的3次同等使用\n- 可暂停使用，随时恢复\n- 退卡按已使用次数 x 课单价计算退款\n\n---\n\n### 3. 启航卡 -- 入门体验\n\n| 维度 | 说明 |\n|------|------|\n| 课次 | 30次 |\n| 有效期 | **无时间限制**，按次划课 |\n| 赠送课次 | **无** |\n| 资料费 | 200元（一次性） |\n| 核心优势 | **低门槛入门**，体验后再决定 |\n| 价格区间 | 110-225元/次（视年级和班型而定） |\n\n**适合人群：**\n- 首次接触百分教育，想先感受教学质量\n- 短期补习需求（如假期集中突破一个模块）\n- 预算有限，希望先小额投入\n\n**使用规则：**\n- 30次课按次划扣\n- 无赠送课次\n- 用完后可升级为领航卡或畅学卡，已用课次按差价补齐\n\n---\n\n## 三卡对比总表\n\n| 对比维度 | 领航卡 | 畅学卡 | 启航卡 |\n|---------|:------:|:-----:|:-----:|\n| 课次 | 60次 | 60次 | 30次 |\n| 赠送 | 5次 | 3次 | 0次 |\n| 实际总课次 | 65次 | 63次 | 30次 |\n| 有效期 | 一年 | 无限制 | 无限制 |\n| 资料费 | 400元 | 400元 | 200元 |\n| 单价水平 | 最低 | 中等 | 较高 |\n| 灵活度 | 一般 | 最高 | 高 |\n| 退卡政策 | 按已用次数x单价退 | 按已用次数x单价退 | 按已用次数x单价退 |\n\n---\n\n## 选卡决策树\n\n```\n你确定至少学一学年吗？\n├── 是 → 每周能保证1-2次课吗？\n│   ├── 是 → 【领航卡】最优惠\n│   └── 否 → 【畅学卡】最灵活\n└── 否 → 想先体验一下？\n    ├── 是 → 【启航卡】低门槛\n    └── 不确定 → 【启航卡】先体验，后续可升级\n```\n\n---\n\n## 升级与转换\n\n| 转换方向 | 规则 |\n|---------|------|\n| 启航卡 → 领航卡 | 剩余课次按领航卡单价折算，补差价即可 |\n| 启航卡 → 畅学卡 | 剩余课次按畅学卡单价折算，补差价即可 |\n| 畅学卡 → 领航卡 | 需剩余课次30次以上，补差价+重新计算一年有效期 |\n| 领航卡 → 畅学卡 | 不支持（领航卡有效期内更优惠） |\n\n---\n\n## 常见问题\n\n**Q：领航卡到期没用完怎么办？**\nA：建议提前1个月联系学管师评估剩余课次，机构会尽力协助加课消化。到期未用完原则上不退不延。\n\n**Q：畅学卡可以两个孩子共用吗？**\nA：不可以。每张卡绑定一名学生，不可转让或共享。\n\n**Q：资料费包含什么？**\nA：包含对应学段的全套教材、课堂讲义、错题本、阶段测试卷。电子版资料终身可查。\n\n**Q：购卡后可以换科目吗？**\nA：可以。课时卡不绑定科目，可跨科使用（如数学和英语混合划课）。\n", "lines": 142, "size": 4444}, "06_ops__pricing__class_13to20_pricing": {"id": "06_ops__pricing__class_13to20_pricing", "path": "06_ops/pricing/class_13to20_pricing.md", "name": "class_13to20_pricing", "title": "精英班（13-20人）价格体系", "tags": "[定价, 大班, 13-20人, 课时卡]", "module": "06_ops", "content": "---\ntitle: 精英班（13-20人）价格体系\ntags: [定价, 大班, 13-20人, 课时卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 精英班（13-20人）价格体系\n\n## 概述\n\n精英班每班13-20人，适合基础较好、自律性强的学生。班型规模略大，单价更具竞争力，同时保留分层教学和课堂互动的优势。\n\n---\n\n## 完整价格表\n\n| 年级 | 课单价（元/次） | 领航卡 60次（元/次） | 领航卡总价 | 畅学卡 60次（元/次） | 畅学卡总价 | 启航卡 30次（元/次） | 启航卡总价 |\n|------|:--------------:|:-------------------:|:---------:|:-------------------:|:---------:|:-------------------:|:---------:|\n| 一~三年级 | 120 | 80 | 4,800 | 100 | 6,000 | 110 | 3,300 |\n| 四年级 | 125 | 85 | 5,100 | 105 | 6,300 | 115 | 3,450 |\n| 五年级 | 130 | 90 | 5,400 | 110 | 6,600 | 120 | 3,600 |\n| 六年级 | 135 | 95 | 5,700 | 115 | 6,900 | 125 | 3,750 |\n| 初一 | 140 | 100 | 6,000 | 120 | 7,200 | 130 | 3,900 |\n| 初二 | 150 | 110 | 6,600 | 130 | 7,800 | 140 | 4,200 |\n| 初三 | 160 | 120 | 7,200 | 140 | 8,400 | 150 | 4,500 |\n| 高一 | 170 | 130 | 7,800 | 150 | 9,000 | 160 | 4,800 |\n| 高二 | 180 | 140 | 8,400 | 160 | 9,600 | 170 | 5,100 |\n| 高三 | 190 | 150 | 9,000 | 170 | 10,200 | 180 | 5,400 |\n\n---\n\n## 与精品小班（6-12人）价格对比\n\n| 年级 | 精品小班课单价 | 精英班课单价 | 差额 | 精英班折扣率 |\n|------|:------------:|:----------:|:----:|:----------:|\n| 一~三年级 | 140 | 120 | -20 | 85.7% |\n| 四年级 | 150 | 125 | -25 | 83.3% |\n| 五年级 | 160 | 130 | -30 | 81.3% |\n| 六年级 | 170 | 135 | -35 | 79.4% |\n| 初一 | 180 | 140 | -40 | 77.8% |\n| 初二 | 190 | 150 | -40 | 78.9% |\n| 初三 | 200 | 160 | -40 | 80.0% |\n| 高一 | 210 | 170 | -40 | 81.0% |\n| 高二 | 220 | 180 | -40 | 81.8% |\n| 高三 | 230 | 190 | -40 | 82.6% |\n\n---\n\n## 适用场景\n\n1. **基础扎实的学生**：能跟上大班节奏，不需要过多个别辅导\n2. **预算有限的家庭**：精英班单价比精品小班低20-40元/次，60次课可节省1,200-2,400元\n3. **社交型学习者**：喜欢课堂讨论、同伴激励的学生\n\n---\n\n## 班型选择建议\n\n| 情况 | 推荐班型 |\n|------|---------|\n| 基础薄弱，需要高频关注 | 精品小班（6-12人） |\n| 基础中等偏上，自律性好 | 精英班（13-20人） |\n| 需要个性化定制 | 一对一/一对二 |\n| 家长自发组团3-5人 | 家长组团班（另见 `parent_group_pricing.md`） |\n\n---\n\n## 注意事项\n\n- 每次课90分钟\n- 卡型规则与精品小班一致（领航卡一年有效、畅学卡无时间限制、启航卡30次入门）\n- 资料费标准：领航卡/畅学卡400元，启航卡200元\n- 精英班开班人数不低于8人，低于8人将合并或调整至小班\n- 可叠加新生折扣及团报优惠\n", "lines": 76, "size": 2844}, "06_ops__pricing__class_6to12_pricing": {"id": "06_ops__pricing__class_6to12_pricing", "path": "06_ops/pricing/class_6to12_pricing.md", "name": "class_6to12_pricing", "title": "精品小班（6-12人）价格体系", "tags": "[定价, 小班, 6-12人, 课时卡]", "module": "06_ops", "content": "---\ntitle: 精品小班（6-12人）价格体系\ntags: [定价, 小班, 6-12人, 课时卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 精品小班（6-12人）价格体系\n\n## 概述\n\n精品小班是百分教育的核心班型，每班6-12人，兼顾教学互动与个性化关注。配合三种课时卡（领航卡、畅学卡、启航卡），满足不同家庭的时间与预算需求。\n\n---\n\n## 完整价格表\n\n| 年级 | 课单价（元/次） | 领航卡 60次（元/次） | 领航卡总价 | 畅学卡 60次（元/次） | 畅学卡总价 | 启航卡 30次（元/次） | 启航卡总价 |\n|------|:--------------:|:-------------------:|:---------:|:-------------------:|:---------:|:-------------------:|:---------:|\n| 一~三年级 | 140 | 95 | 5,700 | 125 | 7,500 | 135 | 4,050 |\n| 四年级 | 150 | 105 | 6,300 | 130 | 7,800 | 145 | 4,350 |\n| 五年级 | 160 | 110 | 6,600 | 140 | 8,400 | 155 | 4,650 |\n| 六年级 | 170 | 120 | 7,200 | 150 | 9,000 | 165 | 4,950 |\n| 初一 | 180 | 130 | 7,800 | 160 | 9,600 | 175 | 5,250 |\n| 初二 | 190 | 140 | 8,400 | 170 | 10,200 | 185 | 5,550 |\n| 初三 | 200 | 150 | 9,000 | 180 | 10,800 | 195 | 5,850 |\n| 高一 | 210 | 160 | 9,600 | 190 | 11,400 | 205 | 6,150 |\n| 高二 | 220 | 170 | 10,200 | 200 | 12,000 | 215 | 6,450 |\n| 高三 | 230 | 180 | 10,800 | 210 | 12,600 | 225 | 6,750 |\n\n---\n\n## 三种卡型对比\n\n| 维度 | 领航卡 | 畅学卡 | 启航卡 |\n|------|--------|--------|--------|\n| 课次 | 60次 | 60次 | 30次 |\n| 有效期 | 一年（上完即止） | 无时间限制（按次划课） | 无时间限制（按次划课） |\n| 资料费 | 400元 | 400元 | 200元 |\n| 赠送课次 | 5次 | 3次 | 无 |\n| 特点 | 单价最优惠 | 最灵活 | 入门体验 |\n\n---\n\n## 节省对比（以初二为例）\n\n- **按课单价购买60次**：190 x 60 = 11,400元\n- **领航卡60次**：8,400元（节省3,000元，折扣率73.7%）\n- **畅学卡60次**：10,200元（节省1,200元，折扣率89.5%）\n- **启航卡30次**：5,550元（节省150元/次 x 30 = 单价折扣率97.4%）\n\n---\n\n## 选卡建议\n\n1. **确定长期学习、时间稳定** → 领航卡（最高性价比，一年内上完）\n2. **需要灵活安排、不确定频率** → 畅学卡（无时间限制，按需划课）\n3. **初次接触、想先体验效果** → 启航卡（30次入门，低门槛）\n\n---\n\n## 注意事项\n\n- 所有价格均为每次课（90分钟/次）标准定价\n- 资料费为一次性费用，随卡缴纳\n- 领航卡赠送的5次课需在有效期内使用\n- 可叠加新生折扣及团报优惠（详见 `promotions_current.md`）\n- 价格调整以最新通知为准，已购卡不受调价影响\n", "lines": 69, "size": 2684}, "06_ops__pricing__one_on_one_pricing": {"id": "06_ops__pricing__one_on_one_pricing", "path": "06_ops/pricing/one_on_one_pricing.md", "name": "one_on_one_pricing", "title": "一对一 / 一对二 / 圆桌课 价格体系（机构组织）", "tags": "[定价, 一对一, 一对二, 圆桌, 个性化]", "module": "06_ops", "content": "---\ntitle: 一对一/一对二/圆桌课 价格体系（机构组织）\ntags: [定价, 一对一, 一对二, 圆桌, 个性化]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 一对一 / 一对二 / 圆桌课 价格体系（机构组织）\n\n## 概述\n\n机构组织的个性化课程分为三种形式：一对一（1v1）、一对二（1v2）、圆桌课（3-5人小组）。适合需要高度定制化教学方案的学生，由机构统一安排师资和教学计划。\n\n---\n\n## 标准课单价\n\n| 年级 | 一对一（元/次） | 一对二（元/次） | 圆桌课（元/次） |\n|------|:--------------:|:--------------:|:--------------:|\n| 一~二年级 | 280 | 200 | 170 |\n| 三年级 | 300 | 210 | 180 |\n| 四年级 | 320 | 220 | 190 |\n| 五年级 | 340 | 240 | 200 |\n| 六年级 | 360 | 250 | 220 |\n| 初一 | 380 | 270 | 230 |\n| 初二 | 400 | 280 | 240 |\n| 初三 | 420 | 290 | 250 |\n| 高一 | 440 | 310 | 260 |\n| 高二 | 460 | 320 | 280 |\n| 高三 | 480 | 340 | 290 |\n\n---\n\n## 报课赠课政策\n\n批量报课享赠课优惠，赠课随正课使用，无额外时间限制：\n\n| 报课次数 | 赠送次数 | 实际总课次 | 赠送比例 |\n|:--------:|:-------:|:---------:|:-------:|\n| 15次 | 1次 | 16次 | 6.7% |\n| 30次 | 3次 | 33次 | 10.0% |\n| 60次 | 7次 | 67次 | 11.7% |\n| 90次 | 12次 | 102次 | 13.3% |\n| 120次 | 20次 | 140次 | 16.7% |\n\n---\n\n## 费用计算示例\n\n### 示例1：初二学生报一对一60次\n\n- 标准单价：400元/次\n- 报课60次，赠送7次，实际可上67次\n- 总费用：400 x 60 = **24,000元**\n- 折合实际单价：24,000 / 67 = **358元/次**\n\n### 示例2：六年级学生报一对二30次\n\n- 标准单价：250元/次\n- 报课30次，赠送3次，实际可上33次\n- 总费用：250 x 30 = **7,500元**\n- 折合实际单价：7,500 / 33 = **227元/次**\n\n### 示例3：高三学生报圆桌课120次\n\n- 标准单价：290元/次\n- 报课120次，赠送20次，实际可上140次\n- 总费用：290 x 120 = **34,800元**\n- 折合实际单价：34,800 / 140 = **249元/次**\n\n---\n\n## 三种形式对比\n\n| 维度 | 一对一 | 一对二 | 圆桌课 |\n|------|--------|--------|--------|\n| 人数 | 1人 | 2人 | 3-5人 |\n| 个性化程度 | 最高 | 较高 | 中等 |\n| 单价水平 | 最高 | 中等 | 较低 |\n| 适合学生 | 基础极弱或冲刺拔高 | 水平接近的同伴 | 同级别小组讨论 |\n| 课堂节奏 | 完全跟学生走 | 兼顾两人进度 | 小组互动为主 |\n\n---\n\n## 选择建议\n\n1. **一对一**：适合以下情况\n   - 学科基础存在严重漏洞，需逐点攻破\n   - 中高考冲刺阶段，时间紧、目标明确\n   - 学生性格内向，不擅长在集体中提问\n\n2. **一对二**：适合以下情况\n   - 两位学生水平相近（差距不超过15分）\n   - 同班同学或好友结伴学习，互相督促\n   - 希望比一对一节省30%-40%费用\n\n3. **圆桌课**：适合以下情况\n   - 3-5位水平相近的学生组团\n   - 注重讨论式学习、思维碰撞\n   - 预算有限但希望获得小班关注度\n\n---\n\n## 注意事项\n\n- 每次课时长：一对一60分钟，一对二/圆桌课90分钟\n- 一对二需两位学生年级相同、学科相同、水平相近\n- 圆桌课由机构根据学生水平统一分组\n- 赠课政策适用于所有三种课型\n- 可叠加新生折扣（详见 `promotions_current.md`）\n- 家长自发组团的一对二/圆桌课价格另见 `parent_group_pricing.md`\n", "lines": 112, "size": 3439}, "06_ops__pricing__parent_group_pricing": {"id": "06_ops__pricing__parent_group_pricing", "path": "06_ops/pricing/parent_group_pricing.md", "name": "parent_group_pricing", "title": "家长自发组团价格体系", "tags": "[定价, 家长组团, 一对二, 圆桌, 课时卡]", "module": "06_ops", "content": "---\ntitle: 家长自发组团价格体系\ntags: [定价, 家长组团, 一对二, 圆桌, 课时卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 家长自发组团价格体系\n\n## 概述\n\n家长自发组团是指家长自行组织2-5名水平相近的学生，向机构申请开设一对二或圆桌课。由于家长承担了招生组织成本，机构提供专属优惠价格，并支持启航卡和畅学卡两种课时卡选择。\n\n---\n\n## 一对二组团价格\n\n| 年级 | 原课单价（元/次） | 启航卡 30次单价 | 启航卡总价 | 畅学卡 60次单价 | 畅学卡总价 |\n|------|:--------------:|:-------------:|:---------:|:-------------:|:---------:|\n| 一~二年级 | 200 | 180 | 5,400 | 170 | 10,200 |\n| 三年级 | 210 | 190 | 5,700 | 178 | 10,680 |\n| 四年级 | 220 | 198 | 5,940 | 187 | 11,220 |\n| 五年级 | 240 | 216 | 6,480 | 204 | 12,240 |\n| 六年级 | 250 | 225 | 6,750 | 213 | 12,780 |\n| 初一 | 270 | 243 | 7,290 | 230 | 13,800 |\n| 初二 | 280 | 252 | 7,560 | 238 | 14,280 |\n| 初三 | 290 | 261 | 7,830 | 247 | 14,820 |\n| 高一 | 310 | 279 | 8,370 | 264 | 15,840 |\n| 高二 | 320 | 288 | 8,640 | 272 | 16,320 |\n| 高三 | 340 | 306 | 9,180 | 289 | 17,340 |\n\n---\n\n## 圆桌课组团价格（3-5人）\n\n| 年级 | 原课单价（元/次） | 启航卡 30次单价 | 启航卡总价 | 畅学卡 60次单价 | 畅学卡总价 |\n|------|:--------------:|:-------------:|:---------:|:-------------:|:---------:|\n| 一~二年级 | 170 | 153 | 4,590 | 145 | 8,700 |\n| 三年级 | 180 | 162 | 4,860 | 153 | 9,180 |\n| 四年级 | 190 | 171 | 5,130 | 162 | 9,720 |\n| 五年级 | 200 | 180 | 5,400 | 170 | 10,200 |\n| 六年级 | 220 | 198 | 5,940 | 187 | 11,220 |\n| 初一 | 230 | 207 | 6,210 | 196 | 11,760 |\n| 初二 | 240 | 216 | 6,480 | 204 | 12,240 |\n| 初三 | 250 | 225 | 6,750 | 213 | 12,780 |\n| 高一 | 260 | 234 | 7,020 | 221 | 13,260 |\n| 高二 | 280 | 252 | 7,560 | 238 | 14,280 |\n| 高三 | 290 | 261 | 7,830 | 247 | 14,820 |\n\n---\n\n## 组团规则\n\n### 申请条件\n\n1. 家长自行组团，机构不参与招募\n2. 一对二：2人同年级、同学科、水平差距不超过15分\n3. 圆桌课：3-5人同年级、同学科、水平相近\n4. 所有成员需同时报名缴费\n\n### 卡型说明\n\n| 维度 | 启航卡 | 畅学卡 |\n|------|--------|--------|\n| 课次 | 30次 | 60次 |\n| 有效期 | 按次划课，无时间限制 | 按次划课，无时间限制 |\n| 资料费 | 200元/人 | 400元/人 |\n| 优惠幅度 | 原价9折左右 | 原价8.5折左右 |\n| 适合 | 先体验再决定 | 确定长期跟团学习 |\n\n> 注意：家长组团暂不提供领航卡，因组团人员变动风险较高，畅学卡的灵活性更适合此场景。\n\n---\n\n## 与机构组织课程对比（以初二一对二为例）\n\n| 方式 | 课单价 | 60次总费用 | 节省 |\n|------|:------:|:---------:|:----:|\n| 机构组织一对二（按次） | 280 | 16,800 | 基准 |\n| 机构组织一对二（报30送3） | 255 | 约15,300 | 1,500 |\n| 家长组团畅学卡60次 | 238 | 14,280 | 2,520 |\n\n---\n\n## 常见问题\n\n**Q：组团中途有人退出怎么办？**\nA：剩余成员可继续上课，按原卡价格不变。如需补人，新成员需水平匹配并单独购卡。\n\n**Q：家长组团能否享受新生折扣？**\nA：家长组团价格已为优惠价，不再叠加新生折扣。但可参与转介绍奖励。\n\n**Q：组团的学生可以分别报不同科目吗？**\nA：同一组团课程的学生需报同一科目。如需不同科目，请分别组团。\n\n---\n\n## 注意事项\n\n- 每次课90分钟\n- 资料费按人收取，随卡一次性缴纳\n- 开课前需所有成员到齐签到，缺席者按正常划课\n- 组团课程的上课时间由成员协商确定，机构优先安排\n- 师资由机构统一安排，家长不指定教师\n", "lines": 105, "size": 3804}, "06_ops__pricing__promotions_current": {"id": "06_ops__pricing__promotions_current", "path": "06_ops/pricing/promotions_current.md", "name": "promotions_current", "title": "当前优惠活动汇总", "tags": "[定价, 优惠, 新生, 团报, 转介绍, 奖学金]", "module": "06_ops", "content": "---\ntitle: 当前优惠活动汇总\ntags: [定价, 优惠, 新生, 团报, 转介绍, 奖学金]\ncategory: 运营/定价\nlast_updated: 2026-03-19\nrelated_files: [04_scripts/referral_invitation.md]\n---\n\n# 当前优惠活动汇总\n\n---\n\n## 一、新生报课优惠（20次起）\n\n适用对象：首次在百分教育报名的新生，报课20次起享受以下折扣：\n\n| 报名科目数 | 折扣 | 说明 |\n|:---------:|:----:|------|\n| 单科 | **9.5折** | 报一个科目即可享受 |\n| 两科 | **9折** | 同时报两个科目 |\n| 三科 | **8.5折** | 同时报三个及以上科目 |\n\n> 适用范围：精品小班、精英班、一对一/一对二/圆桌课均可。最低报课门槛：20次起。不与团报折扣叠加，取最优价。\n\n---\n\n## 二、团报优惠\n\n适用对象：新生组团同时报名（须同一天完成缴费）：\n\n| 团报人数 | 折扣 | 说明 |\n|:--------:|:----:|------|\n| 2人成团 | **8.5折** | 两位新生同时报名 |\n| 3人成团 | **8折** | 三位新生同时报名 |\n| 4人成团 | **7.5折** | 四位及以上新生同时报名 |\n\n> 团报成员可报不同科目、不同班型。团报折扣与新生折扣不叠加，自动取更优方案。团报成员须均为新生。\n\n---\n\n## 三、转介绍奖励 -- \"感恩有您 好礼相荐\"\n\n老学员成功推荐新学员报名（新学员缴费20次以上即算成功），推荐人可 **三选一**：\n\n| 奖励名称 | 奖励选项 | 内容 |\n|---------|---------|------|\n| 感恩礼一（答谢礼） | 选项A | **200元现金红包/转账**，直接到账 |\n| 感恩礼二（成长礼） | 选项B | **精品小班课2次**，可用于任意科目 |\n| 感恩礼三（续航礼） | 选项C | **500元续费代金券**（启航卡及以上可用），下次续费时抵扣 |\n\n> 每推荐一人享一次奖励，无上限。被推荐的新学员同时享受新生折扣。推荐关系须在新学员缴费前登记。详细话术见 `04_scripts/referral_invitation.md`。\n\n---\n\n## 四、\"勤学\"奖学金\n\n奖励在校成绩优秀的学员：\n\n| 奖项 | 金额 |\n|------|:----:|\n| 校年级总分前3名 | **600元** |\n| 校年级总分前4-6名 | **500元** |\n| 校年级总分前7-10名 | **400元** |\n| 班级总分第一名 | **300元** |\n| 单科第一名 | **200元** |\n\n---\n\n## 五、明星学员奖\n\n奖励在校排名大幅进步的学员：\n\n| 进步幅度 | 奖金 |\n|---------|:----:|\n| 进步300名及以上 | **300元** |\n| 进步200名及以上 | **200元** |\n| 进步100名及以上 | **100元** |\n\n---\n\n## 六、最强大脑奖\n\n奖励班级单科表现突出的学员：\n\n| 名次 | 奖金 |\n|------|:----:|\n| 班级单科第一名 | **300元** |\n| 班级单科第二名 | **200元** |\n| 班级单科第三名 | **100元** |\n\n---\n\n## 七、奋进之星\n\n奖励持续进步的学员：\n\n| 进步幅度 | 奖金 |\n|---------|:----:|\n| 进步300名以上 | **200元** |\n| 进步200名以上 | **100元** |\n\n---\n\n## 八、学习标兵\n\n奖励学习习惯优秀的学员，每项奖励 **100元**：\n\n| 标兵类型 | 评选标准 |\n|---------|---------|\n| 全勤奖 | 本学期全勤 |\n| 全勤+爱提问 | 全勤且课堂积极提问 |\n| 全签到+记笔记+用心做 | 每次按时签到、认真记笔记、用心完成课堂练习 |\n| 全复习+及时订正 | 每次复习到位、错题及时订正 |\n\n---\n\n## 九、\"励行\"奖学金\n\n百分教育最高荣誉奖学金，**最高10,000元**。具体评选标准和申请流程见 `scholarship_system.md`。\n\n---\n\n## 十、名师一对一报课赠课\n\n一对一/一对二/圆桌课批量报课赠课，与课时卡体系独立：\n\n| 报课次数 | 赠送次数 | 实际可用 | 赠送比例 |\n|:--------:|:-------:|:-------:|:-------:|\n| 15次 | 1次 | 16次 | 6.7% |\n| 20次 | 2次 | 22次 | 10.0% |\n| 30次 | 4次 | 34次 | 13.3% |\n\n> 赠课随正课使用，无额外限制。更高次数赠课政策见 `one_on_one_pricing.md`。\n\n---\n\n## 十一、小升初春季特训营特惠\n\n面向小升初分班考学生，18次课/科：\n\n| 报名方案 | 原价 | 优惠 | 优惠后价格 |\n|---------|:----:|------|:---------:|\n| 报一科 | 3,969元 | 减300元 | **3,669元** |\n| 报两科 | 7,938元 | 减1,000元 | **6,938元** |\n| 报三科 | 11,907元 | 减1,680元 | **10,227元** |\n| 前10名报名 | -- | 再减100元 | 在上述基础上再减 |\n\n> 最高优惠 **1,780元**（三科+前10名）。详见 `xiaoshengchu_pricing.md`。\n\n---\n\n## 十二、IPA音标魔法营\n\n专项英语语音课程，集中突破48个国际音标：\n\n| 价格类型 | 价格 |\n|---------|:----:|\n| 原价 | 1,200元 |\n| 前30名早鸟价 | **899元** |\n| 3人团报价 | **再减200元/人（即699元/人）** |\n| 老学员推新 | 双方各得 **50元奖学金券** |\n\n> 适合对象：小学4-6年级。\n\n---\n\n## 十三、7天自然拼读特训营\n\n自然拼读集中训练，7天掌握拼读规则：\n\n| 价格 |\n|:----:|\n| **499元** |\n\n> 适合对象：一至三年级，或英语启蒙阶段学生。含全套拼读教材和练习册。\n\n---\n\n## 优惠叠加规则\n\n| 优惠类型 | 可否叠加新生折扣 | 可否叠加团报 | 可否叠加转介绍 |\n|---------|:--------------:|:----------:|:------------:|\n| 新生折扣 | -- | 不可（取最优） | 可 |\n| 团报优惠 | 不可（取最优） | -- | 可 |\n| 转介绍奖励 | 可 | 可 | -- |\n| 报课赠课 | 可 | 可 | 可 |\n| 特训营优惠 | 独立活动 | 独立活动 | 可 |\n| 奖学金 | 可 | 可 | 可 |\n\n---\n\n## 咨询话术要点\n\n- 不说\"赶紧报名，名额有限\"，说\"建议尽早开始，以下是时间规划\"\n- 不做焦虑营销，用数据和方案说话\n- 介绍优惠时强调\"匹配需求\"而非\"占便宜\"\n- 新生优先推荐启航卡体验，不急于推大单\n", "lines": 198, "size": 5726}, "06_ops__pricing__scholarship_system": {"id": "06_ops__pricing__scholarship_system", "path": "06_ops/pricing/scholarship_system.md", "name": "scholarship_system", "title": "百分教育奖学金体系", "tags": "[奖学金, 勤学奖, 励行奖, 学员激励]", "module": "06_ops", "content": "---\ntitle: 奖学金体系详解\ntags: [奖学金, 勤学奖, 励行奖, 学员激励]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 百分教育奖学金体系\n\n## 概述\n\n百分教育奖学金体系分为六大奖项，覆盖\"绝对成绩、思维能力、进步幅度、学习行为\"四个维度，确保不同层次的学生都有获奖机会。奖学金既是对学员的真实激励，也是机构品牌口碑的重要载体。\n\n---\n\n## 一、勤学奖学金\n\n以学校官方成绩为依据，奖励绝对排名优秀的学员：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 校年级排名前3名 | 学校期末考试年级总分排名 | **600** |\n| 校年级排名4-6名 | 学校期末考试年级总分排名 | **500** |\n| 校年级排名7-10名 | 学校期末考试年级总分排名 | **400** |\n| 班级总分第一 | 学校期末考试班级总分排名 | **300** |\n| 单科年级第一 | 学校期末考试单科年级排名 | **200** |\n\n> 需提供学校成绩单或排名证明\n> 同一学生多个奖项可叠加（如年级前3 + 单科第一 = 600 + 200 = 800元）\n\n---\n\n## 二、明星学员奖\n\n奖励排名大幅进步的学员，激励持续努力：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 进步300名以上 | 两次大考之间年级排名进步 | **300** |\n| 进步200-299名 | 两次大考之间年级排名进步 | **200** |\n| 进步100-199名 | 两次大考之间年级排名进步 | **100** |\n\n> 以学校期中/期末考试排名为准\n> 两次考试间隔至少一个学期\n\n---\n\n## 三、最强大脑奖\n\n奖励百分教育内部测评成绩突出的学员：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 单科班级第一 | 百分教育阶段测评班级排名 | **300** |\n| 单科班级第二 | 百分教育阶段测评班级排名 | **200** |\n| 单科班级第三 | 百分教育阶段测评班级排名 | **100** |\n\n> 每学期评选一次\n> 以百分教育内部统一测评为准\n\n---\n\n## 四、奋进之星奖\n\n奖励有明显进步意愿和实际进步的中游学员：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 进步300名以上 | 学校排名进步 | **200** |\n| 进步200名以上 | 学校排名进步 | **100** |\n\n> 与明星学员奖不重复评选，取更高奖项\n> 重点面向中游偏下、有成长潜力的学员\n\n---\n\n## 五、学习标兵奖\n\n奖励学习行为和习惯优秀的学员，不以成绩为唯一标准：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 全勤标兵 | 一学期内百分教育课程零缺勤 | **100** |\n| 爱提问标兵 | 课堂主动提问频率最高 | **100** |\n| 记笔记标兵 | 笔记完整度和质量评选 | **100** |\n| 及时订正标兵 | 错题订正及时率最高 | **100** |\n\n> 由任课教师和学管师联合评选\n> 每学期每个班级评选各1-2人\n> 同一学生可获多个标兵奖\n\n---\n\n## 六、励行奖学金\n\n百分教育最高荣誉，面向综合表现卓越的学员：\n\n| 等级 | 奖金 | 评选标准 |\n|------|:----:|---------|\n| 特等奖 | **10,000元** | 全校年级第一 + 百分教育学习标兵 + 社会实践突出 |\n| 一等奖 | **5,000元** | 校年级前5 + 百分教育两项以上奖项 |\n| 二等奖 | **3,000元** | 校年级前10 + 百分教育一项以上奖项 |\n| 三等奖 | **1,000元** | 校年级前20 OR 进步500名以上 |\n\n> 每学年评选一次，名额有限\n> 需提交完整的成绩证明和个人陈述\n> 评审委员会由校长、教学主管、学管主管组成\n\n---\n\n## 奖学金发放规则\n\n### 发放形式\n\n- **现金发放**：600元以下奖项直接打款至家长账户\n- **学费抵扣**：600元以上奖项可选择学费抵扣（额外加10%）或现金\n- **荣誉证书**：所有获奖学员颁发百分教育奖学金证书\n\n### 申请流程\n\n1. **成绩公布后2周内**：学员或家长向学管师提交成绩证明\n2. **审核期（1周）**：教学主管核实成绩\n3. **公示期（3天）**：获奖名单在家长群公示\n4. **发放**：公示无异议后5个工作日内发放\n\n### 叠加规则\n\n- 勤学奖内部各奖项可叠加\n- 勤学奖 + 学习标兵可叠加\n- 明星学员与奋进之星不叠加，取高者\n- 励行奖学金与其他奖项不叠加（已含最高荣誉）\n\n---\n\n## 奖学金与品牌建设\n\n### 对外宣传价值\n\n- 获奖学员案例是最有说服力的招生素材\n- \"用奖学金证明教学效果\"替代\"保证提分XX分\"\n- 奖学金颁奖仪式是高品质品牌活动\n\n### 对内激励价值\n\n- 覆盖四个维度，确保30%以上学员有获奖机会\n- 学习标兵奖关注行为而非天赋，人人可争取\n- 勤学励行奖作为品牌载体，强化\"用数据说话\"的机构文化\n\n---\n\n## 年度预算参考\n\n| 奖项类别 | 预计获奖人次/学期 | 平均奖金 | 学期预算 |\n|---------|:---------------:|:------:|:------:|\n| 勤学奖学金 | 30-50人次 | 350元 | 10,500-17,500 |\n| 明星学员奖 | 15-25人次 | 200元 | 3,000-5,000 |\n| 最强大脑奖 | 20-30人次 | 200元 | 4,000-6,000 |\n| 奋进之星奖 | 10-20人次 | 150元 | 1,500-3,000 |\n| 学习标兵奖 | 30-50人次 | 100元 | 3,000-5,000 |\n| 励行奖学金 | 5-10人次 | 3,000元 | 15,000-30,000 |\n| **合计** | | | **37,000-66,500** |\n", "lines": 162, "size": 5348}, "06_ops__pricing__xiaoshengchu_pricing": {"id": "06_ops__pricing__xiaoshengchu_pricing", "path": "06_ops/pricing/xiaoshengchu_pricing.md", "name": "xiaoshengchu_pricing", "title": "小升初课程定价", "tags": "[定价, 小升初, 冲刺]", "module": "06_ops", "content": "---\ntitle: 小升初课程定价\ntags: [定价, 小升初, 冲刺]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 小升初课程定价\n\n## 概述\n\n百分教育小升初课程体系包括 **名校冲刺常规课程** 和 **春季分班考特训营** 两大板块，目标帮助学生冲击本地重点初中的精英班/火箭班。\n\n---\n\n## 一、小升初名校冲刺课（常规班）\n\n小升初名校冲刺课为常规小班授课，按对应年级的6-12人精品小班价格收费。\n\n| 项目 | 说明 |\n|------|------|\n| 适用年级 | 五年级、六年级 |\n| 班型 | 6-12人精品小班 |\n| 收费标准 | 按年级对应的精品小班课单价（详见 `class_6to12_pricing.md`） |\n| 课时卡 | 可使用领航卡、畅学卡、启航卡 |\n| 开课校区 | 京基校区（赤坎区）、虹都校区（赤坎区）、南油校区（坡头区）、海东校区（坡头区） |\n\n> 建议 **五年级开始准备**，提前一年进入小升初备考节奏，系统梳理知识漏洞，培养应试思维。\n\n---\n\n## 二、春季分班考特训营\n\n针对小升初分班考集中强化训练，18次课/科，帮助学生在分班考试中争取进入重点班级。\n\n### 定价与优惠\n\n| 报名方案 | 原价 | 优惠金额 | 优惠后价格 |\n|---------|:----:|:-------:|:---------:|\n| 报一科 | 3,969元 | 减300元 | **3,669元** |\n| 报两科 | 7,938元 | 减1,000元 | **6,938元** |\n| 报三科 | 11,907元 | 减1,680元 | **10,227元** |\n\n**早鸟优惠**：前10名报名再减100元\n\n| 组合 | 最终价格 |\n|------|:-------:|\n| 一科 + 前10名 | **3,569元** |\n| 两科 + 前10名 | **6,838元** |\n| 三科 + 前10名 | **10,127元**（最高优惠1,780元） |\n\n### 课程安排\n\n| 维度 | 说明 |\n|------|------|\n| 总课次 | 18次/科 |\n| 科目 | 数学、英语、语文 |\n| 单次课时 | 2小时 |\n| 班型 | 精品小班 |\n\n---\n\n## 三、目标学校\n\n小升初课程紧密对接以下本地重点初中的入学考试及分班考试要求：\n\n| 目标学校 | 目标班级 |\n|---------|---------|\n| 培才一中 | **火箭班** |\n| 廉江实验学校 | **精英班** |\n| 北附博雅学校 | **清北班** |\n| 麻章广东省实验学校 | **重点班** |\n\n---\n\n## 四、备考时间规划建议\n\n| 阶段 | 时间 | 重点任务 |\n|------|------|---------|\n| 提前布局期 | 五年级上学期 | 夯实基础，补齐知识漏洞，养成良好学习习惯 |\n| 系统备考期 | 五年级下~六年级上 | 系统学习小升初考点，分模块专题训练 |\n| 冲刺强化期 | 六年级下学期 | 真题演练、查漏补缺、应试技巧训练 |\n| 分班考特训 | 春季特训营 | 18次课集中突破分班考重难点 |\n\n> 越早启动准备，越有充足时间查漏补缺。建议五年级即进入备考状态。\n\n---\n\n## 五、咨询话术要点\n\n- 不说\"保证考上XX学校\"，说\"根据同类学员数据，系统备考后录取率显著提升\"\n- 强调\"提前准备的重要性\"而非\"名额紧张\"\n- 用历届学员案例和数据说明备考周期与效果\n- 三科联报优惠力度最大，但需根据学生实际薄弱科目推荐，不盲目推全科\n", "lines": 95, "size": 3138}, "06_ops__renewal_sop": {"id": "06_ops__renewal_sop", "path": "06_ops/renewal_sop.md", "name": "renewal_sop", "title": "续费标准操作流程", "tags": "[type:sop, scene:renewal, role:consultant, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 续费标准操作流程\ntags: [type:sop, scene:renewal, role:consultant, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [04_scripts/renewal_conversation.md, 04_scripts/referral_invitation.md]\n---\n\n# 续费标准操作流程\n\n## 核心原则\n\n> **用成长手册驱动续费，说\"继续\"不说\"续费\"。**\n\n续费不是一次销售行为，而是一次成长回顾和未来规划。家长选择继续，是因为看到了孩子的成长、信任了团队的服务、认同了下一步的方向。\n\n---\n\n## 续费面谈流程（40分钟）\n\n### 续费前准备\n\n**负责人：** 学管（准备）+ 咨询师（审核）\n**时间节点：** 到期前1-2个月启动\n\n| 时间节点 | 动作 | 负责人 |\n|---------|------|--------|\n| 到期前2个月 | 学管师提醒咨询师启动续费准备 | 学管师 |\n| 到期前1.5个月 | 咨询师调取成长手册，准备面谈材料 | 咨询师 |\n| 到期前1个月 | 组织续费面谈（40分钟） | 咨询师+教师 |\n| 面谈后3天 | 如未当场决定，微信跟进 | 咨询师 |\n| 面谈后1周 | 电话回访，了解顾虑 | 咨询师 |\n| 面谈后2周 | 最后一次主动跟进 | 咨询师 |\n| 到期前1周 | 如仍未续，转为观察（不再主动推） | -- |\n\n**学管师准备清单：**\n\n| 准备项 | 内容 | 要求 |\n|--------|------|------|\n| 成长手册 | 入学vs当前数据对比、能力图谱变化、模块得分率趋势 | 数据准确，图表清晰 |\n| 高光时刻 | 课堂精彩视频/照片、获奖记录、进步里程碑 | 至少3个高光点 |\n| 教师寄语 | 教师对孩子的评价、观察到的成长、下阶段建议 | 具体、真诚，不空洞 |\n| 下阶段规划 | 下一阶段的学习计划、目标、课程推荐 | 与当前诊断数据对齐 |\n| 推荐方案 | 领航卡/其他课时卡方案+课均价计算 | 准备2-3个方案供选择 |\n\n---\n\n### 面谈四步法\n\n#### 第一步：成长回顾（15分钟）\n\n**负责人：** 咨询师\n\n**动作：**\n- 打开成长手册，逐页讲解\n- 展示入学时的诊断数据（\"还记得孩子刚来的时候...\"）\n- 对比当前数据，用具体数字说明进步\n- 播放高光视频/展示照片\n- 引用教师寄语\n- 展示四大能力图谱变化（专注力/思维力/执行力/亲和力）\n\n**话术示例：**\n> \"我们一起来看看孩子这半年的变化。入学时数学模块得分率：计算87%，应用题42%，几何65%。现在：计算92%，应用题68%，几何82%。应用题提升了26个百分点，这是最明显的进步。\"\n\n**禁止：**\n- 不说\"进步很大\"（用数据替代）\n- 不夸大成果\n- 不回避仍存在的薄弱环节\n\n---\n\n#### 第二步：教师分享（10分钟）\n\n**负责人：** 教师\n\n**动作：**\n- 从教学专业角度分享学生的变化\n- 举具体课堂案例（某次课上的突破、某道题的思路变化）\n- 指出当前的思维发展阶段和下一步方向\n- 表达对学生潜力的真实判断（基于数据，不空洞夸赞）\n\n**话术示例：**\n> \"这半年最让我惊喜的变化是，孩子从'看到应用题就放弃'，到现在能主动尝试画图分析。上周的测试中，他用了一个我没教过的方法解出了一道难题，说明思维迁移能力在形成。下阶段我建议加强综合题训练，进一步巩固这个能力。\"\n\n---\n\n#### 第三步：下阶段规划（10分钟）\n\n**负责人：** 咨询师\n\n**动作：**\n- 展示下一阶段的学习计划（短期/中期/长期）\n- 说明下阶段的目标和重点\n- 推荐匹配的课程和班型\n- 自然过渡到方案推荐\n\n**规划结构：**\n\n| 维度 | 短期（1个月） | 中期（1学期） | 长期（1学年） |\n|------|-------------|-------------|-------------|\n| 知识 | 核心考点突破 | 模块系统梳理 | 完整知识体系 |\n| 能力 | 审题与规范 | 解题策略训练 | 高阶思维构建 |\n| 习惯 | 错题本深化使用 | 自主预习复习 | 自驱学习体系 |\n\n---\n\n#### 第四步：自然过渡（5分钟）\n\n**负责人：** 咨询师\n\n**动作：**\n- 不强推成交，用\"继续\"替代\"续费\"\n- 推荐领航卡方案（最划算），计算课均价对比\n- 展示节省金额\n- 给家长充分考虑时间\n\n**推荐策略：领航卡最划算**\n\n| 家长态度 | 推荐方案 |\n|---------|---------|\n| 非常满意，主动续费 | 领航卡（最优惠长期方案） |\n| 满意，但想灵活安排 | 畅学卡（无时间限制） |\n| 犹豫，想再看看 | 启航卡30次（低门槛过渡） |\n| 有退费倾向 | 不推课，先解决问题（转入预警流程） |\n\n**费用展示方式：**\n- 计算每次课均价\n- 与课单价对比\n- 展示具体节省金额\n- \"领航卡60次，每次XX元，比单次购买节省XX元\"\n\n**话术示例：**\n> \"如果继续下一阶段的学习，领航卡是最划算的方案——课均价XX元，比单次课节省XX元，一个学期下来能省XX元。您不用现在决定，回去和家人商量一下也可以。\"\n\n---\n\n## 续费禁忌清单\n\n| 绝对不做 | 替代方案 | 原因 |\n|---------|---------|------|\n| 说\"续费\" | 说\"继续下一阶段的学习\" | 降低商业感 |\n| 说\"不续名额就没了\" | \"建议尽早安排，以下是时间规划\" | 禁止制造焦虑 |\n| 在孩子面前谈钱 | 单独与家长沟通费用问题 | 保护孩子自尊心 |\n| 家长犹豫时追问 | 给时间，说\"您不用现在决定\" | 尊重决策空间 |\n| 反复催促续费 | 提一次方案，后续用服务打动 | 过度推销适得其反 |\n| \"不续就退步了\" | 展示下阶段规划价值 | 禁止恐吓式营销 |\n| \"别的机构不行\" | 展示自身差异化价值 | 禁止贬低竞品 |\n\n---\n\n## 续费后动作\n\n| 时间 | 动作 | 负责人 |\n|------|------|--------|\n| 当天 | 确认续费成功，安排下阶段课程 | 咨询师+学管 |\n| 3天内 | 发送下阶段学习计划给家长 | 咨询师 |\n| 适当时机 | 自然引导转介绍 | 咨询师 |\n\n---\n\n## 转介绍时机\n\n**最佳时机：**\n- 续费后（家长刚确认信任，满意度最高）\n- 阶段性成果反馈后（如获奖、成绩大幅提升）\n\n**引导方式：**\n- 自然引导，不强求\n- \"如果身边有朋友的孩子也需要，欢迎推荐过来\"\n\n**三重好礼：**\n\n| 好礼 | 内容 |\n|------|------|\n| 现金奖励 | 200元/成功推荐 |\n| 课时奖励 | 赠送2次课 |\n| 代金券 | 500元课程代金券 |\n\n**相关话术：** `04_scripts/referral_invitation.md`\n\n---\n\n## 体面结业流程\n\n当家长确定不续费时，启动体面结业流程：\n\n| 步骤 | 动作 | 负责人 |\n|------|------|--------|\n| 1. 接受决定 | 不反复挽留（最多1次真诚挽留），表达理解和尊重 | 咨询师 |\n| 2. 整理成长手册 | 入学至离开的完整数据、高光时刻、教师评语、里程碑记录 | 学管 |\n| 3. 结业会谈 | 15-20分钟，回顾成长，教师给出建议，送上祝福 | 咨询师+教师 |\n| 4. 退费办理 | 按未使用课次退款，5个工作日内完成 | 咨询师 |\n| 5. 保持联系 | 节日问候、学习资料分享（不推课） | 学管 |\n\n**铁律：** 即使学生要走，也要体面结业，输出价值。口碑 > 一时成交。\n\n---\n\n## 续费预警信号\n\n以下信号出现时，应提前启动续费沟通：\n\n| 信号 | 时机 |\n|------|------|\n| 剩余课次 < 10次 | 提前1个月启动续费面谈 |\n| 领航卡有效期还剩2个月 | 提醒家长安排使用或续费 |\n| 阶段性考试后有明显进步 | 趁热打铁，用数据展示价值 |\n| 家长主动表达认可 | 自然提及下阶段规划 |\n\n---\n\n## 续费关键指标\n\n| 指标 | 目标值 | 说明 |\n|------|:-----:|------|\n| 续费面谈完成率 | 100% | 所有到期学员必须完成续费面谈 |\n| 续费率 | ≥ 72% | 参考深圳案例从45%提升至72% |\n| 领航卡选择率 | ≥ 50% | 续费学员中选择领航卡/畅学卡的比例 |\n| 体面结业率 | 100% | 所有离开的学员完成结业流程 |\n| 续费后转介绍率 | ≥ 20% | 续费后自然转介绍 |\n| 结业后转介绍率 | ≥ 10% | 离开的学员仍然推荐新生 |\n\n---\n\n## 续费数据分析\n\n每月统计以下数据，用于优化续费策略：\n\n| 分析维度 | 内容 |\n|---------|------|\n| 续费率趋势 | 近6个月续费率变化 |\n| 不续费原因 | 分类统计（效果/价格/时间/搬家/其他） |\n| 教师维度 | 各教师班级的续费率差异 |\n| 卡型分布 | 续费学员的卡型选择分布 |\n| 预警关联 | 有预警记录的学员续费率 vs 无预警学员 |\n\n---\n\n## 相关文档\n\n- 续费话术：`04_scripts/renewal_conversation.md`\n- 转介绍话术：`04_scripts/referral_invitation.md`\n- 流失预警体系：`06_ops/churn_warning_system.md`\n- 铁三角协作：`06_ops/teacher_consultant_service_triangle.md`\n- 9000服务体系：`06_ops/service_system_9000.md`\n", "lines": 246, "size": 8830}, "06_ops__service_system_9000": {"id": "06_ops__service_system_9000", "path": "06_ops/service_system_9000.md", "name": "service_system_9000", "title": "9000服务体系（学管服务体系）", "tags": "[type:sop, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 9000服务体系（学管服务体系）\ntags: [type:sop, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/student_award_system.md]\n---\n\n# 9000服务体系（学管服务体系）\n\n## 概述\n\n\"9000服务体系\"是百分教育服务标准化的核心框架，命名灵感来自ISO 9000质量管理体系，意在将教育服务做到\"有标准、可衡量、能追溯\"。体系围绕四大支柱、四大能力图谱、\"6个有\"闭环和具体落地动作展开。\n\n---\n\n## 一、四大支柱\n\n| 支柱 | 核心内涵 | 关键动作 |\n|------|---------|---------|\n| **数字化** | 成长仪表盘实时同步 | 四大能力图谱每周更新，月度成长里程碑生成 |\n| **视频化** | 30秒高光视频+课堂实拍 | 每周记录孩子课堂精彩瞬间，实时同步家长 |\n| **个性化** | 按学员分层定制服务 | 根据学员奖项分层（明星学员/最强大脑/奋进之星/学习标兵）制定差异化服务方案 |\n| **成长参谋** | 深度参与成长规划 | 不只是\"传话筒\"，而是孩子成长的规划参与者 |\n\n### 支柱1：数字化\n\n**目标：** 用数据驱动教学决策，让每一次服务都有据可依。\n\n| 数字化动作 | 说明 | 频率 |\n|-----------|------|------|\n| 入学诊断评估 | 首次入学的全面学情测评 | 入学时 |\n| 逐题归因分析 | 每次考试/测评的错题归因 | 每次测评 |\n| 模块得分率追踪 | 各知识模块掌握程度可视化 | 每月 |\n| 阶段数据对比 | 入学vs当前的多维度对比 | 每学期 |\n| 成长趋势图表 | 长周期成绩走势和能力变化 | 持续更新 |\n\n### 支柱2：视频化\n\n**目标：** 让教学过程可见、可回看、可分享，增强家长信任。\n\n| 视频化动作 | 说明 | 频率 |\n|-----------|------|------|\n| 30秒高光视频 | 捕捉课堂精彩瞬间（认真听讲/主动提问/解题突破） | 每次课 |\n| 教师课堂实录 | 完整课堂录制（用于教研和家长查看） | 每周精选 |\n| 错题讲解微课 | 针对高频错题录制2-3分钟讲解视频 | 按需 |\n| 教师自我介绍视频 | 新生试听前发送，展示教学风格 | 入学前 |\n\n### 支柱3：个性化\n\n**目标：** 每个学生都有独属的学习路径，而非流水线式教学。\n\n| 个性化动作 | 说明 |\n|-----------|------|\n| 个人学情档案 | 每位学生独立建档，记录知识漏洞、思维特征、学习偏好 |\n| 分层教学设计 | 同一班级内根据水平分层布置任务 |\n| 定制错题本 | 根据个人错题高频模块定制复习路径 |\n| 个性化作业 | 不同学生不同作业量和难度 |\n| 学习风格适配 | 视觉型/听觉型/动觉型学习者差异化引导 |\n\n### 支柱4：成长参谋\n\n**目标：** 不只是教课，更是孩子成长路上的长期参谋。\n\n| 成长参谋动作 | 说明 | 负责人 |\n|-------------|------|--------|\n| 学业规划咨询 | 短期/中期/长期学习目标设定 | 咨询师 |\n| 升学路径指导 | 小升初/中考/高考的选校和备考规划 | 咨询师+教师 |\n| 学习方法指导 | 记忆模型、说意训练、元认知策略 | 教师 |\n| 心理状态关注 | 考前焦虑、学习动力不足的疏导 | 学管师 |\n| 家庭教育建议 | 给家长的陪伴和督促方法建议 | 咨询师 |\n\n---\n\n## 二、四大能力图谱\n\n每位学生的能力评估覆盖四个维度，形成个人能力雷达图，学管每周更新数据：\n\n### 1. 专注力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 课堂专注时长 | 连续认真听讲的平均时间 | 教师课堂观察 |\n| 走神频率 | 教师观察的走神次数/课 | 教师课堂观察 |\n| 任务切换能力 | 不同题型间的注意力切换速度 | 课堂小测 |\n| 抗干扰能力 | 周围有干扰时的专注保持度 | 教师观察 |\n\n### 2. 思维力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 逻辑推理 | 多步推理题的正确率 | 测评数据 |\n| 知识迁移 | 新题型中运用已学方法的能力 | 测评数据+错题分析 |\n| 抽象思维 | 从具体到抽象的概括能力 | 教师观察 |\n| 创造性思维 | 一题多解、非常规思路的频率 | 课堂表现 |\n\n### 3. 执行力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 作业完成率 | 按时完成作业的比例 | 学管追踪+系统数据 |\n| 订正及时率 | 错题当天订正的比例 | 学管追踪 |\n| 计划执行度 | 学习计划的实际完成百分比 | 学管追踪 |\n| 时间管理 | 考试/作业中的时间分配合理度 | 教师观察 |\n\n### 4. 亲和力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 课堂互动 | 主动提问和回答的频率 | 教师观察+学管互动 |\n| 同伴合作 | 小组讨论中的参与度 | 教师观察 |\n| 师生关系 | 与教师的沟通主动性 | 教师观察 |\n| 表达能力 | 能否清晰表达自己的思路 | 课堂表现 |\n\n**更新频率：** 每周\n**月度输出：** 生成能力图谱变化趋势图，纳入成长手册。\n\n---\n\n## 三、\"6个有\"闭环\n\n服务执行标准的核心框架，确保每一个服务动作都有始有终：\n\n| 标准 | 含义 | 具体要求 | 检查方式 |\n|------|------|---------|---------|\n| **有目标** | 锁定获奖/能力提升 | 为每位学员设定阶段性目标，与家长对齐 | 教案审核+学管确认 |\n| **有计划** | 周度/月度任务 | 每周学习任务明确到\"做什么+做多少+什么时候完成\" | 学管师检查 |\n| **有步骤** | 错题分类→针对性练习→复盘 | 标准执行路径，遇到卡点有升级机制 | 课堂观察 |\n| **有记录** | 数字化工具同步 | 所有服务动作数字化记录，四大能力图谱实时更新 | 系统检查 |\n| **有配合** | 联动家长 | 家长配合建议具体可操作（\"每天10分钟错题整理\"） | 沟通记录 |\n| **有结果** | 获奖/能力达标验收 | 每个阶段性目标有验收标准，未达标分析原因进入下一轮 | 测评数据 |\n\n---\n\n## 四、常规服务动作\n\n| 动作 | 频率 | 内容 | 负责人 |\n|------|------|------|--------|\n| 四大能力图谱更新 | 每周 | 收集教师数据，更新专注力/思维力/执行力/亲和力 | 学管 |\n| 月度成长里程碑 | 每月 | 汇总本月数据，一句话+数据标记成长里程碑 | 教师评定+学管记录 |\n| 作业追踪 | 每次课后 | 检查作业完成情况，未完成的及时提醒 | 学管 |\n| 高光视频同步 | 每周 | 30秒课堂精彩瞬间视频发送家长 | 学管 |\n| 阶段数据报告 | 每月 | 模块得分率、能力变化趋势 | 教师+学管 |\n| 出勤管理 | 每次课 | 缺勤当天联系家长了解原因 | 学管 |\n\n---\n\n## 五、个性化服务动作\n\n### \"10分钟随心谈\"\n\n- **频率：** 每周覆盖5名学员（优先预警学员和新生）\n- **形式：** 课间或课后与学生非正式聊天\n- **内容：** 了解学习状态、心理状态、生活近况，不谈成绩压力\n- **目的：** 建立情感连接，提前发现问题苗头\n- **记录：** 每次谈话后在系统中记录关键信息\n\n**话题参考：**\n- \"最近有什么开心的事吗？\"\n- \"学校里有没有什么烦心的事？\"\n- \"你觉得最近的课难不难？哪里觉得吃力？\"\n\n### \"30秒高光视频\"\n\n- **频率：** 每位学员每周至少1次\n- **内容：** 课堂上的精彩瞬间——答题正确、主动发言、帮助同学等\n- **同步：** 当天发送给家长，附带一句正向评语\n- **目的：** 让家长\"看到\"孩子的成长，增强信任和满意度\n\n**制作规范：**\n- 时长：15-30秒\n- 学管师负责拍摄和简单剪辑\n- 课后2小时内发送给对应家长\n\n### \"2分钟美好记忆视频\"\n\n- **频率：** 定期制作\n- **形式：** vlog形式，采集学生进校区后发生的点点滴滴（做题、听课、互动等）\n- **目的：** 成为学管视频号素材和成长案例素材\n\n### \"成长感言\"\n\n- **频率：** 按需录制\n- **时长：** 1-2分钟\n- **形式：** 问答形式，呈现成长中难忘的事/人/学习方法/烦恼/感恩等\n- **展示：** 文化墙上记载高光时刻，勉励自己，激励他人\n\n---\n\n## 六、情感增值：成长手册\n\n**适用对象：** 在学1年以上学员，毕业时人手一本\n**长期目标：** 记录更多\"铁粉\"——更多9年/12年学员。\"美好的成长时光，有百分相伴\"\n\n### 手册内容\n\n| 版块 | 内容 | 来源 |\n|------|------|------|\n| 基础信息 | 学生姓名、年级、入学时间、学习科目 | 入学档案 |\n| 入学诊断 | 入学时的学情评估数据和诊断报告 | 首次诊断 |\n| 成长数据轨迹 | 入学到当前的能力图谱变化、模块得分率趋势 | 系统数据 |\n| 高光时刻 | 课堂精彩瞬间照片/视频截图、获奖记录 | 学管日常积累 |\n| 里程碑记录 | 每月成长里程碑汇总 | 教师+学管 |\n| 师生寄语 | 教师对孩子的评价和期望、学管的观察和鼓励 | 教师+学管 |\n| 家长反馈 | 家长对孩子成长的感受和评价 | 家长沟通记录 |\n| 学业规划 | 下阶段目标和行动计划 | 咨询师+教师 |\n\n### 使用场景\n\n- **续费面谈**：核心展示工具，用成长数据驱动决策\n- **阶段反馈**：家长面谈时的核心展示材料\n- **体面结业**：离开时交付完整成长手册，维护口碑\n- **转介绍素材**：经家长授权，匿名数据用于招生展示\n\n---\n\n## 七、学管师核心素养\n\n### 四层能力模型\n\n| 层级 | 素养 | 表现 | 晋升周期 |\n|------|------|------|---------|\n| L1 | **有沟通** | 能清晰、及时地传递信息，日常联络无遗漏 | 入职 |\n| L2 | **善引导** | 能引导家长和学生配合教学计划，主动提醒鼓励 | 3个月 |\n| L3 | **会监督** | 能发现问题并推动解决，识别预警信号 | 6个月 |\n| L4 | **有结果** | 能用数据展示服务成果，制作成长报告 | 1年 |\n\n---\n\n## 八、服务聚焦：暂未获奖学员\n\n**背景：** 暂未获奖学员约占在学学员的 **60%**，是服务提升的最大增量空间。\n\n### 1年目标\n\n| 目标 | 比例 | 核心动作 |\n|------|:----:|---------|\n| 进入奋进之星/学习标兵 | 30% | 习惯养成+基础补强+作业追踪 |\n| 进入最强大脑 | 15% | 思维专项训练+解题模型构建 |\n| 持续观察 | 55% | 保持服务标准，等待突破时机 |\n\n### 策略\n\n- 学管重点跟进暂未获奖学员，每周至少1次\"10分钟随心谈\"\n- 教师针对性调整教学策略，关注中游学员的突破点\n- 每月复盘暂未获奖学员的能力图谱变化，发现进步及时申报奖项\n- 通过\"6个有\"闭环确保每位学员都有清晰的成长路径\n", "lines": 248, "size": 10764}, "06_ops__standardized_conversion_sop": {"id": "06_ops__standardized_conversion_sop", "path": "06_ops/standardized_conversion_sop.md", "name": "standardized_conversion_sop", "title": "标准化转化流程及方案（2025 v1.0） (Standardized Conversion Sop)", "tags": "", "module": "06_ops", "content": "# 标准化转化流程及方案（2025 v1.0）\n\n> 来源：标准化转化流程及方案.docx\n> 密级：内部保密文件\n> 相关文件：`06_ops/conversion_funnel.md`（战略漏斗模型）| `06_ops/trial_class_sop.md`（试听课详细SOP）| `06_ops/consultation_sop.md`（咨询五步法详细话术）\n\n## 一、谈单手册内容清单\n\n1. 封面：logo、学校名称、宣传语\n2. 学校简介及发展历程（大事记）\n3. 企业文化介绍\n4. 名师团队照片及介绍\n5. 课程独特差异化亮点\n6. 各科目教学体系图谱\n7. 百分教育服务15条\n8. 标准化教材/教案/讲义展示\n9. **可替换页**：孩子学情分析报告\n10. 课时及学习规划\n11. 收款二维码及优惠政策\n\n## 二、提升转化率——教师标准动作\n\n### 课前\n1. 咨询老师与教学老师就孩子情况进行沟通交接\n2. 课前与体验学生3-5分钟简短沟通，缓解陌生情绪，建立初步信任\n3. 家长陪同时，老师进行标准自我介绍，与家长建立信任\n\n### 课中\n4. 幽默自我介绍，可提问\"你心目中的老师是什么样的\"\n5. 针对体验学生进行**3-5次表扬**，给予积分奖励\n6. **不少于3次报名暗示**：\n   - \"你很有天赋，老师希望你能跟着我轻松提高成绩\"\n   - \"这道题你都做对了，太棒了，以后跟我学\"\n   - \"你笑的好开心哦，喜欢老师的课堂吗，喜欢以后跟着我\"\n\n### 课后\n7. 完成试听学员情况反馈表\n8. 咨询师录制孩子学习中的高光时刻\n9. 利用反馈表及课堂照片/视频跟进家长\n\n## 三、职责划分\n\n### 咨询老师职责\n- 市场工作：家长信息、资源信息、客户流量\n- 邀约：通过各渠道邀约家长上门体验\n- 与教务沟通，安排体验课\n- 与教学老师沟通体验学员基础信息\n- 跟进体验课学员上课情况及体验报告/视频录制\n- 负责谈单、成交、签约\n- **报名后1个月内**的拓科、续费归咨询老师\n- 家长1个月内转介绍归咨询老师，1个月后谁成交归谁\n\n### 教务老师（学管）职责\n- 体验课学生排课、接待、安排\n- 配合咨询老师完成体验课对接\n- 学员档案、数据管理、出勤管理\n- 课前/课中/课后服务，家校沟通\n- 家长异议处理、学情管理\n- **报名1个月后**的续费、转介绍、拓科、课消\n- 学校活动策划、组织与执行\n- 家长1个月内转介绍归自己，1个月后谁成交归谁\n\n## 四、收费模式（均价120元为例）\n\n> **注意：** 以下卡项名称（小次卡/大次卡/年卡）来自2025年v1.0版本文件。当前系统可能已更新为领航卡/畅学卡/启航卡体系，详见 `06_ops/pricing/card_types_explained.md`。请确认哪套为当前在用版本。\n\n| 类型 | 时限 | 课次 | 优惠价 | 课单价 |\n|------|------|------|--------|--------|\n| 小次卡 | 上完为止 | 28+2 | 3600元 | 120元/次 |\n| 大次卡 | 上完为止 | 55+5 | 6600元 | 110元/次 |\n| 年卡 | 一年有效 | 55+7 | 5480元 | 88元/次 |\n\n### 卡项说明\n- **小次卡**：仅限单科，不设有效期\n- **大次卡**：可多科课消，不设有效期\n- **年卡**：可多科课消，单科一年有效，两科半年，三科4个月\n- 中途请假优先插班补课，无法插班的3次班课用1次一对一补\n- **退费规则**：按原价扣除学费后退款\n", "lines": 79, "size": 3353}, "06_ops__student_award_system": {"id": "06_ops__student_award_system", "path": "06_ops/student_award_system.md", "name": "student_award_system", "title": "学员奖项体系", "tags": "[type:reference, role:xueguan, role:teacher]", "module": "06_ops", "content": "---\ntitle: 学员奖项体系\ntags: [type:reference, role:xueguan, role:teacher]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 学员奖项体系\n\n## 概述\n\n学员奖项体系是百分教育教学效果的核心呈现方式，通过分层评价、多维度认可，让每一类学员都能找到自己的成长坐标。奖项体系同时是教师考核、续费驱动、品牌传播的重要载体。目标：让不同起点的学生都能找到自己的成长方向，用奖项体系驱动教学质量和学员成就感。\n\n---\n\n## 四大奖项总览\n\n| 奖项 | 生源定位 | 核心维度 | 评选依据 |\n|------|---------|---------|---------|\n| **明星学员** | 年级前十；港二、滨海、北附前30；培才、廉江实验前60；一中前100；二中前60 | 绝对实力 | 学校排名达标，且在百分学习满3个月 |\n| **最强大脑** | 班级前5、全校前10 | 思维能力 | 解题模型构建、逆向思维、知识迁移能力 |\n| **奋进之星** | 成绩中游但进步意愿强 | 成长潜力 | 基础补强明显、习惯养成良好、成绩持续进步 |\n| **学习标兵** | 自律生源（自主完成作业、高专注度） | 行为能力 | 时间管理好、执行力强、作业高质量完成 |\n\n---\n\n## 一、明星学员\n\n### 定位\n\n**绝对实力**的证明。这是百分教育的\"旗帜型\"奖项，代表最高学业成就。\n\n### 评选标准\n\n| 学校类别 | 排名要求 |\n|---------|---------|\n| 年级层面 | 前10名 |\n| 港二、滨海、北附 | 前30名 |\n| 培才、廉江实验 | 前60名 |\n| 一中 | 前100名 |\n| 二中 | 前60名 |\n\n### 评选规则\n- 以学校期末考试成绩为准\n- 需提交学校盖章的成绩证明或排名截图\n- 每学期评选一次\n- 同时满足多个层级取最高\n\n### 宣传价值\n- 明星学员是最有说服力的招生案例\n- 经家长授权后，可用于招生宣传（隐去全名）\n- 颁奖仪式公开举行，邀请全体家长参加\n\n---\n\n## 二、最强大脑\n\n### 定位\n\n**思维能力**的标杆。体现百分\"高阶思维培养\"的核心定位。不完全看学校成绩，重点看思维表现。\n\n### 评选维度\n\n| 维度 | 评估方式 | 权重 |\n|------|---------|:----:|\n| 解题模型构建 | 能否将新题归类到已知模型，举一反三 | 30% |\n| 逆向思维 | 能否从结果反推条件，倒推解题路径 | 25% |\n| 知识迁移 | 能否将A领域方法应用到B领域 | 25% |\n| 创造性解题 | 是否有独特解法或优化思路 | 20% |\n\n### 评选标准\n\n| 层级 | 标准 | 说明 |\n|------|------|------|\n| 金牌 | 百分教育内部测评 单科班级第1 | 阶段测评成绩 |\n| 银牌 | 百分教育内部测评 单科班级第2 | 阶段测评成绩 |\n| 铜牌 | 百分教育内部测评 单科班级第3 | 阶段测评成绩 |\n| 特别奖 | 全校（百分教育）单科前10 | 跨班级排名 |\n| 补充标准 | 班级前5名 / 全校前10名 | 持续入选条件 |\n\n### 评选规则\n- 以百分教育统一阶段测评为准（非学校考试）\n- 测评包含高阶思维题（分析、综合、创造层级）\n- 每学期评选一次\n- 鼓励\"一题多解\"和\"非常规思路\"\n\n### 激励意义\n- 即使学校成绩不是最拔尖，思维能力突出也能获奖\n- 引导学生关注\"怎么想\"而非只关注\"对不对\"\n- 数字化呈现思维力提升、解题速度变化数据\n\n---\n\n## 三、奋进之星\n\n### 定位\n\n**成长潜力**的代表。面向中游学生，奖励进步意愿和实际进步。\n\n### 评选维度\n\n| 维度 | 评估方式 |\n|------|---------|\n| 基础补强 | 模块得分率对比入学时的提升幅度 |\n| 习惯养成 | 错题本使用率、作业完成率变化 |\n| 成绩进步 | 排名上升幅度（以名次计） |\n| 学习态度 | 出勤率、课堂参与度 |\n\n### 目标人群画像\n- 当前成绩处于班级/年级中游\n- 有明确的进步意愿\n- 学习态度积极，但方法或基础需要改善\n- 家长配合度较好\n\n### 评选规则\n- 以两次学校大考的排名变化为准\n- 进步名次 = 前一次排名 - 本次排名\n- 与明星学员奖不重复评选（取更高奖项）\n- 每月/每学期评选\n\n### 激励意义\n- 让中游学生看到\"进步就有回报\"\n- 家长感受到机构对非尖子生的重视\n- 是口碑传播的重要来源（\"我家孩子进步了\"）\n\n---\n\n## 四、学习标兵\n\n### 定位\n\n**行为能力**的榜样。不以成绩为标准，奖励自律和良好学习习惯。\n\n### 评选维度\n\n| 维度 | 评估方式 |\n|------|---------|\n| 时间管理 | 按时到课、按时交作业、合理分配学习时间 |\n| 执行力 | 计划完成率、任务达标率 |\n| 自主学习 | 自主预习复习、主动提问、主动整理笔记 |\n| 专注度 | 课堂走神频率低、作业完成质量高 |\n\n### 评选标准\n\n| 奖项 | 标准 |\n|------|------|\n| 全勤标兵 | 一学期百分教育课程零缺勤 |\n| 爱提问标兵 | 全勤+课堂主动提问频率班级最高 |\n| 记笔记标兵 | 全签到+记笔记+用心做（作业质量A级） |\n| 及时订正标兵 | 全复习+错题订正及时率班级最高 |\n\n### 评选规则\n- 由任课教师和学管师联合评选\n- 每学期每班每个标兵类别评选1-2人\n- 同一学生可获多个标兵奖（可叠加）\n- 评选数据来源：出勤记录、课堂观察记录、作业系统数据\n\n### 激励意义\n- 传递\"好习惯比好成绩更重要\"的理念\n- 让成绩暂时不突出的学生也能获得认可\n- 培养自驱学习体系的第一步\n\n---\n\n## \"勤学励行奖\"品牌载体\n\n### 品牌理念\n\n\"勤学励行奖\"是百分教育学员奖项的品牌载体，代表百分的**\"能力、承担、责任\"**三大核心价值观。\n\n### 核心功能\n\n| 功能 | 说明 |\n|------|------|\n| 数字化呈现教学效果 | 用数据展示思维力提升、解题速度变化、模块得分率进步 |\n| 教师考核挂钩 | 2026年教师考核新逻辑：以\"家长和学生颁发的军功章\"为核心考核 |\n| 学员分层依据 | 通过奖项分层明确每类学员的教学重点和服务策略 |\n| 品牌传播素材 | 获奖学员案例是最有说服力的招生内容 |\n\n### 2026年教师考核新逻辑\n\n> 以\"家长和学生颁发的军功章\"为核心考核，教师绩效与学员获奖率挂钩。\n\n| 考核维度 | 权重 | 说明 |\n|---------|:----:|------|\n| 学员奖项获得率 | 40% | 班级学员进入四大奖项的比例 |\n| 家长满意度 | 30% | 家长评分+续费率 |\n| 教学质量 | 20% | 课堂评估+学员成绩数据 |\n| 团队协作 | 10% | 铁三角配合度+信息流转及时性 |\n\n**奖项获得率计算：**\n- 奖项获得率 = 获奖学员人次 / 所带学员总人数 x 100%\n- 目标基准：≥ 40%（至少4成学员获得至少1项奖项）\n- 超过60%有额外奖金\n\n---\n\n## 勤学奖学金\n\n### 校级排名奖学金\n\n| 排名 | 奖学金金额 |\n|------|:---------:|\n| 校年级总分前3名 | 600元 |\n| 校年级总分前4-6名 | 500元 |\n| 校年级总分前7-10名 | 400元 |\n| 班级总分第一 | 300元 |\n| 班级单科第一 | 200元 |\n\n### 明星学员奖学金\n\n| 进步幅度 | 奖学金金额 |\n|---------|:---------:|\n| 进步300名以上 | 300元 |\n| 进步200名以上 | 200元 |\n| 进步100名以上 | 100元 |\n\n### 最强大脑奖学金\n\n| 排名 | 奖学金金额 |\n|------|:---------:|\n| 班级单科第1名 | 300元 |\n| 班级单科第2名 | 200元 |\n| 班级单科第3名 | 100元 |\n\n### 奋进之星奖学金\n\n| 进步幅度 | 奖学金金额 |\n|---------|:---------:|\n| 进步300名以上 | 200元 |\n| 进步200名以上 | 100元 |\n\n### 学习标兵奖学金\n\n| 行为达标项 | 奖学金金额 |\n|-----------|:---------:|\n| 全勤（无缺课无迟到） | 100元 |\n| 全勤 + 爱提问（每周主动提问≥3次） | 100元 |\n| 全签到 + 记笔记 + 用心做（作业质量A级） | 100元 |\n| 全复习 + 及时订正（错题订正率100%） | 100元 |\n\n> 学习标兵四项可叠加，单学期最高可获400元。\n\n### \"励行\"奖学金\n\n**最高额度：10,000元**\n\n- 面向全年度综合表现最优秀的学员\n- 综合考量：学业成就+能力成长+行为表现+社会影响力\n- 每年评选1次，由教师团队+管理层联合评审\n\n---\n\n## 学员分层与教学重点\n\n通过奖项体系实现学员分层，明确不同层级的教学重点：\n\n| 学员层级 | 教学重点 | 服务重点 |\n|---------|---------|---------|\n| 明星学员 | 高阶思维突破、竞赛拓展、思维创新 | 个性化拔高方案，高频成果展示 |\n| 最强大脑 | 解题模型深化、跨领域迁移训练 | 思维专项训练，典型案例积累 |\n| 奋进之星 | 基础补强、模块系统梳理、进步激励 | 重点跟踪进步数据，高频正向反馈 |\n| 学习标兵 | 习惯固化、自主学习能力培养 | 行为追踪，自律习惯强化 |\n| 暂未获奖 | 找到突破口，匹配最近发展区任务 | 学管重点关注，10分钟随心谈优先 |\n\n---\n\n## 成长路径示例\n\n```\n入学（基础薄弱）\n  ↓ 3个月\n学习标兵（全勤+及时订正）→ 行为习惯建立\n  ↓ 6个月\n奋进之星（排名进步200+）→ 成绩开始提升\n  ↓ 1年\n最强大脑（班级测评前3）→ 思维能力突出\n  ↓ 1.5年\n明星学员（学校年级前列）→ 绝对实力证明\n```\n\n---\n\n## 目标指标\n\n| 时间周期 | 目标 |\n|---------|------|\n| 入学1年内 | **30%** 的学员进入奋进之星或学习标兵 |\n| 入学1年内 | **15%** 的
