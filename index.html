** 梓萱的错误中概念性错误和方法性错误共占75%，说明核心问题是\"知识没吃透+解题方法不够\"，而不是\"粗心\"。这需要通过系统性的概念梳理和方法训练来解决，单纯多做题效果有限。\n\n**个性化提升方案**\n\n行动方案 1：勾股定理+一次函数双模块集中突破\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 安排4次一对一专项辅导：2次勾股定理（概念重建+三大题型训练）、2次一次函数（待定系数法+图象与方程转换） |\n| **负责人** | 教师（一对一辅导） |\n| **时间安排** | 2026-03-22 至 2026-04-05（2周内完成） |\n| **预期效果** | 根据同类学员数据，专项突破后这两个模块得分率预期提升至65%以上 |\n| **检验方式** | 每次辅导后当堂测试3道相关题目，正确率达到70%以上 |\n\n行动方案 2：概念梳理——建立知识框架\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 教师帮助梓萱建立本学期的知识导图（勾股定理、平行四边形、一次函数的核心概念和性质），每个模块梳理\"是什么→有什么用→怎么用\"三层 |\n| **负责人** | 教师（课上指导）+ 梓萱（课后整理到笔记本上） |\n| **时间安排** | 随一对一辅导同步进行 |\n| **预期效果** | 概念性错误比例从45%下降至25%以下 |\n| **检验方式** | 梓萱能独立复述每个模块的\"是什么→有什么用→怎么用\" |\n\n行动方案 3：错题归类本\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 建立错题本，按\"概念/计算/审题/方法\"四类分区整理，每道错题写清\"错在哪里\"和\"正确思路\" |\n| **负责人** | 学管（提供模板和跟进）+ 梓萱（每周整理） |\n| **时间安排** | 长期坚持，每周整理不少于5道 |\n| **预期效果** | 同类错误重复出现率下降 |\n| **检验方式** | 学管每两周检查一次错题本 |\n\n**家长配合建议**\n\n1. **关注进步而非分数**\n   - 具体做法：梓萱已经在进步（+5分），请继续肯定她的努力，如\"这次又进步了，说明你的方法是对的\"\n   - 为什么重要：梓萱目前需要建立对数学的信心，过度关注分数会加重畏难情绪\n\n2. **配合错题本检查**\n   - 具体做法：每周末花5分钟看看梓萱的错题本有没有更新，不需要检查对错，只需要确认有在整理\n   - 预计每周耗时：5分钟\n   - 为什么重要：错题整理是打破\"重复犯错\"的最有效手段\n\n3. **保障一对一辅导时间**\n   - 具体做法：配合老师安排的4次专项辅导时间，尽量不请假不调课\n   - 为什么重要：知识漏洞需要集中时间补，拉得太长效果会打折\n\n**推荐课程方案**\n\n| 项目 | 推荐内容 |\n|------|---------|\n| **当前推荐** | 先安排4次一对一专项补强（勾股定理+一次函数） |\n| **后续推荐** | 一对一结束后，根据效果评估是否转入数学培优班（Y体系） |\n| **推荐理由** | 梓萱当前有多处概念漏洞，直接进班课容易跟不上，先通过一对一精准补漏，成绩提升到70分以上后再考虑小班 |\n| **预期学习周期** | 根据同类学员数据，预期改善周期为1-2个月（一对一阶段），之后转入班课持续提升 |\n| **校区推荐** | 虹都校区 |\n\n**下次诊断预约**\n\n| 项目 | 安排 |\n|------|------|\n| 建议下次诊断时间 | 2026-04-18（一对一结束后1周） |\n| 届时重点关注模块 | 勾股定理、一次函数、概念性错误比例变化 |\n| 预约方式 | 请联系学管老师预约 |\n\n---\n\n### 示例C：初三数学，偏科严重，需要冲刺规划\n\n```\n============================================\n        百分教育 学情诊断报告\n       \"好思维，让学习更轻松\"\n============================================\n\n学生姓名：张浩然\n年    级：初三\n就读学校：湛江市第一中学（初中部）\n诊断学科：数学\n考试名称：2026年中考一模\n诊断日期：2026-03-15\n诊断教师：尤老师\n报告编号：DX-2026-0315-008\n\n============================================\n```\n\n**一句话总评**\n\n> 浩然同学的语文和英语成绩优秀（均在110分以上），数学目前有几个关键知识漏洞需要补，中考前仍有3个月的冲刺窗口，通过针对性训练有明显的提升空间。\n\n**成绩概览**\n\n| 项目 | 数据 |\n|------|------|\n| 本次得分 | 72 / 120 |\n| 得分率 | 60% |\n| 年级平均分 | 85 |\n| 与平均分差距 | -13分 |\n| 上次成绩（期末） | 68 / 120 |\n| 进步 | +4分 |\n\n各模块得分率：\n\n| 知识模块 | 满分 | 得分 | 得分率 | 评价 |\n|---------|------|------|--------|------|\n| 数与代数基础 | 20 | 16 | 80% | 基本掌握 |\n| 方程与不等式 | 15 | 10 | 66.7% | 有成长空间 |\n| 函数（一次+二次+反比例） | 25 | 12 | 48% | 需重点关注 |\n| 几何证明与计算 | 30 | 18 | 60% | 有成长空间 |\n| 圆 | 15 | 6 | 40% | 需重点关注 |\n| 概率统计 | 15 | 10 | 66.7% | 有成长空间 |\n\n**亮点发现**\n\n1. **代数基础扎实**：数与代数基础模块得分率80%，说明浩然的计算功底和基本概念掌握得不错。\n2. **成绩在回升**：从期末的68分到一模72分，在没有额外辅导的情况下自主提升了4分，说明浩然有自驱力。\n3. **其他学科优秀**：语文、英语均在110分以上，综合学习能力没有问题，数学提升后总分飞跃空间很大。\n\n**待提升模块（成长空间）**\n\n成长空间 1：函数综合（得分率48%）\n\n- **当前得分率：** 48%\n- **主要表现：** 一次函数基本概念能答对，但二次函数和反比例函数的综合题几乎全部丢分。特别是二次函数与几何结合的题目，无从下手。\n- **通俗解释：** 函数是中考的\"重头戏\"，二次函数在中考中通常以压轴题或倒数第二题的形式出现。浩然目前的情况是\"简单的会，综合的不会\"，需要从\"单知识点应用\"升级到\"多知识点综合\"。\n- **好消息：** 中考函数题的出题模式比较固定（求解析式、求最值、与几何结合三大类），通过3个月的系统训练完全可以突破。百分教育的中考专项复习课程（二轮）正好覆盖这些内容。\n\n成长空间 2：圆（得分率40%）\n\n- **当前得分率：** 40%\n- **主要表现：** 垂径定理的基本应用能做对，但涉及切线判定和圆与相似结合的题目全部失分。\n- **通俗解释：** 圆这部分知识是初三新学的，浩然目前还处于\"消化期\"。圆的难题通常和相似、三角函数结合出题，需要有跨模块融会贯通的能力。\n- **好消息：** 圆在中考中的分值比例约为12-15分，通过专项训练把握住基础分和中等难度分（约10分），就能有显著提升。\n\n成长空间 3：几何证明与计算（得分率60%）\n\n- **当前得分率：** 60%\n- **主要表现：** 全等三角形判定可以做出，但相似三角形证明和几何综合计算丢分较多。\n- **通俗解释：** 几何证明需要\"有条理地推理\"，浩然目前的困难在于面对综合题时缺少\"解题模型\"——即\"拿到一道几何题，第一步看什么、第二步想什么\"的固定思路。\n- **好消息：** 百分教育整理了中考几何高频模型（相似四大模型、旋转模型等），掌握这些模型后，几何证明会变得有章可循。\n\n**错误类型分析**\n\n| 错误类型 | 通俗解释 | 占比 | 举例 |\n|---------|---------|------|------|\n| 概念理解偏差 | 知识点没有吃透 | 25% | 第18题：切线判定条件记忆不完整 |\n| 计算小失误 | 本来会做但算错了 | 15% | 第12题：解方程移项时符号弄反 |\n| 读题不够仔细 | 漏掉重要条件 | 10% | 第21题：未注意\"x>0\"的限制 |\n| 解题方法不熟 | 不知道用什么方法 | 50% | 第23题：不知道该用相似还是三角函数 |\n\n> **解读：** 浩然的核心问题是\"方法性错误\"占50%——面对综合题不知道怎么入手。这是典型的\"基础尚可但缺乏解题策略和模型训练\"的表现。中考前3个月，集中进行模型化训练是最高效的提分路径。\n\n**个性化提升方案**\n\n行动方案 1：参加中考数学二轮专题冲刺\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 参加百分教育中考数学春季二轮专题班，重点学习：函数综合、圆综合、几何证明与解三角形、代数综合四大专题 |\n| **负责人** | 教师（授课） |\n| **时间安排** | 2026-03-22 至 2026-06-15（约3个月，每周2次课） |\n| **预期效果** | 根据同类学员数据，系统完成二轮复习的学员中考数学平均提升10-15分 |\n| **检验方式** | 每月一次模拟测试，跟踪得分率变化 |\n\n行动方案 2：函数+圆 双模块一对一补强（前2周）\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 在进入二轮专题班前，先安排3次一对一辅导：函数（二次函数核心题型+反比例函数）2次、圆（垂径定理+圆周角+切线）1次，快速补齐最大的漏洞 |\n| **负责人** | 教师（一对一辅导） |\n| **时间安排** | 2026-03-22 至 2026-04-05（2周） |\n| **预期效果** | 两个模块基础分稳住，得分率提升至60%以上 |\n| **检验方式** | 每次辅导结束后当堂测试 |\n\n行动方案 3：中考几何模型手册精练\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 使用《湛江中考几何高频错题模型库》进行刻意练习，每周精练相似四大模型、旋转模型各2道，写出完整解题思路 |\n| **负责人** | 教师（选题和点评）+ 浩然（独立完成） |\n| **时间安排** | 每周4道，持续至中考前 |\n| **预期效果** | 几何证明模块得分率提升至75%以上 |\n| **检验方式** | 二模成绩中几何板块的得分变化 |\n\n**家长配合建议**\n\n1. **保障冲刺时间**\n   - 具体做法：浩然语文和英语基础好，中考前这两科可以适当减少额外投入时间，把更多时间留给数学冲刺\n   - 为什么重要：数学的提分空间最大，投入产出比最高\n\n2. **做好心理支持**\n   - 具体做法：中考前3个月压力大，请多与浩然聊聊心态，告诉他\"语文英语已经很棒了，数学只要再提10几分，总分就能上一个台阶\"\n   - 为什么重要：偏科学生容易对弱科产生焦虑，积极心态有助于学习效率\n\n3. **配合模拟考节奏**\n   - 具体做法：每月一次模拟测试后，和老师一起看诊断报告，了解孩子的进步情况\n   - 预计每月耗时：30分钟（看报告+和老师沟通）\n\n**推荐课程方案**\n\n| 项目 | 推荐内容 |\n|------|---------|\n| **短期推荐** | 一对一补强3次（函数2次+圆1次） |\n| **中期推荐** | 中考数学春季二轮专题班（培优班层级） |\n| **推荐理由** | 浩然代数基础尚可（80%），问题集中在综合应用和几何。先通过一对一补齐最大漏洞，再通过二轮专题班系统提升解题策略 |\n| **预期学习周期** | 根据同类学员数据，3个月系统冲刺后中考数学预期达到85-90分区间 |\n| **校区推荐** | 虹都校区（初高中主校区） |\n\n**下次诊断预约**\n\n| 项目 | 安排 |\n|------|------|\n| 建议下次诊断时间 | 2026-04-15（一对一结束+专题班上课2周后） |\n| 届时重点关注模块 | 函数综合、圆、几何证明得分率变化 |\n| 预约方式 | 请联系学管老师预约 |\n\n> **百分教育** | 好思维，让学习更轻松\n> 联系电话：18933824497\n", "lines": 642, "size": 28949}, "03_diagnosis__primary__chinese_writing_weak": {"id": "03_diagnosis__primary__chinese_writing_weak", "path": "03_diagnosis/primary/chinese_writing_weak.md", "name": "chinese_writing_weak", "title": "小学语文画像：写作薄弱 (Chinese Writing Weak)", "tags": "[stage:primary-low, stage:primary-high, subject:chinese, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:chinese, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/chinese/picture_talking.md, 02_courses/chinese/reading_writing.md]\n---\n\n# 小学语文画像：写作薄弱\n\n## 典型特征\n\n### 1-2年级\n- 看图写话没逻辑，胡乱写\n- 语句表达不清楚，没思路\n- 看图写话干巴巴，没文采\n- 常用方法不生动，得分低\n- 对写作有抗拒心理\n\n### 3-6年级\n- 阅读量不足，词汇积累少\n- 作文结构松散，没有条理\n- 不会用修辞手法和好词好句\n- 审题不准，偏题跑题\n- 总是写\"流水账\"\n\n## 推荐方案\n\n### 1-2年级：看图说话/看图写话\n→ `02_courses/chinese/picture_talking.md`\n\n四大教学重点：\n1. 看图技巧全面讲解\n2. 思维导图思路引导\n3. 看图写作习惯养成\n4. 优美词句日积月累\n\n### 2年级及以上：阅读与写作\n→ `02_courses/chinese/reading_writing.md`\n\n- \"以读促写，读写共生\"\n- 每月3次阅读+1次写作\n- 从大量阅读中提升理解和分析能力\n- 再逐步转化为写作技巧\n\n## 家长沟通要点\n\n- \"阅读是学好语文的关键第一步\"\n- 写作能力不是突击提升的，需要大量阅读积累\n- 阅读能力影响所有学科（展示9学科阅读价值表）\n- 先培养兴趣，再提升技巧\n", "lines": 51, "size": 1351}, "03_diagnosis__primary__english_early_start": {"id": "03_diagnosis__primary__english_early_start", "path": "03_diagnosis/primary/english_early_start.md", "name": "english_early_start", "title": "小学英语画像：早启蒙（4-5岁起步） (English Early Start)", "tags": "[stage:preschool, stage:primary-low, subject:english, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:preschool, stage:primary-low, subject:english, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/phonics.md, 02_courses/english/cambridge_bridge.md]\n---\n\n# 小学英语画像：早启蒙（4-5岁起步）\n\n## 典型特征\n\n- 家长有意识在4-5岁开始英语启蒙\n- 可能接触过一些英语儿歌、动画，但不系统\n- 需要建立从\"听\"到\"读\"到\"写\"的系统路径\n- 家长通常对英语教育比较重视，期望值高\n\n## 推荐方案\n\n### 完整进阶路径\n\n```\n自然拼读1阶（20次课）\n    ↓\n自然拼读2阶（15次课）\n    ↓\n自然拼读3阶（15次课）\n    ↓\n剑桥英语1阶（约1年）\n    ↓\n剑桥英语2阶（约1年）\n    ↓\n剑桥英语3阶（约1年）→ 三年级下/四年级参加KET考级\n    ↓\n初中英语卓越班（2.5年学制）→ 中考接近满分 + 高中衔接\n```\n\n### 首选：自然拼读+绘本阅读\n→ `02_courses/english/phonics.md`\n\n使用教材：Oxford Phonics World（牛津自然拼读世界）\n\n核心目标：\n- 母语式正发音\n- 见词能读\n- 听音能写\n\n## 家长沟通要点\n\n- 这类家长通常教育意识强，愿意投入\n- 重点介绍完整的进阶路径，展示长期规划的清晰性\n- 强调\"这套进阶体系科学且符合语言学习规律\"\n- KET考级是一个有说服力的里程碑目标\n- 展示从自然拼读到初中英语卓越班的完整闭环\n\n## 家长配合建议\n\n- 在家营造英语环境（英语儿歌、绘本共读）\n- 配合课后的拼读练习\n- 不要急于要求孩子\"说完整句子\"，先培养语感\n", "lines": 60, "size": 1613}, "03_diagnosis__primary__english_zero_start": {"id": "03_diagnosis__primary__english_zero_start", "path": "03_diagnosis/primary/english_zero_start.md", "name": "english_zero_start", "title": "小学英语画像：零基础/启蒙晚 (English Zero Start)", "tags": "[stage:primary-low, stage:primary-high, subject:english, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:english, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/primary_english_sync_plus.md, 02_courses/english/phonics.md]\n---\n\n# 小学英语画像：零基础/启蒙晚\n\n## 典型特征\n\n### 情况A：三年级才开始学英语\n- 学校三年级开始教英语，此前无任何英语基础\n- 字母认识但发音不准\n- 听力辨音能力弱\n- 需要从课本同步培优开始\n\n### 情况B：错过启蒙窗口期\n- 已上三年级以上但英语启蒙晚\n- 学校课本内容跟不上\n- 单元测试成绩不理想\n- 对英语学习缺乏兴趣和信心\n\n## 推荐方案\n\n### 情况A推荐：课本同步培优\n→ `02_courses/english/primary_english_sync_plus.md`\n\n- 以课本同步培优为主\n- 巩固课内知识的同时注重提升兴趣\n- 在轻松氛围中逐步提升英语能力\n- 快速提升单元测试成绩以建立自信\n\n### 情况B推荐：视情况选择\n\n如果年龄还在4-8岁范围内且时间允许：\n→ `02_courses/english/phonics.md`（自然拼读从头开始）\n\n如果已经三年级以上：\n→ `02_courses/english/primary_english_sync_plus.md`（先把课内搞定）\n\n## 家长沟通要点\n\n- 不说\"孩子英语太差\"或\"起步太晚了\"\n- 要说\"从实际学情出发的补强方式，能切实帮助孩子攻克薄弱点\"\n- 强调\"兴趣是最好的老师\"，同步培优的目标不只是成绩，更是让孩子不怕英语\n- 给家长信心：很多同类学员通过系统学习都实现了逆袭\n", "lines": 48, "size": 1555}, "03_diagnosis__primary__math_75_to_90": {"id": "03_diagnosis__primary__math_75_to_90", "path": "03_diagnosis/primary/math_75_to_90.md", "name": "math_75_to_90", "title": "小学数学画像：75-90分 (Math 75 To 90)", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/primary_math_sync_plus.md]\n---\n\n# 小学数学画像：75-90分\n\n## 典型特征\n\n- 基础知识大致掌握，但部分知识点不够扎实\n- 基础题能做对，但稍有变化的题目容易出错\n- 计算能力尚可，偶有失误\n- 思维灵活度不够，遇到新题型容易卡住\n- 有一定学习意愿，但方法不够高效\n\n## 常见错误归因\n\n| 错误类型 | 表现 | 比例（典型） |\n|---------|------|------------|\n| 概念性错误 | 部分概念理解不透彻 | 25% |\n| 计算性错误 | 偶发运算失误 | 25% |\n| 审题性错误 | 忽略隐含条件 | 25% |\n| 方法性错误 | 缺乏解题策略 | 25% |\n\n## 思维层次评估\n\n处于**理解→应用**过渡阶段，需要在应用层级加强训练。\n\n## 推荐方案\n\n### 首选：同步培优班（6-12人精品小班）\n→ `02_courses/math/primary_math_sync_plus.md`\n\n**理由**：\n- 紧跟学校进度，强化课本知识\n- 用生活例子讲透概念\n- 从基础题型慢慢过渡，先\"学得会\"\n- 在水平相近的同伴中学习，不会自卑也不会松懈\n\n### 目标路径\n```\n同步培优班 → 稳定在90分以上 → 过渡到同步奥数班\n```\n\n### 预期周期\n根据同类学员数据，一般1个学期可见明显提升。\n\n## 家长沟通要点\n\n- 这个分数段的家长通常焦虑\"为什么努力了成绩上不去\"\n- 解释：不是努力不够，是方法需要调整，需要把知识点真正\"吃透\"\n- 强调同步培优班的\"量体裁衣\"——老师能关注到每个孩子的卡点\n\n## 家长配合建议\n\n- 配合老师的错题复盘要求\n- 不要给孩子额外加刷大量习题，重质不重量\n- 鼓励孩子上课时敢于提问和发言\n", "lines": 61, "size": 1840}, "03_diagnosis__primary__math_90_to_95": {"id": "03_diagnosis__primary__math_90_to_95", "path": "03_diagnosis/primary/math_90_to_95.md", "name": "math_90_to_95", "title": "小学数学画像：90-95分 (Math 90 To 95)", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/primary_math_sync_olympiad.md]\n---\n\n# 小学数学画像：90-95分\n\n## 典型特征\n\n- 课本知识掌握扎实，基础题基本不丢分\n- 灵活解题能力差点火候，遇到变式题偶有卡壳\n- 有一定的数学思维基础，但举一反三能力待提升\n- 学习态度认真，但思维模式偏\"套路化\"\n- 在学校班级中属于中上水平\n\n## 关键瓶颈\n\n- 从\"做对常规题\"到\"灵活解变式题\"的跨越\n- 从\"记住方法\"到\"理解方法背后的逻辑\"\n- 思维的灵活性和迁移能力\n\n## 推荐方案\n\n### 首选：同步奥数班（6-12人精品小班）\n→ `02_courses/math/primary_math_sync_olympiad.md`\n\n**理由**：\n- 60%同步内容保持课内成绩稳定\n- 40%奥数思维训练突破灵活性\n- 多练变式题，培养举一反三的能力\n- 和水平相近的同伴竞争成长\n\n### 目标路径\n```\n同步奥数班 → 成绩稳定96分以上 → 可选纯奥数/奥数创新班\n```\n\n## 家长沟通要点\n\n- 这个分数段的家长通常想\"再往上冲一冲\"\n- 解释：90-95分到96+不是靠多刷题，而是需要思维方式的升级\n- 强调\"举一反三\"的训练价值\n- 适度管理期望：思维提升是渐进过程，短期分数可能波动\n\n## 家长配合建议\n\n- 不要过度关注每次考试的分数波动\n- 鼓励孩子遇到不会的题先思考，不要急着看答案\n- 支持孩子参加同步奥数班，接受适度挑战\n", "lines": 52, "size": 1568}, "03_diagnosis__primary__math_above_96": {"id": "03_diagnosis__primary__math_above_96", "path": "03_diagnosis/primary/math_above_96.md", "name": "math_above_96", "title": "小学数学画像：96分以上 (Math Above 96)", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/primary_math_olympiad.md, 02_courses/xiaoshengchu/elite_school_sprint.md]\n---\n\n# 小学数学画像：96分以上\n\n## 典型特征\n\n- 课本知识完全掌握，考试几乎不丢分\n- 有较强的数学思维基础和学习兴趣\n- 能独立思考较复杂的问题\n- 在班级中属于顶尖水平\n- 可能已经觉得学校数学\"吃不饱\"\n\n## 发展需求\n\n- 不需要再花时间巩固课本基础\n- 需要更高维度的思维挑战\n- 培养逻辑推理、抽象思维、创新思维等高阶能力\n- 为小升初名校选拔做准备\n\n## 推荐方案\n\n### 首选：纯奥数 / 奥数创新班\n→ `02_courses/math/primary_math_olympiad.md`\n\n**理由**：\n- 脱离课本体系，深度拓展奥数知识\n- 趣味思维挑战激发学习热情\n- 同伴间思维碰撞，越学越有动力\n- 为竞赛和名校选拔打基础\n\n### 如有名校目标\n→ 同时推荐 `02_courses/xiaoshengchu/elite_school_sprint.md`\n\n建议五年级起开始定制名校课程，提前2年准备。\n\n### 能力培养重点\n1. **逻辑推理能力** — 因果推导\n2. **数学应变能力** — 一通百通，举一反三\n3. **实际应用能力** — 用思维解决真实问题\n4. **抽象思维能力** — 无缝衔接初中代数几何\n\n## 家长沟通要点\n\n- 这个分数段的家长通常关注\"怎么保持优势\"或\"怎么冲名校\"\n- 强调：分数已经不是问题，关键是思维能力的持续提升\n- 思维能力才是应对中高考压轴题和未来学习的核心竞争力\n- 介绍小升初名校冲刺课的优势（18年经验、精准定位题型）\n", "lines": 53, "size": 1729}, "03_diagnosis__primary__math_below_75": {"id": "03_diagnosis__primary__math_below_75", "path": "03_diagnosis/primary/math_below_75.md", "name": "math_below_75", "title": "小学数学画像：75分以下 (Math Below 75)", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/math_one_on_one.md, 04_scripts/objection_child_weak.md]\n---\n\n# 小学数学画像：75分以下\n\n## 典型特征\n\n- 课本基础知识点有多处漏洞\n- 计算能力弱，频繁出现计算错误\n- 审题能力不足，题目读不懂或理解偏差\n- 听课专注力不够，跟不上班级节奏\n- 可能存在畏难情绪，对数学缺乏信心\n- 学习习惯尚未建立（不记笔记、不复习、不整理错题）\n\n## 常见错误归因\n\n| 错误类型 | 表现 | 比例（典型） |\n|---------|------|------------|\n| 概念性错误 | 基础概念理解不清 | 40% |\n| 计算性错误 | 运算失误、进退位错误 | 30% |\n| 审题性错误 | 漏看条件、理解偏差 | 20% |\n| 方法性错误 | 用错方法或无方法 | 10% |\n\n## 思维层次评估（布鲁姆分类）\n\n主要停留在**记忆→理解**层级，尚未达到**应用**层级。\n\n## 推荐方案\n\n### 首选：名师一对一\n→ `02_courses/math/math_one_on_one.md`\n\n**理由**：\n- 一对一模式能让老师深入了解孩子的兴趣爱好、知识薄弱点及学习能力短板\n- 量身定制学习方案\n- 在小班中可能跟不上，反而打击信心\n\n### 三大核心价值\n1. 提升学习力（计算、理解、记忆、专注力）\n2. 改善学习状态（引导鼓励、激发积极性）\n3. 优化学习心理+亲子关系\n\n### 目标路径\n```\n一对一补强 → 成绩提升到75-90分 → 转入同步培优小班（6-12人）\n```\n\n### 预期周期\n根据同类学员数据，一般3-6个月可见明显改善。\n\n## 家长沟通要点\n\n- **不说**：\"孩子基础太差\"\n- **要说**：\"目前有几个关键知识漏洞需要补，通过一对一的针对性辅导可以精准解决\"\n- 先理解家长的焦虑，再给方案\n- 强调\"个性化的辅导方式能更精准满足孩子需求，为后续学习进步打下良好基础\"\n\n## 家长配合建议\n\n- 不要在家批评孩子数学差，避免强化畏难情绪\n- 配合老师要求的课后复习\n- 关注孩子的学习状态变化而非单纯看分数\n- 给予鼓励，肯定每一个小进步\n", "lines": 68, "size": 2232}, "03_diagnosis__senior__subject_weakness": {"id": "03_diagnosis__senior__subject_weakness", "path": "03_diagnosis/senior/subject_weakness.md", "name": "subject_weakness", "title": "高中画像：学科薄弱 (Subject Weakness)", "tags": "[stage:senior, subject:general, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:senior, subject:general, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/senior_math_tiers.md, 02_courses/science/senior_physics.md, 02_courses/science/senior_chemistry.md]\n---\n\n# 高中画像：学科薄弱\n\n## 高中阶段特点\n\n- 知识量和难度陡增\n- 对思维能力要求更高\n- 时间更紧张，需要高效学习\n\n## 可选课程\n\n| 科目 | 班型 | 主要校区 |\n|------|------|---------|\n| 数学 | 培优班/提高班 | 虹都、霞山、南油 |\n| 物理 | 培优班/提高班 | 虹都、霞山、南油 |\n| 化学 | 培优班 | 虹都、霞山、南油 |\n| 英语 | 培优班 | 虹都、霞山、南油 |\n\n## 高中课程主要在虹都校区和霞山校区\n\n小学课程安排京基/盛和园校区，**初高中安排在虹都大厦**，家长选择校区时需注意。\n\n## 从初中英语卓越班过渡的学生\n\n- 已在初中阶段完成高一词汇与语法积累\n- 3000词汇量基础\n- 高中英语目标稳定125分\n- 这部分学生在高中阶段英语学习较为轻松\n\n## 收费参考\n\n高一210/次、高二220/次、高三230/次（6-12人班课单价）\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 41, "size": 1214}, "03_diagnosis__teacher_report_template": {"id": "03_diagnosis__teacher_report_template", "path": "03_diagnosis/teacher_report_template.md", "name": "teacher_report_template", "title": "学情诊断报告（教师版）模板 (Teacher Report Template)", "tags": "[type:template, role:teacher, subject:general]", "module": "03_diagnosis", "content": "---\ntags: [type:template, role:teacher, subject:general]\nlast_updated: 2026-03-22\nmaintainer: 教研团队\nrelated_files: [09_agents/diagnostic_report_agent.md, 03_diagnosis/parent_report_template.md, 03_diagnosis/diagnostic_dimensions_quickref.md, 06_ops/teacher_consultant_service_triangle.md, 02_courses/math/junior_math_curriculum_2025.md, 02_courses/math/primary_math_curriculum_2025.md]\n---\n\n# 学情诊断报告（教师版）模板\n\n> 本模板供教师和诊断报告生成器使用。\n> 语言原则：专业精准、数据驱动、教学导向。逻辑：数据分析 -> 教学调整 -> 跟踪指标。\n\n---\n\n## 报告结构模板\n\n### 一、学生档案\n\n#### 基本信息\n\n| 字段 | 内容 |\n|------|------|\n| 姓名 | {{student_name}} |\n| 年级 | {{grade}} |\n| 学校 | {{school}} |\n| 学科 | {{subject}} |\n| 当前班型 | {{current_class}}（X/Y/Z体系） |\n| 入学日期 | {{enrollment_date}} |\n| 任课教师 | {{teacher_name}} |\n| 学管老师 | {{xueguan_name}} |\n| 咨询师 | {{consultant_name}} |\n| 报告编号 | {{report_id}} |\n| 报告日期 | {{report_date}} |\n\n#### 历史成绩趋势\n\n| 日期 | 考试名称 | 得分 | 满分 | 得分率 | 班级均分 | 与均分差 | 趋势 |\n|------|---------|------|------|--------|---------|---------|------|\n| {{date_1}} | {{exam_1}} | {{score_1}} | {{total_1}} | {{rate_1}}% | {{avg_1}} | {{gap_1}} | -- |\n| {{date_2}} | {{exam_2}} | {{score_2}} | {{total_2}} | {{rate_2}}% | {{avg_2}} | {{gap_2}} | {{arrow}} |\n| {{date_3}} | {{exam_3}} | {{score_3}} | {{total_3}} | {{rate_3}}% | {{avg_3}} | {{gap_3}} | {{arrow}} |\n\n趋势标注：上升(+X)、持平(~)、下降(-X)\n\n#### 一句话诊断\n\n> {{精准诊断，如\"该生处于理解→应用过渡阶段，核心障碍为代数建模能力不足和几何证明缺乏模型意识，错误簇集中在函数与几何综合板块。\"}}\n\n---\n\n### 二、逐题分析表\n\n| 题号 | 知识点 | 所属模块 | 满分 | 得分 | 失分 | 错误类型 | 布鲁姆层次 | 对应讲次 | 备注 |\n|------|--------|---------|------|------|------|---------|-----------|---------|------|\n| 1 | {{topic}} | {{module}} | {{max}} | {{got}} | {{lost}} | {{type/正确}} | {{bloom}} | {{lecture_ref}} | {{notes}} |\n| 2 | ... | ... | ... | ... | ... | ... | ... | ... | ... |\n| ... | ... | ... | ... | ... | ... | ... | ... | ... | ... |\n\n错误类型编码：\n- **C1** = 概念性错误（Conceptual）\n- **C2** = 计算性错误（Computational）\n- **C3** = 审题性错误（Comprehension）\n- **C4** = 方法性错误（Methodological）\n- **OK** = 正确\n\n布鲁姆层次编码：\n- **L1** = 记忆\n- **L2** = 理解\n- **L3** = 应用\n- **L4** = 分析\n- **L5** = 综合\n- **L6** = 创造\n\n对应讲次：标注该知识点在X/Y/Z体系课程中的对应讲次编号，便于定位教学。\n\n---\n\n### 三、模块得分率矩阵\n\n| 知识模块 | 满分 | 得分 | 得分率 | 等级 | 错题数 | 主要错误类型 | 较上次变化 |\n|---------|------|------|--------|------|--------|-------------|-----------|\n| {{module_1}} | {{max}} | {{got}} | {{rate}}% | {{A/B/C/D}} | {{n}} | {{C1/C2/C3/C4}} | {{+/-/~}} |\n| {{module_2}} | ... | ... | ... | ... | ... | ... | ... |\n| ... | ... | ... | ... | ... | ... | ... | ... |\n| **合计** | **{{total_max}}** | **{{total_got}}** | **{{total_rate}}%** | -- | **{{total_errors}}** | -- | -- |\n\n等级标准：\n- **A**（90%以上）：掌握良好，可适当拔高\n- **B**（75%-89%）：基本掌握，局部强化\n- **C**（60%-74%）：存在漏洞，需专项训练\n- **D**（60%以下）：核心漏洞，需优先补强\n\n---\n\n### 四、错误簇分析\n\n> 错误簇 = 同一知识链条上有2道及以上错题的模块群。\n\n#### 错误簇 {{n}}：{{簇名称}}\n\n```\n知识链条：{{前序知识}} → {{当前知识点A（错）}} → {{当前知识点B（错）}} → {{后续知识点}}\n```\n\n| 维度 | 分析 |\n|------|------|\n| **涉及题号** | 第{{x}}、{{y}}、{{z}}题 |\n| **共同错误模式** | {{描述这几道题的共同错误特征}} |\n| **根源知识点** | {{追溯到的基础漏洞}} |\n| **根源对应讲次** | {{X/Y/Z体系中的具体讲次}} |\n| **建议补强方式** | {{回顾讲次/专项练习/一对一辅导}} |\n\n#### 错误簇 {{n+1}}（如有）\n\n（同上格式）\n\n#### 非系统性错误（偶发失误）\n\n| 题号 | 错误类型 | 分析 | 是否需要干预 |\n|------|---------|------|-------------|\n| {{x}} | C2（计算） | 单纯运算失误，不影响知识理解 | 观察，提醒规范 |\n| {{y}} | C3（审题） | 偶发性漏读条件 | 观察 |\n\n---\n\n### 五、布鲁姆思维层次分布\n\n#### 各层次表现\n\n| 层次 | 涉及题数 | 满分 | 得分 | 正确率 | 评估 |\n|------|---------|------|------|--------|------|\n| L1 记忆 | {{n}} | {{max}} | {{got}} | {{rate}}% | {{评估}} |\n| L2 理解 | {{n}} | {{max}} | {{got}} | {{rate}}% | {{评估}} |\n| L3 应用 | {{n}} | {{max}} | {{got}} | {{rate}}% | {{评估}} |\n| L4 分析 | {{n}} | {{max}} | {{got}} | {{rate}}% | {{评估}} |\n| L5 综合 | {{n}} | {{max}} | {{got}} | {{rate}}% | {{评估}} |\n| L6 创造 | {{n}} | {{max}} | {{got}} | {{rate}}% | {{评估}} |\n\n#### 思维层次结论\n\n- **当前思维天花板：** {{该生在哪个层次开始明显下滑}}\n- **目标层次：** {{根据班型和年级，应达到的层次}}\n- **突破策略：** {{教学上如何帮助学生突破当前天花板}}\n\n示例：\n> 当前思维天花板在L3（应用）→L4（分析）过渡处。L1-L3正确率85%，L4骤降至40%。核心障碍是缺乏\"拆解综合题、识别关键条件\"的分析能力。建议增加\"条件标注法\"和\"模型识别\"训练。\n\n---\n\n### 六、错误类型统计\n\n| 错误类型 | 错题数 | 占比 | 失分 | 失分占比 | 较上次变化 |\n|---------|--------|------|------|---------|-----------|\n| C1 概念性 | {{n}} | {{ratio}}% | {{pts}} | {{ratio}}% | {{+/-/~}} |\n| C2 计算性 | {{n}} | {{ratio}}% | {{pts}} | {{ratio}}% | {{+/-/~}} |\n| C3 审题性 | {{n}} | {{ratio}}% | {{pts}} | {{ratio}}% | {{+/-/~}} |\n| C4 方法性 | {{n}} | {{ratio}}% | {{pts}} | {{ratio}}% | {{+/-/~}} |\n| **合计** | **{{total}}** | **100%** | **{{total_pts}}** | **100%** | -- |\n\n#### 错误类型结论\n\n> {{综合分析，如\"C1和C4合计占75%，表明知识理解和解题策略是核心瓶颈。C2比例较低（15%），说明基本运算能力不是主要问题。\"}}\n\n---\n\n### 七、教学建议\n\n针对每个C/D等级模块和每个错误簇，给出具体教学调整建议。\n\n#### 模块 {{n}}：{{模块名称}}（等级{{C/D}}）\n\n| 维度 | 建议 |\n|------|------|\n| **教学目标** | {{本模块接下来的教学目标}} |\n| **核心知识点回顾** | {{需要重新讲解的知识点，对应讲次编号}} |\n| **推荐题型** | {{建议练习的题目类型和难度}} |\n| **教学策略** | {{具体的教学方法调整}} |\n| **课时预估** | {{需要多少课时进行补强}} |\n| **验证方式** | {{如何检验学生已掌握}} |\n\n教学策略参考：\n- **概念性错误为主** -> 回归定义，使用多种表征（文字、图象、实物），强化概念辨析练习\n- **计算性错误为主** -> 规范书写格式，引入\"估算-精算-验算\"三步法，限时计算训练\n- **审题性错误为主** -> \"条件标注法\"训练（读题时用笔圈出关键词和隐含条件），变式训练\n- **方法性错误为主** -> 模型化教学（建立\"题目特征→解题模型\"的映射），说意训练（让学生复述解题思路）\n\n#### 模块 {{n+1}}（如有）\n\n（同上格式）\n\n---\n\n### 八、跟踪指标\n\n> 下次评估时重点关注以下指标：\n\n| 指标 | 当前值 | 目标值 | 评估时间 | 评估方式 |\n|------|--------|--------|---------|---------|\n| 总分得分率 | {{current}}% | {{target}}% | {{date}} | 月考/阶段测 |\n| {{模块1}}得分率 | {{current}}% | {{target}}% | {{date}} | 专项测试 |\n| {{模块2}}得分率 | {{current}}% | {{target}}% | {{date}} | 专项测试 |\n| C1错误占比 | {{current}}% | ≤{{target}}% | {{date}} | 错题统计 |\n| C4错误占比 | {{current}}% | ≤{{target}}% | {{date}} | 错题统计 |\n| 布鲁姆L4正确率 | {{current}}% | ≥{{target}}% | {{date}} | 综合题专测 |\n\n---\n\n### 九、课程匹配建议\n\n#### 当前班型评估\n\n| 维度 | 评估 |\n|------|------|\n| **当前班型** | {{X/Y/Z体系，具体班型}} |\n| **匹配度** | {{匹配/偏难/偏易}} |\n| **建议** | {{维持/升级/降级/补充一对一}} |\n\n#### 体系匹配参照\n\n| 体系 | 定位 | 适合条件 | 该生是否匹配 |\n|------|------|---------|-------------|\n| X体系（同步班） | 紧跟课本，夯实基础 | 得分率<75%，概念漏洞多 | {{是/否}} |\n| Y体系（培优班） | 拔高拓展，模型训练 | 得分率75%-90%，方法需强化 | {{是/否}} |\n| Z体系（思维突破） | 竞赛思维，超纲拓展 | 得分率>90%，冲压轴/竞赛 | {{是/否}} |\n\n#### 具体课程对接\n\n> 结合本次诊断的错误簇和薄弱模块，以下课程讲次需要重点关注：\n\n| 需补强模块 | 对应体系 | 对应讲次 | 核心内容 | 优先级 |\n|-----------|---------|---------|---------|--------|\n| {{module_1}} | {{X/Y}} | {{体系-年级-季度-讲次}} | {{讲次核心内容}} | 高 |\n| {{module_2}} | {{X/Y}} | {{体系-年级-季度-讲次}} | {{讲次核心内容}} | 高 |\n| {{module_3}} | {{X/Y}} | {{体系-年级-季度-讲次}} | {{讲次核心内容}} | 中 |\n\n---\n\n### 十、铁三角协作备注\n\n> 根据本次诊断结果，需要铁三角各角色配合的事项：\n\n#### 教师（本人）行动项\n\n| 事项 | 时间要求 | 具体内容 |\n|------|---------|---------|\n| 教学计划调整 | 下次课开始 | {{根据诊断结果调整的教学内容}} |\n| 专项练习设计 | 本周内 | {{针对错误簇设计的专项练习}} |\n| 家长版报告审核 | 报告生成后24h内 | 确认家长版报告内容准确、措辞得当 |\n\n#### 学管行动项\n\n| 事项 | 时间要求 | 具体内容 |\n|------|---------|---------|\n| 发送家长版报告 | 教师审核后24h内 | 通过微信/私享群发送给家长，附简要说明 |\n| 跟踪家长反馈 | 发送后48h内 | 了解家长对报告的疑问，如有需要转教师/咨询师 |\n| 更新四大能力图谱 | 报告完成后1周内 | 更新学员成长手册中的诊断数据 |\n| 作业跟进 | 持续 | 重点关注{{薄弱模块}}相关作业的完成和订正质量 |\n\n#### 咨询师行动项\n\n| 事项 | 触发条件 | 具体内容 |\n|------|---------|---------|\n| 课程调整面谈 | 如建议升级/降级/增加一对一 | 与家长沟通课程调整方案，1周内完成 |\n| 续费准备 | 如该生临近续费窗口 | 将本次诊断报告纳入成长手册，作为续费面谈的证据支撑 |\n| 投诉预防 | 如成绩明显下降 | 主动联系家长，先共情再归因，避免家长不满升级 |\n\n#### 特殊提醒\n\n- [ ] 是否需要课程调整（升级/降级/增加一对一）？ {{是/否}}\n- [ ] 是否存在流失预警信号？ {{是/否，如有标注预警等级}}\n- [ ] 是否需要咨询师主动介入？ {{是/否}}\n- [ ] 家长版报告是否有需要特别斟酌的措辞？ {{是/否，如有说明}}\n\n---\n\n### 附录：错题详细记录\n\n> 对每道错题记录详细信息，供教师后续教学和错题库建设使用。\n\n#### 错题 {{n}}：第{{x}}题\n\n| 维度 | 内容 |\n|------|------|\n| **题目摘要** | {{题目简要描述}} |\n| **知识点** | {{知识点标签}} |\n| **满分/得分** | {{max}} / {{got}} |\n| **学生作答** | {{学生的解答过程描述}} |\n| **错误定位** | {{具体哪一步出错}} |\n| **错误类型** | {{C1/C2/C3/C4}} |\n| **布鲁姆层次** | {{L1-L6}} |\n| **正确解法要点** | {{正确解题的关键步骤}} |\n| **教学建议** | {{针对此题的教学改进}} |\n| **关联题目** | {{本次试卷中关联的其他题目}} |\n\n（为每道错题重复上述格式）\n\n---\n\n## 使用说明\n\n### 填写流程\n\n```\n1. 收集考试数据（逐题得分+知识点标签+布鲁姆层次标注）\n      |\n2. 填写学生档案和历史成绩\n      |\n3. 逐题分析表（耗时最长，需要逐题归因）\n      |\n4. 自动汇总模块得分率矩阵和错误类型统计\n      |\n5. 识别错误簇（关键分析步骤）\n      |\n6. 评估布鲁姆思维层次分布\n      |\n7. 撰写教学建议（结合课程讲次）\n      |\n8. 设定跟踪指标\n      |\n9. 课程匹配和铁三角协作备注\n      |\n10. 质量自检后输出\n```\n\n### 质量自检清单\n\n- [ ] 逐题分析表是否完整（每道题都有归因）？\n- [ ] 模块得分率计算是否准确？\n- [ ] 错误簇识别是否合理（知识链条是否正确）？\n- [ ] 布鲁姆层次标注是否恰当？\n- [ ] 教学建议是否具体可执行（不是\"多练习\"而是\"练什么、怎么练、练多少\"）？\n- [ ] 跟踪指标是否有具体的目标值和评估时间？\n- [ ] 课程匹配是否与诊断结果一致？\n- [ ] 铁三角协作备注是否明确了各角色的行动和时间？\n- [ ] 家长版报告是否需要特别注意措辞（如成绩大幅下降）？\n- [ ] 所有数据是否前后一致（得分率、错误比例总和等）？\n\n### 与家长版报告的对应关系\n\n| 教师版内容 | 家长版对应 | 差异 |\n|-----------|-----------|------|\n| 一句话诊断 | 一句话总评 | 家长版更温暖，教师版更精准 |\n| 模块得分率矩阵 | 各模块得分率 | 教师版含错误类型和变化趋势 |\n| 错误簇分析 | 待提升模块 | 家长版用通俗语言，教师版追溯知识链 |\n| 布鲁姆层次分布 | （不直接展示） | 教师版独有，家长版仅体现在建议中 |\n| 教学建议 | 个性化提升方案 | 教师版更详细，含讲次和课时 |\n| 跟踪指标 | 下次诊断预约 | 教师版量化指标，家长版简化为时间和模块 |\n| 课程匹配 | 推荐课程方案 | 教师版含体系分析，家长版只给结论 |\n| 铁三角协作 | （不展示） | 教师版独有，内部协作信息 |\n| 错题详细记录 | （不展示） | 教师版独有，教学参考 |\n", "lines": 351, "size": 14083}, "03_diagnosis__xiaoshengchu__target_school_profile": {"id": "03_diagnosis__xiaoshengchu__target_school_profile", "path": "03_diagnosis/xiaoshengchu/target_school_profile.md", "name": "target_school_profile", "title": "小升初画像：按目标校分 (Target School Profile)", "tags": "[stage:xiaoshengchu, subject:general, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:xiaoshengchu, subject:general, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/xiaoshengchu/elite_school_sprint.md]\n---\n\n# 小升初画像：按目标校分\n\n## 目标校及班型\n\n| 学校 | 目标班型 | 选拔特点 |\n|------|---------|---------|\n| 培才一中 | 火箭班 | 入学密考+分班考 |\n| 廉江实验学校 | 精英班 | 入学密考+分班考 |\n| 北附博雅学校 | 清北班 | 入学密考+分班考 |\n| 广东省实验学校（麻章） | 重点班 | 入学密考+分班考 |\n\n## 考试类型说明\n\n1. **密考**（素养评估）：入学前学校组织的非公开选拔考试\n2. **分班考**：入学后学校组织的考试，决定进入哪个层级的班级\n\n## 百分教育定位学校选拔题型的能力\n\n- 18年湛江本地办学经验\n- 熟悉各名校的出题风格和难度\n- 每年大量学生在百分进行小升初集训\n- 做到定制化培养\n\n## 建议时间线\n\n| 时间点 | 建议 |\n|--------|------|\n| 五年级上 | 评估孩子当前水平，制定目标校策略 |\n| 五年级下 | 开始系统的名校课程，强化薄弱环节 |\n| 六年级上 | 高强度冲刺训练，模拟考练习 |\n| 六年级下 | 临考集训，针对目标校题型精练 |\n\n## 诊断要点\n\n当家长提到\"想上培才/廉实/北附/省实验\"时：\n1. 先了解孩子当前成绩水平\n2. 评估距离目标的差距\n3. 根据时间（五年级还是六年级）推荐相应的准备方案\n4. 强调\"提前2年准备\"的优势\n\n→ 课程详情见 `02_courses/xiaoshengchu/elite_school_sprint.md`\n", "lines": 49, "size": 1597}, "03_teachers__teacher_profiles_batch2": {"id": "03_teachers__teacher_profiles_batch2", "path": "03_teachers/teacher_profiles_batch2.md", "name": "teacher_profiles_batch2", "title": "百分教育教师档案（第二批）", "tags": "[教师, 师资, 档案, 小学, 初中, 高中, 学管, 规划师]", "module": "03_teachers", "content": "---\ntitle: 百分教育教师档案（第二批）\ntags: [教师, 师资, 档案, 小学, 初中, 高中, 学管, 规划师]\nlast_updated: 2026-03-24\n---\n\n# 百分教育教师档案（第二批）\n\n> 本文件整理自2025年11月各学段家长会PPT，涵盖20+位教师的核心档案信息。\n\n---\n\n## 一、小学学段\n\n### 江凤娇（JoJo）\n\n- **角色/学科**：小学英语教师（自然拼读、剑桥英语）\n- **核心成就**：\n  - 百分教育2024年度优秀教师\n  - 百分第六届教师技能大赛第一名\n- **教学特色**：专注小学英语教学，深度钻研自然拼读体系，精准把握小学英语全学段考点；以激发学习兴趣为核心，融合听说读写多维能力培养，课堂注重互动鼓励\n- **负责学段**：小学英语（五年级为主）\n- **来源**：五年级整合PPT\n\n### 杨晶晶\n\n- **角色/学科**：小初数学教师\n- **教龄/经验**：6年小初数学教学经验，累计教授上千名学生\n- **教学特色**：课堂讲解清晰，注重培养逻辑思维与解题能力；善于关心学生的学习和心理状况；责任心强且耐心十足，能因材施教\n- **负责学段**：小学五年级数学\n- **来源**：五年级整合PPT\n\n### 陈金玉\n\n- **角色/学科**：学管班主任\n- **教龄/经验**：7年学管管理经验，累计服务学员超过3000名\n- **核心成就**：\n  - 通过学情分析系统优化学员学习方案，成功提升学员平均成绩\n  - 获评\"年度优秀教学服务案例\"\n- **教学特色**：擅长学生全周期服务管理、团队统筹及教学服务优化；设计\"成长树\"档案模型（根系-树干-树冠-年轮），实现从\"静态记录\"到\"动态叙事\"\n- **负责学段**：小学五年级学管服务\n- **来源**：五年级整合PPT\n\n---\n\n## 二、初中学段\n\n### 官丽平\n\n- **角色/学科**：小初数学教师\n- **专业背景**：数学与应用数学\n- **核心成就**：\n  - 第五、六届教师技能大赛二等奖\n  - 指导学生在\"广东省计算思维大赛\"获奖（潘*宇一等奖等）\n  - 花都区花东镇初中解答大赛组三等奖\n  - 小升初板块多名学员获北附、培才、港二等学校奖项\n  - 初中板块：马*宁、柯*菁、李*灵、李*宇、常*妍、梅*姗、许*华、符*睿等考入湛江一中；郑*庭、万*伟、符*悦、刘*瑶、何*峻、张*嫣、周*妍等考入湛江二中；吕*涵考入广东省实验中学\n- **负责学段**：初二数学培优/拔尖\n- **来源**：如何从优秀到拔尖PPT\n\n### 陈耿婷\n\n- **角色/学科**：小初数学教师\n- **教龄/经验**：5年教学经验，累计授课时长5000小时，累计学员1000人\n- **教学特色**：注重启发式教学，引导学生自主思考；善于根据学生特点因材施教，激发学生学习兴趣；提出\"三阶段提分路径\"（基础夯实期、中档题突破期、培优过渡期）\n- **核心方法**：\n  - 基础快测（每节课前10分钟诊断知识漏洞）\n  - 流程建模与思维固化\n  - 分步得分法拆解压轴题\n- **负责学段**：初中数学（基础到培优）\n- **来源**：从基础到培优PPT\n\n### 陈舒婷\n\n- **角色/学科**：小学数学教师（六年级小升初方向）\n- **核心成就**：\n  - 百分教育2024年度金牌教师\n  - 计算思维大赛及小升初命题策划人\n  - 湛江第一届计算思维大赛省优秀指导老师\n- **教学特色**：逻辑化教学构建数学思维；充分了解近年考点考向；问题链替代直接灌输，引导自主思考；用说题方式让孩子将知识点更有效吸收\n- **负责学段**：六年级数学 / 小升初\n- **来源**：同心同行智备升学PPT\n\n### 廖伟玲\n\n- **角色/学科**：学业规划师\n- **教龄/经验**：5年教育行业经验，累计服务5000名学员\n- **资质**：湛江教育学习规划师、家庭教育指导师\n- **核心成就**：成功帮助学员提升成绩100+，熟悉不同基础学员的痛点与突破策略\n- **教学特色**：专业学习技巧与方法、小升初资讯分享、高考指导规划\n- **负责学段**：初一学业规划\n- **来源**：初一筑基未来领航PPT\n\n### 吴艳婷\n\n- **角色/学科**：初中数学教师\n- **资质**：初中教师资格证书\n- **核心成就**：百分教育2024年度优秀教师\n- **教学特色**：教学上细心、耐心、热情且具有较强责任感；教学内容深入浅出，注重学生数学眼光、数学思维、数学语言的培养；对中考命题风向有深入研究（基础运算30%、概念迁移25%、模型建构25%、探究创新20%）\n- **负责学段**：初一数学\n- **来源**：初一筑基未来领航PPT\n\n### 符晓娟\n\n- **角色/学科**：中小学英语教师\n- **教龄/经验**：8年多英语教学经验\n- **教学理念**：用心教好每一位孩子\n- **教学特色**：注重培养孩子的语法逻辑思维，系统提分；擅长激发学生英语兴趣和注重学生学习习惯的培养\n- **负责学段**：初一英语\n- **来源**：初一筑基未来领航PPT\n\n### 林子璇\n\n- **角色/学科**：初中学管师\n- **教龄/经验**：7年教辅跟踪经验（从学龄到初中）\n- **学历背景**：华南师范大学学前教育专业\n- **教学特色**：连接家长、学生和任课老师之间的\"核心纽带\"；建立学管服务全景齿轮体系（学员档案管理、个性化课程安排、高频家校沟通、规划落地跟进四大模块）；设计数字档案透视成长系统，含风险预警机制（成绩下降超过10分或情绪低迷即触发干预）\n- **负责学段**：初一学管服务\n- **来源**：初一筑基未来领航PPT\n\n### 王彩霞\n\n- **角色/学科**：初三英语教师\n- **核心成就**：\n  - 专注初三英语冲刺\n  - 所带班级英语平均分连续5年超市重点线\n- **教学特色**：擅长高频考点归纳与作文模板定制；课程配套5件套教材（课本、笔记本、中考词汇手册等）；课前5-10分钟进门考检测上节课掌握情况\n- **负责学段**：初三英语\n- **来源**：初三学业规划家长会PPT\n\n### 王涵\n\n- **角色/学科**：初三物理教师\n- **核心成就**：近2年帮助150+学生物理从\"及格线\"跃升至90+\n- **教学特色**：注重实验与理论结合，用生活化案例拆解复杂公式；课程体系覆盖电学基础概念（30%）、欧姆定律应用、电功与电功率；强调实验探究技能（伏安法测电阻、测电功率）\n- **负责学段**：初三物理\n- **来源**：初三学业规划家长会PPT\n\n---\n\n## 三、高中学段\n\n### 全学森\n\n- **角色/学科**：高中数学教师（百分教育四星级数学教师）\n- **教龄/经验**：13年初高教学经验，年均授课1400+小时\n- **核心成就**：所带孩子95%实现目标\n- **教学特色**：中高考命题研究者；采用中高考考点教学法；七步教学法（错题回顾、知识精讲、三点剖析、例题精讲、随堂练习、知识总结、课后跟踪）\n- **负责学段**：高中数学\n- **来源**：携手启航赢在高一PPT\n\n### 祝柳春\n\n- **角色/学科**：高中数学教师（百分教育四星级数学教师）\n- **教龄/经验**：6年小初高教学经验\n- **核心成就**：\n  - 所带学员中考数学最高分119分\n  - 连续三年押中中考考题\n  - 中高考命题研究者\n- **教学特色**：采用\"中高考模型解题法\"；教学理念\"学高为师，身正为范\"；强调学习不仅教会知识，更在于教授学习方法、培养学习能力\n- **负责学段**：高中数学\n- **来源**：携手启航赢在高一PPT\n\n---\n\n## 四、学业规划师 / 学管\n\n### 陆可欣\n\n- **角色/学科**：学业规划师\n- **教龄/经验**：9年+学业规划经验，服务超千名学员\n- **教学特色**：致力成为学生学习路上的引航者；期待陪伴更多家庭踏上省心、省力、升学无忧的从容旅程\n- **负责学段**：小学五年级学业规划\n- **来源**：五年级整合PPT\n\n### 张桃\n\n- **角色/学科**：百分教育金牌学业规划师\n- **教龄/经验**：12年教育行业深耕经验\n- **核心成就**：已助力约2000名学子择校、备考、圆梦理想学校\n- **教学特色**：专注于小初高专业规划，在小升初择校、中高考冲刺等关键阶段拥有丰富经验；以专业引导和温暖支持成为学生成长道路上的可靠指引者\n- **负责学段**：初三学业规划 / 中考择校\n- **来源**：初三学业规划家长会PPT\n\n### 黄奕\n\n- **角色/学科**：学业规划师（百分教育课程咨询师）\n- **教龄/经验**：6年教育领域经验，3年课程咨询经验，累计服务300+位学员\n- **核心成就**：\n  - 所推荐课程学员满意度98%\n  - 续课率85%\n- **教学特色**：用精准的需求分析替代盲目推荐；用长期的成长陪伴超越单次咨询；擅长根据学员基础定制个性化课程方案\n- **负责学段**：高一课程规划\n- **来源**：携手启航赢在高一PPT\n\n### 陈锦霞\n\n- **角色/学科**：学管班主任（百分教育学管）\n- **教龄/经验**：6年教育经验，深度服务600+学生\n- **教学特色**：长期跟踪学业发展与心理成长；科学规划，结合教育心理学与个性化实践定制学业/升学路径；家校共育，专业沟通缓解家长焦虑，精准解决学生学习困境\n- **服务理念**：有温度的教育，以耐心守护成长，以专业引领方向\n- **负责学段**：高一学管服务\n- **来源**：携手启航赢在高一PPT\n\n### 高老师\n\n- **角色/学科**：初三专属学管师\n- **教龄/经验**：10年教育行业经验\n- **资质**：教师资格证、中小学（幼儿园）校长证\n- **核心成就**：\n  - 去年助力5名学生从620分提升至700+，成功考入湛江一中\n  - 今年助力5名学生从600分提升至700+，考入湛江一中，80%学员入读二中、附中等重点高中\n- **教学特色**：擅长学情分析、学习规划与家校沟通；服务理念\"以学生为中心，用细心、耐心、责任心助力达成学习目标\"\n- **负责学段**：初三学管服务\n- **来源**：初三学业规划家长会PPT\n\n---\n\n## 附：教师团队核心数据汇总\n\n| 姓名 | 学段 | 角色 | 经验年限 | 突出数据 |\n|------|------|------|---------|---------|\n| 江凤娇 | 小学 | 英语教师 | -- | 技能大赛第一名 |\n| 杨晶晶 | 小学 | 数学教师 | 6年 | 累计上千名学生 |\n| 陈金玉 | 小学 | 学管 | 7年 | 服务3000+学员 |\n| 官丽平 | 初中 | 数学教师 | -- | 多名学员考入一中/二中/省实 |\n| 陈耿婷 | 初中 | 数学教师 | 5年 | 授课5000小时，1000名学员 |\n| 陈舒婷 | 小升初 | 数学教师 | -- | 2024金牌教师，计算思维大赛命题人 |\n| 廖伟玲 | 初一 | 规划师 | 5年 | 服务5000名学员 |\n| 吴艳婷 | 初一 | 数学教师 | -- | 2024年度优秀教师 |\n| 符晓娟 | 初一 | 英语教师 | 8年 | 语法逻辑思维系统提分 |\n| 林子璇 | 初一 | 学管 | 7年 | 华南师范大学毕业 |\n| 王彩霞 | 初三 | 英语教师 | -- | 班级均分连续5年超市重点线 |\n| 王涵 | 初三 | 物理教师 | -- | 150+学生从及格线跃升至90+ |\n| 全学森 | 高中 | 数学教师 | 13年 | 95%学员实现目标，年授课1400+h |\n| 祝柳春 | 高中 | 数学教师 | 6年 | 连续三年押中中考题，最高分119 |\n| 陆可欣 | 小学 | 规划师 | 9年 | 服务超千名学员 |\n| 张桃 | 初三 | 规划师 | 12年 | 助力2000名学子择校 |\n| 黄奕 | 高一 | 咨询师 | 6年 | 满意度98%，续课率85% |\n| 陈锦霞 | 高一 | 学管 | 6年 | 服务600+学生 |\n| 高老师 | 初三 | 学管 | 10年 | 助力多名学生从600分提升至700+ |\n", "lines": 242, "size": 11774}, "04_scripts__after_trial_followup": {"id": "04_scripts__after_trial_followup", "path": "04_scripts/after_trial_followup.md", "name": "after_trial_followup", "title": "试听后跟进话术 (After Trial Followup)", "tags": "[scene:trial, scene:conversion, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:trial, scene:conversion, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [04_scripts/trial_invitation.md, 06_ops/conversion_funnel.md]\n---\n\n# 试听后跟进话术\n\n## 试听当天（课后10分钟）\n\n### 向家长反馈\n\n> \"XX在今天的课上表现还不错，我注意到他/她在XX方面很有潜力。不过XX部分可能需要加强一下，老师也跟我提到了这个情况。我整理一下老师的反馈，一会儿发给您。\"\n\n### 向家长收集反馈\n\n> \"您觉得今天这个课的节奏和内容怎么样？孩子回来有跟您说什么感受吗？\"\n\n## Day 0：感谢+报告\n\n> \"XX妈妈，感谢今天带孩子来体验。这是今天课上老师对XX的观察反馈，附带了一些学习建议。您看看有什么问题随时问我。\"\n\n附送内容：\n- 教师对孩子的课堂表现观察\n- 初步的学情分析\n- 1-2条具体学习建议\n\n## Day 1：学习建议\n\n> \"XX妈妈，我根据昨天的情况，帮您整理了一份XX科目的学习小建议，不管是不是在百分上课都用得上。希望对孩子有帮助。\"\n\n## Day 3：电话回访\n\n> \"XX妈妈，上次试听后孩子有什么反馈吗？我们想了解一下您的想法，看看有没有什么可以帮到您的。\"\n\n## Day 7：案例分享\n\n> \"XX妈妈，跟您分享一个跟XX情况比较像的学员案例。这个孩子之前也是XX情况，在百分学了X个月后，数学从XX分提到XX分。他妈妈说最大的变化是孩子开始主动做题了。\"\n\n## Day 14：最后联系\n\n> \"XX妈妈，之前我们聊的课程方案，如果您觉得合适的话，随时可以联系我。我们也不急，最重要的是找到适合孩子的。如果有任何学习方面的问题，随时问我就好。\"\n\n## 之后\n\n**停止主动跟进，转内容营销。**\n\n朋友圈/群内容营销：教学干货、学员进步案例、思维小技巧等。\n\n## 禁忌\n\n- 不超过3次主动跟进\n- 不催促成交\n- 不说\"名额快满了\"\n- 每次联系都要提供价值，不是纯销售\n", "lines": 57, "size": 2064}, "04_scripts__channel_adaptation_guide": {"id": "04_scripts__channel_adaptation_guide", "path": "04_scripts/channel_adaptation_guide.md", "name": "channel_adaptation_guide", "title": "渠道适配指南 — 四大渠道话术差异化 (Channel Adaptation Guide)", "tags": "[type:guide, role:customer-service, channel:omni]", "module": "04_scripts", "content": "---\ntags: [type:guide, role:customer-service, channel:omni]\nlast_updated: 2026-03-22\nmaintainer: 运营团队\nrelated_files:\n  - 09_agents/customer_service_agent.md\n  - 04_scripts/customer_service_flow.md\n  - 08_rules/communication_redlines.md\n---\n\n# 渠道适配指南 — 四大渠道话术差异化\n\n---\n\n## 总览\n\n同一套对话逻辑（见 `customer_service_flow.md`），在不同渠道需要调整语气、格式和节奏。本文件定义各渠道的适配规范。\n\n| 渠道 | 风格定位 | 消息长度 | 语气特征 | 核心策略 |\n|------|---------|---------|---------|---------|\n| 小红书私信 | 轻松专业 | 中等（3-5句） | 亲切、有知识感 | 配合笔记内容，延续种草 |\n| 微信添加好友 | 温暖信任 | 中等（3-5句） | 真诚、本地化 | 强调18年本地办学+真人服务 |\n| 企微群引流 | 活跃互动 | 短（1-3句+工具） | 热闹、参与感强 | 用接龙/投票激活群成员 |\n| 抖音私信 | 简短有力 | 极短（1-3句） | 直接、不啰嗦 | 配合视频内容，快速切入 |\n\n---\n\n## 一、小红书私信\n\n### 渠道特征\n\n- 用户画像：25-40岁妈妈为主，教育焦虑中等偏高，重视口碑和\"干货\"\n- 用户行为：先看笔记内容被种草，再私信咨询\n- 平台调性：轻松但有深度，拒绝硬广\n\n### 语气规范\n\n- 用\"~\"结尾可以，但不过度使用，每条消息最多1个\n- 可以用\"哈哈\"\"嗯嗯\"等口语化表达，拉近距离\n- 专业术语要用，但要配上通俗解释\n- 不要用\"亲\"\"宝妈\"等电商客服称呼\n\n### 开场话术\n\n**场景1：家长看完干货笔记后私信**\n\n```\n嗨，感谢关注~ 看到您在我们那篇XX笔记下留言了。\n\n想了解一下孩子目前的学习情况，主要困扰是哪种？\n\nA. 粗心丢分——会做的题总做错\nB. 难题卡住——大题没思路\nC. 偏科拖后腿\nD. 学习没动力\n\n回复字母就行，我帮您具体分析下~\n```\n\n**场景2：家长主动私信问课程**\n\n```\n您好~ 我是百分教育的学习顾问，湛江本地18年了。\n\n方便先了解下孩子的情况吗？这样我能给您更有针对性的建议：\n\n1. 孩子几年级？\n2. 主要想了解哪科？\n3. 目前大概什么分数段？\n\n您简单说说就好。\n```\n\n### 深入对话适配\n\n- 可以穿插发小红书笔记链接作为\"证据\"：\n\n```\n对了，关于审题训练的方法，之前我们发过一篇笔记讲得比较详细，您可以看看：[笔记链接]\n```\n\n- 诊断分析可以用图片形式发送（比纯文字更符合小红书用户习惯）\n- 邀约试听时强调\"免费诊断\"而非\"试听课\"——小红书用户对\"免费课\"敏感度低，对\"专业分析\"感知更强\n\n### 小红书禁忌\n\n- 不发长段纯文字（超过6行用户就不看了）\n- 不用营销话术（\"限时\"\"仅剩\"\"特惠\"）\n- 不主动要电话号码（先在私信中建立信任）\n- 不在公开评论区引导加微信（违反平台规则，私信引导）\n\n---\n\n## 二、微信添加好友\n\n### 渠道特征\n\n- 用户画像：信任度较高（通常经过转介绍或线下接触），更注重\"人\"的感觉\n- 用户行为：加好友后可能不会主动说话，需要破冰\n- 平台调性：一对一私密对话，信任感强\n\n### 语气规范\n\n- 用真名自我介绍（\"我是百分教育的XX\"），不用\"顾问\"\"老师\"等泛称开头\n- 语气温暖真诚，像朋友聊天\n- 强调本地化——\"咱们湛江\"\"赤坎/霞山/坡头都有\"\n- 可以适当用语音消息（第一条用文字，后续可以语音+文字混合）\n\n### 开场话术\n\n**场景1：转介绍添加**\n\n```\n您好，我是百分教育的XX。XX妈妈/爸爸推荐的，说您家孩子在学习上有些困扰，我看看能不能帮上忙。\n\n方便简单说说孩子现在的情况吗？比如几年级、哪科比较头疼？\n\n或者您直接选一个最想解决的问题也行：\nA. 粗心丢分\nB. 难题不会\nC. 偏科严重\nD. 学习没动力\n```\n\n**场景2：线下活动扫码添加**\n\n```\nXX妈妈/爸爸您好，我是百分教育的XX，上次在XX活动现场见过面的。\n\n很高兴跟您加上微信。之前聊到孩子的学习情况，我回来整理了一些建议，后面发给您看看。\n\n对了，孩子目前最让您操心的是哪方面？\nA. 粗心丢分\nB. 难题没思路\nC. 偏科\nD. 学习没动力\n```\n\n**场景3：家长添加后沉默（破冰）**\n\n```\nXX妈妈/爸爸您好，我是百分教育的XX。感谢加我微信~\n\n不急着聊课程，我先分享一个很多家长问的问题：\n\n\"孩子明明很聪明，但就是不用心学，怎么办？\"\n\n如果您家孩子也有类似情况，我可以帮您分析下具体原因。有空的时候回我就行，不着急。\n```\n\n### 深入对话适配\n\n- 可以发语音消息补充说明（语音+文字配合，更有温度）\n- 邀约到校时给出详细地址+地图截图\n- 试卷分析报告用图片+文字结合，发完后电话跟进效果更好\n- 主动提供咨询师的电话号码：\"有什么问题也可以直接打我电话 18933824497\"\n\n### 微信禁忌\n\n- 不群发营销信息\n- 不频繁发朋友圈广告（内容营销为主，干货占80%，活动信息占20%）\n- 不在第一天就推课——先建立信任\n- 加好友后24小时内必须发第一条消息，不要拖\n\n---\n\n## 三、企微群引流\n\n### 渠道特征\n\n- 用户画像：混合人群，活跃度参差不齐，潜水者居多\n- 用户行为：大部分人只看不说，需要低门槛互动激活\n- 平台调性：社群氛围，需要制造参与感\n\n### 语气规范\n\n- 语气活跃但不浮夸\n- 多用\"各位家长\"\"咱们群里\"等集体称呼\n- 善用企微群工具：接龙、投票、群公告\n- 控制消息频率——每天最多2-3条群消息，不刷屏\n\n### 开场话术（群内互动）\n\n**方式1：投票式开场**\n\n```\n各位家长好~ 做个小调查：\n\n您家孩子目前最让您头疼的学习问题是？\nA. 粗心丢分\nB. 难题不会做\nC. 偏科严重\nD. 学习没动力\n\n接龙回复字母就好~ 我会针对票数最高的问题，在群里分享一套实用方法。\n```\n\n**方式2：干货引导式**\n\n```\n各位家长好，我是百分教育的XX。\n\n今天分享一个家长群最常问的问题：孩子考试总是\"会做的题做错\"，到底是粗心还是有别的原因？\n\n答案是：90%不是真的粗心。\n\n想知道具体分析？扣1，我展开说说。\n```\n\n**方式3：案例引导式**\n\n```\n给大家分享一个真实案例：\n\n一个初二的男生，数学90分上不去。家长以为是\"不够努力\"，我们做了试卷分析后发现——他的基础模块得分率98%，丢分全在综合应用题。\n\n问题不是\"不努力\"，是缺乏思维拆题训练。针对性练了2个月，数学到了105分。\n\n类似情况的家长可以私信我，我帮您免费分析一下孩子的试卷。\n```\n\n### 群内深入对话规则\n\n- 群里只做\"钩子\"——引发兴趣，不在群里做完整咨询\n- 有家长在群里提问，**简短回答后引导私聊**：\n\n```\nXX妈妈提的这个问题很好，群里简单说两句：[简要回答]。\n\n要展开聊的话咱们私信说，每个孩子情况不一样，我帮您针对性分析。\n```\n\n- 每周固定时间做一次\"主题分享\"（周二/周四晚上8点），培养用户习惯\n- 分享内容结构：**问题引入 → 原因分析 → 方法建议 → 引导私聊/到校**\n\n### 群内接龙活动模板\n\n**学习问题接龙**\n\n```\n【接龙】孩子最近一次考试，哪科丢分最多？\n\n格式：年级+科目+大概丢了多少分\n例如：初一+数学+丢了15分\n\n我会挑几个典型情况，在群里做简单分析~\n```\n\n**限额诊断活动**\n\n```\n【本周福利】免费试卷深度分析，限5个名额\n\n把孩子最近一次考试的试卷拍给我（私信发），我们安排老师做逐题归因分析，出一份诊断报告。\n\n已有X位家长报名，还剩X个名额。需要的家长私信我报名。\n```\n\n### 企微群禁忌\n\n- 不刷屏——每天群消息不超过3条\n- 不在群里讨论个别孩子的成绩\n- 不在群里报价格——价格问题引导私聊\n- 不发纯广告——每条群消息必须有干货价值\n- 不跟家长在群里争论——有分歧私聊解决\n- 限额活动真实限额，不造假\n\n---\n\n## 四、抖音私信\n\n### 渠道特征\n\n- 用户画像：年轻家长偏多，注意力短，决策快\n- 用户行为：刷到短视频后冲动私信，热度窗口短（通常30分钟内）\n- 平台调性：快节奏、直接、视觉化\n\n### 语气规范\n\n- 极简——每条消息1-3句话，不超过4行\n- 直接——不铺垫，直接给选项或问核心问题\n- 配合视频内容——用户是看了某条视频才来的，要呼应视频主题\n- 快速响应——抖音私信必须5分钟内回复（热度窗口极短）\n\n### 开场话术\n\n**场景1：通用开场**\n\n```\n感谢关注！孩子学习上主要卡在哪？\n\nA. 粗心丢分\nB. 难题没思路\nC. 偏科\nD. 不想学\n\n选一个，我发您对应的解决方法。\n```\n\n**场景2：配合具体视频内容（粗心类视频）**\n\n```\n看到您对粗心这条视频感兴趣~\n\n孩子的粗心属于哪种？\n1. 算对了但抄错\n2. 审题看错条件\n3. 来不及做完\n\n选个数字，我给您针对性建议。\n```\n\n**场景3：配合具体视频内容（学习方法类视频）**\n\n```\n感谢关注~ 视频里讲的方法适合大部分孩子。\n\n您家孩子几年级？哪科比较头疼？\n\n告诉我，我帮您细化一下方案。\n```\n\n### 深入对话适配\n\n- 第一轮对话极简，拿到家长选择后再展开\n- 展开后每条消息仍然控制在3句以内\n- 尽快引导到微信继续聊——抖音私信体验差，长对话不合适：\n\n```\n抖音聊天不太方便，加个微信我发详细资料给您？\n\n微信号：XXXXXXX\n或者您发您的微信号，我来加您。\n```\n\n- 如果家长不愿加微信，在抖音内完成到\"发试卷\"或\"留电话\"即可：\n\n```\n也行，您把最近的试卷拍几张发我，我帮您分析。\n```\n\n### 抖音私信节奏\n\n| 步骤 | 时间 | 动作 |\n|------|------|------|\n| 1 | 5分钟内 | 回复开场选项 |\n| 2 | 家长选择后立即 | 发1-2句共情+归因 |\n| 3 | 紧接着 | 引导加微信或发试卷 |\n| 4 | 如未回复 | 2小时后发一条跟进 |\n| 5 | 仍未回复 | 不再跟进 |\n\n### 抖音禁忌\n\n- 不发长文——超过4行用户直接划走\n- 不用书面语——口语化、直接\n- 不要在第一条消息就要微信——先给价值，再引导转移\n- 不回复慢——超过30分钟家长热度就没了\n- 不在评论区引导私信时透露太多——留悬念，让用户主动来\n\n---\n\n## 五、跨渠道统一规范\n\n### 所有渠道共同遵守\n\n| 规范 | 说明 |\n|------|------|\n| 选项式开场 | 所有渠道第一条消息必须给选项，不问开放式问题 |\n| 三段式沟通 | 共情(30%) → 证据(40%) → 行动(30%) |\n| 沟通红线 | 严格遵守 `08_rules/communication_redlines.md` 所有禁令 |\n| 主动跟进上限 | 所有渠道不超过3次主动联系 |\n| 价值优先 | 每条消息必须提供价值，不是纯销售 |\n| 转人工条件 | 投诉/退费/情绪激动/心理问题 → 立即转人工 |\n\n### 跨渠道转移规范\n\n当需要从一个渠道转到另一个渠道时（典型场景：抖音→微信，小红书→微信）：\n\n**引导话术：**\n\n```\n咱们加个微信方便些，我把详细资料和分析报告发您微信上。\n\n微信号：XXXXXXX\n\n或者您告诉我您的微信号/手机号，我来添加您。\n```\n\n**转移后的衔接话术（微信端）：**\n\n```\nXX妈妈/爸爸您好，我是百分教育的XX，刚在[小红书/抖音]上聊过的。\n\n之前您提到孩子[复述问题]，我这边整理了一些分析和建议，接下来在微信上跟您详细聊~\n```\n\n### 响应时效标准\n\n| 渠道 | 首次响应 | 后续回复 |\n|------|---------|---------|\n| 小红书私信 | 30分钟内 | 1小时内 |\n| 微信 | 15分钟内（工作时间） | 30分钟内 |\n| 企微群 | 群消息按计划发送 | 私聊15分钟内 |\n| 抖音私信 | 5分钟内 | 15分钟内 |\n\n> 非工作时间（21:00-08:00）：自动回复\"感谢您的咨询，明天上午我第一时间回复您\"。\n", "lines": 407, "size": 12219}, "04_scripts__content_templates": {"id": "04_scripts__content_templates", "path": "04_scripts/content_templates.md", "name": "content_templates", "title": "百分教育内容模板库 (Content Templates)", "tags": "[type:template, role:marketing, role:ops]", "module": "04_scripts", "content": "---\ntags: [type:template, role:marketing, role:ops]\nlast_updated: 2026-03-22\nmaintainer: 运营团队\nrelated_files:\n  - 09_agents/content_factory_agent.md\n  - 06_ops/content_calendar_guide.md\n  - 08_rules/communication_redlines.md\n  - 08_rules/marketing_boundary.md\n---\n\n# 百分教育内容模板库\n\n本文件提供6大内容类型 x 5大平台的代表性模板。员工可直接套用或交由内容工厂Agent自动填充。\n\n所有模板均遵循品牌调性：专业、温暖、数据驱动，绝不使用焦虑营销或空洞承诺。\n\n---\n\n## 一、微信公众号模板\n\n### 1.1 错题分析类\n\n**标题公式**：[考试名称]+[学段]+[学科]丢分最多的[N]道题，逐题拆解\n\n```\n【标题】期中考数学丢分最多的3道题，逐题拆解给你看\n\n【导语】\n上周期中考结束，我们收集并分析了超过200份初二数学试卷。结果发现，有3道题的错误率超过70%。这些错误背后，不是\"粗心\"那么简单。\n\n【正文结构】\n\n## 一、第[X]题：[题目类型]（错误率XX%）\n\n**题目概要**：[简要描述题目]\n\n**错误类型分布**：\n- 概念性错误：XX%——对[知识点]的理解停留在表面\n- 审题性错误：XX%——忽略了题目中的[关键条件]\n- 方法性错误：XX%——用了[错误方法]而非[正确方法]\n\n**思维层次分析**（布鲁姆分类）：\n这道题要求学生达到\"应用\"层次，但多数学生停留在\"记忆\"层次——能记住公式，但不会在变式情境中灵活调用。\n\n**正确思路**：\n[用思维架构方式讲解，不写完整步骤，强调\"怎么想\"]\n\n## 二、第[X]题：...\n[同上结构]\n\n## 三、第[X]题：...\n[同上结构]\n\n## 错误簇分析\n\n这3道题的错误并非孤立存在，它们共同指向一个核心薄弱点：[知识模块名称]。当这个模块不扎实时，涉及到的所有变式题都会出问题。\n\n## 家长可以做什么\n\n1. **本周**：让孩子把这3道题重新做一遍，不看答案，限时[X]分钟\n2. **本月**：关注[知识模块]相关的作业和测验表现\n3. **如需专业诊断**：可预约我们的试卷深度分析服务，逐题归因，给出针对性改善方案\n\n---\n百分教育 | 好思维，让学习更轻松\n18年深耕湛江 | 30000+学员信赖\n```\n\n**配图建议**：\n- 封面图：题目截图（匿名化）+ 大字标题\n- 正文配图：错误类型分布饼图、思维导图示例\n\n**关键词**：湛江数学、期中考、错题分析、初二数学、思维培养\n\n---\n\n### 1.2 学员案例类\n\n**标题公式**：从[起始分]到[结果分]，[身份描述]用了[时间]做了什么\n\n```\n【标题】从72分到89分，这个初二学生用了一个学期做了3件事\n\n【导语】\n小A（化名）去年9月入学时，数学成绩稳定在70-75分区间。一个学期后的期末考，他拿到了89分。这不是\"开窍\"的故事，是系统训练的结果。\n\n【正文结构】\n\n## 入学诊断：问题出在哪\n\n入学时我们做了一次试卷深度分析，发现3个核心问题：\n1. **审题习惯差**：30%的丢分来自没看清条件\n2. **几何模型空白**：全等三角形的4个判定条件只能稳定使用2个\n3. **计算不规范**：解方程步骤跳跃，导致检查时找不到错误\n\n## 第1件事：建立错题本体系（第1-2周）\n\n不是简单地抄错题。我们教他用\"三栏法\"：\n- 左栏：原题 + 错误解法\n- 中栏：错因分类（概念/计算/审题/方法）\n- 右栏：正确思路（不写步骤，写\"怎么想\"）\n\n## 第2件事：几何模型专项突破（第3-8周）\n\n针对全等三角形和相似模型，用母题训练法：\n- 每个模型精选5道母题\n- 每道母题延伸3-5个变式\n- 限时训练，强化模型识别速度\n\n## 第3件事：审题习惯重塑（贯穿全程）\n\n每次做题前，先用红笔圈出题目中的3个关键信息，再动笔。这个习惯用了6周才稳定下来。\n\n## 数据变化轨迹\n\n| 时间 | 成绩 | 关键变化 |\n|------|------|---------|\n| 9月入学 | 72分 | 基础薄弱，几何模型空白 |\n| 10月月考 | 74分 | 刚开始训练，变化不明显 |\n| 11月期中 | 81分 | 审题丢分减少50%，几何题开始得分 |\n| 1月期末 | 89分 | 模型题正确率从30%提升至75% |\n\n## 写在最后\n\n小A的提升不是因为\"突然变聪明\"。是审题习惯、模型思维、错题体系三管齐下的结果。思维的改变需要时间，但方向对了，每一步都算数。\n\n---\n百分教育 | 好思维，让学习更轻松\n```\n\n**配图建议**：\n- 封面图：成绩对比数据图（72→89，箭头上升）\n- 正文配图：三栏错题本示例图、成绩变化折线图\n\n---\n\n### 1.3 教学理念类\n\n**标题公式**：[反常识观点] / 教了[X]年[学科]，我发现[洞察]\n\n```\n【标题】教了18年数学，我为什么坚持\"不讲基础题\"\n\n【导语】\n很多家长第一次来百分教育，听完一节课后会问：\"为什么不从基础讲起？\"这是我被问得最多的问题。今天说说我们的思考。\n\n【正文结构】\n\n## 一、基础题，学校已经讲得够好了\n\n[阐述机构定位：学校教育的有益补充，不重复课本内容]\n\n## 二、我们的课堂在做什么\n\n[用具体课堂场景说明：思维架构、母题模型、融合训练]\n- 课本内容不到30%\n- 80%是学生平时没接触过的拔高知识点\n- 每节课拉思维导图，不写完整步骤\n\n## 三、\"慢即是快\"的底层逻辑\n\n[阐述思维成长需要过程，预期管理]\n- 新学员可能觉得有挑战——这是正常的\n- 坚持1-2年系统训练后，审题速度和解题灵活性会有明显提升\n\n## 四、一个真实的例子\n\n[匿名学员案例，展示从\"不适应\"到\"享受思维训练\"的过程]\n\n---\n百分教育 | 好思维，让学习更轻松\n学习改变命运，思维成就未来\n```\n\n---\n\n### 1.4 家长教育类\n\n```\n【标题】孩子成绩下降，家长最该做的不是找老师，而是这3件事\n\n【导语】\n每次考试成绩一出，总有家长焦急地打电话来：\"老师，孩子这次又下降了，怎么办？\"理解这种焦虑。但在找老师之前，有3件事家长可以先做。\n\n【正文结构】\n\n## 第1件事：先看卷子，别先看分数\n[引导家长做错题归因，而非只关注分数]\n\n## 第2件事：问孩子\"哪道题你觉得不该错\"\n[用提问代替批评，激活孩子的元认知]\n\n## 第3件事：和孩子一起定一个\"下次考试小目标\"\n[具体、可量化、孩子认同的目标]\n\n## 什么时候该找老师\n[不回避问题，给出明确的信号指标]\n\n---\n百分教育 | 好思维，让学习更轻松\n```\n\n---\n\n### 1.5 升学干货类\n\n```\n【标题】湛江小升初时间线：五年级家长必须知道的6个关键节点\n\n【导语】\n小升初不是六年级才开始准备的事。如果你的孩子现在五年级，这份时间线请收好。\n\n【正文结构】\n\n## 节点1：五年级暑假——黄金起步期\n[课程规划建议]\n\n## 节点2：六年级上学期——基础夯实期\n[知识模块清单]\n\n## 节点3：寒假——专项突破期\n[重点训练方向]\n\n## 节点4：六年级下学期3-4月——模拟冲刺期\n[模拟考训练建议]\n\n## 节点5：5月——选拔考试月\n[考试准备要点]\n\n## 节点6：6-7月——分班考+衔接\n[初中衔接规划]\n\n## 各节点学习时间分配建议表\n[表格形式呈现]\n\n---\n百分教育 | 好思维，让学习更轻松\n累计服务30000+湛江学子 | 12000+湛江真题库\n```\n\n---\n\n### 1.6 课堂高光类\n\n```\n【标题】一道压轴题，5种解法——今天课堂上发生的事\n\n【导语】\n今天初三卓越班的课堂上，发生了一件让我特别有成就感的事。\n\n【正文结构】\n\n## 这道题是什么\n[简述题目，不需要完整题目，描述核心考点]\n\n## 标准解法\n[常规思路，大多数学生第一反应]\n\n## 第2种解法：有个学生说\"老师我用相似可以吗\"\n[记录学生的思考过程]\n\n## 第3-5种解法\n[展示不同学生的思维路径]\n\n## 这就是\"思维架构\"的意义\n[升华到教学理念：不是教一种解法，而是培养多角度思考的能力]\n\n---\n百分教育 | 好思维，让学习更轻松\n```\n\n---\n\n## 二、小红书笔记模板\n\n### 2.1 错题分析类\n\n```\n【封面文案】\n初二数学 | 这道题90%的学生都做错了\n\n【正文】\n姐妹们/家长们，来看一道\"陷阱题\"\n\n上周分析了200+份初二数学试卷\n这道题错误率高达78%\n\n先说答案：不是粗心！是思维漏洞！\n\n错误原因拆解：\n1. 概念混淆（占45%）\n   把[A概念]和[B概念]搞混了\n2. 审题遗漏（占30%）\n   没注意到题目里的\"[关键词]\"\n3. 方法选错（占25%）\n   用了[错误方法]，其实应该用[正确方法]\n\n怎么改？给3个建议：\n- 做题前先圈出3个关键条件\n- 把[A概念]和[B概念]的区别写在错题本上\n- 找3道同类型变式题限时练习\n\n保存这条笔记，下次考试前翻出来看看\n\n#湛江 #湛江教育 #初二数学 #数学思维 #错题分析 #期中考试 #学习方法 #思维培养 #数学提分 #湛江家长\n```\n\n**配图建议**：\n1. 封面：大字\"这道题90%都做错了\"+ 题目截图（模糊化）\n2-3. 错因分析图解\n4-5. 正确解题思路（手写风格）\n6. 改善建议清单\n7-9. 同类型变式题（可选）\n\n---\n\n### 2.2 学员案例类\n\n```\n【封面文案】\n数学从72→89分 | 他只做了3件事\n\n【正文】\n分享一个真实案例（家长已授权）\n\n初二男生，去年9月来的时候数学72分\n一个学期后期末考89分\n\n不是开窍，是方法对了\n\n这3件事他每天都在做：\n\n1. 三栏错题本\n左边：原题+错误解法\n中间：错因分类\n右边：正确思路（写\"怎么想\"不写步骤）\n\n2. 母题模型训练\n每个几何模型5道母题\n每道母题3-5个变式\n限时做，练的是模型识别速度\n\n3. 审题红笔法\n做题前先用红笔圈3个关键信息\n再动笔\n这个习惯他练了6周才稳定\n\n成绩变化：\n9月72 → 10月74 → 11月81 → 1月89\n\n前两个月变化不大是正常的\n思维改变需要时间\n但方向对了每一步都算数\n\n#湛江教育 #数学提分 #学习方法 #初中数学 #错题本 #思维培养 #湛江 #家长必看 #学习习惯 #数学思维\n```\n\n---\n\n### 2.3 教学理念类\n\n```\n【封面文案】\n教了18年数学 | 说几句大实话\n\n【正文】\n在湛江教了18年数学\n今天说几个可能不太好听的大实话\n\n1. 基础题不用来机构学\n学校老师讲得够好了\n机构的价值是帮你搭建思维架构\n从\"会做题\"升级为\"会思考\"\n\n2. 短期见效不等于真的学会了\n有些孩子上了一个暑假觉得\"没什么变化\"\n但坚持1-2年的系统训练\n审题速度和解题灵活性会有质的飞跃\n\n3. 不是所有孩子都需要报班\n如果孩子课本知识都没掌握\n先把学校的搞扎实\n75分以下建议先一对一查漏补缺\n而不是直接进小班\n\n4. 好的教育是让孩子学会思考\n不是让他记住更多答案\n而是教他\"这道题我该怎么想\"\n\n说完了，不一定对\n但这是我们一直在坚持的事\n\n#湛江 #教育理念 #数学思维 #K12教育 #湛江教育 #家长必看 #学习方法 #思维培养 #教育观\n```\n\n---\n\n### 2.4 家长教育类\n\n```\n【封面文案】\n孩子成绩下降 | 家长千万别做这3件事\n\n【正文】\n每次考完试成绩不理想\n家长的第一反应很关键\n\n先说3个千万别做的：\n1. 别第一时间质问\"怎么又考这么差\"\n2. 别拿别人家孩子比较\n3. 别马上说\"给你报个补习班\"\n\n然后说3个该做的：\n\n1. 先看卷子再看分数\n   打开卷子，和孩子一起看每道错题\n   分清哪些是\"会但做错了\"\n   哪些是\"真的不会\"\n\n2. 问一个问题：\"你觉得哪道题不该错？\"\n   这个问题激活的是孩子的元认知\n   比你批评100句都有用\n\n3. 一起定一个小目标\n   不要说\"下次考90\"\n   说\"下次这类题争取做对2道\"\n   具体、可量化、孩子自己认同的\n\n情绪稳定的家长\n才能养出心态稳定的孩子\n\n#家庭教育 #湛江家长 #学习方法 #考试 #亲子沟通 #教育方法 #元认知 #湛江教育 #成绩提升\n```\n\n---\n\n### 2.5 升学干货类\n\n```\n【封面文案】\n湛江小升初 | 五年级就该开始准备了\n\n【正文】\n湛江的小升初不是六年级才开始的事\n如果你家孩子现在五年级\n这份时间表请收好\n\n五年级暑假（黄金起步期）：\n- 数学：奥数基础+计算能力强化\n- 英语：音标+基础语法过关\n- 语文：阅读理解+写作训练\n\n六年级上学期（夯实期）：\n- 各科知识点查漏补缺\n- 开始接触选拔考真题\n- 建立错题本体系\n\n寒假（专项突破期）：\n- 数学重点模块冲刺\n- 英语阅读+完型专项\n- 限时模拟训练\n\n六年级下学期3-4月（冲刺期）：\n- 每周1-2次全真模拟\n- 薄弱环节定向突破\n- 心态调整\n\n5月（考试月）：\n- 保持节奏，不加新内容\n- 回归错题本\n- 考前减压\n\n时间不等人\n但方向比速度更重要\n建议尽早规划，以下是几个思考方向\n\n有具体问题可以留言或私信\n\n#湛江小升初 #小升初 #升学规划 #五年级 #湛江教育 #学习规划 #名校冲刺 #湛江家长\n```\n\n---\n\n### 2.6 课堂高光类\n\n```\n【封面文案】\n今天课堂上 | 一个学生找到了第5种解法\n\n【正文】\n今天初三卓越班\n一道压轴题我准备了3种解法\n结果学生们找到了5种\n\n第1种：常规辅助线法（大多数学生的第一反应）\n第2种：相似模型法（一个学生主动提出的）\n第3种：坐标法（教材外的方法，但这个学生自己想到了）\n第4种：面积法（意料之外，但完全正确）\n第5种：旋转构造法（全班鼓掌的那种）\n\n这就是我们说的\"思维架构\"——\n不是教你一种解法让你去套\n而是培养你多角度思考的能力\n\n当一个学生能从不同角度切入同一道题\n他面对任何新题都不会慌\n\n这种能力\n靠刷题刷不出来\n得靠系统的思维训练\n\n#数学课堂 #思维培养 #压轴题 #湛江教育 #初三数学 #数学思维 #解题方法 #课堂实录\n```\n\n---\n\n## 三、朋友圈文案模板\n\n### 3.1 故事型\n\n#### 错题分析类\n```\n今天分析了一份初二数学卷子，发现一个有意思的规律：这个学生的5道错题，看似分散在不同章节，但归因后发现——全部指向同一个薄弱点：几何模型识别。\n\n找到\"错误簇\"，比逐题纠错高效10倍。\n\n[配图：匿名化的错题归因表]\n```\n\n#### 学员案例类\n```\n刚才和一个家长通完电话。她说：\"老师，我儿子现在做数学题之前会先画思维导图了，以前从来不会这样。\"\n\n比分数提升更让我开心的，是思维习惯的改变。\n\n[配图：学生思维导图（已授权）]\n```\n\n#### 课堂高光类\n```\n今天课上问了一个问题：\"这道题你们能想到几种解法？\"\n\n安静了10秒钟后，一个平时不太发言的学生举手：\"老师，我用面积法可以吗？\"\n\n可以。太可以了。\n\n[配图：课堂现场（已授权）]\n```\n\n---\n\n### 3.2 数据型\n\n#### 错题分析类\n```\n分析了本次期中考200+份初二数学试卷：\n- 错误率最高的题：第22题（78%）\n- 最常见错因：审题遗漏关键条件（占45%）\n- 最容易被忽视的丢分点：计算步骤跳跃\n\n数据不会说谎。想了解孩子的具体丢分原因，可以预约试卷深度分析。\n\n[配图：错误率统计图]\n```\n\n#### 学员案例类\n```\n一组真实数据（家长已授权）：\n- 入学成绩：数学72分\n- 3个月后：81分\n- 6个月后：89分\n- 核心改变：审题丢分减少50%，几何题正确率从30%→75%\n\n不是变聪明了。是思维训练的复利效应。\n\n[配图：成绩变化曲线]\n```\n\n#### 升学干货类\n```\n一组湛江中考数据：\n- 数学压轴题平均得分率：不到30%\n- 压轴题分值：14分\n- 拉开差距的关键：几何综合+函数压轴\n\n这14分，靠的不是刷题量，是模型思维。\n\n[配图：考试数据图]\n```\n\n---\n\n### 3.3 互动型\n\n#### 家长教育类\n```\n考完试后，你对孩子说的第一句话是什么？\n\nA. \"考了多少分？\"\nB. \"觉得自己发挥得怎么样？\"\nC. \"有没有哪道题本来会做但没做对的？\"\n\n选B或C的家长，孩子的考试心态通常更稳。\n\n你会选哪个？评论区聊聊。\n\n[配图：选项卡片]\n```\n\n#### 教学理念类\n```\n一个思考题：\n\n如果你的孩子数学考了85分，你更希望他：\nA. 下次考90分\nB. 能说清楚那15分是怎么丢的\n\n选A是结果导向，选B是过程导向。\n我们更看重B。因为搞清楚\"怎么丢的\"，90分是自然的结果。\n\n[配图：思考题卡片]\n```\n\n#### 课堂高光类\n```\n猜猜这道题有几种解法？\n\n（题目图片）\n\n我们课堂上初三的学生找到了5种。\n你家孩子能找到几种？评论区试试。\n\n[配图：题目截图]\n```\n\n---\n\n## 四、抖音脚本模板\n\n### 4.1 错题分析类\n\n```\n【时长】45秒\n\n【开头钩子 | 0-3秒】\n（面对镜头，语速快）\n\"这道题，90%的学生都做错了。不是因为难，是因为一个思维陷阱。\"\n\n【字幕】这道题90%都做错了\n\n【正文 | 3-35秒】\n（切到题目特写）\n\"来看这道题——\"\n（画面：手指指向题目关键条件）\n\"大多数学生看到这里就开始算了。但他们漏掉了一个关键信息——\"\n（红圈标注关键条件）\n\"就是这里。这个条件一漏，后面全错。\"\n（切回面对镜头）\n\"这不是粗心。这是审题习惯的问题。怎么解决？\"\n（竖起三根手指）\n\"做题前，先用红笔圈出三个关键条件，再动笔。坚持两周，审题丢分至少减少一半。\"\n\n【结尾CTA | 35-45秒】\n\"想知道你家孩子的丢分原因？在评论区扣1，我帮你分析。\"\n（画面：出现百分教育logo和联系方式）\n\n【字幕】关注我，每周拆解一道易错题\n```\n\n---\n\n### 4.2 学员案例类\n\n```\n【时长】50秒\n\n【开头钩子 | 0-3秒】\n\"数学从72分到89分，他用了一个学期。不是开窍，是做对了3件事。\"\n\n【字幕】72→89分，只做了3件事\n\n【正文 | 3-40秒】\n（画面：写字板/手写板展示）\n\"第一件事——三栏错题本。\"\n（手写展示三栏结构）\n\"不是抄错题。左边写原题和错解，中间写错因分类，右边写正确思路——注意，是写'怎么想'，不是写步骤。\"\n\n\"第二件事——母题模型训练。\"\n（画面切换）\n\"每个知识模型精选5道母题，每道延伸3-5个变式，限时做。练的是模型识别速度。\"\n\n\"第三件事——审题红笔法。\"\n\"每次做题前，先用红笔圈出三个关键信息，再动笔。这个习惯他练了6周才稳定。\"\n\n（面对镜头）\n\"前两个月分数变化不大，第三个月开始提速。思维改变需要时间，但方向对了，每一步都算数。\"\n\n【结尾CTA | 40-50秒】\n\"想要错题本模板的，评论区扣'错题本'，我发给你。\"\n\n【字幕】关注百分教育，18年专注思维培养\n```\n\n---\n\n### 4.3 教学理念类\n\n```\n【时长】35秒\n\n【开头钩子 | 0-3秒】\n\"教了18年数学，我从来不给学生讲基础题。\"\n\n【字幕】18年数学老师不讲基础题？\n\n【正文 | 3-28秒】\n（面对镜头，自然表达）\n\"为什么？因为基础题学校老师讲得够好了。\"\n\"来机构重复讲一遍，是浪费孩子的时间。\"\n\"我们只做一件事——帮学生搭建思维架构。\"\n\"什么意思？就是教他'这道题我该怎么想'，而不是'这道题的答案是什么'。\"\n\"课本内容在我们课堂上不到30%。80%的时间，是拔高训练和模型思维。\"\n\"新来的学生一开始可能觉得跟不上，这很正常。\"\n\"但坚持一两年，审题速度和解题灵活性，跟同龄人完全不一样。\"\n\n【结尾CTA | 28-35秒】\n\"认同这个理念的，双击点个赞。想了解的，关注我慢慢看。\"\n\n【字幕】好思维，让学习更轻松\n```\n\n---\n\n### 4.4 家长教育类\n\n```\n【时长】40秒\n\n【开头钩子 | 0-3秒】\n\"孩子考砸了，你说的第一句话决定了他下次的表现。\"\n\n【字幕】考砸后你说的第一句话很重要\n\n【正文 | 3-32秒】\n\"大多数家长的第一反应是'怎么又考这么差'。\"\n\"这句话传递的信号是：我只在乎分数。\"\n\"孩子听完以后，要么焦虑，要么摆烂。\"\n\n\"换一句话试试：'你觉得哪道题不该错？'\"\n\"这句话激活的是孩子的元认知——\"\n\"就是让他自己去复盘、去反思。\"\n\"这比你批评100句都有用。\"\n\n\"然后和他一起定一个小目标。\"\n\"不说'下次考90'，说'下次这类题争取做对2道'。\"\n\"具体、可量化、孩子自己认同。\"\n\n【结尾CTA | 32-40秒】\n\"情绪稳定的家长，才能养出心态稳定的孩子。\"\n\"关注我，每周分享一个家庭教育实用技巧。\"\n```\n\n---\n\n### 4.5 升学干货类\n\n```\n【时长】50秒\n\n【开头钩子 | 0-3秒】\n\"如果你家孩子现在五年级，小升初的准备，现在就该开始了。\"\n\n【字幕】五年级家长必看 | 小升初时间线\n\n【正文 | 3-42秒】\n（画面：时间线图逐步展开）\n\"6个关键节点，记好了——\"\n\"第一，五年级暑假。这是黄金起步期。数学开始接触奥数基础，英语音标要过关。\"\n\"第二，六上学期。查漏补缺，开始接触选拔考真题。\"\n\"第三，寒假。数学重点模块专项突破，限时训练开始。\"\n\"第四，六下3到4月。每周1-2次全真模拟，定向补薄弱点。\"\n\"第五，5月。考试月。不加新内容，回归错题本，调整心态。\"\n\"第六，6到7月。分班考准备加初中衔接。\"\n\n\"时间不等人，但方向比速度更重要。\"\n\n【结尾CTA | 42-50秒】\n\"需要详细规划的，评论区扣'小升初'，我私信发给你。\"\n\n【字幕】百分教育 | 18年深耕湛江教育\n```\n\n---\n\n### 4.6 课堂高光类\n\n```\n【时长】30秒\n\n【开头钩子 | 0-3秒】\n\"一道压轴题，我准备了3种解法，结果学生找到了5种。\"\n\n【字幕】学生比老师多找到2种解法\n\n【正文 | 3-25秒】\n（画面：课堂实拍/手写板快速展示5种解法）\n\"第一种：常规辅助线法。\"\n\"第二种：有个学生说'老师我用相似行不行'——行！\"\n\"第三种：坐标法。教材上没有，他自己想到的。\"\n\"第四种：面积法。意料之外，但完全对。\"\n\"第五种：旋转构造法。说完全班鼓掌。\"\n\n（面对镜头）\n\"这就是思维架构的力量——不是记住一种解法，是学会从多个角度思考。\"\n\n【结尾CTA | 25-30秒】\n\"你家孩子能想到几种？评论区试试。\"\n```\n\n---\n\n## 五、企微群消息模板\n\n### 5.1 早安问候+干货\n\n```\n各位家长早上好\n\n分享一个小技巧：\n\n孩子做数学作业时，如果遇到不会的题\n先别急着讲答案\n让他说说\"这道题你觉得考的是什么知识点\"\n\n这个动作叫\"元认知激活\"\n能帮孩子从\"做题\"升级为\"思考\"\n\n试试看，效果比你想象的好\n\n祝大家一天顺利\n```\n\n### 5.2 错题分析干货分享\n\n```\n各位家长好\n\n本周的\"一题一拆\"来了\n\n本周易错题：[题目简要描述]\n\n错误率：班级中XX%的学生做错\n最常见错因：[具体原因]\n\n正确思路（3步）：\n1. 先识别题型——这是[模型名称]\n2. 找关键条件——[关键条件]\n3. 选择方法——用[方法名称]而不是[常见错误方法]\n\n建议孩子本周找3道同类型的题练习\n限时10分钟/题\n\n有问题随时群里交流\n```\n\n### 5.3 学员案例分享\n\n```\n各位家长好\n\n分享一个好消息（家长已授权）\n\n本学期初二的小A同学\n入学时数学72分\n本次期末考试89分\n\n关键改变：\n- 审题丢分减少50%\n- 几何模型题正确率从30%提升到75%\n- 养成了错题归因的习惯\n\n不是一夜之间的变化\n是一个学期系统训练的结果\n\n每一步努力都算数\n为小A点赞\n```\n\n### 5.4 活动通知\n\n```\n各位家长好\n\n[活动名称] 通知\n\n时间：X月X日（周X）XX:00-XX:00\n地点：[校区名称]\n内容：[活动内容简述]\n名额：限XX人（小班制，确保互动质量）\n\n适合：[目标人群描述]\n\n参加方式：群里回复\"报名+孩子姓名+年级\"即可\n\n详细介绍：[链接/海报]\n\n有任何问题随时在群里问\n```\n\n### 5.5 考前提醒\n\n```\n各位家长好\n\n[考试名称]还有X天\n\n考前几个建议供参考：\n\n1. 不加新内容\n   这几天不要学新知识点\n   回归错题本，重做标记过的题\n\n2. 保持节奏\n   作息正常，不熬夜突击\n   适当运动，缓解紧张\n\n3. 审题习惯\n   提醒孩子做题前先圈出关键条件\n   宁可慢3秒审题，不要快3秒丢分\n\n4. 家长的角色\n   情绪稳定是最好的支持\n   少说\"好好考\"，多说\"正常发挥就行\"\n\n加油\n有任何问题随时沟通\n```\n\n### 5.6 互动话题\n\n```\n各位家长好\n\n今天聊个话题：\n\n你家孩子有没有一个\"学习小习惯\"\n是让你觉得特别欣慰的？\n\n不一定是学习成绩相关\n可能是——\n每天整理书包、做题前先读题两遍、考完会自己分析错题...\n\n欢迎分享\n好的习惯值得被看见和鼓励\n```\n\n---\n\n## 六、模板使用说明\n\n### 使用流程\n\n1. 确定内容类型和目标平台\n2. 在本文件中找到对应模板\n3. 用实际素材替换模板中的 `[占位符]`\n4. 对照品牌调性指南自查（详见 `09_agents/content_factory_agent.md`）\n5. 提交审核后发布\n\n### 素材替换规则\n\n- `[X]` / `[XX]`：替换为具体数字\n- `[知识点]` / `[模型名称]`：替换为具体学科内容\n- `[校区名称]`：赤坎（盛和园/京基/百园路）、霞山、坡头\n- 学员案例：必须匿名化 + 获得家长书面授权\n\n### 注意事项\n\n- 所有数据必须真实，不得编造\n- 学员信息必须匿名化处理\n- 发布前确认未触碰任何沟通红线（详见 `08_rules/communication_redlines.md`）\n- 发布前确认未触碰营销边界（详见 `08_rules/marketing_boundary.md`）\n- 不使用\"续费\"，用\"继续\"替代\n- 不贬低竞品，只展示自身价值\n", "lines": 985, "size": 26078}, "04_scripts__customer_service_flow": {"id": "04_scripts__customer_service_flow", "path": "04_scripts/customer_service_flow.md", "name": "customer_service_flow", "title": "客服话术流程图 — 完整对话树 (Customer Service Flow)", "tags": "[type:script, role:customer-service, scene:online-consultation]", "module": "04_scripts", "content": "---\ntags: [type:script, role:customer-service, scene:online-consultation]\nlast_updated: 2026-03-22\nmaintainer: 运营团队\nrelated_files:\n  - 09_agents/customer_service_agent.md\n  - 04_scripts/channel_adaptation_guide.md\n  - 08_rules/communication_redlines.md\n  - 02_courses/course_selector.md\n---\n\n# 客服话术流程图 — 完整对话树\n\n---\n\n## 流程总览\n\n```\n开场（选项式）\n  |\n  +-- A. 粗心丢分\n  |     +-- A1. 计算抄写错误\n  |     +-- A2. 审题不仔细\n  |     +-- A3. 时间不够\n  |\n  +-- B. 难题不会做\n  |     +-- B1. 基础有漏洞\n  |     +-- B2. 不会拆题\n  |     +-- B3. 走不到最后\n  |\n  +-- C. 偏科严重\n  |     +-- C1. 信息收集\n  |     +-- C2. 归因判断\n  |     +-- C3. 方案推荐\n  |\n  +-- D. 学习没动力\n  |     +-- D1. 拖拉型\n  |     +-- D2. 无所谓型\n  |     +-- D3. 试过放弃型\n  |\n  +-- 异议处理（随时可能触发）\n        +-- E1. 价格贵\n        +-- E2. 要考虑\n        +-- E3. 孩子不愿意\n        +-- E4. 学校够了\n        +-- E5. 别的机构没效果\n```\n\n---\n\n## 开场节点\n\n**目标：** 让家长回复第一句话。不问开放式问题，给2-4个选项。\n\n**话术：**\n\n```\n您好，我是百分教育的学习顾问。\n\n想了解一下，孩子目前遇到的学习困扰主要是哪种？\n\nA. 粗心丢分——明明会做却做错\nB. 难题不会做——遇到大题就卡住\nC. 偏科严重——某一科一直上不去\nD. 学习没动力——催着才学\n\n回复字母就行。\n```\n\n> 注：具体措辞根据渠道微调，详见 `04_scripts/channel_adaptation_guide.md`\n\n---\n\n## 分支A：粗心丢分\n\n### A-L1 诊断追问\n\n**触发条件：** 家长选择A / 提到\"粗心\"\"马虎\"\"会做的题做错了\"\n\n**话术：**\n\n```\n粗心其实分好几种情况，原因不同，解决方法也不同。\n\n我帮您判断一下——孩子的粗心更像哪种？\n\n1. 计算过程对了，但抄错数字或写错答案\n2. 审题不仔细，漏看条件或看错数字\n3. 做题速度慢，考试时间不够来不及检查\n\n选个数字就行~\n```\n\n### A-L2-1 计算抄写错误 → 共情+归因\n\n**触发条件：** 家长选择1 / 描述\"抄错\"\"手滑\"\"眼睛看对了手写错了\"\n\n**话术：**\n\n```\n这种\"手滑型\"粗心非常普遍，很多家长以为是态度问题，其实不是。\n\n核心原因是解题时工作记忆负荷过大——孩子脑子在想下一步，手还在写上一步，一分神就写错了。\n\n这不是\"再细心一点\"能解决的，靠提醒和惩罚也没用。需要的是系统训练解题规范和书写流程——把解题动作标准化，让\"写\"变成自动化操作，脑子才能腾出空间来检查。\n```\n\n→ 进入 A-L3\n\n### A-L2-2 审题不仔细 → 共情+归因\n\n**触发条件：** 家长选择2 / 描述\"看错题\"\"漏条件\"\"题目没看完就做\"\n\n**话术：**\n\n```\n审题问题的背后通常是\"信息提取能力\"不足。\n\n孩子不是不认真看，而是没有训练过结构化读题的方法：哪些是已知条件、哪些是隐含条件、题目到底问的是什么。\n\n我们有一套\"审题三步法\"训练：\n第一步：圈出关键数据和条件\n第二步：标记隐含条件和陷阱词\n第三步：用自己的话复述\"这道题让我求什么\"\n\n训练2-3周，审题失误率通常能下降一半以上。\n```\n\n→ 进入 A-L3\n\n### A-L2-3 时间不够 → 共情+归因\n\n**触发条件：** 家长选择3 / 描述\"做不完\"\"来不及检查\"\"最后几题空着\"\n\n**话术：**\n\n```\n时间不够通常不是\"做得慢\"，而是基础题的熟练度不够——孩子在本该快速搞定的题上花了太多时间，留给难题和检查的时间就不够了。\n\n解决方法不是\"做快一点\"，而是提升基础题的自动化程度。就像开车，熟练了就不需要想\"先踩离合还是先挂挡\"，省下来的认知资源可以专注路况。\n\n需要做的是针对孩子薄弱的基础模块做限时训练，把基础题的反应速度练上去。\n```\n\n→ 进入 A-L3\n\n### A-L3 方案+邀约（A分支统一收口）\n\n**话术：**\n\n```\n要解决粗心问题，第一步是量化——到底因为粗心丢了多少分、丢在哪些类型的题上。\n\n建议这样做：\n1. 您把孩子最近一次考试的试卷拍给我\n2. 我们帮您做一次免费的逐题归因分析，区分\"真不会\"和\"不该错\"\n3. 分析完会出一份报告，附带针对性的训练建议\n\n拍照发我就行，分析报告24小时内给您。\n\n或者也可以直接带孩子来校区，面对面分析更准确。您在赤坎、霞山还是坡头？\n```\n\n---\n\n## 分支B：难题不会做\n\n### B-L1 诊断追问\n\n**触发条件：** 家长选择B / 提到\"难题\"\"大题\"\"不会做\"\"没思路\"\"压轴题\"\n\n**话术：**\n\n```\n难题做不出来，卡点通常在不同地方：\n\n1. 基础知识有漏洞——简单题能做，一到综合题就暴露\n2. 基础还行，但不会\"拆题\"——看到大题不知从哪下手\n3. 能想到一部分思路，但走不到最后\n\n孩子更符合哪种？\n```\n\n### B-L2-1 基础漏洞 → 共情+归因\n\n**触发条件：** 家长选择1 / 描述\"基础不好\"\"之前没学好\"\"知识点有断层\"\n\n**话术：**\n\n```\n基础漏洞就像地基——看起来不严重，但上面盖的楼越高，问题暴露得越明显。\n\n好消息是，基础漏洞是所有问题中最容易修复的。关键是精准定位：到底是哪几个模块出了问题？不需要从头学，只要把关键断层补上，综合题的得分就会明显提升。\n\n我们的做法是用学情诊断锁定具体的漏洞模块，然后集中火力突破，而不是大水漫灌式地\"从头复习\"。\n```\n\n→ 进入 B-L3\n\n### B-L2-2 不会拆题 → 共情+归因\n\n**触发条件：** 家长选择2 / 描述\"看到题不知道怎么下手\"\"单个会做组合起来不会\"\n\n**话术：**\n\n```\n这说明孩子的知识目前是\"点状\"的，各个知识点之间还没建立连接。单独考一个知识点没问题，但综合题需要同时调用多个知识点，孩子就不知道该用哪个了。\n\n这正是我们核心在做的训练——搭建\"思维架构\"。教孩子看到一道题时：\n- 先识别\"这道题考的是什么模型\"\n- 再调用对应的解题策略\n- 最后检验答案是否合理\n\n这种能力不是刷题能练出来的，需要有老师带着做\"解题思路的拆解训练\"。\n```\n\n→ 进入 B-L3\n\n### B-L2-3 走不到最后 → 共情+归因\n\n**触发条件：** 家长选择3 / 描述\"想到一半就卡了\"\"思路断了\"\"差一步\"\n\n**话术：**\n\n```\n能想到一半，说明基础和方向感都有了，差的是\"逻辑闭环\"——从条件到结论的完整推导链。\n\n这种情况提升空间非常大。通常是因为孩子在某几个关键的\"桥接步骤\"上不够熟练，导致推导链在中间断裂。\n\n我们的做法是带孩子做\"逆向拆题训练\"：从标准答案倒推，看每一步是怎么来的、为什么要这样走。练多了，孩子自己就能\"正向\"把完整的推导链搭出来。\n\n根据同类学员的经验，这种训练2-3个月通常能看到明显变化。\n```\n\n→ 进入 B-L3\n\n### B-L3 方案+邀约（B分支统一收口）\n\n**话术：**\n\n```\n要解决难题问题，先要搞清楚孩子具体卡在哪个层次。\n\n我们会按布鲁姆分类法做评估：\n- 记忆层（记不住公式定理）\n- 理解层（记住了但不理解原理）\n- 应用层（理解了但不会用）\n- 分析层（会用但不会拆解复杂题）\n- 综合层（不会把多个知识点组合使用）\n\n每个层次的训练方法不同，精准定位才能高效突破。\n\n方便发一张最近的试卷吗？我先帮您做个初步判断。孩子几年级、哪一科？\n```\n\n---\n\n## 分支C：偏科严重\n\n### C-L1 信息收集\n\n**触发条件：** 家长选择C / 提到\"偏科\"\"某科不好\"\"拖后腿\"\n\n**话术：**\n\n```\n偏科的情况我先了解一下：\n\n1. 孩子哪科比较强、哪科比较弱？\n2. 弱科大概在什么分数段？\n3. 弱科是\"一直都弱\"还是\"从某个学期开始掉下去的\"？\n\n您简单说说就行。\n```\n\n### C-L2 归因判断\n\n**触发条件：** 家长提供了偏科信息\n\n**根据家长回答匹配以下两种归因：**\n\n**情况一：一直都弱（知识断层型）**\n\n```\n一直弱的话，大概率是在某个阶段有关键知识没吃透，后面内容都建立在这个基础上，所以越积越多。\n\n打个比方：数学的方程没学明白，后面函数、不等式全受影响。这种情况靠\"多做题\"是不行的，要先回头找到断层的位置，把地基补上。\n\n我们的做法是先做一次弱科的学情诊断，用数据精确定位断层在哪个模块，然后集中突破。通常1-2个月能把核心断层补上。\n```\n\n**情况二：某个学期开始掉的（阶段性脱节型）**\n\n```\n如果是从某个学期开始掉的，说明之前的基础还可以，是某个阶段的关键内容没跟上，后面就越来越吃力。\n\n这种情况修复起来比较快——只要找到那个\"拐点\"在哪，集中把那一段的核心知识补上，后面的内容理解起来就会顺畅很多。\n\n方便告诉我孩子是从什么时候开始成绩下滑的吗？比如初一下学期、五年级上学期？\n```\n\n### C-L3 方案+邀约\n\n**话术：**\n\n```\n偏科的解决方案取决于弱科的具体情况：\n\n- 如果分数在75分以下：建议先用一对一集中补基础断层，效率最高\n- 如果在75-90分之间：可以进同步培优小班，在补基础的同时跟上进度\n- 如果在90分左右：说明基础还行，重点是拔高训练\n\n建议您把弱科最近的试卷发给我，我帮您做一个免费分析，看看到底是\"基础断层\"还是\"方法问题\"。\n\n孩子几年级？我帮您看看适合哪种班型和校区。\n```\n\n---\n\n## 分支D：学习没动力\n\n### D-L1 诊断追问\n\n**触发条件：** 家长选择D / 提到\"不想学\"\"不爱学\"\"催着才做\"\"没有目标\"\n\n**话术：**\n\n```\n学习动力不足确实让家长很头疼。不过不同类型的\"没动力\"，解决方法完全不同：\n\n1. 作业拖拉，催着才做，做完就不管了\n2. 对成绩无所谓，好坏都不在意\n3. 其实想学好，但试了几次觉得没用就放弃了\n\n孩子更像哪种？\n```\n\n### D-L2-1 拖拉型 → 共情+归因\n\n**触发条件：** 家长选择1 / 描述\"拖拉\"\"磨蹭\"\"催着才做\"\n\n**话术：**\n\n```\n拖拉的孩子很多，家长别太焦虑。\n\n多数时候拖拉不是\"懒\"，而是孩子觉得\"做了也没用\"。做完作业成绩没变化，自然觉得学习是\"任务\"而不是\"有用的事\"。\n\n解决拖拉的核心不是加压，而是建立\"正反馈循环\"：\n- 让孩子在一个小模块上看到进步\n- 进步带来信心\n- 信心带来主动性\n\n我们的教学设计就是围绕这个逻辑——每节课让孩子解决一个之前不会的问题，当场就有成就感。\n```\n\n→ 进入 D-L3\n\n### D-L2-2 无所谓型 → 共情+归因\n\n**触发条件：** 家长选择2 / 描述\"不在乎成绩\"\"无所谓\"\"佛系\"\n\n**话术：**\n\n```\n\"无所谓\"的孩子让家长最无奈——说什么都不在乎。\n\n但其实大多数孩子的\"无所谓\"不是真不在乎，是\"在意了也没用\"——尝试过努力但没结果，用\"无所谓\"来保护自己不受挫败感的伤害。这在心理学上叫\"习得性无助\"。\n\n破解的方法是从小处着手：找到一个孩子能突破的小模块，让他体验到\"我行\"的感觉。一旦这个\"开关\"被打开，后面的变化会很快。\n\n很多来我们这的孩子一开始都说\"我不想学\"，上了几节课以后发现自己居然能解出难题，态度就开始变了。\n```\n\n→ 进入 D-L3\n\n### D-L2-3 试过放弃型 → 共情+归因\n\n**触发条件：** 家长选择3 / 描述\"之前也试过\"\"报过班没效果\"\"自己也想学好\"\n\n**话术：**\n\n```\n这种孩子其实最有潜力——有意愿，只是方法没找对。\n\n之前没效果，通常是因为：\n- 没有精准定位问题，一锅端式地\"什么都学\"\n- 学的内容跟自己的实际水平不匹配，太简单没挑战感，太难又挫败\n- 缺少阶段性的正反馈，看不到进步就放弃了\n\n我们的做法是先诊断后教学——搞清楚孩子到底卡在哪，然后精准突破最关键的1-2个模块。一旦打通，孩子会发现\"原来我学了真的能提\"，动力自然回来。\n```\n\n→ 进入 D-L3\n\n### D-L3 方案+邀约（D分支统一收口）\n\n**话术：**\n\n```\n动力问题不是\"讲道理\"能解决的，需要让孩子获得真实的学习成就感。\n\n我建议分两步走：\n\n第一步：带孩子来做一次免费学情诊断\n- 我们会分析孩子目前哪个模块最容易突破\n- 找到\"最小突破口\"，而不是面面俱到\n\n第二步：先集中攻下一个模块\n- 让孩子在1-2周内看到具体进步\n- 有了正反馈，学习动力自然就起来了\n\n跟孩子说\"去体验一下，看看有没有意思\"就行，不用说\"去补课\"。我们的课堂氛围比较活，80%是学校没教过的内容，大部分孩子体验完都觉得不一样。\n\n孩子几年级？我帮您安排合适的老师和时间。\n```\n\n---\n\n## 异议处理话术\n\n> 异议可能在任何分支的任何层级出现，客服需要随时切入异议处理，处理完后回到原分支继续。\n\n### E1：价格贵 / 嫌贵\n\n**触发词：** \"太贵了\"\"有点贵\"\"价格\"\"多少钱\"\"便宜点\"\n\n**话术：**\n\n```\n理解您的顾虑，教育投入确实是一笔不小的开支。\n\n我们的课跟学校或大班课最大的区别在于：\n- 6-12人小班，老师能记住每个孩子的卡点\n- 每节课80%是拔高内容，一节顶学校3-7天的内容量\n- 每个孩子一套专属学习方案，不是大锅饭\n\n我们有不同的卡型可以选择——领航卡60次课单价最优，启航卡30次课适合先试试看。两科以上还有折扣。\n\n不如先做个免费诊断，看看孩子的情况再决定？这样您也能判断值不值。\n```\n\n### E2：要考虑 / 再想想\n\n**触发词：** \"我再考虑\"\"商量一下\"\"想想\"\"不急\"\"改天\"\n\n**话术：**\n\n```\n完全理解，教育这件事确实值得好好考虑。\n\n这样，我先帮您整理一份孩子的学习分析和建议发给您，不管最后怎么决定，这些建议都用得上。\n\n后面有任何学习方面的问题，随时问我就好，不用客气。\n```\n\n> 注：不追问、不施压。按跟进节奏Day1发学习建议，Day3电话回访，之后不再主动跟进。\n\n### E3：孩子不愿意\n\n**触发词：** \"孩子不想去\"\"不愿意补课\"\"抗拒\"\"抵触\"\n\n**话术：**\n\n```\n孩子不想来上课，这种情况其实很常见。多数时候不是\"不想学\"，而是之前的学习体验让他觉得\"学也没用\"或者\"学起来太痛苦\"。\n\n我们的课跟学校和其他机构不太一样——80%是孩子没见过的内容，课堂节奏是趣味互动的，不是坐着听讲。很多孩子来了之后反而觉得有意思。\n\n建议先带孩子来体验一节课，不要跟孩子说\"去补课\"，就说\"去试试看，不一定要报名\"。如果孩子试听后觉得可以，再谈下一步。如果确实不喜欢，我们也不勉强。\n```\n\n### E4：学校老师教得够好了\n\n**触发词：** \"学校够了\"\"不需要补\"\"老师教得好\"\n\n**话术：**\n\n```\n您说得对，学校老师确实很尽责。我们也不觉得学校教育不好——学校教育是基础，非常重要。\n\n我们做的是学校教学的\"拔高与补充\"：\n- 学校一个班四五十人，老师照顾大多数人的节奏\n- 有些思维拓展的内容老师没时间展开\n- 我们做的就是这部分——帮孩子搭建思维架构，教\"怎么想\"而不只是\"怎么做\"\n\n而且每节课80%是学校没教过的内容，孩子不会觉得重复。\n\n建议带孩子来体验一节课，让孩子自己感受跟学校的区别，再决定也不迟。\n```\n\n### E5：别的机构没效果\n\n**触发词：** \"之前报过\"\"在别的机构\"\"没效果\"\"浪费钱\"\n\n**话术：**\n\n```\n理解您的顾虑。花了时间和钱没看到效果，确实让人失望。\n\n不同机构的教学差异很大。我们的核心区别：\n- 入学前做学情诊断，精准定位问题再排课，不是\"一刀切\"\n- 不重复课本，80%是思维拓展内容\n- 6-12人小班，老师记住每个孩子的具体卡点\n- 每个孩子一套学习方案，阶段性追踪调整\n\n建议先来做一次免费的学情诊断，看看我们的分析跟之前有什么不同。诊断完全免费，也不强制报名。\n```\n\n---\n\n## 通用收口话术\n\n### 成功获取试卷\n\n```\n收到，我安排老师帮您分析。预计24小时内把诊断报告发给您。\n\n报告会包含：\n- 逐题归因（哪些是知识问题、哪些是方法问题、哪些是粗心）\n- 各模块得分率\n- 优先需要突破的2-3个方向\n\n您耐心等一下，分析好了第一时间发您。\n```\n\n### 成功预约到校\n\n```\n好的，帮您安排好了：\n\n时间：XX\n校区：XX\n地址：XX\n联系人：XX老师\n\n建议带上孩子最近的试卷和课本，方便老师了解孩子的基础。到时候见~\n```\n\n### 家长暂时不行动\n\n```\n没关系，教育这件事不急在一时。\n\n我把一些学习方法和建议整理好发给您，日常在家也能用上。后面有任何学习方面的问题，随时找我就好。\n\n祝孩子学习进步！\n```\n\n---\n\n## 流程执行规范\n\n1. **每个分支严格遵循三层结构：** 诊断追问 → 共情归因 → 方案邀约\n2. **每层的消息控制在3-5句话**，避免信息过载\n3. **异议随时处理，处理完回到原分支**\n4. **不跳过诊断追问直接推课**——先了解情况，再给方案\n5. **所有收口话术必须提供价值**——即使家长不报名，也要输出有用的建议\n6. **转人工条件：** 投诉/退费/情绪激动/心理问题/复杂定价 → 立即转人工\n7. **跟进上限3次**，之后停止主动联系，转内容营销\n", "lines": 561, "size": 17910}, "04_scripts__exit_gracefully": {"id": "04_scripts__exit_gracefully", "path": "04_scripts/exit_gracefully.md", "name": "exit_gracefully", "title": "体面退费/结业话术 (Exit Gracefully)", "tags": "[scene:churn, role:consultant, role:xueguan, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:churn, role:consultant, role:xueguan, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/renewal_sop.md]\n---\n\n# 体面退费/结业话术\n\n## 核心原则\n\n**即使学生要走，也要体面结业，输出价值。口碑 > 一时成交。**\n\n## 接受决定\n\n> \"我理解您的决定。每个家庭的情况不同，我们尊重您的选择。\"\n\n**绝对不要做的事**：\n- 不要追问\"为什么不学了\"（除非家长主动说）\n- 不要表现出不高兴\n- 不要说\"走了就没优惠了\"\n- 不要用\"挽留话术\"让家长为难\n\n## 整理成长手册\n\n> \"虽然孩子不在百分继续了，但这段时间的学习成果是实实在在的。我帮孩子整理了一份成长手册，里面有他/她这段时间的进步数据、老师的评价和后续学习建议。您保存好，不管在哪学习都用得上。\"\n\n成长手册内容：\n- 入学时 vs 当前的成绩数据对比\n- 能力变化记录（思维力、专注力等）\n- 高光时刻截图/描述\n- 教师寄语\n- 后续学习建议（不受限于百分课程）\n\n## 结业会谈\n\n> \"XX在百分的这段时间表现很好，特别是在XX方面的进步让老师印象深刻。老师想跟您说，孩子的潜力很大，接下来不管在哪学习，都要注意XX方面的持续训练。\"\n\n## 后续保持联系\n\n> \"如果以后学习上有什么问题，随时可以联系我，不管是不是百分的学员，我们都愿意帮忙。祝孩子学业进步。\"\n\n## 退费流程\n\n按机构退费政策执行，具体见 `08_rules/pricing_policy_boundary.md`。\n", "lines": 46, "size": 1597}, "04_scripts__explain_class_placement": {"id": "04_scripts__explain_class_placement", "path": "04_scripts/explain_class_placement.md", "name": "explain_class_placement", "title": "解释话术：分层分班制度 (Explain Class Placement)", "tags": "[scene:first-contact, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:first-contact, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [07_faq/faq_class_type.md]\n---\n\n# 解释话术：分层分班制度\n\n## 使用场景\n\n家长问\"你们怎么分班的？我孩子分到哪个班？\"\n\n## 核心话术（完整版）\n\n> \"各位家长，咱们百分的小班制分层教学，说白了就是给孩子找'对的同伴'、上'合的课程'——让每个孩子都能学得明白、练得带劲。\n>\n> 怎么分？我们不只看分数，更看孩子的知识基础和思维特点：比如有的孩子课本概念掌握扎实，但灵活解题差点火候；有的孩子基础稍弱，但逻辑思维挺敏锐。我们会把知识储备、思维节奏相近的孩子分到一个班（每班6-12人），老师能清清楚楚记住每个孩子的'卡点'和'潜力'。\n>\n> 课堂上更是'量体裁衣'：基础稍弱的班，老师会把课本重点拆得更细，用生活里的例子讲透概念，比如用买文具的场景讲小数计算，练题也从基础题型慢慢过渡，先让孩子'学得会'；中等水平的班，在课本基础上多练'变式题'，比如一道应用题换个问法怎么解，重点帮孩子练'举一反三'的思维，确保'吃得饱'；学有余力的班，就拓展更灵活的解题思路，甚至加入趣味思维挑战，比如用图形拼贴理解几何原理，让孩子在和同伴的思维碰撞里找到成就感，越学越有动力。\n>\n> 您想，10个左右水平相近的孩子一起学，没人会因为跟不上而自卑，也没人会因为太简单而松懈。老师的目光能扫到每个孩子，谁卡壳了马上点拨，谁进步了及时鼓励。这就像给孩子量身定做的学习圈：同伴节奏合得来，老师精力顾得上，内容难度刚刚好——所以孩子在这儿学，不仅进步看得见，还越来越爱举手、敢提问，这就是分层小班的魔力。\"\n\n## 精简版（30秒）\n\n> \"我们按孩子的知识基础和思维特点分班，每班6-12人。水平相近的孩子在一起，老师讲的内容难度刚刚好——不会跟不上，也不会太无聊。老师能关注到每个人。\"\n\n## 小学数学分层标准（参考）\n\n| 成绩 | 推荐班型 |\n|------|---------|\n| < 75分 | 先一对一，再进班 |\n| 75-90分 | 同步培优班 |\n| 90-95分 | 同步奥数班 |\n| ≥ 96分 | 纯奥数/奥数创新班 |\n", "lines": 36, "size": 2415}, "04_scripts__explain_course_intensity": {"id": "04_scripts__explain_course_intensity", "path": "04_scripts/explain_course_intensity.md", "name": "explain_course_intensity", "title": "解释话术：课程强度和效率 (Explain Course Intensity)", "tags": "[scene:first-contact, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:first-contact, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/teaching_philosophy.md]\n---\n\n# 解释话术：课程强度和效率\n\n## 使用场景\n\n家长问\"你们的课跟学校有什么区别？效果怎么样？\"\n\n## 核心话术\n\n> \"咱们百分的课，孩子学起来效率特别高——比如上课内容，80%都是孩子平时没接触过的'拔高知识点'，每节课都得动脑子跟着走，一节顶学校3-7天的内容量，孩子不会觉得课太简单'吃不饱'。\n>\n> 而且不只是教知识点，更注重教孩子'怎么学'：帮孩子把零散的知识串成框架，还要求记笔记、课后反复回看巩固，慢慢让孩子自己会思考、会主动学。哪怕课上某个点没立刻懂也没关系，重点是让孩子先理清知识脉络，慢慢吃透，不是死记硬背。\"\n\n## 如果家长担心\"强度太大孩子跟不上\"\n\n> \"刚开始可能会有适应期，这很正常。我们不会为了让孩子'舒服'就降低教学要求——那样反而是浪费时间和钱。但我们会在过程中给孩子足够的引导和鼓励。大多数孩子1-2个月就能适应这个节奏，然后就会越学越有感觉。\"\n", "lines": 23, "size": 1244}, "04_scripts__explain_thinking_training": {"id": "04_scripts__explain_thinking_training", "path": "04_scripts/explain_thinking_training.md", "name": "explain_thinking_training", "title": "解释话术：什么是\"思维训练\" (Explain Thinking Training)", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/teaching_philosophy.md, 07_faq/faq_teaching_philosophy.md]\n---\n\n# 解释话术：什么是\"思维训练\"\n\n## 使用场景\n\n家长问\"你们的思维训练是什么意思？跟别的培训班有什么不同？\"\n\n## 核心话术\n\n> \"简单说，普通补习班教的是'这道题怎么做'，我们教的是'这类题怎么想'。\"\n\n> \"比如初三的数学，我们会把'相似''旋转''三角函数'串联起来，让孩子看到一道压轴题背后可能同时用到多个知识点的模型。这种训练不是让孩子背题，而是让他们学会'拆解题目→调用模型→组合知识'，这才是应对复杂题型的核心能力。\"\n\n## 具象化解释\n\n> \"您可以这样理解：如果知识是积木块，学校教的是一块一块认识积木。我们做的是教孩子怎么把积木组合起来搭出不同的东西。积木还是那些积木，但会搭了，什么题都不怕。\"\n\n## 预期管理\n\n> \"不过我要提前跟您说，思维训练不是速效药。短期课程可能让新学员觉得有挑战，因为我们更注重'思维强度'而非'知识量堆砌'。但坚持1-2年系统训练后，孩子会明显感受到审题速度、解题灵活性的提升。这种能力是受用终身的。\"\n\n## 信任建立\n\n> \"我们的教学节奏是为了保护学员的思维成长效率，新学员需要先放下'坐等投喂'的习惯，跟着老师的思维引导主动思考。家长和孩子的信任与执行，是实现思维突破的关键。\"\n", "lines": 31, "size": 1611}, "04_scripts__first_contact": {"id": "04_scripts__first_contact", "path": "04_scripts/first_contact.md", "name": "first_contact", "title": "首次接触话术 (First Contact)", "tags": "[scene:first-contact, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:first-contact, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/consultation_sop.md, 03_diagnosis/]\n---\n\n# 首次接触话术\n\n## 核心原则\n\n**建立信任，不急推课。**\n\n首次咨询的目标不是成交，而是让家长感受到我们的专业度和真诚。\n\n## 标准咨询流程（60分钟）\n\n| 阶段 | 时长 | 内容 |\n|------|------|------|\n| 倾听 | 10min | 了解孩子情况、家长诉求、教育经历 |\n| 诊断展示 | 15min | 展示我们的分析能力（如试卷分析） |\n| 方案讲解 | 20min | 针对性推荐课程和学习规划 |\n| 答疑 | 10min | 回答家长疑问 |\n| 收尾 | 5min | 总结要点，不强推成交 |\n\n## 开场话术\n\n> \"您好，感谢您对百分教育的信任。我先了解一下孩子的情况，这样我能给您更有针对性的建议。能跟我说说孩子现在的学习状态吗？比如哪些科目比较好，哪些觉得有挑战？\"\n\n## 倾听阶段要点\n\n- 让家长多说，自己少说\n- 记录关键信息：年级、科目、成绩、学校、目标校（如有）\n- 关注家长的情绪和焦虑点\n- 不要急于打断或给建议\n\n## 诊断展示阶段\n\n- 如果家长带了试卷：做即场分析（逐题归因）\n- 如果没带试卷：根据家长描述初步判断画像（→ 03_diagnosis/）\n- 展示专业度：\"根据您描述的情况，孩子可能在XX方面需要加强...\"\n\n## 方案讲解话术\n\n> \"根据孩子目前的情况，我建议这样规划……\"\n\n→ 根据 `02_courses/course_selector.md` 路由表匹配推荐\n\n## 收尾话术\n\n> \"今天先聊到这，我回头整理一份分析报告发给您。您回去跟孩子和家人商量一下，有任何问题随时联系我。我们不急，最重要的是找到适合孩子的方案。\"\n\n## 跟进节奏\n\n| 时间 | 动作 |\n|------|------|\n| Day 0 | 感谢微信+分析报告 |\n| Day 1 | 学习建议 |\n| Day 3 | 电话回访 |\n| Day 7 | 案例分享 |\n| Day 14 | 最后联系 |\n| 之后 | 停止主动跟进，转内容营销 |\n\n**不超过3次主动跟进。**\n\n## 禁忌\n\n- 不说\"赶紧报名，名额有限\"\n- 不做低价引流承诺\n- 不贬低其他机构\n- 不承诺具体提分数字\n", "lines": 72, "size": 2233}, "04_scripts__objection_child_not_interested": {"id": "04_scripts__objection_child_not_interested", "path": "04_scripts/objection_child_not_interested.md", "name": "objection_child_not_interested", "title": "异议处理：孩子不想上/抗拒补习 (Objection Child Not Interested)", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/home_school_collaboration.md]\n---\n\n# 异议处理：孩子不想上/抗拒补习\n\n## 核心策略\n\n\"家长沟通先于学生沟通\"——先帮家长理解孩子抗拒的原因，再给解决方案。\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"孩子不想来上课，这个情况其实挺常见的。您先别着急，孩子的抗拒通常不是因为'不想学'，而是之前的学习体验让他觉得'学也没用'或者'学起来太痛苦'。\"\n\n### 2. 分析（40%）\n\n> \"孩子抗拒上课通常有几个原因：\n> - 之前在学校或其他机构的学习体验不好，产生了畏难情绪\n> - 觉得上课就是重复学校的内容，无聊\n> - 自己也想学好但不知道方法，久了就放弃了\n> - 周末想玩，觉得上课占用了休息时间\"\n\n> \"我们百分的课跟学校不一样——80%是孩子没接触过的内容，课堂氛围是趣味、互动的，不是坐着听讲。很多孩子来了之后反而觉得有意思，因为他发现自己能解出之前不会的题，这种成就感是最好的动力。\"\n\n### 3. 行动（30%）\n\n> \"我建议先带孩子来试听一节课，不要跟孩子说'去补课'，就说'去体验一下，看看有没有意思'。降低孩子的心理防线。如果试听后孩子觉得可以，我们再谈报名。如果孩子确实不喜欢，我们也不勉强。\"\n\n## 如果家长说\"孩子脾气大，说什么都不听\"\n\n> \"这种情况我们也遇到过不少。有时候不是孩子不听话，是孩子和家长之间的沟通模式需要调整。我们的一对一辅导有一个重要价值就是优化亲子关系——老师在教学过程中也会给到亲子沟通方面的建议。有的家长说学了之后不只是成绩好了，跟孩子的关系也改善了。\"\n\n## 禁忌\n\n- 不要站在家长角度批评孩子\n- 不要说\"不学以后就完了\"之类的焦虑话术\n- 不要强迫或催促\n", "lines": 43, "size": 2022}, "04_scripts__objection_child_weak": {"id": "04_scripts__objection_child_weak", "path": "04_scripts/objection_child_weak.md", "name": "objection_child_weak", "title": "异议处理：孩子基础差/跟不上 (Objection Child Weak)", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [03_diagnosis/primary/math_below_75.md, 02_courses/math/math_one_on_one.md]\n---\n\n# 异议处理：孩子基础差/跟不上\n\n## 核心策略\n\n不否定孩子，重新定义问题，给出可落地的方案。\n\n## 禁忌用语\n\n- **绝对不说**：\"孩子基础太差\"\n- **替代说法**：\"目前有几个关键知识漏洞需要补\"\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"您的担心很正常，其实很多家长第一次来都有这个顾虑。基础不够扎实不是孩子的问题，可能是之前的学习方法没找对，或者某几个关键知识点没有吃透。\"\n\n### 2. 证据（40%）\n\n> \"我们专门为这种情况设计了一对一辅导模式。老师会先摸底孩子具体的薄弱点在哪里，然后针对性地一个一个补。不是大锅饭，是精准辅导。\"\n\n> \"一对一的好处是三方面：第一，提升学习力——把计算、理解、专注力这些基本功练起来；第二，改善学习状态——很多孩子不是学不会，是不想学，一对一的鼓励和引导能激活他的积极性；第三，优化心理——孩子建立了信心，在家和家长的关系也会更好。\"\n\n### 3. 行动（30%）\n\n> \"我建议先用一对一把基础补上来，一般3-6个月就能看到明显变化。等孩子成绩稳定在一定水平后，就可以转到小班，跟同水平的孩子一起学，互相促进。这是一个很成熟的路径。\"\n\n## 如果家长担心一对一太贵\n\n> \"一对一确实是单次价格高一些，但效率也高——同样的问题，在小班里可能需要10节课才能解决，一对一可能3-5节课就补上了。而且我们有课次赠送：15次送1次、30次送3次。\"\n\n## 如果家长问\"多久能见效\"\n\n> \"根据同类学员的数据，一般3-6个月可以看到明显改善。但每个孩子情况不同，我们不会给您承诺具体提多少分，因为这不诚实。我们会做的是：每个阶段给您反馈孩子的变化——不只是分数，还有学习习惯、思维方式这些更重要的东西。\"\n", "lines": 42, "size": 2166}, "04_scripts__objection_school_enough": {"id": "04_scripts__objection_school_enough", "path": "04_scripts/objection_school_enough.md", "name": "objection_school_enough", "title": "异议处理：学校老师教得够好了，不需要补 (Objection School Enough)", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/teaching_philosophy.md]\n---\n\n# 异议处理：学校老师教得够好了，不需要补\n\n## 核心策略\n\n不否定学校教育，明确我们是\"拔高与补充\"，不是替代。\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"您说得对，学校的老师确实很尽责。我们从来不觉得学校教育不好——其实学校教育是基础，非常重要。\"\n\n### 2. 差异化（40%）\n\n> \"我们的课程定位是学校教学的'拔高与补充'，不是重复课本内容。我给您举个例子：学校一个班四五十个学生，老师要照顾大多数人的节奏，有些思维拓展的内容没时间展开。我们做的就是这部分——帮孩子搭建思维架构，教他'怎么想'而不只是'怎么做'。\"\n\n> \"比如说，同样一道数学题，学校教的是标准解法。我们会带孩子分析：这道题背后的模型是什么？换个数字还会不会做？换个问法呢？这种训练不是学校能覆盖的，但对中高考压轴题特别关键。\"\n\n> \"而且我们每节课80%是孩子在学校没接触过的内容，不会觉得重复。\"\n\n### 3. 行动（30%）\n\n> \"建议您带孩子来体验一节课，让孩子自己感受一下跟学校的区别。如果孩子觉得确实学到新东西了，再考虑也不迟。\"\n\n## 禁忌\n\n- 绝对不说\"学校老师教不好\"\n- 不说\"学校教育有局限\"（太直接）\n- 用\"拔高与补充\"代替\"补课\"\n", "lines": 37, "size": 1543}, "04_scripts__objection_too_expensive": {"id": "04_scripts__objection_too_expensive", "path": "04_scripts/objection_too_expensive.md", "name": "objection_too_expensive", "title": "异议处理：嫌贵 (Objection Too Expensive)", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/pricing/, 04_scripts/explain_thinking_training.md]\n---\n\n# 异议处理：嫌贵\n\n## 核心策略\n\n不打价格战，用价值重构来化解价格异议。\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"理解您的顾虑，教育投入确实是一笔不小的开支，我们很多家长最开始也会有这个考虑。\"\n\n### 2. 证据（40%）\n\n> \"您看，我们6-12人的小班，老师能清楚记住每个孩子的卡点，一节课80%是拔高内容，一节顶学校3-7天的内容量。同样是2小时，孩子获得的东西是不一样的。\"\n\n> \"我们每个孩子都有一套专属的学习方案，不是大锅饭教学。这也是为什么我们的班额控制在6-12人。\"\n\n可补充的价值对比：\n- 18年办学经验，专职教师（不是兼职大学生）\n- 自主教研团队，本地化12000+真题积累\n- 不只教知识，更教思维方法——这是孩子受用终身的能力\n\n### 3. 行动（30%）\n\n> \"其实我们有不同的卡型可以选择。比如领航卡是最划算的，60次课只要XX元/次。如果想先试试，也可以先报启航卡30次课。另外现在报名两科以上还有折扣。\"\n\n具体引导：\n- 介绍三种卡型（领航卡/畅学卡/启航卡）的差异\n- 提醒新生折扣（单科9.5折/两科9折/三科8.5折）\n- 提醒团报优惠（2人8.5折/3人8折/4人7.5折）\n- 如有同伴，推荐家长自发组团一对二/圆桌，性价比更高\n\n## 绝对不能说的\n\n- \"我们已经是最便宜的了\"\n- \"别的机构更贵\"\n- \"一分钱一分货\"\n- \"打折/优惠可以再谈\"（不要暗示价格有弹性）\n\n## 如果家长坚持觉得贵\n\n> \"完全理解。教育是长线投入，您可以先回去考虑一下。我们也有13-20人的班型，价格更亲民一些。或者可以先体验我们的试听课，看看效果再决定。\"\n\n→ 引导至13-20人班或启航卡（入门体验型）\n", "lines": 53, "size": 2015}, "04_scripts__referral_invitation": {"id": "04_scripts__referral_invitation", "path": "04_scripts/referral_invitation.md", "name": "referral_invitation", "title": "转介绍邀请话术 (Referral Invitation)", "tags": "[scene:conversion, role:consultant, role:xueguan, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:conversion, role:consultant, role:xueguan, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/pricing/promotions_current.md]\n---\n\n# 转介绍邀请话术\n\n## 使用场景\n\n老学员续费后、阶段性成果反馈后，自然引导转介绍。\n\n## 前提条件\n\n- 孩子确实有进步（用数据证明）\n- 家长对百分有认可\n- 不要在首次接触或争议期提转介绍\n\n## 话术\n\n> \"XX妈妈，孩子这段时间进步真的很明显，您应该也感受到了。如果您身边有朋友家的孩子也有类似的需求，可以推荐他们来了解一下。我们有一个感恩回馈活动，转介绍成功的话，有三重好礼可以选一个。\"\n\n## 三重好礼（转介绍奖励）\n\n| 好礼 | 内容 |\n|------|------|\n| 感恩礼一（答谢礼） | 200元现金奖励，直接微信红包或转账 |\n| 感恩礼二（成长礼） | 精品小班课2次，让孩子在精品小班课中拓展兴趣 |\n| 感恩礼三（续航礼） | 500元续费代金券，下次续报启航卡及以上课程即可使用 |\n\n三重好礼任选其一。\n\n## 话术要点\n\n- 不要让家长觉得你在\"利用他\"\n- 强调是\"分享好东西给朋友\"\n- 重点放在\"孩子的进步是最好的口碑\"\n- 不要反复提转介绍，提一次即可\n", "lines": 40, "size": 1306}, "04_scripts__renewal_conversation": {"id": "04_scripts__renewal_conversation", "path": "04_scripts/renewal_conversation.md", "name": "renewal_conversation", "title": "续费面谈话术 (Renewal Conversation)", "tags": "[scene:renewal, role:consultant, role:xueguan, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:renewal, role:consultant, role:xueguan, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/renewal_sop.md, 06_ops/service_system_9000.md]\n---\n\n# 续费面谈话术\n\n## 核心原则\n\n用成长手册驱动，说\"继续\"不说\"续费\"。\n\n## 续费面谈流程（40分钟）\n\n| 阶段 | 时长 | 内容 |\n|------|------|------|\n| 成长回顾 | 15min | 用数据展示孩子的进步和变化 |\n| 教师分享 | 10min | 老师对孩子的评价和建议 |\n| 下阶段规划 | 10min | 下一步的学习计划和目标 |\n| 自然过渡 | 5min | 自然引导续费，不强推 |\n\n## 成长回顾话术\n\n> \"XX妈妈，我先跟您回顾一下孩子这学期的变化。入学时孩子的情况是XX，现在XX。具体来看：\n> - 数学从XX分提升到XX分\n> - 主动举手次数明显增多\n> - 错题类型从以前的概念性错误为主，变成现在偶尔的审题失误\n> - 这说明基础已经扎实了，现在需要的是更细致的审题训练\"\n\n## 教师分享话术\n\n> \"XX老师对孩子的评价是：思维进步很明显，特别是在XX方面。老师觉得如果下个阶段重点突破XX，孩子还有很大的上升空间。\"\n\n## 下阶段规划话术\n\n> \"根据孩子目前的情况，下个阶段我建议重点在XX方面发力。具体计划是……您觉得这个方向可以吗？\"\n\n## 自然过渡话术\n\n> \"那我们就按这个方向继续。课程这边我帮您安排好，卡型方面领航卡最划算——60次课平均下来只要XX元/次，而且还赠送5次课。您看这个方案可以吗？\"\n\n## 禁忌\n\n- 不说\"续费\"，说\"继续\"\n- 不说\"你不续的话名额就没了\"\n- 不在孩子面前谈钱\n- 如果家长犹豫，不追问原因，给时间考虑\n", "lines": 49, "size": 1758}, "04_scripts__trial_invitation": {"id": "04_scripts__trial_invitation", "path": "04_scripts/trial_invitation.md", "name": "trial_invitation", "title": "试听邀请话术 (Trial Invitation)", "tags": "[scene:trial, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:trial, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/trial_class_sop.md]\n---\n\n# 试听邀请话术\n\n## 核心原则\n\n试听前做好铺垫，让家长带着期待来，而不是带着怀疑来。\n\n## 试听前准备\n\n1. **推送教师视频**：提前发送授课教师的教学片段/自我介绍视频\n2. **推送课堂实录**：让家长看到真实的课堂氛围\n3. **利用\"曝光效应\"**：多次接触建立信任感\n\n## 邀请话术\n\n> \"XX妈妈/爸爸，我们这边安排了一节XX老师的课，正好适合孩子目前的情况。XX老师在这个年级段已经教了很多年，我发一段他的教学视频给您先看看。如果觉得风格合适，这周末可以带孩子来体验一下，不收费的。\"\n\n## 试听前一天提醒\n\n> \"XX妈妈，明天的试听课在X点，在XX校区X教室。建议让孩子带上平时的课本和笔记本，方便老师了解孩子的基础。如果有最近的试卷也可以带来，我们可以帮做一个免费的深度分析。\"\n\n## 试听当天\n\n1. 前台热情接待，引导至教室\n2. 教师关注试听生，适度互动（不过度关注影响其他学生）\n3. 课后安排10分钟家长沟通\n4. 咨询师+教师+学管铁三角配合\n\n## 试听后话术\n\n→ 见 `04_scripts/after_trial_followup.md`\n\n## 重要提示\n\n- 试听是专业服务的展示，不是推销\n- 198元精品试听课有专门的推广活动（扫码免费领取）\n- 试听前推送的资料要精选，不要发太多造成信息过载\n", "lines": 44, "size": 1564}, "04_scripts__weekly_report_templates": {"id": "04_scripts__weekly_report_templates", "path": "04_scripts/weekly_report_templates.md", "name": "weekly_report_templates", "title": "周报模板库与课堂文案", "tags": "[type:template, role:xueguan, scene:weekly-report, scene:homework, scene:social-media]", "module": "04_scripts", "content": "---\ntitle: 周报模板库与课堂文案\ntags: [type:template, role:xueguan, scene:weekly-report, scene:homework, scene:social-media]\nlast_updated: 2026-03-22\nmaintainer: baifen-edu-ops\nrelated_files:\n  - 09_agents/xueguan_automation_agent.md\n  - 06_ops/service_system_9000.md\n  - 08_rules/communication_redlines.md\n---\n\n# 周报模板库与课堂文案\n\n---\n\n## 一、标准周报模板\n\n### 通用结构\n\n每份周报由以下7个模块组成，学管师根据实际情况填充内容：\n\n| 模块 | 内容 | 字数建议 |\n|------|------|---------|\n| 1. 问候语 | 称呼+问候 | 1句 |\n| 2. 本周概览 | 一句话总结本周整体表现 | 1-2句 |\n| 3. 出勤情况 | 各科出勤记录 | 1-2句 |\n| 4. 课堂表现 | 分科目的课堂亮点和观察 | 3-5句 |\n| 5. 作业完成 | 完成率+具体情况 | 1-3句 |\n| 6. 教师评语 | 任课教师的反馈（原话或提炼） | 2-3句 |\n| 7. 下周预告+家长配合 | 下周学习内容+家长可以做的事 | 2-3句 |\n\n**总字数控制：** 300-500字，微信阅读友好。\n\n---\n\n### 模板A：表现优秀版\n\n**适用条件：** 出勤100% + 作业完成率≥90% + 成绩有提升或保持高位\n\n```\nXX妈妈/爸爸，您好！跟您分享一下[学员名]这周的学习情况。\n\n【本周概览】\n[学员名]这周状态非常好，各科学习都很投入，能看到孩子在持续进步。\n\n【出勤情况】\n本周[科目1] X次课、[科目2] X次课，全部准时到课。\n\n【课堂表现】\n[科目1]：[具体亮点，如\"周三课堂上主动举手讲解了辅助线的添加思路，逻辑很清晰，老师特别表扬了他/她\"]。小测成绩XX分，比上周提升了X分。\n[科目2]：[具体亮点，如\"单词听写正确率达到95%，阅读理解的答题速度也明显加快了\"]。\n\n【作业完成】\n本周作业全部按时完成并订正，完成质量也很好。\n\n【教师评语】\n[教师姓名]老师说：\"[教师原话或提炼，如：这周明显感觉到孩子在思考问题时更有条理了，特别是在几何证明方面，已经能独立找到解题思路]。\"\n\n【下周预告】\n下周[科目1]将进入[新模块/新内容]，[科目2]会开始[新内容]。[学员名]基础扎实，这些新内容对他/她来说是一个很好的提升机会。\n\n【小建议】\n如果在家有时间，可以让孩子把本周的错题再看一遍，巩固效果会更好。\n\n祝周末愉快！有任何问题随时联系我。\n```\n\n---\n\n### 模板B：正常反馈版\n\n**适用条件：** 出勤≥80% + 作业完成率70%-89% + 成绩基本稳定\n\n```\nXX妈妈/爸爸，您好！这是[学员名]本周的学习小结。\n\n【本周概览】\n[学员名]这周整体学习节奏平稳，有做得好的地方，也有一些可以继续加强的方面。\n\n【出勤情况】\n本周[科目1]出勤X/X次，[科目2]出勤X/X次。[如有请假：周X的[科目]课因[原因]请假，已安排补课。]\n\n【课堂表现】\n[科目1]：[先说亮点，如\"在代数运算部分完成得很顺利\"]。[再说观察，如\"几何部分遇到辅助线添加时会犹豫，老师课上有针对性地多练习了几道\"]。\n[科目2]：[亮点+观察，如\"口语练习参与积极，语法填空的时态选择还需要多练习\"]。\n\n【作业完成】\n本周作业完成X/X次。[如有未完成：\"周X的[科目]作业还没有提交，建议这个周末补上，这样下周上课衔接会更顺畅。\"]\n\n【教师评语】\n[教师姓名]老师说：\"[如：孩子课堂上听得很认真，建议回家后每天花10分钟回顾当天的重点知识，巩固效果会更好]。\"\n\n【下周预告】\n下周[科目1]计划学习[内容]，[科目2]会进行[内容]。\n\n【家长配合建议】\n建议这周末帮孩子检查一下[具体任务，如\"错题本是否整理完整\"]，每天[具体时间]花[具体时长]复习一下[具体内容]。\n\n祝周末愉快！\n```\n\n---\n\n### 模板C：需关注版\n\n**适用条件：** 出勤<80% 或 作业完成率<70% 或 成绩下降\n\n**核心原则：** 不批评、不制造焦虑，用\"建议\"和\"我们一起想办法\"的方式表达。先说做得好的地方，再说需要关注的点。\n\n```\nXX妈妈/爸爸，您好！跟您聊一下[学员名]这周的情况。\n\n【本周概览】\n[学员名]这周有些地方做得不错，同时也有几个方面我想跟您沟通一下，看看我们一起怎么帮孩子调整。\n\n【出勤情况】\n本周[科目1]出勤X/X次，[科目2]出勤X/X次。[如有缺课：\"[日期]的[科目]课缺了一次，这部分内容老师已经安排了补课/讲义，建议尽快补上。\"]\n\n【做得好的方面】\n[找出至少一个亮点，如\"课堂上回答问题的时候思路是对的，说明基本概念理解没问题\"或\"和同学讨论时很积极\"]。\n\n【需要关注的方面】\n[具体描述，如\"本周作业完成了X/X次，比上周少了X次。特别是[科目]的[具体作业]没有完成，这部分内容是下周[新内容]的基础，补上后学起来会轻松很多\"]。\n[如成绩下降：\"这次小测XX分，比上次降了X分，主要是[具体模块，如'应用题的审题环节']丢分较多。教师已经分析了原因，不是知识没掌握，而是[具体原因，如'审题不够仔细/计算步骤跳步']，这个通过针对性练习是可以改善的。\"]\n\n【教师评语】\n[教师姓名]老师说：\"[建设性评语，如：孩子其实挺聪明的，这周可能状态有些波动，我们下周会多关注他/她，重点帮他/她把XX模块的漏洞补上]。\"\n\n【我们的计划】\n针对这周的情况，我们计划：\n1. [具体措施1，如\"下周课上老师会针对审题方法多做练习\"]\n2. [具体措施2，如\"学管会每天提醒作业并跟进完成情况\"]\n3. [具体措施3，如\"建议本周末花30分钟把未完成的作业补上\"]\n\n【家长配合建议】\n[具体可操作的建议，如\"这个周末可以和孩子聊聊最近学习上有没有遇到什么困难，如果孩子愿意说，耐心听就好，不用急着评价\"]。\n\n有什么想法随时跟我说，我们一起帮[学员名]调整过来。\n```\n\n---\n\n### 模板D：新生首周版\n\n**适用条件：** 学员入学第一周\n\n**核心原则：** 重在建立信任，传递\"我们在认真关注你的孩子\"的信号。不急于评价学习能力，侧重适应反馈。\n\n```\nXX妈妈/爸爸，您好！[学员名]已经在百分完成了第一周的学习，我来跟您聊聊孩子的适应情况。\n\n【第一周回顾】\n[学员名]这周来上了X次课，整体适应得[具体描述，如\"很顺利，一进教室就跟同学打招呼了\"或\"在慢慢熟悉环境，稍微有些安静，这是正常的\"]。\n\n【课堂观察】\n[科目1]：[重点描述参与度和状态，如\"[教师]老师反馈，[学员名]听课很认真，虽然还没有主动举手，但能看出来在跟着老师的思路走\"]。\n[科目2]：[类似描述]。\n\n【孩子的亮点】\n[找出一个具体的正面细节，如\"课间休息的时候主动帮同桌递了一支笔，是个很有礼貌的孩子\"或\"在做练习题的时候遇到不会的没有放弃，一直在尝试，这个态度非常好\"]。\n\n【教师初印象】\n[教师姓名]老师说：\"[正面评价，如：第一周能看出来[学员名]思维反应挺快的，接下来我会多给他/她一些互动机会，帮助他/她更快融入课堂]。\"\n\n【下周安排】\n下周[科目]计划学习[内容]。这周我们主要观察孩子的适应情况，下周开始会更细致地跟进学习进度。\n\n【温馨提示】\n新生刚开始的1-2周是适应期，有些孩子会比较安静，这完全正常。如果孩子回家后有跟您聊上课的感受，欢迎随时跟我分享，这对我们了解孩子非常有帮助。\n\n接下来我会每周跟您同步[学员名]的学习情况。有任何问题，随时联系我！\n```\n\n---\n\n## 二、作业催交话术\n\n### 第一次提醒：温和提醒（超过截止时间4小时）\n\n**渠道：微信消息**\n\n```\n[学员名]妈妈/爸爸，您好！温馨提醒一下，[学员名]的[科目][具体作业名称]还没有提交。这部分是对[具体知识点]的巩固练习，趁热打铁效果最好。如果今天能完成就太棒了！\n\n如果遇到不会的题目，可以先标记出来，下次课老师会针对性讲解。\n```\n\n### 第二次提醒：关切询问（超过截止时间24小时）\n\n**渠道：微信消息**\n\n```\n[学员名]妈妈/爸爸，您好！[学员名]的[科目]作业还没有交上来，我有点挂念，想问一下是不是遇到了什么困难？\n\n如果是题目太难了，可以拍照发给我，我转给[教师姓名]老师，老师可以先给一些提示。如果是时间上有冲突，我们可以协商一个合理的提交时间。\n\n作业对巩固课堂知识真的很重要，希望我们一起帮[学员名]把这个习惯保持好。\n```\n\n### 第三次提醒：建议电话跟进（超过截止时间48小时）\n\n**渠道：提醒学管师打电话**\n\n此时不再发微信，建议学管师直接电话沟通。电话沟通要点：\n\n```\n电话沟通提纲：\n\n1. 开场（不直奔作业话题）\n   - \"XX妈妈您好，我是百分的[学管姓名]，给您打个电话聊聊[学员名]最近的情况。\"\n\n2. 了解情况\n   - \"最近[学员名]在家学习的状态怎么样？有没有觉得哪里有压力？\"\n   - 倾听为主，不急于说教\n\n3. 自然切入作业话题\n   - \"对了，[学员名]这周的[科目]作业还没交，我想确认一下是什么情况，
