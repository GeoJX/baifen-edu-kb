 | 数学/生地 | 初一~初二 |\n| 谢老师 | 物理 | 初二~初三 |\n| 祝老师 | 数学 | 初二~高一 |\n| 郑老师 | 英语 | 初三 |\n| 邹老师 | 化学 | 初三~高二 |\n| 林老师 | 物理 | 高一~高二 |\n| 张老师 | 数学 | 高二 |\n| 郑校 | 英语 | 高二 |\n\n---\n\n## 学段覆盖与选校提示\n\n| 学段 | 安排 |\n|------|------|\n| 一~三年级 | 南油校区暂不开设，坡头区低年级学生可前往 **海东校区** |\n| 四年级~高二 | **本校区**（南油） |\n| 高三 | 请咨询是否在本校区开设，或前往 **虹都校区** |\n\n---\n\n## 联系我们\n\n- 咨询电话：**18933824497**\n- 地址：湛江市坡头区南油欧烟楼党群服务中心三楼\n- 到校咨询前建议提前电话预约，以便安排学情诊断和课程规划\n", "lines": 107, "size": 3986}, "05_campuses__shengheyuan": {"id": "05_campuses__shengheyuan", "path": "05_campuses/shengheyuan.md", "name": "shengheyuan", "title": "盛和园校区（百分阅读馆）", "tags": "[校区, 赤坎区, 盛和园, 阅读馆, 小学]", "module": "05_campuses", "content": "---\ntitle: 盛和园校区（百分阅读馆）\ntags: [校区, 赤坎区, 盛和园, 阅读馆, 小学]\nlast_updated: 2026-03-19\n---\n\n# 盛和园校区（百分阅读馆）\n\n## 基本信息\n\n| 项目 | 详情 |\n|------|------|\n| 校区名称 | 盛和园校区 / 百分阅读馆 |\n| 所在区域 | 赤坎区 |\n| 详细地址 | 人民大道北3号盛和园26号楼负一层15室 |\n| 咨询电话 | 18933824497 |\n| 覆盖学段 | 蒙学~六年级 |\n\n---\n\n## 校区定位\n\n盛和园校区又名 **百分阅读馆**，是百分教育在赤坎区的小学教学点之一。校区最大特色是配备了 **5000+ 册藏书的阅读图书馆**，为学员提供丰富的课外阅读资源，营造浓厚的阅读氛围。\n\n---\n\n## 百分阅读馆\n\n- 馆内藏书 **5000+ 册**，涵盖绘本、桥梁书、儿童文学、科普百科等品类\n- 学员可在课余时间自由借阅\n- 定期举办阅读分享活动，培养学生的阅读兴趣与表达能力\n- 与阅读写作课程深度结合，实现\"读写一体化\"教学\n\n---\n\n## 2026年春季课程表\n\n### 蒙学系列（学前/低年级）\n\n| 课程 | 上课时间 | 备注 |\n|------|---------|------|\n| 自然拼读 | 详询校区 | 适合零基础学员，建立英语语音体系 |\n| 剑桥英语 | 详询校区 | 剑桥少儿英语系列，体系化学习 |\n\n### 一年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 看图写话 | 详询校区 | 语文启蒙，培养观察力与表达能力 |\n\n### 二年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 基础阅读理解+写作入门 |\n| 同步奥数 | 详询校区 | 数学思维启蒙 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 三年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 阅读理解技巧+作文训练 |\n| 同步奥数 | 详询校区 | 数学思维进阶 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 四年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 深度阅读+写作提升 |\n| 同步奥数 | 详询校区 | 竞赛思维衔接 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 五年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 小升初阅读备考 |\n| 同步奥数 | 详询校区 | 小升初数学备考 |\n| 英语 | 详询校区 | 同步提升 |\n\n### 六年级\n\n| 科目 | 上课时间 | 备注 |\n|------|---------|------|\n| 阅读写作 | 详询校区 | 小升初冲刺，文学素养积累 |\n| 同步奥数 | 详询校区 | 小升初数学冲刺 |\n| 英语 | 详询校区 | 初中衔接准备 |\n\n> 具体上课时段请致电 **18933824497** 获取最新课表。\n\n---\n\n## 课程特色\n\n### 阅读写作一体化\n借助阅读馆5000+藏书资源，课程实行\"读写一体化\"教学模式：\n1. 课前指定阅读材料，培养输入习惯\n2. 课中教授阅读策略与写作技法\n3. 课后推荐拓展书目，持续积累\n\n### 蒙学启蒙系列\n- **自然拼读**：系统学习字母与字母组合发音规则，建立\"看词能读、听音能写\"能力\n- **剑桥英语**：对接剑桥少儿英语考试体系，分阶学习，目标清晰\n\n### 全年级覆盖\n从蒙学（学前）到六年级，完整覆盖小学阶段全部学习需求，方便家长就近选择。\n\n---\n\n## 学段覆盖与选校提示\n\n| 学段 | 安排 |\n|------|------|\n| 蒙学~六年级 | **本校区**（盛和园/百分阅读馆） |\n| 初中（初一~初三） | 请前往 **虹都校区**（海北路虹都大厦） |\n| 高中（高一~高三） | 请前往 **虹都校区**（海北路虹都大厦） |\n\n---\n\n## 联系我们\n\n- 咨询电话：**18933824497**\n- 地址：湛江市赤坎区人民大道北3号盛和园26号楼负一层15室\n- 到校咨询前建议提前电话预约，以便安排学情诊断和课程规划\n", "lines": 127, "size": 3877}, "06_ops__churn_warning_system": {"id": "06_ops__churn_warning_system", "path": "06_ops/churn_warning_system.md", "name": "churn_warning_system", "title": "流失预警体系", "tags": "[type:sop, scene:churn, role:xueguan, role:consultant]", "module": "06_ops", "content": "---\ntitle: 流失预警体系\ntags: [type:sop, scene:churn, role:xueguan, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [04_scripts/exit_gracefully.md]\n---\n\n# 流失预警体系\n\n## 概述\n\n流失预警体系是百分教育留存管理的核心机制。通过三级预警（红/黄/绿），实现学员流失风险的早发现、早干预、早解决。目标：在学员/家长产生退费念头之前就介入，将流失扼杀在萌芽阶段。\n\n**核心原则：** 口碑至上——即使学生要走，也要体面结业，输出价值。\n\n---\n\n## 三级预警体系\n\n### 红色预警（紧急）——72小时内干预\n\n**风险等级：** 极高，流失概率 > 70%\n\n| 信号 | 具体表现 | 数据来源 |\n|------|---------|---------|\n| 连续缺课 | 连续2次以上无故缺课 | 出勤系统 |\n| 询问退费 | 家长主动提及退费/不想上了 | 学管师/咨询师反馈 |\n| 群内不满 | 家长在班级群表达不满或质疑 | 学管师监控 |\n| 公开抱怨 | 家长在外部平台（朋友圈/点评）表达不满 | 舆情监控 |\n| 明确投诉 | 正式投诉（电话/书面） | 投诉记录 |\n\n**响应流程：**\n\n| 步骤 | 时间 | 负责人 | 动作 |\n|------|------|--------|------|\n| 1. 学管上报 | 发现即报（不超过2h） | 学管 | 立即通知咨询师，同步教师 |\n| 2. 电话沟通 | 24h内 | 咨询师 | 电话联系家长，倾听诉求，不辩解 |\n| 3. 三方评估 | 48h内 | 咨询师+教师+学管 | 三方会议评估情况，查明原因 |\n| 4. 制定挽留方案 | 72h内 | 咨询师 | 教学调整/换班/换老师/加强服务 |\n| 5. 执行+跟踪 | 方案后1周 | 学管 | 持续跟踪方案执行效果 |\n| 6. 复盘 | 方案后2周 | 铁三角 | 评估效果，决定是否升级 |\n\n---\n\n### 黄色预警（关注）——1周内关注\n\n**风险等级：** 中等，流失概率 30%-70%\n\n| 信号 | 具体表现 | 数据来源 |\n|------|---------|---------|\n| 作业下降 | 作业完成率连续2周低于70% | 作业系统 |\n| 回复变慢 | 家长微信/消息回复明显变慢（>24h未读/48h未回复） | 学管师观察 |\n| 成绩连降 | 连续两次测评成绩下降 | 测评系统 |\n| 出勤异常 | 频繁请假（1个月内3次以上） | 出勤系统 |\n| 态度变冷 | 家长回复简短、不主动沟通 | 学管师观察 |\n| 课堂参与下降 | 学生上课参与度明显下降 | 教师观察 |\n\n**响应流程：**\n\n| 步骤 | 时间 | 负责人 | 动作 |\n|------|------|--------|------|\n| 1. 学管重点跟进 | 发现当天 | 学管 | 安排\"10分钟随心谈\"了解学生状态 |\n| 2. 教师加强互动 | 本周课堂 | 教师 | 课堂增加互动关注度，课后单独聊几句 |\n| 3. 咨询师主动沟通 | 1周内 | 咨询师 | 主动联系家长，用关心而非推销的方式 |\n| 4. 数据分析 | 1周内 | 教师+学管 | 分析成绩/行为数据，找出变化原因 |\n| 5. 发送高光视频 | 本周 | 学管 | 发送近期高光视频给家长，增强感知价值 |\n| 6. 观察升级 | 持续 | 学管 | 如信号持续或恶化，升级为红色预警 |\n\n---\n\n### 绿色预警（观察）——持续观察\n\n**风险等级：** 低，流失概率 < 30%\n\n| 信号 | 具体表现 | 数据来源 |\n|------|---------|---------|\n| 偶尔缺课 | 单次请假1次，有合理原因 | 出勤系统 |\n| 小幅波动 | 成绩单次下降（5分以内） | 测评系统 |\n| 偶尔不交作业 | 1次未完成作业 | 作业系统 |\n| 被动参与 | 课堂互动偶尔不积极 | 教师观察 |\n\n**响应方式：**\n- 记录在案，持续观察\n- 不主动干预，保持正常服务节奏\n- 如2周内出现第二个绿色信号 → 升级为黄色\n- 学管师在周报中标注观察项\n\n---\n\n## 预警升级机制\n\n```\n绿色（观察）\n    ↓ 连续出现2次以上\n黄色（关注）\n    ↓ 1周内未改善/出现红色信号\n红色（紧急）\n    ↓ 72h干预后仍无效\n退费处理（体面结业）\n```\n\n---\n\n## 自动预警规则\n\n| 规则 | 触发条件 | 预警等级 |\n|------|---------|:-------:|\n| 连续缺课 | 连续2次无故缺课 | 红色 |\n| 作业断崖 | 作业完成率连续2周低于50% | 黄色 |\n| 成绩连降 | 连续2次测评下降超过10% | 黄色 |\n| 长期请假 | 1个月内请假3次以上 | 黄色 |\n| 单次缺课 | 1次无故缺课 | 绿色 |\n| 单次波动 | 1次测评下降5%以内 | 绿色 |\n\n---\n\n## 投诉处理原则\n\n### 处理流程\n\n| 阶段 | 时间要求 | 负责人 | 动作 |\n|------|---------|--------|------|\n| 首接 | 24h内电话响应 | 咨询师 | 倾听诉求，不辩解不推诿，记录问题 |\n| 情绪处理 | 首接当场 | 咨询师 | **先处理情绪，再处理事情** |\n| 调查 | 24-48h | 咨询师+教师 | 查明原因，收集数据和事实 |\n| 方案回复 | 48h内 | 咨询师 | 给出明确解决方案+时间节点+责任人 |\n| 回访 | 48h后 | 学管 | 确认满意度，持续关注 |\n\n### 处理原则\n\n- **先情绪后事情**：不急于解释和辩驳，先让家长把话说完\n- **不推诿**：不说\"这不是我的职责\"\n- **不辩解**：不说\"您可能误会了\"\n- **有担当**：明确解决方案和时间节点，说到做到\n- **有记录**：所有投诉记录存档，月度复盘\n\n---\n\n## 退费处理：体面结业\n\n### 核心原则\n\n> 口碑 > 一时成交。即使学生要走，也要体面结业，输出价值。\n\n### 体面结业流程\n\n| 步骤 | 动作 | 负责人 |\n|------|------|--------|\n| 1. 接受决定 | 尊重家长选择，不追问\"为什么不学了\"，不表现不高兴 | 咨询师 |\n| 2. 整理成长手册 | 完整输出学员在学期间的成长数据、高光时刻、师生寄语 | 学管 |\n| 3. 结业会谈 | 正式会谈（15-20min），回顾成长，教师给出后续建议，送上祝福 | 咨询师+教师 |\n| 4. 退费办理 | 按未使用课次退款，5个工作日内完成 | 咨询师 |\n| 5. 保持联系 | 后续偶尔关心，节日问候，不推销 | 学管 |\n\n### 退费绝对禁止\n\n| 绝对不做 | 原因 |\n|---------|------|\n| 追问\"为什么不学了\" | 让家长为难，破坏口碑 |\n| 表现不高兴或冷淡 | 影响最后印象，断送转介绍可能 |\n| \"走了以后就没优惠了\" | 威胁式挽留，损害品牌形象 |\n| 用挽留话术让家长为难 | 尊重选择，口碑至上 |\n| 在孩子面前表现遗憾 | 避免给孩子造成心理压力 |\n| 反复追问考虑结果 | 过度施压适得其反 |\n\n---\n\n## 预警处理闭环\n\n每一条预警从触发到关闭，必须经历完整闭环：\n\n```\n1. 触发 → 系统/人工识别信号\n2. 记录 → 学管师在系统中标记\n3. 上报 → 按等级通知对应负责人\n4. 干预 → 执行对应等级的响应流程\n5. 跟踪 → 按时间节点回访\n6. 评估 → 判断升级/降级/关闭\n7. 关闭 → 记录结果和经验\n```\n\n---\n\n## 预警数据看板\n\n### 周度统计\n\n| 指标 | 本周 | 上周 | 变化 |\n|------|:----:|:----:|:----:|\n| 红色预警学员数 | -- | -- | -- |\n| 黄色预警学员数 | -- | -- | -- |\n| 绿色预警学员数 | -- | -- | -- |\n| 本周干预成功率 | -- | -- | -- |\n| 本周退费人数 | -- | -- | -- |\n\n### 月度复盘\n\n| 复盘维度 | 分析内容 |\n|---------|---------|\n| 预警总量 | 本月红/黄/绿各多少条 |\n| 转化率 | 红色预警→实际流失的比例 |\n| 干预有效率 | 干预后降级或关闭的比例 |\n| 高频信号 | 哪类信号出现最多 |\n| 教师分布 | 预警是否集中在某个教师的班级 |\n| 改进措施 | 针对复盘发现的问题制定优化方案 |\n\n**目标指标：**\n- 红色预警→实际流失率 < 30%（即70%挽留成功）\n- 黄色预警→升级为红色率 < 20%\n- 预警响应及时率 ≥ 95%\n\n---\n\n## 与续费的关系\n\n预警体系是续费管理的前置环节：\n\n```\n日常服务 → 预警识别 → 干预解决 → 续费准备 → 续费面谈\n```\n\n- 无预警记录的学员：续费面谈按标准流程\n- 有黄色预警记录的学员：续费前需额外安排一次教师面谈\n- 有红色预警记录的学员：续费前需咨询师亲自跟进，确认问题已解决\n\n---\n\n## 相关文档\n\n- 退费话术与结业流程：`04_scripts/exit_gracefully.md`\n- 续费SOP：`06_ops/renewal_sop.md`\n- 铁三角协作：`06_ops/teacher_consultant_service_triangle.md`\n", "lines": 234, "size": 8298}, "06_ops__consultation_sop": {"id": "06_ops__consultation_sop", "path": "06_ops/consultation_sop.md", "name": "consultation_sop", "title": "标准咨询流程 SOP（60分钟）", "tags": "[type:sop, scene:first-contact, role:consultant]", "module": "06_ops", "content": "---\ntitle: 标准咨询流程 SOP（60分钟）\ntags: [type:sop, scene:first-contact, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 标准咨询流程 SOP（60分钟）\n\n## 核心原则\n\n- **证据先行**：拒绝空洞承诺，用数据说话\n- **专业获客**：用专业服务（试卷深度分析、学业规划）获客，不做低价引流\n- **不强推成交**：让家长自己做决定，给充足考虑时间\n- **不承诺提分**：用同类学员数据说明预期改善周期，不承诺具体提分数字\n\n---\n\n## 咨询五步法（60分钟）\n\n### 第一步：倾听（10分钟）\n\n**目标：** 了解家庭背景、孩子情况、学习痛点，让家长充分表达诉求和焦虑，建立信任基础。不急于推课。\n\n**动作清单：**\n- 开场自我介绍（姓名+角色+今天的目的）\n- 提问引导：\"您最希望孩子在哪个方面有所改善？\"\n- 记录关键词：年级、科目、当前成绩、目标、家长最大担忧\n- 了解家庭教育背景：父母参与度、课外安排、孩子学习态度\n- 80%时间让家长说，20%时间回应确认\n\n**禁止动作：**\n- 不打断家长\n- 不急于介绍课程或推荐班型\n- 不评价其他机构\n- 不过早下结论（\"孩子基础太差\"等）\n\n**话术示例：**\n> \"我先了解一下孩子的情况，这样后面给您的建议会更有针对性。您先说，我做个记录。\"\n\n---\n\n### 第二步：诊断展示（15分钟）\n\n**目标：** 如有试卷，做逐题归因分析；展示错误簇、思维层次评估，用专业分析建立机构信任。\n\n**动作清单：**\n- 如家长带了试卷：现场快速分析（逐题归因，找出错误簇）\n- 如未带试卷：用同年级典型案例展示诊断方法\n- 展示诊断工具：错题归因表、模块得分率雷达图\n- 给出一句话诊断结论\n\n**诊断三大维度：**\n\n| 维度 | 内容 | 输出 |\n|------|------|------|\n| 逐题归因 | 概念性/计算性/审题性/方法性错误 | 错误归因表 |\n| 思维层次评估 | 布鲁姆分类：记忆→理解→应用→分析→综合→创造 | 思维层次分布图 |\n| 错误簇识别 | 连续出错的知识模块 | 模块得分率表 |\n\n**话术示例：**\n> \"从这张卷子看，孩子的计算能力没问题，主要问题集中在应用题的审题环节——6道应用题错了4道，其中3道是题意理解偏差。这不是基础问题，是思维方法问题，可以针对性训练。\"\n\n**参考文档：** `02_courses/course_selector.md`（课程匹配）\n\n---\n\n### 第三步：方案讲解（20分钟）\n\n**目标：** 根据诊断结果推荐课程，展示同类学员案例，提出个性化学习方案。\n\n**动作清单：**\n- 展示针对该学生的学习规划（短期/中期/长期）\n- 推荐匹配的班型和课时方案（参考 `02_courses/course_selector.md`）\n- 用同类学员案例说明预期效果（附数据）\n- 介绍铁三角服务体系（咨询师+教师+学管）\n\n**方案规划结构：**\n\n| 维度 | 短期（1个月） | 中期（1学期） | 长期（1学年） |\n|------|-------------|-------------|-------------|\n| 知识 | 核心考点突破、漏洞填补 | 模块系统梳理 | 完整知识体系 |\n| 能力 | 审题与规范训练 | 解题策略训练 | 高阶思维构建 |\n| 习惯 | 错题本启用 | 自主预习复习 | 自驱学习体系 |\n\n**话术示例：**\n> \"根据同类学员数据，这种审题类问题通过8-12次专项训练，预期改善周期为1-2个月。我们有一位初二学生，情况和您孩子很像，经过10次课，应用题正确率从40%提升到75%。\"\n\n---\n\n### 第四步：答疑（10分钟）\n\n**目标：** 回答家长疑问，展示教师视频/课堂实录，消除顾虑。\n\n**动作清单：**\n- 主动邀请提问：\"您有什么想了解的？\"\n- 逐一回应，不回避敏感问题（如退费、效果保证）\n- 展示教师课堂实录视频（30-60秒精华片段）\n- 如遇无法当场回答的问题，记录并承诺跟进时间\n\n**高频问题应答：**\n\n| 家长问题 | 标准应答 |\n|---------|---------|\n| \"能保证提多少分？\" | \"根据同类学员数据，预期改善周期为X。我们用阶段测评和成长手册追踪效果，您随时可以看到数据。\" |\n| \"和XX机构比有什么优势？\" | \"我们的差异化在于——（展示诊断报告、成长手册、视频反馈等具体服务）\" |\n| \"效果不好可以退费吗？\" | \"可以，我们有明确的退费政策，按未使用课次退款。更重要的是，我们有预警机制，效果不达标会主动调整方案。\" |\n| \"孩子基础很差怎么办？\" | \"目前有几个关键知识漏洞需要补，我们会按优先级逐个突破，先从得分率最低的模块开始。\" |\n\n---\n\n### 第五步：收尾（5分钟）\n\n**目标：** 自然结束，不强推成交，给家长考虑时间。\n\n**动作清单：**\n- 总结今天的沟通要点\n- 告知后续跟进安排\n- 留下诊断报告或学习建议（纸质或电子版）\n- 加微信，说明后续会发送资料\n\n**话术示例：**\n> \"今天先聊到这里。我把诊断报告整理好发给您，您和家人商量一下。有任何问题随时联系我，不着急做决定。\"\n\n**禁止动作：**\n- 不说\"名额有限，赶紧报名\"\n- 不说\"今天报名有优惠\"\n- 不反复追问\"考虑得怎么样\"\n- 不贬低其他机构\n- 不做焦虑营销\n\n---\n\n## 咨询后跟进节奏\n\n| 时间节点 | 方式 | 内容 | 性质 |\n|---------|------|------|------|\n| Day 0 | 微信 | 感谢到访 + 发送诊断报告/学习建议 | 主动跟进 |\n| Day 1 | 微信 | 发送一条针对性学习建议（与诊断相关） | 价值输出 |\n| Day 3 | 电话 | 回访，询问是否有新问题，不提报名 | 主动跟进 |\n| Day 7 | 微信 | 分享一个同类学员的成长案例 | 主动跟进 |\n| Day 14 | 微信 | 最后一次主动联系，表达\"随时欢迎\" | 最后联系 |\n| Day 14+ | 停止 | 转为内容营销（朋友圈、公众号），不再主动跟进 | 被动输出 |\n\n**铁律：主动跟进不超过3次（Day 0/3/7），其余为被动式内容输出。**\n\n---\n\n## 咨询禁忌清单\n\n| 禁止 | 替代 |\n|------|------|\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X\" |\n| \"别的机构不行\" | 展示自身差异化价值 |\n| \"赶紧报名，名额有限\" | \"建议尽早开始，以下是时间规划\" |\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" |\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据 |\n\n---\n\n## 咨询记录模板\n\n每次咨询后，咨询师须在当天完成以下记录：\n\n```\n【咨询记录】\n日期：\n学生姓名/年级：\n家长姓名/联系方式：\n当前成绩概况：\n家长核心诉求：\n诊断结论（一句话）：\n推荐方案：\n家长顾虑：\n下一步跟进计划：\n预计成交可能性：高/中/低\n```\n\n---\n\n## 关键指标\n\n| 指标 | 目标值 |\n|------|:-----:|\n| 咨询到店率 | ≥ 60% |\n| 咨询满意度 | ≥ 90% |\n| 首次咨询成交率 | ≥ 30% |\n| 7天内成交率 | ≥ 50% |\n| 14天内成交率 | ≥ 60% |\n", "lines": 190, "size": 7129}, "06_ops__conversion_funnel": {"id": "06_ops__conversion_funnel", "path": "06_ops/conversion_funnel.md", "name": "conversion_funnel", "title": "转化漏斗模型", "tags": "[type:sop, scene:conversion, role:consultant]", "module": "06_ops", "content": "---\ntitle: 转化漏斗模型\ntags: [type:sop, scene:conversion, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 转化漏斗模型\n\n## 概述\n\n百分教育的招生转化遵循五级漏斗模型：**线索获取 → 到店咨询 → 试听体验 → 成交报名 → 留存续费/转介绍**。每一级都有明确的动作、负责人和数据指标，确保转化过程可追踪、可优化。\n\n---\n\n## 漏斗全景\n\n```\n线索获取（试卷分析钩子/学业规划/公开课/短视频）\n    ↓ 到店率\n到店咨询（60分钟标准咨询）\n    ↓ 试听率\n试听体验（真实课堂 + 铁三角配合）\n    ↓ 成交率\n成交报名（选卡 + 缴费）\n    ↓ 续费率\n长期留存（成长手册驱动续费）\n    ↓ 转介绍率\n转介绍（三重好礼机制）\n```\n\n---\n\n## 各级漏斗详解\n\n### 第一级：线索获取\n\n**核心策略：用专业内容获客，不做焦虑营销。**\n\n**推荐钩子：**\n\n| 钩子类型 | 形式 | 目的 | 效果参考 |\n|---------|------|------|---------|\n| 试卷深度分析 | 图文报告 | 展示诊断能力，引导到店 | 专业钩子，高转化 |\n| 学业规划咨询 | 面对面/线上 | 建立深度信任 | 高意向线索 |\n| 学习方法公开课 | 线下，≤20人 | 面对面建立信任 | 精准获客 |\n| 考前诊断 | 专题分析 | 抓住考试节点需求 | 季节性爆发 |\n| 短视频内容 | 30-60秒 | 错题分析/课堂实录/学员案例 | 持续曝光 |\n\n**关键数据：**\n- 数学组《湛江中考几何高频错题模型库》已使到店率提升 **18%**\n- 视频内容的到店转化率是纯文字的 **2.3倍**\n\n**禁止内容：**\n- 低价体验课广告\n- \"名额有限，赶紧报名\"\n- 空洞的名师宣传（\"我们的老师很优秀\"）\n- 焦虑贩卖（\"孩子不补课就完了\"）\n\n---\n\n### 第二级：到店转化\n\n**核心策略：用诊断能力打动家长，自然引导试听。**\n\n| 动作 | 负责人 | 要点 |\n|------|--------|------|\n| 60分钟标准咨询 | 咨询师 | 倾听→诊断→方案→答疑→收尾 |\n| 试卷现场分析 | 咨询师/教师 | 逐题归因，展示专业度 |\n| 推荐试听 | 咨询师 | 自然过渡，不强推 |\n| 发送教师视频 | 学管师 | 试听前推送课堂实录 |\n\n**转化关键：**\n- 诊断报告的专业度直接影响试听意愿\n- \"我先试听一下再决定\"是最自然的转化路径\n- 不要在咨询环节就推成交\n\n---\n\n### 第三级：试听转化\n\n**核心策略：教师+咨询师+学管\"铁三角\"协作，真实课堂+即时反馈。**\n\n| 环节 | 动作 | 负责人 |\n|------|------|--------|\n| 试听前 | 推送教师视频/课堂实录/学员成果 | 咨询师 |\n| 试听中 | 铁三角配合，真实课堂不表演 | 教师+学管 |\n| 试听后 | 10分钟即时反馈 | 教师+咨询师 |\n| 跟进 | Day0报告→Day3回访→Day7案例 | 咨询师 |\n\n**参考数据：** 铁三角标准化配合上线后，试听转化率提升 **22%**\n\n---\n\n### 第四级：成交转化\n\n**核心策略：诊断驱动，用数据说话，不靠低价引流。**\n\n| 动作 | 频率 | 负责人 |\n|------|------|--------|\n| 诊断报告交付 | 首次咨询后 | 咨询师 |\n| 个性化方案推荐 | 试听后 | 咨询师 |\n| 同类学员案例分享 | 跟进中 | 咨询师 |\n| 选卡方案推荐 | 成交环节 | 咨询师 |\n\n---\n\n### 第五级：留存续费\n\n**核心策略：成长手册驱动续费，9000服务体系保障服务质量。**\n\n| 动作 | 频率 | 负责人 |\n|------|------|--------|\n| 阶段测评报告 | 每月 | 教师 |\n| 成长手册更新 | 每季度 | 学管师 |\n| 家长面谈 | 每学期 | 咨询师+教师 |\n| 续费面谈 | 到期前1个月 | 咨询师 |\n\n**关键数据：**\n- 标准化服务流程上线后，续费率从 **45%** 提升至 **72%**（参考深圳案例）\n- 拥有成长手册的学员续费率比无手册学员高 **35%**\n\n---\n\n### 第六级：转介绍\n\n**核心策略：三重好礼，口碑驱动。**\n\n| 好礼 | 内容 |\n|------|------|\n| 现金奖励 | 200元/成功推荐 |\n| 课时奖励 | 赠送2次课 |\n| 代金券 | 500元课程代金券 |\n\n**转介绍时机：** 续费后/阶段性成果反馈后，自然引导，不强求。\n\n---\n\n## 漏斗数据看板\n\n### 目标基准值\n\n| 漏斗层级 | 转化率目标 | 当前实际 | 差距 |\n|---------|:---------:|:-------:|:----:|\n| 曝光 → 到店 | ≥ 8% | 待测量 | -- |\n| 到店 → 试听 | ≥ 70% | 待测量 | -- |\n| 试听 → 成交 | ≥ 50% | 待测量 | -- |\n| 成交 → 续费 | ≥ 72% | 72% | 达标 |\n| **整体：曝光 → 成交** | ≥ 2.8% | 待测量 | -- |\n\n### 数据采集方式\n\n| 数据项 | 采集方式 | 频率 | 负责人 |\n|--------|---------|------|--------|\n| 视频曝光量 | 平台后台数据 | 每周 | 运营 |\n| 到店人数 | 前台登记 | 每日 | 学管师 |\n| 试听人数 | 试听登记表 | 每日 | 学管师 |\n| 成交人数 | 缴费系统 | 每日 | 咨询师 |\n| 续费率 | CRM系统 | 每月 | 咨询师 |\n\n---\n\n## 漏斗优化策略\n\n### 曝光 → 到店 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 曝光量不足 | 增加视频发布频率至每日1条 |\n| 到店率低 | 优化视频内容（加入诊断类钩子） |\n| 到店但非目标客户 | 精准定位内容标签，筛选高意向人群 |\n\n### 到店 → 试听 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 咨询后不愿试听 | 提升诊断报告质量，增加\"试听价值感\" |\n| 约了试听但未到 | 试听前1天提醒+发送教师视频预热 |\n\n### 试听 → 成交 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 试听满意但犹豫 | 加强课后反馈即时性，发送完整诊断报告 |\n| 价格顾虑 | 推荐启航卡低门槛体验，不急于推大单 |\n| 对比其他机构 | 展示差异化价值（诊断体系、成长手册、视频反馈） |\n\n### 成交 → 续费 优化\n\n| 问题 | 优化动作 |\n|------|---------|\n| 效果不明显 | 启动流失预警机制，调整教学方案 |\n| 服务感知弱 | 增加阶段反馈频率，强化成长手册可视化 |\n| 价格敏感 | 推荐领航卡长期方案，展示课均价优势 |\n\n---\n\n## 案例数据\n\n### 几何错题模型库专项\n\n- 投放渠道：短视频平台\n- 内容形式：几何典型错题分析（30秒/条）\n- 曝光量：12,000次/月\n- 到店咨询：216人（到店率增幅 **18%**）\n- 试听转化：约108人\n- 最终成交：约54人\n\n### 标准化服务流程上线\n\n- 上线前续费率：**45%**\n- 上线后续费率：**72%**\n- 提升幅度：**+27个百分点**\n- 核心变量：成长手册 + 铁三角协作 + 标准化反馈节奏\n", "lines": 215, "size": 6638}, "06_ops__home_school_communication": {"id": "06_ops__home_school_communication", "path": "06_ops/home_school_communication.md", "name": "home_school_communication", "title": "家校沟通体系", "tags": "[type:sop, role:xueguan, role:consultant]", "module": "06_ops", "content": "---\ntitle: 家校沟通体系\ntags: [type:sop, role:xueguan, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 家校沟通体系\n\n## 核心理念\n\n> \"子不教父之过，教不严师之惰\"——实现两小时外教育。\n\n学生在机构的时间有限，真正的成长发生在课堂之外。家校沟通的目标是构建\"学生主导+家长引导+老师指导\"的**三力模型**，让教育效果从课堂延伸到家庭。\n\n---\n\n## 三力模型\n\n| 力 | 角色 | 职责 | 关键动作 |\n|------|------|------|---------|\n| 学生主导 | 学生 | 学习的第一责任人 | 完成作业、使用错题本、自主预习复习 |\n| 家长引导 | 家长 | 家庭学习环境的营造者 | 监督习惯、配合计划、参与活动 |\n| 老师指导 | 教师+学管 | 专业教学和服务保障 | 诊断→方案→执行→反馈→调整 |\n\n---\n\n## 沟通三段式（每次沟通必用）\n\n无论任何沟通场景，均遵循以下三段式结构：\n\n### 第一段：共情（30%）\n\n**目标：** 先理解家长焦虑，不急于反驳。\n\n- 倾听家长诉求，复述确认\n- 表达理解：\"您的担心完全可以理解\"\n- 不否定家长感受，不说\"您想多了\"或\"这很正常\"\n- 建立\"我们是同一战线\"的感觉\n\n**话术示例：**\n> \"我完全理解您的着急，成绩下降确实让人揪心。我先跟您说说我们观察到的情况。\"\n\n**禁止：**\n- 不急于反驳\n- 不说\"您别担心\"（家长会觉得不被重视）\n- 不说\"这很正常\"（家长会觉得被敷衍）\n\n---\n\n### 第二段：证据（40%）\n\n**目标：** 用具体数据和事实说话。\n\n- 展示入学vs当前的数据对比\n- 引用具体测评分数、作业完成率、课堂表现\n- 用错题归因分析说明问题所在\n- 避免空洞评价（\"孩子进步很大\"→\"数学从72分提升到85分\"）\n\n**证据来源：**\n- 阶段测评报告\n- 错题归因表\n- 课堂表现记录\n- 作业完成数据\n- 成长手册历史数据\n\n**话术示例：**\n> \"从数据来看，孩子入学时模块得分率：计算87%、应用题42%、几何65%。经过8次课，应用题得分率已提升到61%，提升了19个百分点。几何部分也从65%提升到78%。\"\n\n---\n\n### 第三段：行动（30%）\n\n**目标：** 明确下一步+时间节点+责任人。\n\n- 给出不超过3个优先行动方案\n- 每个方案明确：做什么、谁负责、什么时间、预期效果\n- 家长配合建议要具体、可操作\n\n**话术示例：**\n> \"接下来一个月，我们的计划是：1）教师每周增加1次应用题专项练习（王老师负责，每周三）；2）学管每周发送练习反馈给您（李老师负责，每周五）；3）请您在家监督孩子完成错题本整理（每天10分钟）。一个月后我们再看数据。\"\n\n---\n\n## 场景分流沟通策略\n\n### 场景一：首次咨询\n\n**策略：** 建立信任，不急推课。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 了解家长诉求和焦虑来源 | 80%时间让家长说 |\n| 证据 | 展示诊断能力（试卷分析/案例） | 用数据建立专业信任 |\n| 行动 | 提供一份免费学习建议，邀请试听 | 留下诊断报告，给考虑时间 |\n\n**关键原则：** 第一次见面只做诊断和建议，不谈报名和价格（除非家长主动问）。\n\n---\n\n### 场景二：阶段反馈\n\n**策略：** 入学vs当前的数据对比，用成长手册说话。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 肯定家长的配合和关注 | 先说家长做得好的地方 |\n| 证据 | 数据对比（入学→当前） | 模块得分率变化、能力图谱更新 |\n| 行动 | 下阶段计划+家长配合事项 | 明确时间和责任人 |\n\n**反馈频率：**\n- 日常：学管师每周1次微信简报\n- 正式：每月1次阶段测评报告\n- 面谈：每学期1次家长面谈\n\n---\n\n### 场景三：成绩下降\n\n**策略：** 不回避，共情→归因→调整方案。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 承认下降事实，理解家长焦虑 | \"成绩下降确实让人担心，我们一起看看原因\" |\n| 证据 | 拆分数据找根因 | 哪个模块下降、是否新增考点、是否非学习因素 |\n| 行动 | 调整方案（换教师/加课/调难度）+明确观察周期 | 1-2周后复盘，短期见效果 |\n\n**禁止说法：**\n- 不甩锅给学生（\"孩子不认真\"）\n- 不甩锅给家长（\"家里没配合\"）\n- 不找借口（\"这次考试偏难\"）\n- 不说\"孩子基础太差\"（替代：\"目前有几个关键知识漏洞需要补\"）\n\n---\n\n### 场景四：续费\n\n**策略：** 成长手册驱动，说\"继续\"不说\"续费\"。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 回顾共同走过的路程 | 感谢家长信任和配合 |\n| 证据 | 展示成长手册（数据+高光时刻） | 入学到当前的完整成长轨迹 |\n| 行动 | 下阶段规划+自然过渡 | 不强推，给家长决定空间 |\n\n**禁止：**\n- 不说\"续费\"（说\"继续\"）\n- 不制造紧迫感（\"不续费就退步\"）\n- 不打折促成交（用价值驱动，不用价格驱动）\n\n---\n\n### 场景五：投诉\n\n**策略：** 24h电话响应，先情绪后事情，48h回访。\n\n| 时间线 | 动作 | 负责人 |\n|--------|------|--------|\n| 0-24小时 | **电话响应**：倾听+道歉+承诺调查 | 咨询师 |\n| 24-48小时 | 内部调查+制定解决方案 | 咨询师+教师+学管 |\n| 48小时内 | **回访**：反馈调查结果+解决方案 | 咨询师 |\n| 1周后 | 跟踪回访，确认问题已解决 | 学管师 |\n\n**处理原则：**\n1. 24小时内必须电话响应（不是微信）\n2. 先处理情绪，再处理事情\n3. 不推诿，不找借口\n4. 48小时内给出明确解决方案\n5. 所有投诉记录存档，月度复盘\n\n---\n\n### 场景六：退费/体面告别\n\n**策略：** 接受决定，输出成长手册，保持联系。\n\n| 阶段 | 动作 | 要点 |\n|------|------|------|\n| 共情 | 尊重家长决定，不强留 | 不追问原因、不施压挽留 |\n| 证据 | 整理完整成长手册 | 作为送给孩子的\"毕业礼物\" |\n| 行动 | 结业会谈+后续保持联系 | 口碑 > 一时成交 |\n\n**退费流程：**\n1. 接受退费意向，不反复挽留（最多1次真诚挽留）\n2. 整理成长手册（入学→离开的完整记录）\n3. 安排结业会谈（15分钟，教师参与）\n4. 计算退费金额，5个工作日内完成退款\n5. 后续：节日问候、学习资料分享（不推课）\n\n**铁律：** 即使学生要走，也要体面结业，输出价值。口碑 > 一时成交。\n\n---\n\n## 日常沟通方式：数字化/视频化\n\n| 方式 | 频率 | 内容 | 负责人 |\n|------|------|------|--------|\n| 30秒高光视频 | 每周 | 孩子课堂上的精彩瞬间，同步家长 | 学管师 |\n| 课堂片段实拍 | 每次课 | 教学过程真实记录 | 学管师 |\n| 每周微信简报 | 每周 | 本周学习情况+下周计划 | 学管师 |\n| 阶段数据报告 | 每月 | 模块得分率、能力图谱更新 | 教师 |\n| 成长手册更新 | 每季度 | 综合成长轨迹 | 学管师 |\n\n---\n\n## 家长教育：引导理念\n\n引导家长成为教育的合作伙伴，而非旁观者：\n\n- 分享家庭教育方法（如\"家庭几何探索游戏\"，让家长参与孩子的学习过程）\n- 推送适合家长的教育文章（不贩卖焦虑，传递正向理念）\n- 引导家长关注过程而非只看分数\n- 具体配合建议（\"每天10分钟错题整理\"而非\"多管管孩子\"）\n\n**参考案例：** 某校区通过家长教育活动（家庭几何探索游戏等），续费率提高 **35%**。\n\n---\n\n## 家长焦虑类型与应对\n\n| 焦虑类型 | 典型表现 | 应对策略 |\n|---------|---------|---------|\n| 成绩焦虑 | \"分数怎么还没提上去\" | 拆分数据，展示模块级进步 |\n| 对比焦虑 | \"别人家孩子在XX机构进步更快\" | 展示自身差异化价值，不评价其他机构 |\n| 投入焦虑 | \"花了这么多钱值不值\" | 量化投入产出比，展示成长数据 |\n| 时间焦虑 | \"升学就在眼前来不及了\" | 给出时间规划，说明优先级排序 |\n| 信任焦虑 | \"老师到底认不认真教\" | 提供课堂视频、作业批改记录等可视化证据 |\n\n---\n\n## 沟通禁忌\n\n| 禁止 | 替代 |\n|------|------|\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" |\n| \"进步很大\" | 用具体数据，如\"数学从72分提升到85分\" |\n| \"您多管管孩子\" | \"如果您能在家监督每天10分钟错题整理，效果会更好\" |\n| \"别的机构教的不好\" | 展示自身差异化价值 |\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X\" |\n| \"赶紧续费\" | \"建议继续下一阶段的学习，以下是规划\" |\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据 |\n\n---\n\n## 沟通记录规范\n\n每次重要沟通后，负责人须在当天记录：\n\n```\n【沟通记录】\n日期：\n学生姓名/年级：\n沟通人：家长姓名 / 关系\n沟通方式：面谈/电话/微信\n场景类型：首次咨询/阶段反馈/成绩下降/续费/投诉/退费\n共情要点：\n证据展示：\n行动方案：\n家长反馈：\n下次跟进时间：\n```\n", "lines": 262, "size": 9219}, "06_ops__pricing__card_types_explained": {"id": "06_ops__pricing__card_types_explained", "path": "06_ops/pricing/card_types_explained.md", "name": "card_types_explained", "title": "课时卡类型详解", "tags": "[定价, 课时卡, 领航卡, 畅学卡, 启航卡]", "module": "06_ops", "content": "---\ntitle: 课时卡类型详解\ntags: [定价, 课时卡, 领航卡, 畅学卡, 启航卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 课时卡类型详解\n\n## 概述\n\n百分教育提供三种课时卡，满足不同家庭的学习节奏和预算需求。课时卡适用于精品小班（6-12人）和精英班（13-20人），一对一/一对二/圆桌课采用报课赠课制度。\n\n---\n\n## 三种卡型一览\n\n### 1. 领航卡 -- 最优惠\n\n| 维度 | 说明 |\n|------|------|\n| 课次 | 60次 |\n| 有效期 | **一年（自购卡之日起），上完即止** |\n| 赠送课次 | **5次**（含在卡内，不额外计费） |\n| 资料费 | 400元（一次性，含全学年教材及讲义） |\n| 核心优势 | **单价最低**，适合确定长期学习的家庭 |\n| 价格区间 | 80-180元/次（视年级和班型而定） |\n\n**适合人群：**\n- 确定在百分教育长期学习（至少一学年）\n- 每周能稳定安排1-2次课\n- 希望获得最大性价比\n\n**使用规则：**\n- 一年有效期内60+5=65次课需上完\n- 按每周2次计算，约33周可用完（含赠课）\n- 到期未用完的课次不予退还或延期\n- 因机构原因停课顺延有效期\n\n---\n\n### 2. 畅学卡 -- 最灵活\n\n| 维度 | 说明 |\n|------|------|\n| 课次 | 60次 |\n| 有效期 | **无时间限制**，按次划课 |\n| 赠送课次 | **3次**（含在卡内） |\n| 资料费 | 400元（一次性） |\n| 核心优势 | **最灵活**，不受时间压力 |\n| 价格区间 | 100-210元/次（视年级和班型而定） |\n\n**适合人群：**\n- 学习时间不固定（如课外活动多、经常出差的家庭）\n- 跨学期使用，不想被有效期约束\n- 希望保留灵活调课空间\n\n**使用规则：**\n- 无有效期限制，按次划课\n- 每次上课划1次，赠送的3次同等使用\n- 可暂停使用，随时恢复\n- 退卡按已使用次数 x 课单价计算退款\n\n---\n\n### 3. 启航卡 -- 入门体验\n\n| 维度 | 说明 |\n|------|------|\n| 课次 | 30次 |\n| 有效期 | **无时间限制**，按次划课 |\n| 赠送课次 | **无** |\n| 资料费 | 200元（一次性） |\n| 核心优势 | **低门槛入门**，体验后再决定 |\n| 价格区间 | 110-225元/次（视年级和班型而定） |\n\n**适合人群：**\n- 首次接触百分教育，想先感受教学质量\n- 短期补习需求（如假期集中突破一个模块）\n- 预算有限，希望先小额投入\n\n**使用规则：**\n- 30次课按次划扣\n- 无赠送课次\n- 用完后可升级为领航卡或畅学卡，已用课次按差价补齐\n\n---\n\n## 三卡对比总表\n\n| 对比维度 | 领航卡 | 畅学卡 | 启航卡 |\n|---------|:------:|:-----:|:-----:|\n| 课次 | 60次 | 60次 | 30次 |\n| 赠送 | 5次 | 3次 | 0次 |\n| 实际总课次 | 65次 | 63次 | 30次 |\n| 有效期 | 一年 | 无限制 | 无限制 |\n| 资料费 | 400元 | 400元 | 200元 |\n| 单价水平 | 最低 | 中等 | 较高 |\n| 灵活度 | 一般 | 最高 | 高 |\n| 退卡政策 | 按已用次数x单价退 | 按已用次数x单价退 | 按已用次数x单价退 |\n\n---\n\n## 选卡决策树\n\n```\n你确定至少学一学年吗？\n├── 是 → 每周能保证1-2次课吗？\n│   ├── 是 → 【领航卡】最优惠\n│   └── 否 → 【畅学卡】最灵活\n└── 否 → 想先体验一下？\n    ├── 是 → 【启航卡】低门槛\n    └── 不确定 → 【启航卡】先体验，后续可升级\n```\n\n---\n\n## 升级与转换\n\n| 转换方向 | 规则 |\n|---------|------|\n| 启航卡 → 领航卡 | 剩余课次按领航卡单价折算，补差价即可 |\n| 启航卡 → 畅学卡 | 剩余课次按畅学卡单价折算，补差价即可 |\n| 畅学卡 → 领航卡 | 需剩余课次30次以上，补差价+重新计算一年有效期 |\n| 领航卡 → 畅学卡 | 不支持（领航卡有效期内更优惠） |\n\n---\n\n## 常见问题\n\n**Q：领航卡到期没用完怎么办？**\nA：建议提前1个月联系学管师评估剩余课次，机构会尽力协助加课消化。到期未用完原则上不退不延。\n\n**Q：畅学卡可以两个孩子共用吗？**\nA：不可以。每张卡绑定一名学生，不可转让或共享。\n\n**Q：资料费包含什么？**\nA：包含对应学段的全套教材、课堂讲义、错题本、阶段测试卷。电子版资料终身可查。\n\n**Q：购卡后可以换科目吗？**\nA：可以。课时卡不绑定科目，可跨科使用（如数学和英语混合划课）。\n", "lines": 142, "size": 4444}, "06_ops__pricing__class_13to20_pricing": {"id": "06_ops__pricing__class_13to20_pricing", "path": "06_ops/pricing/class_13to20_pricing.md", "name": "class_13to20_pricing", "title": "精英班（13-20人）价格体系", "tags": "[定价, 大班, 13-20人, 课时卡]", "module": "06_ops", "content": "---\ntitle: 精英班（13-20人）价格体系\ntags: [定价, 大班, 13-20人, 课时卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 精英班（13-20人）价格体系\n\n## 概述\n\n精英班每班13-20人，适合基础较好、自律性强的学生。班型规模略大，单价更具竞争力，同时保留分层教学和课堂互动的优势。\n\n---\n\n## 完整价格表\n\n| 年级 | 课单价（元/次） | 领航卡 60次（元/次） | 领航卡总价 | 畅学卡 60次（元/次） | 畅学卡总价 | 启航卡 30次（元/次） | 启航卡总价 |\n|------|:--------------:|:-------------------:|:---------:|:-------------------:|:---------:|:-------------------:|:---------:|\n| 一~三年级 | 120 | 80 | 4,800 | 100 | 6,000 | 110 | 3,300 |\n| 四年级 | 125 | 85 | 5,100 | 105 | 6,300 | 115 | 3,450 |\n| 五年级 | 130 | 90 | 5,400 | 110 | 6,600 | 120 | 3,600 |\n| 六年级 | 135 | 95 | 5,700 | 115 | 6,900 | 125 | 3,750 |\n| 初一 | 140 | 100 | 6,000 | 120 | 7,200 | 130 | 3,900 |\n| 初二 | 150 | 110 | 6,600 | 130 | 7,800 | 140 | 4,200 |\n| 初三 | 160 | 120 | 7,200 | 140 | 8,400 | 150 | 4,500 |\n| 高一 | 170 | 130 | 7,800 | 150 | 9,000 | 160 | 4,800 |\n| 高二 | 180 | 140 | 8,400 | 160 | 9,600 | 170 | 5,100 |\n| 高三 | 190 | 150 | 9,000 | 170 | 10,200 | 180 | 5,400 |\n\n---\n\n## 与精品小班（6-12人）价格对比\n\n| 年级 | 精品小班课单价 | 精英班课单价 | 差额 | 精英班折扣率 |\n|------|:------------:|:----------:|:----:|:----------:|\n| 一~三年级 | 140 | 120 | -20 | 85.7% |\n| 四年级 | 150 | 125 | -25 | 83.3% |\n| 五年级 | 160 | 130 | -30 | 81.3% |\n| 六年级 | 170 | 135 | -35 | 79.4% |\n| 初一 | 180 | 140 | -40 | 77.8% |\n| 初二 | 190 | 150 | -40 | 78.9% |\n| 初三 | 200 | 160 | -40 | 80.0% |\n| 高一 | 210 | 170 | -40 | 81.0% |\n| 高二 | 220 | 180 | -40 | 81.8% |\n| 高三 | 230 | 190 | -40 | 82.6% |\n\n---\n\n## 适用场景\n\n1. **基础扎实的学生**：能跟上大班节奏，不需要过多个别辅导\n2. **预算有限的家庭**：精英班单价比精品小班低20-40元/次，60次课可节省1,200-2,400元\n3. **社交型学习者**：喜欢课堂讨论、同伴激励的学生\n\n---\n\n## 班型选择建议\n\n| 情况 | 推荐班型 |\n|------|---------|\n| 基础薄弱，需要高频关注 | 精品小班（6-12人） |\n| 基础中等偏上，自律性好 | 精英班（13-20人） |\n| 需要个性化定制 | 一对一/一对二 |\n| 家长自发组团3-5人 | 家长组团班（另见 `parent_group_pricing.md`） |\n\n---\n\n## 注意事项\n\n- 每次课90分钟\n- 卡型规则与精品小班一致（领航卡一年有效、畅学卡无时间限制、启航卡30次入门）\n- 资料费标准：领航卡/畅学卡400元，启航卡200元\n- 精英班开班人数不低于8人，低于8人将合并或调整至小班\n- 可叠加新生折扣及团报优惠\n", "lines": 76, "size": 2844}, "06_ops__pricing__class_6to12_pricing": {"id": "06_ops__pricing__class_6to12_pricing", "path": "06_ops/pricing/class_6to12_pricing.md", "name": "class_6to12_pricing", "title": "精品小班（6-12人）价格体系", "tags": "[定价, 小班, 6-12人, 课时卡]", "module": "06_ops", "content": "---\ntitle: 精品小班（6-12人）价格体系\ntags: [定价, 小班, 6-12人, 课时卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 精品小班（6-12人）价格体系\n\n## 概述\n\n精品小班是百分教育的核心班型，每班6-12人，兼顾教学互动与个性化关注。配合三种课时卡（领航卡、畅学卡、启航卡），满足不同家庭的时间与预算需求。\n\n---\n\n## 完整价格表\n\n| 年级 | 课单价（元/次） | 领航卡 60次（元/次） | 领航卡总价 | 畅学卡 60次（元/次） | 畅学卡总价 | 启航卡 30次（元/次） | 启航卡总价 |\n|------|:--------------:|:-------------------:|:---------:|:-------------------:|:---------:|:-------------------:|:---------:|\n| 一~三年级 | 140 | 95 | 5,700 | 125 | 7,500 | 135 | 4,050 |\n| 四年级 | 150 | 105 | 6,300 | 130 | 7,800 | 145 | 4,350 |\n| 五年级 | 160 | 110 | 6,600 | 140 | 8,400 | 155 | 4,650 |\n| 六年级 | 170 | 120 | 7,200 | 150 | 9,000 | 165 | 4,950 |\n| 初一 | 180 | 130 | 7,800 | 160 | 9,600 | 175 | 5,250 |\n| 初二 | 190 | 140 | 8,400 | 170 | 10,200 | 185 | 5,550 |\n| 初三 | 200 | 150 | 9,000 | 180 | 10,800 | 195 | 5,850 |\n| 高一 | 210 | 160 | 9,600 | 190 | 11,400 | 205 | 6,150 |\n| 高二 | 220 | 170 | 10,200 | 200 | 12,000 | 215 | 6,450 |\n| 高三 | 230 | 180 | 10,800 | 210 | 12,600 | 225 | 6,750 |\n\n---\n\n## 三种卡型对比\n\n| 维度 | 领航卡 | 畅学卡 | 启航卡 |\n|------|--------|--------|--------|\n| 课次 | 60次 | 60次 | 30次 |\n| 有效期 | 一年（上完即止） | 无时间限制（按次划课） | 无时间限制（按次划课） |\n| 资料费 | 400元 | 400元 | 200元 |\n| 赠送课次 | 5次 | 3次 | 无 |\n| 特点 | 单价最优惠 | 最灵活 | 入门体验 |\n\n---\n\n## 节省对比（以初二为例）\n\n- **按课单价购买60次**：190 x 60 = 11,400元\n- **领航卡60次**：8,400元（节省3,000元，折扣率73.7%）\n- **畅学卡60次**：10,200元（节省1,200元，折扣率89.5%）\n- **启航卡30次**：5,550元（节省150元/次 x 30 = 单价折扣率97.4%）\n\n---\n\n## 选卡建议\n\n1. **确定长期学习、时间稳定** → 领航卡（最高性价比，一年内上完）\n2. **需要灵活安排、不确定频率** → 畅学卡（无时间限制，按需划课）\n3. **初次接触、想先体验效果** → 启航卡（30次入门，低门槛）\n\n---\n\n## 注意事项\n\n- 所有价格均为每次课（90分钟/次）标准定价\n- 资料费为一次性费用，随卡缴纳\n- 领航卡赠送的5次课需在有效期内使用\n- 可叠加新生折扣及团报优惠（详见 `promotions_current.md`）\n- 价格调整以最新通知为准，已购卡不受调价影响\n", "lines": 69, "size": 2684}, "06_ops__pricing__one_on_one_pricing": {"id": "06_ops__pricing__one_on_one_pricing", "path": "06_ops/pricing/one_on_one_pricing.md", "name": "one_on_one_pricing", "title": "一对一/一对二/圆桌课 价格体系（机构组织）", "tags": "[定价, 一对一, 一对二, 圆桌, 个性化]", "module": "06_ops", "content": "---\ntitle: 一对一/一对二/圆桌课 价格体系（机构组织）\ntags: [定价, 一对一, 一对二, 圆桌, 个性化]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 一对一 / 一对二 / 圆桌课 价格体系（机构组织）\n\n## 概述\n\n机构组织的个性化课程分为三种形式：一对一（1v1）、一对二（1v2）、圆桌课（3-5人小组）。适合需要高度定制化教学方案的学生，由机构统一安排师资和教学计划。\n\n---\n\n## 标准课单价\n\n| 年级 | 一对一（元/次） | 一对二（元/次） | 圆桌课（元/次） |\n|------|:--------------:|:--------------:|:--------------:|\n| 一~二年级 | 280 | 200 | 170 |\n| 三年级 | 300 | 210 | 180 |\n| 四年级 | 320 | 220 | 190 |\n| 五年级 | 340 | 240 | 200 |\n| 六年级 | 360 | 250 | 220 |\n| 初一 | 380 | 270 | 230 |\n| 初二 | 400 | 280 | 240 |\n| 初三 | 420 | 290 | 250 |\n| 高一 | 440 | 310 | 260 |\n| 高二 | 460 | 320 | 280 |\n| 高三 | 480 | 340 | 290 |\n\n---\n\n## 报课赠课政策\n\n批量报课享赠课优惠，赠课随正课使用，无额外时间限制：\n\n| 报课次数 | 赠送次数 | 实际总课次 | 赠送比例 |\n|:--------:|:-------:|:---------:|:-------:|\n| 15次 | 1次 | 16次 | 6.7% |\n| 30次 | 3次 | 33次 | 10.0% |\n| 60次 | 7次 | 67次 | 11.7% |\n| 90次 | 12次 | 102次 | 13.3% |\n| 120次 | 20次 | 140次 | 16.7% |\n\n---\n\n## 费用计算示例\n\n### 示例1：初二学生报一对一60次\n\n- 标准单价：400元/次\n- 报课60次，赠送7次，实际可上67次\n- 总费用：400 x 60 = **24,000元**\n- 折合实际单价：24,000 / 67 = **358元/次**\n\n### 示例2：六年级学生报一对二30次\n\n- 标准单价：250元/次\n- 报课30次，赠送3次，实际可上33次\n- 总费用：250 x 30 = **7,500元**\n- 折合实际单价：7,500 / 33 = **227元/次**\n\n### 示例3：高三学生报圆桌课120次\n\n- 标准单价：290元/次\n- 报课120次，赠送20次，实际可上140次\n- 总费用：290 x 120 = **34,800元**\n- 折合实际单价：34,800 / 140 = **249元/次**\n\n---\n\n## 三种形式对比\n\n| 维度 | 一对一 | 一对二 | 圆桌课 |\n|------|--------|--------|--------|\n| 人数 | 1人 | 2人 | 3-5人 |\n| 个性化程度 | 最高 | 较高 | 中等 |\n| 单价水平 | 最高 | 中等 | 较低 |\n| 适合学生 | 基础极弱或冲刺拔高 | 水平接近的同伴 | 同级别小组讨论 |\n| 课堂节奏 | 完全跟学生走 | 兼顾两人进度 | 小组互动为主 |\n\n---\n\n## 选择建议\n\n1. **一对一**：适合以下情况\n   - 学科基础存在严重漏洞，需逐点攻破\n   - 中高考冲刺阶段，时间紧、目标明确\n   - 学生性格内向，不擅长在集体中提问\n\n2. **一对二**：适合以下情况\n   - 两位学生水平相近（差距不超过15分）\n   - 同班同学或好友结伴学习，互相督促\n   - 希望比一对一节省30%-40%费用\n\n3. **圆桌课**：适合以下情况\n   - 3-5位水平相近的学生组团\n   - 注重讨论式学习、思维碰撞\n   - 预算有限但希望获得小班关注度\n\n---\n\n## 注意事项\n\n- 每次课时长：一对一60分钟，一对二/圆桌课90分钟\n- 一对二需两位学生年级相同、学科相同、水平相近\n- 圆桌课由机构根据学生水平统一分组\n- 赠课政策适用于所有三种课型\n- 可叠加新生折扣（详见 `promotions_current.md`）\n- 家长自发组团的一对二/圆桌课价格另见 `parent_group_pricing.md`\n", "lines": 112, "size": 3439}, "06_ops__pricing__parent_group_pricing": {"id": "06_ops__pricing__parent_group_pricing", "path": "06_ops/pricing/parent_group_pricing.md", "name": "parent_group_pricing", "title": "家长自发组团价格体系", "tags": "[定价, 家长组团, 一对二, 圆桌, 课时卡]", "module": "06_ops", "content": "---\ntitle: 家长自发组团价格体系\ntags: [定价, 家长组团, 一对二, 圆桌, 课时卡]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 家长自发组团价格体系\n\n## 概述\n\n家长自发组团是指家长自行组织2-5名水平相近的学生，向机构申请开设一对二或圆桌课。由于家长承担了招生组织成本，机构提供专属优惠价格，并支持启航卡和畅学卡两种课时卡选择。\n\n---\n\n## 一对二组团价格\n\n| 年级 | 原课单价（元/次） | 启航卡 30次单价 | 启航卡总价 | 畅学卡 60次单价 | 畅学卡总价 |\n|------|:--------------:|:-------------:|:---------:|:-------------:|:---------:|\n| 一~二年级 | 200 | 180 | 5,400 | 170 | 10,200 |\n| 三年级 | 210 | 190 | 5,700 | 178 | 10,680 |\n| 四年级 | 220 | 198 | 5,940 | 187 | 11,220 |\n| 五年级 | 240 | 216 | 6,480 | 204 | 12,240 |\n| 六年级 | 250 | 225 | 6,750 | 213 | 12,780 |\n| 初一 | 270 | 243 | 7,290 | 230 | 13,800 |\n| 初二 | 280 | 252 | 7,560 | 238 | 14,280 |\n| 初三 | 290 | 261 | 7,830 | 247 | 14,820 |\n| 高一 | 310 | 279 | 8,370 | 264 | 15,840 |\n| 高二 | 320 | 288 | 8,640 | 272 | 16,320 |\n| 高三 | 340 | 306 | 9,180 | 289 | 17,340 |\n\n---\n\n## 圆桌课组团价格（3-5人）\n\n| 年级 | 原课单价（元/次） | 启航卡 30次单价 | 启航卡总价 | 畅学卡 60次单价 | 畅学卡总价 |\n|------|:--------------:|:-------------:|:---------:|:-------------:|:---------:|\n| 一~二年级 | 170 | 153 | 4,590 | 145 | 8,700 |\n| 三年级 | 180 | 162 | 4,860 | 153 | 9,180 |\n| 四年级 | 190 | 171 | 5,130 | 162 | 9,720 |\n| 五年级 | 200 | 180 | 5,400 | 170 | 10,200 |\n| 六年级 | 220 | 198 | 5,940 | 187 | 11,220 |\n| 初一 | 230 | 207 | 6,210 | 196 | 11,760 |\n| 初二 | 240 | 216 | 6,480 | 204 | 12,240 |\n| 初三 | 250 | 225 | 6,750 | 213 | 12,780 |\n| 高一 | 260 | 234 | 7,020 | 221 | 13,260 |\n| 高二 | 280 | 252 | 7,560 | 238 | 14,280 |\n| 高三 | 290 | 261 | 7,830 | 247 | 14,820 |\n\n---\n\n## 组团规则\n\n### 申请条件\n\n1. 家长自行组团，机构不参与招募\n2. 一对二：2人同年级、同学科、水平差距不超过15分\n3. 圆桌课：3-5人同年级、同学科、水平相近\n4. 所有成员需同时报名缴费\n\n### 卡型说明\n\n| 维度 | 启航卡 | 畅学卡 |\n|------|--------|--------|\n| 课次 | 30次 | 60次 |\n| 有效期 | 按次划课，无时间限制 | 按次划课，无时间限制 |\n| 资料费 | 200元/人 | 400元/人 |\n| 优惠幅度 | 原价9折左右 | 原价8.5折左右 |\n| 适合 | 先体验再决定 | 确定长期跟团学习 |\n\n> 注意：家长组团暂不提供领航卡，因组团人员变动风险较高，畅学卡的灵活性更适合此场景。\n\n---\n\n## 与机构组织课程对比（以初二一对二为例）\n\n| 方式 | 课单价 | 60次总费用 | 节省 |\n|------|:------:|:---------:|:----:|\n| 机构组织一对二（按次） | 280 | 16,800 | 基准 |\n| 机构组织一对二（报30送3） | 255 | 约15,300 | 1,500 |\n| 家长组团畅学卡60次 | 238 | 14,280 | 2,520 |\n\n---\n\n## 常见问题\n\n**Q：组团中途有人退出怎么办？**\nA：剩余成员可继续上课，按原卡价格不变。如需补人，新成员需水平匹配并单独购卡。\n\n**Q：家长组团能否享受新生折扣？**\nA：家长组团价格已为优惠价，不再叠加新生折扣。但可参与转介绍奖励。\n\n**Q：组团的学生可以分别报不同科目吗？**\nA：同一组团课程的学生需报同一科目。如需不同科目，请分别组团。\n\n---\n\n## 注意事项\n\n- 每次课90分钟\n- 资料费按人收取，随卡一次性缴纳\n- 开课前需所有成员到齐签到，缺席者按正常划课\n- 组团课程的上课时间由成员协商确定，机构优先安排\n- 师资由机构统一安排，家长不指定教师\n", "lines": 105, "size": 3804}, "06_ops__pricing__promotions_current": {"id": "06_ops__pricing__promotions_current", "path": "06_ops/pricing/promotions_current.md", "name": "promotions_current", "title": "当前优惠活动汇总", "tags": "[定价, 优惠, 新生, 团报, 转介绍, 奖学金]", "module": "06_ops", "content": "---\ntitle: 当前优惠活动汇总\ntags: [定价, 优惠, 新生, 团报, 转介绍, 奖学金]\ncategory: 运营/定价\nlast_updated: 2026-03-19\nrelated_files: [04_scripts/referral_invitation.md]\n---\n\n# 当前优惠活动汇总\n\n---\n\n## 一、新生报课优惠（20次起）\n\n适用对象：首次在百分教育报名的新生，报课20次起享受以下折扣：\n\n| 报名科目数 | 折扣 | 说明 |\n|:---------:|:----:|------|\n| 单科 | **9.5折** | 报一个科目即可享受 |\n| 两科 | **9折** | 同时报两个科目 |\n| 三科 | **8.5折** | 同时报三个及以上科目 |\n\n> 适用范围：精品小班、精英班、一对一/一对二/圆桌课均可。最低报课门槛：20次起。不与团报折扣叠加，取最优价。\n\n---\n\n## 二、团报优惠\n\n适用对象：新生组团同时报名（须同一天完成缴费）：\n\n| 团报人数 | 折扣 | 说明 |\n|:--------:|:----:|------|\n| 2人成团 | **8.5折** | 两位新生同时报名 |\n| 3人成团 | **8折** | 三位新生同时报名 |\n| 4人成团 | **7.5折** | 四位及以上新生同时报名 |\n\n> 团报成员可报不同科目、不同班型。团报折扣与新生折扣不叠加，自动取更优方案。团报成员须均为新生。\n\n---\n\n## 三、转介绍奖励 -- \"感恩有您 好礼相荐\"\n\n老学员成功推荐新学员报名（新学员缴费20次以上即算成功），推荐人可 **三选一**：\n\n| 奖励名称 | 奖励选项 | 内容 |\n|---------|---------|------|\n| 感恩礼一（答谢礼） | 选项A | **200元现金红包/转账**，直接到账 |\n| 感恩礼二（成长礼） | 选项B | **精品小班课2次**，可用于任意科目 |\n| 感恩礼三（续航礼） | 选项C | **500元续费代金券**（启航卡及以上可用），下次续费时抵扣 |\n\n> 每推荐一人享一次奖励，无上限。被推荐的新学员同时享受新生折扣。推荐关系须在新学员缴费前登记。详细话术见 `04_scripts/referral_invitation.md`。\n\n---\n\n## 四、\"勤学\"奖学金\n\n奖励在校成绩优秀的学员：\n\n| 奖项 | 金额 |\n|------|:----:|\n| 校年级总分前3名 | **600元** |\n| 校年级总分前4-6名 | **500元** |\n| 校年级总分前7-10名 | **400元** |\n| 班级总分第一名 | **300元** |\n| 单科第一名 | **200元** |\n\n---\n\n## 五、明星学员奖\n\n奖励在校排名大幅进步的学员：\n\n| 进步幅度 | 奖金 |\n|---------|:----:|\n| 进步300名及以上 | **300元** |\n| 进步200名及以上 | **200元** |\n| 进步100名及以上 | **100元** |\n\n---\n\n## 六、最强大脑奖\n\n奖励班级单科表现突出的学员：\n\n| 名次 | 奖金 |\n|------|:----:|\n| 班级单科第一名 | **300元** |\n| 班级单科第二名 | **200元** |\n| 班级单科第三名 | **100元** |\n\n---\n\n## 七、奋进之星\n\n奖励持续进步的学员：\n\n| 进步幅度 | 奖金 |\n|---------|:----:|\n| 进步300名以上 | **200元** |\n| 进步200名以上 | **100元** |\n\n---\n\n## 八、学习标兵\n\n奖励学习习惯优秀的学员，每项奖励 **100元**：\n\n| 标兵类型 | 评选标准 |\n|---------|---------|\n| 全勤奖 | 本学期全勤 |\n| 全勤+爱提问 | 全勤且课堂积极提问 |\n| 全签到+记笔记+用心做 | 每次按时签到、认真记笔记、用心完成课堂练习 |\n| 全复习+及时订正 | 每次复习到位、错题及时订正 |\n\n---\n\n## 九、\"励行\"奖学金\n\n百分教育最高荣誉奖学金，**最高10,000元**。具体评选标准和申请流程见 `scholarship_system.md`。\n\n---\n\n## 十、名师一对一报课赠课\n\n一对一/一对二/圆桌课批量报课赠课，与课时卡体系独立：\n\n| 报课次数 | 赠送次数 | 实际可用 | 赠送比例 |\n|:--------:|:-------:|:-------:|:-------:|\n| 15次 | 1次 | 16次 | 6.7% |\n| 20次 | 2次 | 22次 | 10.0% |\n| 30次 | 4次 | 34次 | 13.3% |\n\n> 赠课随正课使用，无额外限制。更高次数赠课政策见 `one_on_one_pricing.md`。\n\n---\n\n## 十一、小升初春季特训营特惠\n\n面向小升初分班考学生，18次课/科：\n\n| 报名方案 | 原价 | 优惠 | 优惠后价格 |\n|---------|:----:|------|:---------:|\n| 报一科 | 3,969元 | 减300元 | **3,669元** |\n| 报两科 | 7,938元 | 减1,000元 | **6,938元** |\n| 报三科 | 11,907元 | 减1,680元 | **10,227元** |\n| 前10名报名 | -- | 再减100元 | 在上述基础上再减 |\n\n> 最高优惠 **1,780元**（三科+前10名）。详见 `xiaoshengchu_pricing.md`。\n\n---\n\n## 十二、IPA音标魔法营\n\n专项英语语音课程，集中突破48个国际音标：\n\n| 价格类型 | 价格 |\n|---------|:----:|\n| 原价 | 1,200元 |\n| 前30名早鸟价 | **899元** |\n| 3人团报价 | **再减200元/人（即699元/人）** |\n| 老学员推新 | 双方各得 **50元奖学金券** |\n\n> 适合对象：小学4-6年级。\n\n---\n\n## 十三、7天自然拼读特训营\n\n自然拼读集中训练，7天掌握拼读规则：\n\n| 价格 |\n|:----:|\n| **499元** |\n\n> 适合对象：一至三年级，或英语启蒙阶段学生。含全套拼读教材和练习册。\n\n---\n\n## 优惠叠加规则\n\n| 优惠类型 | 可否叠加新生折扣 | 可否叠加团报 | 可否叠加转介绍 |\n|---------|:--------------:|:----------:|:------------:|\n| 新生折扣 | -- | 不可（取最优） | 可 |\n| 团报优惠 | 不可（取最优） | -- | 可 |\n| 转介绍奖励 | 可 | 可 | -- |\n| 报课赠课 | 可 | 可 | 可 |\n| 特训营优惠 | 独立活动 | 独立活动 | 可 |\n| 奖学金 | 可 | 可 | 可 |\n\n---\n\n## 咨询话术要点\n\n- 不说\"赶紧报名，名额有限\"，说\"建议尽早开始，以下是时间规划\"\n- 不做焦虑营销，用数据和方案说话\n- 介绍优惠时强调\"匹配需求\"而非\"占便宜\"\n- 新生优先推荐启航卡体验，不急于推大单\n", "lines": 198, "size": 5726}, "06_ops__pricing__scholarship_system": {"id": "06_ops__pricing__scholarship_system", "path": "06_ops/pricing/scholarship_system.md", "name": "scholarship_system", "title": "奖学金体系详解", "tags": "[奖学金, 勤学奖, 励行奖, 学员激励]", "module": "06_ops", "content": "---\ntitle: 奖学金体系详解\ntags: [奖学金, 勤学奖, 励行奖, 学员激励]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 百分教育奖学金体系\n\n## 概述\n\n百分教育奖学金体系分为六大奖项，覆盖\"绝对成绩、思维能力、进步幅度、学习行为\"四个维度，确保不同层次的学生都有获奖机会。奖学金既是对学员的真实激励，也是机构品牌口碑的重要载体。\n\n---\n\n## 一、勤学奖学金\n\n以学校官方成绩为依据，奖励绝对排名优秀的学员：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 校年级排名前3名 | 学校期末考试年级总分排名 | **600** |\n| 校年级排名4-6名 | 学校期末考试年级总分排名 | **500** |\n| 校年级排名7-10名 | 学校期末考试年级总分排名 | **400** |\n| 班级总分第一 | 学校期末考试班级总分排名 | **300** |\n| 单科年级第一 | 学校期末考试单科年级排名 | **200** |\n\n> 需提供学校成绩单或排名证明\n> 同一学生多个奖项可叠加（如年级前3 + 单科第一 = 600 + 200 = 800元）\n\n---\n\n## 二、明星学员奖\n\n奖励排名大幅进步的学员，激励持续努力：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 进步300名以上 | 两次大考之间年级排名进步 | **300** |\n| 进步200-299名 | 两次大考之间年级排名进步 | **200** |\n| 进步100-199名 | 两次大考之间年级排名进步 | **100** |\n\n> 以学校期中/期末考试排名为准\n> 两次考试间隔至少一个学期\n\n---\n\n## 三、最强大脑奖\n\n奖励百分教育内部测评成绩突出的学员：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 单科班级第一 | 百分教育阶段测评班级排名 | **300** |\n| 单科班级第二 | 百分教育阶段测评班级排名 | **200** |\n| 单科班级第三 | 百分教育阶段测评班级排名 | **100** |\n\n> 每学期评选一次\n> 以百分教育内部统一测评为准\n\n---\n\n## 四、奋进之星奖\n\n奖励有明显进步意愿和实际进步的中游学员：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 进步300名以上 | 学校排名进步 | **200** |\n| 进步200名以上 | 学校排名进步 | **100** |\n\n> 与明星学员奖不重复评选，取更高奖项\n> 重点面向中游偏下、有成长潜力的学员\n\n---\n\n## 五、学习标兵奖\n\n奖励学习行为和习惯优秀的学员，不以成绩为唯一标准：\n\n| 奖项 | 评选标准 | 奖金（元） |\n|------|---------|:---------:|\n| 全勤标兵 | 一学期内百分教育课程零缺勤 | **100** |\n| 爱提问标兵 | 课堂主动提问频率最高 | **100** |\n| 记笔记标兵 | 笔记完整度和质量评选 | **100** |\n| 及时订正标兵 | 错题订正及时率最高 | **100** |\n\n> 由任课教师和学管师联合评选\n> 每学期每个班级评选各1-2人\n> 同一学生可获多个标兵奖\n\n---\n\n## 六、励行奖学金\n\n百分教育最高荣誉，面向综合表现卓越的学员：\n\n| 等级 | 奖金 | 评选标准 |\n|------|:----:|---------|\n| 特等奖 | **10,000元** | 全校年级第一 + 百分教育学习标兵 + 社会实践突出 |\n| 一等奖 | **5,000元** | 校年级前5 + 百分教育两项以上奖项 |\n| 二等奖 | **3,000元** | 校年级前10 + 百分教育一项以上奖项 |\n| 三等奖 | **1,000元** | 校年级前20 OR 进步500名以上 |\n\n> 每学年评选一次，名额有限\n> 需提交完整的成绩证明和个人陈述\n> 评审委员会由校长、教学主管、学管主管组成\n\n---\n\n## 奖学金发放规则\n\n### 发放形式\n\n- **现金发放**：600元以下奖项直接打款至家长账户\n- **学费抵扣**：600元以上奖项可选择学费抵扣（额外加10%）或现金\n- **荣誉证书**：所有获奖学员颁发百分教育奖学金证书\n\n### 申请流程\n\n1. **成绩公布后2周内**：学员或家长向学管师提交成绩证明\n2. **审核期（1周）**：教学主管核实成绩\n3. **公示期（3天）**：获奖名单在家长群公示\n4. **发放**：公示无异议后5个工作日内发放\n\n### 叠加规则\n\n- 勤学奖内部各奖项可叠加\n- 勤学奖 + 学习标兵可叠加\n- 明星学员与奋进之星不叠加，取高者\n- 励行奖学金与其他奖项不叠加（已含最高荣誉）\n\n---\n\n## 奖学金与品牌建设\n\n### 对外宣传价值\n\n- 获奖学员案例是最有说服力的招生素材\n- \"用奖学金证明教学效果\"替代\"保证提分XX分\"\n- 奖学金颁奖仪式是高品质品牌活动\n\n### 对内激励价值\n\n- 覆盖四个维度，确保30%以上学员有获奖机会\n- 学习标兵奖关注行为而非天赋，人人可争取\n- 勤学励行奖作为品牌载体，强化\"用数据说话\"的机构文化\n\n---\n\n## 年度预算参考\n\n| 奖项类别 | 预计获奖人次/学期 | 平均奖金 | 学期预算 |\n|---------|:---------------:|:------:|:------:|\n| 勤学奖学金 | 30-50人次 | 350元 | 10,500-17,500 |\n| 明星学员奖 | 15-25人次 | 200元 | 3,000-5,000 |\n| 最强大脑奖 | 20-30人次 | 200元 | 4,000-6,000 |\n| 奋进之星奖 | 10-20人次 | 150元 | 1,500-3,000 |\n| 学习标兵奖 | 30-50人次 | 100元 | 3,000-5,000 |\n| 励行奖学金 | 5-10人次 | 3,000元 | 15,000-30,000 |\n| **合计** | | | **37,000-66,500** |\n", "lines": 162, "size": 5348}, "06_ops__pricing__xiaoshengchu_pricing": {"id": "06_ops__pricing__xiaoshengchu_pricing", "path": "06_ops/pricing/xiaoshengchu_pricing.md", "name": "xiaoshengchu_pricing", "title": "小升初课程定价", "tags": "[定价, 小升初, 冲刺]", "module": "06_ops", "content": "---\ntitle: 小升初课程定价\ntags: [定价, 小升初, 冲刺]\ncategory: 运营/定价\nlast_updated: 2026-03-19\n---\n\n# 小升初课程定价\n\n## 概述\n\n百分教育小升初课程体系包括 **名校冲刺常规课程** 和 **春季分班考特训营** 两大板块，目标帮助学生冲击本地重点初中的精英班/火箭班。\n\n---\n\n## 一、小升初名校冲刺课（常规班）\n\n小升初名校冲刺课为常规小班授课，按对应年级的6-12人精品小班价格收费。\n\n| 项目 | 说明 |\n|------|------|\n| 适用年级 | 五年级、六年级 |\n| 班型 | 6-12人精品小班 |\n| 收费标准 | 按年级对应的精品小班课单价（详见 `class_6to12_pricing.md`） |\n| 课时卡 | 可使用领航卡、畅学卡、启航卡 |\n| 开课校区 | 京基校区（赤坎区）、虹都校区（赤坎区）、南油校区（坡头区）、海东校区（坡头区） |\n\n> 建议 **五年级开始准备**，提前一年进入小升初备考节奏，系统梳理知识漏洞，培养应试思维。\n\n---\n\n## 二、春季分班考特训营\n\n针对小升初分班考集中强化训练，18次课/科，帮助学生在分班考试中争取进入重点班级。\n\n### 定价与优惠\n\n| 报名方案 | 原价 | 优惠金额 | 优惠后价格 |\n|---------|:----:|:-------:|:---------:|\n| 报一科 | 3,969元 | 减300元 | **3,669元** |\n| 报两科 | 7,938元 | 减1,000元 | **6,938元** |\n| 报三科 | 11,907元 | 减1,680元 | **10,227元** |\n\n**早鸟优惠**：前10名报名再减100元\n\n| 组合 | 最终价格 |\n|------|:-------:|\n| 一科 + 前10名 | **3,569元** |\n| 两科 + 前10名 | **6,838元** |\n| 三科 + 前10名 | **10,127元**（最高优惠1,780元） |\n\n### 课程安排\n\n| 维度 | 说明 |\n|------|------|\n| 总课次 | 18次/科 |\n| 科目 | 数学、英语、语文 |\n| 单次课时 | 2小时 |\n| 班型 | 精品小班 |\n\n---\n\n## 三、目标学校\n\n小升初课程紧密对接以下本地重点初中的入学考试及分班考试要求：\n\n| 目标学校 | 目标班级 |\n|---------|---------|\n| 培才一中 | **火箭班** |\n| 廉江实验学校 | **精英班** |\n| 北附博雅学校 | **清北班** |\n| 麻章广东省实验学校 | **重点班** |\n\n---\n\n## 四、备考时间规划建议\n\n| 阶段 | 时间 | 重点任务 |\n|------|------|---------|\n| 提前布局期 | 五年级上学期 | 夯实基础，补齐知识漏洞，养成良好学习习惯 |\n| 系统备考期 | 五年级下~六年级上 | 系统学习小升初考点，分模块专题训练 |\n| 冲刺强化期 | 六年级下学期 | 真题演练、查漏补缺、应试技巧训练 |\n| 分班考特训 | 春季特训营 | 18次课集中突破分班考重难点 |\n\n> 越早启动准备，越有充足时间查漏补缺。建议五年级即进入备考状态。\n\n---\n\n## 五、咨询话术要点\n\n- 不说\"保证考上XX学校\"，说\"根据同类学员数据，系统备考后录取率显著提升\"\n- 强调\"提前准备的重要性\"而非\"名额紧张\"\n- 用历届学员案例和数据说明备考周期与效果\n- 三科联报优惠力度最大，但需根据学生实际薄弱科目推荐，不盲目推全科\n", "lines": 95, "size": 3138}, "06_ops__renewal_sop": {"id": "06_ops__renewal_sop", "path": "06_ops/renewal_sop.md", "name": "renewal_sop", "title": "续费标准操作流程", "tags": "[type:sop, scene:renewal, role:consultant, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 续费标准操作流程\ntags: [type:sop, scene:renewal, role:consultant, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [04_scripts/renewal_conversation.md, 04_scripts/referral_invitation.md]\n---\n\n# 续费标准操作流程\n\n## 核心原则\n\n> **用成长手册驱动续费，说\"继续\"不说\"续费\"。**\n\n续费不是一次销售行为，而是一次成长回顾和未来规划。家长选择继续，是因为看到了孩子的成长、信任了团队的服务、认同了下一步的方向。\n\n---\n\n## 续费面谈流程（40分钟）\n\n### 续费前准备\n\n**负责人：** 学管（准备）+ 咨询师（审核）\n**时间节点：** 到期前1-2个月启动\n\n| 时间节点 | 动作 | 负责人 |\n|---------|------|--------|\n| 到期前2个月 | 学管师提醒咨询师启动续费准备 | 学管师 |\n| 到期前1.5个月 | 咨询师调取成长手册，准备面谈材料 | 咨询师 |\n| 到期前1个月 | 组织续费面谈（40分钟） | 咨询师+教师 |\n| 面谈后3天 | 如未当场决定，微信跟进 | 咨询师 |\n| 面谈后1周 | 电话回访，了解顾虑 | 咨询师 |\n| 面谈后2周 | 最后一次主动跟进 | 咨询师 |\n| 到期前1周 | 如仍未续，转为观察（不再主动推） | -- |\n\n**学管师准备清单：**\n\n| 准备项 | 内容 | 要求 |\n|--------|------|------|\n| 成长手册 | 入学vs当前数据对比、能力图谱变化、模块得分率趋势 | 数据准确，图表清晰 |\n| 高光时刻 | 课堂精彩视频/照片、获奖记录、进步里程碑 | 至少3个高光点 |\n| 教师寄语 | 教师对孩子的评价、观察到的成长、下阶段建议 | 具体、真诚，不空洞 |\n| 下阶段规划 | 下一阶段的学习计划、目标、课程推荐 | 与当前诊断数据对齐 |\n| 推荐方案 | 领航卡/其他课时卡方案+课均价计算 | 准备2-3个方案供选择 |\n\n---\n\n### 面谈四步法\n\n#### 第一步：成长回顾（15分钟）\n\n**负责人：** 咨询师\n\n**动作：**\n- 打开成长手册，逐页讲解\n- 展示入学时的诊断数据（\"还记得孩子刚来的时候...\"）\n- 对比当前数据，用具体数字说明进步\n- 播放高光视频/展示照片\n- 引用教师寄语\n- 展示四大能力图谱变化（专注力/思维力/执行力/亲和力）\n\n**话术示例：**\n> \"我们一起来看看孩子这半年的变化。入学时数学模块得分率：计算87%，应用题42%，几何65%。现在：计算92%，应用题68%，几何82%。应用题提升了26个百分点，这是最明显的进步。\"\n\n**禁止：**\n- 不说\"进步很大\"（用数据替代）\n- 不夸大成果\n- 不回避仍存在的薄弱环节\n\n---\n\n#### 第二步：教师分享（10分钟）\n\n**负责人：** 教师\n\n**动作：**\n- 从教学专业角度分享学生的变化\n- 举具体课堂案例（某次课上的突破、某道题的思路变化）\n- 指出当前的思维发展阶段和下一步方向\n- 表达对学生潜力的真实判断（基于数据，不空洞夸赞）\n\n**话术示例：**\n> \"这半年最让我惊喜的变化是，孩子从'看到应用题就放弃'，到现在能主动尝试画图分析。上周的测试中，他用了一个我没教过的方法解出了一道难题，说明思维迁移能力在形成。下阶段我建议加强综合题训练，进一步巩固这个能力。\"\n\n---\n\n#### 第三步：下阶段规划（10分钟）\n\n**负责人：** 咨询师\n\n**动作：**\n- 展示下一阶段的学习计划（短期/中期/长期）\n- 说明下阶段的目标和重点\n- 推荐匹配的课程和班型\n- 自然过渡到方案推荐\n\n**规划结构：**\n\n| 维度 | 短期（1个月） | 中期（1学期） | 长期（1学年） |\n|------|-------------|-------------|-------------|\n| 知识 | 核心考点突破 | 模块系统梳理 | 完整知识体系 |\n| 能力 | 审题与规范 | 解题策略训练 | 高阶思维构建 |\n| 习惯 | 错题本深化使用 | 自主预习复习 | 自驱学习体系 |\n\n---\n\n#### 第四步：自然过渡（5分钟）\n\n**负责人：** 咨询师\n\n**动作：**\n- 不强推成交，用\"继续\"替代\"续费\"\n- 推荐领航卡方案（最划算），计算课均价对比\n- 展示节省金额\n- 给家长充分考虑时间\n\n**推荐策略：领航卡最划算**\n\n| 家长态度 | 推荐方案 |\n|---------|---------|\n| 非常满意，主动续费 | 领航卡（最优惠长期方案） |\n| 满意，但想灵活安排 | 畅学卡（无时间限制） |\n| 犹豫，想再看看 | 启航卡30次（低门槛过渡） |\n| 有退费倾向 | 不推课，先解决问题（转入预警流程） |\n\n**费用展示方式：**\n- 计算每次课均价\n- 与课单价对比\n- 展示具体节省金额\n- \"领航卡60次，每次XX元，比单次购买节省XX元\"\n\n**话术示例：**\n> \"如果继续下一阶段的学习，领航卡是最划算的方案——课均价XX元，比单次课节省XX元，一个学期下来能省XX元。您不用现在决定，回去和家人商量一下也可以。\"\n\n---\n\n## 续费禁忌清单\n\n| 绝对不做 | 替代方案 | 原因 |\n|---------|---------|------|\n| 说\"续费\" | 说\"继续下一阶段的学习\" | 降低商业感 |\n| 说\"不续名额就没了\" | \"建议尽早安排，以下是时间规划\" | 禁止制造焦虑 |\n| 在孩子面前谈钱 | 单独与家长沟通费用问题 | 保护孩子自尊心 |\n| 家长犹豫时追问 | 给时间，说\"您不用现在决定\" | 尊重决策空间 |\n| 反复催促续费 | 提一次方案，后续用服务打动 | 过度推销适得其反 |\n| \"不续就退步了\" | 展示下阶段规划价值 | 禁止恐吓式营销 |\n| \"别的机构不行\" | 展示自身差异化价值 | 禁止贬低竞品 |\n\n---\n\n## 续费后动作\n\n| 时间 | 动作 | 负责人 |\n|------|------|--------|\n| 当天 | 确认续费成功，安排下阶段课程 | 咨询师+学管 |\n| 3天内 | 发送下阶段学习计划给家长 | 咨询师 |\n| 适当时机 | 自然引导转介绍 | 咨询师 |\n\n---\n\n## 转介绍时机\n\n**最佳时机：**\n- 续费后（家长刚确认信任，满意度最高）\n- 阶段性成果反馈后（如获奖、成绩大幅提升）\n\n**引导方式：**\n- 自然引导，不强求\n- \"如果身边有朋友的孩子也需要，欢迎推荐过来\"\n\n**三重好礼：**\n\n| 好礼 | 内容 |\n|------|------|\n| 现金奖励 | 200元/成功推荐 |\n| 课时奖励 | 赠送2次课 |\n| 代金券 | 500元课程代金券 |\n\n**相关话术：** `04_scripts/referral_invitation.md`\n\n---\n\n## 体面结业流程\n\n当家长确定不续费时，启动体面结业流程：\n\n| 步骤 | 动作 | 负责人 |\n|------|------|--------|\n| 1. 接受决定 | 不反复挽留（最多1次真诚挽留），表达理解和尊重 | 咨询师 |\n| 2. 整理成长手册 | 入学至离开的完整数据、高光时刻、教师评语、里程碑记录 | 学管 |\n| 3. 结业会谈 | 15-20分钟，回顾成长，教师给出建议，送上祝福 | 咨询师+教师 |\n| 4. 退费办理 | 按未使用课次退款，5个工作日内完成 | 咨询师 |\n| 5. 保持联系 | 节日问候、学习资料分享（不推课） | 学管 |\n\n**铁律：** 即使学生要走，也要体面结业，输出价值。口碑 > 一时成交。\n\n---\n\n## 续费预警信号\n\n以下信号出现时，应提前启动续费沟通：\n\n| 信号 | 时机 |\n|------|------|\n| 剩余课次 < 10次 | 提前1个月启动续费面谈 |\n| 领航卡有效期还剩2个月 | 提醒家长安排使用或续费 |\n| 阶段性考试后有明显进步 | 趁热打铁，用数据展示价值 |\n| 家长主动表达认可 | 自然提及下阶段规划 |\n\n---\n\n## 续费关键指标\n\n| 指标 | 目标值 | 说明 |\n|------|:-----:|------|\n| 续费面谈完成率 | 100% | 所有到期学员必须完成续费面谈 |\n| 续费率 | ≥ 72% | 参考深圳案例从45%提升至72% |\n| 领航卡选择率 | ≥ 50% | 续费学员中选择领航卡/畅学卡的比例 |\n| 体面结业率 | 100% | 所有离开的学员完成结业流程 |\n| 续费后转介绍率 | ≥ 20% | 续费后自然转介绍 |\n| 结业后转介绍率 | ≥ 10% | 离开的学员仍然推荐新生 |\n\n---\n\n## 续费数据分析\n\n每月统计以下数据，用于优化续费策略：\n\n| 分析维度 | 内容 |\n|---------|------|\n| 续费率趋势 | 近6个月续费率变化 |\n| 不续费原因 | 分类统计（效果/价格/时间/搬家/其他） |\n| 教师维度 | 各教师班级的续费率差异 |\n| 卡型分布 | 续费学员的卡型选择分布 |\n| 预警关联 | 有预警记录的学员续费率 vs 无预警学员 |\n\n---\n\n## 相关文档\n\n- 续费话术：`04_scripts/renewal_conversation.md`\n- 转介绍话术：`04_scripts/referral_invitation.md`\n- 流失预警体系：`06_ops/churn_warning_system.md`\n- 铁三角协作：`06_ops/teacher_consultant_service_triangle.md`\n- 9000服务体系：`06_ops/service_system_9000.md`\n", "lines": 246, "size": 8830}, "06_ops__service_system_9000": {"id": "06_ops__service_system_9000", "path": "06_ops/service_system_9000.md", "name": "service_system_9000", "title": "9000服务体系（学管服务体系）", "tags": "[type:sop, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 9000服务体系（学管服务体系）\ntags: [type:sop, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/student_award_system.md]\n---\n\n# 9000服务体系（学管服务体系）\n\n## 概述\n\n\"9000服务体系\"是百分教育服务标准化的核心框架，命名灵感来自ISO 9000质量管理体系，意在将教育服务做到\"有标准、可衡量、能追溯\"。体系围绕四大支柱、四大能力图谱、\"6个有\"闭环和具体落地动作展开。\n\n---\n\n## 一、四大支柱\n\n| 支柱 | 核心内涵 | 关键动作 |\n|------|---------|---------|\n| **数字化** | 成长仪表盘实时同步 | 四大能力图谱每周更新，月度成长里程碑生成 |\n| **视频化** | 30秒高光视频+课堂实拍 | 每周记录孩子课堂精彩瞬间，实时同步家长 |\n| **个性化** | 按学员分层定制服务 | 根据学员奖项分层（明星学员/最强大脑/奋进之星/学习标兵）制定差异化服务方案 |\n| **成长参谋** | 深度参与成长规划 | 不只是\"传话筒\"，而是孩子成长的规划参与者 |\n\n### 支柱1：数字化\n\n**目标：** 用数据驱动教学决策，让每一次服务都有据可依。\n\n| 数字化动作 | 说明 | 频率 |\n|-----------|------|------|\n| 入学诊断评估 | 首次入学的全面学情测评 | 入学时 |\n| 逐题归因分析 | 每次考试/测评的错题归因 | 每次测评 |\n| 模块得分率追踪 | 各知识模块掌握程度可视化 | 每月 |\n| 阶段数据对比 | 入学vs当前的多维度对比 | 每学期 |\n| 成长趋势图表 | 长周期成绩走势和能力变化 | 持续更新 |\n\n### 支柱2：视频化\n\n**目标：** 让教学过程可见、可回看、可分享，增强家长信任。\n\n| 视频化动作 | 说明 | 频率 |\n|-----------|------|------|\n| 30秒高光视频 | 捕捉课堂精彩瞬间（认真听讲/主动提问/解题突破） | 每次课 |\n| 教师课堂实录 | 完整课堂录制（用于教研和家长查看） | 每周精选 |\n| 错题讲解微课 | 针对高频错题录制2-3分钟讲解视频 | 按需 |\n| 教师自我介绍视频 | 新生试听前发送，展示教学风格 | 入学前 |\n\n### 支柱3：个性化\n\n**目标：** 每个学生都有独属的学习路径，而非流水线式教学。\n\n| 个性化动作 | 说明 |\n|-----------|------|\n| 个人学情档案 | 每位学生独立建档，记录知识漏洞、思维特征、学习偏好 |\n| 分层教学设计 | 同一班级内根据水平分层布置任务 |\n| 定制错题本 | 根据个人错题高频模块定制复习路径 |\n| 个性化作业 | 不同学生不同作业量和难度 |\n| 学习风格适配 | 视觉型/听觉型/动觉型学习者差异化引导 |\n\n### 支柱4：成长参谋\n\n**目标：** 不只是教课，更是孩子成长路上的长期参谋。\n\n| 成长参谋动作 | 说明 | 负责人 |\n|-------------|------|--------|\n| 学业规划咨询 | 短期/中期/长期学习目标设定 | 咨询师 |\n| 升学路径指导 | 小升初/中考/高考的选校和备考规划 | 咨询师+教师 |\n| 学习方法指导 | 记忆模型、说意训练、元认知策略 | 教师 |\n| 心理状态关注 | 考前焦虑、学习动力不足的疏导 | 学管师 |\n| 家庭教育建议 | 给家长的陪伴和督促方法建议 | 咨询师 |\n\n---\n\n## 二、四大能力图谱\n\n每位学生的能力评估覆盖四个维度，形成个人能力雷达图，学管每周更新数据：\n\n### 1. 专注力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 课堂专注时长 | 连续认真听讲的平均时间 | 教师课堂观察 |\n| 走神频率 | 教师观察的走神次数/课 | 教师课堂观察 |\n| 任务切换能力 | 不同题型间的注意力切换速度 | 课堂小测 |\n| 抗干扰能力 | 周围有干扰时的专注保持度 | 教师观察 |\n\n### 2. 思维力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 逻辑推理 | 多步推理题的正确率 | 测评数据 |\n| 知识迁移 | 新题型中运用已学方法的能力 | 测评数据+错题分析 |\n| 抽象思维 | 从具体到抽象的概括能力 | 教师观察 |\n| 创造性思维 | 一题多解、非常规思路的频率 | 课堂表现 |\n\n### 3. 执行力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 作业完成率 | 按时完成作业的比例 | 学管追踪+系统数据 |\n| 订正及时率 | 错题当天订正的比例 | 学管追踪 |\n| 计划执行度 | 学习计划的实际完成百分比 | 学管追踪 |\n| 时间管理 | 考试/作业中的时间分配合理度 | 教师观察 |\n\n### 4. 亲和力\n\n| 评估维度 | 观察指标 | 数据来源 |\n|---------|---------|---------|\n| 课堂互动 | 主动提问和回答的频率 | 教师观察+学管互动 |\n| 同伴合作 | 小组讨论中的参与度 | 教师观察 |\n| 师生关系 | 与教师的沟通主动性 | 教师观察 |\n| 表达能力 | 能否清晰表达自己的思路 | 课堂表现 |\n\n**更新频率：** 每周\n**月度输出：** 生成能力图谱变化趋势图，纳入成长手册。\n\n---\n\n## 三、\"6个有\"闭环\n\n服务执行标准的核心框架，确保每一个服务动作都有始有终：\n\n| 标准 | 含义 | 具体要求 | 检查方式 |\n|------|------|---------|---------|\n| **有目标** | 锁定获奖/能力提升 | 为每位学员设定阶段性目标，与家长对齐 | 教案审核+学管确认 |\n| **有计划** | 周度/月度任务 | 每周学习任务明确到\"做什么+做多少+什么时候完成\" | 学管师检查 |\n| **有步骤** | 错题分类→针对性练习→复盘 | 标准执行路径，遇到卡点有升级机制 | 课堂观察 |\n| **有记录** | 数字化工具同步 | 所有服务动作数字化记录，四大能力图谱实时更新 | 系统检查 |\n| **有配合** | 联动家长 | 家长配合建议具体可操作（\"每天10分钟错题整理\"） | 沟通记录 |\n| **有结果** | 获奖/能力达标验收 | 每个阶段性目标有验收标准，未达标分析原因进入下一轮 | 测评数据 |\n\n---\n\n## 四、常规服务动作\n\n| 动作 | 频率 | 内容 | 负责人 |\n|------|------|------|--------|\n| 四大能力图谱更新 | 每周 | 收集教师数据，更新专注力/思维力/执行力/亲和力 | 学管 |\n| 月度成长里程碑 | 每月 | 汇总本月数据，一句话+数据标记成长里程碑 | 教师评定+学管记录 |\n| 作业追踪 | 每次课后 | 检查作业完成情况，未完成的及时提醒 | 学管 |\n| 高光视频同步 | 每周 | 30秒课堂精彩瞬间视频发送家长 | 学管 |\n| 阶段数据报告 | 每月 | 模块得分率、能力变化趋势 | 教师+学管 |\n| 出勤管理 | 每次课 | 缺勤当天联系家长了解原因 | 学管 |\n\n---\n\n## 五、个性化服务动作\n\n### \"10分钟随心谈\"\n\n- **频率：** 每周覆盖5名学员（优先预警学员和新生）\n- **形式：** 课间或课后与学生非正式聊天\n- **内容：** 了解学习状态、心理状态、生活近况，不谈成绩压力\n- **目的：** 建立情感连接，提前发现问题苗头\n- **记录：** 每次谈话后在系统中记录关键信息\n\n**话题参考：**\n- \"最近有什么开心的事吗？\"\n- \"学校里有没有什么烦心的事？\"\n- \"你觉得最近的课难不难？哪里觉得吃力？\"\n\n### \"30秒高光视频\"\n\n- **频率：** 每位学员每周至少1次\n- **内容：** 课堂上的精彩瞬间——答题正确、主动发言、帮助同学等\n- **同步：** 当天发送给家长，附带一句正向评语\n- **目的：** 让家长\"看到\"孩子的成长，增强信任和满意度\n\n**制作规范：**\n- 时长：15-30秒\n- 学管师负责拍摄和简单剪辑\n- 课后2小时内发送给对应家长\n\n---\n\n## 六、情感增值：成长手册\n\n**适用对象：** 在学1年以上学员\n\n### 手册内容\n\n| 版块 | 内容 | 来源 |\n|------|------|------|\n| 基础信息 | 学生姓名、年级、入学时间、学习科目 | 入学档案 |\n| 入学诊断 | 入学时的学情评估数据和诊断报告 | 首次诊断 |\n| 成长数据轨迹 | 入学到当前的能力图谱变化、模块得分率趋势 | 系统数据 |\n| 高光时刻 | 课堂精彩瞬间照片/视频截图、获奖记录 | 学管日常积累 |\n| 里程碑记录 | 每月成长里程碑汇总 | 教师+学管 |\n| 师生寄语 | 教师对孩子的评价和期望、学管的观察和鼓励 | 教师+学管 |\n| 家长反馈 | 家长对孩子成长的感受和评价 | 家长沟通记录 |\n| 学业规划 | 下阶段目标和行动计划 | 咨询师+教师 |\n\n### 使用场景\n\n- **续费面谈**：核心展示工具，用成长数据驱动决策\n- **阶段反馈**：家长面谈时的核心展示材料\n- **体面结业**：离开时交付完整成长手册，维护口碑\n- **转介绍素材**：经家长授权，匿名数据用于招生展示\n\n---\n\n## 七、学管师核心素养\n\n### 四层能力模型\n\n| 层级 | 素养 | 表现 | 晋升周期 |\n|------|------|------|---------|\n| L1 | **有沟通** | 能清晰、及时地传递信息，日常联络无遗漏 | 入职 |\n| L2 | **善引导** | 能引导家长和学生配合教学计划，主动提醒鼓励 | 3个月 |\n| L3 | **会监督** | 能发现问题并推动解决，识别预警信号 | 6个月 |\n| L4 | **有结果** | 能用数据展示服务成果，制作成长报告 | 1年 |\n\n---\n\n## 八、服务聚焦：暂未获奖学员\n\n**背景：** 暂未获奖学员约占在学学员的 **60%**，是服务提升的最大增量空间。\n\n### 1年目标\n\n| 目标 | 比例 | 核心动作 |\n|------|:----:|---------|\n| 进入奋进之星/学习标兵 | 30% | 习惯养成+基础补强+作业追踪 |\n| 进入最强大脑 | 15% | 思维专项训练+解题模型构建 |\n| 持续观察 | 55% | 保持服务标准，等待突破时机 |\n\n### 策略\n\n- 学管重点跟进暂未获奖学员，每周至少1次\"10分钟随心谈\"\n- 教师针对性调整教学策略，关注中游学员的突破点\n- 每月复盘暂未获奖学员的能力图谱变化，发现进步及时申报奖项\n- 通过\"6个有\"闭环确保每位学员都有清晰的成长路径\n", "lines": 234, "size": 10145}, "06_ops__student_award_system": {"id": "06_ops__student_award_system", "path": "06_ops/student_award_system.md", "name": "student_award_system", "title": "学员奖项体系", "tags": "[type:reference, role:xueguan, role:teacher]", "module": "06_ops", "content": "---\ntitle: 学员奖项体系\ntags: [type:reference, role:xueguan, role:teacher]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 学员奖项体系\n\n## 概述\n\n学员奖项体系是百分教育教学效果的核心呈现方式，通过分层评价、多维度认可，让每一类学员都能找到自己的成长坐标。奖项体系同时是教师考核、续费驱动、品牌传播的重要载体。目标：让不同起点的学生都能找到自己的成长方向，用奖项体系驱动教学质量和学员成就感。\n\n---\n\n## 四大奖项总览\n\n| 奖项 | 生源定位 | 核心维度 | 评选依据 |\n|------|---------|---------|---------|\n| **明星学员** | 年级前十；港二、滨海、北附前30；培才、廉江实验前60；一中前100；二中前60 | 绝对实力 | 学校排名达标，且在百分学习满3个月 |\n| **最强大脑** | 班级前5、全校前10 | 思维能力 | 解题模型构建、逆向思维、知识迁移能力 |\n| **奋进之星** | 成绩中游但进步意愿强 | 成长潜力 | 基础补强明显、习惯养成良好、成绩持续进步 |\n| **学习标兵** | 自律生源（自主完成作业、高专注度） | 行为能力 | 时间管理好、执行力强、作业高质量完成 |\n\n---\n\n## 一、明星学员\n\n### 定位\n\n**绝对实力**的证明。这是百分教育的\"旗帜型\"奖项，代表最高学业成就。\n\n### 评选标准\n\n| 学校类别 | 排名要求 |\n|---------|---------|\n| 年级层面 | 前10名 |\n| 港二、滨海、北附 | 前30名 |\n| 培才、廉江实验 | 前60名 |\n| 一中 | 前100名 |\n| 二中 | 前60名 |\n\n### 评选规则\n- 以学校期末考试成绩为准\n- 需提交学校盖章的成绩证明或排名截图\n- 每学期评选一次\n- 同时满足多个层级取最高\n\n### 宣传价值\n- 明星学员是最有说服力的招生案例\n- 经家长授权后，可用于招生宣传（隐去全名）\n- 颁奖仪式公开举行，邀请全体家长参加\n\n---\n\n## 二、最强大脑\n\n### 定位\n\n**思维能力**的标杆。体现百分\"高阶思维培养\"的核心定位。不完全看学校成绩，重点看思维表现。\n\n### 评选维度\n\n| 维度 | 评估方式 | 权重 |\n|------|---------|:----:|\n| 解题模型构建 | 能否将新题归类到已知模型，举一反三 | 30% |\n| 逆向思维 | 能否从结果反推条件，倒推解题路径 | 25% |\n| 知识迁移 | 能否将A领域方法应用到B领域 | 25% |\n| 创造性解题 | 是否有独特解法或优化思路 | 20% |\n\n### 评选标准\n\n| 层级 | 标准 | 说明 |\n|------|------|------|\n| 金牌 | 百分教育内部测评 单科班级第1 | 阶段测评成绩 |\n| 银牌 | 百分教育内部测评 单科班级第2 | 阶段测评成绩 |\n| 铜牌 | 百分教育内部测评 单科班级第3 | 阶段测评成绩 |\n| 特别奖 | 全校（百分教育）单科前10 | 跨班级排名 |\n| 补充标准 | 班级前5名 / 全校前10名 | 持续入选条件 |\n\n### 评选规则\n- 以百分教育统一阶段测评为准（非学校考试）\n- 测评包含高阶思维题（分析、综合、创造层级）\n- 每学期评选一次\n- 鼓励\"一题多解\"和\"非常规思路\"\n\n### 激励意义\n- 即使学校成绩不是最拔尖，思维能力突出也能获奖\n- 引导学生关注\"怎么想\"而非只关注\"对不对\"\n- 数字化呈现思维力提升、解题速度变化数据\n\n---\n\n## 三、奋进之星\n\n### 定位\n\n**成长潜力**的代表。面向中游学生，奖励进步意愿和实际进步。\n\n### 评选维度\n\n| 维度 | 评估方式 |\n|------|---------|\n| 基础补强 | 模块得分率对比入学时的提升幅度 |\n| 习惯养成 | 错题本使用率、作业完成率变化 |\n| 成绩进步 | 排名上升幅度（以名次计） |\n| 学习态度 | 出勤率、课堂参与度 |\n\n### 目标人群画像\n- 当前成绩处于班级/年级中游\n- 有明确的进步意愿\n- 学习态度积极，但方法或基础需要改善\n- 家长配合度较好\n\n### 评选规则\n- 以两次学校大考的排名变化为准\n- 进步名次 = 前一次排名 - 本次排名\n- 与明星学员奖不重复评选（取更高奖项）\n- 每月/每学期评选\n\n### 激励意义\n- 让中游学生看到\"进步就有回报\"\n- 家长感受到机构对非尖子生的重视\n- 是口碑传播的重要来源（\"我家孩子进步了\"）\n\n---\n\n## 四、学习标兵\n\n### 定位\n\n**行为能力**的榜样。不以成绩为标准，奖励自律和良好学习习惯。\n\n### 评选维度\n\n| 维度 | 评估方式 |\n|------|---------|\n| 时间管理 | 按时到课、按时交作业、合理分配学习时间 |\n| 执行力 | 计划完成率、任务达标率 |\n| 自主学习 | 自主预习复习、主动提问、主动整理笔记 |\n| 专注度 | 课堂走神频率低、作业完成质量高 |\n\n### 评选标准\n\n| 奖项 | 标准 |\n|------|------|\n| 全勤标兵 | 一学期百分教育课程零缺勤 |\n| 爱提问标兵 | 全勤+课堂主动提问频率班级最高 |\n| 记笔记标兵 | 全签到+记笔记+用心做（作业质量A级） |\n| 及时订正标兵 | 全复习+错题订正及时率班级最高 |\n\n### 评选规则\n- 由任课教师和学管师联合评选\n- 每学期每班每个标兵类别评选1-2人\n- 同一学生可获多个标兵奖（可叠加）\n- 评选数据来源：出勤记录、课堂观察记录、作业系统数据\n\n### 激励意义\n- 传递\"好习惯比好成绩更重要\"的理念\n- 让成绩暂时不突出的学生也能获得认可\n- 培养自驱学习体系的第一步\n\n---\n\n## \"勤学励行奖\"品牌载体\n\n### 品牌理念\n\n\"勤学励行奖\"是百分教育学员奖项的品牌载体，代表百分的**\"能力、承担、责任\"**三大核心价值观。\n\n### 核心功能\n\n| 功能 | 说明 |\n|------|------|\n| 数字化呈现教学效果 | 用数据展示思维力提升、解题速度变化、模块得分率进步 |\n| 教师考核挂钩 | 2026年教师考核新逻辑：以\"家长和学生颁发的军功章\"为核心考核 |\n| 学员分层依据 | 通过奖项分层明确每类学员的教学重点和服务策略 |\n| 品牌传播素材 | 获奖学员案例是最有说服力的招生内容 |\n\n### 2026年教师考核新逻辑\n\n> 以\"家长和学生颁发的军功章\"为核心考核，教师绩效与学员获奖率挂钩。\n\n| 考核维度 | 权重 | 说明 |\n|---------|:----:|------|\n| 学员奖项获得率 | 40% | 班级学员进入四大奖项的比例 |\n| 家长满意度 | 30% | 家长评分+续费率 |\n| 教学质量 | 20% | 课堂评估+学员成绩数据 |\n| 团队协作 | 10% | 铁三角配合度+信息流转及时性 |\n\n**奖项获得率计算：**\n- 奖项获得率 = 获奖学员人次 / 所带学员总人数 x 100%\n- 目标基准：≥ 40%（至少4成学员获得至少1项奖项）\n- 超过60%有额外奖金\n\n---\n\n## 勤学奖学金\n\n### 校级排名奖学金\n\n| 排名 | 奖学金金额 |\n|------|:---------:|\n| 校年级总分前3名 | 600元 |\n| 校年级总分前4-6名 | 500元 |\n| 校年级总分前7-10名 | 400元 |\n| 班级总分第一 | 300元 |\n| 班级单科第一 | 200元 |\n\n### 明星学员奖学金\n\n| 进步幅度 | 奖学金金额 |\n|---------|:---------:|\n| 进步300名以上 | 300元 |\n| 进步200名以上 | 200元 |\n| 进步100名以上 | 100元 |\n\n### 最强大脑奖学金\n\n| 排名 | 奖学金金额 |\n|------|:---------:|\n| 班级单科第1名 | 300元 |\n| 班级单科第2名 | 200元 |\n| 班级单科第3名 | 100元 |\n\n### 奋进之星奖学金\n\n| 进步幅度 | 奖学金金额 |\n|---------|:---------:|\n| 进步300名以上 | 200元 |\n| 进步200名以上 | 100元 |\n\n### 学习标兵奖学金\n\n| 行为达标项 | 奖学金金额 |\n|-----------|:---------:|\n| 全勤（无缺课无迟到） | 100元 |\n| 全勤 + 爱提问（每周主动提问≥3次） | 100元 |\n| 全签到 + 记笔记 + 用心做（作业质量A级） | 100元 |\n| 全复习 + 及时订正（错题订正率100%） | 100元 |\n\n> 学习标兵四项可叠加，单学期最高可获400元。\n\n### \"励行\"奖学金\n\n**最高额度：10,000元**\n\n- 面向全年度综合表现最优秀的学员\n- 综合考量：学业成就+能力成长+行为表现+社会影响力\n- 每年评选1次，由教师团队+管理层联合评审\n\n---\n\n## 学员分层与教学重点\n\n通过奖项体系实现学员分层，明确不同层级的教学重点：\n\n| 学员层级 | 教学重点 | 服务重点 |\n|---------|---------|---------|\n| 明星学员 | 高阶思维突破、竞赛拓展、思维创新 | 个性化拔高方案，高频成果展示 |\n| 最强大脑 | 解题模型深化、跨领域迁移训练 | 思维专项训练，典型案例积累 |\n| 奋进之星 | 基础补强、模块系统梳理、进步激励 | 重点跟踪进步数据，高频正向反馈 |\n| 学习标兵 | 习惯固化、自主学习能力培养 | 行为追踪，自律习惯强化 |\n| 暂未获奖 | 找到突破口，匹配最近发展区任务 | 学管重点关注，10分钟随心谈优先 |\n\n---\n\n## 成长路径示例\n\n```\n入学（基础薄弱）\n  ↓ 3个月\n学习标兵（全勤+及时订正）→ 行为习惯建立\n  ↓ 6个月\n奋进之星（排名进步200+）→ 成绩开始提升\n  ↓ 1年\n最强大脑（班级测评前3）→ 思维能力突出\n  ↓ 1.5年\n明星学员（学校年级前列）→ 绝对实力证明\n```\n\n---\n\n## 目标指标\n\n| 时间周期 | 目标 |\n|---------|------|\n| 入学1年内 | **30%** 的学员进入奋进之星或学习标兵 |\n| 入学1年内 | **15%** 的学员进入最强大脑 |\n| 长期目标 | 每位学员在学期间至少获得1次奖项 |\n\n---\n\n## 颁奖与品牌\n\n| 层面 | 内容 | 品牌价值 |\n|------|------|---------|\n| 奖项体系 | 四大奖项（明星/最强大脑/奋进/标兵） | 用成就说话，替代空洞宣传 |\n| 奖学金体系 | 勤学奖 + 励行奖学金 | 真金白银的教学效果证明 |\n| 颁奖仪式 | 每学期1次公开颁奖 | 高品质品牌活动 |\n| 案例输出 | 获奖学员的成长故事 | 最有力的招生素材 |\n", "lines": 302, "size": 9950}, "06_ops__teacher_consultant_service_triangle": {"id": "06_ops__teacher_consultant_service_triangle", "path": "06_ops/teacher_consultant_service_triangle.md", "name": "teacher_consultant_service_triangle", "title": "铁三角协作模型", "tags": "[type:sop, role:consultant, role:teacher, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 铁三角协作模型\ntags: [type:sop, role:consultant, role:teacher, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 铁三角协作模型（教师+咨询师+学管）\n\n## 概述\n\n铁三角（咨询师+教师+学管师）是百分教育服务交付的核心架构。三个角色各司其职、协同作战，确保从招生到教学到日常管理的全链路服务质量。任何一环缺位或越位，都会影响家长体验。\n\n---\n\n## 角色定义与职责\n\n| 角色 | 核心职责 | 日常动作 | 红线 |\n|------|---------|---------|------|\n| **咨询师** | 信任建立、需求挖掘、续费面谈、投诉首接 | 首次咨询、跟进回访、续费面谈、投诉处理、转介绍引导 | 不承诺具体提分数字、不越位解释教学 |\n| **教师** | 教学交付、学情诊断、数据输出、教师分享环节 | 课堂教学、试卷分析、出具诊断报告、参与续费面谈分享环节 | 不越位处理投诉、不直接谈费用 |\n| **学管** | 日常联络、作业追踪、预警上报、高光视频、成长手册 | 作业跟进、四大能力图谱更新、高光视频拍摄、10分钟随心谈、预警上报 | 不擅自解释教学问题、不承诺优惠 |\n\n---\n\n### 咨询师 -- 信任枢纽\n\n| 维度 | 说明 |\n|------|------|\n| 核心职责 | 信任建立、需求挖掘、续费面谈、投诉首接 |\n| 服务对象 | 家长（主要）、学生（次要） |\n| 介入节点 | 首次咨询、重要面谈、续费、投诉、退费 |\n\n**具体动作清单：**\n1. 主导60分钟标准咨询流程\n2. 出具学习方案和选课建议\n3. 组织试听后10分钟反馈会\n4. 执行咨询后跟进节奏（Day0/1/3/7/14）\n5. 主导续费面谈（40分钟）\n6. 24小时内响应投诉电话\n7. 退费时组织体面结业\n\n**红线：** 不承诺具体提分数字。\n> 禁止说法：\"保证提分XX分\"\n> 替代说法：\"根据同类学员数据，预期改善周期为X\"\n\n---\n\n### 教师 -- 专业核心\n\n| 维度 | 说明 |\n|------|------|\n| 核心职责 | 教学交付、学情诊断、数据输出 |\n| 服务对象 | 学生（主要）、家长（通过数据间接服务） |\n| 介入节点 | 日常授课、诊断分析、阶段测评、试听反馈、续费面谈（教师分享环节） |\n\n**具体动作清单：**\n1. 备课与授课（含课堂小测设计）\n2. 逐题归因分析（概念性/计算性/审题性/方法性错误）\n3. 思维层次评估（布鲁姆分类六层级）\n4. 输出阶段测评报告（每月）\n5. 试听课后3分钟课堂表现反馈\n6. 续费面谈中10分钟教师分享\n7. 录制30秒课堂高光视频（配合学管师）\n\n**红线：** 不越位处理投诉，不直接谈费用。\n> 家长在课后表达不满时，教师应说：\"您的反馈我记下了，我会转达给咨询师XX，他/她会尽快联系您。\"\n\n---\n\n### 学管师 -- 日常纽带\n\n| 维度 | 说明 |\n|------|------|\n| 核心职责 | 日常联络、作业追踪、预警上报、高光视频、成长手册 |\n| 服务对象 | 学生和家长（日常高频触点） |\n| 介入节点 | 每日/每周日常沟通、作业追踪、出勤管理、预警信号识别 |\n\n**具体动作清单：**\n1. 每周1次微信简报（本周学习情况+下周计划）\n2. 每日追踪作业完成和订正情况\n3. 出勤管理（缺勤当天联系家长了解原因）\n4. 识别流失预警信号并及时上报\n5. 组织10分钟随心谈（与学生）\n6. 制作30秒课堂高光视频\n7. 更新成长手册数据和四大能力图谱\n8. 节日/生日问候\n\n**红线：** 不擅自解释教学问题，不承诺优惠。\n> 家长问\"为什么孩子这个知识点还没学会\"时，学管师应说：\"这个问题我帮您转达给任课教师XX，他/她最了解孩子的学习进度，会给您详细说明。\"\n\n---\n\n## 信息流转机制\n\n```\n教师 ──(教学数据/诊断报告)──→ 学管\n                                  │\n                          (服务数据/预警信号)\n                                  │\n                                  ↓\n                              咨询师\n                                  │\n                          (服务决策/沟通方案)\n                                  │\n                                  ↓\n                               家长\n```\n\n### 信息流转规范\n\n| 流向 | 内容 | 频率 | 方式 |\n|------|------|------|------|\n| 教师 → 学管 | 课堂表现、测评成绩、诊断数据、教学建议 | 每次课后 | 系统录入/群内同步 |\n| 学管 → 咨询师 | 学员状态、预警信号、家长反馈、作业数据 | 实时/每周汇总 | 企微/系统 |\n| 咨询师 → 家长 | 学习方案、阶段反馈、续费沟通、投诉回应 | 按场景触发 | 电话/面谈/微信 |\n| 学管 → 家长 | 日常联络、高光视频、作业反馈、成长手册 | 每周 | 微信/视频 |\n\n### 信息流转铁律\n\n1. **不漏传**：任何家长反馈必须当天同步给相关角色\n2. **不变形**：转述家长原话，不加个人解读\n3. **不延迟**：预警信号和投诉必须实时传递\n4. **有记录**：所有重要沟通在系统中留痕\n\n---\n\n## 协作场景\n\n### 场景一：续费面谈\n\n**主导：** 咨询师 | **参与：** 教师\n\n| 环节 | 时间 | 负责人 | 内容 |\n|------|:----:|--------|------|\n| 成长回顾 | 15min | 咨询师 | 展示成长手册，数据对比入学vs当前 |\n| 教师分享 | 10min | 教师 | 老师对孩子的评价、成长观察、教学建议 |\n| 下阶段规划 | 10min | 咨询师 | 展示下一阶段学习计划和目标 |\n| 自然过渡 | 5min | 咨询师 | 不强推，给家长决定空间 |\n\n**准备工作（学管负责）：**\n- 提前整理学员成长手册\n- 汇总四大能力图谱数据\n- 收集高光时刻视频/照片\n\n---\n\n### 场景二：投诉处理\n\n**首接：** 咨询师 | **支持：** 教师提供数据\n\n| 阶段 | 时间要求 | 负责人 | 动作 |\n|------|---------|--------|------|\n| 首接 | 24h内 | 咨询师 | 电话响应，倾听不辩解，记录诉求 |\n| 调查 | 24-48h | 咨询师+教师 | 教师提供教学数据和情况说明 |\n| 回复 | 48h内 | 咨询师 | 给出解决方案，面谈或电话沟通 |\n| 回访 | 48h后 | 学管 | 确认满意度，持续关注 |\n\n**红线：**\n- 教师不直接处理投诉，避免对立\n- 学管不擅自解释教学问题\n- 咨询师先处理情绪，再处理事情\n\n---\n\n### 场景三：流失预警\n\n**发现：** 学管 | **干预：** 咨询师\n\n| 预警级别 | 信号 | 学管动作 | 咨询师动作 |\n|---------|------|---------|-----------|\n| 红色（72h） | 连续缺课/问退费/群里不满 | 立即上报咨询师 | 72h内电话→面谈→挽留方案 |\n| 黄色（1周） | 作业下降/回复变慢/成绩连降 | 重点跟进+10分钟随心谈 | 1周内主动沟通，了解原因 |\n| 绿色（观察） | 偶尔缺课/小幅波动 | 日常关注+记录变化 | 持续观察，如连续出现升级 |\n\n---\n\n### 场景四：新生入学\n\n**主导：** 咨询师 | **交接：** 学管+教师\n\n| 阶段 | 动作 | 负责人 |\n|------|------|--------|\n| 入学交接 | 咨询师向学管、教师同步学员信息（诊断结果、家长诉求、注意事项） | 咨询师 |\n| 首课准备 | 教师了解学员情况，制定首课计划 | 教师 |\n| 破冰联络 | 学管加家长微信，发送欢迎信息+服务说明 | 学管 |\n| 首课反馈 | 教师出具首课观察报告，学管同步家长 | 教师+学管 |\n| 首周回访 | 咨询师电话回访家长，确认适应情况 | 咨询师 |\n\n---\n\n### 场景五：阶段测评\n\n**执行：** 教师 | **传达：** 学管 | **面谈：** 咨询师（如有需要）\n\n| 环节 | 负责人 | 内容 |\n|------|--------|------|\n| 出题+批改 | 教师 | 阶段测评卷，覆盖本阶段所有知识模块 |\n| 诊断分析 | 教师 | 逐题归因、模块得分率、思维层次评估 |\n| 数据同步 | 学管 | 更新四大能力图谱，同步诊断报告给家长 |\n| 深度沟通 | 咨询师 | 如数据异常（下降明显），主动约面谈 |\n\n---\n\n## 协作纪律\n\n### 边界红线\n\n| 角色 | 绝对不能做的事 |\n|------|---------------|\n| 咨询师 | 承诺具体提分数字、越位解释教学方法、贬低竞品、用焦虑营销 |\n| 教师 | 直接处理投诉、与家长讨论费用/退费、私下承诺效果、评价其他机构 |\n| 学管 | 擅自解释教学问题、承诺优惠、擅自处理投诉、私下建议换老师 |\n\n### 协作原则\n\n1. **信息透明**：所有学员信息三角共享，不存在信息孤岛\n2. **职责清晰**：各司其职，不越位、不缺位\n3. **以学员为中心**：一切决策以学员成长为导向\n4. **快速响应**：预警信号24h内流转到位\n5. **定期复盘**：每周铁三角碰头会，同步学员状态\n\n---\n\n## 常见协作问题与解决\n\n| 问题 | 原因 | 解决方案 |\n|------|------|---------|\n| 家长重复问同样的问题 | 信息未同步 | 建立共享信息卡，三方可查 |\n| 家长被\"踢皮球\" | 职责不清 | 严格按场景分流表执行 |\n| 教师直接回应投诉 | 越位 | 培训+考核+案例复盘 |\n| 学管师解释教学问题 | 越位 | 统一话术模板+定期检查 |\n| 咨询师不了解学生情况 | 信息断层 | 每周一次三方同步会 |\n\n---\n\n## 周度碰头会\n\n**频率：** 每周一次，30分钟\n**参与人：** 咨询师+教师+学管\n\n| 议程 | 时间 | 内容 |\n|------|:----:|------|\n| 预警通报 | 10min | 学管通报本周预警学员（红/黄/绿） |\n| 教学反馈 | 10min | 教师同步教学数据和学员表现 |\n| 服务决策 | 10min | 咨询师确定本周重点跟进对象和行动方案 |\n\n---\n\n## 考核与激励\n\n| 角色 | 核心考核指标 | 权重 |\n|------|------------|:----:|\n| 咨询师 | 新签成交率、续费率、投诉满意度 | 30%/40%/30% |\n| 教师 | 教学质量评分、学员进步率、学员奖项获得率 | 40%/30%/30% |\n| 学管师 | 家长满意度、预警识别率、信息同步及时率 | 40%/30%/30% |\n\n> 2026年起，教师考核与学员奖项获得率挂钩（详见 `student_award_system.md`）\n", "lines": 259, "size": 10152}, "06_ops__trial_class_sop": {"id": "06_ops__trial_class_sop", "path": "06_ops/trial_class_sop.md", "name": "trial_class_sop", "title": "试听课 SOP", "tags": "[type:sop, scene:trial, role:consultant, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 试听课 SOP\ntags: [type:sop, scene:trial, role:consultant, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 试听课 SOP\n\n## 概述\n\n试听课是家长决策的关键环节。目标不是\"表演一堂好课\"，而是让家长真实感受到教学专业度和服务体系。试听课全流程由铁三角（咨询师+教师+学管）协同完成。\n\n---\n\n## 一、试听前准备\n\n### 时间节点：试听前1-3天\n\n**核心策略：** 推送教师教学视频（1-2min精华）、课堂实录片段、往期学员成果，利用\"曝光效应\"建立信任。\n\n#### 咨询师动作\n\n1. 确认试听时间、班级、科目\n2. 向家长发送以下材料：\n   - 任课教师简介（含教学成果数据，非空洞的\"名师\"标签）\n   - 教师课堂实录视频（30-60秒精华片段）\n   - 往期同类学员成长案例（附数据）\n   - 试听班级近期学习进度说明\n3. 提醒家长携带近期试卷（用于诊断参考）\n\n#### 教师动作\n\n1. 了解试听学生基本情况（年级、水平、家长诉求）\n2. 在课堂设计中预留互动环节，确保试听生有参与机会\n3. 准备一份针对该生水平的课堂小测（3-5题，用于课后反馈）\n4. 确保课堂体现\"趣味、互动、实战\"三大标准\n\n#### 学管师动作\n\n1. 确认教室环境（座位安排、教材准备）\n2. 提前打印试听反馈表\n3. 在班级群简单预告\"今天有新同学加入\"\n4. 准备接待流程（饮水、指引、校区介绍动线）\n\n---\n\n## 二、试听当天执行\n\n### 到场接待（提前15分钟）\n\n- 学管师在前台迎接，引导参观校区环境\n- 简要介绍校区特色区域（教室、自习室、成长墙）\n- 安排旁听或独立试听（尊重家长选择）\n\n### 铁三角配合流程\n\n```\n家长到达（学管接待，提前15min）\n    ↓\n引导入座（学管安排座位，靠前但不孤立）\n    ↓\n课前简介（教师自然带入，不过度关注试听生）\n    ↓\n正常授课（教师保持日常节奏，不特殊表演）\n    ↓\n互动环节（教师适度提问试听生，观察反应）\n    ↓\n课堂小测（全班统一，试听生同步参与）\n    ↓\n下课（学管引导试听生和家长到反馈区）\n```\n\n### 课堂质量标准\n\n试听课**必须体现\"趣味、互动、实战\"三大课堂标准**，不能为试听降低教学强度。\n\n| 要求 | 说明 |\n|------|------|\n| 保持日常节奏 | 不因试听生改变课堂节奏，真实展示常态课 |\n| 适度关注 | 提问1-2次，不过度关注也不忽视 |\n| 展示教学方法 | 体现诊断式教学、说意训练、错题归因等特色 |\n| 课堂小测 | 全班统一进行，自然获取试听生的水平数据 |\n| 趣味互动 | 有思维游戏、小组讨论或实战演练环节 |\n\n### 家长旁听安排\n\n- 家长可在教室后方旁听，或在休息区等候（尊重家长选择）\n- 如家长旁听，学管师陪同，轻声解答课堂环节的设计意图\n- 不在课堂上当面评价孩子表现\n\n---\n\n## 三、试听后反馈（10分钟）\n\n### 时间节点：下课后立即进行\n\n**参与人：** 咨询师 + 教师 + 家长（学管师在场协调）\n\n| 环节 | 时间 | 负责人 | 内容 |\n|------|:----:|--------|------|\n| 课堂表现反馈 | 3min | 教师 | 客观描述孩子课堂表现（参与度、答题情况、思维亮点） |\n| 小测分析 | 3min | 教师 | 快速分析课堂小测结果，指出优势和待改进点 |\n| 学习建议 | 2min | 咨询师 | 基于课堂观察给出初步建议（结合之前的试卷诊断） |\n| 家长提问 | 2min | 咨询师 | 回答家长即时疑问 |\n\n**教师反馈话术示例：**\n> \"今天课上我观察到，孩子在基础概念部分反应很快，说明记忆和理解层面没问题。但在应用题环节，他用了3分钟才动笔，说明解题策略还需要训练。课堂小测5道题对了3道，错的2道都是方法性错误，不是知识漏洞。\"\n\n**禁止说法：**\n- 不说\"孩子很聪明但不用功\"\n- 不说\"基础太差\"（替代：\"目前有几个关键知识漏洞需要补\"）\n- 不说\"保证几次课就能提分\"\n- 不说\"进步很大\"（用具体数据替代）\n\n---\n\n## 四、试听后跟进\n\n| 时间 | 动作 | 负责人 | 内容 |\n|------|------|--------|------|\n| 当天 | 微信 | 咨询师 | 发送课堂反馈报告 + 孩子表现亮点 + 小测分析 |\n| 次日 | 微信 | 学管师 | 发送一条针对性学习建议/小技巧 |\n| 3天内 | 电话 | 咨询师 | 回访，了解家长考虑情况，不强推 |\n\n> 后续跟进纳入标准咨询跟进节奏（详见 `consultation_sop.md`）\n\n---\n\n## 五、试听课质量自检清单\n\n### 教师自检\n\n- [ ] 课前已了解试听生基本情况\n- [ ] 课堂保持日常节奏，未刻意表演\n- [ ] 课堂体现\"趣味、互动、实战\"三大标准\n- [ ] 试听生被提问至少1次\n- [ ] 课堂小测已完成并收回\n- [ ] 课后10分钟反馈已完成\n\n### 咨询师自检\n\n- [ ] 试听前已发送教师视频和课堂实录\n- [ ] 试听前已发送往期学员成果\n- [ ] 试听后反馈会已组织\n- [ ] 当天已发送试听反馈报告\n- [ ] 跟进计划已录入系统\n\n### 学管师自检\n\n- [ ] 教室和座位已提前安排\n- [ ] 提前15分钟到场接待\n- [ ] 校区环境介绍已完成\n- [ ] 家长接待流程顺畅\n- [ ] 反馈表已回收\n- [ ] 后续联络已安排\n\n---\n\n## 六、关键指标\n\n| 指标 | 目标值 |\n|------|:-----:|\n| 试听到店率（预约→到场） | ≥ 85% |\n| 试听后反馈完成率 | 100% |\n| 试听满意度（家长评分） | ≥ 4.5/5 |\n| 试听转化率（7天内报名） | ≥ 50% |\n", "lines": 168, "size": 5636}, "07_faq__faq_campus": {"id": "07_faq__faq_campus", "path": "07_faq/faq_campus.md", "name": "faq_campus", "title": "Faq Campus", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：校区与选址\n\n---\n\n## Q1: 有几个校区？\n\n**A:** 百分教育目前在湛江有 **7个校区**，覆盖三大区域：\n\n| 区域 | 校区名称 | 定位 |\n|------|---------|------|\n| **赤坎区** | 虹都校区 | 初高中主校区 |\n| **赤坎区** | 盛和园校区 | 含5000+藏书阅读馆 |\n| **赤坎区** | 京基校区 | 小学主校区，课程最全 |\n| **霞山区** | 国贸新天地校区 | 霞山区初高中主校区 |\n| **霞山区** | 华都汇校区 | 霞山区综合校区 |\n| **坡头区** | 南油校区 | 四年级至高二 |\n| **坡头区** | 海东校区 | 小学至初三 |\n\n> 统一咨询电话：**18933824497**\n\n---\n\n## Q2: 我家在赤坎区，小学该去哪？\n\n**A:** 赤坎区小学推荐以下两个校区：\n\n| 校区 | 优势 | 推荐理由 |\n|------|------|---------|\n| **京基校区** | 小学主校区，课程最全 | 各年级、各科目班次最丰富，选课空间大 |\n| **盛和园校区** | 含5000+藏书阅读馆 | 适合注重阅读习惯培养的家庭，环境好 |\n\n**选择建议：**\n- 优先就近原则，减少通勤时间\n- 如果孩子需要的科目/班型在京基校区更全 → 选京基\n- 如果家长看重阅读环境和综合素养 → 选盛和园\n\n---\n\n## Q3: 霞山区初高中去哪？\n\n**A:** 霞山区初高中学员推荐 **国贸新天地校区**。\n\n| 信息 | 说明 |\n|------|------|\n| 覆盖学段 | 初一至高三 |\n| 师资配置 | 中学教学经验丰富的教师团队 |\n| 教室环境 | 满足中学教学需求的设备和空间 |\n\n> 华都汇校区也有部分初中班次，具体以当期课表为准。\n\n---\n\n## Q4: 坡头区有校区吗？\n\n**A:** 有两个校区：\n\n| 校区 | 覆盖学段 | 位置特点 |\n|------|---------|---------|\n| **南油校区** | 四年级至高二 | 覆盖坡头区南油片区 |\n| **海东校区** | 小学至初三 | 覆盖坡头区海东片区 |\n\n**选择建议：**\n- 小学低年级（一至三年级）→ 海东校区\n- 四年级以上 → 两个校区均可，就近选择\n- 高中 → 南油校区\n\n---\n\n## Q5: 初高中在哪上课？\n\n**A:** 按区域选择：\n\n| 区域 | 推荐校区 | 覆盖学段 |\n|------|---------|---------|\n| 赤坎区 | **虹都校区** | 初中、高中 |\n| 霞山区 | **国贸新天地校区** | 初中、高中 |\n| 坡头区 | **南油校区** | 初中、高中（至高二） |\n\n> 各校区教学标准统一，不用担心校区之间有教学质量差异。\n\n---\n\n## Q6: 统一电话是多少？\n\n**A:** 百分教育统一咨询电话：**18933824497**\n\n- 课程咨询、校区查询、报名缴费均可拨打\n- 工作时间：周一至周日 8:30-21:00\n- 也可到任一校区前台直接咨询\n", "lines": 96, "size": 2791}, "07_faq__faq_class_type": {"id": "07_faq__faq_class_type", "path": "07_faq/faq_class_type.md", "name": "faq_class_type", "title": "Faq Class Type", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：班型与分班\n\n---\n\n## Q1: 怎么分班的？\n\n**A:** 分班不只看分数，而是综合评估多个维度：\n\n| 评估维度 | 说明 |\n|---------|------|\n| **知识基础** | 各模块掌握情况，哪些扎实、哪些有漏洞 |\n| **思维特点** | 逻辑推理能力、抽象思维水平、解题策略偏好 |\n| **学习习惯** | 是否有主动思考的习惯，课堂参与度 |\n| **目标定位** | 是巩固基础还是冲刺拔高 |\n\n每班控制在 6-12 人，确保同班学员水平相近，教师能兼顾每个孩子。\n\n**流程：**\n1. 入学前做一次诊断测试\n2. 老师根据诊断结果给出分班建议\n3. 试听1-2次课后，确认班级是否合适\n4. 如不匹配，可以调整\n\n---\n\n## Q2: 小学数学分层标准？\n\n**A:** 以校内成绩为初步参考，结合入学诊断综合判定：\n\n| 校内成绩区间 | 推荐班型 | 教学侧重 |\n|-------------|---------|---------|\n| < 75分 | 先一对一补漏，再进班 | 基础知识点查漏补缺，建立信心 |\n| 75-90分 | 同步培优班 | 巩固校内知识，适度拔高 |\n| 90-95分 | 同步奥数班 | 校内知识 + 奥数思维入门 |\n| ≥ 96分 | 纯奥数班 / 奥数创新班 | 竞赛思维训练、高阶问题解决 |\n\n> **注意：** 分数仅为参考，最终分班以入学诊断结果为准。\n\n---\n\n## Q3: 精品小班和精英小班区别？\n\n**A:**\n\n| 对比维度 | 精品小班（6-12人） | 精英小班（13-20人） |\n|---------|-------------------|-------------------|\n| 个性化程度 | 更高，教师关注更细 | 适中，老师会兼顾但互动频次略低 |\n| 课堂互动 | 每位学员发言/练习机会更多 | 以小组讨论为主，同伴多样性更强 |\n| 适合学员 | 需要更多关注的学员、基础偏弱或目标较高 | 基础较好、自主学习能力较强的学员 |\n| 性价比 | 单价略高 | 性价比更高 |\n\n**选择建议：**\n- 家长更看重老师对孩子的个别关注 → 精品小班\n- 孩子自主性较好、注重性价比 → 精英小班\n\n---\n\n## Q4: 孩子跟不上怎么办？\n\n**A:** 分两种情况处理：\n\n### 情况一：刚入班1-2个月的适应期\n\n这是正常现象。我们的课堂内容80%为拔高知识点，一节课内容量等于学校3-7天，刚开始节奏快是预期之内的。\n\n- 教师**不会降低教学要求**，但会给予引导和鼓励\n- 学管会跟进孩子的适应情况，及时反馈给家长\n- 建议家长配合督促课后复习和错题整理\n\n### 情况二：确实基础薄弱，持续跟不上\n\n- 建议先转为**一对一**课程，针对性补漏\n- 补齐关键知识漏洞后再回到班课\n- 教师会出具具体的薄弱模块清单和补漏计划\n\n> 每个孩子的起点不同，关键是找到适合当前阶段的学习方式。\n\n---\n\n## Q5: 可以换班/换老师吗？\n\n**A:** 可以。根据以下情况调整：\n\n- **学习进度变化** — 成绩提升或下降后需要调整层级\n- **时间冲突** — 需要换到其他时段的班次\n- **教学风格匹配** — 与当前教师教学风格不适应\n\n**操作流程：**\n\n1. 与学管或咨询师沟通调班需求\n2. 评估当前学习情况，确认适合的班次\n3. 安排试听新班次（如需要）\n4. 确认调整，学管跟进过渡期适应情况\n", "lines": 100, "size": 3387}, "07_faq__faq_course_selection": {"id": "07_faq__faq_course_selection", "path": "07_faq/faq_course_selection.md", "name": "faq_course_selection", "title": "常见问题 - 选课指南", "tags": "[faq, 选课, 课程推荐, 家长咨询]", "module": "07_faq", "content": "---\ntitle: \"常见问题 - 选课指南\"\ntags: [faq, 选课, 课程推荐, 家长咨询]\ncategory: faq\nrelated_scripts: [04_scripts/first_contact.md]\nrelated_references: [03_courses/course_selector.md]\nlast_updated: 2026-03-19\n---\n\n# 常见问题：选课指南\n\n---\n\n## Q1: 孩子该报什么课?\n\n**A:** 我们不盲目推荐课程，而是根据三个维度来匹配：\n\n| 维度 | 说明 |\n|------|------|\n| **年级** | 不同年级对应不同课程体系（如小学思维训练、初中专项突破） |\n| **当前成绩** | 决定起点层级和班型选择 |\n| **目标** | 是冲刺名校、补齐短板，还是培养思维习惯 |\n\n**建议流程：**\n1. 带上孩子最近的试卷（至少2-3份）\n2. 到校区做一次免费学情诊断\n3. 根据诊断结果，由老师给出课程匹配方案\n\n> 详细课程匹配逻辑请参考：`03_courses/course_selector.md`\n\n---\n\n## Q2: 一对一和小班哪个好?\n\n**A:** 没有绝对的好坏，关键看孩子当前的情况：\n\n| 情况 | 推荐班型 | 原因 |\n|------|---------|------|\n| 成绩在75分以下 | **一对一** | 知识漏洞较多，需要针对性逐个击破 |\n| 成绩在75分以上 | **小班（6-12人或13-20人）** | 基础较好，可以在同伴互动中提升思维 |\n\n**补充说明：**\n- 一对一适合短期突破特定问题\n- 小班适合长期系统训练，且有同伴激励效应\n- 也可以组合使用：一对一补漏洞 + 小班练思维\n\n---\n\n## Q3: 报几科合适?\n\n**A:** 根据孩子的精力和时间来安排，不建议盲目多报。\n\n**多科报名优惠政策：**\n\n| 报科数量 | 折扣 |\n|---------|------|\n| 单科 | 9.5折 |\n| 两科 | 9折 |\n| 三科及以上 | 8.5折 |\n\n**建议原则：**\n- 小学阶段：1-2科为主（数学思维 + 语文/英语）\n- 初中阶段：根据薄弱科目，2-3科为宜\n- 精力有限时，优先集中突破最薄弱的1科\n\n---\n\n## Q4: 可以同时报不同校区的课吗?\n\n**A:** 可以。百分教育目前有7大校区，家长可以根据就近原则自由选择。\n\n- 比如周六在赤坎校区上数学，周日在霞山校区上英语，完全没问题\n- 不同校区的课程内容和教学标准是统一的\n- 报名和缴费在任一校区均可办理\n\n> 各校区地址和课表详见：`05_campuses/campus_overview.md`\n", "lines": 77, "size": 2299}, "07_faq__faq_english_path": {"id": "07_faq__faq_english_path", "path": "07_faq/faq_english_path.md", "name": "faq_english_path", "title": "Faq English Path", "tags": "[type:faq, subject:english, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, subject:english, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：英语学习路径\n\n---\n\n## Q1: 孩子几岁开始学英语合适？\n\n**A:** 建议 **4-5岁**（最早4岁）开始自然拼读启蒙。\n\n| 年龄 | 阶段 | 目标 |\n|------|------|------|\n| 4-5岁 | 自然拼读启蒙 | 建立字母与发音的对应关系 |\n| 5-6岁 | 自然拼读进阶 | 见词能读、听音能写 |\n| 6-7岁 | 自然拼读巩固 + 阅读起步 | 独立拼读简单英文绘本 |\n\n**为什么是4-5岁？**\n- 语言敏感期，发音模仿能力最强\n- 自然拼读需要一定的字母认知基础，4岁以下可能偏早\n- 提前建立语音体系，为后续系统学习打基础\n\n**使用教材：** Oxford Phonics World 1-5（牛津大学出版社）\n\n---\n\n## Q2: 自然拼读学完之后呢？\n\n**A:** 自然拼读完成后，衔接**剑桥英语课程**（3年体系）。\n\n### 完整学习路径\n\n```\n自然拼读（1-2年）\n    ↓\n剑桥英语 Level 1（约1年）\n    ↓\n剑桥英语 Level 2（约1年）\n    ↓\n剑桥英语 Level 3（约1年）\n    ↓\nKET考级（目标：三年级下/四年级）\n    ↓\nPET考级 / 初中英语衔接\n```\n\n### 各阶段目标\n\n| 阶段 | 时长 | 核心目标 |\n|------|------|---------|\n| 自然拼读 | 1-2年 | 见词能读、听音能写、独立拼读 |\n| 剑桥英语 Year 1 | 约1年 | 基础词汇量+简单对话+阅读理解起步 |\n| 剑桥英语 Year 2 | 约1年 | 语法体系建立+篇章阅读+写作入门 |\n| 剑桥英语 Year 3 | 约1年 | 综合运用+KET备考+考级冲刺 |\n\n---\n\n## Q3: 三年级才开始学英语来得及吗？\n\n**A:** 来得及，但学习路径不同。\n\n### 三年级起步推荐路线\n\n| 起步时间 | 推荐路线 | 说明 |\n|---------|---------|------|\n| 三年级 | 课本同步培优 | 先吃透课内知识，建立兴趣和信心 |\n| 四年级 | 同步培优 + 剑桥衔接 | 课内扎实后逐步接入剑桥体系 |\n| 五年级 | 同步培优 + 小升初英语备考 | 侧重应试能力提升 |\n\n**关键原则：**\n- 起步晚不等于落后，关键是选对路径\n- 三年级起步走同步培优路线，不强行跳到自然拼读（年龄不适合）\n- 吃透课内知识、建立兴趣是第一步\n- 基础扎实后再考虑拓展到剑桥体系\n\n---\n\n## Q4: 初中英语怎么选班？\n\n**A:** 根据小学基础和学习经历分流：\n\n| 小学基础 | 推荐班型 | 学习周期 | 目标 |\n|---------|---------|---------|------|\n| 小学95+分 且 学过剑桥英语 | **卓越班** | 2.5年 | 中考高分+高中衔接+PET备考 |\n| 补习后达到95分 | **实验班** | 2年 | 中考目标分数达成+体系构建 |\n| 基础中等 | **同步培优班** | 持续跟进 | 巩固校内+逐步拔高 |\n\n**分班依据：**\n- 不仅看分数，还看英语学习经历（是否有自然拼读/剑桥基础）\n- 入学诊断测试确认实际水平\n- 学期中可根据表现调整班型\n\n---\n\n## Q5: KET考级有什么用？\n\n**A:** KET（Key English Test）是剑桥英语等级考试的入门级别。\n\n### KET的价值\n\n| 维度 | 具体说明 |\n|------|---------|\n| **升学加分** | 小升初择校时，KET证书是英语能力的有力证明 |\n| **能力证明** | 国际认可的英语水平等级证书 |\n| **体系优势** | 提前建立完整的英语知识体系，领先同龄人 |\n| **学习动力** | 明确的考级目标，给孩子学习方向感和成就感 |\n\n### 建议备考时间线\n\n| 时间节点 | 动作 |\n|---------|------|\n| 一二年级 | 完成自然拼读 |\n| 二三年级 | 进入剑桥英语课程 |\n| 三年级下/四年级 | 首次参加KET考试 |\n| 四五年级 | 冲刺PET（进阶级） |\n\n> KET/PET证书在名校小升初选拔中被广泛认可，是\"看得见的英语实力\"。\n", "lines": 121, "size": 3802}, "07_faq__faq_parent_concerns": {"id": "07_faq__faq_parent_concerns", "path": "07_faq/faq_parent_concerns.md", "name": "faq_parent_concerns", "title": "常见问题 - 家长常见顾虑", "tags": "[faq, 家长顾虑, 投诉处理, 成绩下降, 孩子不愿意]", "module": "07_faq", "content": "---\ntitle: \"常见问题 - 家长常见顾虑\"\ntags: [faq, 家长顾虑, 投诉处理, 成绩下降, 孩子不愿意]\ncategory: faq\nrelated_scripts: [04_scripts/objection_child_not_interested.md]\nlast_updated: 2026-03-19\n---\n\n# 常见问题：家长常见顾虑\n\n---\n\n## Q1: 孩子不想来怎么办?\n\n**A:** 孩子抵触补课是非常常见的，关键在于如何引导。\n\n**建议步骤：**\n\n1. **不要说\"去补课\"：** 换个说法，比如\"去体验一下不一样的数学课\"、\"去看看有没有你喜欢的老师\"\n2. **先试听体验：** 让孩子无压力地参加一次课，感受课堂氛围\n3. **关注体验感：** 我们的课堂注重互动和趣味性，跟传统补课不一样\n4. **给孩子选择权：** 试听后让孩子自己说感受，尊重他的意见\n\n**我们的经验：**\n- 大部分孩子试听后会改变看法，因为思维训练课本身就有趣\n- 如果试听后孩子确实不喜欢，我们不建议强迫，可以换个时间再尝试\n- 强扭的瓜不甜，兴趣和主动性是学习效果的基础\n\n> 详细应对话术见：`04_scripts/objection_child_not_interested.md`\n\n---\n\n## Q2: 会不会太累?\n\n**A:** 这是家长非常合理的担心。我们的课程设计考虑了孩子的精力分配：\n\n**课程特点：**\n- 课堂有趣味性和互动性，不是枯燥的刷题\n- 每节课有节奏变化：讲解→讨论→练习→总结，避免单一模式\n- 课后作业量适中，重质不重量\n\n**适应周期：**\n- 大多数孩子1-2个月就能适应\n- 初期可能觉得有点累，因为需要主动思考（跟被动听课不一样）\n- 适应后反而会觉得有成就感，因为能明显感受到自己在进步\n\n**建议：**\n- 刚开始不要报太多科，1科起步，适应后再加\n- 观察孩子的状态，累了及时跟学管师沟通调整\n\n---\n\n## Q3: 成绩下降了怎么办?\n\n**A:** 成绩下降我们绝不回避，会按以下流程处理：\n\n**第一步：共情（理解家长焦虑）**\n- 成绩下降家长着急是完全正常的\n- 我们跟您一样关心孩子的表现\n\n**第二步：归因（用数据找原因）**\n- 拿到最近的试卷，做逐题错因分析\n- 对比入学时的诊断数据，看是哪个模块出了问题\n- 区分是知识漏洞、考试状态、还是阶段性波动\n\n**第三步：调整方案**\n- 根据归因结果，调整教学重点和节奏\n- 明确下一步行动：谁负责、做什么、多久见效\n- 约定阶段性回顾时间，持续跟踪\n\n**关键原则：** 不找借口、不推责任、用数据说话、给明确方案。\n\n---\n\n## Q4: 投诉怎么处理?\n\n**A:** 我们非常重视家长的每一条反馈，投诉处理有明确的流程和时限：\n\n| 步骤 | 时限 | 动作 |\n|------|------|------|\n| **响应** | 24小时内 | 电话联系家长，先听完情绪，不急于解释 |\n| **处理** | 48小时内 | 内部调查、确认事实、制定解决方案 |\n| **回访** | 48小时内 | 再次联系家长，反馈处理结果和改进措施 |\n| **跟进** | 1周内 | 确认问题是否真正解决，家长是否满意 |\n\n**处理原则：**\n- **先情绪，后事情：** 让家长把话说完，不打断、不反驳\n- **不推诿：** 不管是谁的问题，先承接，再内部协调\n- **有结果：** 每次沟通必须有明确的下一步和时间节点\n- **有闭环：** 问题解决后主动回访，确保家长满意\n", "lines": 91, "size": 3398}, "07_faq__faq_pricing": {"id": "07_faq__faq_pricing", "path": "07_faq/faq_pricing.md", "name": "faq_pricing", "title": "Faq Pricing", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：收费与价格\n\n---\n\n## Q1: 你们收费怎么算？\n\n**A:** 收费根据**班型**和**年级**两个维度确定。\n\n### 班型一览\n\n| 班型 | 人数 | 特点 |\n|------|------|------|\n| 精品小班 | 6-12人 | 个性化关注度高，分层教学 |\n| 精英小班 | 13-20人 | 性价比更高，适合基础较好的学生 |\n| 一对一 | 1人 | 针对性最强，适合基础薄弱或冲刺阶段 |\n| 一对二 | 2人 | 兼顾针对性与性价比 |\n| 圆桌课 | 3-5人 | 互动讨论式教学 |\n\n### 三种课时卡\n\n| 课时卡 | 次数 | 赠课 | 有效期 | 适合人群 |\n|--------|------|------|--------|---------|\n| **领航卡** | 60次 | 赠5次课 | 一年 | 时间稳定、长期学习的学员，单价最优惠 |\n| **畅学卡** | 60次 | 赠3次课 | 无时间限制 | 时间不固定、需要灵活安排的学员 |\n| **启航卡** | 30次 | 无赠课 | 无时间限制 | 想先体验再决定的新学员 |\n\n> 具体价格请查阅各年级、各班型的价格表，或拨打统一咨询电话 18933824497。\n\n---\n\n## Q2: 有优惠吗？\n\n**A:** 有以下三类优惠：\n\n### 新生报课优惠（20次起）\n\n| 报课科目数 | 折扣 |\n|-----------|------|\n| 单科 | 9.5折 |\n| 两科 | 9折 |\n| 三科 | 8.5折 |\n\n### 团报优惠\n\n| 团报人数 | 折扣 |\n|---------|------|\n| 2人同行 | 8.5折 |\n| 3人同行 | 8折 |\n| 4人同行 | 7.5折 |\n\n### 转介绍奖励\n\n老学员推荐新学员报名，享三重好礼（转介绍奖励可与报课优惠叠加）。\n\n> **注意：** 新生折扣和团报折扣不可叠加，取其一。所有优惠以 `promotions_current.md` 为准。\n\n---\n\n## Q3: 领航卡和畅学卡怎么选？\n\n**A:** 选择建议如下：\n\n- **时间稳定** → 选**领航卡**：单价最低，赠5次课，但需在一年内使用完毕\n- **灵活安排** → 选**畅学卡**：无时间限制，赠3次课，适合课外活动多、时间不固定的学员\n- **想先试试** → 选**启航卡**：30次入门体验，无赠课但无时间限制，试课后再决定长期方案\n\n---\n\n## Q4: 可以退费吗？\n\n**A:** 可以退费，按机构退费政策执行：\n\n- 课程未过半可退剩余课时费用\n- 资料费不退\n- 赠课不可折现\n- 领航卡过期未用完的课次不退不延\n- 畅学卡/启航卡无时间限制但不退\n\n> 详细退费政策见 `08_rules/pricing_policy_boundary.md`。\n\n---\n\n## Q5: 一对一太贵了\n\n**A:** 一对一课程适合以下情况的学生：\n\n- 基础薄弱，需要针对性查漏补缺\n- 备考冲刺阶段，需要高效突破\n- 学习节奏与班课不匹配\n\n**降低单价的方式：**\n\n- 批量报课（领航卡60次赠7次课，折合单价降低10%以上）\n- 选择**一对二**班型，费用比一对一节省30%-40%，仍然保持较高个性化关注\n- 选择**圆桌课**（3-5人），互动式学习且费用更低\n\n> 建议先做一次学情诊断，明确孩子的薄弱点后再选择最适合的班型。\n", "lines": 104, "size": 3058}, "07_faq__faq_schedule": {"id": "07_faq__faq_schedule", "path": "07_faq/faq_schedule.md", "name": "faq_schedule", "title": "Faq Schedule", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：上课时间与排课\n\n---\n\n## Q1: 上课时间怎么安排？\n\n**A:** 主要上课时段如下：\n\n| 时段 | 时间 | 说明 |\n|------|------|------|\n| **周末全天** | 周六/周日 8:30-20:30 | 主要上课时间，课程排布最丰富 |\n| **工作日晚上** | 19:00-21:00 | 部分班次安排在周一至周五晚间 |\n\n**单次课时长：**\n\n| 班型 | 时长 |\n|------|------|\n| 小班课（精品/精英） | 90分钟/次 |\n| 一对一 | 60分钟/次 |\n| 一对二 | 60-90分钟/次 |\n| 圆桌课 | 90分钟/次 |\n\n> 具体开课时间以各校区课表为准，热门时段（上午9-12点）建议提前预约。\n\n---\n\n## Q2: 一学期多少次课？\n\n**A:** 标准一学期约 **20次课**（每月4次），即每周一次。\n\n| 周期 | 次数 | 备注 |\n|------|------|------|\n| 每月 | 4次 | 标准频率 |\n| 一学期 | 约20次 | 秋季/春季学期 |\n| 一学年 | 约40次 | 不含寒暑假特训 |\n\n> 实际次数可能因节假日调整略有浮动，以学期初公布的课表为准。\n\n---\n\n## Q3: 寒暑假有课吗？\n\n**A:** 有。寒暑假开设集中特训课程，与常规学期课程互为补充：\n\n### 暑假特训营（示例）\n\n| 课程 | 时长 | 适合对象 |\n|------|------|---------|\n| 7天自然拼读特训营 | 7天集中授课 | 幼儿园大班至二年级 |\n| 10天音标魔法营 | 10天集中授课 | 三年级及以上零基础 |\n| 小升初冲刺集训 | 按需安排 | 五六年级备考学员 |\n| 学科专项突破营 | 5-10天 | 针对薄弱模块集中攻克 |\n\n### 寒假特训营\n\n- 寒假时间较短，一般安排5-7天集中课程\n- 侧重学期回顾+下学期预习衔接\n\n> 特训营具体安排和价格以每年公布的招生简章为准。\n\n---\n\n## Q4: 可以请假吗？\n\n**A:** 可以请假，具体安排如下：\n\n| 请假类型 | 操作方式 | 补课安排 |\n|---------|---------|---------|\n| **提前请假** | 至少提前1天联系学管 | 安排同级别班次补课或录播回顾 |\n| **临时请假** | 当天联系学管说明情况 | 视班级容量安排补课，不保证时段 |\n| **长期请假** | 与学管沟通，办理暂停手续 | 畅学卡/启航卡不受影响，领航卡注意有效期 |\n\n**注意事项：**\n- 请假不扣课时，但需配合学管安排补课时间\n- 连续缺课超过2次，学管会主动联系了解情况\n- 频繁缺课影响学习连贯性，建议与学管沟通调整课表\n\n---\n\n## Q5: 课表在哪看？\n\n**A:** 获取课表的方式：\n\n1. **校区查询** — 到校区前台查看最新纸质/电子课表\n2. **学管获取** — 联系您的学管师，获取对应班级的电子版课表\n3. **知识库查询** — 各校区课表见 `05_campuses/` 目录下各校区详情页\n4. **统一咨询** — 拨打 18933824497 查询\n\n> 课表每学期初更新，学期中如有调整会提前通知家长。\n", "lines": 96, "size": 2960}, "07_faq__faq_teaching": {"id": "07_faq__faq_teaching", "path": "07_faq/faq_teaching.md", "name": "faq_teaching", "title": "Faq Teaching", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：教学与理念\n\n---\n\n## Q1: 跟学校有什么区别？\n\n**A:** 我们不是重复课本内容，而是在学校基础上做拔高与补充。\n\n| 维度 | 学校教学 | 百分教育 |\n|------|---------|---------|\n| **内容** | 课本知识，面向全体学生 | 80%为拔高知识点，聚焦思维深度 |\n| **容量** | 按教学大纲推进 | 一节课等于学校3-7天内容量 |\n| **目标** | 掌握基础知识和技能 | 培养高阶思维能力，教\"怎么学\" |\n| **方法** | 讲授+练习为主 | 母题模型+思维训练+知识融合 |\n| **关注点** | 全班统一进度 | 根据学生实际水平动态调整 |\n\n> 课本内容交给学校，我们聚焦学校不教但考试会考的思维架构。不是死记硬背，而是建立思维模型。\n\n---\n\n## Q2: 用什么教材？\n\n**A:** 教材体系如下：\n\n| 学科/课程 | 教材来源 | 说明 |\n|----------|---------|------|\n| 数学/语文 | 自主教研 + 校本化教材 | 基于多年教学经验和真题积累编写 |\n| 英语自然拼读 | Oxford Phonics World 1-5 | 牛津大学出版社经典教材 |\n| 英语剑桥课程 | 剑桥英语官方教材 | 对标KET/PET国际考级标准 |\n| 奥数/竞赛 | 自编讲义 + 经典竞赛题库 | 含历年真题和原创变式题 |\n\n> 所有自研教材定期更新迭代，紧跟考试趋势和教学实践反馈。\n\n---\n\n## Q3: 老师水平怎么样？\n\n**A:** 我们不说\"老师很优秀\"，用数据和事实展示：\n\n**创始人背景：**\n- 尤久勇老师，18年一线教学经验\n- 亲自参与教研、教师培训和教学质量把控\n\n**教学成果（可查证）：**\n- 具体学员案例和成绩变化数据（到校区可查看成长手册）\n- 学员竞赛获奖记录\n- 高光课堂视频展示\n\n**教师考核机制：**\n- 2026年起以学员获奖率（四大奖项）为核心考核指标\n- 定期教研、磨课、教学质量抽查\n- 课堂三大标准：趣味、互动、实战\n\n> 建议到校区实地体验一节课，比任何描述都更直观。\n\n---\n\n## Q4: 能保证提多少分？\n\n**A:** 我们不承诺具体提分数字，这是对家长负责的态度。\n\n**原因：**\n- 每个孩子的起点、配合度、学习习惯不同，效果因人而异\n- 思维提升是渐进过程，分数提升有滞后性\n- 空洞的提分承诺是不负责任的营销手段\n\n**我们能做的：**\n- 根据同类学员数据，给出**预期改善周期**\n- 用诊断数据追踪每个阶段的具体变化\n- 制定可量化的阶段目标（如\"1个月内审题错误率降低50%\"）\n- 需要孩子配合执行学习计划，效果是双方共同努力的结果\n\n---\n\n## Q5: 你们重视什么？\n\n**A:** 三个核心关键词：**高阶思维培养、第二成长曲线、自驱学习**。\n\n| 我们做的 | 我们不做的 |\n|---------|----------|\n| 培养思维能力和学习方法 | 作业托管 |\n| 构建知识体系和逻辑框架 | 低端补差 |\n| 激发自主学习动力 | 单纯刷题 |\n| 教\"怎么学\"和\"怎么想\" | 死记硬背 |\n\n**教学法：**\n- 小学：情景教学法 + 阶梯构建式教学\n- 初高中：考点教学法 + 阶梯构建式教学\n\n**核心理念：**\n- 跳出课本，聚焦思维本质\n- 知识融合，构建立体认知\n- 慢即是快，尊重思维成长规律\n", "lines": 100, "size": 3380}, "07_faq__faq_xiaoshengchu": {"id": "07_faq__faq_xiaoshengchu", "path": "07_faq/faq_xiaoshengchu.md", "name": "faq_xiaoshengchu", "title": "Faq Xiaoshengchu", "tags": "[type:faq, scene:first-contact, stage:xiaoshengchu]", "module": "07_faq", "content": "---\n
