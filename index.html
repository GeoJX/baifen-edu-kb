const FILES = {"00_meta__field_glossary": {"id": "00_meta__field_glossary", "path": "00_meta/field_glossary.md", "name": "field_glossary", "title": "Field Glossary", "tags": "", "module": "00_meta", "content": "# 术语表（Field Glossary）\n\n百分教育内部专用术语及其标准释义。Agent 在理解用户输入和生成回答时，必须准确使用这些术语。\n\n## 一、教学理念类\n\n| 术语 | 释义 | 使用场景 |\n|------|------|---------|\n| 好思维 | 百分教育核心理念的关键词，指通过教学培养学生的底层思维能力（而非单纯传授知识） | 品牌介绍、理念解释 |\n| 说意训练 | 让学生用自己的语言复述解题逻辑和思路，验证是否真正理解（不是死记步骤） | 课程特色介绍 |\n| 母题模型 | 从大量题目中提炼出的核心题型结构，学生掌握一个模型可以解一类题 | 数学课程介绍 |\n| 阶梯构建式教学 | 百分教学法之一，知识从基础到高阶逐层构建，每一层以上一层为基础 | 教学法介绍 |\n| 情景教学法 | 小学阶段教学法，将知识点嵌入生活场景中讲解（如用买文具讲小数计算） | 小学课程介绍 |\n| 考点教学法 | 初高中阶段教学法，以考试考点为锚点组织教学内容 | 中学课程介绍 |\n| 第二成长曲线 | 在成绩提升之外，学生获得的思维能力、学习习惯、自驱力等长期能力 | 理念宣导、续费沟通 |\n| 思维可视化工具包 | 用思维导图、模型图等可视化工具呈现解题思路，让抽象思维变得可见 | 教学工具介绍 |\n| 错题思维模型库 | 对学生错题进行归因分析后建立的模型库，标注每类错误的思维根因 | 诊断报告、学管服务 |\n\n## 二、课程班型类\n\n| 术语 | 释义 | 适用范围 |\n|------|------|---------|\n| 同步培优 | 紧跟学校教学进度，在课本基础上做强化训练 | 各科目基础班 |\n| 同步奥数 | 在同步学校进度的基础上，融入适度奥数思维训练 | 小学数学（90-95分学生） |\n| 纯奥数 | 脱离课本体系，深度拓展奥数知识和高阶思维 | 小学数学（96分以上学生） |\n| 奥数创新班 | 纯奥数基础上进一步拓展创新思维 | 小学数学尖子生 |\n| 培优班 | 在课本基础上做能力提升 | 初高中各科 |\n| 提高班 | 基础偏弱的学生补强 | 初高中各科 |\n| 卓越班 | 高水平学生冲刺拔高 | 初高中各科 |\n| 双语班 | 中英双语教学的数学班（创始人尤老师特色） | 初三数学 |\n| 满分实验班 | 面向90分以上学生，以满分为目标，聚焦压轴题模型化突破 | 初二物理 |\n| 唐实班 | 面向唐实（唐家岭实验）学校学生的专属班 | 初一 |\n| 圆桌特训班 | 3人小组，介于一对一和小班之间的教学形式 | 全年级 |\n\n## 三、卡型与收费类\n\n| 术语 | 释义 |\n|------|------|\n| 领航卡 | 60次课，一年有效上完即止，赠送5次课，含400元资料费。优惠力度最大，适合确定长期学习的学生 |\n| 畅学卡 | 60次课，按次划课无时间限制，赠送3次课，含400元资料费。灵活度高，适合时间不固定的学生 |\n| 启航卡 | 30次课，按次划课，含200元资料费。入门体验型，适合先试再定的家长 |\n| 课单价 | 不使用任何卡型时的单次课价格（原价） |\n| 机构组团 | 由百分教育组织的一对二或圆桌特训班 |\n| 家长自发组团 | 由家长自行找好同伴后报名的一对二或圆桌特训班，价格与机构组团相同 |\n\n## 四、服务体系类\n\n| 术语 | 释义 |\n|------|------|\n| 9000服务体系 | 学管团队核心服务框架，以\"数字化、视频化、个性化、成长参谋\"为四大支柱 |\n| 成长仪表盘 | 数字化工具，实时展示学员的错题类型、能力变化等数据 |\n| 30秒高光视频 | 记录学员成长瞬间的短视频（独立解题、主动互动等），同步发给家长 |\n| 10分钟随心谈 | 学管师每周与学员的一对一简短沟通，了解学习困惑 |\n| 成长手册 | 为在学1年以上学员整理的个人成长档案，含数据轨迹、高光时刻、师生寄语 |\n| 铁三角 | 咨询师+教师+学管的三角协作模式 |\n| 勤学励行奖 | 百分教育奖学金体系品牌名，\"勤学\"侧重学业成绩，\"励行\"侧重综合表现 |\n\n## 五、学员分层类\n\n| 术语 | 释义 | 入选标准 |\n|------|------|---------|\n| 明星学员 | 绝对实力顶尖的学员 | 年级前十/名校前30-100 |\n| 最强大脑 | 思维能力突出的学员 | 班级前5/全校前10 |\n| 奋进之星 | 进步意愿强的潜力学员 | 成绩中游但持续进步 |\n| 学习标兵 | 自律性强的模范学员 | 全勤、自主完成作业、高专注 |\n\n## 六、流失预警类\n\n| 术语 | 释义 | 响应时效 |\n|------|------|---------|\n| 红色预警 | 连续缺课/问退费/群里表达不满 | 72小时内干预 |\n| 黄色预警 | 作业完成度下降/回复变慢/成绩连降 | 1周内关注 |\n| 绿色预警 | 偶尔缺课/成绩小幅波动 | 持续观察 |\n\n## 七、小升初类\n\n| 术语 | 释义 |\n|------|------|\n| 密考 | 部分名校在正式招生前组织的非公开选拔考试（也称\"素养评估\"） |\n| 分班考 | 入学后学校组织的考试，决定学生进入哪个层级的班级 |\n| 火箭班 | 培才一中的尖子班称呼 |\n| 精英班 | 廉江实验学校的尖子班称呼 |\n| 清北班 | 北附博雅学校的尖子班称呼 |\n\n## 八、竞品/市场类\n\n| 术语 | 释义 |\n|------|------|\n| 作业托管 | 百分教育明确不做的业务类型，指单纯看管孩子写作业 |\n| 低端补差 | 百分教育明确不做的定位，指只做基础补习不做思维培养 |\n| 低价引流 | 百分教育禁止的获客方式，指用超低价体验课吸引客户 |\n| 焦虑营销 | 百分教育禁止的营销方式，指制造升学焦虑迫使家长报名 |\n", "lines": 93, "size": 5716}, "00_meta__kb_readme": {"id": "00_meta__kb_readme", "path": "00_meta/kb_readme.md", "name": "kb_readme", "title": "Kb Readme", "tags": "", "module": "00_meta", "content": "# 百分教育知识库（Baifen Edu Knowledge Base）\n\n## 用途\n\n本知识库是百分教育 AI Agent 的核心记忆系统。Agent 在与家长、内部员工对话时，从本库检索信息、组装回答。\n\n## 架构逻辑\n\n```\n识别身份(08_rules) → 理解场景(03_diagnosis) → 调取内容(01_brand / 02_courses)\n→ 组装话术(04_scripts) → 落地执行(06_ops) → 答疑兜底(07_faq)\n```\n\n| 目录 | 职责 | 调用时机 |\n|------|------|---------|\n| 00_meta | 知识库自身规则，不对外输出 | 维护时参考 |\n| 01_brand | \"我是谁\"——品牌、理念、文化 | 自我介绍、回应\"你们怎么样\" |\n| 02_courses | \"我教什么\"——全部课程产品 | 课程推荐、课程介绍 |\n| 03_diagnosis | \"孩子什么情况\"——学情画像匹配 | 接收家长描述后做诊断分流 |\n| 04_scripts | \"怎么说\"——各场景沟通话术 | 需要说服、解释、安抚时 |\n| 05_campuses | \"在哪上课\"——校区、课表、位置 | 问地址、问时间、选校区 |\n| 06_ops | \"怎么做\"——SOP、定价、服务体系 | 内部流程执行、报价、续费 |\n| 07_faq | \"常见问题\"——高频问答速查 | 简单直接的信息查询 |\n| 08_rules | \"不能做什么\"——安全边界 | 始终加载，每次对话前校验 |\n| 09_agents | Agent 的 system prompt 模板 | Agent 初始化时加载 |\n\n## 文件关系\n\n- `09_agents/` 里的 prompt 是 Agent 的\"灵魂\"\n- 其他所有目录是 Agent 的\"记忆\"\n- `08_rules/` 是 Agent 的\"红线\"，优先级高于所有其他内容\n- `03_diagnosis/` 和 `04_scripts/` 经常联动使用：先诊断，再选话术\n- `07_faq/` 每个文件头部会标注 `related_script`，指向对应的深度话术\n\n## 维护原则\n\n1. **单一事实来源**：同一条信息只在一个文件里维护，其他文件用引用\n2. **结构化优先**：价格、课表等数据用表格，不用自然语言描述\n3. **场景导向**：文件按\"Agent 什么时候需要\"组织，不按\"人类觉得该放哪\"组织\n4. **版本标注**：每次修改在 `update_log.md` 记录，关键数据标注生效日期\n", "lines": 41, "size": 2114}, "00_meta__naming_rules": {"id": "00_meta__naming_rules", "path": "00_meta/naming_rules.md", "name": "naming_rules", "title": "Naming Rules", "tags": "", "module": "00_meta", "content": "# 文件命名规则\n\n## 通用规则\n\n1. **全小写英文**，单词间用下划线 `_` 连接\n2. **不使用中文文件名**，避免编码问题\n3. **不超过40个字符**（不含扩展名）\n4. **所有文件统一用 `.md` 格式**\n\n## 命名模式\n\n### 课程文件\n```\n{学段}_{科目}_{班型或特征}.md\n```\n示例：\n- `primary_math_sync_plus.md` — 小学数学同步培优\n- `junior_english_tiers.md` — 初中英语分层班型\n- `senior_physics.md` — 高中物理\n\n### 诊断文件\n```\n{科目}_{画像特征}.md\n```\n示例：\n- `math_below_75.md` — 数学75分以下画像\n- `english_zero_start.md` — 英语零基础画像\n\n### 话术文件\n```\n{场景}_{具体情况}.md\n```\n示例：\n- `objection_too_expensive.md` — 异议-嫌贵\n- `first_contact.md` — 首次接触\n\n### 校区文件\n```\n{校区英文缩写}.md\n```\n示例：\n- `jingji.md` — 京基校区\n- `hongdu.md` — 虹都校区\n\n### 价格文件\n```\n{班型}_{定价维度}.md\n```\n示例：\n- `class_6to12_pricing.md` — 6-12人班价格\n- `promotions_current.md` — 当前优惠活动\n\n## 文件头部元数据\n\n每个 md 文件头部必须包含：\n\n```markdown\n---\ntags: [stage:primary, subject:math, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/math/primary_math_olympiad.md]\n---\n```\n\n- `tags`：使用 taxonomy.md 中定义的标签\n- `last_updated`：最后更新日期\n- `maintainer`：负责维护的人/团队\n- `related_files`：关联文件路径（便于 agent 联动检索）\n", "lines": 70, "size": 1531}, "00_meta__taxonomy": {"id": "00_meta__taxonomy", "path": "00_meta/taxonomy.md", "name": "taxonomy", "title": "Taxonomy", "tags": "", "module": "00_meta", "content": "# 标签分类体系（Taxonomy）\n\n## 一、学段标签\n\n| 标签 | 含义 |\n|------|------|\n| `stage:preschool` | 学前（4-6岁） |\n| `stage:primary-low` | 小学低年级（1-3年级） |\n| `stage:primary-high` | 小学高年级（4-6年级） |\n| `stage:junior` | 初中（初一~初三） |\n| `stage:senior` | 高中（高一~高三） |\n| `stage:xiaoshengchu` | 小升初过渡阶段 |\n\n## 二、科目标签\n\n| 标签 | 含义 |\n|------|------|\n| `subject:math` | 数学（含奥数） |\n| `subject:english` | 英语 |\n| `subject:chinese` | 语文 |\n| `subject:physics` | 物理 |\n| `subject:chemistry` | 化学 |\n| `subject:biology` | 生物 |\n| `subject:geography` | 地理 |\n| `subject:general` | 跨科目/综合 |\n\n## 三、班型标签\n\n| 标签 | 含义 |\n|------|------|\n| `class:1on1` | 一对一 |\n| `class:1on2` | 一对二 |\n| `class:roundtable` | 圆桌特训班（3人） |\n| `class:boutique` | 精品小班（6-12人） |\n| `class:elite` | 精英小班（13-20人） |\n\n## 四、场景标签\n\n| 标签 | 含义 |\n|------|------|\n| `scene:first-contact` | 首次咨询 |\n| `scene:trial` | 试听 |\n| `scene:conversion` | 转化成交 |\n| `scene:renewal` | 续费 |\n| `scene:objection` | 异议处理 |\n| `scene:churn` | 流失/退费 |\n| `scene:feedback` | 阶段反馈 |\n| `scene:complaint` | 投诉 |\n\n## 五、内容类型标签\n\n| 标签 | 含义 |\n|------|------|\n| `type:intro` | 介绍性内容 |\n| `type:script` | 话术/沟通模板 |\n| `type:sop` | 标准操作流程 |\n| `type:data` | 结构化数据（价格表、课表） |\n| `type:rule` | 规则/边界 |\n| `type:faq` | 常见问答 |\n| `type:diagnosis` | 学情诊断/画像 |\n\n## 六、角色标签\n\n| 标签 | 含义 |\n|------|------|\n| `role:consultant` | 咨询师视角 |\n| `role:teacher` | 教师视角 |\n| `role:xueguan` | 学管师视角 |\n| `role:parent` | 面向家长 |\n| `role:internal` | 仅内部使用 |\n", "lines": 71, "size": 1910}, "00_meta__update_log": {"id": "00_meta__update_log", "path": "00_meta/update_log.md", "name": "update_log", "title": "Update Log", "tags": "", "module": "00_meta", "content": "# 知识库更新日志\n\n## 格式规范\n\n```\n## [日期] 操作人\n- [新增/修改/删除] 文件路径 — 变更摘要\n```\n\n---\n\n## [2026-03-19] 初始化\n\n知识库 v1.1 首次创建，数据来源：\n- `湛江百分教育信息.docx`（含31张内嵌图片）\n- `赤坎校区最新版.pdf`（11页收费标准）\n- `CLAUDE.md`（管理分身系统指令）\n\n创建内容：\n- [新增] 00_meta/ — 知识库元信息（readme、标签体系、命名规则、术语表）\n- [新增] 01_brand/ — 品牌信息（企业介绍、创始人、理念、课堂标准、家校协作）\n- [新增] 02_courses/ — 全部课程产品（数学/英语/语文/理科/小升初/特色课）\n- [新增] 03_diagnosis/ — 学情画像（小学/初中/高中/小升初分阶段）\n- [新增] 04_scripts/ — 沟通话术（首次接触、异议处理、续费、退费等）\n- [新增] 05_campuses/ — 7大校区信息及课表\n- [新增] 06_ops/ — 运营SOP、定价体系、服务体系\n- [新增] 07_faq/ — 常见问答\n- [新增] 08_rules/ — Agent 安全边界\n- [新增] 09_agents/ — Agent prompt 模板\n\n---\n\n## 待更新事项\n\n- [ ] 2026年秋季课程表发布后更新 05_campuses/ 各校区课表\n- [ ] 霞山校区、坡头校区收费标准待补充（目前只有赤坎校区完整数据）\n- [ ] 教师个人简介待补充（目前只有姓氏，无详细介绍）\n- [ ] 学员成功案例库待建立\n", "lines": 39, "size": 1416}, "01_brand__brand_intro": {"id": "01_brand__brand_intro", "path": "01_brand/brand_intro.md", "name": "brand_intro", "title": "Brand Intro", "tags": "[type:intro, role:parent, role:consultant]", "module": "01_brand", "content": "---\ntags: [type:intro, role:parent, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/founder_story.md, 01_brand/mission_vision_values.md]\n---\n\n# 百分教育企业介绍\n\n## 基本信息\n\n| 项目 | 内容 |\n|------|------|\n| 全称 | 湛江百分教育（100OK Education） |\n| 成立日期 | 2008年8月18日 |\n| 办学年限 | 18年 |\n| 创始人 | 尤久勇 |\n| 累计服务学员 | 30000+ |\n| 校区数量 | 7大校区（赤坎3 + 霞山2 + 坡头2） |\n| 统一电话 | 18933824497 |\n| 核心理念 | \"好思维，让学习更轻松\" |\n\n## 名称由来\n\n\"百尺竿头须进步，分秒必争活读书\"——取自创始人尤久勇在成立之时的一首藏头诗。\"百分\"二字寓意勉励所有教师及学生，在知识的海洋里需心存远志，活教活学。\n\n## 机构定位\n\n百分教育专注于**小初高中数理化思维能力的培养**。我们做的是**高阶思维培养**和**第二成长曲线**，不是\"作业托管\"或\"低端补差\"。\n\n核心差异化：\n- 不重复课本内容，聚焦\"思维架构\"搭建\n- 从\"会做题\"升级为\"会思考\"\n- 培养的是应对中高考压轴题和未来学习的底层能力\n\n## 教学模式\n\n结合多种教学形式，覆盖全年级段：\n\n| 模式 | 人数 | 特点 |\n|------|------|------|\n| 个性化一对一 | 1人 | 量身定制，适合75分以下或需针对性辅导 |\n| 一对二 | 2人 | 可机构组织或家长自发组团 |\n| 圆桌特训班 | 3人 | 可机构组织或家长自发组团 |\n| 精品小班 | 6-12人 | 分层教学，老师关注到每个学生 |\n| 精英小班 | 13-20人 | 性价比更高 |\n\n## 教学覆盖\n\n**小学部**：自然拼读、剑桥英语、国际音标、拼音识字、看图写话、阅读写作、同步奥数、奥数思维\n\n**初高中部**：\n- 数学思维：提高班、培优班、卓越班\n- 物理科学：培优班、卓越班、满分实验班\n- 化学科学：培优班、卓越班\n- 英语：同步培优、实验班、卓越班\n- 生物/地理：冲刺班\n\n**特色课程**：小升初名校冲刺、10天音标魔法营、7天自然拼读特训营\n\n## 核心数据\n\n- 18年办学历史，湛江本地深耕\n- 累计30000+学员\n- 已积累12000+湛江真题\n- 专职教师和自主教研团队\n- 每一个进入百分的孩子确保一个孩子一套学习方案\n\n## 品牌文化\n\n| 维度 | 内容 |\n|------|------|\n| 校训 | \"学习改变命运，思维成就未来\" |\n| 使命 | \"好思维，快提分\" |\n| 师训 | \"为人、为学、为师\" |\n| 课堂标准 | 趣味、互动、实战 |\n", "lines": 77, "size": 2578}, "01_brand__classroom_standard": {"id": "01_brand__classroom_standard", "path": "01_brand/classroom_standard.md", "name": "classroom_standard", "title": "Classroom Standard", "tags": "[type:intro, role:teacher, role:internal]", "module": "01_brand", "content": "---\ntags: [type:intro, role:teacher, role:internal]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [01_brand/teaching_philosophy.md]\n---\n\n# 课堂标准\n\n## 三字标准：\"趣味、互动、实战\"\n\n### 趣味\n- 注重教学内容的趣味性与知识性的结合\n- 通过生动活泼的形式、有趣的问题和奇妙的方法传递知识\n- 小学阶段：情景教学法，将知识嵌入生活场景（如用买文具讲小数计算）\n- 中学阶段：用实际问题引入知识点，保持学生好奇心\n\n### 互动\n- 教师是课堂的**引导者**，不是灌输者\n- 核心职责：**\"调动\"**学生的学习积极性和学习兴趣\n- 起到**激活学生思维**的作用\n- 学生在教学中处于**主导地位**\n- 在老师的\"调动\"下充分\"发挥\"个人聪明才智和潜能\n\n### 实战\n- 在理解的基础上通过实战演练，提高思维能力\n- 不是死记硬背，而是在练习中巩固和深化理解\n- \"说意训练\"——让学生用自己的语言复述解题逻辑，验证是否真正理解\n\n## 分层小班课堂标准\n\n精品小班（6-12人）的课堂执行：\n\n### 基础班课堂\n- 把课本重点拆得更细\n- 用生活里的例子讲透概念\n- 练题从基础题型慢慢过渡\n- 目标：先让孩子\"学得会\"\n\n### 中等班课堂\n- 在课本基础上多练\"变式题\"\n- 一道应用题换个问法怎么解\n- 重点练\"举一反三\"的思维\n- 目标：确保孩子\"吃得饱\"\n\n### 拔高班课堂\n- 拓展更灵活的解题思路\n- 加入趣味思维挑战（如用图形拼贴理解几何原理）\n- 鼓励同伴间的思维碰撞\n- 目标：让孩子越学越有动力\n\n## 摈弃的做法\n\n- 简单的灌输式教学\n- 死记硬背\n- 重复课本细节\n- 填鸭式速成\n- 知识量堆砌\n- 为新生降低教学强度\n", "lines": 60, "size": 1793}, "01_brand__founder_story": {"id": "01_brand__founder_story", "path": "01_brand/founder_story.md", "name": "founder_story", "title": "Founder Story", "tags": "[type:intro, role:parent]", "module": "01_brand", "content": "---\ntags: [type:intro, role:parent]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/brand_intro.md, 01_brand/teaching_philosophy.md]\n---\n\n# 创始人故事\n\n## 尤久勇\n\n百分教育创始人，18年一线教学经验。\n\n### 办学初心\n\n2008年8月18日，尤久勇老师以一首藏头诗\"百尺竿头须进步，分秒必争活读书\"为名创立百分教育，勉励所有教师及学生在知识的海洋里心存远志，活教活学。\n\n### 教学特色\n\n- 亲自执教初高中数学课程，包括初三数学双语班、高中数学培优班\n- 坚持\"不为新生降低教学强度\"，保护长期学员的思维进阶节奏\n- 其双语班长期坚持高强度思维训练模式，持续出成绩\n\n### 教育理念沉淀\n\n在17年一线教学中，尤老师形成了以\"聚焦思维赋能，超越课本局限\"为核心的教学理念：\n\n1. **跳出课本，聚焦思维本质** — 课堂的价值不在于重复课本细节，而在于帮学生搭建\"思维架构\"\n2. **知识融合，构建立体认知** — 打破传统知识点的线性排列，将零散知识串联成\"模型网络\"\n3. **慢即是快，尊重思维成长规律** — 不追求\"填鸭式速成\"，通过长期训练养成主动思考的习惯\n\n### 品牌IP\n\n尤老师（创始人）、周校、郑校是百分教育的核心IP人物，在宣传视频、家长沟通中代表\"专家型教师\"形象。\n\n### 给教师的三个准则\n\n1. **为人师，正己身** — 教师是人类灵魂的工程师，正己身是第一准则\n2. **传道受业解惑** — 追求学识精益求精是第二准则\n3. **教化众生** — 努力将学识通过课堂让学生吸收转化成受用一生的能力，是第三准则\n\n### 给家长的新年寄语（2026年）\n\n> \"在过去一年，机构稳步发展，这离不开您的孩子的幸勤付出，更离不开您作为家长的默默支持与理解。您的孩子是我们团队的动力，工作中，他们认真、努力、坚持、勇敢，以令人欣慰的速度学生成长，将责任与担当也写在了自己成长的旅途中，是百分教育最美的风景。\"\n>\n> —— 百分教育校长 2026年2月13日\n", "lines": 47, "size": 2178}, "01_brand__home_school_collaboration": {"id": "01_brand__home_school_collaboration", "path": "01_brand/home_school_collaboration.md", "name": "home_school_collaboration", "title": "Home School Collaboration", "tags": "[type:intro, role:parent, role:xueguan]", "module": "01_brand", "content": "---\ntags: [type:intro, role:parent, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/home_school_communication.md, 06_ops/service_system_9000.md]\n---\n\n# 家校协作理念\n\n## 核心理念\n\n**\"突出家庭在教育中的作用，注重学生、家长、教师的合力\"**\n\n\"子不教父之过，教不严师之惰\"——实现两小时外教育，实现家校沟通日常化、规范化、科学化。\n\n## 三股力量合力\n\n| 角色 | 定位 | 职责 |\n|------|------|------|\n| 学生 | **主导** | 主动学习、主动思考、主动实践 |\n| 家长 | **引导** | 在家庭教育环节发挥积极作用，配合落实学习计划 |\n| 老师 | **指导** | 课堂教学 + 课后跟进 + 方法指导 |\n\n三股力量的合力，确保教学成果最大化。\n\n## 家长的角色\n\n### 信任与配合\n- 家长和孩子的信任与执行，是实现思维突破的关键\n- 新学员需要先放下\"坐等投喂\"的习惯，跟着老师的思维引导主动思考\n- 短期可能有挑战感，但坚持1-2年会看到显著成效\n\n### 家庭端配合\n- 配合错题复盘（亲子检查）\n- 监督课后笔记回看巩固\n- 鼓励孩子主动思考，不直接给答案\n- 关注孩子的学习状态变化\n\n### 家长沟通先于学生沟通\n- 面对家长，先理解焦虑，再给方案\n- 分析教育历程中的盲点，帮助家长建立科学教育观\n- 通过\"家庭几何探索游戏\"等方式让家长参与学习过程\n\n## 一对一教学中的家庭协作价值\n\n对于成绩低于75分的学生，一对一教学实现三大转变：\n\n1. **提升学习力** — 强化计算、理解、记忆能力，提高听课专注力，为后续学习筑牢基础\n2. **改善学习状态** — 通过持续引导和鼓励，激发孩子主动投入学习的积极性\n3. **优化学习心理+亲子关系** — 帮助孩子调整学习心态，同时给予亲子沟通建议，促进家庭关系和谐\n\n## 沟通规范\n\n### 三段式沟通结构（每次沟通必用）\n\n1. **共情（30%）**：先理解焦虑，不急于反驳\n2. **证据（40%）**：用具体数据和事实\n3. **行动（30%）**：明确下一步 + 时间节点 + 责任人\n\n### 场景分流\n\n| 场景 | 策略 |\n|------|------|\n| 首次咨询 | 建立信任，不急推课 |\n| 阶段反馈 | 入学 vs 当前的数据对比 |\n| 成绩下降 | 不回避，共情→归因→调整方案 |\n| 续费 | 成长手册驱动，说\"继续\"不说\"续费\" |\n| 投诉 | 24h电话响应，先情绪后事情，48h回访 |\n| 退费 | 体面告别，输出成长手册 |\n", "lines": 70, "size": 2575}, "01_brand__mission_vision_values": {"id": "01_brand__mission_vision_values", "path": "01_brand/mission_vision_values.md", "name": "mission_vision_values", "title": "Mission Vision Values", "tags": "[type:intro, role:parent, role:internal]", "module": "01_brand", "content": "---\ntags: [type:intro, role:parent, role:internal]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/brand_intro.md, 01_brand/teaching_philosophy.md]\n---\n\n# 使命·愿景·价值观\n\n## 核心理念\n\n**\"好思维，让学习更轻松\"**\n\n思维：对新输入信息与脑内储存知识经验进行一系列复杂的心智操作过程。所有百分人必须摈弃简单的灌输式教学，须善于探索新知识与旧知识之间的联系、差异，通过学生易于接受的行为习惯（爱、信任、讲故事、抖包袱、脑洞大开的引导等）形成新旧知识的简单化、条理化引导式基础教学，在基础知识巩固的基础之上再进行多维发散式思维强化训练，让孩子在学习知识时潜移默化地形成一套思维模式。\n\n## 使命\n\n**\"好思维，快提分\"**\n\n以孩子的思维能力培养为教育之本，弥补学校传统教育无法满足学生个性化发展及思维能力培养需求的不足。\n\n## 校训\n\n**\"学习改变命运，思维成就未来\"**\n\n活到老，学到老，践行终身学习机制，从每一个百分人做起。在学生的成才期，百分教育肩负着学生成才的使命——学思践行，以身作则。\n\n**师生传导关系**：师学则生习，师思则生思，师行则生随。随思潜入，润泽学子之思维作风、思维方法、思维习惯，最终达到创造性思维，成为学生受用一生的法宝。\n\n## 师训文化\n\n**\"为人、为学、为师\"**\n\n| 层次 | 准则 | 含义 |\n|------|------|------|\n| 为人 | \"为人师，正己身\" | 教师是人类灵魂的工程师，正己身是第一准则 |\n| 为学 | \"师者，传道受业解惑\" | 追求学识及知识的精益求精是第二准则 |\n| 为师 | \"教化众生\" | 将学识通过课堂让学生吸收转化为受用一生的能力是第三准则 |\n\n## 决策铁律（内部）\n\n1. **证据先行**：拒绝空洞承诺，用数据说话。证据 = 试卷分析 + 成长手册 + 真实学员案例 + 视频展示\n2. **专业钩子**：用专业服务（试卷深度分析、学业规划）获客，不做低价引流\n3. **三角协作**：咨询师 + 教师 + 学管，标准化服务流程，各司其职\n4. **口碑至上**：即使学生要走，也要体面结业，输出价值。口碑 > 一时成交\n\n## 输出禁令\n\n| 禁止说 | 替代说法 |\n|--------|---------|\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据 |\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X\" |\n| \"别的机构不行\" | 展示自身差异化价值 |\n| \"赶紧报名，名额有限\" | \"建议尽早开始，以下是时间规划\" |\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" |\n| \"进步很大\" | 用具体数据，如\"数学从72分提升到85分\" |\n", "lines": 57, "size": 2825}, "01_brand__teaching_philosophy": {"id": "01_brand__teaching_philosophy", "path": "01_brand/teaching_philosophy.md", "name": "teaching_philosophy", "title": "Teaching Philosophy", "tags": "[type:intro, role:parent, role:consultant]", "module": "01_brand", "content": "---\ntags: [type:intro, role:parent, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/classroom_standard.md, 04_scripts/explain_thinking_training.md]\n---\n\n# 教学理念\n\n## 核心理念：\"聚焦思维赋能，超越课本局限\"\n\n基于创始人尤久勇老师18年一线教学经验沉淀。\n\n---\n\n### 理念一：跳出课本，聚焦思维本质\n\n我们坚信，课堂的价值不在于重复课本细节（这些交给学校基础教学即可），而在于帮学生搭建\"思维架构\"。\n\n**具体做法**：\n- 提炼母题模型，用最简洁的方式呈现解题的核心逻辑\n- 绘制思维导图，让抽象思维变得可见\n- 让学生记住的不是繁琐步骤，而是\"怎么想\"的底层思路\n- 尤其适合追求高效提升的学生，帮助他们从\"会做题\"升级为\"会思考\"\n\n---\n\n### 理念二：知识融合，构建立体认知\n\n课程设计打破传统知识点的线性排列，将零散知识串联成\"模型网络\"。\n\n**具体做法**：\n- 初三课程以\"圆→相似→旋转→三角函数\"的融合逻辑推进\n- 建立模型网络（如相似的四大模型、旋转在压轴题中的应用）\n- 适度拓展超纲但实用的解题工具（如胡不归、阿氏圆）\n- 让学生在实战中学会\"跨知识点融会贯通\"\n\n**效果**：提升高维审题能力和知识迁移底气。学生看到一道压轴题，能拆解出背后可能同时用到的多个知识点模型。\n\n---\n\n### 理念三：慢即是快，尊重思维成长规律\n\n思维的升级需要过程，我们不追求\"填鸭式速成\"。\n\n**具体做法**：\n- 通过长期训练帮学生养成\"主动思考、灵活运用\"的习惯\n- 坚持\"不为新生降低教学强度\"，保护长期学员的思维进阶节奏\n- 让新学员在沉浸式训练中突破\"被动接受\"的舒适区\n- 最终实现从\"痛苦适应\"到\"享受思维洗礼\"的蜕变\n\n**给家长的预期管理**：短期（如暑假）课程可能让新学员觉得有挑战，因为我们更注重\"思维强度\"而非\"知识量堆砌\"。但坚持1-2年的系统训练后，孩子会明显感受到审题速度、解题灵活性的提升。\n\n---\n\n## 百分教学法\n\n| 学段 | 教学法 | 说明 |\n|------|--------|------|\n| 小学 | 情景教学法 + 阶梯构建式教学 | 将知识嵌入生活场景，逐层构建知识体系 |\n| 初高中 | 考点教学法 + 阶梯构建式教学 | 以考点为锚，逐层突破 |\n\n## 课程内容特点\n\n- 上课内容80%是学生平时没接触过的\"拔高知识点\"\n- 每节课都得动脑子跟着走，一节顶学校3-7天的内容量\n- 不只教知识点，更教\"怎么学\"——串框架、记笔记、课后回看巩固\n\n## 数理思维的重要性\n\n数理思维是一切学科的基础，延伸到：抽象能力、理解能力、分析能力、推理能力、创新能力、表达能力、探究能力、思考能力。在未来的人工智能、算法、编程、数据科学、金融模型等领域，数理思维都是核心素养。\n\n## 阅读的跨学科价值\n\n阅读能力影响9大学科表现：\n\n| 学科 | 阅读带来的能力 |\n|------|-------------|\n| 语文 | 理解能力、思辨能力、知识储备 |\n| 数学 | 理解能力、逻辑推理能力、抽象建模能力 |\n| 英语 | 理解能力、语感、语言综合运用能力 |\n| 物理 | 理解能力、逻辑推理能力 |\n| 化学 | 逻辑思维能力、微观结构想象力 |\n| 生物 | 综合思维能力、生命系统理解力 |\n| 地理 | 空间思维、跨学科思维、区域综合分析能力 |\n| 政治 | 理解能力、辩证思维能力、时政分析能力 |\n| 历史 | 史料辨析能力、批判性思维、跨学科思维 |\n\n核心结论：阅读 → 理解能力 → 综合能力 + 文字敏感度\n", "lines": 90, "size": 3769}, "02_courses__chinese__picture_talking": {"id": "02_courses__chinese__picture_talking", "path": "02_courses/chinese/picture_talking.md", "name": "picture_talking", "title": "Picture Talking", "tags": "[stage:primary-low, subject:chinese, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, subject:chinese, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/chinese/pinyin_literacy.md, 02_courses/chinese/reading_writing.md]\n---\n\n# 看图说话 / 看图写话\n\n## 课程定位\n\n1-2年级语文核心课程，是**学好语文的关键第一步**，也是小学写作地基。\n\n## 课程分期\n\n| 阶段 | 名称 | 年级 | 重点 |\n|------|------|------|------|\n| 第一期 | 看图说话 | 一年级下 | 口头表达，借助图片引导开口 |\n| 第二期 | 看图写话 | 二年级 | 书面表达，从说到写的过渡 |\n\n## 解决的痛点\n\n家长常见困惑：\n- 看图写话没逻辑？**胡乱写**？\n- 语句表达不清楚？**没思路**？\n- 看图写话干巴巴？**没文采**？\n- 常用方法不生动？**得分低**？\n\n## 四大教学亮点\n\n1. **看图技巧全面讲解** — 教孩子观察图片的方法和顺序\n2. **思维导图思路引导** — 用可视化工具帮孩子理清写作思路\n3. **看图写作习惯养成** — 建立从观察到表达的系统方法\n4. **优美词句日积月累** — 积累好词好句，提升文字表达水平\n\n## 课程价值\n\n- 破解\"看图无逻辑\"难题，思路一目了然\n- 告别\"流水账\"，教孩子写出生动细节\n- 培养表达兴趣，让孩子主动提笔不再抗拒\n- 衔接中高年级写作，基础打牢少走弯路\n\n## 各校区开设情况\n\n| 校区 | 年级 | 课程 |\n|------|------|------|\n| 京基校区 | 一年级 | 看图说话（周六下午16:30-18:00，郑老师） |\n| 虹都校区/盛和园 | 一年级 | 看图写话 |\n| 海东校区 | — | 有开设 |\n\n## 进阶路径\n\n```\n看图说话（一年级下）→ 看图写话（二年级）→ 阅读与写作（二年级起）\n```\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（按一~三年级标准）\n", "lines": 60, "size": 1884}, "02_courses__chinese__pinyin_literacy": {"id": "02_courses__chinese__pinyin_literacy", "path": "02_courses/chinese/pinyin_literacy.md", "name": "pinyin_literacy", "title": "Pinyin Literacy", "tags": "[stage:primary-low, subject:chinese, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, subject:chinese, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/chinese/picture_talking.md]\n---\n\n# 拼音识字+绘本阅读\n\n## 课程定位\n\n一年级上学期的语文启蒙课程，**拼音和识字+绘本阅读双轨并行**。\n\n## 适合对象\n\n- 一年级新生\n- 拼音基础薄弱的学生\n- 需要培养阅读习惯的低龄儿童\n\n## 教学目标\n\n- 夯实拼音这个语文学习的\"工具基础\"\n- 通过绘本阅读在趣味中积累识字量\n- 培养早期阅读习惯\n- 为后续看图写话和阅读写作筑牢根基\n\n## 教学特点\n\n- 拼音教学：系统学习声母、韵母、声调，掌握拼读规则\n- 绘本阅读：选用适龄绘本，在趣味故事中积累识字量\n- 双轨并行：拼音学习和阅读兴趣培养同步推进\n\n## 进阶路径\n\n```\n拼音识字+绘本阅读（一年级上）→ 看图说话（一年级下）→ 看图写话（二年级）→ 阅读与写作（二年级起）\n```\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（按一~三年级标准）\n", "lines": 42, "size": 1120}, "02_courses__chinese__reading_writing": {"id": "02_courses__chinese__reading_writing", "path": "02_courses/chinese/reading_writing.md", "name": "reading_writing", "title": "Reading Writing", "tags": "[stage:primary-low, stage:primary-high, subject:chinese, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:chinese, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/chinese/picture_talking.md, 01_brand/teaching_philosophy.md]\n---\n\n# 阅读与写作\n\n## 课程定位\n\n**\"以读促写，读写共生\"** — 二年级及以上语文核心课程，在大量阅读中提升理解和分析能力，再逐步转化为写作技巧。\n\n## 适合对象\n\n- 二年级及以上的小学生\n- 阅读量不足、写作表达能力弱\n- 需要系统提升语文综合素养\n\n## 课程安排\n\n- 每月4次课：**3次阅读 + 1次写作**\n- 一学期20次课\n- \"先读后写、以读促写\"的模式\n\n## 分阶段教学重点\n\n| 年级 | 校区安排 | 教学重点 |\n|------|---------|---------|\n| 1-2年级 | 盛和园/京基 | 拼音辨析+趣味识字+看图写话 |\n| 3-4年级 | 盛和园/京基 | 阅读策略+段落写作+范文优写 |\n| 5-6年级 | 盛和园/京基 | 整本书阅读+篇章写作+创意创编 |\n\n## 各校区课程安排\n\n**京基校区**：\n- 二年级阅读写作：周日上午8:00-10:00（郑老师）\n- 三年级阅读写作：周六上午10:10-12:10（姚老师）\n- 四年级阅读写作：周六上午8:00-10:00（姚老师）\n\n**盛和园校区**：\n- 二年级阅读与写作、三年级阅读与写作、四年级阅读与写作、五年级阅读与写作均有开设\n\n**海东校区**：\n- 五年级语文（傅老师）、六年级语文（傅老师）\n\n## 教学效果\n\n- 从\"会读\"到\"会写\"的稳步跨越\n- 全面提升语文综合素养\n- 培养自主阅读和表达的习惯\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 56, "size": 1682}, "02_courses__course_selector": {"id": "02_courses__course_selector", "path": "02_courses/course_selector.md", "name": "course_selector", "title": "Course Selector", "tags": "[type:data, role:consultant, subject:general]", "module": "02_courses", "content": "---\ntags: [type:data, role:consultant, subject:general]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [03_diagnosis/]\n---\n\n# 课程选择导航（路由表）\n\nAgent 在接收到家长描述后，先匹配本表，再跳转到具体课程文件。\n\n## 小学数学\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 平时成绩 < 75分 | 名师一对一 | `math/math_one_on_one.md` |\n| 75分 ≤ 成绩 < 90分 | 同步培优班（6-12人） | `math/primary_math_sync_plus.md` |\n| 90分 ≤ 成绩 < 95分 | 同步奥数班（6-12人） | `math/primary_math_sync_olympiad.md` |\n| 成绩 ≥ 96分且长期稳定 | 奥数班 / 纯奥数 / 奥数创新班 | `math/primary_math_olympiad.md` |\n\n## 小学英语\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 4-5岁 / 4-8岁零基础 | 自然拼读+绘本阅读 | `english/phonics.md` |\n| 自然拼读完成 | 剑桥英语衔接课程 | `english/cambridge_bridge.md` |\n| 三年级起步 / 启蒙晚 / 基础弱 | 课本同步培优 | `english/primary_english_sync_plus.md` |\n| 4-6年级想突破音标 | 10天音标魔法营 | `special/ipa_magic_camp.md` |\n\n## 小学语文\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 一年级上 | 拼音识字+绘本阅读 | `chinese/pinyin_literacy.md` |\n| 一年级下~二年级 | 看图说话/看图写话 | `chinese/picture_talking.md` |\n| 二年级及以上 | 阅读与写作 | `chinese/reading_writing.md` |\n\n## 初中英语\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 小学95分+且系统学过剑桥/新概念 | 英语卓越班（2.5年学制） | `english/junior_english_tiers.md` |\n| 补习后达95分 | 英语实验班（2年学制） | `english/junior_english_tiers.md` |\n| 基础中等 | 英语同步培优班 | `english/junior_english_tiers.md` |\n\n## 初中数学\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 基础薄弱 | 数学提高班 / 一对一 | `math/junior_math_tiers.md` |\n| 中等水平 | 数学培优班 | `math/junior_math_tiers.md` |\n| 尖子生 | 数学卓越班 / 双语班 | `math/junior_math_tiers.md` |\n\n## 初中理科\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 初二物理起步 | 物理培优班 | `science/junior_physics.md` |\n| 初二物理90分以上 | 满分实验班 | `science/junior_physics.md` |\n| 初三化学 | 化学培优班 | `science/junior_chemistry.md` |\n| 初二生物地理冲刺 | 生物/地理冲刺班 | `science/junior_bio_geo.md` |\n\n## 高中\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 高中数学 | 培优班/提高班 | `math/senior_math_tiers.md` |\n| 高中物理 | 培优班/提高班 | `science/senior_physics.md` |\n| 高中化学 | 培优班 | `science/senior_chemistry.md` |\n| 高中英语 | 培优班 | `english/senior_english.md` |\n\n## 小升初\n\n| 条件 | 推荐课程 | 课程文件 |\n|------|---------|---------|\n| 五年级起有意名校 | 提前2年定制名校课程 | `xiaoshengchu/elite_school_sprint.md` |\n| 六年级冲刺 | 小升初选拔+分班考集训 | `xiaoshengchu/elite_school_sprint.md` |\n\n## 特殊推荐逻辑\n\n1. **成绩 < 75分**：无论哪科，优先推荐一对一，不直接进小班\n2. **多科报名**：提醒新生折扣（单科9.5折/两科9折/三科8.5折）\n3. **有同伴**：提醒团报优惠或家长自发组团一对二/圆桌\n4. **五年级以上有名校目标**：优先推荐小升初冲刺课\n", "lines": 85, "size": 3513}, "02_courses__english__cambridge_bridge": {"id": "02_courses__english__cambridge_bridge", "path": "02_courses/english/cambridge_bridge.md", "name": "cambridge_bridge", "title": "Cambridge Bridge", "tags": "[stage:primary-low, stage:primary-high, subject:english, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:english, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/phonics.md, 02_courses/english/junior_english_tiers.md]\n---\n\n# 剑桥英语衔接课程\n\n## 课程定位\n\n自然拼读三阶完成后的**进阶课程**，系统提升听说读写能力，为KET考级做准备。\n\n## 适合对象\n\n- 已完成自然拼读1-3阶的学生\n- 有一定英语语感基础，准备系统学习英语体系\n- 目标是在三年级下学期或四年级参加KET考级\n\n## 课程体系\n\n| 阶段 | 内容 | 时长 |\n|------|------|------|\n| 剑桥1阶 | 基础听说读写 | 约1年 |\n| 剑桥2阶 | 能力进阶 | 约1年 |\n| 剑桥3阶 | 备考KET | 约1年 |\n\n三年系统学习后，可参加KET考级，检验和提升英语水平。\n\n## 进阶路径\n\n```\n自然拼读（4-5岁起）→ 剑桥英语（3年体系）→ KET考级 → 初中英语卓越班（2.5年学制）\n```\n\n这套进阶体系科学且符合语言学习规律，能有效培养孩子的语感和英语核心素养。\n\n## 各校区开设情况\n\n- 京基校区：剑桥1阶（周六晚上19:00-21:00）\n- 盛和园校区：剑桥1-2阶\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 46, "size": 1282}, "02_courses__english__junior_english_tiers": {"id": "02_courses__english__junior_english_tiers", "path": "02_courses/english/junior_english_tiers.md", "name": "junior_english_tiers", "title": "Junior English Tiers", "tags": "[stage:junior, subject:english, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:english, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/cambridge_bridge.md, 02_courses/english/senior_english.md]\n---\n\n# 初中英语分层班型\n\n## 三层班型总览\n\n百分教育的初中英语延续\"分层教学、精准赋能\"理念，设三个层次：\n\n### 第一层：英语卓越班（2.5年学制）\n\n**入班条件**：小学成绩95分以上，且系统学过剑桥或新概念英语（具备扎实语法与阅读能力）\n\n**课程节奏**：用1.5年学完初中内容，再用1年衔接高中知识\n\n| 阶段 | 时段 | 内容 |\n|------|------|------|\n| 初中阶段 | 秋/寒 | 语法+词汇拓展 |\n| 初中阶段 | 春/暑 | 题型专项突破 |\n| 中考冲刺 | 0.5年 | 中考应试训练 |\n| 高中衔接 | 1年 | 高一词汇与语法，积累3000词汇量 |\n\n**目标**：\n- 中考接近满分\n- 高中英语稳定在125分左右\n- 实现\"小学优→初中尖→高中稳\"的进阶\n\n**适合**：目标明确、追求超前学习与高分突破的学生\n\n---\n\n### 第二层：英语实验班（2年学制）\n\n**入班条件**：小学阶段通过补习达到95分的学生\n\n**课程节奏**：兼顾基础巩固与能力拔高\n\n| 阶段 | 内容 |\n|------|------|\n| 初中核心 | 语法、词汇拓展及题型训练 |\n| 中考冲刺 | 0.5年应试冲刺 |\n| 高中衔接 | 0.5年掌握高一核心词汇与语法，积累2500词汇量 |\n\n**目标**：\n- 高中英语学习无压力\n- 高中英语目标110分以上\n\n**适合**：有一定基础、需稳步提升至优等生水平的学生\n\n---\n\n### 第三层：英语同步培优班\n\n**入班条件**：英语基础中等\n\n**教学内容**：\n- 紧密同步学校教学进度\n- 聚焦课内知识强化\n- 针对性攻克课本重点、难点\n- 帮助学生扎实掌握单元内容\n\n**目标**：提升单元测试、期中期末考试成绩\n\n**适合**：需巩固课内知识、优先提升校内表现的学生\n\n---\n\n## 共同特点\n\n三种班型均围绕\"好思维让学习更轻松\"的理念，在分层教学中融入听说读写综合训练，既贴合不同学生的起点，也明确了清晰的进阶目标。\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 79, "size": 2266}, "02_courses__english__phonics": {"id": "02_courses__english__phonics", "path": "02_courses/english/phonics.md", "name": "phonics", "title": "Phonics", "tags": "[stage:preschool, stage:primary-low, subject:english, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:preschool, stage:primary-low, subject:english, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/cambridge_bridge.md, 02_courses/special/phonics_7day_camp.md]\n---\n\n# 自然拼读+绘本阅读\n\n## 课程定位\n\n面向**4-8岁**零基础儿童，培养纯正流利的发音，实现\"见词能读、听音能写\"。\n\n## 适合对象\n\n- 4-5岁英语启蒙阶段的孩子\n- 未接触过系统英语学习的低龄儿童\n- 希望从源头建立英语语感的家庭\n\n## 班型\n\n精品小班，6-12人\n\n## 使用教材\n\n**Oxford Phonics World（牛津自然拼读世界）** 1-5册\n\n配套资源：\n- 170节外教精讲课\n- 74张单词卡片\n- 170节趣味动画\n- 40个动画故事\n- 15套故事绘本阅读\n\n## 课程目标\n\n| 能力维度 | 目标 |\n|---------|------|\n| 母语式正发音 | 磨出英语耳朵，建立字母与发音的直觉反应 |\n| 见词能读 | 掌握80%英语单词的拼读规律，不用查词典直接拼读 |\n| 听音能写 | 听力考试听清每个音，告别\"蒙答案\" |\n| 地道口型 | 自然读出来，从源头告别中式发音 |\n| 告别死记硬背 | 开启自主阅读、自信表达 |\n\n## 课程进阶路径\n\n```\n自然拼读1阶（20次课）→ 2阶（15次课）→ 3阶（15次课）→ 衔接剑桥英语课程\n```\n\n完成自然拼读三个阶段后，衔接剑桥英语课程，全面提升听说读写能力。经过剑桥英语体系三年系统学习后，可三年级下学期或四年级参加KET考级。\n\n## 各校区开设情况\n\n- 京基校区：1阶、2阶均有开设\n- 华都汇校区：1阶\n- 盛和园校区：1阶（小）、1-2阶、3阶均有开设\n- 海东校区：有开设（周二晚+周六）\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（按一~三年级标准）\n", "lines": 63, "size": 1839}, "02_courses__english__primary_english_sync_plus": {"id": "02_courses__english__primary_english_sync_plus", "path": "02_courses/english/primary_english_sync_plus.md", "name": "primary_english_sync_plus", "title": "Primary English Sync Plus", "tags": "[stage:primary-low, stage:primary-high, subject:english, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:english, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [03_diagnosis/primary/english_zero_start.md]\n---\n\n# 小学英语同步培优\n\n## 课程定位\n\n面向英语启蒙晚、错过启蒙期、基础较弱的孩子，**聚焦课本同步培优**。\n\n## 适合对象\n\n- 从三年级才开始在学校学习英语的孩子\n- 英语启蒙晚，基础较弱\n- 需要先吃透课内知识，再考虑拓展\n\n## 教学目标\n\n- 帮助孩子吃透课内知识、熟练掌握内容\n- 快速提升单元测试成绩\n- 激发学习兴趣、建立自信\n- 注重提升孩子的英语学习兴趣，在轻松氛围中逐步提升英语能力\n\n## 教学特点\n\n- 紧跟学校教材进度\n- 课本重点、难点逐一攻克\n- 从实际学情出发的补强方式\n- 帮助孩子攻克薄弱点，逐步提升英语能力\n\n## 进阶路径\n\n```\n同步培优（基础弱）→ 成绩稳定后 → 可考虑衔接剑桥体系或初中英语实验班\n```\n\n## 各校区开设情况\n\n各校区均有开设英语培优课程，具体时间见各校区课表。\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 47, "size": 1212}, "02_courses__english__senior_english": {"id": "02_courses__english__senior_english", "path": "02_courses/english/senior_english.md", "name": "senior_english", "title": "Senior English", "tags": "[stage:senior, subject:english, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:english, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/junior_english_tiers.md]\n---\n\n# 高中英语课程\n\n## 课程定位\n\n高中英语培优课程，帮助学生在听说读写方面全面提升。\n\n## 班型\n\n- 英语培优班\n- 高中英语（郑校亲授，南油二区）\n\n## 教学内容\n\n- 高级思维：听说能力、语法精通\n- 延续初中英语体系的进阶训练\n- 针对高考英语核心考点做专项突破\n\n## 与初中英语卓越班的衔接\n\n通过初中英语卓越班的学生，已在初中阶段完成高一词汇与语法积累（3000词汇量），进入高中后英语学习无压力，目标稳定125分左右。\n\n## 各校区开设情况\n\n- 虹都校区：高一、高二英语培优（郑老师）\n- 霞山校区：高一、高二英语（冰老师）\n- 南油二区校区：高中英语（郑校）\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 38, "size": 1007}, "02_courses__math__junior_math_tiers": {"id": "02_courses__math__junior_math_tiers", "path": "02_courses/math/junior_math_tiers.md", "name": "junior_math_tiers", "title": "Junior Math Tiers", "tags": "[stage:junior, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 05_campuses/]\n---\n\n# 初中数学分层班型\n\n## 班型概览\n\n| 班型 | 定位 | 适合学生 |\n|------|------|---------|\n| 数学提高班 | 基础补强 | 基础薄弱，需要巩固课内知识 |\n| 数学培优班 | 能力提升 | 中等水平，需稳步提升至优等 |\n| 数学卓越班 | 拔高冲刺 | 尖子生，冲刺压轴题和竞赛 |\n| 数学强化班 | 强化训练 | 需要高强度专项突破 |\n| 数学双语班 | 特色班 | 中英双语教学数学（尤老师亲授，初三） |\n| 数学实验班 | 实验探索 | 注重数学实验和模型构建 |\n\n## 教学理念在初中数学中的体现\n\n### 知识融合教学\n- 以\"圆→相似→旋转→三角函数\"的融合逻辑推进\n- 将零散知识串联成\"模型网络\"\n  - 相似的四大模型\n  - 旋转在压轴题中的应用\n- 适度拓展超纲但实用的解题工具（胡不归、阿氏圆）\n\n### 母题模型训练\n- 从大量题目中提炼核心题型结构\n- 掌握一个模型可以解一类题\n- 训练\"拆解题目→调用模型→组合知识\"的能力\n\n### 说意训练\n- 让学生用自己的语言复述解题逻辑\n- 验证是否真正理解而非死记步骤\n\n## 课程安排特点\n\n- 各校区每周末开设多个班次\n- 尤老师（创始人）亲自执教部分班次\n- 初三双语班是特色课程，中英双语教学数学\n- 培优班通常有1-3班同时开设，可选择合适时段\n\n## 初三中考冲刺\n\n- 聚焦中考高频考点和压轴题型\n- 模型化爆破：将复杂题目分解为已知模型组合\n- 结合《湛江中考几何高频错题模型库》（12000+本地真题积累）\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（初一180/次、初二190/次、初三200/次为课单价）\n", "lines": 55, "size": 1912}, "02_courses__math__math_one_on_one": {"id": "02_courses__math__math_one_on_one", "path": "02_courses/math/math_one_on_one.md", "name": "math_one_on_one", "title": "Math One On One", "tags": "[stage:primary-low, stage:primary-high, stage:junior, stage:senior, subject:math, class:1on1, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, stage:junior, stage:senior, subject:math, class:1on1, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [03_diagnosis/primary/math_below_75.md, 06_ops/pricing/one_on_one_pricing.md]\n---\n\n# 名师一对一（数学及全科）\n\n## 课程定位\n\n面向成绩低于75分或需要**高度针对性辅导**的学生。一对一模式让老师深入了解孩子的兴趣爱好、知识薄弱点及学习能力短板，量身定制学习方案。\n\n## 适合对象\n\n- 数学成绩长期低于75分\n- 知识漏洞较多，需要系统补强\n- 在小班中跟不上节奏，需要个性化关注\n- 学习状态不佳，需要通过一对一重建信心\n\n## 三大核心价值\n\n### 1. 提升学习力\n- 强化计算能力、理解能力、记忆能力\n- 提高听课专注力\n- 为后续学习筑牢基础\n\n### 2. 改善学习状态\n- 通过持续引导和鼓励，改善孩子的学习状态\n- 激发主动投入学习的积极性\n- 让孩子从\"被动学\"转向\"主动学\"\n\n### 3. 优化学习心理+亲子关系\n- 帮助孩子优化学习心理\n- 在沟通过程中给予亲子沟通方面的建议\n- 促进亲子关系更和谐\n\n## 教学优势\n\n- 名师一对一：18年教学经验的专职教师\n- 查漏补缺：精准定位薄弱点\n- 学习方法指导：不只教知识，更教方法\n- 学习状态优化：关注学习习惯和心理\n- 学习心理沟通：解决畏难、厌学等心理障碍\n\n## 年级覆盖\n\n一年级至高三，全科目\n\n## 报课赠课活动\n\n| 报课次数 | 赠送次数 |\n|---------|---------|\n| 15次课 | 赠送1次 |\n| 20次课 | 赠送2次 |\n| 30次课 | 赠送4次 |\n\n## 进阶路径\n\n一对一补强 → 成绩提升到75-90分 → 转入同步培优小班\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/one_on_one_pricing.md`\n\n## 注意事项\n\n- 一对一是建议性推荐，不强制\n- 话术要点：不说\"孩子基础太差\"，说\"目前有几个关键知识漏洞需要补\"\n- 向家长解释时强调\"个性化的辅导方式能更精准满足孩子需求\"\n", "lines": 71, "size": 2074}, "02_courses__math__primary_math_olympiad": {"id": "02_courses__math__primary_math_olympiad", "path": "02_courses/math/primary_math_olympiad.md", "name": "primary_math_olympiad", "title": "Primary Math Olympiad", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 03_diagnosis/primary/math_above_96.md]\n---\n\n# 小学数学奥数班 / 纯奥数 / 奥数创新班\n\n## 课程定位\n\n面向长期稳定在**96分以上**的小学生，**深入拓展奥数知识体系，培养高阶思维能力**。\n\n## 班型细分\n\n| 班型 | 说明 | 开设校区 |\n|------|------|---------|\n| 奥数班 | 基于学校同步+深度奥数拓展 | 各校区均有 |\n| 纯奥数 | 脱离课本体系，纯粹的奥数知识和思维训练 | 京基校区 |\n| 奥数创新班 | 纯奥数基础上进一步拓展创新思维（周四晚） | 京基校区 |\n\n## 适合对象\n\n- 成绩长期稳定在96分以上\n- 对数学有浓厚兴趣，追求更高挑战\n- 有意参加数学竞赛或冲刺名校小升初\n\n## 教学特点\n\n- 拓展更灵活的解题思路\n- 加入趣味思维挑战（如用图形拼贴理解几何原理）\n- 鼓励同伴间的思维碰撞\n- 让孩子在和同伴的思维碰撞里找到成就感，越学越有动力\n\n## 三年级奥数特别说明\n\n三年级是\"开启思维大进阶\"的关键期，开启数学四大能力：\n\n1. **逻辑推理能力** — 从机械记忆走向逻辑建构，学会因果推导\n2. **数学应变能力** — 掌握解题规律，一通百通；不惧题海战术，教孩子举一反三\n3. **实际应用能力** — 让数学从课本走向生活，用思维解决真实问题\n4. **抽象思维能力** — 从具象到抽象，建立符号思维，无缝衔接初中代数几何\n\n## 年级覆盖\n\n二年级至六年级\n\n## 进阶路径\n\n同步奥数 → **纯奥数/奥数创新班** → 小升初名校冲刺\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 55, "size": 1842}, "02_courses__math__primary_math_sync_olympiad": {"id": "02_courses__math__primary_math_sync_olympiad", "path": "02_courses/math/primary_math_sync_olympiad.md", "name": "primary_math_sync_olympiad", "title": "Primary Math Sync Olympiad", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 03_diagnosis/primary/math_90_to_95.md]\n---\n\n# 小学数学同步奥数班\n\n## 课程定位\n\n面向平时测试**90-95分**的小学生，在同步学校内容的基础上**融入适度的奥数思维训练**。\n\n## 适合对象\n\n- 课本知识掌握良好，但灵活解题差点火候\n- 需要在保持课内成绩的同时，拓展思维能力\n- 目标是从\"做题正确\"到\"思维灵活\"的跨越\n\n## 班型\n\n精品小班，6-12人\n\n## 教学特点\n\n- 同步内容占60%：巩固课本重点+变式题训练\n- 奥数思维占40%：适度引入奥数思维方法，培养举一反三能力\n- 在课本基础上多练\"变式题\"，一道应用题换个问法怎么解\n- 重点帮孩子练\"举一反三\"的思维，确保\"吃得饱\"\n\n## 分层逻辑\n\n同步奥数班的学生知识储备和思维节奏相近，老师能清楚记住每个孩子的\"卡点\"和\"潜力\"。水平相近的孩子一起学，没人因为跟不上自卑，也没人因为太简单松懈。\n\n## 年级覆盖\n\n一年级至六年级（各校区课表中均有开设）\n\n## 进阶路径\n\n同步培优 → **同步奥数班**（90-95分）→ 成绩稳定96分以上 → 纯奥数班/奥数创新班\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 46, "size": 1430}, "02_courses__math__primary_math_sync_plus": {"id": "02_courses__math__primary_math_sync_plus", "path": "02_courses/math/primary_math_sync_plus.md", "name": "primary_math_sync_plus", "title": "Primary Math Sync Plus", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 03_diagnosis/primary/math_75_to_90.md]\n---\n\n# 小学数学同步培优班\n\n## 课程定位\n\n面向平时考试**90分以下**的小学生，侧重**夯实基础，巩固课本知识**。\n\n## 适合对象\n\n- 课本知识点掌握不牢固，考试中基础题频繁丢分\n- 对数学学习兴趣不高，需要通过方法引导激发积极性\n- 需要在课内知识上做强化训练\n\n## 班型\n\n精品小班，6-12人\n\n## 教学特点\n\n- 紧跟学校教学进度，在课本基础上做强化训练\n- 把课本重点拆得更细，用生活里的例子讲透概念\n- 练题从基础题型慢慢过渡，先让孩子\"学得会\"\n- 情景教学法+阶梯构建式教学\n\n## 课堂模式\n\n- 80%内容为课本同步强化（含学校未覆盖的变式题）\n- 20%内容为基础思维拓展\n- 每节课含实战练习环节，巩固所学\n\n## 年级覆盖\n\n一年级至六年级\n\n## 进阶路径\n\n同步培优班（< 90分）→ 稳定在90分以上后 → 同步奥数班\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 48, "size": 1229}, "02_courses__math__senior_math_tiers": {"id": "02_courses__math__senior_math_tiers", "path": "02_courses/math/senior_math_tiers.md", "name": "senior_math_tiers", "title": "Senior Math Tiers", "tags": "[stage:senior, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [05_campuses/hongdu.md]\n---\n\n# 高中数学分层班型\n\n## 班型概览\n\n| 班型 | 定位 | 适合学生 |\n|------|------|---------|\n| 数学提高班 | 基础巩固+中等题突破 | 基础不扎实，考试中等难度题丢分 |\n| 数学培优班 | 能力进阶+难题攻克 | 中上水平，冲刺高分 |\n\n## 教学特色\n\n- 延续\"考点教学法+阶梯构建式教学\"\n- 尤老师和全老师亲自执教多个班次\n- 高一至高三均有开设\n- 主要在虹都校区和霞山校区授课\n\n## 高中数学与初中英语卓越班的衔接\n\n英语卓越班（2.5年学制）的学生在初中后1年会衔接高一英语，系统学习高一词汇与语法，积累3000词汇量，目标高中英语稳定125分左右。这部分学生在高中数学上也通常有较好的思维基础。\n\n## 各年级课单价\n\n| 年级 | 6-12人班课单价 | 13-20人班课单价 |\n|------|-------------|-------------|\n| 高一 | 210元/次 | 170元/次 |\n| 高二 | 220元/次 | 180元/次 |\n| 高三 | 230元/次 | 190元/次 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 39, "size": 1230}, "02_courses__science__junior_bio_geo": {"id": "02_courses__science__junior_bio_geo", "path": "02_courses/science/junior_bio_geo.md", "name": "junior_bio_geo", "title": "Junior Bio Geo", "tags": "[stage:junior, subject:biology, subject:geography, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:biology, subject:geography, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md]\n---\n\n# 初中生物地理冲刺班\n\n## 课程定位\n\n针对初二生物地理会考/中考的**冲刺课程**，帮助学生在短时间内提升成绩。\n\n## 适合对象\n\n- 初二学生（面临生物地理会考）\n- 需要在短期内系统复习和提分\n\n## 各校区开设情况\n\n| 校区 | 科目 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 生物冲刺班 | 周日8:00-10:00 | 姚 |\n| 虹都 | 地理冲刺班 | 周日10:10-12:10 | 吴 |\n| 海东 | 生物 | 周六10:00-12:00 | 陈老师 |\n| 海东 | 地理 | 周六8:00-10:00 | 欧老师 |\n| 南油 | 生地 | 待定 | 陈老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（初二课单价190元/次）\n", "lines": 32, "size": 894}, "02_courses__science__junior_chemistry": {"id": "02_courses__science__junior_chemistry", "path": "02_courses/science/junior_chemistry.md", "name": "junior_chemistry", "title": "Junior Chemistry", "tags": "[stage:junior, subject:chemistry, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:chemistry, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md]\n---\n\n# 初中化学课程\n\n## 班型\n\n| 班型 | 定位 |\n|------|------|\n| 化学培优班 | 系统学习化学知识，提升应试能力 |\n| 化学培优班（卓越） | 拔高训练，冲刺高分 |\n\n## 教学特色\n\n- 考点教学法+阶梯构建式教学\n- 培优班和卓越班分层教学\n- 注重逻辑思维能力和微观结构想象力\n\n## 各校区开设情况\n\n| 校区 | 年级 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 初三 | 周六14:00-16:00 | 刘 |\n| 霞山 | 初三 | 周六16:30-18:30 | 刘 |\n| 南油 | 初三 | 待定 | 邹老师 |\n| 海东 | 初三 | 周日10-12 | 邹老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（初三课单价200元/次）\n", "lines": 35, "size": 892}, "02_courses__science__junior_physics": {"id": "02_courses__science__junior_physics", "path": "02_courses/science/junior_physics.md", "name": "junior_physics", "title": "Junior Physics", "tags": "[stage:junior, subject:physics, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:physics, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md]\n---\n\n# 初中物理课程\n\n## 班型概览\n\n| 班型 | 定位 | 适合学生 |\n|------|------|---------|\n| 物理培优班 | 能力提升 | 中等水平，系统提升物理能力 |\n| 物理提高班 | 拔高训练 | 较好基础，冲刺高分 |\n| 物理实验班 | 模型化突破 | 注重实验和模型构建 |\n| **物理满分实验班** | 压轴突破 | 90分以上，冲满分 |\n| 物理超前班 | 超前学习 | 提前进入下学期内容 |\n\n## 重点课程：初二物理满分实验班\n\n### 入班门槛\n90分以上\n\n### 核心定位\n压轴题突破\n\n### 四大亮点\n1. **18年百分教学经验**\n2. **小班教学名师辅导**\n3. **贴合考情直击考点**\n4. **不刷题只讲模型**\n\n### 三大硬核目标\n1. **压轴题模型化爆破** — 将复杂压轴题分解为可操作的模型组合\n2. **超前学构建完整体系** — 提前建立物理知识的完整框架\n3. **冲选拔备战名校实验班** — 为中考后进入名校重点班做准备\n\n## 各校区开设情况\n\n| 校区 | 年级 | 班型 | 时间 | 老师 |\n|------|------|------|------|------|\n| 京基 | 初二 | 物理超前班 | 周日14:00-16:00 | 王 |\n| 虹都 | 初二 | 物理实验 | 周六8:00-10:00 | 黄 |\n| 虹都 | 初三 | 物理培优 | 周六16:30-18:30 | 王 |\n| 虹都 | 初三 | 物理提高 | 周日8:00-10:00 | 林 |\n| 虹都 | 初一 | 物理实验 | 周日14:00-16:00 | 林 |\n| 霞山 | 初二 | 物理培优2班 | 周六10:00-12:00 | 谢 |\n| 霞山 | 初三 | 物理培优1班 | 周六14:00-16:00 | 王 |\n| 南油 | 初二 | 物理 | 周六4-6 | 谢老师 |\n| 海东 | 初二 | 物理 | 周六上午10-12 | 谢丹瑜 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 56, "size": 1877}, "02_courses__science__senior_chemistry": {"id": "02_courses__science__senior_chemistry", "path": "02_courses/science/senior_chemistry.md", "name": "senior_chemistry", "title": "Senior Chemistry", "tags": "[stage:senior, subject:chemistry, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:chemistry, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: []\n---\n\n# 高中化学课程\n\n## 班型\n\n化学培优班\n\n## 各校区开设情况\n\n| 校区 | 年级 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 高二 | 周日上午10:10-12:10 | 刘 |\n| 虹都 | 高一 | 周日上午8:00-10:00 | 刘 |\n| 霞山 | 高一 | 周六晚上18:30-20:30 | 刘 |\n| 霞山 | 高二 | 周日下午14:00-16:00 | 刘 |\n| 南油 | 高二 | 周日10:15-12:15 | 邹老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 27, "size": 617}, "02_courses__science__senior_physics": {"id": "02_courses__science__senior_physics", "path": "02_courses/science/senior_physics.md", "name": "senior_physics", "title": "Senior Physics", "tags": "[stage:senior, subject:physics, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:physics, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: []\n---\n\n# 高中物理课程\n\n## 班型\n\n| 班型 | 定位 |\n|------|------|\n| 物理培优 | 系统提升物理能力 |\n| 物理提高 | 拔高训练，冲刺高分 |\n\n## 各校区开设情况\n\n| 校区 | 年级 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 高二 | 周六晚上18:30-20:30 | 王 |\n| 虹都 | 高一 | 周日上午8:00-10:00 | 刘 |\n| 霞山 | 高一 | 周日早上8:00-10:00 | 王 |\n| 霞山 | 高二 | 周日上午10:00-12:00 | 王 |\n| 南油 | 高一 | 周六7-9 | 林老师 |\n| 南油 | 高二 | 待定 | 林老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 31, "size": 758}, "02_courses__special__ipa_magic_camp": {"id": "02_courses__special__ipa_magic_camp", "path": "02_courses/special/ipa_magic_camp.md", "name": "ipa_magic_camp", "title": "Ipa Magic Camp", "tags": "[stage:primary-high, subject:english, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-high, subject:english, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/special/phonics_7day_camp.md]\n---\n\n# 10天音标魔法营\n\n## 课程信息\n\n| 项目 | 详情 |\n|------|------|\n| 课程名称 | 10天音标魔法营 |\n| 适合对象 | 小学4-6年级 |\n| 核心目标 | 见词能读、听音会写 |\n| 课次 | 10天 |\n\n## 课程优势\n\n1. **科学进阶**：从零基础到自主拼读\n2. **见词能读**：80%单词无需查词典直接拼读\n3. **听音会写**：听力考试听清发音，告别\"蒙答案\"\n4. **口语自信**：发音标准，敢说敢读\n5. **背单词提速**：摆脱死记硬背，效率翻倍\n\n## 价格政策\n\n| 项目 | 价格 |\n|------|------|\n| 原价 | 1200元 |\n| 早鸟特惠 | 前30名报名 **899元/人** |\n| 团报福利 | 3人成团再减 **200元/人** |\n| 推荐福利 | 老学员推新，双方各得 **50元奖学金券**（可叠加） |\n\n## 定位\n\n寒假特色短期课程，引流+品牌展示双重作用。\n", "lines": 39, "size": 1029}, "02_courses__special__phonics_7day_camp": {"id": "02_courses__special__phonics_7day_camp", "path": "02_courses/special/phonics_7day_camp.md", "name": "phonics_7day_camp", "title": "Phonics 7Day Camp", "tags": "[stage:preschool, stage:primary-low, subject:english, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:preschool, stage:primary-low, subject:english, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/english/phonics.md, 02_courses/special/ipa_magic_camp.md]\n---\n\n# 7天英语小达人自然拼读特训营\n\n## 课程信息\n\n| 项目 | 详情 |\n|------|------|\n| 课程名称 | 英语小达人自然拼读特训营 |\n| 适合对象 | 4-8岁小朋友 |\n| 核心目标 | 7天掌握\"见词能读、听音能写\" |\n| 课次 | 7天 |\n\n## 7天课程安排\n\n| 时段 | 内容 |\n|------|------|\n| Day 1-2 | 掌握语音+绘本阅读（r/p/y/gr/b1/br/wh/有关颜色的词汇） |\n| Day 3-4 | 掌握语音+绘本阅读（f/m/n/ear/eye有关身体部位的词汇） |\n| Day 5-6 | 词汇句型+绘本阅读（b/h/t/sh/kn/s/z有关身体部位的词汇及句型） |\n| Day 7 | 复习+验收 |\n\n## 价格\n\n**7天寒假营限时特惠：499元**\n\n## 定位\n\n低门槛入门体验课，适合幼儿园到低年级零基础孩子。完成后可衔接正式的自然拼读课程体系。\n", "lines": 35, "size": 1023}, "02_courses__xiaoshengchu__elite_school_sprint": {"id": "02_courses__xiaoshengchu__elite_school_sprint", "path": "02_courses/xiaoshengchu/elite_school_sprint.md", "name": "elite_school_sprint", "title": "Elite School Sprint", "tags": "[stage:xiaoshengchu, stage:primary-high, subject:general, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:xiaoshengchu, stage:primary-high, subject:general, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [03_diagnosis/xiaoshengchu/target_school_profile.md]\n---\n\n# 小升初名校冲刺课\n\n## 课程定位\n\n百分教育**特色品牌课程**，帮助孩子在名校选拔中展现优势，冲刺名校分班考尖子班。\n\n## 目标学校\n\n| 学校 | 目标班型 |\n|------|---------|\n| 培才一中 | 火箭班 |\n| 廉江实验学校 | 精英班 |\n| 北附博雅学校 | 清北班 |\n| 麻章广东省实验学校 | 重点班 |\n\n## 考试类型\n\n这些学校通常需要通过：\n1. **入学前的密考**（或称\"素养评估\"）\n2. **入学后的分班考试**\n\n## 百分教育优势\n\n- 18年湛江办学经验，精准定位学校选拔题型难度\n- 做到定制化培养\n- 每年有大量学生在6年级加入百分教育进行小升初选拔和分班考集训\n\n## 建议时间规划\n\n| 起步时间 | 策略 |\n|---------|------|\n| **五年级**（推荐） | 提前2年，结合孩子能力情况定制针对性名校课程，从容应对 |\n| 六年级 | 集训冲刺，高强度备考 |\n\n> 对于有前瞻性的家长，我们建议从孩子5年级起开始准备。\n\n## 春季分班考特训营\n\n- 课程：18次课/科\n- 亮点：\n  1. 紧扣小升初考点，衔接初中重难点\n  2. 18次课精细化教学，稳步提升能力\n  3. 师资团队经验足，个性辅导更精准\n  4. 冲刺名校分班考，系统衔接更高效\n\n### 限时特惠\n\n| 报课方式 | 优惠 |\n|---------|------|\n| 原价 | 3969元/科（18次课） |\n| 报一科 | 立减300元 |\n| 报两科 | 立减1000元 |\n| 报三科 | 立减1680元 |\n| 前10名 | 再减100元 |\n| **最高优惠** | **减1780元** |\n\n## 收费参考\n\n→ 小升初特训营按上述特惠价格\n→ 常规课程详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 68, "size": 1870}, "03_diagnosis__junior__bio_geo_sprint": {"id": "03_diagnosis__junior__bio_geo_sprint", "path": "03_diagnosis/junior/bio_geo_sprint.md", "name": "bio_geo_sprint", "title": "Bio Geo Sprint", "tags": "[stage:junior, subject:biology, subject:geography, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:biology, subject:geography, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/science/junior_bio_geo.md]\n---\n\n# 初中画像：生物地理冲刺需求\n\n## 背景\n\n初二学生面临生物地理会考/中考，需要在短期内系统复习和提分。\n\n## 典型情况\n\n- 初二下学期，距离会考只有几个月\n- 生物地理平时关注不够，复习不系统\n- 需要短期内集中突破\n\n## 推荐方案\n\n→ `02_courses/science/junior_bio_geo.md`\n\n生物冲刺班 + 地理冲刺班，多个校区均有开设。\n\n## 家长沟通要点\n\n- 生物地理虽然不是主科，但会考成绩影响中考总分\n- 短期集中冲刺效果明显\n- 建议尽早开始，不要等到临考前一个月\n", "lines": 31, "size": 782}, "03_diagnosis__junior__english_three_tiers": {"id": "03_diagnosis__junior__english_three_tiers", "path": "03_diagnosis/junior/english_three_tiers.md", "name": "english_three_tiers", "title": "English Three Tiers", "tags": "[stage:junior, subject:english, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:english, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/junior_english_tiers.md]\n---\n\n# 初中英语画像：三层匹配\n\n## 快速匹配表\n\n| 小学英语基础 | 推荐班型 | 学制 |\n|------------|---------|------|\n| 95分+且系统学过剑桥/新概念 | 英语卓越班 | 2.5年 |\n| 补习后达95分 | 英语实验班 | 2年 |\n| 基础中等 | 英语同步培优班 | 同步 |\n\n## 详细诊断标准\n\n### 匹配卓越班的信号\n- 小学英语长期95分以上\n- 系统学习过剑桥英语或新概念英语\n- 具备扎实的语法基础和阅读能力\n- 有明确的超前学习意愿\n- 目标：中考满分+高中125分\n\n### 匹配实验班的信号\n- 小学英语成绩在补习帮助下达到95分\n- 有一定基础但不如卓越班学生扎实\n- 需要兼顾基础巩固和能力拔高\n- 目标：高中110分+\n\n### 匹配同步培优班的信号\n- 英语基础中等\n- 课内知识尚有薄弱点\n- 需要先稳住校内成绩\n- 目标：扎实掌握单元内容，提升考试成绩\n\n→ 详细课程介绍见 `02_courses/english/junior_english_tiers.md`\n", "lines": 40, "size": 1164}, "03_diagnosis__junior__math_advanced_level": {"id": "03_diagnosis__junior__math_advanced_level", "path": "03_diagnosis/junior/math_advanced_level.md", "name": "math_advanced_level", "title": "Math Advanced Level", "tags": "[stage:junior, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/junior_math_tiers.md]\n---\n\n# 初中数学画像：拔高冲刺水平\n\n## 典型特征\n\n- 课本知识扎实，中等难度题稳定不丢分\n- 对压轴题有兴趣但解题不够稳定\n- 需要从\"单知识点解题\"升级到\"多知识点综合运用\"\n- 适合冲刺满分/接近满分\n\n## 推荐方案\n\n### 推荐：数学卓越班 / 双语班\n→ `02_courses/math/junior_math_tiers.md`\n\n卓越班教学特色：\n- 知识融合教学（圆→相似→旋转→三角函数）\n- 母题模型训练\n- 压轴题模型化爆破\n- 说意训练（复述解题逻辑）\n\n### 初三特色：双语班（尤老师亲授）\n- 中英双语教学数学\n- 思维强度高，持续出成绩\n- 需要学生有主动思考的意愿\n\n## 教学工具\n\n- 《湛江中考几何高频错题模型库》\n- 相似四大模型\n- 旋转在压轴题中的应用\n- 超纲但实用的解题工具（胡不归、阿氏圆）\n\n## 家长沟通要点\n\n- 这个层级的家长关注\"能不能冲满分\"\n- 强调：我们不追求让孩子背更多题，而是训练\"拆解题目→调用模型→组合知识\"的能力\n- 这种能力对高中数学同样适用，是长期竞争力\n", "lines": 45, "size": 1288}, "03_diagnosis__junior__math_sync_level": {"id": "03_diagnosis__junior__math_sync_level", "path": "03_diagnosis/junior/math_sync_level.md", "name": "math_sync_level", "title": "Math Sync Level", "tags": "[stage:junior, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/junior_math_tiers.md]\n---\n\n# 初中数学画像：同步培优水平\n\n## 典型特征\n\n- 课本知识基本掌握，但做题速度和准确率不稳定\n- 中等难度题有时能做对有时做不对\n- 对较复杂的综合题束手无策\n- 学习方法偏记忆型，缺乏系统的解题策略\n\n## 推荐方案\n\n### 推荐：数学培优班\n→ `02_courses/math/junior_math_tiers.md`\n\n- 培优班在课本基础上做能力提升\n- 注重变式题训练和解题策略\n- 逐步建立知识框架和模型思维\n\n### 如果基础确实薄弱\n→ 数学提高班或一对一\n\n## 预期目标\n\n通过1-2个学期的系统训练，实现：\n- 中等难度题稳定不丢分\n- 建立基本的解题策略和模型意识\n- 逐步具备挑战较难题目的能力\n", "lines": 35, "size": 897}, "03_diagnosis__junior__physics_entry": {"id": "03_diagnosis__junior__physics_entry", "path": "03_diagnosis/junior/physics_entry.md", "name": "physics_entry", "title": "Physics Entry", "tags": "[stage:junior, subject:physics, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:physics, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/science/junior_physics.md]\n---\n\n# 初中物理画像：初二起步\n\n## 背景\n\n初二开始学习物理，是一个全新科目。学生可能面临：\n- 从文字理解转向物理模型理解的思维转换\n- 实验操作和分析能力尚待建立\n- 不确定自己是否适合理科\n\n## 分层匹配\n\n| 物理成绩 | 推荐班型 | 定位 |\n|---------|---------|------|\n| < 80分 | 物理培优班 | 基础巩固+系统提升 |\n| 80-89分 | 物理提高班/实验班 | 能力拔高 |\n| ≥ 90分 | 满分实验班 | 压轴突破，冲满分 |\n\n## 满分实验班特别说明\n\n入班门槛：90分以上\n\n三大硬核目标：\n1. 压轴题模型化爆破\n2. 超前学构建完整体系\n3. 冲选拔备战名校实验班\n\n特色：不刷题只讲模型，18年教学经验，小班名师辅导\n\n→ 详见 `02_courses/science/junior_physics.md`\n", "lines": 37, "size": 984}, "03_diagnosis__primary__chinese_writing_weak": {"id": "03_diagnosis__primary__chinese_writing_weak", "path": "03_diagnosis/primary/chinese_writing_weak.md", "name": "chinese_writing_weak", "title": "Chinese Writing Weak", "tags": "[stage:primary-low, stage:primary-high, subject:chinese, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:chinese, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/chinese/picture_talking.md, 02_courses/chinese/reading_writing.md]\n---\n\n# 小学语文画像：写作薄弱\n\n## 典型特征\n\n### 1-2年级\n- 看图写话没逻辑，胡乱写\n- 语句表达不清楚，没思路\n- 看图写话干巴巴，没文采\n- 常用方法不生动，得分低\n- 对写作有抗拒心理\n\n### 3-6年级\n- 阅读量不足，词汇积累少\n- 作文结构松散，没有条理\n- 不会用修辞手法和好词好句\n- 审题不准，偏题跑题\n- 总是写\"流水账\"\n\n## 推荐方案\n\n### 1-2年级：看图说话/看图写话\n→ `02_courses/chinese/picture_talking.md`\n\n四大教学重点：\n1. 看图技巧全面讲解\n2. 思维导图思路引导\n3. 看图写作习惯养成\n4. 优美词句日积月累\n\n### 2年级及以上：阅读与写作\n→ `02_courses/chinese/reading_writing.md`\n\n- \"以读促写，读写共生\"\n- 每月3次阅读+1次写作\n- 从大量阅读中提升理解和分析能力\n- 再逐步转化为写作技巧\n\n## 家长沟通要点\n\n- \"阅读是学好语文的关键第一步\"\n- 写作能力不是突击提升的，需要大量阅读积累\n- 阅读能力影响所有学科（展示9学科阅读价值表）\n- 先培养兴趣，再提升技巧\n", "lines": 51, "size": 1351}, "03_diagnosis__primary__english_early_start": {"id": "03_diagnosis__primary__english_early_start", "path": "03_diagnosis/primary/english_early_start.md", "name": "english_early_start", "title": "English Early Start", "tags": "[stage:preschool, stage:primary-low, subject:english, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:preschool, stage:primary-low, subject:english, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/phonics.md, 02_courses/english/cambridge_bridge.md]\n---\n\n# 小学英语画像：早启蒙（4-5岁起步）\n\n## 典型特征\n\n- 家长有意识在4-5岁开始英语启蒙\n- 可能接触过一些英语儿歌、动画，但不系统\n- 需要建立从\"听\"到\"读\"到\"写\"的系统路径\n- 家长通常对英语教育比较重视，期望值高\n\n## 推荐方案\n\n### 完整进阶路径\n\n```\n自然拼读1阶（20次课）\n    ↓\n自然拼读2阶（15次课）\n    ↓\n自然拼读3阶（15次课）\n    ↓\n剑桥英语1阶（约1年）\n    ↓\n剑桥英语2阶（约1年）\n    ↓\n剑桥英语3阶（约1年）→ 三年级下/四年级参加KET考级\n    ↓\n初中英语卓越班（2.5年学制）→ 中考接近满分 + 高中衔接\n```\n\n### 首选：自然拼读+绘本阅读\n→ `02_courses/english/phonics.md`\n\n使用教材：Oxford Phonics World（牛津自然拼读世界）\n\n核心目标：\n- 母语式正发音\n- 见词能读\n- 听音能写\n\n## 家长沟通要点\n\n- 这类家长通常教育意识强，愿意投入\n- 重点介绍完整的进阶路径，展示长期规划的清晰性\n- 强调\"这套进阶体系科学且符合语言学习规律\"\n- KET考级是一个有说服力的里程碑目标\n- 展示从自然拼读到初中英语卓越班的完整闭环\n\n## 家长配合建议\n\n- 在家营造英语环境（英语儿歌、绘本共读）\n- 配合课后的拼读练习\n- 不要急于要求孩子\"说完整句子\"，先培养语感\n", "lines": 60, "size": 1613}, "03_diagnosis__primary__english_zero_start": {"id": "03_diagnosis__primary__english_zero_start", "path": "03_diagnosis/primary/english_zero_start.md", "name": "english_zero_start", "title": "English Zero Start", "tags": "[stage:primary-low, stage:primary-high, subject:english, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:english, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/primary_english_sync_plus.md, 02_courses/english/phonics.md]\n---\n\n# 小学英语画像：零基础/启蒙晚\n\n## 典型特征\n\n### 情况A：三年级才开始学英语\n- 学校三年级开始教英语，此前无任何英语基础\n- 字母认识但发音不准\n- 听力辨音能力弱\n- 需要从课本同步培优开始\n\n### 情况B：错过启蒙窗口期\n- 已上三年级以上但英语启蒙晚\n- 学校课本内容跟不上\n- 单元测试成绩不理想\n- 对英语学习缺乏兴趣和信心\n\n## 推荐方案\n\n### 情况A推荐：课本同步培优\n→ `02_courses/english/primary_english_sync_plus.md`\n\n- 以课本同步培优为主\n- 巩固课内知识的同时注重提升兴趣\n- 在轻松氛围中逐步提升英语能力\n- 快速提升单元测试成绩以建立自信\n\n### 情况B推荐：视情况选择\n\n如果年龄还在4-8岁范围内且时间允许：\n→ `02_courses/english/phonics.md`（自然拼读从头开始）\n\n如果已经三年级以上：\n→ `02_courses/english/primary_english_sync_plus.md`（先把课内搞定）\n\n## 家长沟通要点\n\n- 不说\"孩子英语太差\"或\"起步太晚了\"\n- 要说\"从实际学情出发的补强方式，能切实帮助孩子攻克薄弱点\"\n- 强调\"兴趣是最好的老师\"，同步培优的目标不只是成绩，更是让孩子不怕英语\n- 给家长信心：很多同类学员通过系统学习都实现了逆袭\n", "lines": 48, "size": 1555}, "03_diagnosis__primary__math_75_to_90": {"id": "03_diagnosis__primary__math_75_to_90", "path": "03_diagnosis/primary/math_75_to_90.md", "name": "math_75_to_90", "title": "Math 75 To 90", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/primary_math_sync_plus.md]\n---\n\n# 小学数学画像：75-90分\n\n## 典型特征\n\n- 基础知识大致掌握，但部分知识点不够扎实\n- 基础题能做对，但稍有变化的题目容易出错\n- 计算能力尚可，偶有失误\n- 思维灵活度不够，遇到新题型容易卡住\n- 有一定学习意愿，但方法不够高效\n\n## 常见错误归因\n\n| 错误类型 | 表现 | 比例（典型） |\n|---------|------|------------|\n| 概念性错误 | 部分概念理解不透彻 | 25% |\n| 计算性错误 | 偶发运算失误 | 25% |\n| 审题性错误 | 忽略隐含条件 | 25% |\n| 方法性错误 | 缺乏解题策略 | 25% |\n\n## 思维层次评估\n\n处于**理解→应用**过渡阶段，需要在应用层级加强训练。\n\n## 推荐方案\n\n### 首选：同步培优班（6-12人精品小班）\n→ `02_courses/math/primary_math_sync_plus.md`\n\n**理由**：\n- 紧跟学校进度，强化课本知识\n- 用生活例子讲透概念\n- 从基础题型慢慢过渡，先\"学得会\"\n- 在水平相近的同伴中学习，不会自卑也不会松懈\n\n### 目标路径\n```\n同步培优班 → 稳定在90分以上 → 过渡到同步奥数班\n```\n\n### 预期周期\n根据同类学员数据，一般1个学期可见明显提升。\n\n## 家长沟通要点\n\n- 这个分数段的家长通常焦虑\"为什么努力了成绩上不去\"\n- 解释：不是努力不够，是方法需要调整，需要把知识点真正\"吃透\"\n- 强调同步培优班的\"量体裁衣\"——老师能关注到每个孩子的卡点\n\n## 家长配合建议\n\n- 配合老师的错题复盘要求\n- 不要给孩子额外加刷大量习题，重质不重量\n- 鼓励孩子上课时敢于提问和发言\n", "lines": 61, "size": 1840}, "03_diagnosis__primary__math_90_to_95": {"id": "03_diagnosis__primary__math_90_to_95", "path": "03_diagnosis/primary/math_90_to_95.md", "name": "math_90_to_95", "title": "Math 90 To 95", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/primary_math_sync_olympiad.md]\n---\n\n# 小学数学画像：90-95分\n\n## 典型特征\n\n- 课本知识掌握扎实，基础题基本不丢分\n- 灵活解题能力差点火候，遇到变式题偶有卡壳\n- 有一定的数学思维基础，但举一反三能力待提升\n- 学习态度认真，但思维模式偏\"套路化\"\n- 在学校班级中属于中上水平\n\n## 关键瓶颈\n\n- 从\"做对常规题\"到\"灵活解变式题\"的跨越\n- 从\"记住方法\"到\"理解方法背后的逻辑\"\n- 思维的灵活性和迁移能力\n\n## 推荐方案\n\n### 首选：同步奥数班（6-12人精品小班）\n→ `02_courses/math/primary_math_sync_olympiad.md`\n\n**理由**：\n- 60%同步内容保持课内成绩稳定\n- 40%奥数思维训练突破灵活性\n- 多练变式题，培养举一反三的能力\n- 和水平相近的同伴竞争成长\n\n### 目标路径\n```\n同步奥数班 → 成绩稳定96分以上 → 可选纯奥数/奥数创新班\n```\n\n## 家长沟通要点\n\n- 这个分数段的家长通常想\"再往上冲一冲\"\n- 解释：90-95分到96+不是靠多刷题，而是需要思维方式的升级\n- 强调\"举一反三\"的训练价值\n- 适度管理期望：思维提升是渐进过程，短期分数可能波动\n\n## 家长配合建议\n\n- 不要过度关注每次考试的分数波动\n- 鼓励孩子遇到不会的题先思考，不要急着看答案\n- 支持孩子参加同步奥数班，接受适度挑战\n", "lines": 52, "size": 1568}, "03_diagnosis__primary__math_above_96": {"id": "03_diagnosis__primary__math_above_96", "path": "03_diagnosis/primary/math_above_96.md", "name": "math_above_96", "title": "Math Above 96", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/primary_math_olympiad.md, 02_courses/xiaoshengchu/elite_school_sprint.md]\n---\n\n# 小学数学画像：96分以上\n\n## 典型特征\n\n- 课本知识完全掌握，考试几乎不丢分\n- 有较强的数学思维基础和学习兴趣\n- 能独立思考较复杂的问题\n- 在班级中属于顶尖水平\n- 可能已经觉得学校数学\"吃不饱\"\n\n## 发展需求\n\n- 不需要再花时间巩固课本基础\n- 需要更高维度的思维挑战\n- 培养逻辑推理、抽象思维、创新思维等高阶能力\n- 为小升初名校选拔做准备\n\n## 推荐方案\n\n### 首选：纯奥数 / 奥数创新班\n→ `02_courses/math/primary_math_olympiad.md`\n\n**理由**：\n- 脱离课本体系，深度拓展奥数知识\n- 趣味思维挑战激发学习热情\n- 同伴间思维碰撞，越学越有动力\n- 为竞赛和名校选拔打基础\n\n### 如有名校目标\n→ 同时推荐 `02_courses/xiaoshengchu/elite_school_sprint.md`\n\n建议五年级起开始定制名校课程，提前2年准备。\n\n### 能力培养重点\n1. **逻辑推理能力** — 因果推导\n2. **数学应变能力** — 一通百通，举一反三\n3. **实际应用能力** — 用思维解决真实问题\n4. **抽象思维能力** — 无缝衔接初中代数几何\n\n## 家长沟通要点\n\n- 这个分数段的家长通常关注\"怎么保持优势\"或\"怎么冲名校\"\n- 强调：分数已经不是问题，关键是思维能力的持续提升\n- 思维能力才是应对中高考压轴题和未来学习的核心竞争力\n- 介绍小升初名校冲刺课的优势（18年经验、精准定位题型）\n", "lines": 53, "size": 1729}, "03_diagnosis__primary__math_below_75": {"id": "03_diagnosis__primary__math_below_75", "path": "03_diagnosis/primary/math_below_75.md", "name": "math_below_75", "title": "Math Below 75", "tags": "[stage:primary-low, stage:primary-high, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/math_one_on_one.md, 04_scripts/objection_child_weak.md]\n---\n\n# 小学数学画像：75分以下\n\n## 典型特征\n\n- 课本基础知识点有多处漏洞\n- 计算能力弱，频繁出现计算错误\n- 审题能力不足，题目读不懂或理解偏差\n- 听课专注力不够，跟不上班级节奏\n- 可能存在畏难情绪，对数学缺乏信心\n- 学习习惯尚未建立（不记笔记、不复习、不整理错题）\n\n## 常见错误归因\n\n| 错误类型 | 表现 | 比例（典型） |\n|---------|------|------------|\n| 概念性错误 | 基础概念理解不清 | 40% |\n| 计算性错误 | 运算失误、进退位错误 | 30% |\n| 审题性错误 | 漏看条件、理解偏差 | 20% |\n| 方法性错误 | 用错方法或无方法 | 10% |\n\n## 思维层次评估（布鲁姆分类）\n\n主要停留在**记忆→理解**层级，尚未达到**应用**层级。\n\n## 推荐方案\n\n### 首选：名师一对一\n→ `02_courses/math/math_one_on_one.md`\n\n**理由**：\n- 一对一模式能让老师深入了解孩子的兴趣爱好、知识薄弱点及学习能力短板\n- 量身定制学习方案\n- 在小班中可能跟不上，反而打击信心\n\n### 三大核心价值\n1. 提升学习力（计算、理解、记忆、专注力）\n2. 改善学习状态（引导鼓励、激发积极性）\n3. 优化学习心理+亲子关系\n\n### 目标路径\n```\n一对一补强 → 成绩提升到75-90分 → 转入同步培优小班（6-12人）\n```\n\n### 预期周期\n根据同类学员数据，一般3-6个月可见明显改善。\n\n## 家长沟通要点\n\n- **不说**：\"孩子基础太差\"\n- **要说**：\"目前有几个关键知识漏洞需要补，通过一对一的针对性辅导可以精准解决\"\n- 先理解家长的焦虑，再给方案\n- 强调\"个性化的辅导方式能更精准满足孩子需求，为后续学习进步打下良好基础\"\n\n## 家长配合建议\n\n- 不要在家批评孩子数学差，避免强化畏难情绪\n- 配合老师要求的课后复习\n- 关注孩子的学习状态变化而非单纯看分数\n- 给予鼓励，肯定每一个小进步\n", "lines": 68, "size": 2232}, "03_diagnosis__senior__subject_weakness": {"id": "03_diagnosis__senior__subject_weakness", "path": "03_diagnosis/senior/subject_weakness.md", "name": "subject_weakness", "title": "Subject Weakness", "tags": "[stage:senior, subject:general, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:senior, subject:general, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/senior_math_tiers.md, 02_courses/science/senior_physics.md, 02_courses/science/senior_chemistry.md]\n---\n\n# 高中画像：学科薄弱\n\n## 高中阶段特点\n\n- 知识量和难度陡增\n- 对思维能力要求更高\n- 时间更紧张，需要高效学习\n\n## 可选课程\n\n| 科目 | 班型 | 主要校区 |\n|------|------|---------|\n| 数学 | 培优班/提高班 | 虹都、霞山、南油 |\n| 物理 | 培优班/提高班 | 虹都、霞山、南油 |\n| 化学 | 培优班 | 虹都、霞山、南油 |\n| 英语 | 培优班 | 虹都、霞山、南油 |\n\n## 高中课程主要在虹都校区和霞山校区\n\n小学课程安排京基/盛和园校区，**初高中安排在虹都大厦**，家长选择校区时需注意。\n\n## 从初中英语卓越班过渡的学生\n\n- 已在初中阶段完成高一词汇与语法积累\n- 3000词汇量基础\n- 高中英语目标稳定125分\n- 这部分学生在高中阶段英语学习较为轻松\n\n## 收费参考\n\n高一210/次、高二220/次、高三230/次（6-12人班课单价）\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 41, "size": 1214}, "03_diagnosis__xiaoshengchu__target_school_profile": {"id": "03_diagnosis__xiaoshengchu__target_school_profile", "path": "03_diagnosis/xiaoshengchu/target_school_profile.md", "name": "target_school_profile", "title": "Target School Profile", "tags": "[stage:xiaoshengchu, subject:general, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:xiaoshengchu, subject:general, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/xiaoshengchu/elite_school_sprint.md]\n---\n\n# 小升初画像：按目标校分\n\n## 目标校及班型\n\n| 学校 | 目标班型 | 选拔特点 |\n|------|---------|---------|\n| 培才一中 | 火箭班 | 入学密考+分班考 |\n| 廉江实验学校 | 精英班 | 入学密考+分班考 |\n| 北附博雅学校 | 清北班 | 入学密考+分班考 |\n| 广东省实验学校（麻章） | 重点班 | 入学密考+分班考 |\n\n## 考试类型说明\n\n1. **密考**（素养评估）：入学前学校组织的非公开选拔考试\n2. **分班考**：入学后学校组织的考试，决定进入哪个层级的班级\n\n## 百分教育定位学校选拔题型的能力\n\n- 18年湛江本地办学经验\n- 熟悉各名校的出题风格和难度\n- 每年大量学生在百分进行小升初集训\n- 做到定制化培养\n\n## 建议时间线\n\n| 时间点 | 建议 |\n|--------|------|\n| 五年级上 | 评估孩子当前水平，制定目标校策略 |\n| 五年级下 | 开始系统的名校课程，强化薄弱环节 |\n| 六年级上 | 高强度冲刺训练，模拟考练习 |\n| 六年级下 | 临考集训，针对目标校题型精练 |\n\n## 诊断要点\n\n当家长提到\"想上培才/廉实/北附/省实验\"时：\n1. 先了解孩子当前成绩水平\n2. 评估距离目标的差距\n3. 根据时间（五年级还是六年级）推荐相应的准备方案\n4. 强调\"提前2年准备\"的优势\n\n→ 课程详情见 `02_courses/xiaoshengchu/elite_school_sprint.md`\n", "lines": 49, "size": 1597}, "04_scripts__after_trial_followup": {"id": "04_scripts__after_trial_followup", "path": "04_scripts/after_trial_followup.md", "name": "after_trial_followup", "title": "After Trial Followup", "tags": "[scene:trial, scene:conversion, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:trial, scene:conversion, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [04_scripts/trial_invitation.md, 06_ops/conversion_funnel.md]\n---\n\n# 试听后跟进话术\n\n## 试听当天（课后10分钟）\n\n### 向家长反馈\n\n> \"XX在今天的课上表现还不错，我注意到他/她在XX方面很有潜力。不过XX部分可能需要加强一下，老师也跟我提到了这个情况。我整理一下老师的反馈，一会儿发给您。\"\n\n### 向家长收集反馈\n\n> \"您觉得今天这个课的节奏和内容怎么样？孩子回来有跟您说什么感受吗？\"\n\n## Day 0：感谢+报告\n\n> \"XX妈妈，感谢今天带孩子来体验。这是今天课上老师对XX的观察反馈，附带了一些学习建议。您看看有什么问题随时问我。\"\n\n附送内容：\n- 教师对孩子的课堂表现观察\n- 初步的学情分析\n- 1-2条具体学习建议\n\n## Day 1：学习建议\n\n> \"XX妈妈，我根据昨天的情况，帮您整理了一份XX科目的学习小建议，不管是不是在百分上课都用得上。希望对孩子有帮助。\"\n\n## Day 3：电话回访\n\n> \"XX妈妈，上次试听后孩子有什么反馈吗？我们想了解一下您的想法，看看有没有什么可以帮到您的。\"\n\n## Day 7：案例分享\n\n> \"XX妈妈，跟您分享一个跟XX情况比较像的学员案例。这个孩子之前也是XX情况，在百分学了X个月后，数学从XX分提到XX分。他妈妈说最大的变化是孩子开始主动做题了。\"\n\n## Day 14：最后联系\n\n> \"XX妈妈，之前我们聊的课程方案，如果您觉得合适的话，随时可以联系我。我们也不急，最重要的是找到适合孩子的。如果有任何学习方面的问题，随时问我就好。\"\n\n## 之后\n\n**停止主动跟进，转内容营销。**\n\n朋友圈/群内容营销：教学干货、学员进步案例、思维小技巧等。\n\n## 禁忌\n\n- 不超过3次主动跟进\n- 不催促成交\n- 不说\"名额快满了\"\n- 每次联系都要提供价值，不是纯销售\n", "lines": 57, "size": 2064}, "04_scripts__exit_gracefully": {"id": "04_scripts__exit_gracefully", "path": "04_scripts/exit_gracefully.md", "name": "exit_gracefully", "title": "Exit Gracefully", "tags": "[scene:churn, role:consultant, role:xueguan, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:churn, role:consultant, role:xueguan, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/renewal_sop.md]\n---\n\n# 体面退费/结业话术\n\n## 核心原则\n\n**即使学生要走，也要体面结业，输出价值。口碑 > 一时成交。**\n\n## 接受决定\n\n> \"我理解您的决定。每个家庭的情况不同，我们尊重您的选择。\"\n\n**绝对不要做的事**：\n- 不要追问\"为什么不学了\"（除非家长主动说）\n- 不要表现出不高兴\n- 不要说\"走了就没优惠了\"\n- 不要用\"挽留话术\"让家长为难\n\n## 整理成长手册\n\n> \"虽然孩子不在百分继续了，但这段时间的学习成果是实实在在的。我帮孩子整理了一份成长手册，里面有他/她这段时间的进步数据、老师的评价和后续学习建议。您保存好，不管在哪学习都用得上。\"\n\n成长手册内容：\n- 入学时 vs 当前的成绩数据对比\n- 能力变化记录（思维力、专注力等）\n- 高光时刻截图/描述\n- 教师寄语\n- 后续学习建议（不受限于百分课程）\n\n## 结业会谈\n\n> \"XX在百分的这段时间表现很好，特别是在XX方面的进步让老师印象深刻。老师想跟您说，孩子的潜力很大，接下来不管在哪学习，都要注意XX方面的持续训练。\"\n\n## 后续保持联系\n\n> \"如果以后学习上有什么问题，随时可以联系我，不管是不是百分的学员，我们都愿意帮忙。祝孩子学业进步。\"\n\n## 退费流程\n\n按机构退费政策执行，具体见 `08_rules/pricing_policy_boundary.md`。\n", "lines": 46, "size": 1597}, "04_scripts__explain_class_placement": {"id": "04_scripts__explain_class_placement", "path": "04_scripts/explain_class_placement.md", "name": "explain_class_placement", "title": "Explain Class Placement", "tags": "[scene:first-contact, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:first-contact, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [07_faq/faq_class_type.md]\n---\n\n# 解释话术：分层分班制度\n\n## 使用场景\n\n家长问\"你们怎么分班的？我孩子分到哪个班？\"\n\n## 核心话术（完整版）\n\n> \"各位家长，咱们百分的小班制分层教学，说白了就是给孩子找'对的同伴'、上'合的课程'——让每个孩子都能学得明白、练得带劲。\n>\n> 怎么分？我们不只看分数，更看孩子的知识基础和思维特点：比如有的孩子课本概念掌握扎实，但灵活解题差点火候；有的孩子基础稍弱，但逻辑思维挺敏锐。我们会把知识储备、思维节奏相近的孩子分到一个班（每班6-12人），老师能清清楚楚记住每个孩子的'卡点'和'潜力'。\n>\n> 课堂上更是'量体裁衣'：基础稍弱的班，老师会把课本重点拆得更细，用生活里的例子讲透概念，比如用买文具的场景讲小数计算，练题也从基础题型慢慢过渡，先让孩子'学得会'；中等水平的班，在课本基础上多练'变式题'，比如一道应用题换个问法怎么解，重点帮孩子练'举一反三'的思维，确保'吃得饱'；学有余力的班，就拓展更灵活的解题思路，甚至加入趣味思维挑战，比如用图形拼贴理解几何原理，让孩子在和同伴的思维碰撞里找到成就感，越学越有动力。\n>\n> 您想，10个左右水平相近的孩子一起学，没人会因为跟不上而自卑，也没人会因为太简单而松懈。老师的目光能扫到每个孩子，谁卡壳了马上点拨，谁进步了及时鼓励。这就像给孩子量身定做的学习圈：同伴节奏合得来，老师精力顾得上，内容难度刚刚好——所以孩子在这儿学，不仅进步看得见，还越来越爱举手、敢提问，这就是分层小班的魔力。\"\n\n## 精简版（30秒）\n\n> \"我们按孩子的知识基础和思维特点分班，每班6-12人。水平相近的孩子在一起，老师讲的内容难度刚刚好——不会跟不上，也不会太无聊。老师能关注到每个人。\"\n\n## 小学数学分层标准（参考）\n\n| 成绩 | 推荐班型 |\n|------|---------|\n| < 75分 | 先一对一，再进班 |\n| 75-90分 | 同步培优班 |\n| 90-95分 | 同步奥数班 |\n| ≥ 96分 | 纯奥数/奥数创新班 |\n", "lines": 36, "size": 2415}, "04_scripts__explain_course_intensity": {"id": "04_scripts__explain_course_intensity", "path": "04_scripts/explain_course_intensity.md", "name": "explain_course_intensity", "title": "Explain Course Intensity", "tags": "[scene:first-contact, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:first-contact, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/teaching_philosophy.md]\n---\n\n# 解释话术：课程强度和效率\n\n## 使用场景\n\n家长问\"你们的课跟学校有什么区别？效果怎么样？\"\n\n## 核心话术\n\n> \"咱们百分的课，孩子学起来效率特别高——比如上课内容，80%都是孩子平时没接触过的'拔高知识点'，每节课都得动脑子跟着走，一节顶学校3-7天的内容量，孩子不会觉得课太简单'吃不饱'。\n>\n> 而且不只是教知识点，更注重教孩子'怎么学'：帮孩子把零散的知识串成框架，还要求记笔记、课后反复回看巩固，慢慢让孩子自己会思考、会主动学。哪怕课上某个点没立刻懂也没关系，重点是让孩子先理清知识脉络，慢慢吃透，不是死记硬背。\"\n\n## 如果家长担心\"强度太大孩子跟不上\"\n\n> \"刚开始可能会有适应期，这很正常。我们不会为了让孩子'舒服'就降低教学要求——那样反而是浪费时间和钱。但我们会在过程中给孩子足够的引导和鼓励。大多数孩子1-2个月就能适应这个节奏，然后就会越学越有感觉。\"\n", "lines": 23, "size": 1244}, "04_scripts__explain_thinking_training": {"id": "04_scripts__explain_thinking_training", "path": "04_scripts/explain_thinking_training.md", "name": "explain_thinking_training", "title": "Explain Thinking Training", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/teaching_philosophy.md, 07_faq/faq_teaching_philosophy.md]\n---\n\n# 解释话术：什么是\"思维训练\"\n\n## 使用场景\n\n家长问\"你们的思维训练是什么意思？跟别的培训班有什么不同？\"\n\n## 核心话术\n\n> \"简单说，普通补习班教的是'这道题怎么做'，我们教的是'这类题怎么想'。\"\n\n> \"比如初三的数学，我们会把'相似''旋转''三角函数'串联起来，让孩子看到一道压轴题背后可能同时用到多个知识点的模型。这种训练不是让孩子背题，而是让他们学会'拆解题目→调用模型→组合知识'，这才是应对复杂题型的核心能力。\"\n\n## 具象化解释\n\n> \"您可以这样理解：如果知识是积木块，学校教的是一块一块认识积木。我们做的是教孩子怎么把积木组合起来搭出不同的东西。积木还是那些积木，但会搭了，什么题都不怕。\"\n\n## 预期管理\n\n> \"不过我要提前跟您说，思维训练不是速效药。短期课程可能让新学员觉得有挑战，因为我们更注重'思维强度'而非'知识量堆砌'。但坚持1-2年系统训练后，孩子会明显感受到审题速度、解题灵活性的提升。这种能力是受用终身的。\"\n\n## 信任建立\n\n> \"我们的教学节奏是为了保护学员的思维成长效率，新学员需要先放下'坐等投喂'的习惯，跟着老师的思维引导主动思考。家长和孩子的信任与执行，是实现思维突破的关键。\"\n", "lines": 31, "size": 1611}, "04_scripts__first_contact": {"id": "04_scripts__first_contact", "path": "04_scripts/first_contact.md", "name": "first_contact", "title": "First Contact", "tags": "[scene:first-contact, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:first-contact, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/consultation_sop.md, 03_diagnosis/]\n---\n\n# 首次接触话术\n\n## 核心原则\n\n**建立信任，不急推课。**\n\n首次咨询的目标不是成交，而是让家长感受到我们的专业度和真诚。\n\n## 标准咨询流程（60分钟）\n\n| 阶段 | 时长 | 内容 |\n|------|------|------|\n| 倾听 | 10min | 了解孩子情况、家长诉求、教育经历 |\n| 诊断展示 | 15min | 展示我们的分析能力（如试卷分析） |\n| 方案讲解 | 20min | 针对性推荐课程和学习规划 |\n| 答疑 | 10min | 回答家长疑问 |\n| 收尾 | 5min | 总结要点，不强推成交 |\n\n## 开场话术\n\n> \"您好，感谢您对百分教育的信任。我先了解一下孩子的情况，这样我能给您更有针对性的建议。能跟我说说孩子现在的学习状态吗？比如哪些科目比较好，哪些觉得有挑战？\"\n\n## 倾听阶段要点\n\n- 让家长多说，自己少说\n- 记录关键信息：年级、科目、成绩、学校、目标校（如有）\n- 关注家长的情绪和焦虑点\n- 不要急于打断或给建议\n\n## 诊断展示阶段\n\n- 如果家长带了试卷：做即场分析（逐题归因）\n- 如果没带试卷：根据家长描述初步判断画像（→ 03_diagnosis/）\n- 展示专业度：\"根据您描述的情况，孩子可能在XX方面需要加强...\"\n\n## 方案讲解话术\n\n> \"根据孩子目前的情况，我建议这样规划……\"\n\n→ 根据 `02_courses/course_selector.md` 路由表匹配推荐\n\n## 收尾话术\n\n> \"今天先聊到这，我回头整理一份分析报告发给您。您回去跟孩子和家人商量一下，有任何问题随时联系我。我们不急，最重要的是找到适合孩子的方案。\"\n\n## 跟进节奏\n\n| 时间 | 动作 |\n|------|------|\n| Day 0 | 感谢微信+分析报告 |\n| Day 1 | 学习建议 |\n| Day 3 | 电话回访 |\n| Day 7 | 案例分享 |\n| Day 14 | 最后联系 |\n| 之后 | 停止主动跟进，转内容营销 |\n\n**不超过3次主动跟进。**\n\n## 禁忌\n\n- 不说\"赶紧报名，名额有限\"\n- 不做低价引流承诺\n- 不贬低其他机构\n- 不承诺具体提分数字\n", "lines": 72, "size": 2233}, "04_scripts__objection_child_not_interested": {"id": "04_scripts__objection_child_not_interested", "path": "04_scripts/objection_child_not_interested.md", "name": "objection_child_not_interested", "title": "Objection Child Not Interested", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/home_school_collaboration.md]\n---\n\n# 异议处理：孩子不想上/抗拒补习\n\n## 核心策略\n\n\"家长沟通先于学生沟通\"——先帮家长理解孩子抗拒的原因，再给解决方案。\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"孩子不想来上课，这个情况其实挺常见的。您先别着急，孩子的抗拒通常不是因为'不想学'，而是之前的学习体验让他觉得'学也没用'或者'学起来太痛苦'。\"\n\n### 2. 分析（40%）\n\n> \"孩子抗拒上课通常有几个原因：\n> - 之前在学校或其他机构的学习体验不好，产生了畏难情绪\n> - 觉得上课就是重复学校的内容，无聊\n> - 自己也想学好但不知道方法，久了就放弃了\n> - 周末想玩，觉得上课占用了休息时间\"\n\n> \"我们百分的课跟学校不一样——80%是孩子没接触过的内容，课堂氛围是趣味、互动的，不是坐着听讲。很多孩子来了之后反而觉得有意思，因为他发现自己能解出之前不会的题，这种成就感是最好的动力。\"\n\n### 3. 行动（30%）\n\n> \"我建议先带孩子来试听一节课，不要跟孩子说'去补课'，就说'去体验一下，看看有没有意思'。降低孩子的心理防线。如果试听后孩子觉得可以，我们再谈报名。如果孩子确实不喜欢，我们也不勉强。\"\n\n## 如果家长说\"孩子脾气大，说什么都不听\"\n\n> \"这种情况我们也遇到过不少。有时候不是孩子不听话，是孩子和家长之间的沟通模式需要调整。我们的一对一辅导有一个重要价值就是优化亲子关系——老师在教学过程中也会给到亲子沟通方面的建议。有的家长说学了之后不只是成绩好了，跟孩子的关系也改善了。\"\n\n## 禁忌\n\n- 不要站在家长角度批评孩子\n- 不要说\"不学以后就完了\"之类的焦虑话术\n- 不要强迫或催促\n", "lines": 43, "size": 2022}, "04_scripts__objection_child_weak": {"id": "04_scripts__objection_child_weak", "path": "04_scripts/objection_child_weak.md", "name": "objection_child_weak", "title": "Objection Child Weak", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [03_diagnosis/primary/math_below_75.md, 02_courses/math/math_one_on_one.md]\n---\n\n# 异议处理：孩子基础差/跟不上\n\n## 核心策略\n\n不否定孩子，重新定义问题，给出可落地的方案。\n\n## 禁忌用语\n\n- **绝对不说**：\"孩子基础太差\"\n- **替代说法**：\"目前有几个关键知识漏洞需要补\"\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"您的担心很正常，其实很多家长第一次来都有这个顾虑。基础不够扎实不是孩子的问题，可能是之前的学习方法没找对，或者某几个关键知识点没有吃透。\"\n\n### 2. 证据（40%）\n\n> \"我们专门为这种情况设计了一对一辅导模式。老师会先摸底孩子具体的薄弱点在哪里，然后针对性地一个一个补。不是大锅饭，是精准辅导。\"\n\n> \"一对一的好处是三方面：第一，提升学习力——把计算、理解、专注力这些基本功练起来；第二，改善学习状态——很多孩子不是学不会，是不想学，一对一的鼓励和引导能激活他的积极性；第三，优化心理——孩子建立了信心，在家和家长的关系也会更好。\"\n\n### 3. 行动（30%）\n\n> \"我建议先用一对一把基础补上来，一般3-6个月就能看到明显变化。等孩子成绩稳定在一定水平后，就可以转到小班，跟同水平的孩子一起学，互相促进。这是一个很成熟的路径。\"\n\n## 如果家长担心一对一太贵\n\n> \"一对一确实是单次价格高一些，但效率也高——同样的问题，在小班里可能需要10节课才能解决，一对一可能3-5节课就补上了。而且我们有课次赠送：15次送1次、30次送3次。\"\n\n## 如果家长问\"多久能见效\"\n\n> \"根据同类学员的数据，一般3-6个月可以看到明显改善。但每个孩子情况不同，我们不会给您承诺具体提多少分，因为这不诚实。我们会做的是：每个阶段给您反馈孩子的变化——不只是分数，还有学习习惯、思维方式这些更重要的东西。\"\n", "lines": 42, "size": 2166}, "04_scripts__objection_school_enough": {"id": "04_scripts__objection_school_enough", "path": "04_scripts/objection_school_enough.md", "name": "objection_school_enough", "title": "Objection School Enough", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [01_brand/teaching_philosophy.md]\n---\n\n# 异议处理：学校老师教得够好了，不需要补\n\n## 核心策略\n\n不否定学校教育，明确我们是\"拔高与补充\"，不是替代。\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"您说得对，学校的老师确实很尽责。我们从来不觉得学校教育不好——其实学校教育是基础，非常重要。\"\n\n### 2. 差异化（40%）\n\n> \"我们的课程定位是学校教学的'拔高与补充'，不是重复课本内容。我给您举个例子：学校一个班四五十个学生，老师要照顾大多数人的节奏，有些思维拓展的内容没时间展开。我们做的就是这部分——帮孩子搭建思维架构，教他'怎么想'而不只是'怎么做'。\"\n\n> \"比如说，同样一道数学题，学校教的是标准解法。我们会带孩子分析：这道题背后的模型是什么？换个数字还会不会做？换个问法呢？这种训练不是学校能覆盖的，但对中高考压轴题特别关键。\"\n\n> \"而且我们每节课80%是孩子在学校没接触过的内容，不会觉得重复。\"\n\n### 3. 行动（30%）\n\n> \"建议您带孩子来体验一节课，让孩子自己感受一下跟学校的区别。如果孩子觉得确实学到新东西了，再考虑也不迟。\"\n\n## 禁忌\n\n- 绝对不说\"学校老师教不好\"\n- 不说\"学校教育有局限\"（太直接）\n- 用\"拔高与补充\"代替\"补课\"\n", "lines": 37, "size": 1543}, "04_scripts__objection_too_expensive": {"id": "04_scripts__objection_too_expensive", "path": "04_scripts/objection_too_expensive.md", "name": "objection_too_expensive", "title": "Objection Too Expensive", "tags": "[scene:objection, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:objection, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/pricing/, 04_scripts/explain_thinking_training.md]\n---\n\n# 异议处理：嫌贵\n\n## 核心策略\n\n不打价格战，用价值重构来化解价格异议。\n\n## 三段式回应\n\n### 1. 共情（30%）\n\n> \"理解您的顾虑，教育投入确实是一笔不小的开支，我们很多家长最开始也会有这个考虑。\"\n\n### 2. 证据（40%）\n\n> \"您看，我们6-12人的小班，老师能清楚记住每个孩子的卡点，一节课80%是拔高内容，一节顶学校3-7天的内容量。同样是2小时，孩子获得的东西是不一样的。\"\n\n> \"我们每个孩子都有一套专属的学习方案，不是大锅饭教学。这也是为什么我们的班额控制在6-12人。\"\n\n可补充的价值对比：\n- 18年办学经验，专职教师（不是兼职大学生）\n- 自主教研团队，本地化12000+真题积累\n- 不只教知识，更教思维方法——这是孩子受用终身的能力\n\n### 3. 行动（30%）\n\n> \"其实我们有不同的卡型可以选择。比如领航卡是最划算的，60次课只要XX元/次。如果想先试试，也可以先报启航卡30次课。另外现在报名两科以上还有折扣。\"\n\n具体引导：\n- 介绍三种卡型（领航卡/畅学卡/启航卡）的差异\n- 提醒新生折扣（单科9.5折/两科9折/三科8.5折）\n- 提醒团报优惠（2人8.5折/3人8折/4人7.5折）\n- 如有同伴，推荐家长自发组团一对二/圆桌，性价比更高\n\n## 绝对不能说的\n\n- \"我们已经是最便宜的了\"\n- \"别的机构更贵\"\n- \"一分钱一分货\"\n- \"打折/优惠可以再谈\"（不要暗示价格有弹性）\n\n## 如果家长坚持觉得贵\n\n> \"完全理解。教育是长线投入，您可以先回去考虑一下。我们也有13-20人的班型，价格更亲民一些。或者可以先体验我们的试听课，看看效果再决定。\"\n\n→ 引导至13-20人班或启航卡（入门体验型）\n", "lines": 53, "size": 2015}, "04_scripts__referral_invitation": {"id": "04_scripts__referral_invitation", "path": "04_scripts/referral_invitation.md", "name": "referral_invitation", "title": "Referral Invitation", "tags": "[scene:conversion, role:consultant, role:xueguan, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:conversion, role:consultant, role:xueguan, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/pricing/promotions_current.md]\n---\n\n# 转介绍邀请话术\n\n## 使用场景\n\n老学员续费后、阶段性成果反馈后，自然引导转介绍。\n\n## 前提条件\n\n- 孩子确实有进步（用数据证明）\n- 家长对百分有认可\n- 不要在首次接触或争议期提转介绍\n\n## 话术\n\n> \"XX妈妈，孩子这段时间进步真的很明显，您应该也感受到了。如果您身边有朋友家的孩子也有类似的需求，可以推荐他们来了解一下。我们有一个感恩回馈活动，转介绍成功的话，有三重好礼可以选一个。\"\n\n## 三重好礼（转介绍奖励）\n\n| 好礼 | 内容 |\n|------|------|\n| 感恩礼一（答谢礼） | 200元现金奖励，直接微信红包或转账 |\n| 感恩礼二（成长礼） | 精品小班课2次，让孩子在精品小班课中拓展兴趣 |\n| 感恩礼三（续航礼） | 500元续费代金券，下次续报启航卡及以上课程即可使用 |\n\n三重好礼任选其一。\n\n## 话术要点\n\n- 不要让家长觉得你在\"利用他\"\n- 强调是\"分享好东西给朋友\"\n- 重点放在\"孩子的进步是最好的口碑\"\n- 不要反复提转介绍，提一次即可\n", "lines": 40, "size": 1306}, "04_scripts__renewal_conversation": {"id": "04_scripts__renewal_conversation", "path": "04_scripts/renewal_conversation.md", "name": "renewal_conversation", "title": "Renewal Conversation", "tags": "[scene:renewal, role:consultant, role:xueguan, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:renewal, role:consultant, role:xueguan, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/renewal_sop.md, 06_ops/service_system_9000.md]\n---\n\n# 续费面谈话术\n\n## 核心原则\n\n用成长手册驱动，说\"继续\"不说\"续费\"。\n\n## 续费面谈流程（40分钟）\n\n| 阶段 | 时长 | 内容 |\n|------|------|------|\n| 成长回顾 | 15min | 用数据展示孩子的进步和变化 |\n| 教师分享 | 10min | 老师对孩子的评价和建议 |\n| 下阶段规划 | 10min | 下一步的学习计划和目标 |\n| 自然过渡 | 5min | 自然引导续费，不强推 |\n\n## 成长回顾话术\n\n> \"XX妈妈，我先跟您回顾一下孩子这学期的变化。入学时孩子的情况是XX，现在XX。具体来看：\n> - 数学从XX分提升到XX分\n> - 主动举手次数明显增多\n> - 错题类型从以前的概念性错误为主，变成现在偶尔的审题失误\n> - 这说明基础已经扎实了，现在需要的是更细致的审题训练\"\n\n## 教师分享话术\n\n> \"XX老师对孩子的评价是：思维进步很明显，特别是在XX方面。老师觉得如果下个阶段重点突破XX，孩子还有很大的上升空间。\"\n\n## 下阶段规划话术\n\n> \"根据孩子目前的情况，下个阶段我建议重点在XX方面发力。具体计划是……您觉得这个方向可以吗？\"\n\n## 自然过渡话术\n\n> \"那我们就按这个方向继续。课程这边我帮您安排好，卡型方面领航卡最划算——60次课平均下来只要XX元/次，而且还赠送5次课。您看这个方案可以吗？\"\n\n## 禁忌\n\n- 不说\"续费\"，说\"继续\"\n- 不说\"你不续的话名额就没了\"\n- 不在孩子面前谈钱\n- 如果家长犹豫，不追问原因，给时间考虑\n", "lines": 49, "size": 1758}, "04_scripts__trial_invitation": {"id": "04_scripts__trial_invitation", "path": "04_scripts/trial_invitation.md", "name": "trial_invitation", "title": "Trial Invitation", "tags": "[scene:trial, role:consultant, type:script]", "module": "04_scripts", "content": "---\ntags: [scene:trial, role:consultant, type:script]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [06_ops/trial_class_sop.md]\n---\n\n# 试听邀请话术\n\n## 核心原则\n\n试听前做好铺垫，让家长带着期待来，而不是带着怀疑来。\n\n## 试听前准备\n\n1. **推送教师视频**：提前发送授课教师的教学片段/自我介绍视频\n2. **推送课堂实录**：让家长看到真实的课堂氛围\n3. **利用\"曝光效应\"**：多次接触建立信任感\n\n## 邀请话术\n\n> \"XX妈妈/爸爸，我们这边安排了一节XX老师的课，正好适合孩子目前的情况。XX老师在这个年级段已经教了很多年，我发一段他的教学视频给您先看看。如果觉得风格合适，这周末可以带孩子来体验一下，不收费的。\"\n\n## 试听前一天提醒\n\n> \"XX妈妈，明天的试听课在X点，在XX校区X教室。建议让孩子带上平时的课本和笔记本，方便老师了解孩子的基础。如果有最近的试卷也可以带来，我们可以帮做一个免费的深度分析。\"\n\n## 试听当天\n\n1. 前台热情接待，引导至教室\n2. 教师关注试听生，适度互动（不过度关注影响其他学生）\n3. 课后安排10分钟家长沟通\n4. 咨询师+教师+学管铁三角配合\n\n## 试听后话术\n\n→ 见 `04_scripts/after_trial_followup.md`\n\n## 重要提示\n\n- 试听是专业服务的展示，不是推销\n- 198元精品试听课有专门的推广活动（扫码免费领取）\n- 试听前推送的资料要精选，不要发太多造成信息过载\n", "lines": 44, "size": 1564}, "05_campuses__campus_overview": {"id": "05_campuses__campus_overview", "path": "05_campuses/campus_overview.md", "name": "campus_overview", "title": "百分教育校区总览", "tags": "[校区, 总览, 赤坎, 霞山, 坡头]", "module": "05_campuses", "content": "---\ntitle: 百分教育校区总览\ntags: [校区, 总览, 赤坎, 霞山, 坡头]\nlast_updated: 2026-03-19\n---\n\n# 百分教育校区总览\n\n百分教育目前在湛江市设有 **7 个校区**，覆盖赤坎区、霞山区、坡头区三大区域，满足小学至高中全学段教学需求。\n\n**统一咨询电话：18933824497**\n\n---\n\n## 校区分布一览\n\n| 序号 | 校区名称 | 所在区域 | 地址 | 主要覆盖学段 |\n|------|---------|---------|------|-------------|\n| 1 | 虹都校区 | 赤坎区 | 海北路虹都大厦 | 初中、高中（主校区） |\n| 2 | 盛和园校区（百分阅读馆） | 赤坎区 | 人民大道北3号盛和园26号楼负一层15室 | 小学（蒙学~六年级） |\n| 3 | 京基校区 | 赤坎区 | 京基城商业街 | 小学（主校区）、部分初二课程 |\n| 4 | 国贸新天地校区 | 霞山区 | 人民大道南52号国贸新天地写字楼 | 初中、高中 |\n| 5 | 华都汇校区 | 霞山区 | 龙平南路与乐宾路交叉口东南80米 | 小学 |\n| 6 | 南油校区 | 坡头区 | 南油欧烟楼党群服务中心三楼 | 四年级~高二 |\n| 7 | 海东校区 | 坡头区 | 海东新区旦黎路与海湾南路交叉口北160米 | 小学~初三 |\n\n---\n\n## 学段与校区对应关系\n\n> **重要提示：** 家长选择校区时请注意学段对应关系，避免跑错校区。\n\n### 小学课程（一年级~六年级）\n\n小学课程主要安排在以下三个校区：\n\n- **京基校区**（赤坎区） —— 小学主校区，课程最全\n- **盛和园校区 / 百分阅读馆**（赤坎区） —— 含5000+藏书阅读馆，侧重阅读写作\n- **华都汇校区**（霞山区） —— 霞山区小学生首选\n\n### 初高中课程（初一~高三）\n\n初高中课程主要安排在以下校区：\n\n- **虹都大厦校区**（赤坎区） —— 初高中主校区，课程最全，名师集中\n- **国贸新天地校区**（霞山区） —— 霞山区初高中生首选\n\n### 坡头区全学段\n\n- **南油校区** —— 四年级至高二\n- **海东校区** —— 小学至初三\n\n---\n\n## 各区域选校建议\n\n| 家长所在区域 | 小学推荐 | 初高中推荐 |\n|------------|---------|-----------|\n| 赤坎区 | 京基校区、盛和园校区 | 虹都校区 |\n| 霞山区 | 华都汇校区 | 国贸新天地校区 |\n| 坡头区 | 海东校区、南油校区 | 南油校区、海东校区 |\n\n---\n\n## 联系方式\n\n所有校区统一咨询热线：**18933824497**\n\n如需了解具体校区课程安排，请参阅各校区详情页面，或直接拨打咨询电话获取最新课表。\n", "lines": 70, "size": 2573}, "05_campuses__guomao": {"id": "05_campuses__guomao", "path": "05_campuses/guomao.md", "name": "guomao", "title": "国贸新天地校区", "tags": "[校区, 霞山区, 国贸, 初中, 高中]", "module": "05_campuses", "content": "---\ntitle: 国贸新天地校区\ntags: [校区, 霞山区, 国贸, 初中, 高中]\nlast_updated: 2026-03-19\n---\n\n# 国贸新天地校区\n\n## 基本信息\n\n| 项目 | 详情 |\n|------|------|\n| 校区名称 | 国贸新天地校区 |\n| 所在区域 | 霞山区 |\n| 详细地址 | 人民大道南52号国贸新天地写字楼 |\n| 咨询电话 | 18933824497 |\n| 覆盖学段 | 初中、高中 |\n\n---\n\n## 校区定位\n\n国贸新天地校区是百分教育在霞山区的核心教学点，主要承担 **初中及高中学段** 的教学任务。校区位于人民大道南国贸新天地写字楼内，交通便利，周边配套设施完善，方便霞山区及周边家长接送。\n\n---\n\n## 学段覆盖\n\n- **初中**：初一至初三全年级课程\n- **高中**：高一至高三全年级课程\n\n---\n\n## 选校提示\n\n| 学段 | 推荐校区 |\n|------|---------|\n| 霞山区小学生 | 请前往 **华都汇校区**（龙平南路与乐宾路交叉口东南80米） |\n| 霞山区初高中生 | **本校区**（国贸新天地） |\n| 赤坎区初高中生 | 推荐前往 **虹都校区**（海北路虹都大厦） |\n\n---\n\n## 校区优势\n\n1. **地理位置优越**：位于霞山区主干道人民大道南，公交线路覆盖广，家长接送方便\n2. **写字楼环境**：教学环境安静、整洁，学习氛围浓厚\n3. **初高中专注**
