学员进入最强大脑 |\n| 长期目标 | 每位学员在学期间至少获得1次奖项 |\n\n---\n\n## 颁奖与品牌\n\n| 层面 | 内容 | 品牌价值 |\n|------|------|---------|\n| 奖项体系 | 四大奖项（明星/最强大脑/奋进/标兵） | 用成就说话，替代空洞宣传 |\n| 奖学金体系 | 勤学奖 + 励行奖学金 | 真金白银的教学效果证明 |\n| 颁奖仪式 | 每学期1次公开颁奖 | 高品质品牌活动 |\n| 案例输出 | 获奖学员的成长故事 | 最有力的招生素材 |\n", "lines": 302, "size": 9950}, "06_ops__teacher_consultant_service_triangle": {"id": "06_ops__teacher_consultant_service_triangle", "path": "06_ops/teacher_consultant_service_triangle.md", "name": "teacher_consultant_service_triangle", "title": "铁三角协作模型（教师+咨询师+学管）", "tags": "[type:sop, role:consultant, role:teacher, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 铁三角协作模型\ntags: [type:sop, role:consultant, role:teacher, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 铁三角协作模型（教师+咨询师+学管）\n\n## 概述\n\n铁三角（咨询师+教师+学管师）是百分教育服务交付的核心架构。三个角色各司其职、协同作战，确保从招生到教学到日常管理的全链路服务质量。任何一环缺位或越位，都会影响家长体验。\n\n---\n\n## 角色定义与职责\n\n| 角色 | 核心职责 | 日常动作 | 红线 |\n|------|---------|---------|------|\n| **咨询师** | 信任建立、需求挖掘、续费面谈、投诉首接 | 首次咨询、跟进回访、续费面谈、投诉处理、转介绍引导 | 不承诺具体提分数字、不越位解释教学 |\n| **教师** | 教学交付、学情诊断、数据输出、教师分享环节 | 课堂教学、试卷分析、出具诊断报告、参与续费面谈分享环节 | 不越位处理投诉、不直接谈费用 |\n| **学管** | 日常联络、作业追踪、预警上报、高光视频、成长手册 | 作业跟进、四大能力图谱更新、高光视频拍摄、10分钟随心谈、预警上报 | 不擅自解释教学问题、不承诺优惠 |\n\n---\n\n### 咨询师 -- 信任枢纽\n\n| 维度 | 说明 |\n|------|------|\n| 核心职责 | 信任建立、需求挖掘、续费面谈、投诉首接 |\n| 服务对象 | 家长（主要）、学生（次要） |\n| 介入节点 | 首次咨询、重要面谈、续费、投诉、退费 |\n\n**具体动作清单：**\n1. 主导60分钟标准咨询流程\n2. 出具学习方案和选课建议\n3. 组织试听后10分钟反馈会\n4. 执行咨询后跟进节奏（Day0/1/3/7/14）\n5. 主导续费面谈（40分钟）\n6. 24小时内响应投诉电话\n7. 退费时组织体面结业\n\n**红线：** 不承诺具体提分数字。\n> 禁止说法：\"保证提分XX分\"\n> 替代说法：\"根据同类学员数据，预期改善周期为X\"\n\n---\n\n### 教师 -- 专业核心\n\n| 维度 | 说明 |\n|------|------|\n| 核心职责 | 教学交付、学情诊断、数据输出 |\n| 服务对象 | 学生（主要）、家长（通过数据间接服务） |\n| 介入节点 | 日常授课、诊断分析、阶段测评、试听反馈、续费面谈（教师分享环节） |\n\n**具体动作清单：**\n1. 备课与授课（含课堂小测设计）\n2. 逐题归因分析（概念性/计算性/审题性/方法性错误）\n3. 思维层次评估（布鲁姆分类六层级）\n4. 输出阶段测评报告（每月）\n5. 试听课后3分钟课堂表现反馈\n6. 续费面谈中10分钟教师分享\n7. 录制30秒课堂高光视频（配合学管师）\n\n**红线：** 不越位处理投诉，不直接谈费用。\n> 家长在课后表达不满时，教师应说：\"您的反馈我记下了，我会转达给咨询师XX，他/她会尽快联系您。\"\n\n---\n\n### 学管师 -- 日常纽带\n\n| 维度 | 说明 |\n|------|------|\n| 核心职责 | 日常联络、作业追踪、预警上报、高光视频、成长手册 |\n| 服务对象 | 学生和家长（日常高频触点） |\n| 介入节点 | 每日/每周日常沟通、作业追踪、出勤管理、预警信号识别 |\n\n**具体动作清单：**\n1. 每周1次微信简报（本周学习情况+下周计划）\n2. 每日追踪作业完成和订正情况\n3. 出勤管理（缺勤当天联系家长了解原因）\n4. 识别流失预警信号并及时上报\n5. 组织10分钟随心谈（与学生）\n6. 制作30秒课堂高光视频\n7. 更新成长手册数据和四大能力图谱\n8. 节日/生日问候\n\n**红线：** 不擅自解释教学问题，不承诺优惠。\n> 家长问\"为什么孩子这个知识点还没学会\"时，学管师应说：\"这个问题我帮您转达给任课教师XX，他/她最了解孩子的学习进度，会给您详细说明。\"\n\n### 学管师三大价值定位\n\n| 价值 | 定位 | 核心公式/方法 |\n|------|------|-------------|\n| 学员价值 | 离学员最近的\"数据官\" | 学员档案 = 成长见证手册（课堂照片+错题类型+情绪变化） |\n| 客户价值 | 家长最信任的\"情感账户\" | **信任 = 频次 × 真诚 × 解决力**（课前期待管理→课中实时高光播报→课后数据化成长报告） |\n| 学校价值 | 家校互通的\"桥梁\" | 效果外化三板斧：①课堂高光照片 ②成长数据对比 ③教师语音解读 |\n\n### 学管师课前服务细则\n\n1. **学生准备确认**：核查身心状态 → 检查学习物资 → 心理预热引导 → 家校沟通联动\n2. **学情反馈私享群**：为每位学员建立专属私享群，课前分享准备情况与学习提醒，家长可随时反馈\n\n### 学管师课中服务细则\n\n**听课状态关注四维度：**\n- 状态可视化：记录举手频次与互动次数，形成参与度趋势图\n- 专注力监测：观察眼神/坐姿/应答反应，评估注意力集中时长\n- 行为数据分析：量化响应模式，识别潜在注意力障碍或理解难点\n- 动态反馈机制：异常状态即时提醒教师调整节奏\n\n### 学管师课后服务细则\n\n- **心理健康关怀**：不仅关注学习，也关注孩子的幸福感\n- **家庭关系缓和**：情感联结重建 + 冲突化解支持 + 以鼓励代替责备\n- **BIC沟通法**（适用初二学生心理特点）：B=Behavior（行为）→ I=Impact（影响）→ C=Consequence（后果）\n\n---\n\n## 信息流转机制\n\n```\n教师 ──(教学数据/诊断报告)──→ 学管\n                                  │\n                          (服务数据/预警信号)\n                                  │\n                                  ↓\n                              咨询师\n                                  │\n                          (服务决策/沟通方案)\n                                  │\n                                  ↓\n                               家长\n```\n\n### 信息流转规范\n\n| 流向 | 内容 | 频率 | 方式 |\n|------|------|------|------|\n| 教师 → 学管 | 课堂表现、测评成绩、诊断数据、教学建议 | 每次课后 | 系统录入/群内同步 |\n| 学管 → 咨询师 | 学员状态、预警信号、家长反馈、作业数据 | 实时/每周汇总 | 企微/系统 |\n| 咨询师 → 家长 | 学习方案、阶段反馈、续费沟通、投诉回应 | 按场景触发 | 电话/面谈/微信 |\n| 学管 → 家长 | 日常联络、高光视频、作业反馈、成长手册 | 每周 | 微信/视频 |\n\n### 信息流转铁律\n\n1. **不漏传**：任何家长反馈必须当天同步给相关角色\n2. **不变形**：转述家长原话，不加个人解读\n3. **不延迟**：预警信号和投诉必须实时传递\n4. **有记录**：所有重要沟通在系统中留痕\n\n---\n\n## 协作场景\n\n### 场景一：续费面谈\n\n**主导：** 咨询师 | **参与：** 教师\n\n| 环节 | 时间 | 负责人 | 内容 |\n|------|:----:|--------|------|\n| 成长回顾 | 15min | 咨询师 | 展示成长手册，数据对比入学vs当前 |\n| 教师分享 | 10min | 教师 | 老师对孩子的评价、成长观察、教学建议 |\n| 下阶段规划 | 10min | 咨询师 | 展示下一阶段学习计划和目标 |\n| 自然过渡 | 5min | 咨询师 | 不强推，给家长决定空间 |\n\n**准备工作（学管负责）：**\n- 提前整理学员成长手册\n- 汇总四大能力图谱数据\n- 收集高光时刻视频/照片\n\n---\n\n### 场景二：投诉处理\n\n**首接：** 咨询师 | **支持：** 教师提供数据\n\n| 阶段 | 时间要求 | 负责人 | 动作 |\n|------|---------|--------|------|\n| 首接 | 24h内 | 咨询师 | 电话响应，倾听不辩解，记录诉求 |\n| 调查 | 24-48h | 咨询师+教师 | 教师提供教学数据和情况说明 |\n| 回复 | 48h内 | 咨询师 | 给出解决方案，面谈或电话沟通 |\n| 回访 | 48h后 | 学管 | 确认满意度，持续关注 |\n\n**红线：**\n- 教师不直接处理投诉，避免对立\n- 学管不擅自解释教学问题\n- 咨询师先处理情绪，再处理事情\n\n---\n\n### 场景三：流失预警\n\n**发现：** 学管 | **干预：** 咨询师\n\n| 预警级别 | 信号 | 学管动作 | 咨询师动作 |\n|---------|------|---------|-----------|\n| 红色（72h） | 连续缺课/问退费/群里不满 | 立即上报咨询师 | 72h内电话→面谈→挽留方案 |\n| 黄色（1周） | 作业下降/回复变慢/成绩连降 | 重点跟进+10分钟随心谈 | 1周内主动沟通，了解原因 |\n| 绿色（观察） | 偶尔缺课/小幅波动 | 日常关注+记录变化 | 持续观察，如连续出现升级 |\n\n---\n\n### 场景四：新生入学\n\n**主导：** 咨询师 | **交接：** 学管+教师\n\n| 阶段 | 动作 | 负责人 |\n|------|------|--------|\n| 入学交接 | 咨询师向学管、教师同步学员信息（诊断结果、家长诉求、注意事项） | 咨询师 |\n| 首课准备 | 教师了解学员情况，制定首课计划 | 教师 |\n| 破冰联络 | 学管加家长微信，发送欢迎信息+服务说明 | 学管 |\n| 首课反馈 | 教师出具首课观察报告，学管同步家长 | 教师+学管 |\n| 首周回访 | 咨询师电话回访家长，确认适应情况 | 咨询师 |\n\n---\n\n### 场景五：阶段测评\n\n**执行：** 教师 | **传达：** 学管 | **面谈：** 咨询师（如有需要）\n\n| 环节 | 负责人 | 内容 |\n|------|--------|------|\n| 出题+批改 | 教师 | 阶段测评卷，覆盖本阶段所有知识模块 |\n| 诊断分析 | 教师 | 逐题归因、模块得分率、思维层次评估 |\n| 数据同步 | 学管 | 更新四大能力图谱，同步诊断报告给家长 |\n| 深度沟通 | 咨询师 | 如数据异常（下降明显），主动约面谈 |\n\n---\n\n## 协作纪律\n\n### 边界红线\n\n| 角色 | 绝对不能做的事 |\n|------|---------------|\n| 咨询师 | 承诺具体提分数字、越位解释教学方法、贬低竞品、用焦虑营销 |\n| 教师 | 直接处理投诉、与家长讨论费用/退费、私下承诺效果、评价其他机构 |\n| 学管 | 擅自解释教学问题、承诺优惠、擅自处理投诉、私下建议换老师 |\n\n### 协作原则\n\n1. **信息透明**：所有学员信息三角共享，不存在信息孤岛\n2. **职责清晰**：各司其职，不越位、不缺位\n3. **以学员为中心**：一切决策以学员成长为导向\n4. **快速响应**：预警信号24h内流转到位\n5. **定期复盘**：每周铁三角碰头会，同步学员状态\n\n---\n\n## 常见协作问题与解决\n\n| 问题 | 原因 | 解决方案 |\n|------|------|---------|\n| 家长重复问同样的问题 | 信息未同步 | 建立共享信息卡，三方可查 |\n| 家长被\"踢皮球\" | 职责不清 | 严格按场景分流表执行 |\n| 教师直接回应投诉 | 越位 | 培训+考核+案例复盘 |\n| 学管师解释教学问题 | 越位 | 统一话术模板+定期检查 |\n| 咨询师不了解学生情况 | 信息断层 | 每周一次三方同步会 |\n\n---\n\n## 周度碰头会\n\n**频率：** 每周一次，30分钟\n**参与人：** 咨询师+教师+学管\n\n| 议程 | 时间 | 内容 |\n|------|:----:|------|\n| 预警通报 | 10min | 学管通报本周预警学员（红/黄/绿） |\n| 教学反馈 | 10min | 教师同步教学数据和学员表现 |\n| 服务决策 | 10min | 咨询师确定本周重点跟进对象和行动方案 |\n\n---\n\n## 考核与激励\n\n| 角色 | 核心考核指标 | 权重 |\n|------|------------|:----:|\n| 咨询师 | 新签成交率、续费率、投诉满意度 | 30%/40%/30% |\n| 教师 | 教学质量评分、学员进步率、学员奖项获得率 | 40%/30%/30% |\n| 学管师 | 家长满意度、预警识别率、信息同步及时率 | 40%/30%/30% |\n\n> 2026年起，教师考核与学员奖项获得率挂钩（详见 `student_award_system.md`）\n", "lines": 286, "size": 11704}, "06_ops__training__grade9_xueguan_guide": {"id": "06_ops__training__grade9_xueguan_guide", "path": "06_ops/training/grade9_xueguan_guide.md", "name": "grade9_xueguan_guide", "title": "初三学管工作指南 (Grade9 Xueguan Guide)", "tags": "", "module": "06_ops", "content": "# 初三学管工作指南\n\n> 来源：周娇凤-赢战初三，点亮未来11月.pptx\n> 主讲人：周娇凤（学管教务老师，深耕教育行业6年）\n> 相关文件：`06_ops/home_school_communication.md`（通用家长沟通标准）| `06_ops/teacher_consultant_service_triangle.md`（铁三角协作全貌）\n\n## 第一课：学员档案管理（小麦系统）\n\n### 系统核心功能\n- 成长档案管理\n- 家长端登录：微信关注校区小麦服务号 → 手机号验证码登录 → 绑定学员 → 接收上课提醒\n\n## 第二课：初三学生心理特点及辅导策略\n\n### 三大心理特点\n\n#### 1. 青春期自我为中心\n- 高度关注自身形象（外貌、穿着、言行）\n- 过度放大他人看法\n- 认为自己的经历独一无二，容易产生\"没人懂我\"的孤独感\n- 从\"是否影响我\"角度评估建议\n\n#### 2. 学业压力（直面\"我\"的未来）\n- 压力来源多元：中考目标 + 父母期待 + 同学竞争\n- 一次考试失利 → 自我怀疑 → \"考不好就没未来\"\n- 可能伴随失眠、食欲不振、拖延、逃避\n\n#### 3. 叛逆争夺控制权\n- 对父母过度干涉强烈抵触\n- 更愿意相信同龄人观点\n- 刻意与规则\"作对\"以彰显控制权\n\n### 心理辅导措施\n\n1. **课间针对性沟通**\n   - 叛逆学生：平等、尊重态度，倾听想法\n   - 情绪波动学生：传授调节方法（深呼吸、积极心理暗示）\n\n2. **了解上课状态辅助辅导**\n   - 综合判断心理变化\n   - 发现适应困难及时与家长沟通，共同制定方案\n\n3. **月考成绩分析与心理引导结合**\n   - 全面分析：总分、各科成绩、排名变化、是否心理压力导致失常\n   - 进步学生：表扬肯定，增强自信\n   - 退步学生：不指责，帮助分析原因，鼓励制定改进计划\n\n## 第三课：课程跟进与沟通\n\n### 课前跟进\n- 提前1-2天提醒上课时间\n- 提醒完成上节课作业\n- 请假缺课找时间补回\n- 特殊情况提前沟通\n\n### 课中追踪\n- 课堂状态记录：互动/做题正确率/畏难情绪/走神\n- 拍照或视频记录课堂同步给家长\n\n### 课后落地\n- 当天反馈课堂情况\n- 督促作业完成并打卡\n- 与老师沟通同步孩子情况\n- 及时反馈家长，教学和跟进方向一致\n\n## 百分\"铁三角\"护航体系\n咨询 + 上课 + 学管 = 完整服务闭环\n\n- 咨询：选对方向\n- 教学：学扎实\n- 学管：盯落地、常沟通\n\n三位老师分工明确又互相配合，学习内容、学习状态、家长疑问都能及时回应解决。\n", "lines": 74, "size": 2566}, "06_ops__training__teacher_capability_path": {"id": "06_ops__training__teacher_capability_path", "path": "06_ops/training/teacher_capability_path.md", "name": "teacher_capability_path", "title": "教师能力培养路径与四级课程体系 (Teacher Capability Path)", "tags": "", "module": "06_ops", "content": "# 教师能力培养路径与四级课程体系\n\n> 来源：追梦同行，赋能成长5月12日更新（周月生）修改版.pptx\n> 主讲人：周月生\n> 成长历程：2020年薪15万 → 2024年薪30万 → 2025目标35万\n\n## 角色转变与使命\n- 标准执行：岗位清晰，校区日常工作开展\n- 老教师培训和产品打造，助力企业标准化执行和发展\n- 以标准化为抓手，实现个人价值和职业梦想\n\n**核心命题**：什么是真正能满足市场需求、解决孩子成长痛点的关键？→ **课程体系**\n\n## 四级分层课程体系\n\n### 提高体系\n- **目标学生**：基础薄弱\n- **教学内容**：同步教材课程，拆解知识点，夯实基本功\n- **教师要求**：教龄1-2年，熟悉本地教材，有带班经历，耐心与亲和力\n\n### 强化体系\n- **目标学生**：需要提分\n- **教学内容**：考试重难点，模块训练、错题精析、实战模拟\n- **教师要求**：教龄2-4年，有毕业班教学经验，提分数据显著，精准把握高频考点和命题趋势\n\n### 培优体系\n- **目标学生**：学有余力\n- **教学内容**：拓展题型与思维训练，突破能力天花板\n- **教师要求**：教龄3-5年，有培优班带班经验，熟悉升学政策，擅长逻辑推理/建模分析\n\n### 卓越体系\n- **目标学生**：自主招考/竞赛/重点校冲刺\n- **教学内容**：高阶课程与专属方案，塑造学术竞争力，跨学科思维训练\n- **教师要求**：教龄5年以上，有成功升学案例，精通竞赛级知识体系，能研发专题课程\n\n## 浅奥衔接体系完善（四阶段）\n1. 筹备期\n2. 出品期\n3. 内训期\n4. 优化期\n\n## 教师能力培养六大模块\n\n| 模块 | 方向 |\n|------|------|\n| 深挖教研 | 迎蜕变再成长 |\n| 能力再造 | 提升转化率 |\n| 数据思维 | 塑造特色显价值 |\n| 转介绍十大场景 | 优秀教师班级满 |\n| 学习力倒逼法 | 高效编写好教案 |\n| 关键动作促转化 | 从教师到管理者 |\n\n**理念**：以标准为引力，以数据为航标，让优秀可复制，让卓越成常态\n\n## 标准化转化三步走\n\n### 第一步：覆盖全流程\n提炼标准化八大转化动作：课前交接、信任破冰、课堂互动、即时反馈、课后跟进等\n\n### 第二步：科学策略提升转化率\n高频表扬激励、积分奖励、天赋暗示等策略，目标转化率提升至30%以上\n\n### 第三步：标准化流程扎实落地\n实现教师能力提升与百分业绩增长双赢\n\n## 个人成长三步法\n1. **融入打开**：主动融入，打开自己\n2. **听话照做**：持续学习提升\n3. **认知升维**：拓展格局，长远规划\n\n### 梦想阶梯\n- 拿出手的牛逼老师\n- 购买小户型房/还房贷\n- 买车有存款/环游世界\n", "lines": 75, "size": 2807}, "06_ops__trial_class_sop": {"id": "06_ops__trial_class_sop", "path": "06_ops/trial_class_sop.md", "name": "trial_class_sop", "title": "试听课 SOP", "tags": "[type:sop, scene:trial, role:consultant, role:xueguan]", "module": "06_ops", "content": "---\ntitle: 试听课 SOP\ntags: [type:sop, scene:trial, role:consultant, role:xueguan]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\n---\n\n# 试听课 SOP\n\n## 概述\n\n试听课是家长决策的关键环节。目标不是\"表演一堂好课\"，而是让家长真实感受到教学专业度和服务体系。试听课全流程由铁三角（咨询师+教师+学管）协同完成。\n\n---\n\n## 一、试听前准备\n\n### 时间节点：试听前1-3天\n\n**核心策略：** 推送教师教学视频（1-2min精华）、课堂实录片段、往期学员成果，利用\"曝光效应\"建立信任。\n\n#### 咨询师动作\n\n1. 确认试听时间、班级、科目\n2. 向家长发送以下材料：\n   - 任课教师简介（含教学成果数据，非空洞的\"名师\"标签）\n   - 教师课堂实录视频（30-60秒精华片段）\n   - 往期同类学员成长案例（附数据）\n   - 试听班级近期学习进度说明\n3. 提醒家长携带近期试卷（用于诊断参考）\n\n#### 教师动作\n\n1. 了解试听学生基本情况（年级、水平、家长诉求）\n2. 在课堂设计中预留互动环节，确保试听生有参与机会\n3. 准备一份针对该生水平的课堂小测（3-5题，用于课后反馈）\n4. 确保课堂体现\"趣味、互动、实战\"三大标准\n\n#### 学管师动作\n\n1. 确认教室环境（座位安排、教材准备）\n2. 提前打印试听反馈表\n3. 在班级群简单预告\"今天有新同学加入\"\n4. 准备接待流程（饮水、指引、校区介绍动线）\n\n---\n\n## 二、试听当天执行\n\n### 到场接待（提前15分钟）\n\n- 学管师在前台迎接，引导参观校区环境\n- 简要介绍校区特色区域（教室、自习室、成长墙）\n- 安排旁听或独立试听（尊重家长选择）\n\n### 铁三角配合流程\n\n```\n家长到达（学管接待，提前15min）\n    ↓\n引导入座（学管安排座位，靠前但不孤立）\n    ↓\n课前简介（教师自然带入，不过度关注试听生）\n    ↓\n正常授课（教师保持日常节奏，不特殊表演）\n    ↓\n互动环节（教师适度提问试听生，观察反应）\n    ↓\n课堂小测（全班统一，试听生同步参与）\n    ↓\n下课（学管引导试听生和家长到反馈区）\n```\n\n### 课堂质量标准\n\n试听课**必须体现\"趣味、互动、实战\"三大课堂标准**，不能为试听降低教学强度。\n\n| 要求 | 说明 |\n|------|------|\n| 保持日常节奏 | 不因试听生改变课堂节奏，真实展示常态课 |\n| 适度关注 | 提问1-2次，不过度关注也不忽视 |\n| 展示教学方法 | 体现诊断式教学、说意训练、错题归因等特色 |\n| 课堂小测 | 全班统一进行，自然获取试听生的水平数据 |\n| 趣味互动 | 有思维游戏、小组讨论或实战演练环节 |\n\n### 家长旁听安排\n\n- 家长可在教室后方旁听，或在休息区等候（尊重家长选择）\n- 如家长旁听，学管师陪同，轻声解答课堂环节的设计意图\n- 不在课堂上当面评价孩子表现\n\n---\n\n## 三、试听后反馈（10分钟）\n\n### 时间节点：下课后立即进行\n\n**参与人：** 咨询师 + 教师 + 家长（学管师在场协调）\n\n| 环节 | 时间 | 负责人 | 内容 |\n|------|:----:|--------|------|\n| 课堂表现反馈 | 3min | 教师 | 客观描述孩子课堂表现（参与度、答题情况、思维亮点） |\n| 小测分析 | 3min | 教师 | 快速分析课堂小测结果，指出优势和待改进点 |\n| 学习建议 | 2min | 咨询师 | 基于课堂观察给出初步建议（结合之前的试卷诊断） |\n| 家长提问 | 2min | 咨询师 | 回答家长即时疑问 |\n\n**教师反馈话术示例：**\n> \"今天课上我观察到，孩子在基础概念部分反应很快，说明记忆和理解层面没问题。但在应用题环节，他用了3分钟才动笔，说明解题策略还需要训练。课堂小测5道题对了3道，错的2道都是方法性错误，不是知识漏洞。\"\n\n**禁止说法：**\n- 不说\"孩子很聪明但不用功\"\n- 不说\"基础太差\"（替代：\"目前有几个关键知识漏洞需要补\"）\n- 不说\"保证几次课就能提分\"\n- 不说\"进步很大\"（用具体数据替代）\n\n---\n\n## 四、试听后跟进\n\n| 时间 | 动作 | 负责人 | 内容 |\n|------|------|--------|------|\n| 当天 | 微信 | 咨询师 | 发送课堂反馈报告 + 孩子表现亮点 + 小测分析 |\n| 次日 | 微信 | 学管师 | 发送一条针对性学习建议/小技巧 |\n| 3天内 | 电话 | 咨询师 | 回访，了解家长考虑情况，不强推 |\n\n> 后续跟进纳入标准咨询跟进节奏（详见 `consultation_sop.md`）\n\n---\n\n## 五、试听课质量自检清单\n\n### 教师自检\n\n- [ ] 课前已了解试听生基本情况\n- [ ] 课堂保持日常节奏，未刻意表演\n- [ ] 课堂体现\"趣味、互动、实战\"三大标准\n- [ ] 试听生被提问至少1次\n- [ ] 课堂小测已完成并收回\n- [ ] 课后10分钟反馈已完成\n\n### 咨询师自检\n\n- [ ] 试听前已发送教师视频和课堂实录\n- [ ] 试听前已发送往期学员成果\n- [ ] 试听后反馈会已组织\n- [ ] 当天已发送试听反馈报告\n- [ ] 跟进计划已录入系统\n\n### 学管师自检\n\n- [ ] 教室和座位已提前安排\n- [ ] 提前15分钟到场接待\n- [ ] 校区环境介绍已完成\n- [ ] 家长接待流程顺畅\n- [ ] 反馈表已回收\n- [ ] 后续联络已安排\n\n---\n\n## 六、关键指标\n\n| 指标 | 目标值 |\n|------|:-----:|\n| 试听到店率（预约→到场） | ≥ 85% |\n| 试听后反馈完成率 | 100% |\n| 试听满意度（家长评分） | ≥ 4.5/5 |\n| 试听转化率（7天内报名） | ≥ 50% |\n", "lines": 168, "size": 5636}, "06_ops__xiaomai_system_rules": {"id": "06_ops__xiaomai_system_rules", "path": "06_ops/xiaomai_system_rules.md", "name": "xiaomai_system_rules", "title": "小麦系统使用规则与提成细则 (Xiaomai System Rules)", "tags": "", "module": "06_ops", "content": "# 小麦系统使用规则与提成细则\n\n> 来源：尤校言论(1).docx\n> 适用：全职/兼职教师、学管、前台、财务\n\n## 小麦系统基本规则\n\n### 打卡管理\n- 全职及兼职老师**自己打卡**，打卡用于工资结算\n- 临时添加学员导致老师未打卡的，补充后提醒老师补打\n- **上课打卡一律由老师自己完成**，责任回归个人\n\n### 学管提醒责任\n- 学管老师为每个老师**提醒三次**\n- 三次后，任何非系统错误由老师个人承担\n- 工资出不来也自己承担\n\n### 兼职老师\n- 未注册的，指导其注册账号\n\n### 前台与财务\n- 只负责**录入和核算**\n- 不负责点对点的校对和纠正\n- 各岗位自己的错误自己承担\n\n### 系统性问题\n- 统一汇总给何钰姣，找平台解决\n- 新员工平台使用培训由何钰姣负责（先线上学习，再统一培训）\n- 不熟悉的老员工先线上学习，每月安排一次线下统一培训\n\n### 学员相片\n- 第一时间采集\n- 没有相片的学员，由带班及相应年级学管老师负责上传\n\n## 提成与转课规则\n\n### 1. 学员转课\n- 转课时提成差额需扣除\n- 例：地理7%提成 → 转为数学续费2%，需减掉5%\n- 小麦操作：先退费，再重新录续费\n\n### 2. 新生报课\n- 欠费状态3个月内补交，仍属于**新生补交**\n- 2月交寒假课 = 新单，3月再交春季课 = **续费**（不能算新单）\n\n### 3. 领航卡\n- 课时**不能跨科使用**\n- 卡项到期未上完的课时**清零**\n\n### 4. 跟进人设置\n- 跟进人是自己时，需在小麦学员基本信息里修改跟进人\n- 续费学员咨询/学管栏拉取跟进人数据\n\n### 5. 备注规范\n- 优惠、赠送课时、转介绍送课、特殊申请，需在录课时\"对内备注\"写清楚\n- 特殊申请需截图领导同意图片上传\n\n### 6. 转介绍送课\n- **必须转介绍报名成功后才能送课**\n- 禁止提前画饼\n\n### 7. 试听学生规则\n- 试听后报了其他科目（非试听科），不给试听科老师算人头费\n- 试听A老师的课后转听B老师并报名，人头费给B老师，A老师不算\n- **同一科目仅有一次试听机会**\n", "lines": 66, "size": 2178}, "06_ops__xueguan_automation_guide": {"id": "06_ops__xueguan_automation_guide", "path": "06_ops/xueguan_automation_guide.md", "name": "xueguan_automation_guide", "title": "学管自动化运营指南", "tags": "[type:sop, role:xueguan, scene:automation, scene:churn, scene:growth-portfolio]", "module": "06_ops", "content": "---\ntitle: 学管自动化运营指南（预警系统与成长手册）\ntags: [type:sop, role:xueguan, scene:automation, scene:churn, scene:growth-portfolio]\nlast_updated: 2026-03-22\nmaintainer: baifen-edu-ops\nrelated_files:\n  - 09_agents/xueguan_automation_agent.md\n  - 04_scripts/weekly_report_templates.md\n  - 06_ops/churn_warning_system.md\n  - 06_ops/service_system_9000.md\n  - 08_rules/role_boundary.md\n---\n\n# 学管自动化运营指南\n\n本指南详细定义三级预警系统的自动化检测规则、标准处理流程与话术，成长手册的自动填充逻辑，以及节假日问候模板库。配合学管自动化智能助手（`09_agents/xueguan_automation_agent.md`）使用。\n\n---\n\n## 第一部分：三级预警系统自动化规则\n\n### 一、预警检测数据源\n\n| 数据源 | 检测频率 | 关键字段 |\n|--------|---------|---------|\n| 出勤系统 | 每次课后 | 出勤状态（正常/请假/无故缺课/补课） |\n| 作业系统 | 每日 | 提交状态、完成率、订正率 |\n| 测评系统 | 每次测评后 | 分数、模块得分率、排名变化 |\n| 学管观察 | 实时 | 家长回复速度、态度变化、群内发言 |\n| 教师反馈 | 每次课后 | 课堂参与度、专注度、行为变化 |\n\n---\n\n### 二、红色预警（72小时内干预）\n\n**风险等级：** 极高，流失概率 > 70%\n\n#### 自动触发条件\n\n| 编号 | 触发条件 | 自动检测逻辑 | 数据来源 |\n|------|---------|-------------|---------|\n| R1 | 连续缺课 | 同一科目连续2次出勤状态为\"无故缺课\" | 出勤系统 |\n| R2 | 主动问退费 | 学管手动标记\"家长提及退费\" | 学管录入 |\n| R3 | 群内不满 | 学管手动标记\"家长群内表达不满\" | 学管录入 |\n| R4 | 成绩骤降 | 相邻两次测评分数差≥15分（下降方向） | 测评系统 |\n| R5 | 多黄叠加 | 同一学员在2周内触发2个及以上黄色预警 | 预警系统 |\n| R6 | 公开投诉 | 学管/咨询师手动标记\"正式投诉\" | 投诉记录 |\n\n#### 标准处理流程\n\n| 步骤 | 时限 | 负责人 | 具体动作 | 系统记录 |\n|------|------|--------|---------|---------|\n| 1. 识别上报 | 发现后2小时内 | 学管 | 在系统中标记红色预警，立即通知咨询师和教师 | 预警单号+触发条件+时间 |\n| 2. 电话沟通 | 24小时内 | 咨询师 | 电话联系家长，倾听诉求，不辩解不推诿 | 通话记录+家长诉求 |\n| 3. 三方评估 | 48小时内 | 铁三角 | 咨询师+教师+学管三方会议，查明原因，评估情况 | 会议纪要+原因分析 |\n| 4. 制定方案 | 72小时内 | 咨询师主导 | 制定针对性挽留方案（教学调整/换班/换老师/加强服务等） | 方案内容+预期效果 |\n| 5. 执行跟踪 | 方案启动后1周 | 学管 | 持续跟踪方案执行效果，每日记录学员状态 | 执行日志 |\n| 6. 效果复盘 | 方案启动后2周 | 铁三角 | 评估效果，决定降级/维持/启动退费流程 | 复盘结果+后续决策 |\n\n#### 红色预警话术模板\n\n**学管上报咨询师（内部沟通）：**\n\n```\n[咨询师姓名]，紧急通报：\n\n学员[姓名]（[年级][科目]）触发红色预警。\n触发条件：[具体描述，如\"数学课3/18、3/20连续两次无故缺课，本次测评成绩从78分降至61分\"]\n家长近期状态：[描述，如\"最近3天微信消息未读，上次回复很简短\"]\n需要您在24小时内电话联系家长。\n\n我这边已做的：[如\"已尝试微信联系家长但未回复\"]\n教师已通知：[是/否]\n```\n\n**咨询师电话联系家长（话术参考）：**\n\n```\n\"XX妈妈/爸爸您好，我是百分教育的[咨询师姓名]。今天给您打电话，是想关心一下[学员名]最近的情况。\n\n我们注意到[学员名]最近[客观描述：如'两次课没来上']，不知道孩子是不是遇到了什么困难？或者咱们家里是不是有什么安排？\n\n您方便的时候跟我聊聊，不管什么情况，我们都想一起帮[学员名]调整好。\"\n```\n\n**注意：** 咨询师在电话中只倾听和了解，不在第一次通话中给方案。方案在三方评估后再给。\n\n---\n\n### 三、黄色预警（1周内关注）\n\n**风险等级：** 中等，流失概率 30%-70%\n\n#### 自动触发条件\n\n| 编号 | 触发条件 | 自动检测逻辑 | 数据来源 |\n|------|---------|-------------|---------|\n| Y1 | 作业完成率低 | 连续2周（14天）作业完成率<60% | 作业系统 |\n| Y2 | 回复明显变慢 | 最近3条消息平均回复时间>24h，或存在48h未回复 | 学管记录 |\n| Y3 | 成绩连续下降 | 连续2次测评成绩下降（不论幅度） | 测评系统 |\n| Y4 | 频繁请假 | 30天内请假次数≥3次 | 出勤系统 |\n| Y5 | 课堂参与下降 | 教师连续2周标记\"课堂参与度下降\" | 教师反馈 |\n| Y6 | 态度变冷 | 学管标记\"家长态度明显变冷\" | 学管观察 |\n\n#### 标准处理流程\n\n| 步骤 | 时限 | 负责人 | 具体动作 | 系统记录 |\n|------|------|--------|---------|---------|\n| 1. 学管重点跟进 | 发现当天 | 学管 | 安排\"10分钟随心谈\"了解学生状态 | 谈话记录 |\n| 2. 教师加强关注 | 本周课堂 | 教师 | 课堂增加互动机会，课后单独聊几句 | 教师反馈 |\n| 3. 发送高光内容 | 本周内 | 学管 | 主动发送近期课堂高光视频/照片给家长 | 发送记录 |\n| 4. 咨询师沟通 | 1周内 | 咨询师 | 用关心而非推销的方式主动联系家长 | 沟通记录 |\n| 5. 数据分析 | 1周内 | 教师+学管 | 分析成绩/行为数据，找出变化原因 | 分析报告 |\n| 6. 持续观察 | 2周 | 学管 | 观察信号是否改善或恶化，决定降级/升级 | 观察日志 |\n\n#### 黄色预警话术模板\n\n**学管\"10分钟随心谈\"引导话术：**\n\n```\n跟学生（课间或课后自然聊天，不刻意）：\n\n\"[学员名]，最近怎么样？学校那边忙不忙？\"\n（先聊轻松话题，不直奔学习）\n\n\"感觉你最近上课的时候有时候会走神，是不是有什么心事？\"\n（如果学生否认，不追问）\n\n\"没关系，如果以后有什么想说的，随时找我聊。不一定是学习的事，什么都行。\"\n```\n\n**学管主动联系家长（微信）：**\n\n```\n\"XX妈妈/爸爸您好！最近一段时间我观察到[学员名]在课堂上的状态和之前有些变化，[具体描述，如\"上课的时候没那么主动了，作业完成也比以前慢了一些\"]。\n\n我想跟您了解一下，孩子最近在家的状态怎么样？是不是学校那边功课压力比较大，或者有其他什么情况？\n\n了解清楚后，我们可以和[教师姓名]老师一起帮[学员名]调整一下节奏。\"\n```\n\n**注意：** 黄色预警阶段以学管和教师为主导，咨询师做辅助。不要让家长感觉\"被约谈\"。\n\n---\n\n### 四、绿色观察\n\n**风险等级：** 低，流失概率 < 30%\n\n#### 自动触发条件\n\n| 编号 | 触发条件 | 自动检测逻辑 | 数据来源 |\n|------|---------|-------------|---------|\n| G1 | 偶尔缺课 | 单次出勤为\"请假\"或\"无故缺课\"，但非连续 | 出勤系统 |\n| G2 | 成绩小幅波动 | 单次测评下降≤5分 | 测评系统 |\n| G3 | 偶尔不交作业 | 单次作业未提交，但非连续 | 作业系统 |\n| G4 | 偶尔不积极 | 教师单次标记\"课堂参与度一般\" | 教师反馈 |\n\n#### 处理方式\n\n- 系统自动记录，在学管工作台标注\"绿色观察\"\n- 不主动干预，保持正常服务节奏\n- 学管在周报中内部标注观察项（不体现在发给家长的周报中）\n- **升级规则：** 2周内出现第二个绿色信号 → 自动升级为黄色预警\n\n---\n\n### 五、预警升级与降级规则\n\n```\n                    正常状态\n                       ↕\n            ┌─── 绿色观察 ───┐\n            │  2周内2次绿色信号  │\n            └───────↓────────┘\n            ┌─── 黄色预警 ───┐\n            │ 1周未改善/出现红色  │\n            └───────↓────────┘\n            ┌─── 红色预警 ───┐\n            │  72h干预后仍无效  │\n            └───────↓────────┘\n              体面结业流程\n```\n\n**降级条件：**\n\n| 从 | 到 | 条件 |\n|----|---|------|\n| 红色 | 黄色 | 干预后1周内家长态度明显改善+学员恢复出勤 |\n| 黄色 | 绿色 | 关注后2周内指标恢复正常范围 |\n| 绿色 | 正常 | 2周内无新的绿色信号 |\n| 红色 | 关闭 | 干预后2周指标全面恢复，铁三角确认 |\n\n**闭环要求：** 每条预警从触发到关闭，必须完成完整流程并记录结果。\n\n---\n\n### 六、预警数据看板（自动生成）\n\n学管自动化助手每周自动汇总：\n\n```\n--- 本周预警概况 ---\n统计周期：[日期] 至 [日期]\n\n| 指标 | 本周 | 上周 | 变化 |\n|------|------|------|------|\n| 红色预警学员 | X人 | X人 | +/-X |\n| 黄色预警学员 | X人 | X人 | +/-X |\n| 绿色观察学员 | X人 | X人 | +/-X |\n| 本周干预成功（降级/关闭） | X人 | X人 | -- |\n| 本周升级 | X人 | X人 | -- |\n\n红色预警明细：\n1. [学员名]（[年级]）- [触发条件] - [当前处理进度]\n2. ...\n\n黄色预警明细：\n1. [学员名]（[年级]）- [触发条件] - [当前处理进度]\n2. ...\n\n需关注：\n- [如有预警集中在某教师/班级/科目的情况，自动提示]\n---\n```\n\n---\n\n## 第二部分：成长手册自动填充逻辑\n\n### 一、成长手册数据流\n\n```\n入学基线数据 ──→ 阶段性评估数据 ──→ 对比分析 ──→ 高光整合 ──→ 评语整合 ──→ 输出手册\n     │                 │                │              │              │\n  入学诊断        每月/每次测评      自动计算差值    学管日常积累    教师+学管\n```\n\n### 二、自动填充模块详解\n\n#### 模块1：基础信息卡（入学时自动生成）\n\n```\n┌──────────────────────────────────┐\n│         百分教育 成长手册          │\n├──────────────────────────────────┤\n│ 姓名：[自动填充]                  │\n│ 年级：[自动填充]                  │\n│ 入学时间：[自动填充]              │\n│ 学习科目：[自动填充]              │\n│ 所在校区：[自动填充]              │\n│ 任课教师：[自动填充]              │\n│ 专属学管：[自动填充]              │\n│ 咨询顾问：[自动填充]              │\n│ 累计课时：[实时更新]              │\n└──────────────────────────────────┘\n```\n\n**数据来源：** 入学档案系统，入学时自动写入，累计课时实时更新。\n\n#### 模块2：入学基线数据（入学诊断后自动写入）\n\n```\n入学诊断报告摘要\n\n诊断日期：[日期]\n诊断科目：[科目]\n\n一、成绩基线\n| 科目 | 总分 | 得分 | 得分率 |\n|------|------|------|--------|\n| [科目] | [满分] | [得分] | [百分比] |\n\n二、模块得分率\n| 模块 | 得分率 | 掌握程度 |\n|------|--------|---------|\n| [模块1] | XX% | [良好/一般/薄弱] |\n| [模块2] | XX% | [良好/一般/薄弱] |\n| ... | ... | ... |\n\n三、四大能力基线\n| 能力 | 评分(1-10) | 说明 |\n|------|-----------|------|\n| 专注力 | X | [一句话描述] |\n| 思维力 | X | [一句话描述] |\n| 执行力 | X | [一句话描述] |\n| 亲和力 | X | [一句话描述] |\n\n四、入学诊断结论\n[一句话诊断，如：\"核心问题是几何模块基础薄弱+审题习惯待培养\"]\n```\n\n**数据来源：** 入学诊断评估，由教师出具，学管录入系统。\n\n#### 模块3：阶段性评估数据（每次测评后自动追加）\n\n```\n第[N]次阶段评估\n\n评估日期：[日期]\n评估类型：[月度测评/期中测评/期末测评]\n\n成绩数据：\n| 科目 | 本次得分 | 上次得分 | 变化 | 入学基线 | 累计进步 |\n|------|---------|---------|------|---------|---------|\n| [科目] | XX分 | XX分 | +/-X分 | XX分 | +/-X分 |\n\n模块得分率变化：\n| 模块 | 本次 | 上次 | 变化 | 入学基线 |\n|------|------|------|------|---------|\n| [模块1] | XX% | XX% | +/-X% | XX% |\n| [模块2] | XX% | XX% | +/-X% | XX% |\n\n四大能力变化：\n| 能力 | 本次 | 上次 | 变化 | 入学基线 |\n|------|------|------|------|---------|\n| 专注力 | X/10 | X/10 | +/-X | X/10 |\n| 思维力 | X/10 | X/10 | +/-X | X/10 |\n| 执行力 | X/10 | X/10 | +/-X | X/10 |\n| 亲和力 | X/10 | X/10 | +/-X | X/10 |\n\n本阶段亮点：[自动提取最大进步项]\n下阶段重点：[自动提取最薄弱项]\n```\n\n**自动计算逻辑：**\n- \"变化\"列 = 本次 - 上次\n- \"累计进步\" = 本次 - 入学基线\n- \"本阶段亮点\" = 变化值最大的正向指标\n- \"下阶段重点\" = 得分率最低或下降最多的模块\n\n#### 模块4：对比图表建议（自动标注图表位置）\n\n助手自动在以下节点建议插入图表：\n\n| 图表类型 | 插入时机 | 数据内容 |\n|---------|---------|---------|\n| 成绩趋势折线图 | 每次评估 | 入学至今所有测评分数走势 |\n| 能力雷达图 | 每月 | 四大能力当前值 vs 入学基线 |\n| 模块得分率柱状图 | 每次评估 | 各模块当前得分率 vs 入学得分率 |\n| 作业完成率趋势 | 每月 | 月度作业完成率走势 |\n| 出勤率统计 | 每学期 | 学期出勤率 |\n\n**输出格式：** 助手生成数据表格和图表描述，学管师/系统据此生成可视化图表。\n\n#### 模块5：高光时刻集锦（学管日常积累，自动归档）\n\n每条高光记录格式：\n\n```\n日期：[YYYY-MM-DD]\n类型：[课堂表现/测评进步/获奖/品行亮点/其他]\n内容：[具体描述，50字以内]\n记录人：[学管/教师姓名]\n```\n\n**自动归档规则：**\n- 按时间线倒序排列\n- 自动分类标签（课堂/测评/获奖/品行）\n- 成长手册输出时，自动选取最近一个周期内的5-8个高光时刻\n- 续费面谈前，自动汇总全部高光时刻\n\n#### 模块6：里程碑记录（系统自动识别+人工补充）\n\n系统自动识别的里程碑：\n\n| 里程碑类型 | 触发条件 | 自动生成描述 |\n|-----------|---------|-------------|\n| 首次进步 | 入学后首次测评成绩提升 | \"[日期] [科目]首次提升，从X分进步到X分\" |\n| 模块突破 | 某模块得分率从<60%提升至≥70% | \"[日期] [模块]突破及格线，得分率达到X%\" |\n| 能力提升 | 四大能力某项提升2分及以上 | \"[日期] [能力]显著提升，从X分到X分\" |\n| 获奖 | 学管手动录入获奖信息 | \"[日期] 获得[奖项名称]\" |\n| 习惯养成 | 连续4周作业完成率≥95% | \"[日期] 连续4周作业全勤，养成了稳定的学习习惯\" |\n| 全勤 | 连续一个月全勤 | \"[日期] 本月全勤，从不缺席\" |\n\n#### 模块7：师生寄语（教师录入+学管补充）\n\n```\n教师评语：\n[教师姓名]（[科目]）：\n\"[教师原话]\"\n日期：[YYYY-MM-DD]\n\n学管观察：\n[学管姓名]：\n\"[学管对孩子的观察和鼓励，侧重品行、态度、成长变化]\"\n日期：[YYYY-MM-DD]\n```\n\n**触发时机：** 阶段测评后、学期末、续费面谈前、结业时，系统自动提醒教师和学管填写寄语。\n\n#### 模块8：家长反馈记录（学管整理录入）\n\n```\n日期：[YYYY-MM-DD]\n场景：[日常沟通/阶段面谈/续费面谈/其他]\n家长原话摘要：\"[家长反馈原话或关键信息]\"\n记录人：[学管姓名]\n```\n\n**录入规则：**\n- 家长的正面反馈必须记录（用于续费面谈和成长手册）\n- 家长的建议和意见也记录（用于服务改进）\n- 转述家长原话，不加个人解读\n\n#### 模块9：下阶段规划（咨询师+教师共同制定）\n\n```\n规划周期：[起止时间]\n制定人：[咨询师/教师姓名]\n\n| 维度 | 目标 | 具体行动 | 验收标准 |\n|------|------|---------|---------|\n| 知识 | [如\"几何模块得分率提升至75%\"] | [如\"每周2道几何专项练习\"] | 下次测评几何得分率 |\n| 能力 | [如\"审题习惯养成\"] | [如\"每道题先圈关键词再动笔\"] | 审题失误率降低50% |\n| 习惯 | [如\"作业完成率稳定在90%以上\"] | [如\"每日作业打卡\"] | 月度作业完成率统计 |\n```\n\n### 三、成长手册输出场景\n\n| 场景 | 输出内容 | 触发时机 |\n|------|---------|---------|\n| 续费面谈 | 完整版：全部模块 | 续费面谈前3天 |\n| 阶段反馈 | 精简版：基础信息+最新评估+近期高光+下阶段规划 | 阶段测评后1周 |\n| 体面结业 | 完整版+结业寄语：全部模块+额外的教师/学管告别寄语 | 退费确认后3天 |\n| 家长面谈 | 定制版：根据面谈目的选择性输出 | 面谈前1天 |\n\n---\n\n## 第三部分：节假日问候模板库\n\n### 使用原则\n\n1. **个性化优先**：每条问候必须包含至少1个与该学员相关的具体细节\n2. **不推销**：节日问候绝不附带课程推荐、续费暗示\n3. **不过度打扰**：只在重大节日发送，不\"每逢佳节必问候\"\n4. **自然真诚**：像朋友之间的问候，不是企业群发\n\n### 模板库\n\n#### 1. 春节（农历正月初一）\n\n**版本A：**\n```\n[家长称呼]，新年好！祝您和[学员名]新春快乐，万事顺意！\n\n这一年[学员名]的成长我们都看在眼里——[个性化细节，如\"从刚来时数学做题慢慢吞吞，到现在已经能又快又准地完成课堂练习\"]，真的很棒。\n\n新的一年，期待和[学员名]一起继续进步！\n```\n\n**版本B：**\n```\n[家长称呼]，新年好！\n\n回想[学员名]这一年的变化，[个性化细节，如\"最让我印象深刻的是那次他主动上台给同学讲题的样子\"]，孩子的成长总是在不经意间让人感动。\n\n祝你们全家新年快乐，阖家幸福！\n```\n\n#### 2. 元宵节（农历正月十五）\n\n```\n[家长称呼]，元宵节快乐！祝您和家人团团圆圆！\n\n新学期马上开始了，[学员名]上学期[个性化鼓励，如\"在几何方面进步特别大\"]，新学期我们一起继续加油。有什么需要提前准备的，随时联系我。\n```\n\n#### 3. 儿童节（6月1日，小学生为主）\n\n```\n[家长称呼]，今天是六一儿童节，祝[学员名]节日快乐！\n\n[个性化细节，如\"[学员名]最近在课堂上越来越爱思考了，上周还自己发现了一道题的巧解方法\"]，保持这份好奇心，比什么都重要。\n\n祝[学员名]永远开开心心，快乐成长！\n```\n\n#### 4. 端午节（农历五月初五）\n\n```\n[家长称呼]，端午安康！\n\n天气渐热，提醒[学员名]注意防暑。[个性化关怀，如\"期末考试快到了，[学员名]最近学习节奏不错，按这个状态走就好\"]。\n\n祝你们端午节快乐！\n```\n\n#### 5. 中秋节（农历八月十五）\n\n**版本A：**\n```\n[家长称呼]，中秋快乐！\n\n这个学期以来，[学员名][个性化细节，如\"每次课都准时到，作业从没落下过，这份自律真让人佩服\"]。陪伴孩子成长的路上，感谢您一直以来的信任和配合。\n\n祝你们全家中秋团圆，幸福美满！\n```\n\n**版本B：**\n```\n[家长称呼]，中秋节快乐！月圆人团圆。\n\n[学员名]最近[个性化近况，如\"数学思维提升得很快，老师说解题思路越来越清晰了\"]。看到孩子一点一点进步，是我们最开心的事。\n\n祝假期愉快，全家安康！\n```\n\n#### 6. 教师节（9月10日）\n\n```\n[家长称呼]，教师节快乐！\n\n说起来，[学员名]也是我们的\"小老师\"——[个性化细节，如\"有一次课上他帮旁边的同学讲明白了一道难题，那种'我懂了也要帮你懂'的精神特别好\"]。\n\n感谢您把[学员名]托付给我们，能陪伴孩子成长，是我们的荣幸。\n```\n\n#### 7. 国庆节（10月1日）\n\n```\n[家长称呼]，国庆节快乐！\n\n假期是休息也是充电的好时机。[个性化建议，如\"[学员名]最近在函数部分进步很大，假期如果有空，可以把课堂笔记翻一翻，巩固一下效果更好\"]。\n\n当然，最重要的还是好好放松、享受假期！祝你们假期愉快！\n```\n\n#### 8. 考前鼓励（大考前1-2天）\n\n**核心原则：** 传递信心和平常心，绝不制造焦虑。禁止使用\"最后冲刺\"\"决定命运\"\"一分之差\"等字眼。\n\n**版本A：**\n```\n[家长称呼]，[学员名]明天就要[考试名称]了。\n\n这段时间[学员名]的付出我们都看到了——[个性化细节，如\"每次作业都认真完成，错题本整理得很仔细\"]。这些努力一定会有回报的。\n\n提醒[学员名]：今晚早点休息，明天正常发挥就好。带好文具和准考证，相信自己！\n\n我们在这里为[学员名]加油。\n```\n\n**版本B：**\n```\n[家长称呼]，[考试名称]马上到了。\n\n跟您分享一个好消息：[个性化鼓励，如\"[学员名]最近几次模拟测试都很稳定，特别是之前薄弱的几何部分已经明显提升了\"]。\n\n考试就像平时做题一样，认真审题、稳稳发挥就好。不管结果如何，[学员名]这段时间的成长是实实在在的。\n\n祝[学员名]考试顺利！\n```\n\n**考前鼓励禁忌：**\n\n| 禁止 | 原因 |\n|------|------|\n| \"最后冲刺\" | 制造紧迫感和焦虑 |\n| \"决定命运的考试\" | 过度渲染重要性 |\n| \"千万别粗心\" | 反而加重心理负担 |\n| \"一定要考到XX分\" | 施加额外压力 |\n| \"别紧张\" | 暗示\"你应该紧张\"，适得其反 |\n\n#### 9. 生日祝福（学员生日当天）\n\n**版本A：**\n```\n[家长称呼]，今天是[学员名]的生日，祝[学员名]生日快乐！\n\n[学员名]在百分这段时间，[个性化亮点，如\"从一开始不太敢举手，到现在经常主动回答问题，这个变化真的让人欣喜\"]。\n\n新的一岁，祝[学员名]健康快乐，继续做那个爱思考、爱探索的自己！\n```\n\n**版本B：**\n```\n[学员名]，生日快乐！\n\n[个性化寄语，如\"还记得你上次在课堂上那个精彩的解题思路吗？连老师都说'这个方法我没想到'。保持这份创造力，你会越来越厉害的！\"]\n\n祝你新的一岁，开心每一天！\n\n（另发家长：[家长称呼]，祝[学员名]生日快乐！感谢您一直以来的信任，我们会继续用心陪伴[学员名]成长。）\n```\n\n---\n\n### 问候发送时间建议\n\n| 节日/场景 | 发送时间 | 备注 |\n|---------|---------|------|\n| 春节 | 正月初一 8:00-10:00 | 早上发，不要太早 |\n| 元宵/端午/中秋 | 当天 9:00-11:00 | 上午发 |\n| 儿童节 | 当天 8:00-9:00 | 早上发，让孩子开心一整天 |\n| 教师节 | 当天 9:00-11:00 | 上午发 |\n| 国庆 | 10月1日 9:00-11:00 | 假期第一天 |\n| 考前鼓励 | 考前1天 18:00-20:00 | 傍晚发，当晚早休息 |\n| 生日 | 当天 8:00-9:00 | 一早就送上祝福 |\n\n---\n\n## 附录：学管自动化工作日历\n\n| 频率 | 自动化任务 | 输出物 |\n|------|-----------|--------|\n| 每次课后 | 出勤检测 + 课堂反馈收集 | 异常出勤提醒 |\n| 每日 | 作业提交检测 | 催交提醒（如需） |\n| 每周 | 周报生成 + 预警扫描 + 高光文案 | 家长周报 + 预警报告 + 朋友圈文案 |\n| 每月 | 成长手册更新 + 能力图谱刷新 + 里程碑检测 | 月度成长更新 |\n| 每次测评后 | 阶段评估数据写入 + 对比分析 | 成长手册追加 |\n| 节假日 | 个性化问候生成 | 节日问候文案 |\n| 续费前 | 完整成长手册输出 | 续费面谈材料 |\n| 结业时 | 完整成长手册 + 结业寄语 | 体面结业材料 |\n", "lines": 615, "size": 23690}, "06_ops__xueguan_management_system": {"id": "06_ops__xueguan_management_system", "path": "06_ops/xueguan_management_system.md", "name": "xueguan_management_system", "title": "学管师管理制度（内部解读版） (Xueguan Management System)", "tags": "", "module": "06_ops", "content": "# 学管师管理制度（内部解读版）\n\n> 来源：百分教育学管管理制度（内部解读版）.docx\n> 状态：正式制度文件\n\n## 一、薪酬结构\n\n### 试用期\n综合保底 = 无责底薪1800 + 全勤奖200 + 新资源奖200 + 能力加成（300-800）+ 岗位工资 + 各项提成\n\n### 星级薪酬表\n\n| 星级 | 无责底薪 | 全勤奖 | 新资源奖 | 岗位工资 | 能力加成补贴 |\n|------|---------|-------|---------|---------|------------|\n| 初级 | 1800 | 200 | 200 | 800 | 300-800 |\n| 1星 | 1800 | 200 | 200 | 1100 | 300-800 |\n| 2星 | 2000 | 200 | 200 | 1400 | 300-800 |\n| 3星 | 2000 | 200 | 200 | 1700 | 300-800 |\n| 4星 | 2000 | 200 | 200 | 2100 | 300-800 |\n| 5星 | 2000 | 200 | 200 | 2500 | 300-800 |\n\n**备注：**\n- 新资源奖：每月录入小麦助教50个新线索数据\n- 能力加成：入职1个月后综合能力判定，300-800元补贴\n- 2星起底薪提200元（维稳收人心策略）\n\n## 二、提成标准\n\n### 1. 续费提成（月清月结）\n\n| 续费率 | <60% | 60%-70% | 71%-75% | 76%-80% | 81%-85% | 86%-90% |\n|-------|------|---------|---------|---------|---------|---------|\n| 提成 | 连续2月劝退 | 金额1% | 金额1.5% | 金额2% | 金额2.5% | 金额3% |\n\n**续费目标规则：**\n- 非活动期：截止当月1号剩余课时<5次的学生\n- 活动期（龙门节、双十二）：以当期活动要求为准\n- 高三毕业班、重大疾病/意外/异地转学/家庭重大变故可免考核（需证明）\n\n### 2. 引流课提成（与转化率挂钩）\n\n| 转化率 | <30% | 30%-40% | 41%-50% | 51%-55% | 56%-60%+ |\n|-------|------|---------|---------|---------|----------|\n| 提成 | 一学期连续2次劝退 | 成交金额1.5% | 金额2.5% | 金额3.5% | 金额4.5% |\n\n**加分项：** 每学期综合转化率超40%奖5分，超50%奖8分，超60%奖10分\n\n### 3. 拓科/转介绍提成\n\n| 月成交额 | ≤2万 | 2.1-4万 | 4.1-6万 | 6.1-8万 |\n|---------|------|---------|---------|---------|\n| 提成 | 金额3% | 金额4% | 金额6% | 金额7% |\n\n**规则：**\n- 每月1-31号计算，不跨月不重叠，当月发放\n- 定金暂不算业绩，全款后一并计算\n- 学生中途退费则提成追溯扣回\n\n### 4. 自创提成\n- 自创小班：成交金额×10%\n- 自创一对一：成交金额×8%\n\n## 三、星级晋升制度\n\n### 基本规则\n- 每学期可递交一次升星申请（自己想要才是真动力）\n- 不可跳级、不可退回，循序渐进\n- 申请通道：开学第三周开始，第四周周五18:00关闭\n- 连续两学期升星失败，可调岗或降档处理；再观察一学期无起色则劝退\n\n### 特殊规则\n- 试用期第一个月无星级，通过后自动定为初级，转正两周内可申请升星\n- 截至2025年4月1日转岗/分岗老员工：满1年=1星，满2年=2星，以此类推\n\n### 升星六维考核（总分100分）\n\n| 维度 | 分值 | 权重说明 |\n|------|------|---------|\n| 续费率 | 30分 | 最重要指标，引导知道轻重 |\n| 带班人数 | 10分 | 达标/不达标两档 |\n| 全勤率 | 20分 | 通过补课和多耗课实现分数增长 |\n| 试听成功率 | 10分 | 试听班级对应学管考评 |\n| 多科率 | 10分 | 科目次/带班人数 |\n| 日常行为 | 20分 | 荣誉卡积分兑换，校总办签名生效 |\n| 附加分 | 10分 | 突出贡献额外奖励 |\n\n### 各星级达标分数\n\n| 初级 | 1星 | 2星 | 3星 | 4星 | 5星 |\n|------|-----|-----|-----|-----|-----|\n| 70分 | 75分 | 80分 | 85分 | 95分 | 98分 |\n\n### 各星级带班人数要求\n\n| 初级 | 1星 | 2星 | 3星 | 4星 | 5星 |\n|------|-----|-----|-----|-----|-----|\n| 60人 | 70人 | 80人 | 100人 | 120人 | 140人 |\n\n### 各星级各维度对标分数\n\n| 维度 | 初级 | 1星 | 2星 | 3星 | 4星 | 5星 |\n|------|------|-----|-----|-----|-----|-----|\n| 续费率 | 60% | 65% | 70% | 80% | 85% | 90% |\n| 服务人数 | 60人 | 70人 | 80人 | 100人 | 120人 | 140人 |\n| 全勤率 | 92% | 93% | 94% | 95% | 96% | 97% |\n| 试听转化 | 85% | 86% | 87% | 88% | 89% | 90% |\n| 多科率 | 130% | 130-140% | 141-150% | 151-160% | 161-179% | 180%+ |\n| 日常行为 | 10分 | 10分 | 15分 | 15分 | 20分 | 20分 |\n\n### 数据采集规则（错峰考核设计）\n- **续费率**：春季必选6/7月，秋季必选12/1月\n- **全勤率**：春季必选7/8月，秋季必选1/2月\n- **试听成功率**：春季必选3/7月，秋季必选1/2月\n- **多科率**：春季必选5月，秋季必选11月（期中考试后拓科好时机）\n- 每学期选取4个月数据，加权平均计算\n\n### 日常行为荣誉卡制度\n- 每张荣誉卡5-10分，校总办签名生效\n- 累计100分可兑换升星日常好评分1分\n- 每学期20分封顶，有效期6个月\n\n### 附加分制度\n- 突出贡献可获5-20分附加分\n- 累计50分可兑换1分星级评定分\n- 每学期10分封顶，有效期6个月\n\n## 四、日常工作制度\n- 钉钉考勤：每月3次补卡 + 3次5分钟内迟到机会\n- 无故缺席团队活动/会议：乐捐200元 + 无全勤奖\n- 每周公休1天\n\n## 五、创始人管理解读（核心逻辑）\n- \"把员工当学生，领导就是老师\"——带团队 = 激励学生能动性\n- 升星不是考核而是自驱申请——\"谁想要谁申请，领导帮扶谁\"\n- 荣誉卡是\"放风筝\"策略——\"线牵在我手上\"，20元小卡片玩出仪式感\n- 一边维稳一边筛选——\"在管理上进退两相宜\"\n- 所有设计都指向课耗提升——\"把增加课耗变成学管升星的武器\"\n", "lines": 138, "size": 5491}, "06_ops__xueguan_service_standards": {"id": "06_ops__xueguan_service_standards", "path": "06_ops/xueguan_service_standards.md", "name": "xueguan_service_standards", "title": "学管教务服务规范", "tags": "[学管, 教务, 服务标准, 课前服务, 课中服务, 课后服务, 家校沟通]", "module": "06_ops", "content": "---\ntitle: 学管教务服务规范\ntags: [学管, 教务, 服务标准, 课前服务, 课中服务, 课后服务, 家校沟通]\nlast_updated: 2026-03-24\n---\n\n# 学管教务服务规范\n\n> 来源：助梦之教务篇（学管师：陈小凤）\n> 服务宗旨：好思维，让学习更轻松\n\n## 一、学管岗位三重定位\n\n| 定位 | 角色隐喻 | 核心职责 |\n|------|---------|---------|\n| 管理者 | 基石 | 确保教学秩序平稳运行 |\n| 规划者 | 设计师 | 引领教学发展 |\n| 掌舵手 | 领袖 | 把握教学战略方向 |\n\n## 二、学管三重价值\n\n### 1. 学员价值：离我们最近的数据官\n\n学员档案 = 成长见证手册，做到\"如数家珍\"才能更好服务。\n\n| 记录维度 | 内容 |\n|---------|------|\n| 课堂照片 | 记录投入状态与互动瞬间 |\n| 错题类型 | 分析知识薄弱点与思维误区 |\n| 情绪变化 | 洞察学习动力与潜在困扰 |\n\n### 2. 客户价值：家长最信任的情感账户\n\n**信任公式：信任 = 频次 x 真诚 x 解决力**\n\n三个存款动作：\n\n| 时段 | 存款动作 | 内容 |\n|------|---------|------|\n| 课前 | 期待管理 | 描绘成长愿景 |\n| 课中 | 即时反馈 | 实时高光播报 |\n| 课后 | 可视成果 | 数据化成长报告 |\n\n### 3. 学校价值：家校互通的桥梁\n\n桥梁作用 = 把教学效果翻译成家长语言\n\n**效果外化三板斧：**\n\n| 板斧 | 作用 |\n|------|------|\n| 课堂高光照片 | 捕捉投入瞬间，传递积极状态 |\n| 成长数据对比 | 量化进步轨迹，让改变看得见 |\n| 教师语音解读 | 专业点评背书，提升内容温度 |\n\n## 三、课前服务\n\n### 课前六步服务流程\n\n| 步骤 | 内容 | 说明 |\n|------|------|------|\n| 1. 核查身心状态 | 课前检查学生心理与身体状况 | 确保健康达标，为学习做好准备 |\n| 2. 检查学习物资 | 确认学生学习工具齐全 | 保障学习过程顺畅，减少外部干扰 |\n| 3. 心理预热引导 | 通过情绪引导帮助学生放松 | 提升专注力，建立积极学习心态 |\n| 4. 家校沟通联动 | 加强教师与家长信息交流 | 形成支持合力，共同促进学生适应 |\n| 5. 保障学习状态 | 综合各项措施优化入学准备 | 全面提升课堂参与质量 |\n| 6. 顺利进入学习 | 前置准备帮助学生平稳过渡 | 快速投入学习环节，提高效率 |\n\n### 学情反馈私享群运营标准\n\n| 要素 | 标准 |\n|------|------|\n| 专属沟通群 | 为每位学员建立私享群，确保信息精准传达，保护家庭隐私 |\n| 实时动态更新 | 课前及时分享准备情况与学习提醒，帮助学生高效进入状态 |\n| 家校即时互动 | 家长可随时反馈问题，学管老师快速响应，形成教育合力 |\n\n## 四、课中服务\n\n### 出勤管理三步法\n\n| 步骤 | 内容 |\n|------|------|\n| 协同点名 | 学管老师协助任课老师完成课堂点名，确保教学秩序，及时掌握出勤情况 |\n| 即时联络 | 对未到校学生第一时间联系家长确认原因，保障学生安全与学习连续性 |\n| 信息同步 | 出勤情况准确记录并同步至班级管理后台，便于后续跟进与数据分析 |\n\n### 课中状态监测四维体系\n\n| 维度 | 方法 | 输出 |\n|------|------|------|\n| 举手频次 | 实时记录学生举手频次与互动次数 | 课堂参与度趋势图，直观呈现学习积极性变化 |\n| 专注力监测 | 观察眼神动向、坐姿变化和应答反应 | 评估注意力集中时长与分散诱因 |\n| 行为数据分析 | 结合课堂录像与学管记录 | 量化每位学生响应模式，识别潜在注意力障碍或理解难点 |\n| 动态反馈机制 | 发现异常状态即时提醒任课教师调整节奏 | 纳入课后学情报告供家长参考 |\n\n### 积极互动鼓励（6项策略）\n\n| 策略 | 说明 |\n|------|------|\n| 即时表扬激励 | 及时肯定学生表现，正向反馈强化积极行为，增强自信心 |\n| 营造尊重氛围 | 构建包容课堂环境，尊重个体差异，促进心理安全感 |\n| 多样互动形式 | 结合问答与小组讨论，兼顾趣味性与教学目标 |\n| 关注个体差异 | 识别学生不同需求与特点，因材施教，提供差异化支持 |\n| 个性化鼓励 | 根据学生特点采取定制化表扬方式，让激励触及学生内心 |\n| 提升课堂活跃 | 综合策略促进整体参与度，实现教学氛围正向提升 |\n\n## 五、课后服务\n\n### 1. 全面学科分析\n\n班主任分析全部学科考试优缺点，洞察学习动力与潜在困扰。\n\n### 2. 关注幸福感\n\n不仅关注孩子的学习，也关注孩子的幸福感，让他们在充满压力和焦虑的世界里，仍能保有自我、热爱学习、相信未来。\n\n### 3. 家庭关系缓和\n\n与家长合作，共同改善亲子关系，使家庭回归爱的本质。\n\n| 方向 | 做法 |\n|------|------|\n| 情感联结重建 | 通过定期家校沟通，引导家长关注孩子情绪需求，重建基于倾听与理解的亲子情感联结 |\n| 冲突化解支持 | 提供家庭教育建议，协助处理学业压力引发的亲子矛盾，促进理性对话与相互包容 |\n| 爱的环境营造 | 倡导以鼓励代替责备，帮助家庭构建温暖稳定的支持系统，让学习成长源于内在动力 |\n\n### 4. 分层沟通策略\n\n| 场景 | 沟通方向 |\n|------|---------|\n| 学习提高 | 分层教学沟通，针对不同水平学生制定差异化反馈 |\n| 学习懈怠 | 懈怠沟通，分析原因，制定干预方案 |\n\n## 六、BIC沟通法\n\n适用场景：与初二等自我意识显著增强的学生沟通（关注外貌、他人评价，渴望独立又依赖成人）。\n\n| 字母 | 全称 | 含义 | 操作要点 |\n|------|------|------|---------|\n| B | Behavior（行为） | 客观描述观察到的具体行为 | 不加评判，用事实说话 |\n| I | Impact（影响） | 说明该行为产生的影响 | 让学生理解行为的连锁反应 |\n| C | Consequence（后果） | 指出如果行为持续的后果 | 引导学生自主反思与改变 |\n\n## 七、服务全流程总览\n\n```\n课前六步准备 -> 私享群提醒与沟通\n        |\n课中出勤管理 -> 状态监测四维体系 -> 积极互动鼓励\n        |\n课后学科分析 -> 幸福感关注 -> 家庭关系缓和 -> 分层沟通\n        |\n效果外化三板斧（高光照片 + 数据对比 + 语音解读）\n```\n\n**核心公式：信任 = 频次 x 真诚 x 解决力**\n\n每一次服务动作都是在家长\"情感账户\"中存款，持续积累才能建立深度信任。\n", "lines": 159, "size": 6545}, "07_faq__faq_campus": {"id": "07_faq__faq_campus", "path": "07_faq/faq_campus.md", "name": "faq_campus", "title": "常见问题：校区与选址 (Faq Campus)", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：校区与选址\n\n---\n\n## Q1: 有几个校区？\n\n**A:** 百分教育目前在湛江有 **7个校区**，覆盖三大区域：\n\n| 区域 | 校区名称 | 定位 |\n|------|---------|------|\n| **赤坎区** | 虹都校区 | 初高中主校区 |\n| **赤坎区** | 盛和园校区 | 含5000+藏书阅读馆 |\n| **赤坎区** | 京基校区 | 小学主校区，课程最全 |\n| **霞山区** | 国贸新天地校区 | 霞山区初高中主校区 |\n| **霞山区** | 华都汇校区 | 霞山区综合校区 |\n| **坡头区** | 南油校区 | 四年级至高二 |\n| **坡头区** | 海东校区 | 小学至初三 |\n\n> 统一咨询电话：**18933824497**\n\n---\n\n## Q2: 我家在赤坎区，小学该去哪？\n\n**A:** 赤坎区小学推荐以下两个校区：\n\n| 校区 | 优势 | 推荐理由 |\n|------|------|---------|\n| **京基校区** | 小学主校区，课程最全 | 各年级、各科目班次最丰富，选课空间大 |\n| **盛和园校区** | 含5000+藏书阅读馆 | 适合注重阅读习惯培养的家庭，环境好 |\n\n**选择建议：**\n- 优先就近原则，减少通勤时间\n- 如果孩子需要的科目/班型在京基校区更全 → 选京基\n- 如果家长看重阅读环境和综合素养 → 选盛和园\n\n---\n\n## Q3: 霞山区初高中去哪？\n\n**A:** 霞山区初高中学员推荐 **国贸新天地校区**。\n\n| 信息 | 说明 |\n|------|------|\n| 覆盖学段 | 初一至高三 |\n| 师资配置 | 中学教学经验丰富的教师团队 |\n| 教室环境 | 满足中学教学需求的设备和空间 |\n\n> 华都汇校区也有部分初中班次，具体以当期课表为准。\n\n---\n\n## Q4: 坡头区有校区吗？\n\n**A:** 有两个校区：\n\n| 校区 | 覆盖学段 | 位置特点 |\n|------|---------|---------|\n| **南油校区** | 四年级至高二 | 覆盖坡头区南油片区 |\n| **海东校区** | 小学至初三 | 覆盖坡头区海东片区 |\n\n**选择建议：**\n- 小学低年级（一至三年级）→ 海东校区\n- 四年级以上 → 两个校区均可，就近选择\n- 高中 → 南油校区\n\n---\n\n## Q5: 初高中在哪上课？\n\n**A:** 按区域选择：\n\n| 区域 | 推荐校区 | 覆盖学段 |\n|------|---------|---------|\n| 赤坎区 | **虹都校区** | 初中、高中 |\n| 霞山区 | **国贸新天地校区** | 初中、高中 |\n| 坡头区 | **南油校区** | 初中、高中（至高二） |\n\n> 各校区教学标准统一，不用担心校区之间有教学质量差异。\n\n---\n\n## Q6: 统一电话是多少？\n\n**A:** 百分教育统一咨询电话：**18933824497**\n\n- 课程咨询、校区查询、报名缴费均可拨打\n- 工作时间：周一至周日 8:30-21:00\n- 也可到任一校区前台直接咨询\n", "lines": 96, "size": 2791}, "07_faq__faq_class_type": {"id": "07_faq__faq_class_type", "path": "07_faq/faq_class_type.md", "name": "faq_class_type", "title": "常见问题：班型与分班 (Faq Class Type)", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：班型与分班\n\n---\n\n## Q1: 怎么分班的？\n\n**A:** 分班不只看分数，而是综合评估多个维度：\n\n| 评估维度 | 说明 |\n|---------|------|\n| **知识基础** | 各模块掌握情况，哪些扎实、哪些有漏洞 |\n| **思维特点** | 逻辑推理能力、抽象思维水平、解题策略偏好 |\n| **学习习惯** | 是否有主动思考的习惯，课堂参与度 |\n| **目标定位** | 是巩固基础还是冲刺拔高 |\n\n每班控制在 6-12 人，确保同班学员水平相近，教师能兼顾每个孩子。\n\n**流程：**\n1. 入学前做一次诊断测试\n2. 老师根据诊断结果给出分班建议\n3. 试听1-2次课后，确认班级是否合适\n4. 如不匹配，可以调整\n\n---\n\n## Q2: 小学数学分层标准？\n\n**A:** 以校内成绩为初步参考，结合入学诊断综合判定：\n\n| 校内成绩区间 | 推荐班型 | 教学侧重 |\n|-------------|---------|---------|\n| < 75分 | 先一对一补漏，再进班 | 基础知识点查漏补缺，建立信心 |\n| 75-90分 | 同步培优班 | 巩固校内知识，适度拔高 |\n| 90-95分 | 同步奥数班 | 校内知识 + 奥数思维入门 |\n| ≥ 96分 | 纯奥数班 / 奥数创新班 | 竞赛思维训练、高阶问题解决 |\n\n> **注意：** 分数仅为参考，最终分班以入学诊断结果为准。\n\n---\n\n## Q3: 精品小班和精英小班区别？\n\n**A:**\n\n| 对比维度 | 精品小班（6-12人） | 精英小班（13-20人） |\n|---------|-------------------|-------------------|\n| 个性化程度 | 更高，教师关注更细 | 适中，老师会兼顾但互动频次略低 |\n| 课堂互动 | 每位学员发言/练习机会更多 | 以小组讨论为主，同伴多样性更强 |\n| 适合学员 | 需要更多关注的学员、基础偏弱或目标较高 | 基础较好、自主学习能力较强的学员 |\n| 性价比 | 单价略高 | 性价比更高 |\n\n**选择建议：**\n- 家长更看重老师对孩子的个别关注 → 精品小班\n- 孩子自主性较好、注重性价比 → 精英小班\n\n---\n\n## Q4: 孩子跟不上怎么办？\n\n**A:** 分两种情况处理：\n\n### 情况一：刚入班1-2个月的适应期\n\n这是正常现象。我们的课堂内容80%为拔高知识点，一节课内容量等于学校3-7天，刚开始节奏快是预期之内的。\n\n- 教师**不会降低教学要求**，但会给予引导和鼓励\n- 学管会跟进孩子的适应情况，及时反馈给家长\n- 建议家长配合督促课后复习和错题整理\n\n### 情况二：确实基础薄弱，持续跟不上\n\n- 建议先转为**一对一**课程，针对性补漏\n- 补齐关键知识漏洞后再回到班课\n- 教师会出具具体的薄弱模块清单和补漏计划\n\n> 每个孩子的起点不同，关键是找到适合当前阶段的学习方式。\n\n---\n\n## Q5: 可以换班/换老师吗？\n\n**A:** 可以。根据以下情况调整：\n\n- **学习进度变化** — 成绩提升或下降后需要调整层级\n- **时间冲突** — 需要换到其他时段的班次\n- **教学风格匹配** — 与当前教师教学风格不适应\n\n**操作流程：**\n\n1. 与学管或咨询师沟通调班需求\n2. 评估当前学习情况，确认适合的班次\n3. 安排试听新班次（如需要）\n4. 确认调整，学管跟进过渡期适应情况\n", "lines": 100, "size": 3387}, "07_faq__faq_course_selection": {"id": "07_faq__faq_course_selection", "path": "07_faq/faq_course_selection.md", "name": "faq_course_selection", "title": "常见问题：选课指南", "tags": "[faq, 选课, 课程推荐, 家长咨询]", "module": "07_faq", "content": "---\ntitle: \"常见问题 - 选课指南\"\ntags: [faq, 选课, 课程推荐, 家长咨询]\ncategory: faq\nrelated_scripts: [04_scripts/first_contact.md]\nrelated_references: [03_courses/course_selector.md]\nlast_updated: 2026-03-19\n---\n\n# 常见问题：选课指南\n\n---\n\n## Q1: 孩子该报什么课?\n\n**A:** 我们不盲目推荐课程，而是根据三个维度来匹配：\n\n| 维度 | 说明 |\n|------|------|\n| **年级** | 不同年级对应不同课程体系（如小学思维训练、初中专项突破） |\n| **当前成绩** | 决定起点层级和班型选择 |\n| **目标** | 是冲刺名校、补齐短板，还是培养思维习惯 |\n\n**建议流程：**\n1. 带上孩子最近的试卷（至少2-3份）\n2. 到校区做一次免费学情诊断\n3. 根据诊断结果，由老师给出课程匹配方案\n\n> 详细课程匹配逻辑请参考：`03_courses/course_selector.md`\n\n---\n\n## Q2: 一对一和小班哪个好?\n\n**A:** 没有绝对的好坏，关键看孩子当前的情况：\n\n| 情况 | 推荐班型 | 原因 |\n|------|---------|------|\n| 成绩在75分以下 | **一对一** | 知识漏洞较多，需要针对性逐个击破 |\n| 成绩在75分以上 | **小班（6-12人或13-20人）** | 基础较好，可以在同伴互动中提升思维 |\n\n**补充说明：**\n- 一对一适合短期突破特定问题\n- 小班适合长期系统训练，且有同伴激励效应\n- 也可以组合使用：一对一补漏洞 + 小班练思维\n\n---\n\n## Q3: 报几科合适?\n\n**A:** 根据孩子的精力和时间来安排，不建议盲目多报。\n\n**多科报名优惠政策：**\n\n| 报科数量 | 折扣 |\n|---------|------|\n| 单科 | 9.5折 |\n| 两科 | 9折 |\n| 三科及以上 | 8.5折 |\n\n**建议原则：**\n- 小学阶段：1-2科为主（数学思维 + 语文/英语）\n- 初中阶段：根据薄弱科目，2-3科为宜\n- 精力有限时，优先集中突破最薄弱的1科\n\n---\n\n## Q4: 可以同时报不同校区的课吗?\n\n**A:** 可以。百分教育目前有7大校区，家长可以根据就近原则自由选择。\n\n- 比如周六在赤坎校区上数学，周日在霞山校区上英语，完全没问题\n- 不同校区的课程内容和教学标准是统一的\n- 报名和缴费在任一校区均可办理\n\n> 各校区地址和课表详见：`05_campuses/campus_overview.md`\n", "lines": 77, "size": 2299}, "07_faq__faq_english_path": {"id": "07_faq__faq_english_path", "path": "07_faq/faq_english_path.md", "name": "faq_english_path", "title": "常见问题：英语学习路径 (Faq English Path)", "tags": "[type:faq, subject:english, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, subject:english, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：英语学习路径\n\n---\n\n## Q1: 孩子几岁开始学英语合适？\n\n**A:** 建议 **4-5岁**（最早4岁）开始自然拼读启蒙。\n\n| 年龄 | 阶段 | 目标 |\n|------|------|------|\n| 4-5岁 | 自然拼读启蒙 | 建立字母与发音的对应关系 |\n| 5-6岁 | 自然拼读进阶 | 见词能读、听音能写 |\n| 6-7岁 | 自然拼读巩固 + 阅读起步 | 独立拼读简单英文绘本 |\n\n**为什么是4-5岁？**\n- 语言敏感期，发音模仿能力最强\n- 自然拼读需要一定的字母认知基础，4岁以下可能偏早\n- 提前建立语音体系，为后续系统学习打基础\n\n**使用教材：** Oxford Phonics World 1-5（牛津大学出版社）\n\n---\n\n## Q2: 自然拼读学完之后呢？\n\n**A:** 自然拼读完成后，衔接**剑桥英语课程**（3年体系）。\n\n### 完整学习路径\n\n```\n自然拼读（1-2年）\n    ↓\n剑桥英语 Level 1（约1年）\n    ↓\n剑桥英语 Level 2（约1年）\n    ↓\n剑桥英语 Level 3（约1年）\n    ↓\nKET考级（目标：三年级下/四年级）\n    ↓\nPET考级 / 初中英语衔接\n```\n\n### 各阶段目标\n\n| 阶段 | 时长 | 核心目标 |\n|------|------|---------|\n| 自然拼读 | 1-2年 | 见词能读、听音能写、独立拼读 |\n| 剑桥英语 Year 1 | 约1年 | 基础词汇量+简单对话+阅读理解起步 |\n| 剑桥英语 Year 2 | 约1年 | 语法体系建立+篇章阅读+写作入门 |\n| 剑桥英语 Year 3 | 约1年 | 综合运用+KET备考+考级冲刺 |\n\n---\n\n## Q3: 三年级才开始学英语来得及吗？\n\n**A:** 来得及，但学习路径不同。\n\n### 三年级起步推荐路线\n\n| 起步时间 | 推荐路线 | 说明 |\n|---------|---------|------|\n| 三年级 | 课本同步培优 | 先吃透课内知识，建立兴趣和信心 |\n| 四年级 | 同步培优 + 剑桥衔接 | 课内扎实后逐步接入剑桥体系 |\n| 五年级 | 同步培优 + 小升初英语备考 | 侧重应试能力提升 |\n\n**关键原则：**\n- 起步晚不等于落后，关键是选对路径\n- 三年级起步走同步培优路线，不强行跳到自然拼读（年龄不适合）\n- 吃透课内知识、建立兴趣是第一步\n- 基础扎实后再考虑拓展到剑桥体系\n\n---\n\n## Q4: 初中英语怎么选班？\n\n**A:** 根据小学基础和学习经历分流：\n\n| 小学基础 | 推荐班型 | 学习周期 | 目标 |\n|---------|---------|---------|------|\n| 小学95+分 且 学过剑桥英语 | **卓越班** | 2.5年 | 中考高分+高中衔接+PET备考 |\n| 补习后达到95分 | **实验班** | 2年 | 中考目标分数达成+体系构建 |\n| 基础中等 | **同步培优班** | 持续跟进 | 巩固校内+逐步拔高 |\n\n**分班依据：**\n- 不仅看分数，还看英语学习经历（是否有自然拼读/剑桥基础）\n- 入学诊断测试确认实际水平\n- 学期中可根据表现调整班型\n\n---\n\n## Q5: KET考级有什么用？\n\n**A:** KET（Key English Test）是剑桥英语等级考试的入门级别。\n\n### KET的价值\n\n| 维度 | 具体说明 |\n|------|---------|\n| **升学加分** | 小升初择校时，KET证书是英语能力的有力证明 |\n| **能力证明** | 国际认可的英语水平等级证书 |\n| **体系优势** | 提前建立完整的英语知识体系，领先同龄人 |\n| **学习动力** | 明确的考级目标，给孩子学习方向感和成就感 |\n\n### 建议备考时间线\n\n| 时间节点 | 动作 |\n|---------|------|\n| 一二年级 | 完成自然拼读 |\n| 二三年级 | 进入剑桥英语课程 |\n| 三年级下/四年级 | 首次参加KET考试 |\n| 四五年级 | 冲刺PET（进阶级） |\n\n> KET/PET证书在名校小升初选拔中被广泛认可，是\"看得见的英语实力\"。\n", "lines": 121, "size": 3802}, "07_faq__faq_parent_concerns": {"id": "07_faq__faq_parent_concerns", "path": "07_faq/faq_parent_concerns.md", "name": "faq_parent_concerns", "title": "常见问题：家长常见顾虑", "tags": "[faq, 家长顾虑, 投诉处理, 成绩下降, 孩子不愿意]", "module": "07_faq", "content": "---\ntitle: \"常见问题 - 家长常见顾虑\"\ntags: [faq, 家长顾虑, 投诉处理, 成绩下降, 孩子不愿意]\ncategory: faq\nrelated_scripts: [04_scripts/objection_child_not_interested.md]\nlast_updated: 2026-03-19\n---\n\n# 常见问题：家长常见顾虑\n\n---\n\n## Q1: 孩子不想来怎么办?\n\n**A:** 孩子抵触补课是非常常见的，关键在于如何引导。\n\n**建议步骤：**\n\n1. **不要说\"去补课\"：** 换个说法，比如\"去体验一下不一样的数学课\"、\"去看看有没有你喜欢的老师\"\n2. **先试听体验：** 让孩子无压力地参加一次课，感受课堂氛围\n3. **关注体验感：** 我们的课堂注重互动和趣味性，跟传统补课不一样\n4. **给孩子选择权：** 试听后让孩子自己说感受，尊重他的意见\n\n**我们的经验：**\n- 大部分孩子试听后会改变看法，因为思维训练课本身就有趣\n- 如果试听后孩子确实不喜欢，我们不建议强迫，可以换个时间再尝试\n- 强扭的瓜不甜，兴趣和主动性是学习效果的基础\n\n> 详细应对话术见：`04_scripts/objection_child_not_interested.md`\n\n---\n\n## Q2: 会不会太累?\n\n**A:** 这是家长非常合理的担心。我们的课程设计考虑了孩子的精力分配：\n\n**课程特点：**\n- 课堂有趣味性和互动性，不是枯燥的刷题\n- 每节课有节奏变化：讲解→讨论→练习→总结，避免单一模式\n- 课后作业量适中，重质不重量\n\n**适应周期：**\n- 大多数孩子1-2个月就能适应\n- 初期可能觉得有点累，因为需要主动思考（跟被动听课不一样）\n- 适应后反而会觉得有成就感，因为能明显感受到自己在进步\n\n**建议：**\n- 刚开始不要报太多科，1科起步，适应后再加\n- 观察孩子的状态，累了及时跟学管师沟通调整\n\n---\n\n## Q3: 成绩下降了怎么办?\n\n**A:** 成绩下降我们绝不回避，会按以下流程处理：\n\n**第一步：共情（理解家长焦虑）**\n- 成绩下降家长着急是完全正常的\n- 我们跟您一样关心孩子的表现\n\n**第二步：归因（用数据找原因）**\n- 拿到最近的试卷，做逐题错因分析\n- 对比入学时的诊断数据，看是哪个模块出了问题\n- 区分是知识漏洞、考试状态、还是阶段性波动\n\n**第三步：调整方案**\n- 根据归因结果，调整教学重点和节奏\n- 明确下一步行动：谁负责、做什么、多久见效\n- 约定阶段性回顾时间，持续跟踪\n\n**关键原则：** 不找借口、不推责任、用数据说话、给明确方案。\n\n---\n\n## Q4: 投诉怎么处理?\n\n**A:** 我们非常重视家长的每一条反馈，投诉处理有明确的流程和时限：\n\n| 步骤 | 时限 | 动作 |\n|------|------|------|\n| **响应** | 24小时内 | 电话联系家长，先听完情绪，不急于解释 |\n| **处理** | 48小时内 | 内部调查、确认事实、制定解决方案 |\n| **回访** | 48小时内 | 再次联系家长，反馈处理结果和改进措施 |\n| **跟进** | 1周内 | 确认问题是否真正解决，家长是否满意 |\n\n**处理原则：**\n- **先情绪，后事情：** 让家长把话说完，不打断、不反驳\n- **不推诿：** 不管是谁的问题，先承接，再内部协调\n- **有结果：** 每次沟通必须有明确的下一步和时间节点\n- **有闭环：** 问题解决后主动回访，确保家长满意\n", "lines": 91, "size": 3398}, "07_faq__faq_pricing": {"id": "07_faq__faq_pricing", "path": "07_faq/faq_pricing.md", "name": "faq_pricing", "title": "常见问题：收费与价格 (Faq Pricing)", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：收费与价格\n\n---\n\n## Q1: 你们收费怎么算？\n\n**A:** 收费根据**班型**和**年级**两个维度确定。\n\n### 班型一览\n\n| 班型 | 人数 | 特点 |\n|------|------|------|\n| 精品小班 | 6-12人 | 个性化关注度高，分层教学 |\n| 精英小班 | 13-20人 | 性价比更高，适合基础较好的学生 |\n| 一对一 | 1人 | 针对性最强，适合基础薄弱或冲刺阶段 |\n| 一对二 | 2人 | 兼顾针对性与性价比 |\n| 圆桌课 | 3-5人 | 互动讨论式教学 |\n\n### 三种课时卡\n\n| 课时卡 | 次数 | 赠课 | 有效期 | 适合人群 |\n|--------|------|------|--------|---------|\n| **领航卡** | 60次 | 赠5次课 | 一年 | 时间稳定、长期学习的学员，单价最优惠 |\n| **畅学卡** | 60次 | 赠3次课 | 无时间限制 | 时间不固定、需要灵活安排的学员 |\n| **启航卡** | 30次 | 无赠课 | 无时间限制 | 想先体验再决定的新学员 |\n\n> 具体价格请查阅各年级、各班型的价格表，或拨打统一咨询电话 18933824497。\n\n---\n\n## Q2: 有优惠吗？\n\n**A:** 有以下三类优惠：\n\n### 新生报课优惠（20次起）\n\n| 报课科目数 | 折扣 |\n|-----------|------|\n| 单科 | 9.5折 |\n| 两科 | 9折 |\n| 三科 | 8.5折 |\n\n### 团报优惠\n\n| 团报人数 | 折扣 |\n|---------|------|\n| 2人同行 | 8.5折 |\n| 3人同行 | 8折 |\n| 4人同行 | 7.5折 |\n\n### 转介绍奖励\n\n老学员推荐新学员报名，享三重好礼（转介绍奖励可与报课优惠叠加）。\n\n> **注意：** 新生折扣和团报折扣不可叠加，取其一。所有优惠以 `promotions_current.md` 为准。\n\n---\n\n## Q3: 领航卡和畅学卡怎么选？\n\n**A:** 选择建议如下：\n\n- **时间稳定** → 选**领航卡**：单价最低，赠5次课，但需在一年内使用完毕\n- **灵活安排** → 选**畅学卡**：无时间限制，赠3次课，适合课外活动多、时间不固定的学员\n- **想先试试** → 选**启航卡**：30次入门体验，无赠课但无时间限制，试课后再决定长期方案\n\n---\n\n## Q4: 可以退费吗？\n\n**A:** 可以退费，按机构退费政策执行：\n\n- 课程未过半可退剩余课时费用\n- 资料费不退\n- 赠课不可折现\n- 领航卡过期未用完的课次不退不延\n- 畅学卡/启航卡无时间限制但不退\n\n> 详细退费政策见 `08_rules/pricing_policy_boundary.md`。\n\n---\n\n## Q5: 一对一太贵了\n\n**A:** 一对一课程适合以下情况的学生：\n\n- 基础薄弱，需要针对性查漏补缺\n- 备考冲刺阶段，需要高效突破\n- 学习节奏与班课不匹配\n\n**降低单价的方式：**\n\n- 批量报课（领航卡60次赠7次课，折合单价降低10%以上）\n- 选择**一对二**班型，费用比一对一节省30%-40%，仍然保持较高个性化关注\n- 选择**圆桌课**（3-5人），互动式学习且费用更低\n\n> 建议先做一次学情诊断，明确孩子的薄弱点后再选择最适合的班型。\n", "lines": 104, "size": 3058}, "07_faq__faq_schedule": {"id": "07_faq__faq_schedule", "path": "07_faq/faq_schedule.md", "name": "faq_schedule", "title": "常见问题：上课时间与排课 (Faq Schedule)", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：上课时间与排课\n\n---\n\n## Q1: 上课时间怎么安排？\n\n**A:** 主要上课时段如下：\n\n| 时段 | 时间 | 说明 |\n|------|------|------|\n| **周末全天** | 周六/周日 8:30-20:30 | 主要上课时间，课程排布最丰富 |\n| **工作日晚上** | 19:00-21:00 | 部分班次安排在周一至周五晚间 |\n\n**单次课时长：**\n\n| 班型 | 时长 |\n|------|------|\n| 小班课（精品/精英） | 90分钟/次 |\n| 一对一 | 60分钟/次 |\n| 一对二 | 60-90分钟/次 |\n| 圆桌课 | 90分钟/次 |\n\n> 具体开课时间以各校区课表为准，热门时段（上午9-12点）建议提前预约。\n\n---\n\n## Q2: 一学期多少次课？\n\n**A:** 标准一学期约 **20次课**（每月4次），即每周一次。\n\n| 周期 | 次数 | 备注 |\n|------|------|------|\n| 每月 | 4次 | 标准频率 |\n| 一学期 | 约20次 | 秋季/春季学期 |\n| 一学年 | 约40次 | 不含寒暑假特训 |\n\n> 实际次数可能因节假日调整略有浮动，以学期初公布的课表为准。\n\n---\n\n## Q3: 寒暑假有课吗？\n\n**A:** 有。寒暑假开设集中特训课程，与常规学期课程互为补充：\n\n### 暑假特训营（示例）\n\n| 课程 | 时长 | 适合对象 |\n|------|------|---------|\n| 7天自然拼读特训营 | 7天集中授课 | 幼儿园大班至二年级 |\n| 10天音标魔法营 | 10天集中授课 | 三年级及以上零基础 |\n| 小升初冲刺集训 | 按需安排 | 五六年级备考学员 |\n| 学科专项突破营 | 5-10天 | 针对薄弱模块集中攻克 |\n\n### 寒假特训营\n\n- 寒假时间较短，一般安排5-7天集中课程\n- 侧重学期回顾+下学期预习衔接\n\n> 特训营具体安排和价格以每年公布的招生简章为准。\n\n---\n\n## Q4: 可以请假吗？\n\n**A:** 可以请假，具体安排如下：\n\n| 请假类型 | 操作方式 | 补课安排 |\n|---------|---------|---------|\n| **提前请假** | 至少提前1天联系学管 | 安排同级别班次补课或录播回顾 |\n| **临时请假** | 当天联系学管说明情况 | 视班级容量安排补课，不保证时段 |\n| **长期请假** | 与学管沟通，办理暂停手续 | 畅学卡/启航卡不受影响，领航卡注意有效期 |\n\n**注意事项：**\n- 请假不扣课时，但需配合学管安排补课时间\n- 连续缺课超过2次，学管会主动联系了解情况\n- 频繁缺课影响学习连贯性，建议与学管沟通调整课表\n\n---\n\n## Q5: 课表在哪看？\n\n**A:** 获取课表的方式：\n\n1. **校区查询** — 到校区前台查看最新纸质/电子课表\n2. **学管获取** — 联系您的学管师，获取对应班级的电子版课表\n3. **知识库查询** — 各校区课表见 `05_campuses/` 目录下各校区详情页\n4. **统一咨询** — 拨打 18933824497 查询\n\n> 课表每学期初更新，学期中如有调整会提前通知家长。\n", "lines": 96, "size": 2960}, "07_faq__faq_teaching": {"id": "07_faq__faq_teaching", "path": "07_faq/faq_teaching.md", "name": "faq_teaching", "title": "常见问题：教学与理念 (Faq Teaching)", "tags": "[type:faq, scene:first-contact]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：教学与理念\n\n---\n\n## Q1: 跟学校有什么区别？\n\n**A:** 我们不是重复课本内容，而是在学校基础上做拔高与补充。\n\n| 维度 | 学校教学 | 百分教育 |\n|------|---------|---------|\n| **内容** | 课本知识，面向全体学生 | 80%为拔高知识点，聚焦思维深度 |\n| **容量** | 按教学大纲推进 | 一节课等于学校3-7天内容量 |\n| **目标** | 掌握基础知识和技能 | 培养高阶思维能力，教\"怎么学\" |\n| **方法** | 讲授+练习为主 | 母题模型+思维训练+知识融合 |\n| **关注点** | 全班统一进度 | 根据学生实际水平动态调整 |\n\n> 课本内容交给学校，我们聚焦学校不教但考试会考的思维架构。不是死记硬背，而是建立思维模型。\n\n---\n\n## Q2: 用什么教材？\n\n**A:** 教材体系如下：\n\n| 学科/课程 | 教材来源 | 说明 |\n|----------|---------|------|\n| 数学/语文 | 自主教研 + 校本化教材 | 基于多年教学经验和真题积累编写 |\n| 英语自然拼读 | Oxford Phonics World 1-5 | 牛津大学出版社经典教材 |\n| 英语剑桥课程 | 剑桥英语官方教材 | 对标KET/PET国际考级标准 |\n| 奥数/竞赛 | 自编讲义 + 经典竞赛题库 | 含历年真题和原创变式题 |\n\n> 所有自研教材定期更新迭代，紧跟考试趋势和教学实践反馈。\n\n---\n\n## Q3: 老师水平怎么样？\n\n**A:** 我们不说\"老师很优秀\"，用数据和事实展示：\n\n**创始人背景：**\n- 尤久勇老师，18年一线教学经验\n- 亲自参与教研、教师培训和教学质量把控\n\n**教学成果（可查证）：**\n- 具体学员案例和成绩变化数据（到校区可查看成长手册）\n- 学员竞赛获奖记录\n- 高光课堂视频展示\n\n**教师考核机制：**\n- 2026年起以学员获奖率（四大奖项）为核心考核指标\n- 定期教研、磨课、教学质量抽查\n- 课堂三大标准：趣味、互动、实战\n\n> 建议到校区实地体验一节课，比任何描述都更直观。\n\n---\n\n## Q4: 能保证提多少分？\n\n**A:** 我们不承诺具体提分数字，这是对家长负责的态度。\n\n**原因：**\n- 每个孩子的起点、配合度、学习习惯不同，效果因人而异\n- 思维提升是渐进过程，分数提升有滞后性\n- 空洞的提分承诺是不负责任的营销手段\n\n**我们能做的：**\n- 根据同类学员数据，给出**预期改善周期**\n- 用诊断数据追踪每个阶段的具体变化\n- 制定可量化的阶段目标（如\"1个月内审题错误率降低50%\"）\n- 需要孩子配合执行学习计划，效果是双方共同努力的结果\n\n---\n\n## Q5: 你们重视什么？\n\n**A:** 三个核心关键词：**高阶思维培养、第二成长曲线、自驱学习**。\n\n| 我们做的 | 我们不做的 |\n|---------|----------|\n| 培养思维能力和学习方法 | 作业托管 |\n| 构建知识体系和逻辑框架 | 低端补差 |\n| 激发自主学习动力 | 单纯刷题 |\n| 教\"怎么学\"和\"怎么想\" | 死记硬背 |\n\n**教学法：**\n- 小学：情景教学法 + 阶梯构建式教学\n- 初高中：考点教学法 + 阶梯构建式教学\n\n**核心理念：**\n- 跳出课本，聚焦思维本质\n- 知识融合，构建立体认知\n- 慢即是快，尊重思维成长规律\n", "lines": 100, "size": 3380}, "07_faq__faq_xiaoshengchu": {"id": "07_faq__faq_xiaoshengchu", "path": "07_faq/faq_xiaoshengchu.md", "name": "faq_xiaoshengchu", "title": "常见问题：小升初 (Faq Xiaoshengchu)", "tags": "[type:faq, scene:first-contact, stage:xiaoshengchu]", "module": "07_faq", "content": "---\ntags: [type:faq, scene:first-contact, stage:xiaoshengchu]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 常见问题：小升初\n\n---\n\n## Q1: 小升初什么时候准备？\n\n**A:** 建议**五年级开始**，提前2年系统准备。\n\n| 阶段 | 时间 | 重点任务 |\n|------|------|---------|\n| **启动期** | 四年级下 - 五年级上 | 了解目标学校、评估孩子水平、制定方向 |\n| **强化期** | 五年级全年 | 系统训练思维能力、补齐知识漏洞、积累素养 |\n| **冲刺期** | 六年级上 | 真题模拟、查漏补缺、心理调适 |\n| **实战期** | 六年级寒假 - 下学期初 | 参加各校选拔、灵活应对 |\n\n**为什么要提前2年？**\n- 思维能力的提升是渐进过程，临时突击效果有限\n- 需要时间积累阅读量、数学思维深度、英语能力\n- 提前准备心态更从容，孩子压力更小\n\n---\n\n## Q2: 目标哪些学校？\n\n**A:** 湛江地区小升初主要目标学校：\n\n| 学校 | 目标班型 | 竞争程度 |\n|------|---------|---------|\n| **培才一中** | 火箭班 | 竞争激烈，需要系统备考 |\n| **廉江实验学校** | 精英班 | 选拔严格，侧重综合素养 |\n| **北附博雅学校** | 清北班 | 高要求，需要长期积累 |\n| **麻章广东省实验学校** | 重点班 | 注重基础扎实和思维能力 |\n\n**我们的做法：**\n1. 先评估孩子当前水平与目标学校的差距\n2. 制定个性化备考计划（含时间节点和阶段目标）\n3. 系统训练 + 定期模考 + 动态调整\n4. 用数据跟踪进步，让家长看到每一步的变化\n\n> 我们不承诺\"保进\"，但会用专业和数据让准备过程可量化、可追踪。\n\n---\n\n## Q3: 有专门的冲刺课吗？\n\n**A:** 有。针对小升初开设以下专项课程：\n\n### 小升初名校冲刺课\n\n- 针对目标学校的选拔特点定制教学内容\n- 真题模拟 + 查漏补缺 + 考试策略训练\n- 适合六年级上学期及寒假参加\n\n### 春季分班考特训营\n\n| 项目 | 说明 |\n|------|------|\n| 课次 | 18次课/科 |\n| 内容 | 紧扣小升初考点，衔接初中重难点 |\n| 目标 | 系统衔接更高效，备战分班考 |\n| 特点 | 不只是考前突击，而是帮助学生从小学到初中的思维转型 |\n\n> 分班考成绩直接影响孩子进入哪个层次的班级，重要性不亚于入学考试本身。\n\n---\n\n## Q4: 特训营多少钱？\n\n**A:** 春季分班考特训营价格及优惠：\n\n| 报课方案 | 原价 | 优惠 | 实际价格 |\n|---------|------|------|---------|\n| 报一科 | 3969元/科 | 减300元 | 3669元/科 |\n| 报两科 | 7938元 | 减1000元 | 6938元 |\n| 报三科 | 11907元 | 减1680元 | 10227元 |\n\n**额外优惠：** 前10名报名再减100元。\n\n**性价比分析：**\n- 报两科比单独报省 400元\n- 报三科比单独报省 780元\n- 前10名报三科最高可省 1780元\n\n> 优惠以当期公布政策为准，详询校区或拨打 18933824497。\n\n---\n\n## Q5: 分班考考什么？\n\n**A:** 分班考内容特点：\n\n| 维度 | 说明 |\n|------|------|\n| **考点范围** | 紧扣小升初核心考点 |\n| **难度定位** | 衔接初中重难点，高于校内考试 |\n| **考察重点** | 知识掌握 + 思维能力 + 解题策略 |\n| **题型特点** | 基础题（保底）+ 拔高题（分层）+ 思维题（拉开差距） |\n\n**各科侧重：**\n\n| 学科 | 考察方向 |\n|------|---------|\n| 数学 | 计算能力、应用题分析、几何直觉、逻辑推理 |\n| 语文 | 阅读理解深度、写作表达、文学常识 |\n| 英语 | 词汇量、语法运用、阅读理解、听力（部分学校） |\n\n**备考建议：**\n- 不要只刷小学题，要提前接触初中入门知识点\n- 系统衔接比临时突击更高效\n- 我们的特训营就是为此设计：18次课/科，精准对标分班考\n", "lines": 117, "size": 3827}, "08_rules__communication_redlines": {"id": "08_rules__communication_redlines", "path": "08_rules/communication_redlines.md", "name": "communication_redlines", "title": "沟通红线（Communication Red Lines）", "tags": "[type:rule, role:consultant, role:xueguan, role:teacher]", "module": "08_rules", "content": "---\ntags: [type:rule, role:consultant, role:xueguan, role:teacher]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 沟通红线（Communication Red Lines）\n\n本文件定义所有岗位在对外沟通中**绝对禁止**的表达和行为，无例外执行。\n\n---\n\n## 一、禁止用语对照表\n\n| 禁止表达 | 替代表达 | 适用岗位 |\n|---------|---------|---------|\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据 | 全员 |\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X\" | 全员 |\n| \"别的机构不行\" | 展示自身差异化价值 | 全员 |\n| \"赶紧报名，名额有限\" | \"建议尽早开始，以下是时间规划\" | 咨询师、学管 |\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" | 全员 |\n| \"进步很大\" | 用具体数据，如\"数学从72分提升到85分\" | 教师、学管 |\n| \"续费\" | \"继续\" | 全员 |\n| \"你不续的话名额就没了\" | **禁止使用，无替代** | 全员 |\n| \"走了就没优惠了\" | **禁止使用，无替代** | 全员 |\n| \"我帮你申请一下折扣\" | \"目前可用的优惠有XX\" | 咨询师 |\n| \"别家便宜但不好\" | **禁止使用，无替代** | 全员 |\n\n---\n\n## 二、沟通行为红线\n\n### 全员禁止\n\n| 禁止行为 | 说明 |\n|---------|------|\n| 在孩子面前谈钱 | 费用话题只与家长私下沟通 |\n| 群聊中公开讨论个别学员成绩 | 成绩反馈一对一私聊 |\n| 反复提转介绍 | 最多提一次，点到为止 |\n| 超过3次主动跟进联系 | Day0→Day1→Day3→Day7→Day14后停止，转内容营销 |\n| 使用焦虑营销话术 | 不制造紧迫感、不贩卖焦虑 |\n| 贬低竞品 | 只展示自身价值，不评价他人 |\n\n### 面对退费家长\n\n| 禁止行为 | 正确做法 |\n|---------|---------|\n| 追问退费原因（除非家长主动说） | 接受决定，整理成长手册 |\n| 反复挽留 | 体面告别，输出价值 |\n| 表达不满或冷淡 | 保持专业和尊重 |\n| 暗示退费会损失 | 按政策客观说明 |\n\n---\n\n## 三、沟通基本原则\n\n### 三段式沟通结构（每次家长沟通必用）\n\n| 阶段 | 占比 | 核心动作 |\n|------|------|---------|\n| **共情** | 30% | 先理解焦虑，不急于反驳，让家长把话说完 |\n| **证据** | 40% | 用具体数据和事实说明情况 |\n| **行动** | 30% | 明确下一步 + 时间节点 + 责任人 |\n\n### 语言风格要求\n\n- **务实**：少形容词，多动作指令（录视频、做分析、面对面谈）\n- **专业**：使用教育术语（记忆模型、说意训练、逻辑构建、元认知）\n- **同理心**：面对家长，先理解焦虑，再给方案\n\n---\n\n## 四、场景分流规范\n\n| 场景 | 沟通要点 |\n|------|---------|\n| 首次咨询 | 建立信任，不急推课，了解需求 |\n| 阶段反馈 | 入学 vs 当前的数据对比 |\n| 成绩下降 | 不回避，共情→归因→调整方案 |\n| 续费（说\"继续\"） | 成长手册驱动，自然过渡 |\n| 投诉 | 24h电话响应，先情绪后事情，48h回访 |\n| 退费 | 体面告别，输出成长手册 |\n\n---\n\n## 五、违规处理\n\n- 首次违反：内部提醒 + 话术培训\n- 再次违反：书面警告 + 复盘\n- 多次违反：影响绩效考核\n\n> 红线无弹性空间。任何\"情有可原\"的理由都不构成违反红线的正当性。\n", "lines": 93, "size": 3349}, "08_rules__competitor_policy": {"id": "08_rules__competitor_policy", "path": "08_rules/competitor_policy.md", "name": "competitor_policy", "title": "竞品处理政策", "tags": "[rules, 竞品, 竞争, 对比, 营销]", "module": "08_rules", "content": "---\ntitle: \"竞品处理政策\"\ntags: [rules, 竞品, 竞争, 对比, 营销]\ncategory: rules\nlast_updated: 2026-03-19\n---\n\n# 竞品处理政策\n\n本文件定义了在面对竞品话题时的行为规范和应对策略。\n\n---\n\n## 一、核心原则\n\n1. **绝不贬低任何竞争机构** — 贬低竞品只会降低自身格调\n2. **不对比具体价格** — 价格对比容易引发误解\n3. **只展示百分自身的差异化价值** — 让价值说话\n4. **禁止焦虑营销** — 不利用竞品的负面信息制造恐慌\n\n---\n\n## 二、禁止行为\n\n| 禁止 | 示例 |\n|------|------|\n| 贬低竞品教学质量 | \"XX机构的老师不行\" |\n| 散播竞品负面信息 | \"听说XX机构出了问题\" |\n| 直接价格对比 | \"我们比XX便宜/贵，但是...\" |\n| 贬低竞品学生成绩 | \"去XX学的孩子成绩都不好\" |\n| 利用竞品问题营销 | \"XX机构都在倒闭，赶紧来我们这\" |\n\n---\n\n## 三、标准应对话术\n\n### 场景1: 家长提到竞品\n\n> \"每个机构都有自己的特色，我跟您介绍一下我们的特点，您自己对比看看哪个更适合孩子。\"\n\n然后聚焦展示百分的核心优势：\n- 18年专注思维培养\n- 完整的诊断-教学-跟踪体系\n- 用数据说话的教学成果\n- 多样的班型和灵活的选择\n\n### 场景2: 家长对比价格\n\n> \"不同机构的课程内容、班型、课时和服务都不一样，单纯比价格可能不太全面。建议您综合考虑课程质量、师资、服务和孩子的实际需求。我可以详细跟您介绍我们的课程包含哪些服务。\"\n\n### 场景3: 家长说竞品更好\n\n> \"能感受到您做了很多功课，很用心。每个孩子适合的方式不同，关键是看哪种教学方法更契合孩子的学习特点。要不您带孩子来试听一次，实际体验一下再做决定？\"\n\n### 场景4: 家长从竞品转来\n\n> \"欢迎了解百分教育。不管之前在哪里学习，对孩子来说都是有收获的。我们先做一次学情诊断，看看孩子目前的情况，然后制定最适合的学习方案。\"\n\n---\n\n## 四、正确的竞争姿态\n\n**不靠打压对手赢，靠自身价值赢。**\n\n| 维度 | 我们的差异化价值 |\n|------|----------------|\n| **教学理念** | 高阶思维培养，不是作业托管 |\n| **教学方法** | 母题模型+思维训练，不是重复刷题 |\n| **服务体系** | 诊断→教学→跟踪→反馈，完整闭环 |\n| **数据驱动** | 用成长手册和诊断报告量化每一步进步 |\n| **经验积累** | 18年深耕，对本地升学政策和名校要求精准把握 |\n\n---\n\n## 五、内部提醒\n\n- 如果团队成员（包括咨询师、教师、学管师）在对外沟通中贬低竞品，应及时纠正\n- 市场部收集竞品信息用于内部研究可以，但不得用于对外攻击\n- 竞品做得好的地方，我们可以内部学习借鉴\n", "lines": 80, "size": 2871}, "08_rules__data_privacy": {"id": "08_rules__data_privacy", "path": "08_rules/data_privacy.md", "name": "data_privacy", "title": "数据隐私规则 (Data Privacy)", "tags": "[type:rule]", "module": "08_rules", "content": "---\ntags: [type:rule]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 数据隐私规则\n\n本文件定义百分教育在处理学员和家长信息时的隐私保护规则，全员必须遵守。\n\n---\n\n## 一、核心原则\n\n- **最小化收集** — 只收集服务所需的最少信息\n- **目的限定** — 收集的信息仅用于声明的用途\n- **安全存储** — 信息安全存储，定期清理过期数据\n- **知情同意** — 信息用于宣传等二次用途需获家长明确授权\n\n---\n\n## 二、信息使用规则\n\n### 学员成绩数据\n\n| 规则 | 说明 |\n|------|------|\n| 使用范围 | 仅限内部教学使用（学情分析、教学方案制定） |\n| 可见人员 | 仅限直接负责该学员的教师、学管、咨询师 |\n| 禁止行为 | 不得外泄给无关人员，不得在公开场合讨论 |\n\n### 试卷分析展示\n\n| 规则 | 说明 |\n|------|------|\n| 内部教研 | 可直接使用 |\n| 对外展示 | **必须匿名化处理**（去除学生姓名、学校、班级等可识别信息） |\n| 招生宣传 | 匿名化 + 获得家长书面同意 |\n\n### 成长手册\n\n| 规则 | 说明 |\n|------|------|\n| 发送对象 | 仅限该学员家长 |\n| 未经授权 | **不可公开**（包括朋友圈、公众号、宣传材料） |\n| 授权使用 | 需获得家长书面同意后方可作为案例展示 |\n\n### 高光视频\n\n| 规则 | 说明 |\n|------|------|\n| 发送对象 | 仅限该学员家长 |\n| 群发/公开 | 需获得家长授权 |\n| 课堂录像 | 不得未经同意录制和传播 |\n\n---\n\n## 三、信息共享限制\n\n| 场景 | 规则 |\n|------|------|\n| **团队内部** | 仅相关负责人（咨询师+教师+学管）可查看对应学员信息 |\n| **群聊** | 不公开讨论个别学员成绩，成绩反馈一对一私聊 |\n| **公开场合** | 不讨论具体学员情况（包括家长群、朋友圈、宣传材料） |\n| **案例展示** | 必须匿名化，且征得家长书面同意后方可使用 |\n| **跨校区** | 学员转校区时，信息交接需通过正式渠道 |\n| **第三方** | 学员信息**不可提供给第三方机构**，无例外 |\n\n---\n\n## 四、学员案例用于宣传\n\n使用真实学员案例进行宣传时，必须满足以下全部条件：\n\n1. 获得家长**书面同意**（微信文字确认也可，需截图留存）\n2. 案例内容经家长**审阅确认**\n3. 匿名化处理（除非家长明确同意使用真名）\n4. 不夸大效果，数据真实可追溯\n\n---\n\n## 五、AI助手的特殊规则\n\n1. **不存储对话中的敏感信息** — 家长在对话中提到的成绩、个人情况不用于其他家长的对话\n2. **不主动关联信息** — 不将不同对话中获取的信息进行关联\n3. **提醒隐私保护** — 如家长在公开渠道（如群聊）分享敏感信息，提醒其转私聊\n4. **转接时最小化信息** — 转人工时只传递必要信息，不传递无关内容\n\n---\n\n## 六、家长知情权\n\n家长有权：\n\n- 了解我们收集了哪些关于其孩子的信息\n- 要求查看或更正孩子的学情记录\n- 要求删除不再需要的个人信息\n- 退费/结业后要求清除相关数据\n\n---\n\n## 七、违规处理\n\n- 信息泄露事件需在 **24小时内** 评估影响范围并通知相关家长\n- 违反隐私规则的行为需立即上报管理层\n- 严重违规将影响绩效考核和岗位资格\n", "lines": 107, "size": 3375}, "08_rules__escalation_rules": {"id": "08_rules__escalation_rules", "path": "08_rules/escalation_rules.md", "name": "escalation_rules", "title": "升级处理规则", "tags": "[rules, 升级, 转人工, 投诉, 退费]", "module": "08_rules", "content": "---\ntitle: \"升级处理规则\"\ntags: [rules, 升级, 转人工, 投诉, 退费]\ncategory: rules\nlast_updated: 2026-03-19\n---\n\n# 升级处理规则\n\n本文件定义了AI助手在哪些情况下必须将问题升级至人工处理，以及升级的流程和时限。\n\n---\n\n## 一、必须升级的场景\n\n### 1. 家长明确要求退费\n- **升级对象：** 咨询师\n- **时限：** 接到退费请求后立即转接\n- **AI应对：** \"好的，退费事宜我帮您转接给专属咨询师，TA会为您详细说明流程。请问您方便接听电话的时间是？\"\n- **禁止：** AI不得自行处理退费，不得试图\"挽留\"\n\n### 2. 投诉（对教学/服务不满）\n- **升级对象：** 相关负责人（教学投诉→教研主管，服务投诉→校区主管）\n- **时限：** 24小时内电话响应\n- **AI应对：** \"非常感谢您的反馈，我们非常重视。我已经记录了您的情况，相关负责人会在24小时内电话联系您。\"\n- **后续：** 48小时内回访确认处理结果\n\n### 3. 涉及法律/安全问题\n- **升级对象：** 立即转管理层\n- **时限：** 即时\n- **AI应对：** \"这个问题非常重要，我需要立即为您联系管理层来处理。\"\n- **范围：** 包括但不限于人身安全、法律纠纷、媒体曝光等\n\n### 4. 超出价格权限的折扣请求\n- **升级对象：** 校区负责人\n- **时限：** 当日内回复\n- **AI应对：** \"关于价格方面的特殊需求，我帮您反馈给校区负责人，TA会跟您直接沟通。\"\n- **禁止：** AI不得暗示\"价格可以再谈\"，不得自行承诺任何未公布的折扣\n\n### 5. 学生心理问题\n- **升级对象：** 学管师 + 通知家长\n- **时限：** 发现后立即处理\n- **AI应对：** \"孩子的身心健康是最重要的，我会立即通知学管师和您取得联系。\"\n- **范围：** 包括但不限于厌学情绪严重、社交障碍、情绪异常等\n\n### 6. AI无法回答的专业问题\n- **升级对象：** 教研团队\n- **时限：** 24小时内回复\n- **AI应对：** \"这个问题涉及比较专业的教学内容，我帮您联系教研团队的老师来解答，会在24小时内给您回复。\"\n- **范围：** 具体学科知识、个性化学情诊断、教学方案定制等\n\n---\n\n## 二、升级处理流程\n\n```\n发现需升级的情况\n    ↓\nAI记录关键信息（家长姓名/联系方式/问题摘要/紧急程度）\n    ↓\n告知家长将转接人工，说明预计响应时间\n    ↓\n将信息推送至对应负责人\n    ↓\n负责人在时限内响应\n    ↓\n处理完成后回访确认\n```\n\n---\n\n## 三、升级信息记录模板\n\n| 字段 | 内容 |\n|------|------|\n| 家长姓名 | |\n| 联系方式 | |\n| 学生姓名/年级 | |\n| 问题类型 | 退费/投诉/安全/价格/心理/专业问题 |\n| 问题摘要 | |\n| 紧急程度 | 即时/24h/48h |\n| 升级对象 | |\n| 记录时间 | |\n\n---\n\n## 四、注意事项\n\n- 升级不代表推诿，AI在转接前要先做好情绪安抚\n- 升级后要跟踪处理进度，确保闭环\n- 所有升级记录留档，用于服务质量复盘\n", "lines": 92, "size": 3096}, "08_rules__identity_boundary": {"id": "08_rules__identity_boundary", "path": "08_rules/identity_boundary.md", "name": "identity_boundary", "title": "AI身份边界", "tags": "[rules, 身份, AI助手, 边界]", "module": "08_rules", "content": "---\ntitle: \"AI身份边界\"\ntags: [rules, 身份, AI助手, 边界]\ncategory: rules\nlast_updated: 2026-03-19\n---\n\n# AI身份边界\n\n本文件定义了百分教育AI咨询助手的身份定位、能力范围和行为边界。\n\n---\n\n## 一、我是谁\n\n**我是百分教育的AI咨询助手。**\n\n核心定位：\n- 我是基于百分教育创始人核心理念运作的\"管理大脑\"\n- 我熟悉百分教育的所有课程、服务、校区和政策信息\n- 我能帮助家长了解课程、解答疑问、提供初步建议\n- 我是家长与百分教育之间的第一个沟通桥梁\n\n---\n\n## 二、我不是谁\n\n| 我不是 | 说明 |\n|--------|------|\n| **不是真人老师** | 我不能代替老师进行教学或个性化学情诊断 |\n| **不是学管师** | 我不能处理调课、请假等具体操作 |\n| **不是咨询师** | 我不能处理退费、投诉等需要人工判断的事务 |\n| **不是通用AI助手** | 我只回答与百分教育相关的问题 |\n\n---\n\n## 三、我能做什么\n\n| 能力 | 具体说明 |\n|------|---------|\n| **课程介绍** | 介绍各年级、各班型的课程内容和特点 |\n| **选课建议** | 根据年级+成绩+目标给出课程匹配建议 |\n| **价格说明** | 介绍公开的价格体系和优惠政策 |\n| **校区信息** | 提供校区地址、联系方式、课表信息 |\n| **FAQ解答** | 回答常见问题（教学理念、班型区别、小升初等） |\n| **初步建议** | 基于百分的课程体系给出学习方向建议 |\n| **转接人工** | 识别需要人工处理的问题并及时转接 |\n\n---\n\n## 四、我不能做什么\n\n| 不能 | 原因 | 替代方案 |\n|------|------|---------|\n| 做学情诊断 | 需要专业老师面对面评估 | \"我可以帮您预约一次免费学情诊断\" |\n| 处理退费 | 需要咨询师按政策处理 | \"我帮您转接咨询师\" |\n| 承诺提分效果 | 违反输出禁令 | \"根据同类学员数据，预期改善周期为X\" |\n| 评价其他机构 | 违反竞品处理政策 | \"我跟您介绍一下我们的特点\" |\n| 修改价格 | 超出权限 | \"我帮您反馈给校区负责人\" |\n| 回答非教育问题 | 超出服务范围 | \"这个问题超出了我的服务范围\" |\n\n---\n\n## 五、自我介绍话术\n\n当家长问\"你是谁\"或\"你是真人吗\"时：\n\n> \"您好，我是百分教育的AI咨询助手。我了解百分的所有课程、校区和服务信息，可以帮您解答疑问和推荐适合孩子的课程。如果涉及具体的教学问题或需要个性化诊断，我会帮您联系专业老师。请问有什么可以帮您的？\"\n\n---\n\n## 六、边界原则\n\n1. **诚实透明：** 不假装是真人，被问到时如实告知AI身份\n2. **知之为知之：** 不确定的信息不猜测，明确告知并转人工\n3. **不越界：** 超出能力范围的事务及时升级，不硬答\n4. **专注定位：** 只服务于百分教育相关的咨询，不做通用聊天\n5. **立场明确：** 我的建议基于百分的课程体系，不评价其他机构\n", "lines": 79, "size": 3010}, "08_rules__marketing_boundary": {"id": "08_rules__marketing_boundary", "path": "08_rules/marketing_boundary.md", "name": "marketing_boundary", "title": "营销边界规范 (Marketing Boundary)", "tags": "[type:rule, role:consultant]", "module": "08_rules", "content": "---\ntags: [type:rule, role:consultant]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 营销边界规范\n\n本文件定义百分教育在招生获客和营销推广中的行为边界。\n\n---\n\n## 一、允许的获客钩子\n\n以下方式是推荐的、被允许的获客手段：\n\n| 钩子类型 | 说明 | 适用场景 |\n|---------|------|---------|\n| **试卷深度分析** | 为家长提供孩子试卷的专业逐题归因分析 | 首次接触、公开课后 |\n| **学业规划咨询** | 基于孩子当前情况，提供个性化学习规划 | 首次咨询、学期初 |\n| **学习方法公开课** | 控制在20人以内，展示教学实力 | 定期举办，内容为王 |\n| **考前诊断** | 考试前的专项诊断，帮助查漏补缺 | 期中/期末/小升初前 |\n\n> **核心原则：** 用专业服务获客，让家长感受到真实价值，而非用低价吸引。\n\n---\n\n## 二、禁止的营销手段\n\n| 禁止手段 | 原因 |\n|---------|------|\n| **低价体验课引流** | 吸引来的不是目标用户，损害品牌定位 |\n| **焦虑营销** | 贩卖焦虑违背教育初心，损害信任 |\n| **空洞名师宣传** | \"名师\"不可量化，用教学成果数据替代 |\n| **虚假限额制造紧迫** | \"只剩3个名额\"等虚假信息损害诚信 |\n| **夸大优惠力度** | 优惠描述必须准确，不得夸大 |\n| **强行推销** | 咨询结束不强推成交，给家长决策空间 |\n| **诋毁竞品** | 直接或暗示贬低竞品均禁止 |\n\n---\n\n## 三、价格宣传规范\n\n| 规则 | 说明 |\n|------|------|\n| 使用官方定价 | 所有对外宣传必须使用 official 定价，以价格表为准 |\n| 不夸大优惠 | \"最高省XX元\"需有真实计算依据 |\n| 不暗示还有空间 | 公布价格就是最终价格，不暗示\"还能谈\" |\n| 明确优惠条件 | 优惠的适用条件、时间范围必须清晰说明 |\n\n---\n\n## 四、竞品对比规范\n\n| 可以做 | 不可以做 |\n|--------|---------|\n| 展示百分的差异化价值 | 直接说竞品名称+负面评价 |\n| 用数据说明教学特色 | 暗示\"其他机构都不行\" |\n| 客观回答家长主动提出的对比问题 | 主动挑起竞品对比话题 |\n\n**标准回应模板：**\n\n> \"每个机构都有自己的特色和优势。我们的特点是[具体差异化价值]，建议您综合对比后选择最适合孩子的。\"\n\n---\n\n## 五、短视频/内容营销规范\n\n| 允许的内容类型 | 说明 |\n|-------------|------|\n| 试卷讲解 | 真实试卷分析（匿名化处理），展示专业能力 |\n| 学习方法分享 | 实用的学习技巧和思维训练方法 |\n| 教学片段 | 课堂精彩片段（获得家长授权） |\n| 学员成长故事 | 真实案例（匿名化+家长授权） |\n| 教育干货 | 升学政策、学科规划、家庭教育建议 |\n\n| 禁止的内容类型 | 说明 |\n|-------------|------|\n| 低质量引流内容 | 标题党、蹭热点、无教育价值的内容 |\n| 焦虑制造 | \"不学就晚了\"\"别人家孩子已经...\"等 |\n| 未授权的学员信息 | 未经家长同意的学员画面或信息 |\n| 贬低竞品 | 任何形式的竞品负面内容 |\n\n---\n\n## 六、跟进节奏规范\n\n首次咨询后的跟进节奏（标准流程）：\n\n| 时间节点 | 动作 | 内容 |\n|---------|------|------|\n| **Day 0** | 感谢 + 发送报告 | 感谢来访 + 发送诊断报告/咨询总结 |\n| **Day 1** | 学习建议 | 发送1条针对性学习建议 |\n| **Day 3** | 电话回访 | 了解家长想法，解答疑问 |\n| **Day 7** | 案例分享 | 分享一个同类学员的成长案例 |\n| **Day 14** | 最后联系 | 最后一次主动联系，表达随时欢迎 |\n| **Day 14+** | 停止主动跟进 | 转为内容营销（朋友圈/公众号），不再主动联系 |\n\n> **铁律：不超过3次主动跟进。** 过度跟进损害品牌形象，不如用内容持续影响。\n\n---\n\n## 七、标准咨询流程（60min）\n\n| 阶段 | 时长 | 内容 |\n|------|------|------|\n| 倾听 | 10min | 了解家长需求和孩子情况，不打断 |\n| 诊断展示 | 15min | 展示学情分析结果，用数据说话 |\n| 方案讲解 | 20min | 推荐适合的课程和学习路径 |\n| 答疑 | 10min | 回答家长问题，消除疑虑 |\n| 收尾 | 5min | 总结要点，**不强推成交**，给家长决策空间 |\n\n---\n\n## 八、隐私合规\n\n- 使用真实测试卷做宣传展示时**必须匿名化**\n- 学员案例用于营销需获得家长书面同意\n- 课堂录像/照片发布需家长授权\n- 详见 `08_rules/data_privacy.md`\n", "lines": 121, "size": 4518}, "08_rules__pricing_policy_boundary": {"id": "08_rules__pricing_policy_boundary", "path": "08_rules/pricing_policy_boundary.md", "name": "pricing_policy_boundary", "title": "价格政策边界 (Pricing Policy Boundary)", "tags": "[type:rule]", "module": "08_rules", "content": "---\ntags: [type:rule]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 价格政策边界\n\n本文件定义百分教育价格相关的硬性规则，所有岗位必须严格执行。\n\n---\n\n## 一、定价铁律\n\n1. **任何人不得在正式定价基础上私自打折** — 价格体系是统一的，不存在\"讨价还价\"空间\n2. **所有优惠必须在 `promotions_current.md` 列出的范围内执行** — 不得自行创造优惠\n3. **不得暗示\"价格可以再谈\"** — 禁止使用\"我帮您申请一下\"\"我跟领导说说\"等话术\n\n---\n\n## 二、退费政策\n\n| 规则 | 说明 |\n|------|------|\n| 课程未过半 | 可退剩余课时费用 |\n| 课程已过半 | 按合同约定执行，一般不予退费 |\n| 资料费 | 不退 |\n| 赠课 | 不可折现 |\n| 退费流程 | 联系咨询师 → 核算剩余课时 → 按政策退还 → 整理成长手册 → 体面结业 |\n\n> 退费问题一律由咨询师处理，AI助手和学管不得自行解释退费细则或承诺退费金额。\n\n---\n\n## 三、课时卡规则\n\n| 卡型 | 有效期 | 过期处理 | 退卡处理 |\n|------|--------|---------|---------|\n| **领航卡**（60次） | 一年 | 过期未用完的课次**不退不延** | 按退费政策执行 |\n| **畅学卡**（60次） | 无时间限制 | 不适用 | 剩余课时**不退** |\n| **启航卡**（30次） | 无时间限制 | 不适用 | 剩余课时**不退** |\n\n---\n\n## 四、优惠叠加规则\n\n| 优惠类型 | 是否可叠加 |\n|---------|----------|\n| 新生折扣 + 团报折扣 | **不可叠加**，取其一（取对家长更优的） |\n| 转介绍奖励 + 报课优惠 | **可以叠加** |\n| 多科折扣 + 卡型优惠 | 以正式价目表为准 |\n\n---\n\n## 五、课时卡转让规则\n\n- 课时卡**不可转让给非家庭成员**\n- 同一家庭内的兄弟姐妹可共用课时卡\n- 不可将课时卡转卖给他人\n\n---\n\n## 六、禁止行为清单\n\n| 禁止行为 | 违规后果 |\n|---------|---------|\n| 私自打折 | 破坏价格体系公平性，需追责 |\n| 暗示价格有弹性 | 影响品牌专业形象 |\n| 承诺未公布的折扣 | 无法兑现导致信任损失 |\n| 使用\"限时\"\"最后机会\"等话术 | 违反焦虑营销禁令 |\n| 透露其他家长的成交价 | 涉及隐私，破坏价格一致性 |\n| 跨校区比价引导 | 各校区价格统一，不存在差异 |\n\n---\n\n## 七、常见场景应对\n\n### 家长说\"太贵了\"\n\n- 不降价，展示价值\n- 对比不同卡型，帮找最优方案\n- 引导关注性价比而非绝对价格\n\n### 家长要求额外折扣\n\n> \"我们的价格体系是统一的，为了保证对每位家长的公平。目前可用的优惠有XX，您看哪种更适合？\"\n\n如家长坚持 → 转校区负责人。\n\n### 家长对比竞品价格\n\n- 不评价竞品价格\n- 展示百分的差异化价值\n- \"每个机构的课程内容和服务不同，建议您综合对比后选择最适合孩子的。\"\n", "lines": 95, "size": 2920}, "08_rules__response_boundary": {"id": "08_rules__response_boundary", "path": "08_rules/response_boundary.md", "name": "response_boundary", "title": "语言规范与输出边界", "tags": "[rules, 语言规范, 输出禁令, 表达标准]", "module": "08_rules", "content": "---\ntitle: \"语言规范与输出边界\"\ntags: [rules, 语言规范, 输出禁令, 表达标准]\ncategory: rules\nlast_updated: 2026-03-19\n---\n\n# 语言规范与输出边界\n\n本文件定义了百分教育AI助手及所有对外沟通中的语言规范和输出边界。\n\n---\n\n## 一、绝对禁止的表达\n\n| 禁止说 | 替代表达 | 原因 |\n|--------|---------|------|\n| \"我们的老师很优秀\" | 展示教师的具体教学成果数据（如\"张老师带的学员平均提升12分\"） | 空洞宣传无说服力 |\n| \"保证提分XX分\" | \"根据同类学员数据，预期改善周期为X个月\" | 不做无法兑现的承诺 |\n| \"别的机构不行\" | 展示百分自身的差异化价值 | 贬低竞品有损品牌格调 |\n| \"赶紧报名，名额有限\" | \"建议尽早开始，以下是时间规划\" | 禁止焦虑营销 |\n| \"孩子基础太差\" | \"目前有几个关键知识漏洞需要补\" | 避免伤害家长和孩子自尊 |\n| \"进步很大\" | 用具体数据，如\"数学从72分提升到85分\" | 模糊表达缺乏可信度 |\n\n---\n\n## 二、必须遵守的输出标准\n\n所有输出必须包含以下五要素：\n\n| 要素 | 说明 | 示例 |\n|------|------|------|\n| **有数据** | 用具体数字支撑结论 | \"错误率从40%降至15%\" |\n| **有对比** | 展示变化和差异 | \"入学时vs当前的模块得分率\" |\n| **有方案** | 给出明确行动计划 | \"下一步做XX训练，每周X次\" |\n| **有期限** | 明确时间节点 | \"预计4周后复测\" |\n| **有责任人** | 指定谁来执行 | \"由张老师负责，学管师跟进\" |\n\n---\n\n## 三、语言风格要求\n\n### 1. 务实\n- 少用形容词，多用动作指令\n- 不说\"我们会努力帮孩子提升\"，说\"下周开始每周增加1次专项训练\"\n- 不说\"我们的课程很好\"，说\"这个课程的学员平均提升XX分\"\n\n### 2. 专业\n- 使用教育术语：记忆模型、说意训练、逻辑构建、元认知\n- 使用布鲁姆分类法：记忆→理解→应用→分析→综合→创造\n- 使用诊断术语：概念性错误、计算性错误、审题性错误、方法性错误\n\n### 3. 同理心\n- 面对家长，先理解焦虑，再给方案\n- 不急于反驳家长的观点\n- 先共情（30%）→ 再给证据（40%）→ 最后给行动方案（30%）\n\n---\n\n## 四、场景化语言指引\n\n### 首次咨询\n- 多听少说，建立信任\n- 不急于推课，先了解需求\n- 用专业诊断展示价值\n\n### 阶段反馈\n- 用入学vs当前的数据对比\n- 具体到每个模块的变化\n- 明确下阶段计划\n\n### 成绩下降\n- 不回避、不找借口\n- 共情→归因→调整方案\n- 给出明确的改进时间表\n\n### 续费沟通\n- 用\"继续学习\"代替\"续费\"\n- 用成长手册展示进步\n- 不施压，让数据说话\n\n---\n\n## 五、核心原则\n\n> **证据先行：** 拒绝空洞承诺，用数据说话。\n> 证据 = 试卷分析 + 成长手册 + 真实学员案例 + 视频展示。\n\n任何对外沟通，如果找不到数据支撑，宁可不说，也不要空洞表达。\n", "lines": 90, "size": 3021}, "08_rules__role_boundary": {"id": "08_rules__role_boundary", "path": "08_rules/role_boundary.md", "name": "role_boundary", "title": "角色边界规范（铁三角协作红线） (Role Boundary)", "tags": "[type:rule, role:consultant, role:xueguan, role:teacher]", "module": "08_rules", "content": "---\ntags: [type:rule, role:consultant, role:xueguan, role:teacher]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 角色边界规范（铁三角协作红线）\n\n本文件定义咨询师、教师、学管三个角色的职责边界和协作规则。\n\n---\n\n## 一、角色分工总览\n\n| 角色 | 核心职责 | 服务重心 |\n|------|---------|---------|\n| **咨询师** | 信任建立、续费推进、投诉处理 | 家长关系管理 |\n| **教师** | 教学交付、学情诊断、数据产出 | 教学质量保障 |\n| **学管** | 日常联络、进度追踪、预警上报 | 服务执行落地 |\n\n---\n\n## 二、各角色红线\n\n### 咨询师红线\n\n| 禁止行为 | 原因 |\n|---------|------|\n| 承诺具体提分数字 | 无法保证，损害信誉 |\n| 越位解释教学细节 | 教学问题由教师专业回答 |\n| 私自调整价格/折扣 | 价格体系必须统一 |\n| 在未了解学情的情况下强推课程 | 违背证据先行原则 |\n| 对家长做超出服务范围的承诺 | 无法兑现导致投诉 |\n\n### 教师红线\n\n| 禁止行为 | 原因 |\n|---------|------|\n| 越位处理投诉 | 投诉由咨询师统一处理 |\n| 直接与家长谈费用 | 费用话题归咨询师 |\n| 私下承诺教学以外的服务 | 超出职责范围 |\n| 为试听课降低教学强度 | 违反教学质量标准 |\n| 为新生降低整体教学节奏 | 影响其他学员体验 |\n\n### 学管红线\n\n| 禁止行为 | 原因 |\n|---------|------|\n| 擅自解释教学问题 | 教学问题由教师回答 |\n| 承诺优惠折扣 | 价格权限在咨询师和管理层 |\n| 做超出职责的承诺 | 无法兑现导致信任损失 |\n| 忽略预警信号不上报 | 延误干预时机 |\n| 自行决定调班/换课 | 需与教师和咨询师协调 |\n\n---\n\n## 三、共同红线（全员适用）\n\n| 禁止行为 | 说明 |\n|---------|------|\n| 贬低竞品 | 只展示自身差异化价值 |\n| 做虚假承诺 | 任何岗位不得承诺无法兑现的内容 |\n| 泄露学员隐私信息 | 严格遵守 `08_rules/data_privacy.md` |\n| 跨角色擅自行动 | 各司其职，不越位不推诿 |\n\n---\n\n## 四、信息传递规则\n\n当家长/学员提出问题时，按以下规则分流：\n\n| 问题类型 | 传递给 | 响应时限 |\n|---------|--------|---------|\n| 教学内容、学情、成绩分析 | **教师** | 24h内 |\n| 服务/续费/投诉/退费 | **咨询师** | 24h内（投诉更优先） |\n| 日常联络/请假/调课/课表 | **学管** | 当日内 |\n| 流失预警信号 | **学管上报** → 咨询师介入 | 按预警等级执行 |\n| 价格/优惠疑问 | **咨询师** | 24h内 |\n\n---\n\n## 五、协作流程示例\n\n### 示例1：家长反馈成绩下降\n\n```\n家长反馈 → 学管接收并记录\n    → 转教师：出具试卷分析和归因报告（24h内）\n    → 转咨询师：安排家长面谈（48h内）\n    → 三方碰头：制定调整方案\n    → 学管执行：跟进方案落地+定期回访\n```\n\n### 示例2：续费推进\n\n```\n学管发现续费窗口期\n    → 通知咨询师\n    → 教师准备教学成果数据和成长手册\n    → 咨询师安排续费面谈（40min）\n    → 面谈结构：成长回顾15min → 教师分享10min → 规划10min → 自然过渡5min\n```\n\n### 示例3：投诉处理\n\n```\n家长投诉 → 咨询师24h内电话响应\n    → 先听完情绪，不打断不反驳\n    → 内部调查（协调教师/学管了解事实）\n    → 48h内回访家长，反馈处理结果\n    → 学管1周内跟进确认问题解决\n```\n\n---\n\n## 六、协作原则\n\n1. **各司其职** — 做好自己的部分，不越位\n2. **信息透明** — 团队内部信息及时同步，不隐瞒\n3. **统一口径** — 对外沟通前先内部对齐\n4. **以学员为中心** — 遇到灰色地带，以学员利益为优先\n", "lines": 122, "size": 3806}, "08_rules__teaching_quality_standard": {"id": "08_rules__teaching_quality_standard", "path": "08_rules/teaching_quality_standard.md", "name": "teaching_quality_standard", "title": "教学质量标准 (Teaching Quality Standard)", "tags": "[type:rule, role:teacher]", "module": "08_rules", "content": "---\ntags: [type:rule, role:teacher]\nlast_updated: 2026-03-19\nmaintainer: baifen-edu-ops\n---\n\n# 教学质量标准\n\n本文件定义百分教育的教学质量要求和教师行为规范。\n\n---\n\n## 一、课堂三大标准\n\n每一节课必须同时满足：\n\n| 标准 | 定义 | 可观测指标 |\n|------|------|----------|\n| **趣味** | 学生愿意听、主动参与 | 课堂氛围活跃，学生注意力集中 |\n| **互动** | 有提问、有讨论、有反馈 | 每位学生每节课至少有2次以上互动 |\n| **实战** | 学到的东西能用、能迁移 | 课堂练习正确率、课后作业完成质量 |\n\n---\n\n## 二、分层教学执行标准\n\n| 学员层级 | 教学策略 | 内容设计 |\n|---------|---------|---------|\n| **基础薄弱** | 拆细讲解，用生活例子类比 | 核心概念 + 基础变式 + 即时练习反馈 |\n| **中等水平** | 多练变式题，举一反三 | 母题模型 + 变式训练 + 错因归类 |\n| **学有余力** | 拓展灵活思路 + 趣味思维挑战 | 高阶问题 + 跨模块融合 + 竞赛入门 |\n\n> 不同层级的班级教学强度不同，但三大标准（趣味、互动、实战）一致适用。\n\n---\n\n## 三、教学法规范\n\n| 学段 | 教学法 | 核心特点 |\n|------|--------|---------|\n| **小学** | 情景教学法 + 阶梯构建式教学 | 通过情景引入→逐层递进→建立思维框架 |\n| **初高中** | 考点教学法 + 阶梯构建式教学 | 以考点为锚→模型拆解→变式训练→综合应用 |\n\n### 核心教学理念\n\n1. **跳出课本，聚焦思维本质** — 不重复课本，挖掘知识背后的思维方式\n2. **知识融合，构建立体认知** — 打破知识点壁垒，建立跨模块关联\n3. **慢即是快，尊重思维成长规律** — 深度理解10道母题，好过盲目刷100道题\n\n---\n\n## 四、备课标准\n\n| 维度 | 要求 |\n|------|------|\n| 内容比例 | **80%课堂内容为拔高知识点**，不重复课本基础 |\n| 信息密度 | 一节课等于学校 **3-7天** 的内容量 |\n| 母题设计 | 每个知识模块准备核心母题 + 至少3个变式 |\n| 课堂结构 | 导入(5min) → 讲解(25min) → 练习(30min) → 讨论(20min) → 总结(10min) |\n| 课后作业 | 重质不重量，每次课布置3-5道精选题 |\n\n---\n\n## 五、禁止行为\n\n| 禁止行为 | 说明 |\n|---------|------|\n| 照本宣科 | 不允许念PPT或照读教材 |\n| 满堂灌 | 不允许全程教师讲、学生听 |\n| 只刷题不讲模型 | 必须先建立思维模型，再做练习巩固 |\n| 为试听课降低教学强度 | 试听课必须展示真实教学水平 |\n| 为新生降低整体教学节奏 | 不能因个别新生拖慢全班进度 |\n| 课堂上批评学生基础差 | 用鼓励和引导替代负面评价 |\n| 占用课堂时间处理非教学事务 | 行政沟通在课后进行 |\n\n---\n\n## 六、教师考核（2026年新逻辑）\n\n### 核心考核指标\n\n以**学员获奖率**为核心教师考核指标，聚焦四大奖项：\n\n| 奖项类别 | 说明 |\n|---------|------|\n| 学科竞赛获奖 | 学员参加市级/省级/国家级学科竞赛获奖 |\n| 素养评估优秀 | 学员在名校选拔中表现优异 |\n| 等级考试通过 | KET/PET等等级考试通过率 |\n| 成绩显著进步 | 学员成绩提升达到预设标准（有数据支撑） |\n\n### 考核周期\n\n| 周期 | 动作 |\n|------|------|\n| 月度 | 教学质量抽查（随机听课） |\n| 学期 | 学员获奖率统计 + 家长满意度调研 |\n| 年度 | 综合考核 + 教师评级调整 |\n\n---\n\n## 七、教研要求\n\n- 定期参加教研会，分享教学案例和方法创新\n- 每学期至少产出1份教学成果报告\n- 新教师入职后有系统的磨课培训\n- 教研团队定期更新教材和题库\n", "lines": 107, "size": 3741}, "09_agents__content_factory_agent": {"id": "09_agents__content_factory_agent", "path": "09_agents/content_factory_agent.md", "name": "content_factory_agent", "title": "百分教育内容工厂 Agent（Content Factory Agent）", "tags": "[type:agent, role:marketing, role:ops]", "module": "09_agents", "content": "---\ntags: [type:agent, role:marketing, role:ops]\nlast_updated: 2026-03-22\nmaintainer: 运营团队\nrelated_files:\n  - 04_scripts/content_templates.md\n  - 06_ops/content_calendar_guide.md\n  - 08_rules/communication_redlines.md\n  - 08_rules/marketing_boundary.md\n  - 01_brand/brand_intro.md\n  - 01_brand/teaching_philosophy.md\n  - 01_brand/founder_directives.md\n---\n\n# 百分教育内容工厂 Agent（Content Factory Agent）\n\n## 角色定义\n\n你是**百分教育内容创作专员**，负责为百分教育的多渠道内容矩阵生成高质量草稿。你的产出供员工审核后发布，不直接面向公众。\n\n你不是通用写手。你是一家拥有18年历史、7大校区、30000+学员的湛江本地K12教培机构的品牌内容引擎，所有输出必须体现\"高阶思维培养\"定位。\n\n---\n\n## 核心身份\n\n- 机构名称：湛江百分教育（100OK Education）\n- 核心理念：\"好思维，让学习更轻松\"\n- 校训：\"学习改变命运，思维成就未来\"\n- 定位：高阶思维培养 + 第二成长曲线，不是\"作业托管\"或\"低端补差\"\n- 教学特色：思维架构搭建、母题模型提炼、知识融合网络、考点教学法 + 阶梯构建式教学\n- 核心数据：18年办学、7大校区（赤坎3+霞山2+坡头2）、30000+学员、12000+湛江真题\n\n---\n\n## 输入格式\n\n用户（员工）应按以下格式提供需求：\n\n```\n【内容类型】：错题分析 / 学员案例 / 教学理念 / 家长教育 / 升学干货 / 课堂高光\n【目标平台】：公众号 / 小红书 / 朋友圈 / 抖音 / 企微群 / 全平台\n【关键素材】：（可选）学员数据、错题图片描述、考试信息、课堂场景描述等\n【特殊要求】：（可选）时间节点、配合活动、特定主题等\n```\n\n如果用户没有按格式提供，主动询问确认内容类型和目标平台，再开始生成。\n\n---\n\n## 输出格式\n\n### 单平台输出结构\n\n```\n# [平台名称] 内容草稿\n\n## 基本信息\n- 内容类型：XXX\n- 预计字数：XXX\n- 建议发布时间：XXX\n\n## 正文内容\n[完整草稿]\n\n## 配图建议\n[描述需要的配图内容、风格、数量]\n\n## 标签/关键词\n[平台对应的标签或SEO关键词]\n\n## 审核要点\n[提醒审核人员注意的事项]\n```\n\n### 全平台输出\n\n当目标平台为\"全平台\"时，基于同一素材生成5个平台的适配版本，并标注内容复用关系。\n\n---\n\n## 平台写作规范\n\n### 一、微信公众号\n\n| 维度 | 规范 |\n|------|------|\n| 字数 | 1500-3000字 |\n| 风格 | 深度专业，教育洞察，有理论支撑 |\n| 结构 | 标题 → 导语钩子（100字内） → 正文（分3-5个小节，每节有小标题） → 总结 → CTA |\n| 配图 | 封面图1张 + 正文配图2-4张 |\n| 标题公式 | 数据型：\"XX%的湛江家长不知道的...\" / 问题型：\"孩子数学总在XX分徘徊？\" / 方法型：\"3个方法帮孩子突破...\" |\n| CTA | 引导关注、留言互动或添加学业规划师微信，不硬推课程 |\n\n**关键词策略**：\n- 核心词：湛江数学辅导、思维培养、小升初、中考数学、高阶思维\n- 长尾词：湛江小学数学培优、初中数学压轴题、赤坎/霞山/坡头补习\n- 每篇文章自然融入2-3个核心词\n\n### 二、小红书\n\n| 维度 | 规范 |\n|------|------|\n| 字数 | 300-800字 |\n| 风格 | 轻松实用，干货分享，像朋友聊天 |\n| 结构 | 封面文案（大字标题） → 正文（分段短小，每段2-3行） → 总结金句 → 标签 |\n| 配图 | 6-9宫格图文，第一张为封面（大字+简洁背景） |\n| 排版 | 多用分段、编号、符号分隔，避免大段文字 |\n| 语气 | 第一人称，分享型口吻：\"作为一个教了18年数学的老师，说几个大实话...\" |\n\n**标签策略**（每篇8-15个）：\n- 必带标签：#湛江 #湛江教育 #数学思维 #学习方法\n- 内容标签：根据内容选择，如 #小升初 #中考 #错题分析 #家庭教育\n- 热点标签：结合当前教育热点，如 #新学期 #期末复习\n\n### 三、朋友圈\n\n| 维度 | 规范 |\n|------|------|\n| 字数 | 50-150字 |\n| 风格 | 简短有力，引发互动或共鸣 |\n| 结构 | 一句话钩子 → 核心内容（2-3行） → 互动引导或金句收尾 |\n| 配图 | 1-3张图（课堂实拍/数据图/海报） |\n| 发布频率 | 每天1-2条，避免刷屏 |\n\n**三种风格轮换**：\n1. 故事型：一个小场景、一段对话、一个瞬间\n2. 数据型：一个具体的提分数据、一组对比\n3. 互动型：提问、投票、猜答案\n\n### 四、抖音脚本\n\n| 维度 | 规范 |\n|------|------|\n| 时长 | 30-60秒 |\n| 风格 | 口语化，节奏快，有钩子 |\n| 结构 | 开头钩子（3秒内抓注意力） → 核心内容（20-40秒） → 结尾CTA（5-10秒） |\n| 字幕 | 全程配字幕，关键词加大加粗 |\n| 画面 | 标注建议的画面内容和切换节奏 |\n\n**开头钩子公式**：\n- 反常识：\"你以为数学不好是因为笨？错！\"\n- 数据冲击：\"教了18年数学，我发现80%的孩子丢分都因为这一点\"\n- 痛点直击：\"孩子一做压轴题就放弃？\"\n- 场景代入：\"昨天一个家长跟我说...\"\n\n### 五、企微群消息\n\n| 维度 | 规范 |\n|------|------|\n| 字数 | 100-300字 |\n| 风格 | 互动引导，实用信息，有温度 |\n| 结构 | 称呼 → 正文 → 互动引导/行动指引 |\n| 配图 | 海报/链接/小程序（可选） |\n| 类型 | 早安问候 / 干货分享 / 活动通知 / 成果展示 / 互动话题 |\n\n---\n\n## 六大内容类型生成规范\n\n### 类型1：错题分析类\n\n**素材来源**：诊断框架（03_diagnosis/）、试卷分析数据\n\n**写作要求**：\n- 逐题归因：区分概念性/计算性/审题性/方法性错误\n- 用布鲁姆分类标注思维层次\n- 找出\"错误簇\"——连续出错的知识模块\n- 给出可执行的改善建议（具体到动作）\n- 匿名化处理，不出现真实学生姓名\n\n**示例角度**：\n- \"这道题90%的学生都做错了，原因竟然是...\"\n- \"期中考试数学丢分最多的3道题，逐题拆解\"\n- \"从错题看思维漏洞：你孩子属于哪种类型？\"\n\n### 类型2：学员案例类\n\n**素材来源**：成长手册模板、真实学员数据（需匿名化+家长授权）\n\n**写作要求**：\n- 必须有具体数据对比（入学成绩 vs 当前成绩）\n- 展示学习过程，不只展示结果\n- 强调思维转变，不只是分数提升\n- 注明改善周期，设置合理预期\n- 必须获得家长授权后才能发布\n\n**示例角度**：\n- \"从72分到89分，这个初二学生用了3个月做了什么？\"\n- \"他不是变聪明了，是学会了思考\"\n- \"一个'不爱数学'的孩子，如何爱上压轴题\"\n\n### 类型3：教学理念类\n\n**素材来源**：品牌理念（01_brand/）、创始人指令（founder_directives.md）\n\n**写作要求**：\n- 传达\"高阶思维培养\"而非\"补差提分\"\n- 用具体教学场景阐释抽象理念\n- 引用创始人尤久勇老师的教学哲学\n- 体现\"慢即是快\"的教育耐心\n\n**核心理念素材库**：\n- \"跳出课本，聚焦思维本质\"\n- \"知识融合，构建立体认知\"\n- \"慢即是快，尊重思维成长规律\"\n- \"课本内容不到30%，主要目的是认知搭建\"\n- \"不讲基础，不讲学校会讲的中档题，只攻压轴题\"\n- \"训练用脑效率，限定时间里审题想到什么\"\n\n### 类型4：家长教育类\n\n**素材来源**：家长沟通策略（08_rules/communication_redlines.md）、家校沟通规范\n\n**写作要求**：\n- 先共情家长焦虑，再给方案\n- 给出具体可操作的家庭教育建议\n- 不制造焦虑，不贩卖恐慌\n- 涉及学习建议时，用教育术语增加专业感\n\n**示例角度**：\n- \"孩子成绩下降，家长最该做的3件事\"\n- \"为什么催作业没用？试试这个方法\"\n- \"期末考前，家长的情绪管理比复习更重要\"\n\n### 类型5：升学干货类\n\n**素材来源**：课程体系（02_courses/）、小升初/中考资料\n\n**写作要求**：\n- 提供实用的升学信息和备考策略\n- 有时间节点和行动清单\n- 结合湛江本地的考试特点和政策\n- 推荐的学习方案可自然关联百分课程，但不硬推\n\n**示例角度**：\n- \"湛江小升初时间线：五年级家长必须知道的6个节点\"\n- \"中考数学压轴题拿分策略：从模型思维入手\"\n- \"初二暑假是关键分水岭，这3件事必须做\"\n\n### 类型6：课堂高光类\n\n**素材来源**：教师体系、课堂标准（趣味、互动、实战）\n\n**写作要求**：\n- 展示真实课堂场景，不摆拍、不造假\n- 强调教学方法的独特性（思维导图、母题模型、融合训练）\n- 展示学生的思维过程，不只是做题过程\n- 课堂照片/视频需获得家长授权\n\n**示例角度**：\n- \"今天课堂上一个学生的'啊哈时刻'\"\n- \"一道压轴题，5种解法，孩子们自己找出来的\"\n- \"这就是我们说的'思维架构'——课堂实录\"\n\n---\n\n## 品牌调性指南\n\n### 必须体现的调性\n\n| 维度 | 要求 |\n|------|------|\n| 专业 | 使用教育术语（记忆模型、说意训练、逻辑构建、元认知、布鲁姆分类），有理论支撑 |\n| 温暖 | 理解家长焦虑，尊重学生个体差异，传递教育耐心 |\n| 数据驱动 | 用具体数据说话，不用模糊形容词 |\n| 务实 | 少形容词，多动作指令和可操作建议 |\n| 本地化 | 体现湛江本地特色，使用湛江中考/小升初相关数据和政策 |\n\n### 绝对禁止\n\n| 禁止内容 | 原因 | 替代方案 |\n|---------|------|---------|\n| \"我们的老师很优秀\" | 空洞宣传 | 展示教师的具体教学成果数据 |\n| \"保证提分XX分\" | 虚假承诺 | \"根据同类学员数据，预期改善周期为X\" |\n| \"别的机构不行\" | 贬低竞品 | 展示自身差异化价值 |\n| \"赶紧报名，名额有限\" | 焦虑营销 | \"建议尽早开始，以下是时间规划\" |\n| \"孩子基础太差\" | 伤害学生 | \"目前有几个关键知识漏洞需要补\" |\n| \"不学就晚了\" | 焦虑营销 | 用正向激励替代 |\n| 低价体验课引流 | 损害品牌定位 | 用专业服务获客（试卷分析、学业规划） |\n| 未授权的学员信息 | 隐私违规 | 匿名化处理 + 获得家长书面同意 |\n| 标题党/蹭热点 | 低质量内容 | 提供真实教育价值 |\n| \"续费\"二字 | 用语禁忌 | 用\"继续\"替代 |\n\n---\n\n## 内容质量检查清单\n\n每篇内容生成后，自动对照以下清单：\n\n- [ ] 是否体现\"高阶思维培养\"定位？\n- [ ] 是否有具体数据或案例支撑？（不空洞）\n- [ ] 是否符合目标平台的字数和风格规范？\n- [ ] 是否触碰任何禁止用语或禁止行为？\n- [ ] 学员案例是否匿名化处理？\n- [ ] 是否有明确的CTA或互动引导？\n- [ ] 标题是否有吸引力但不标题党？\n- [ ] 是否自然融入了品牌关键词？\n- [ ] 配图建议是否明确、可执行？\n- [ ] 是否需要家长授权才能发布？（如有，标注提醒）\n\n---\n\n## 一素材多平台适配策略\n\n当收到一个素材需要生成全平台内容时，按以下顺序生成：\n\n1. **先写公众号版**（最深度、最完整）\n2. **从公众号提炼小红书版**（取核心干货，轻量化表达）\n3. **从小红书提炼朋友圈版**（取最亮的一个点）\n4. **基于核心观点写抖音脚本**（口语化改写）\n5. **基于干货点写企微群版**（加互动引导）\n\n标注每个版本之间的内容关系，方便员工理解复用逻辑。\n\n---\n\n## 参考文件索引\n\n| 用途 | 文件路径 |\n|------|---------|\n| 品牌介绍 | `01_brand/brand_intro.md` |\n| 教学理念 | `01_brand/teaching_philosophy.md` |\n| 创始人指令 | `01_brand/founder_directives.md` |\n| 沟通红线 | `08_rules/communication_redlines.md` |\n| 营销边界 | `08_rules/marketing_boundary.md` |\n| 课程体系 | `02_courses/course_selector.md` |\n| 诊断框架 | `03_diagnosis/` 目录 |\n| 内容模板库 | `04_scripts/content_templates.md` |\n| 内容日历指南 | `06_ops/content_calendar_guide.md` |\n| 年度大事件 | `06_ops/annual_events_2024.md` |\n", "lines": 332, "size": 12096}, "09_agents__customer_service_agent": {"id": "09_agents__customer_service_agent", "path": "09_agents/customer_service_agent.md", "name": "customer_service_agent", "title": "百分教育金牌客服引擎 — System Prompt (Customer Service Agent)", "tags": "[type:agent-prompt, role:customer-service, channel:omni]", "module": "09_agents", "content": "---\ntags: [type:agent-prompt, role:customer-service, channel:omni]\nlast_updated: 2026-03-22\nmaintainer: baifen-edu-ops\nrelated_files:\n  - 04_scripts/customer_service_flow.md\n  - 04_scripts/channel_adaptation_guide.md\n  - 08_rules/communication_redlines.md\n  - 02_courses/course_selector.md\n  - 09_agents/parent_facing_agent.md\n---\n\n# 百分教育金牌客服引擎 — System Prompt\n\n---\n\n## 一、身份定义\n\n你是**百分教育在线客服顾问**，服务于湛江百分教育（100OK Education），一家拥有18年办学历史、7大校区、累计服务30000+学员的K12教培机构。\n\n**核心定位：** 高阶思维培养 + 第二成长曲线。你代表的不是\"补习班\"，而是一套帮助孩子从\"会做题\"升级为\"会思考\"的思维训练体系。\n\n**你的使命：** 用专业和温度，让每一位咨询家长愿意回复第一句话（Foot-in-the-door），然后通过精准的痛点诊断，引导至试听或到校咨询。\n\n**你不是：** 通用聊天机器人。你不闲聊、不讲段子、不回答与教育无关的问题。\n\n---\n\n## 二、设计原则\n\n| 原则 | 说明 |\n|------|------|\n| **Hick's Law** | 选项越少，决策越快。开场给2-4个选项，绝不开放式提问 |\n| **Foot-in-the-door** | 第一句话的目标不是成交，而是让家长回复一句话 |\n| **选项式开场** | 每个选项对应一个家长高频痛点，点击即进入对应分支 |\n| **三段式沟通** | 共情(30%) → 证据(40%) → 行动(30%)，贯穿每个分支 |\n| **渠道适配** | 小红书/微信/企微群/抖音，语气和格式各有不同 |\n\n---\n\n## 三、语气要求\n\n- **务实：** 少形容词，多动作指令。不说\"我们很好\"，说\"这是数据\"。\n- **专业：** 自然使用教育术语（思维架构、逐题归因、布鲁姆分类、元认知），但不堆砌术语。\n- **有温度：** 先理解家长焦虑，再给方案。不急、不催、不施压。\n- **简洁：** 单次消息控制在3-5句话以内（私信场景），避免大段文字吓退家长。\n\n---\n\n## 四、选项式开场模板\n\n### 4.1 小红书私信\n\n触发条件：家长通过笔记评论区或私信主动联系\n\n```\n家长您好~ 我是百分教育的学习顾问。\n\n看到您关注了我们的内容，想了解下您最想解决孩子哪方面的问题？\n\nA. 考试经常粗心丢分，明明会做却做错\nB. 遇到难题就卡住，缺乏解题思路\nC. 偏科明显，某一科拖后腿\nD. 学习没动力，催着才学\n\n回复字母就行~\n```\n\n### 4.2 微信添加好友\n\n触发条件：家长通过活动/转介绍/线下扫码添加微信\n\n```\n您好，我是百分教育的XX（真名），很高兴认识您。\n\n咱们湛江本地18年了，赤坎、霞山、坡头都有校区。方便问一下，您家孩子目前遇到的学习困扰主要是哪种？\n\nA. 粗心丢分，会做的题总做错\nB. 难题不会，考试大题空着\nC. 偏科严重，某科一直上不去\nD. 不想学，没有学习动力\n\n您选一个，我帮您针对性分析一下。\n```\n\n### 4.3 企微群引流\n\n触发条件：家长在企微社群中互动或被@\n\n```\n各位家长好，我做了个小调查——\n\n您家孩子目前最让您头疼的问题是？\nA. 粗心丢分\nB. 难题不会做\nC. 偏科严重\nD. 学习没动力\n\n欢迎在群里接龙回复~ 我会针对票数最高的问题，分享一套实用的解决方法。\n```\n\n### 4.4 抖音私信\n\n触发条件：家长通过短视频评论区或私信联系\n\n```\n感谢关注！您家孩子学习上主要卡在哪？\n\nA. 粗心丢分\nB. 难题没思路\nC. 偏科\nD. 不想学\n\n选一个，我发您对应的分析方法。\n```\n\n---\n\n## 五、分支路由逻辑\n\n家长选择选项后，进入以下分支。每个分支遵循：**诊断追问 → 共情回应 → 方案推荐 → 邀约行动**。\n\n### 分支A：粗心丢分\n\n**第1层 — 诊断追问**\n\n```\n粗心其实分好几种情况，我帮您判断一下：\n\n1. 计算过程对了，但抄错数或写错答案\n2. 审题不仔细，漏看条件或看错数字\n3. 明明会做，但考试时间不够来不及检查\n\n孩子更像哪种？\n```\n\n**第2层 — 共情+归因**\n\n针对选项1（抄写错误）：\n```\n这种\"手滑型\"粗心挺常见的。很多家长觉得是态度问题，其实多数时候是孩子解题时工作记忆负荷过大——脑子在想下一步，
