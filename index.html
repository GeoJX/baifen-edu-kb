ourses", "content": "---\ntags: [stage:junior, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 05_campuses/]\n---\n\n# 初中数学分层班型\n\n## 班型概览\n\n| 班型 | 定位 | 适合学生 |\n|------|------|---------|\n| 数学提高班 | 基础补强 | 基础薄弱，需要巩固课内知识 |\n| 数学培优班 | 能力提升 | 中等水平，需稳步提升至优等 |\n| 数学卓越班 | 拔高冲刺 | 尖子生，冲刺压轴题和竞赛 |\n| 数学强化班 | 强化训练 | 需要高强度专项突破 |\n| 数学双语班 | 特色班 | 中英双语教学数学（尤老师亲授，初三） |\n| 数学实验班 | 实验探索 | 注重数学实验和模型构建 |\n\n## 教学理念在初中数学中的体现\n\n### 知识融合教学\n- 以\"圆→相似→旋转→三角函数\"的融合逻辑推进\n- 将零散知识串联成\"模型网络\"\n  - 相似的四大模型\n  - 旋转在压轴题中的应用\n- 适度拓展超纲但实用的解题工具（胡不归、阿氏圆）\n\n### 母题模型训练\n- 从大量题目中提炼核心题型结构\n- 掌握一个模型可以解一类题\n- 训练\"拆解题目→调用模型→组合知识\"的能力\n\n### 说意训练\n- 让学生用自己的语言复述解题逻辑\n- 验证是否真正理解而非死记步骤\n\n## 课程安排特点\n\n- 各校区每周末开设多个班次\n- 尤老师（创始人）亲自执教部分班次\n- 初三双语班是特色课程，中英双语教学数学\n- 培优班通常有1-3班同时开设，可选择合适时段\n\n## 初三中考冲刺\n\n- 聚焦中考高频考点和压轴题型\n- 模型化爆破：将复杂题目分解为已知模型组合\n- 结合《湛江中考几何高频错题模型库》（12000+本地真题积累）\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（初一180/次、初二190/次、初三200/次为课单价）\n", "lines": 55, "size": 1912}, "02_courses__math__math_one_on_one": {"id": "02_courses__math__math_one_on_one", "path": "02_courses/math/math_one_on_one.md", "name": "math_one_on_one", "title": "名师一对一（数学及全科） (Math One On One)", "tags": "[stage:primary-low, stage:primary-high, stage:junior, stage:senior, subject:math, class:1on1, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, stage:junior, stage:senior, subject:math, class:1on1, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [03_diagnosis/primary/math_below_75.md, 06_ops/pricing/one_on_one_pricing.md]\n---\n\n# 名师一对一（数学及全科）\n\n## 课程定位\n\n面向成绩低于75分或需要**高度针对性辅导**的学生。一对一模式让老师深入了解孩子的兴趣爱好、知识薄弱点及学习能力短板，量身定制学习方案。\n\n## 适合对象\n\n- 数学成绩长期低于75分\n- 知识漏洞较多，需要系统补强\n- 在小班中跟不上节奏，需要个性化关注\n- 学习状态不佳，需要通过一对一重建信心\n\n## 三大核心价值\n\n### 1. 提升学习力\n- 强化计算能力、理解能力、记忆能力\n- 提高听课专注力\n- 为后续学习筑牢基础\n\n### 2. 改善学习状态\n- 通过持续引导和鼓励，改善孩子的学习状态\n- 激发主动投入学习的积极性\n- 让孩子从\"被动学\"转向\"主动学\"\n\n### 3. 优化学习心理+亲子关系\n- 帮助孩子优化学习心理\n- 在沟通过程中给予亲子沟通方面的建议\n- 促进亲子关系更和谐\n\n## 教学优势\n\n- 名师一对一：18年教学经验的专职教师\n- 查漏补缺：精准定位薄弱点\n- 学习方法指导：不只教知识，更教方法\n- 学习状态优化：关注学习习惯和心理\n- 学习心理沟通：解决畏难、厌学等心理障碍\n\n## 年级覆盖\n\n一年级至高三，全科目\n\n## 报课赠课活动\n\n| 报课次数 | 赠送次数 |\n|---------|---------|\n| 15次课 | 赠送1次 |\n| 20次课 | 赠送2次 |\n| 30次课 | 赠送4次 |\n\n## 进阶路径\n\n一对一补强 → 成绩提升到75-90分 → 转入同步培优小班\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/one_on_one_pricing.md`\n\n## 注意事项\n\n- 一对一是建议性推荐，不强制\n- 话术要点：不说\"孩子基础太差\"，说\"目前有几个关键知识漏洞需要补\"\n- 向家长解释时强调\"个性化的辅导方式能更精准满足孩子需求\"\n", "lines": 71, "size": 2074}, "02_courses__math__primary_math_curriculum_2025": {"id": "02_courses__math__primary_math_curriculum_2025", "path": "02_courses/math/primary_math_curriculum_2025.md", "name": "primary_math_curriculum_2025", "title": "小学数学2025-2026教学计划全年详细版 (Primary Math Curriculum 2025)", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:curriculum, year:2025-2026]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:curriculum, year:2025-2026]\nlast_updated: 2026-03-21\nmaintainer: 教研团队\nsource: 小学数学2025~2026教学计划全年详细版（同步班+培优班+纯奥体系）.xlsx\nrelated_files: [02_courses/math/primary_math_sync_plus.md, 02_courses/math/primary_math_olympiad.md]\n---\n\n# 小学数学2025-2026教学计划全年详细版\n\n## 文件总览\n\n本文件为小学数学（1-6年级）全年教学计划，基于**北师版**教材编排，涵盖三大体系：\n- **北师版能力提高（同步班）**：1-6年级，紧跟课本进度\n- **北师版能力强化（培优班）**：3-6年级，拔高培优\n- **北师大思维突破（纯奥体系）**：一阶至六阶，竞赛思维\n\n每个年级/阶段按**暑→秋→寒→春**四季编排，每季15讲（含期中/期末复习）。\n\n### 教学维度（每讲标注）\n- **讲次名称**与**原讲次名称**（课本对应内容）\n- **教学内容**（本讲包含知识点）\n- **教学目标**（知识目标+探究目标）\n- **前序知识点**与**后续知识点**（知识链条）\n- **模块分类**：数与代数/图形与几何/综合与实践/统计与概率/计数/计算/组合数学\n- **培养能力**：计算能力/实践应用能力/图形认知能力/逻辑推理能力/创新思维能力/信息处理能力/抽象概括能力\n\n---\n\n## 一、北师版能力提高（同步班）\n\n### 一年级\n\n#### 暑假（15讲）\n| 讲次 | 讲次名 | 教学内容 | 模块 | 培养能力 |\n|------|--------|---------|------|---------|\n| 1 | 方格中的多与少 | 不借助/借助工具的长短比较 | 综合与实践 | 实践应用 |\n| 2 | 数数小能手 | 阿拉伯数字、罗马数字、0~10的认识 | 数与代数 | 计算 |\n| 3 | 你在哪儿 | 认识前后、认识上下 | 综合与实践 | 实践应用 |\n| 4 | 我在你的左边 | 左右关系、左右的应用 | 综合与实践 | 实践应用 |\n| 5 | 桃花朵朵开 | 在情境中数数、序数初体验 | 数与代数 | 计算 |\n| 6 | 比比谁能站得稳 | 认识立体图形、立体图形的稳定性 | 图形与几何 | 图形认知 |\n| 7 | 期中复习 | — | — | — |\n| 8 | 1~5的认识 | 1~5的认识、比大小、分与合 | 数与代数 | 计算 |\n| 9 | 1~5的加减法 | 1~5的加法、1~5的减法 | 数与代数 | 计算 |\n| 10 | 跳格游戏 | 手的游戏、跳棋游戏 | 综合与实践 | 逻辑推理 |\n| 11 | 火眼金睛养成记 | 分类、类比 | 综合与实践 | 创新思维 |\n| 12 | 一起来玩跷跷板 | 简单比轻重、复杂比轻重 | 综合与实践 | 实践应用 |\n| 13 | 图形列车 | 简单图形规律、复杂图形数量规律 | 图形与几何 | 图形认知 |\n| 14 | 专注力大比拼 | 找不同、迷宫 | 综合与实践 | 创新思维 |\n| 15 | 期末复习 | — | — | — |\n\n#### 秋季（15讲）\n| 讲次 | 讲次名 | 教学内容 | 模块 | 培养能力 |\n|------|--------|---------|------|---------|\n| 1 | 比较 | 比长短高矮、比水的多少、比轻重 | 综合与实践 | 实践应用 |\n| 2 | 生活中的数（上） | 1~5的认识、比大小、0的认识 | 数与代数 | 计算 |\n| 3 | 生活中的数（下） | 6~10的认识、比多少 | 数与代数 | 计算 |\n| 4 | 5以内数加与减 | 1-5的加法、1-5的减法、综合应用 | 数与代数 | 计算 |\n| 5 | 位置 | 上下、前后、左右、简单位置推理 | 综合与实践 | 实践应用 |\n| 6 | 分类 | 按依据分类、自主性分类 | 统计与概率 | 创新思维 |\n| 7 | 期中复习 | — | — | — |\n| 8 | 10以内数加与减（上） | 6-10的分与合、6-10的加减法 | 数与代数 | 计算 |\n| 9 | 10以内数加与减（下） | 连加连减、加减混合、综合应用 | 数与代数 | 计算 |\n| 10 | 认识图形 | 认识立体图形、有趣的拼搭 | 图形与几何 | 图形认知 |\n| 11 | 几与第几 | 几与第几、简单排队问题 | 综合与实践 | 实践应用 |\n| 12 | 认识钟表 | 简单认识钟面（整时）、画钟面时间 | 综合与实践 | 实践应用 |\n| 13 | 站在楼顶看世界 | 数正方体、补全大正方体（楼顶标数法/分层法） | 计数 | 几何+计算 |\n| 14 | 图案算算算 | 图文算式、找突破口、复杂图文算式 | 计算 | 计算 |\n| 15 | 期末复习 | — | — | — |\n\n#### 寒假（7讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 图图寻亲记 | 认识基本图形、拼基本图形 |\n| 2 | 比10大的数 | 认识11~20、认识100以内的数 |\n| 3 | 找好朋友 | 20以内不进位加法、进位加法（凑十法） |\n| 4 | 图腾的秘密 | 认识骰子、找相对面 |\n| 5 | 今晚吃饺子借我一点醋 | 不退位减法、退位减法（破十法） |\n| 6 | 脑筋转转转 | 巧妙的题目（共用思想/植树问题） |\n| 7 | 期末复习 | — |\n\n#### 春季（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 认识20以内的数 | 认识20以内的数、不进位加/不退位减 |\n| 2-3 | 20以内数与加法（上/下） | 凑十法、应用题、推理加法 |\n| 4-5 | 20以内数与减法（上/下） | 破十法、退位减法应用、看图列算式 |\n| 6 | 找规律 | 数的规律、图形规律 |\n| 7 | 期中复习 | — |\n| 8-9 | 100以内数的认识（上/下） | 数数/数的组成/顺序、比大小/数的关系/整十数加减 |\n| 10-12 | 100以内数加与减（上/中/下） | 整十数加减、竖式计算、加减法应用 |\n| 13 | 有趣的平面图形（一） | 认识平面图形、图形拼组、数图形 |\n| 14 | 七巧板 | 分割图形、七巧板拼图 |\n| 15 | 期末复习 | — |\n\n### 二年级\n\n#### 暑假（15讲）\n| 讲次 | 讲次名 | 教学内容 | 培养能力 |\n|------|--------|---------|---------|\n| 1 | 0=9 | 火柴棒数字认识、添加/去掉/移动火柴棒 | 创新思维 |\n| 2 | 数数大派对 | 100以内数位比大小、数的关系和应用 | 计算 |\n| 3 | 换个方向算一算 | 100以内加减法笔算 | 计算 |\n| 4 | 叠罗汉 | 连加连减笔算 | 计算 |\n| 5 | 一拃有多长 | 厘米、米 | 实践应用 |\n| 6 | 七巧板 | 分割图形、七巧板拼图 | 图形认知 |\n| 7 | 期中复习 | — | — |\n| 8 | 看我七十二变 | 图形基本/旋转/移动/组合规律 | 图形认知 |\n| 9 | 加减王国的斗争 | 凑数法、凑0法 | 计算 |\n| 10 | 移山填海 | 巧妙移动（给后一样多/开始有几个/原来一样多） | 实践应用 |\n| 11 | 加法的好朋友 | 表内乘法（上）：乘法认识、1-5口诀 | 计算 |\n| 12 | 乘风破浪 | 表内乘法（下）：6-9口诀、解决问题 | 计算 |\n| 13 | 平分秋色 | 表内除法：平均分、除法 | 计算 |\n| 14 | 侦探养成日记 | 简单推理：连一连、xo推理 | 实践应用 |\n| 15 | 期末复习 | — | — |\n\n#### 秋季（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1-2 | 100以内加与减二（上/下） | 100以内加减法、减法应用 |\n| 3-4 | 测量一（上/下） | 认识线段/厘米/米、单位换算/长度应用 |\n| 5 | 数一数与乘法 | 乘法初步认识、加法改乘法 |\n| 6 | 乘法口诀一 | 2-5的乘法口诀、解决问题 |\n| 7 | 期中复习 | — |\n| 8-9 | 分一分与除法（上/下） | 平均分/列除法算式、倍的认识/应用 |\n| 10 | 乘法口诀二 | 6-9的乘法口诀 |\n| 11 | 乘除法应用一 | 做除法想乘法、除法应用 |\n| 12-13 | 购物（上/下） | 认识人民币面值/进率/换算、付钱方法/计算 |\n| 14 | 校园小导游 | 认识东南西北、描述路线 |\n| 15 | 期末复习 | — |\n\n#### 寒假（7讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 我有小尾巴 | 除法竖式、认识余数 |\n| 2 | 比一比谁最富有 | 移动凑倍（已知原来求给几个/反之/与倍数相关） |\n| 3 | 让子弹飞 | 大炮发射法数图形 |\n| 4 | 千军万马 | 1000/10000以内数的认识 |\n| 5 | 兜兜转转还是你 | 一笔画（奇点数与一笔画关系） |\n| 6 | 算对就通关 | 三位数加减法 |\n| 7 | 期末复习 | — |\n\n#### 春季（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1-2 | 100以内数加与减二 | 连加连减、加减混合、解决问题 |\n| 3-4 | 有余数的除法 | 认识余数、余数<除数、列竖式 |\n| 5-6 | 时分秒 | 认识钟表、秒、时间单位换算、经过时间 |\n| 7 | 期中复习 | — |\n| 8-9 | 生活中的大数 | 万以内数认识/算盘、比大小/近似数 |\n| 10 | 有趣的推理 | 列表推理、数的推理 |\n| 11-13 | 大数加与减一 | 整百整千加减、三位数加减、应用 |\n| 14 | \"重复\"的秘密 | 认识周期、根据周期规律计算 |\n| 15 | 期末复习 | — |\n\n### 三年级\n\n#### 暑假（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 乘法混合运算的应用 | 乘加、乘减的含义和运算顺序 |\n| 2 | 除法混合运算的应用 | 除加、除减的含义和运算顺序 |\n| 3 | 两步计算应用题 | 含小括号的两步混合运算 |\n| 4 | 没完没了 | 简单周期问题 |\n| 5 | 毫米、分米和千米 | 长度单位换算与应用 |\n| 6 | 三位数加减 | 三位数连加、连减、列竖式 |\n| 7 | 期中复习 | — |\n| 8-9 | 多位数乘一位数（初步/进阶） | 整十百千数乘一位数口算、进位乘法 |\n| 10 | 倍的认识 | 求几倍/求一个数的几倍/画线段图 |\n| 11 | 你中有我 | 分类数图形（长方形/正方形/三角形） |\n| 12 | 猫抓老鼠 | 归一问题（一到多/多到一） |\n| 13 | 搭配 | 连线法解搭配问题 |\n| 14 | 数独游戏 | 4×4、6×6、9×9数独 |\n| 15 | 期末复习 | — |\n\n#### 秋季（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 混合运算 | 混合运算计算和应用题 |\n| 2-3 | 大数的加与减 | 三位数加减混合运算、里程表/电表 |\n| 4 | 加减法竖式谜 | 万以内竖式谜（首末位分析/进位借位分析） |\n| 5 | 观察物体 | 观察实物和立体图形 |\n| 6 | 认识图形 | 认识角、数角 |\n| 7 | 期中复习 | — |\n| 8-9 | 乘除法的应用 | 多位数乘一位数（捂0/拆分法）、除法应用 |\n| 10-11 | 认识小数 | 小数认识/读写/比大小、加减法/应用 |\n| 12 | 大数加与减二 | 万以内加减法/带符号搬家/凑整 |\n| 13 | 多位数乘一位数笔算 | 两三位数乘一位数笔算 |\n| 14 | 除法计算 | 被除数为两三位数的除法笔算 |\n| 15 | 期末复习 | — |\n\n#### 寒假（7讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 千克与克 | 质量单位的认识和换算 |\n| 2 | 图形与角 | 认识图形和角 |\n| 3 | 年、月、日 | 日历与时间相关知识 |\n| 4 | 面积 | 面积的概念和面积单位 |\n| 5 | 乘除法应用进阶 | 乘除法综合应用 |\n| 6 | 趣味数学 | 趣味思维题目 |\n| 7 | 期末复习 | — |\n\n#### 春季（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1-2 | 除法（上/下） | 整十数除一位数口算、除法笔算 |\n| 3 | 搭配二 | 分类法、单循环问题 |\n| 4-5 | 认识图形与面积 | 认识图形特征、面积概念/面积单位 |\n| 6 | 面积计算 | 长方形正方形面积计算 |\n| 7 | 期中复习 | — |\n| 8-9 | 两位数乘两位数 | 笔算方法、应用 |\n| 10 | 时间与日期 | 年月日、平年闰年 |\n| 11 | 千克与克/吨 | 质量单位与换算 |\n| 12 | 数据整理与表示 | 统计表和条形统计图 |\n| 13-14 | 趣味数学 | 和差问题、植树问题等 |\n| 15 | 期末复习 | — |\n\n### 四年级\n\n#### 暑假（15讲）\n核心内容：大数认识/读写/比较、加减法巧算进阶（带符号搬家/凑整）、角的度量（量角器/画角）、三位数乘两位数、植树问题、等差数列求和、盈亏问题\n\n#### 秋季（15讲）\n核心内容：大数认识进阶（万/亿级数）、三步混合运算、平行与垂直、图形认识（梯形/平行四边形）、面积计算（平行四边形/三角形/梯形）、除数是两位数的除法、鸡兔同笼、简便运算\n\n#### 寒假（7讲）\n核心内容：小数的认识与性质、小数加减法、运算律、和倍差倍问题、年龄问题\n\n#### 春季（15讲）\n核心内容：小数乘除法、方程初步、统计图、可能性、面积综合\n\n### 五年级\n\n#### 暑假（15讲）\n核心内容：小数乘除法进阶、因数与倍数、质数合数、分数初步认识、图形面积、列方程解应用题\n\n#### 秋季（15讲）\n核心内容：分数加减法、最大公因数/最小公倍数、长方体正方体表面积体积、分数乘除法初步、统计图\n\n#### 寒假（7讲）\n核心内容：分数四则运算、百分数、圆的认识、比和比例\n\n#### 春季（15讲）\n核心内容：圆的周长面积、百分数应用、比例、正反比例、统计综合\n\n### 六年级\n\n#### 暑假（15讲）\n核心内容：分百小综合计算、工程问题、浓度问题、利润问题、行程问题、经济问题\n\n#### 秋季（15讲）\n核心内容：负数、圆柱圆锥、比例与比例尺、统计与概率、小升初专项复习\n\n#### 寒假（7讲）\n核心内容：小升初综合复习（数与代数/图形/统计/应用题）\n\n#### 春季（15讲）\n核心内容：小升初冲刺（重难点强化、模拟考、易错点专练）\n\n---\n\n## 二、北师版能力强化（培优班）\n\n### 与同步班的主要差异\n\n培优班从**三年级**起开设，在同步班基础上：\n- **计算更难**：巧算技巧更多（带符号搬家/凑整/裂项）\n- **思维题更多**：竖式谜、推理、搭配组合\n- **应用更深**：归一归总、和差倍、盈亏、鸡兔同笼等奥数经典题型\n- **几何更拓展**：面积割补法、等积变形\n\n### 三年级培优班\n\n#### 暑假（15讲）\n| 讲次 | 讲次名 | 教学内容 |\n|------|--------|---------|\n| 1 | 混合运算(一） | 乘加/乘减/除加/除减含括号的混合运算 |\n| 2 | 混合运算（二） | 带小括号的计算题及应用题 |\n| 3 | 守门员的重要性 | 万以内加减法、带符号搬家、凑整 |\n| 4 | 加减法竖式谜（一） | 末位分析、首位分析 |\n| 5 | 没完没了 | 周期问题（中等难度） |\n| 6 | 千里之行始于足下 | 长度单位（千米→毫米）换算与应用 |\n| 7 | 期中复习 | — |\n| 8 | 多位数乘一位数初步 | 口算/笔算不进位乘法 |\n| 9 | 多位数乘一位数进阶 | 进位乘法 |\n| 10 | 乘法竖式谜 | 乘法竖式谜（末位分析/首位分析） |\n| 11 | 分类数图形 | 分类数长方形/正方形/三角形（公式化） |\n| 12 | 倍的认识进阶 | 和倍问题初步 |\n| 13 | 搭配（一） | 连线法/分类法/排列 |\n| 14 | 数独 | 6×6、9×9数独 |\n| 15 | 期末复习 | — |\n\n#### 秋季（15讲）\n核心内容：混合运算综合、大数加减应用（里程表/电表）、加减法竖式谜进阶（黄金三角/黄金倒三角）、观察物体、角的认识、乘除法捂0/拆分法、认识小数、多位数乘法笔算、巧算（乘法分配律）\n\n#### 寒假（7讲）\n核心内容：除法笔算进阶、面积与周长关系、年月日与平闰年、和差问题、植树问题\n\n#### 春季（15讲）\n核心内容：除法综合、混合运算应用（多种方法）、面积计算综合、两位数乘两位数、统计与可能性、和差倍问题进阶\n\n### 四至六年级培优班\n\n培优班在同步班对应年级内容基础上，额外引入：\n\n**四年级**：等差数列（求和/倒推）、盈亏问题（进阶）、鸡兔同笼（假设法/列表法）、还原问题、年龄问题、数字谜、简便运算（拆分/凑整/裂项）\n\n**五年级**：分数计算进阶（裂项/通分技巧）、因数倍数综合（质因数分解/最大公因数最小公倍数应用）、长方体正方体表面积体积综合（染色/切割问题）、行程问题（相遇/追及/环形/流水）\n\n**六年级**：分数百分数综合应用（浓度/利润/工程/行程四大专题）、圆柱圆锥综合（旋转体/组合体）、比例综合（正反比例/比例尺/缩放）、小升初压轴专题\n\n---\n\n## 三、北师大思维突破（纯奥体系）\n\n### 体系概览\n\n纯奥体系分**六阶**，对应不同难度级别（非严格对应年级）：\n\n| 阶段 | 体系 | 定位 | 适合学生 |\n|------|------|------|---------|\n| 一阶 | α体系（全国版） | 启蒙入门 | 学有余力的一年级 |\n| 二阶 | α体系（全国版） | 基础构建 | 学有余力的二年级 |\n| 三阶 | β体系（全国版） | 能力提升 | 学有余力的三年级 |\n| 四阶 | β体系（全国版） | 竞赛初探 | 优秀的四年级 |\n| 五阶 | β体系（全国版） | 竞赛强化 | 优秀的五年级 |\n| 六阶 | β体系（全国版） | 竞赛冲刺 | 冲刺竞赛的六年级 |\n\n**体系说明**：一阶~二阶使用**α体系**（侧重启蒙和兴趣培养），三阶~六阶使用**β体系**（侧重竞赛思维和方法训练）。\n\n**六年级春季特别安排**：\n- 培优班：7大模块复习 + 3次综合能力检验\n- 纯奥体系：7大模块复习 + 8次综合能力检验（使用历年名校小升初真题）\n\n### 一阶α体系（暑秋寒春各15讲）\n\n#### 暑假\n| 讲次 | 讲次名 | 教学内容 | 模块 |\n|------|--------|---------|------|\n| 1 | 一个萝卜一个坑 | 一一对应、一对多比较 | 组合数学 |\n| 2 | 我在哪儿 | 上下前后左右关系 | 组合数学 |\n| 3 | 10个兄弟抱成团 | 10以内加减法、连加连减混合 | 计算 |\n| 4 | 专注力大比拼 | 找不同、走迷宫 | 综合与实践 |\n| 5 | 拿到好东西要分享 | 简单的分类 | 组合数学 |\n| 6 | 谁和我一样高 | 不借助/借助工具比较、排序 | 综合与实践 |\n| 7 | 期中复习 | — | — |\n| 8 | 一起来玩跷跷板 | 简单/复杂比轻重、等量代换初步 | 综合与实践 |\n| 9 | 小小火柴人 | 数字火柴棒、添加/去掉/移动火柴棒 | 综合与实践 |\n| 10 | 积木搭一搭 | 认识立体图形、稳定性和滚动性 | 图形与几何 |\n| 11 | 图形列车 | 简单/复杂图形规律 | 图形与几何 |\n| 12 | 1~5的认识 | 1-5认识、比大小、分与合 | 数与代数 |\n| 13 | 1~5的加减法 | 1-5加减法 | 数与代数 |\n| 14 | 没有人比我更强 | 找不同、走迷宫（进阶） | 综合与实践 |\n| 15 | 期末复习 | — | — |\n\n#### 秋季\n核心内容：直接比较/分数比较、数数与排队（几与第几）、10以内加减法应用、位置推理、简单/复杂的分类、6-10的认识和加减法、认识图形（立体→平面）、简单推理（连一连/排除法）\n\n#### 寒假\n核心内容：凑十法与破十法、图形认知（拼图/七巧板）、骰子（相对面/点数和）、共用思想\n\n#### 春季\n核心内容：20以内加减法深化、100以内数的认识、图文算式、立体图形计数（楼顶标数法）、加减法应用题\n\n### 二阶β体系\n\n#### 暑假\n核心内容：火柴棒算式、100以内数认识与加减、长度单位（厘米/米）、七巧板、图形规律进阶、凑数法/凑0法、巧妙移动、表内乘除法、简单推理\n\n#### 秋季\n核心内容：100以内加减法综合、测量与单位换算、乘法口诀1-9、除法（平均分/有余数除法）、购物与人民币、方向\n\n#### 寒假\n核心内容：除法竖式、移动凑倍、大炮发射法、万以内数的认识、一笔画、三位数加减法\n\n#### 春季\n核心内容：100以内加减混合、有余数除法应用、时分秒、生活中的大数、推理（列表法）、大数加减法、周期\n\n### 三阶γ体系\n\n#### 暑假\n核心内容：混合运算（含括号）、周期问题、长度单位换算、多位数乘一位数、倍的认识与应用、分类数图形（公式化）、归一问题、搭配组合（排列数/组合数初步）\n\n#### 秋季\n核心内容：混合运算综合、里程表问题、竖式谜进阶、观察物体（三视图初步）、认识角度量角、口算除法、认识小数、巧算（乘法分配律）\n\n#### 寒假\n核心内容：巧算进阶（去括号/带符号搬家/凑整/乘法分配律）、植树问题（三种类型）、和差问题、面积初步\n\n#### 春季\n核心内容：除法笔算进阶、面积计算（长方形/正方形/拼组）、两位数乘两位数、和差倍问题综合、统计与可能性、数阵/数谜\n\n### 四阶δ体系\n\n核心内容：四则运算巧算（裂项/乘法分配律高阶）、等差数列求和/应用、盈亏问题、鸡兔同笼（假设法）、还原问题、年龄问题、行程问题初步（相遇/追及）、面积割补法、角度计算\n\n### 五阶ε体系\n\n核心内容：分数四则运算进阶（繁分数/裂项）、因数与倍数综合（质因数分解/辗转相除法）、行程问题进阶（环形/流水/钟表）、工程问题、浓度问题、比和比例应用、组合数学（容斥原理/排列组合）、图形面积综合\n\n### 六阶ζ体系\n\n核心内容：分数百分数综合、方程与不等式、几何综合（等积变换/旋转/对称）、组合计数、逻辑推理、数论进阶（余数/整除性）、小升初竞赛冲刺\n\n---\n\n## 四、课程体系总结\n\n### 三大体系对比\n\n| 维度 | 同步班 | 培优班 | 纯奥体系 |\n|------|--------|--------|---------|\n| 开设年级 | 1-6年级 | 3-6年级 | 一阶~六阶 |\n| 教材版本 | 北师版 | 北师版 | 全国版 |\n| 难度定位 | 课内同步+适度拓展 | 课内强化+奥数入门 | 纯奥数思维 |\n| 每讲结构 | 知识点+教学目标+前后序知识 | 同左+更难应用 | 同左+竞赛题型 |\n| 适合对象 | 全体学生 | 中上水平 | 学有余力/竞赛生 |\n\n### 知识链条设计\n\n每一讲都标注了**前序知识点**和**后续知识点**，形成完整的知识链条，便于：\n- 诊断学生薄弱环节时追溯到基础漏洞\n- 规划学习路径时明确先修/后续关系\n- 插班学生评估时确定起点\n\n### 模块分类体系\n\n| 模块 | 内容范围 |\n|------|---------|\n| 数与代数 | 数的认识、四则运算、方程、分数小数 |\n| 图形与几何 | 图形认识、面积周长、立体图形、变换 |\n| 综合与实践 | 位置方向、时间测量、生活数学 |\n| 统计与概率 | 数据收集整理、统计图表、可能性 |\n| 计算 | 巧算技巧、竖式运算、高级计算 |\n| 计数 | 数图形、排列组合、容斥 |\n| 组合数学 | 逻辑推理、搭配、数独、数阵 |\n\n### 学期课时安排\n- 暑假/秋季/春季：各15讲\n- 寒假：7讲\n- 全年合计：52讲/年级\n", "lines": 443, "size": 22710}, "02_courses__math__primary_math_olympiad": {"id": "02_courses__math__primary_math_olympiad", "path": "02_courses/math/primary_math_olympiad.md", "name": "primary_math_olympiad", "title": "小学数学奥数班 / 纯奥数 / 奥数创新班 (Primary Math Olympiad)", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 03_diagnosis/primary/math_above_96.md]\n---\n\n# 小学数学奥数班 / 纯奥数 / 奥数创新班\n\n## 课程定位\n\n面向长期稳定在**96分以上**的小学生，**深入拓展奥数知识体系，培养高阶思维能力**。\n\n## 班型细分\n\n| 班型 | 说明 | 开设校区 |\n|------|------|---------|\n| 奥数班 | 基于学校同步+深度奥数拓展 | 各校区均有 |\n| 纯奥数 | 脱离课本体系，纯粹的奥数知识和思维训练 | 京基校区 |\n| 奥数创新班 | 纯奥数基础上进一步拓展创新思维（周四晚） | 京基校区 |\n\n## 适合对象\n\n- 成绩长期稳定在96分以上\n- 对数学有浓厚兴趣，追求更高挑战\n- 有意参加数学竞赛或冲刺名校小升初\n\n## 教学特点\n\n- 拓展更灵活的解题思路\n- 加入趣味思维挑战（如用图形拼贴理解几何原理）\n- 鼓励同伴间的思维碰撞\n- 让孩子在和同伴的思维碰撞里找到成就感，越学越有动力\n\n## 三年级奥数特别说明\n\n三年级是\"开启思维大进阶\"的关键期，开启数学四大能力：\n\n1. **逻辑推理能力** — 从机械记忆走向逻辑建构，学会因果推导\n2. **数学应变能力** — 掌握解题规律，一通百通；不惧题海战术，教孩子举一反三\n3. **实际应用能力** — 让数学从课本走向生活，用思维解决真实问题\n4. **抽象思维能力** — 从具象到抽象，建立符号思维，无缝衔接初中代数几何\n\n## 年级覆盖\n\n二年级至六年级\n\n## 进阶路径\n\n同步奥数 → **纯奥数/奥数创新班** → 小升初名校冲刺\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 55, "size": 1842}, "02_courses__math__primary_math_sync_olympiad": {"id": "02_courses__math__primary_math_sync_olympiad", "path": "02_courses/math/primary_math_sync_olympiad.md", "name": "primary_math_sync_olympiad", "title": "小学数学同步奥数班 (Primary Math Sync Olympiad)", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 03_diagnosis/primary/math_90_to_95.md]\n---\n\n# 小学数学同步奥数班\n\n## 课程定位\n\n面向平时测试**90-95分**的小学生，在同步学校内容的基础上**融入适度的奥数思维训练**。\n\n## 适合对象\n\n- 课本知识掌握良好，但灵活解题差点火候\n- 需要在保持课内成绩的同时，拓展思维能力\n- 目标是从\"做题正确\"到\"思维灵活\"的跨越\n\n## 班型\n\n精品小班，6-12人\n\n## 教学特点\n\n- 同步内容占60%：巩固课本重点+变式题训练\n- 奥数思维占40%：适度引入奥数思维方法，培养举一反三能力\n- 在课本基础上多练\"变式题\"，一道应用题换个问法怎么解\n- 重点帮孩子练\"举一反三\"的思维，确保\"吃得饱\"\n\n## 分层逻辑\n\n同步奥数班的学生知识储备和思维节奏相近，老师能清楚记住每个孩子的\"卡点\"和\"潜力\"。水平相近的孩子一起学，没人因为跟不上自卑，也没人因为太简单松懈。\n\n## 年级覆盖\n\n一年级至六年级（各校区课表中均有开设）\n\n## 进阶路径\n\n同步培优 → **同步奥数班**（90-95分）→ 成绩稳定96分以上 → 纯奥数班/奥数创新班\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 46, "size": 1430}, "02_courses__math__primary_math_sync_plus": {"id": "02_courses__math__primary_math_sync_plus", "path": "02_courses/math/primary_math_sync_plus.md", "name": "primary_math_sync_plus", "title": "小学数学同步培优班 (Primary Math Sync Plus)", "tags": "[stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-low, stage:primary-high, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md, 03_diagnosis/primary/math_75_to_90.md]\n---\n\n# 小学数学同步培优班\n\n## 课程定位\n\n面向平时考试**90分以下**的小学生，侧重**夯实基础，巩固课本知识**。\n\n## 适合对象\n\n- 课本知识点掌握不牢固，考试中基础题频繁丢分\n- 对数学学习兴趣不高，需要通过方法引导激发积极性\n- 需要在课内知识上做强化训练\n\n## 班型\n\n精品小班，6-12人\n\n## 教学特点\n\n- 紧跟学校教学进度，在课本基础上做强化训练\n- 把课本重点拆得更细，用生活里的例子讲透概念\n- 练题从基础题型慢慢过渡，先让孩子\"学得会\"\n- 情景教学法+阶梯构建式教学\n\n## 课堂模式\n\n- 80%内容为课本同步强化（含学校未覆盖的变式题）\n- 20%内容为基础思维拓展\n- 每节课含实战练习环节，巩固所学\n\n## 年级覆盖\n\n一年级至六年级\n\n## 进阶路径\n\n同步培优班（< 90分）→ 稳定在90分以上后 → 同步奥数班\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 48, "size": 1229}, "02_courses__math__senior_math_tiers": {"id": "02_courses__math__senior_math_tiers", "path": "02_courses/math/senior_math_tiers.md", "name": "senior_math_tiers", "title": "高中数学分层班型 (Senior Math Tiers)", "tags": "[stage:senior, subject:math, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:math, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [05_campuses/hongdu.md]\n---\n\n# 高中数学分层班型\n\n## 班型概览\n\n| 班型 | 定位 | 适合学生 |\n|------|------|---------|\n| 数学提高班 | 基础巩固+中等题突破 | 基础不扎实，考试中等难度题丢分 |\n| 数学培优班 | 能力进阶+难题攻克 | 中上水平，冲刺高分 |\n\n## 教学特色\n\n- 延续\"考点教学法+阶梯构建式教学\"\n- 尤老师和全老师亲自执教多个班次\n- 高一至高三均有开设\n- 主要在虹都校区和霞山校区授课\n\n## 高中数学与初中英语卓越班的衔接\n\n英语卓越班（2.5年学制）的学生在初中后1年会衔接高一英语，系统学习高一词汇与语法，积累3000词汇量，目标高中英语稳定125分左右。这部分学生在高中数学上也通常有较好的思维基础。\n\n## 各年级课单价\n\n| 年级 | 6-12人班课单价 | 13-20人班课单价 |\n|------|-------------|-------------|\n| 高一 | 210元/次 | 170元/次 |\n| 高二 | 220元/次 | 180元/次 |\n| 高三 | 230元/次 | 190元/次 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 39, "size": 1230}, "02_courses__science__junior_bio_geo": {"id": "02_courses__science__junior_bio_geo", "path": "02_courses/science/junior_bio_geo.md", "name": "junior_bio_geo", "title": "初中生物地理冲刺班 (Junior Bio Geo)", "tags": "[stage:junior, subject:biology, subject:geography, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:biology, subject:geography, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md]\n---\n\n# 初中生物地理冲刺班\n\n## 课程定位\n\n针对初二生物地理会考/中考的**冲刺课程**，帮助学生在短时间内提升成绩。\n\n## 适合对象\n\n- 初二学生（面临生物地理会考）\n- 需要在短期内系统复习和提分\n\n## 各校区开设情况\n\n| 校区 | 科目 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 生物冲刺班 | 周日8:00-10:00 | 姚 |\n| 虹都 | 地理冲刺班 | 周日10:10-12:10 | 吴 |\n| 海东 | 生物 | 周六10:00-12:00 | 陈老师 |\n| 海东 | 地理 | 周六8:00-10:00 | 欧老师 |\n| 南油 | 生地 | 待定 | 陈老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（初二课单价190元/次）\n", "lines": 32, "size": 894}, "02_courses__science__junior_chemistry": {"id": "02_courses__science__junior_chemistry", "path": "02_courses/science/junior_chemistry.md", "name": "junior_chemistry", "title": "初中化学课程 (Junior Chemistry)", "tags": "[stage:junior, subject:chemistry, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:chemistry, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md]\n---\n\n# 初中化学课程\n\n## 班型\n\n| 班型 | 定位 |\n|------|------|\n| 化学培优班 | 系统学习化学知识，提升应试能力 |\n| 化学培优班（卓越） | 拔高训练，冲刺高分 |\n\n## 教学特色\n\n- 考点教学法+阶梯构建式教学\n- 培优班和卓越班分层教学\n- 注重逻辑思维能力和微观结构想象力\n\n## 各校区开设情况\n\n| 校区 | 年级 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 初三 | 周六14:00-16:00 | 刘 |\n| 霞山 | 初三 | 周六16:30-18:30 | 刘 |\n| 南油 | 初三 | 待定 | 邹老师 |\n| 海东 | 初三 | 周日10-12 | 邹老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`（初三课单价200元/次）\n", "lines": 35, "size": 892}, "02_courses__science__junior_physics": {"id": "02_courses__science__junior_physics", "path": "02_courses/science/junior_physics.md", "name": "junior_physics", "title": "初中物理课程 (Junior Physics)", "tags": "[stage:junior, subject:physics, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:junior, subject:physics, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/course_selector.md]\n---\n\n# 初中物理课程\n\n## 班型概览\n\n| 班型 | 定位 | 适合学生 |\n|------|------|---------|\n| 物理培优班 | 能力提升 | 中等水平，系统提升物理能力 |\n| 物理提高班 | 拔高训练 | 较好基础，冲刺高分 |\n| 物理实验班 | 模型化突破 | 注重实验和模型构建 |\n| **物理满分实验班** | 压轴突破 | 90分以上，冲满分 |\n| 物理超前班 | 超前学习 | 提前进入下学期内容 |\n\n## 重点课程：初二物理满分实验班\n\n### 入班门槛\n90分以上\n\n### 核心定位\n压轴题突破\n\n### 四大亮点\n1. **18年百分教学经验**\n2. **小班教学名师辅导**\n3. **贴合考情直击考点**\n4. **不刷题只讲模型**\n\n### 三大硬核目标\n1. **压轴题模型化爆破** — 将复杂压轴题分解为可操作的模型组合\n2. **超前学构建完整体系** — 提前建立物理知识的完整框架\n3. **冲选拔备战名校实验班** — 为中考后进入名校重点班做准备\n\n## 各校区开设情况\n\n| 校区 | 年级 | 班型 | 时间 | 老师 |\n|------|------|------|------|------|\n| 京基 | 初二 | 物理超前班 | 周日14:00-16:00 | 王 |\n| 虹都 | 初二 | 物理实验 | 周六8:00-10:00 | 黄 |\n| 虹都 | 初三 | 物理培优 | 周六16:30-18:30 | 王 |\n| 虹都 | 初三 | 物理提高 | 周日8:00-10:00 | 林 |\n| 虹都 | 初一 | 物理实验 | 周日14:00-16:00 | 林 |\n| 霞山 | 初二 | 物理培优2班 | 周六10:00-12:00 | 谢 |\n| 霞山 | 初三 | 物理培优1班 | 周六14:00-16:00 | 王 |\n| 南油 | 初二 | 物理 | 周六4-6 | 谢老师 |\n| 海东 | 初二 | 物理 | 周六上午10-12 | 谢丹瑜 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 56, "size": 1877}, "02_courses__science__senior_chemistry": {"id": "02_courses__science__senior_chemistry", "path": "02_courses/science/senior_chemistry.md", "name": "senior_chemistry", "title": "高中化学课程 (Senior Chemistry)", "tags": "[stage:senior, subject:chemistry, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:chemistry, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: []\n---\n\n# 高中化学课程\n\n## 班型\n\n化学培优班\n\n## 各校区开设情况\n\n| 校区 | 年级 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 高二 | 周日上午10:10-12:10 | 刘 |\n| 虹都 | 高一 | 周日上午8:00-10:00 | 刘 |\n| 霞山 | 高一 | 周六晚上18:30-20:30 | 刘 |\n| 霞山 | 高二 | 周日下午14:00-16:00 | 刘 |\n| 南油 | 高二 | 周日10:15-12:15 | 邹老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 27, "size": 617}, "02_courses__science__senior_physics": {"id": "02_courses__science__senior_physics", "path": "02_courses/science/senior_physics.md", "name": "senior_physics", "title": "高中物理课程 (Senior Physics)", "tags": "[stage:senior, subject:physics, class:boutique, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:senior, subject:physics, class:boutique, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: []\n---\n\n# 高中物理课程\n\n## 班型\n\n| 班型 | 定位 |\n|------|------|\n| 物理培优 | 系统提升物理能力 |\n| 物理提高 | 拔高训练，冲刺高分 |\n\n## 各校区开设情况\n\n| 校区 | 年级 | 时间 | 老师 |\n|------|------|------|------|\n| 虹都 | 高二 | 周六晚上18:30-20:30 | 王 |\n| 虹都 | 高一 | 周日上午8:00-10:00 | 刘 |\n| 霞山 | 高一 | 周日早上8:00-10:00 | 王 |\n| 霞山 | 高二 | 周日上午10:00-12:00 | 王 |\n| 南油 | 高一 | 周六7-9 | 林老师 |\n| 南油 | 高二 | 待定 | 林老师 |\n\n## 收费参考\n\n→ 详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 31, "size": 758}, "02_courses__special__ipa_magic_camp": {"id": "02_courses__special__ipa_magic_camp", "path": "02_courses/special/ipa_magic_camp.md", "name": "ipa_magic_camp", "title": "10天音标魔法营 (Ipa Magic Camp)", "tags": "[stage:primary-high, subject:english, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:primary-high, subject:english, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/special/phonics_7day_camp.md]\n---\n\n# 10天音标魔法营\n\n## 课程信息\n\n| 项目 | 详情 |\n|------|------|\n| 课程名称 | 10天音标魔法营 |\n| 适合对象 | 小学4-6年级 |\n| 核心目标 | 见词能读、听音会写 |\n| 课次 | 10天 |\n\n## 课程优势\n\n1. **科学进阶**：从零基础到自主拼读\n2. **见词能读**：80%单词无需查词典直接拼读\n3. **听音会写**：听力考试听清发音，告别\"蒙答案\"\n4. **口语自信**：发音标准，敢说敢读\n5. **背单词提速**：摆脱死记硬背，效率翻倍\n\n## 价格政策\n\n| 项目 | 价格 |\n|------|------|\n| 原价 | 1200元 |\n| 早鸟特惠 | 前30名报名 **899元/人** |\n| 团报福利 | 3人成团再减 **200元/人** |\n| 推荐福利 | 老学员推新，双方各得 **50元奖学金券**（可叠加） |\n\n## 定位\n\n寒假特色短期课程，引流+品牌展示双重作用。\n", "lines": 39, "size": 1029}, "02_courses__special__phonics_7day_camp": {"id": "02_courses__special__phonics_7day_camp", "path": "02_courses/special/phonics_7day_camp.md", "name": "phonics_7day_camp", "title": "7天英语小达人自然拼读特训营 (Phonics 7Day Camp)", "tags": "[stage:preschool, stage:primary-low, subject:english, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:preschool, stage:primary-low, subject:english, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 运营团队\nrelated_files: [02_courses/english/phonics.md, 02_courses/special/ipa_magic_camp.md]\n---\n\n# 7天英语小达人自然拼读特训营\n\n## 课程信息\n\n| 项目 | 详情 |\n|------|------|\n| 课程名称 | 英语小达人自然拼读特训营 |\n| 适合对象 | 4-8岁小朋友 |\n| 核心目标 | 7天掌握\"见词能读、听音能写\" |\n| 课次 | 7天 |\n\n## 7天课程安排\n\n| 时段 | 内容 |\n|------|------|\n| Day 1-2 | 掌握语音+绘本阅读（r/p/y/gr/b1/br/wh/有关颜色的词汇） |\n| Day 3-4 | 掌握语音+绘本阅读（f/m/n/ear/eye有关身体部位的词汇） |\n| Day 5-6 | 词汇句型+绘本阅读（b/h/t/sh/kn/s/z有关身体部位的词汇及句型） |\n| Day 7 | 复习+验收 |\n\n## 价格\n\n**7天寒假营限时特惠：499元**\n\n## 定位\n\n低门槛入门体验课，适合幼儿园到低年级零基础孩子。完成后可衔接正式的自然拼读课程体系。\n", "lines": 35, "size": 1023}, "02_courses__special__xiaogaokao_fulltime": {"id": "02_courses__special__xiaogaokao_fulltime", "path": "02_courses/special/xiaogaokao_fulltime.md", "name": "xiaogaokao_fulltime", "title": "小高考全托集训班 (Xiaogaokao Fulltime)", "tags": "", "module": "02_courses", "content": "# 小高考全托集训班\n\n> 来源：小高考优惠逻辑.docx + 25年小高考课程表8月16日.xlsx\n\n## 基本信息\n- **班型**：10人以内小班，全托集训\n- **周期**：15-20周（约4个月）\n- **科目**：语文、数学、英语\n- **目标学生**：想通过小高考的学生，含200多分的复读生\n- **最低开班**：4人保底，5人即可开班\n\n## 课程表（周一至周六）\n\n### 每日作息\n\n| 时段 | 时间 | 内容 |\n|------|------|------|\n| 早读 | 8:00-8:30 | 英语/语文早读交替 |\n| 上午主课 | 8:30-10:00 | 英语/数学 |\n| 上午作业 | 10:15-11:30 | 完成作业 |\n| 下午主课 | 14:30-16:00 | 数学/语文 |\n| 下午作业 | 16:10-17:30 | 完成作业 |\n| 晚自习 | 19:30-21:00 | 背诵语文/英语单词 |\n| 周六 | 全天 | 语文/数学/英语测试 |\n\n### 课时统计\n\n| 科目 | 每周次数 | 时长/次 | 周课时 | 周次 | 总课时 |\n|------|---------|---------|--------|------|--------|\n| 数学 | 5 | 0.75h | 3.75h | 15周 | 56.25h |\n| 英语 | 5 | 0.75h | 3.75h | 15周 | 56.25h |\n| 语文 | 5 | 0.75h | 3.75h | 15周 | 56.25h |\n| **合计** | | | | | **168.75h** |\n\n## 定价体系\n\n### 基础定价\n- 单价：230元/小时\n- 7折后：每科9,056.25元\n- 三科合计：27,168.75元 + 资料费300元 = **27,468.75元**\n\n### 团报优惠\n\n| 报名人数 | 折扣 |\n|---------|------|\n| 1人 | 9折 |\n| 2人团 | 8.5折 |\n| 3人团 | 8折 |\n| 4人团 | 7折 |\n| 5人团 | 6折 |\n\n### 早鸟价（5人团折上折）\n27,168 × 0.6 = 16,300 + 500 = **16,800元**\n\n## 难度与服务\n- 涵盖高一到高三基础知识点\n- 难度：高考的50%-60%，大致相当于高一层次\n- **服务承诺**：保结果，费用固定\n- 晚来的学生不减收费，落下课程额外安排5小时补回\n\n## 师资安排\n- 计划3名老师负责语数英\n- 教学要求相对不高\n- 竞争优势：校区多，家长可选择就近校区\n", "lines": 65, "size": 1916}, "02_courses__special__zhongkao_heima_dianqing": {"id": "02_courses__special__zhongkao_heima_dianqing", "path": "02_courses/special/zhongkao_heima_dianqing.md", "name": "zhongkao_heima_dianqing", "title": "中考黑马班与点睛班（引流产品） (Zhongkao Heima Dianqing)", "tags": "", "module": "02_courses", "content": "# 中考黑马班与点睛班（引流产品）\n\n> 来源：中考黑马班、点睛班引流产品说明（周）3月17日.pptx\n> 报告人：周月生\n> 日期：2026年3月17日\n\n## 核心定位\n精准分层教学，满足不同分数段学生冲刺需求。以399元引流课为起点，打造从4月到中考的**全闭环提分路径**。\n\n## 班型分层\n\n### 黑马班（80分以下学生）\n- **定位**：专为基础薄弱学生定制，基础补漏，快速提分\n- **痛点**：提分困境、问题根源诊断\n- **优势**：精准靶向提分、独创训练方法、短周期强输出\n- **目标**：最终逆袭\n\n### 点睛班（85分以上学生）\n- **定位**：针对高分学生，冲刺压轴难题\n- **痛点**：高分瓶颈、根源剖析\n- **优势**：专攻压轴难题、授人以渔思维、短周期高强度\n- **特色**：中考实战导向\n\n## 四月引流课规划\n\n| 项目 | 说明 |\n|------|------|\n| 价格 | 399元/科，2人团299元/科 |\n| 课次 | 4次课 |\n| 包含 | 配套讲义、课后答疑、学情诊断 |\n| 科目 | 数学/物理/化学 |\n\n### 各科4次课内容\n- **数学专题课**：对应分段核心知识点\n- **物理专题课**：对应分段核心知识点\n- **化学专题课/专项课**：对应分段核心知识点\n\n## 招生引流策略\n\n### 四大核心卖点\n（精准分层 + 短周期见效 + 实战导向 + 配套服务）\n\n### 多元引流渠道\n（线上 + 线下 + 社群 + 转介绍）\n\n### 高效转化钩子\n（学情诊断 + 课堂体验 + 数据展示）\n\n## 正价课转化闭环\n\n### 课中预埋伏笔\n- 第一次课后就开始转化\n- 逐一和家长沟通课程价值\n\n### 结课转化关键\n- 学情反馈 + 正价课规划承接\n\n### 正价课规划承接\n- 以优质正价课承接，实现高效留存\n\n## 后期服务与口碑\n\n### 全程贴心服务\n- 完善课后服务\n- 定期学情反馈\n- 贴心中考陪伴\n\n### 口碑裂变计划\n- 成功案例分享\n- 家长满意度驱动\n\n## 管控与优化\n- 师资精准匹配\n- 效果监控优化\n- 转化节奏把握\n", "lines": 76, "size": 2060}, "02_courses__xiaoshengchu__elite_school_sprint": {"id": "02_courses__xiaoshengchu__elite_school_sprint", "path": "02_courses/xiaoshengchu/elite_school_sprint.md", "name": "elite_school_sprint", "title": "小升初名校冲刺课 (Elite School Sprint)", "tags": "[stage:xiaoshengchu, stage:primary-high, subject:general, type:intro]", "module": "02_courses", "content": "---\ntags: [stage:xiaoshengchu, stage:primary-high, subject:general, type:intro]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [03_diagnosis/xiaoshengchu/target_school_profile.md]\n---\n\n# 小升初名校冲刺课\n\n## 课程定位\n\n百分教育**特色品牌课程**，帮助孩子在名校选拔中展现优势，冲刺名校分班考尖子班。\n\n## 目标学校\n\n| 学校 | 目标班型 |\n|------|---------|\n| 培才一中 | 火箭班 |\n| 廉江实验学校 | 精英班 |\n| 北附博雅学校 | 清北班 |\n| 麻章广东省实验学校 | 重点班 |\n\n## 考试类型\n\n这些学校通常需要通过：\n1. **入学前的密考**（或称\"素养评估\"）\n2. **入学后的分班考试**\n\n## 百分教育优势\n\n- 18年湛江办学经验，精准定位学校选拔题型难度\n- 做到定制化培养\n- 每年有大量学生在6年级加入百分教育进行小升初选拔和分班考集训\n\n## 建议时间规划\n\n| 起步时间 | 策略 |\n|---------|------|\n| **五年级**（推荐） | 提前2年，结合孩子能力情况定制针对性名校课程，从容应对 |\n| 六年级 | 集训冲刺，高强度备考 |\n\n> 对于有前瞻性的家长，我们建议从孩子5年级起开始准备。\n\n## 春季分班考特训营\n\n- 课程：18次课/科\n- 亮点：\n  1. 紧扣小升初考点，衔接初中重难点\n  2. 18次课精细化教学，稳步提升能力\n  3. 师资团队经验足，个性辅导更精准\n  4. 冲刺名校分班考，系统衔接更高效\n\n### 限时特惠\n\n| 报课方式 | 优惠 |\n|---------|------|\n| 原价 | 3969元/科（18次课） |\n| 报一科 | 立减300元 |\n| 报两科 | 立减1000元 |\n| 报三科 | 立减1680元 |\n| 前10名 | 再减100元 |\n| **最高优惠** | **减1780元** |\n\n## 收费参考\n\n→ 小升初特训营按上述特惠价格\n→ 常规课程详见 `06_ops/pricing/class_6to12_pricing.md`\n", "lines": 68, "size": 1870}, "02_courses__xiaoshengchu__elite_training_calendar": {"id": "02_courses__xiaoshengchu__elite_training_calendar", "path": "02_courses/xiaoshengchu/elite_training_calendar.md", "name": "elite_training_calendar", "title": "小升初精英培训工作行事历 (Elite Training Calendar)", "tags": "", "module": "02_courses", "content": "# 小升初精英培训工作行事历\n\n> 来源：小升初精英培训工作行事历.docx\n> 周期：10月23日 - 12月31日\n\n## 课程规划（10月23日启动）\n\n| 科目 | 责任人 | 课程安排 | 跟进人 |\n|------|--------|---------|--------|\n| 语文 | 姚宛辰 | 寒假5次 + 集训12次 + 暑假8次 | 周月生 |\n| 数学 | 陈舒婷 | 寒假5次 + 集训12次 + 暑假8次 | 周月生 |\n| 英语 | 郑桂珍 | 寒假5次 + 集训12次 + 暑假8次 | 周月生 |\n\n## 入学测试卷设计（10月28日）\n- 语数英各一份\n- 每份15题左右，考试30-40分钟\n- 内容：六年级上册高频考点 + 分班奖励考题型难度\n- 需附考试学情分析\n- 责任人：周月生\n\n## 线上外宣计划（11月）\n\n| 时间 | 内容 | 执行 | 推进 |\n|------|------|------|------|\n| 11月8日 | 视频+海报1：为什么小升初如此重要？哪些学校值得一战？ | 郑桂珍 | 周月生 |\n| 11月12日 | 视频+海报2：小升初我们的优势？我们的班型？ | 刘效均 | 周月生 |\n| 11月16日 | 视频+海报3：小升初真题试卷，私信回复666领取 | 周月生 | 刘效均 |\n\n## 产品迭代（12月）\n- 12月5日：小升初第一代到第九代产品差异化对比，一页纸文化\n- 12月31日：语数英第一批课程说明及资料定稿成册\n\n## 社区运营\n- 小升初密考分享视频\n- 语数英三科试题分解视频（可不露面）\n- 往年真题切片拆解，每道题2分钟\n- 六年级期末复习资料：每科8套，专题复习，每套10题\n- 直播：六年级期末、择校主题\n\n## 引流转化奖励机制\n引流5次课后的转化率：\n\n| 转化率 | 奖励 |\n|--------|------|\n| 30%-35% | 不奖不罚 |\n| 35%-40% | 10元/人 |\n| 41%-50% | 30元/人 |\n| 51%以上 | 50元/人 |\n\n按人头分配。\n", "lines": 51, "size": 1796}, "02_courses__xiaoshengchu__xiaoshengchu_99_assessment": {"id": "02_courses__xiaoshengchu__xiaoshengchu_99_assessment", "path": "02_courses/xiaoshengchu/xiaoshengchu_99_assessment.md", "name": "xiaoshengchu_99_assessment", "title": "小升初9.9元专业评估 · 产品深度解读", "tags": "[小升初, 9.9评估, 择校, 班型, 三年规划, 产品]", "module": "02_courses", "content": "---\ntitle: 小升初9.9元专业评估 - 产品深度解读\ntags: [小升初, 9.9评估, 择校, 班型, 三年规划, 产品]\ncategory: 课程/小升初\nsource: 小升初9.9解读.docx\nlast_updated: 2026-03-22\nmaintainer: baifen-edu-ops\n---\n\n# 小升初9.9元专业评估 · 产品深度解读\n\n> 找准方向，让初中三年不走弯路\n\n## 产品定位\n\n小升初是孩子学业生涯的关键转折点。本次9.9元一对一专业评估，聚焦家长最核心的三大困惑，通过18年一线教学经验的专业分析，给出精准答案和可落地方案。\n\n### 核心服务\n\n| 服务 | 解决什么问题 |\n|------|------------|\n| 择校匹配度分析 | 孩子到底适合报哪所学校？ |\n| 班型定位建议 | 进什么层次的班最有利？ |\n| 初中学业路线图规划 | 初中三年如何科学规划？ |\n\n---\n\n## 一、择校匹配度分析：告别\"盲目择校\"\n\n### 核心逻辑\n\n择校不是选\"名气最大\"的，而是选**\"最匹配\"的**。\n\n### 常见择校误区\n\n| 误区 | 后果 |\n|------|------|\n| 只看升学率和学校排名 | 忽略了学校管理模式与孩子性格的适配性 |\n| 性格内向的孩子 → 高压竞争学校 | 容易产生自卑心理，学习积极性受挫 |\n| 活泼灵活的孩子 → 刻板管理学校 | 学习需求得不到满足，产生厌学情绪 |\n\n### 评估维度\n\n本次评估会结合孩子的**性格特点、学习习惯、接受能力、抗压能力**，对目标学校进行多维度分析：\n\n| 分析维度 | 说明 |\n|---------|------|\n| 日常管理模式 | 宽松自主型 / 严格管控型 |\n| 校风氛围 | 竞争型 / 互助型 |\n| 教学节奏 | 快进度重拓展 / 稳进度重基础 |\n| 特色课程与师资配比 | 学校的差异化优势 |\n\n### 评估价值\n\n为孩子筛选出**性格适配、能力匹配**的学校，让孩子入学后快速适应，从初一就打下良好学习基础。避免\"名校不适应\"的内耗，让学校成为孩子的\"助力器\"而非\"压力源\"。\n\n---\n\n## 二、班型定位建议：拒绝\"盲目冲重点\"\n\n### 核心逻辑\n\n选班的核心不是\"越高越好\"，而是**\"孩子能跟上、能提升、能获得正向反馈\"**。\n\n### 常见选班误区\n\n| 误区 | 后果 |\n|------|------|\n| 不惜代价挤进重点班 | 基础薄弱的孩子跟不上节奏，从\"优等生\"变\"后进生\"，自信心严重受挫 |\n| 能力拔尖却进基础班 | 知识重复、进度过慢，\"吃不饱\"，浪费学习潜力 |\n\n### 评估方法\n\n通过专业学业测评，精准定位孩子的：\n- 学科基础\n- 学习能力\n- 思维水平\n- 提升空间\n\n结合目标学校不同层次班级（重点班/实验班/平行班）的教学目标、师资配置、教学内容、班级竞争格局，为孩子选择**最优适配班级**。\n\n### 定位原则\n\n让孩子在班级中处于**\"跳一跳够得着\"**的位置：\n- 能在课堂上跟上教学节奏\n- 能在班级竞争中获得正向学习反馈\n- 拥有足够的提升空间\n- 始终保持学习的成就感和积极性\n\n---\n\n## 三、初中三年科学规划：提前布局全维度成长\n\n小升初的难点不仅是知识的增加，更是**学习模式、考试规则、身心状态**的全面变化。\n\n### 挑战1：学科激增 — 从3科到7科\n\n| 问题 | 说明 |\n|------|------|\n| 小学 | 语文、数学、英语三科，难度低、节奏慢 |\n| 初中 | 新增历史、地理、生物、政治，主科难度大幅提升 |\n| 常见问题 | \"副科新鲜盲目投入、主科基础忽视掉队\" |\n\n**规划方案**：根据孩子学科优势与短板，制定7科学科时间分配方案、学习方法指导，明确主科巩固重点和副科积累方法，从初一就建立科学学习模式。\n\n### 挑战2：考试变革 — 赋分制与新题型\n\n| 问题 | 说明 |\n|------|------|\n| 考试频率 | 远高于小学 |\n| 题型 | 更灵活，从\"知识记忆\"转向\"知识运用和综合能力\" |\n| 赋分制 | 部分地区实行，考察逻辑与小学不同 |\n| 常见问题 | 明明掌握了知识，却考不出好成绩 |\n\n**规划方案**：结合当地中考政策，解读赋分制核心逻辑、初中考试题型特点，制定应试技巧和备考规划，从初一适应初中考试形式。\n\n### 挑战3：家校匹配 — 管理模式与个性适配\n\n| 问题 | 说明 |\n|------|------|\n| 时间观念差的孩子 → 严格打卡学校 | 频繁违规产生负面情绪 |\n| 自主学习能力强的孩子 → 过度管控学校 | 失去学习主动性 |\n\n**规划方案**：根据孩子个性和学校管理模式，制定家校配合方案，引导孩子适应学校要求，减少校园生活内耗。\n\n### 挑战4：青春期问题 — 叛逆、手机沉迷、沟通障碍\n\n| 问题 | 说明 |\n|------|------|\n| 时间节点 | 小升初恰逢青春期开端 |\n| 表现 | 叛逆、情绪波动、手机沉迷 |\n| 叠加效应 | 初中学习压力加剧亲子沟通困难 |\n\n**规划方案**：结合青春期心理特点，提供亲子沟通技巧、行为引导方案，教家长识别情绪变化、制定合理手机使用规则，预防亲子矛盾。\n\n---\n\n## 核心价值总结\n\n9.9元的投入，换来的是**基于18年一线教学实战经验的专业分析**：\n\n| 价值 | 说明 |\n|------|------|\n| 省时高效 | 避开90%的择校、选班误区，节省盲目决策浪费的时间精力 |\n| 精准适配 | 从学校、班级到学习规划，全维度匹配最适合的方案 |\n| 长期受益 | 建立科学学习模式，提前应对青春期和考试变革挑战 |\n\n> 一次专业评估，给孩子一个不跑偏、不内耗、稳步提升的初中起点。\n\n---\n\n## 咨询师使用指南\n\n### 评估交付流程\n\n1. 家长预约（线上/到店）→ 收取9.9元\n2. 安排1对1专业评估（约60分钟）\n3. 输出评估报告（含择校建议、班型定位、三年规划）\n4. 后续跟进：根据评估结果推荐适配课程\n\n### 转化衔接\n\n- 评估报告自然衔接课程推荐，参考 `02_courses/course_selector.md`\n- 如家长意向明确，可推荐小升初冲刺课或分班考特训营\n- 定价参考 `06_ops/pricing/xiaoshengchu_pricing.md`\n\n### 红线提醒\n\n| 禁止 | 替代 |\n|------|------|\n| \"保证进XX学校\" | \"根据孩子的匹配度分析，XX学校是目前最适配的选择\" |\n| \"不报就来不及了\" | \"建议尽早开始评估，以下是时间规划\" |\n| \"别的机构做不了这个\" | 展示百分18年经验和七大校区的差异化优势 |\n\n---\n\n## 关联文档\n\n- 营销话术集：`04_scripts/xiaoshengchu_99_marketing.md`\n- 小升初学习规划：`02_courses/xiaoshengchu/xiaoshengchu_study_plan.md`\n- 小升初课程定价：`06_ops/pricing/xiaoshengchu_pricing.md`\n- 小升初FAQ：`07_faq/faq_xiaoshengchu.md`\n- 课程选择器：`02_courses/course_selector.md`\n", "lines": 184, "size": 6776}, "02_courses__xiaoshengchu__xiaoshengchu_study_plan": {"id": "02_courses__xiaoshengchu__xiaoshengchu_study_plan", "path": "02_courses/xiaoshengchu/xiaoshengchu_study_plan.md", "name": "xiaoshengchu_study_plan", "title": "小升初学习成长规划 (Xiaoshengchu Study Plan)", "tags": "", "module": "02_courses", "content": "# 小升初学习成长规划\n\n> 来源：小升初学习成长规划 6月3日.pptx（图片识别）\n> 汇报人：周月生（霞山校区校长）\n> 相关文件：`02_courses/xiaoshengchu/elite_school_sprint.md`（小升初冲刺课产品定位）| `02_courses/xiaoshengchu/elite_training_calendar.md`（工作行事历）\n> 日期：2023年6月3日\n> 联系方式：18125916967 / 583872862@qq.com\n> 地址：霞山人民大道国贸新天地商场4楼\n\n## 一、湛江重点民办学校盘点\n\n涵盖学校（含地区）：\n- 培才（赤坎）、华附（赤坎）、雷阳实验（赤坎）、金沙湾一中（赤坎）、东方实验（赤坎）\n- 港二（霞山）、海宁学校（霞山）、滨海四中（霞山）\n- 北附（廉江）\n\n### 学校梯队分级\n\n| 梯队 | 学校 |\n|------|------|\n| 第一梯队 | 培才、港二、廉实 |\n| 第二梯队 | 金沙湾一中、北附、海宁、麻海四中 |\n| 第三梯队 | 华附、雷阳、恒盛、东方实验、金城实验 |\n\n## 二、语文学科规划\n\n### 小升初语文考试特点\n1. 试卷阅读量大\n2. 题量多，难度大\n3. 考试要求技巧答题\n4. 作文是半壁江山\n\n### 试卷分值详情（某名校）\n\n| 板块 | 占比 | 说明 |\n|------|------|------|\n| 基础部分 | 20% | 整个小学综合知识检测 |\n| 现代文阅读 | 16% | 比附近正式考试阅读题目多，难度更大 |\n| 古诗文阅读 | ～14% | 考查文言理解能力 |\n| 书写作文/写作要求 | 40%-50% | 小学阶段的名著阅读，尤其是四大名著 |\n\n### 语文集训课程表（12天）\n\n| 天数 | 内容 |\n|------|------|\n| 第1天 | 文言文常考字分析+历届真题训练 |\n| 第2天 | 文言文断句、解释技巧讲解+历届真题训练 |\n| 第3天 | 记叙文阅读技巧讲解+历届真题训练 |\n| 第4天 | 说明文阅读技巧讲解+历届真题训练 |\n| 第5天 | 名著阅读+练习题 |\n| 第6天 | 作文讲解+当场写作 |\n| 第7天 | 作文评讲+范文阅读 |\n| 第8天 | 基础知识专题限时检测+评讲 |\n| 第9天 | 百分限时模拟题训练（一）+评讲+强化训练 |\n| 第10天 | 百分限时模拟题训练（二）+评讲+强化训练 |\n| 第11天 | 百分限时模拟题训练（三）+评讲+强化训练 |\n| 第12天 | 百分限时模拟题训练（四）+评讲+强化训练 |\n\n## 三、数学学科规划\n\n### 数学考试大纲（分值占比）\n\n| 板块 | 占比 |\n|------|------|\n| 综合应用题 | 40%-45% |\n| 几何计算 | 18%-25% |\n| 数学原理 | 12%-18% |\n| 数论 | 10%-14% |\n\n### 数学三级能力金字塔\n\n| 层级 | 目标 | 说明 |\n|------|------|------|\n| 第一梯度 | 培养认知能力 | 养成好的学习习惯（四会课堂），透读教材，落实基础知识 |\n| 第二梯度 | 培养应变能力 | 抓住题型训练，掌握解题技巧 |\n| 第三梯度 | 培养逻辑思维能力 | 总结归纳、建立知识体系、融类旁通、教师混合及分类讨论思想 |\n\n### 数学集训课程表（12天）\n\n| 天数 | 内容 |\n|------|------|\n| 第1天 | 数的运算、解方程和比例专题+历届真题训练 |\n| 第2天 | 新定义题型专题+历届真题训练 |\n| 第3天 | 平面、立体几何、三视图专题+历届真题训练 |\n| 第4天 | 统计和可能性及逻辑推理专题+历届真题训练 |\n| 第5天 | 和差、倍数专题+历届真题训练 |\n| 第6天 | 和差、倍数、年龄、鸡兔同笼专题+历届真题训练 |\n| 第7天 | 工程问题专题应用+历届真题训练 |\n| 第8天 | 行程问题专题应用+历届真题训练 |\n| 第9天 | 分数、百分数、浓度问题专题应用+历届真题训练 |\n| 第10天 | 百分限时模拟试卷一、二训练 |\n| 第11天 | 百分限时模拟试卷三、四训练 |\n| 第12天 | 百分限时模拟试卷五、六训练 |\n\n## 四、英语学科规划\n\n### 六年级英语特点\n1. 语法体系基本成型\n2. 阅读题目频频出现\n3. 考试题型要求技巧\n4. 小初衔接跨度大，做准备需尽早\n\n### 小升初英语重点板块\n语法、听力、完形填空、词汇、句式、阅读\n\n### 英语主要考点\n\n**小学知识点：**\n- 四大时态\n- there be 句型\n- 基本句型转换\n- 形容词副词\n- 数词\n- 名词（单复数及名词所有格）\n- 代词\n\n**初中知识点：**\n- 形容词副词的三个等级\n- 状语从句\n- 感叹句\n- 过去进行时、现在完成时、被动语态（阅读）\n\n### 英语学习三阶段\n\n| 阶段 | 方法 | 目标 |\n|------|------|------|\n| 语法体系总结梳理 | 核心语法总结有讲有练 | 会学会考 |\n| 阅读专项题型突破 | 题型拆解，专项训练 | 小升初阶必备技能 |\n| 题型归纳、针对训练 | 每节课突破一个题型，学一个技巧 | 通用N场考试 |\n\n### 英语集训课程表（12天）\n\n| 天数 | 内容 |\n|------|------|\n| 第1天 | 名词，冠词 |\n| 第2天 | 代词，数词 |\n| 第3天 | 形容词，副词及其比较级和最高级的用法 |\n| 第4天 | 一般现在时，现在进行时 |\n| 第5天 | 一般过去时，一般将来时 |\n| 第6天 | 阅读理解，完型填空 |\n| 第7天 | 阅读理解，短文填空 |\n| 第8天 | 真题及模拟题（一）训练和解析 |\n| 第9天 | 真题及模拟题（二）训练和解析 |\n| 第10天 | 真题及模拟题（三）训练和解析 |\n| 第11天 | 模拟测试 |\n| 第12天 | 归纳总结 |\n\n## 五、备考建议\n\n1. **合理规划**：把握好复习进度，如果在学校不能面面上有时做到，完全可以自己有目标有方向的学习\n2. **全面复习**：认真学习，注意数学知识的前后有联系，基础方面做到重复复习\n3. **攻破难点**：努力功夫花在学习中的薄弱点，哪里不好攻哪里\n4. **培养习惯**：养成角度思考、善于思考、及时归纳总结的好习惯，减少马马虎虎大意造成的丢分\n", "lines": 154, "size": 5835}, "02_courses__xiaoshengchu__zhanjiang_junior_high_comparison": {"id": "02_courses__xiaoshengchu__zhanjiang_junior_high_comparison", "path": "02_courses/xiaoshengchu/zhanjiang_junior_high_comparison.md", "name": "zhanjiang_junior_high_comparison", "title": "湛江初中择校对比数据", "tags": "[小升初, 择校, 初中对比, 学费, 招生]", "module": "02_courses", "content": "---\ntitle: 湛江初中择校对比数据\ntags: [小升初, 择校, 初中对比, 学费, 招生]\nlast_updated: 2026-03-24\n---\n\n# 湛江初中择校对比数据\n\n## 一、各初中学校综合对比\n\n| 学校名称 | 性质 | 重点高中录取率 | 2025中考最高分 | 入学方式 |\n|---------|------|--------------|--------------|---------|\n| 湛江一中 | 公办（百年名校） | 70% | 733分 | 电脑摇号 |\n| 湛江二中 | 公办（霞山龙头，办学75周年） | 超40% | 731分 | 直升+电脑摇号 |\n| 开发区一中 | 公办（前身湛江海滨中学） | 高分段人数较去年增长25% | 733分 | 直升+户籍类+积分类 |\n| 广东实验中学（湛江） | 公办（硬核新名校） | 重点高中录取率超48% | 728分 | 电脑摇号 |\n| 开发区实验学校 | 民办（口碑名校） | 重点高中录取率超38% | 700分以上110人 | 直升+户籍类+积分类 |\n| 寸金培才学校 | 民办（全市第一） | 重点高中录取率超68% | 744分（全市最高分） | 电脑摇号 |\n| 湛江港城中学 | 民办（实力强校） | 重点高中录取率超55% | 734分 | 直升+积分类+电脑摇号 |\n| 湛江博雅学校 | 民办（全寄宿制，9000+在校生） | 重点高中录取率超45% | 729分 | 直升+电脑摇号 |\n\n### 竞赛获奖情况\n\n- **湛江一中**：2025年第42届广东省物理竞赛复赛二等奖2人、三等奖6人；第39届化学竞赛陈浩铭唯一获奖\n- **湛江二中**：2025年第42届广东省物理竞赛复赛三等奖2人\n- **开发区一中**：2025年第42届广东省物理竞赛复赛三等奖1人\n\n## 二、各初中学费清单\n\n| 学校 | 年学费 | 住宿费 |\n|------|-------|-------|\n| 湛江市寸金培才学校【民办】 | 18,170元/年 | 900元/学期 |\n| 湛江市港城中学【民办】 | 22,400元/年 | 半宿500元/学期 |\n| 廉江市实验学校【民办】 | 35,600元/年 | 1,800元/学期 |\n| 湛江市霞山区滨海学校【民办】 | 15,000元/年 | 1,000元/学期 |\n| 湛江市海宁学校 | 14,000元/年（实际12,050元/年） | -- |\n| 湛江市银帆学校 | 15,050元/年 | 800元/学期 |\n| 湛江经济技术开发区实验学校 | 12,480元/年 | 1,000元/学期 |\n| 湛江市雷阳实验学校【民办】 | 23,050元/年 | 1,600元/学期 |\n| 湛江市东方实验学校 | 10,350元/年 | 1,500元/学期 |\n| 湛江市霞山区海景学校 | 12,050元/年 | -- |\n| 湛江市赤坎区金沙湾学校【民办】 | 7,800元/年 | -- |\n| 湛江市赤坎区东盟城学校【民办】 | 14,220元/年 | 1,250元/学期 |\n| 湛江市金城实验学校【民办】 | 10,570元/年 | 750元/学期（半宿400元/学期） |\n| 湛江市霞山区培正学校【民办】 | 15,050元/年 | -- |\n| 湛江市恒盛实验学校【民办】 | 12,850元/年 | 1,000元/学期 |\n| 湛江市东升学校【民办】 | 7,600元/年（新） | -- |\n| 湛江市南粤初级中学【民办】 | 7,600元/年（新） | -- |\n\n## 三、热门学校特色班招生信息\n\n### 特色班简介\n\n| 学校 | 特色班信息 |\n|------|----------|\n| 广东实验中学（公办） | \"一核双翼\"培养体系：以创新素养为核心，跨学科课程与科研实践为两翼，初高中贯通式培养。广州总部外派中坚教师带教学管理体系 |\n| 寸金培才学校（民办） | 初一特色班包括双语班、奥赛班。通过复试选拔，成绩优越者可就读特色班。中考成绩、教学质量和师资实力全市第一梯队 |\n| 湛江港城中学（民办） | 本部初中部具有特殊课程，多维度素质教育，语文和英语学科优势明显 |\n| 湛江一中（公办） | 一中名师强势回归，教育系统管理严谨完善，属教育局大力扶植学校 |\n\n### 分班考时间节点\n\n| 学校 | 分班考时间 | 备注 |\n|------|----------|------|\n| 培才双语班 | 7月29或30日 | 组织七年级新生学情调研；小学部提前签约部分优秀种子选手 |\n| 廉江实验学校 | 8月上旬或中旬 | -- |\n| 博雅学校 | 8月20日左右 | 七年级分班考试 |\n\n## 四、小升初核心需求分析\n\n### 四大升学路径\n\n1. **公办优质学位争夺**：关注学区内初中分层教学模式，优化户籍/房产提升对口学校质量（一中、省实等）\n2. **民办学校机会**：权衡摇号成功率与经济成本，关注教学质量持续性\n3. **特殊群体政策红利**：高层次人才、重点项目技能人才子女享受公办学校优先安排，随迁子女积分入学\n4. **均衡分班与隐性竞争**：关注学校特色课程，提升学生综合素质，适应均衡分班政策\n\n### 规划底层逻辑\n\n以公办学校为基本盘，民办学校为增长点，特色课程为加分项，保持规划灵活性。一切以孩子为中心，根据学生实际情况制定合适的小升初计划。\n\n## 五、关键时间节点（六年级全年）\n\n| 月份 | 重要阶段 | 准备事项 |\n|------|---------|---------|\n| 1月 | 六上期末备考 | 五下六上成绩对升学至关重要，1月底放寒假 |\n| 2月 | 寒假冲刺 | 利用假期查漏补缺，提升综合运用能力，开拓思维 |\n| 3月 | 民办初中招生信息发布 | 民办初中开始圈优（有的甚至更早），3月初开学 |\n| 4月 | 学校招生信息发布 | 招生信息陆续公布，中旬期中考 |\n| 5月 | 学校招生信息 | 招生信息陆续公布，为奖励考做准备 |\n| 6月 | 网上报名 | 六下期末考，公办学校志愿填报（网上报名） |\n| 7月 | 摇号、注册 | 上旬公办摇号；中旬民办学校填报志愿；下旬注册+补录；初一分班考或奖励考 |\n\n### 风险规避\n\n- **民办风险对冲**：确认公办学校保底学位，关注补录信息\n- **学区房政策风险**：避免购买\"伪学区房\"，咨询教育局确认学位锁定政策\n- **政策变动应对**：定期关注政策宣讲会，及时调整规划\n\n## 六、成功案例\n\n### 案例一：徐梓圆 -- 从\"小白\"到\"学霸\"\n\n- **英语**：四年级入学时46分，定制\"筑基计划\"（音标拼读+系统语法梳理），成绩直冲90+，英语能力已稳达初中水平\n- **数学**：曾是\"惯性放弃型选手\"，陈舒婷老师用引导式提问做\"思维教练\"，两年后蜕变为高难度测试中仅有的满分选手之一\n- **总结**：科学规划+有温度的坚持，两年完成逆袭\n\n### 案例二：黄俊翔 -- 从\"还行\"到\"非常行\"\n\n- **起点**：四年级，基础题OK但难题放弃，成绩波动大\n- **转折**：一次考试用自己的方法解开超级难题，老师及时抓住\"我能行\"的信心瞬间，给予正向强化\n- **进阶**：进入纯奥班后一度落后，通过心态调整从\"见题就跑\"变为\"遇题就兴奋\"\n- **成果**：成绩稳居95+，收获高手思维和越挫越勇的心态\n\n---\n\n**数据来源**：百分教育2025年11月5日家长会PPT《同心同行，智备升学》（汇报人：都琪莉）\n\n**时效性说明**：学费数据、中考成绩及招生政策均为2025年数据，实际情况可能因政策调整而变化，请以各校及教育局最新公告为准。\n", "lines": 120, "size": 7106}, "02_courses__yingyu__ket_course_system": {"id": "02_courses__yingyu__ket_course_system", "path": "02_courses/yingyu/ket_course_system.md", "name": "ket_course_system", "title": "KET英语课程体系", "tags": "[英语, KET, PET, 课程体系, 自然拼读, 剑桥英语]", "module": "02_courses", "content": "---\ntitle: KET英语课程体系\ntags: [英语, KET, PET, 课程体系, 自然拼读, 剑桥英语]\nlast_updated: 2026-03-24\n---\n\n# KET英语课程体系\n\n> 来源：KET方案.txt\n> 核心理念：以\"自然拼读\"夯实基础，以\"考辅教材\"强化能力，以\"综合教材\"提升思维，打造从启蒙到卓越、兴趣与成效并重的无缝衔接学习路径。\n\n## 一、四阶段英语成长路径\n\n语音启蒙 -> 基础夯实 & KET预备 -> 能力强化 & KET/PET冲刺 -> 卓越提升 & 超越PET\n\n| 阶段 | 适合年龄 | 核心教材 | 目标水平 | 核心成果 |\n|------|---------|---------|---------|---------|\n| 第一阶段：语音启蒙 | 5-7岁 | 牛津自然拼读世界 (Oxford Phonics World) 1-3级 | 见词能读，听音能写 | 掌握拼读规则，积累300+核心词汇 |\n| 第二阶段：基础夯实 & KET预备 | 7-10岁（完成自然拼读后） | Power Up Level 0-5 | A2（部分优秀学生A2+） | 四项技能均衡发展，日常沟通+书面表达，Power Up 4后衔接KET备考 |\n| 第三阶段：能力强化 & KET/PET冲刺 | 10-14岁（完成Power Up或同等水平） | Think Starter/1/2/3 + Compact/Exam Booster | KET: A2+ / PET: B1 | 高分通过KET/PET，批判性思维培养 |\n| 第四阶段：卓越提升 | 通过PET后 | 进阶课程 | 超越B1，FCE预备 | 为FCE学习打下基础 |\n\n### 第一阶段：语音启蒙（5-7岁）\n\n- 核心教材：《牛津自然拼读世界》(Oxford Phonics World) 1-3级\n- 教学重点：字母名&字母音、短元音、长元音、辅音连缀、字母组合音\n- 教学方式：歌曲、游戏、故事、动手活动\n- 辅助资源：配套分级阅读绘本\n- 成果输出：\n  1. 熟练拼读符合规则的单词\n  2. 掌握约300+听力及阅读核心词汇\n  3. 为流利阅读和标准发音打下基础\n\n### 第二阶段：基础夯实 & KET预备（7-10岁）\n\n- 核心教材：《Power Up》Level 0 - Level 5\n- 教学重点：\n  - 情景化学习：任务型学习，真实语境中运用语言\n  - 技能整合：每单元均衡发展四项技能，融入\"跨学科\"和\"文学\"板块\n  - 考试技能初步渗透：引入KET题型相似练习，但不做纯应试训练\n- 成果输出：\n  1. 语言能力稳定在A2水平，部分优秀学生可达A2+\n  2. 具备基本的日常沟通能力和书面表达能力\n  3. 学完Power Up 4后可自然衔接KET官方备考课程\n\n### 第三阶段：能力强化 & KET/PET冲刺（10-14岁）\n\n采用双轨制：\n\n**KET冲刺（能力接近A2的学生）：**\n- 主线教材：Think Starter 或 Think 1\n- 配套：Compact A2 / Exam Booster，专项强化+模考训练\n- 重点突破KET写作和口语模板\n\n**PET冲刺与深化（能力达到A2+或B1的学生）：**\n- 主线教材：Think 2 或 Think 3\n- 配套：Compact B1 / Exam Booster，高强度应试训练\n- Think教材优势：话题具思辨性，视频素材激发讨论，契合PET对观点表达的要求\n\n**教学重点：**\n- 思维与语言并重：通过\"Values\"和\"Me and My World\"等板块引导思考\n- 应试技巧精讲：分题型讲解解题技巧、时间管理、常见错误分析\n- 模考与诊断：定期全真模拟考试 + 详细个人成绩分析报告 + 一对一辅导\n\n## 二、跃升班体系（Kids' Box -> Power Up 过渡方案）\n\n跃升班适用于基础较弱、需要更缓进度的学生，使用《Kids' Box》替代低级别Power Up。\n\n### 阶段划分\n\n| 跃升班阶段 | 替代原课程 | 核心教材 | 定位 |\n|-----------|-----------|---------|------|\n| 阶段一：语音启蒙（5-7岁） | 不变 | 牛津自然拼读世界 1-3级 | 与标准体系相同 |\n| 阶段二：综合能力初步发展 | Power Up 0-2 | Kids' Box 一阶（Starter, Level 1） | 进度更缓，场景贴近低龄，对基础弱学生更友好 |\n| 阶段三：综合能力强化与KET预备 | Power Up 3-5 及 Think | Kids' Box 二阶、三阶 | 语法系统化，技能专项训练，软性应试引入 |\n\n### 阶段二教学重点（Kids' Box 一阶）\n\n- 主题词汇扩展：围绕\"我自己\"、\"我的家\"、\"我的学校\"、\"动物\"、\"食物\"等话题\n- 句型框架操练：\"This is...\"、\"I have...\"、\"I can...\"、\"I like...\"\n- 简单对话练习：角色扮演，问候、介绍、询问喜好\n- 持续拼读练习：拼读规则应用+简单绘本阅读\n\n### 阶段三教学重点（Kids' Box 二阶、三阶）\n\n- 语法系统化：一般现在时、现在进行时、一般过去时等系统梳理\n- 技能专项训练：阅读技巧（略读、扫读）、听力抓关键词、基础写作（写句子、连句成段）\n- \"软性\"应试引入：使用KET官方练习册，将题型拆解为课堂活动（如将阅读Part 1\"看图选句\"变成小组配对游戏）\n- 词汇对标KET：按KET官方主题词库进行词汇积累\n\n### 三种过渡路线（Kids' Box -> Power Up）\n\n| 路线 | 适用学生 | 过渡节点 | 说明 |\n|------|---------|---------|------|\n| 保守过渡 | 基础一般的学生 | KB Level 2 -> PU Level 2 | 低级别充分夯实词汇和句型，避免因阅读量和任务复杂度突增而吃力 |\n| 标准过渡（推荐） | 大多数学生 | KB Level 3 -> PU Level 3 | 最自然的过渡点。从L3起两套教材都指向KET备考，基础已够适应PU的学术和应试要求 |\n| 激进过渡 | 吸收好、基础扎实的尖子生 | KB Level 4 -> PU Level 5 | 跳过PU L4，快速进入PET预备阶段，仅适用于少数尖子生 |\n\n## 三、生源质量把控标准\n\n生源质量是教学成果的基石。严格分级确保\"因材施教\"理念落地。\n\n### 1. 三位一体分级测评\n\n| 测评工具 | 考察内容 |\n|---------|---------|\n| 标准化笔试 | 词汇、语法、阅读理解（考察逻辑）、微型写作（考察输出能力） |\n| 结构化口语面试 | 5维度评估（见下表） |\n| 家长/学生问卷 | 学习动机、过往经历、性格特点、家长预期 |\n\n### 2. 口语评估5维度\n\n| 维度 | 评估内容 |\n|------|---------|\n| 发音清晰度 | 语音准确性与辨识度 |\n| 词汇广度 | 词汇量与话题覆盖面 |\n| 语法准确性 | 句型结构正确率 |\n| 回答流利度 | 表达连贯性与反应速度 |\n| 互动交流意愿 | 主动沟通意愿与课堂参与度 |\n\n### 3. 等级准入标准与禁入红线\n\n| 课程 | 准入标准 |\n|------|---------|\n| 自然拼读班 | 无需英语基础，需具备基本听指令能力和课堂专注度 |\n| Kids' Box 一阶班 | 熟练掌握字母音形，掌握至少50个核心视觉词 |\n| KET冲刺班（使用Think） | 笔试成绩达A1+水平，口试能进行基本日常对话 |\n\n**禁入红线：** 若学生水平远低于班级要求，\"硬跟\"不仅效果差，还会严重打击孩子自信。应为其推荐更合适的衔接课程。\n\n### 4. 入学沟通与预期管理\n\n向家长详细解读《分级测评报告》，明确说明：学生当前水平、优势、短板以及在目标班级中的定位，确保机构、学生、家长三方对学习目标和发展路径有统一清晰的认知。\n\n## 四、教师教学质量把控\n\n### 师资要求\n\n基本专业技能及流利口语外，重点考察：\n- 课堂指令清晰度\n- 纠错技巧\n- 课堂氛围调动能力\n- 知识点转化的通俗易懂性\n\n### 持续专业发展\n\n| 活动 | 频率 | 内容 |\n|------|------|------|\n| 集体备课会 | 每周 | 统一下周教学进度、重难点、课堂活动及核心例句 |\n| 教学研讨会 | 每月 | 聚焦一个教学法主题深度研讨 |\n| 听课与磨课 | 常态化 | 互相听课，优化教学 |\n\n### 绩效评估核心指标\n\n学生续费率、出勤率、阶段测试通过率、成绩进步率、家长满意度\n\n### 教学标准化执行\n\n- 教案模板化：统一标准化课件（PPT）\n- 课堂流程标准化：目标公示 -> 热身 -> 新知讲解 -> 互动操练 -> 总结复盘 -> 作业布置（6环节）\n- 作业与反馈闭环：形式统一（词汇、语法、朗读、写作），明确提交截止日期\n\n### 学习过程外化呈现\n\n| 方式 | 频率/时机 | 内容 |\n|------|----------|------|\n| 课堂瞬间捕捉 | 每周2-3次 | 高光时刻照片/短视频（角色扮演、小组讨论、上台展示） |\n| 群内小反馈 | 每周1次 | 点名表扬某方面突出表现的学生 |\n| \"成长足迹\"电子档案 | 持续更新 | 录音、作文、手工作业等，以链接形式分享给家长 |\n| 成果展示公开课 | 每学期末 | 项目汇报、戏剧表演、辩论赛，邀请家长观摩 |\n| \"惊喜时刻\" | 通过考试/重大进步时 | 小奖状、定制勋章、拍照留念 |\n\n## 五、KET项目启动准备方案\n\n> 注意事项：目前还缺至少一名给力的口语老师\n\n### 教研准备（5周计划）\n\n#### 阶段一：资源库建立（第1-2周）\n\n**1. 制定《KET项目教学标准手册》**\n\n- 考试分析：编制《KET考试全解析》内部文档\n  - 四部分（阅读、写作、听力、口语）的题型、题量、分值、时长、评分标准\n  - 高频话题清单（个人信息、爱好、学校、食物、旅行等）\n  - 核心语法点清单（动词时态、比较级、情态动词等）\n  - 核心词汇表（按话题分类）\n- 课程地图：展示96课时如何分配到三个模块，标明教学目标、核心知识点、教材单元和备考训练\n- 教材使用指南：明确Power Up/Think与Compact/Booster如何搭配\n\n**2. 建立核心教学资源库（已有相应资源）**\n\n| 资源类型 | 内容 |\n|---------|------|\n| 课件库 | 标准化课件模板（课程目标、热身活动、词汇/语法讲解、教材活动引导、题型技巧、课堂总结与作业） |\n| 试题库 | 入学分级测试卷（A/B卷）、单元小测/周考、3次全真模考试卷+评分细则+答题卡 |\n| 专项练习题库 | 针对阅读Part 5、写作Part 7、听力Part 5等难点题型 |\n| 辅助材料库 | 高分词汇手册（中英对照+例句）、写作范文集（含批改注释）、口语必备句型和问答库 |\n\n#### 阶段二：师资培训与试讲演练（第3-5周）\n\n1. 考试深度解读：由项目带头人讲解《KET考试全解析》\n2. 教材与教法：集体备课，研讨\"教语言\"与\"教应试\"的无缝衔接\n3. 教学演练与考核：\n   - 模块试讲：每位主讲教师选择模块一中的典型课时进行15分钟试讲\n   - 专项试讲：口语板块进行口语模拟考试全流程演示\n   - 点评与优化：重点关注课堂指令清晰度、知识点准确性、课堂节奏、互动性\n   - 试讲需通过方可上岗\n\n### 招生宣传准备\n\n#### 短视频选题（7个方向，1-2分钟，持续更新）\n\n1. KET、PET、FCE是什么\n2. 备考KET最佳年龄是什么时候\n3. 不同水平的孩子如何备考KET\n4. 先学音标还是自然拼读\n5. 单词背完就忘如何加强\n6. 3-12岁的孩子英语学习如何规划\n7. 英语新课标改革后为什么学KET/PET能更好赋能校内英语成绩（为什么说英语新课标尽头是KET）\n\n#### 核心宣传语\n\n- \"从拼读到KET，我们规划每一步！\"\n- \"不只通过考试，更赢得未来 -- 能力与分数双丰收的KET金牌课程\"\n\n#### 转化策略\n\n| 策略 | 说明 |\n|------|------|\n| 内部转化（最优质生源） | 向在读自然拼读班和低级别剑桥班家长精准推送 |\n| 外部渠道 | 本地重点小学及幼儿园周边地推/社群运营 |\n| 到店引流 | 赠送KET单词书或邀约测评到店 |\n| 转化核心武器 | 课程说明会PPT，突出剑桥官方授权原版教材的权威背书 |\n", "lines": 235, "size": 11489}, "02_courses__zhongkao__grade9_comprehensive_plan": {"id": "02_courses__zhongkao__grade9_comprehensive_plan", "path": "02_courses/zhongkao/grade9_comprehensive_plan.md", "name": "grade9_comprehensive_plan", "title": "初三学业规划综合方案", "tags": "[中考, 初三, 学业规划, 备考, 分层教学]", "module": "02_courses", "content": "---\ntitle: 初三学业规划综合方案\ntags: [中考, 初三, 学业规划, 备考, 分层教学]\nlast_updated: 2026-03-24\n---\n\n# 初三学业规划综合方案\n\n## 一、湛江各高中2024-2025中考分数线对比\n\n| 学校名称 | 2024年分数线 | 2025年分数线 | 分差 | 学校特色 |\n|---------|------------|------------|-----|---------|\n| 湛江一中 | 699分 | 702分 | +3分 | 设有卓越班（竞赛方向）和实验班（综合素养）（理科见长） |\n| 湛江二中 | 682分 | 691分 | +9分 | 设有上善班和实验班，多元化发展路径（文科见长） |\n| 廉江实验学校（公办班） | 716分 | 715分 | -1分 | 军事化管理，重点班模考均分超660分 |\n| 广东实验中学湛江学校 | 未招生 | 700分 | -- | 设有南山班、格致班、平行班，\"基础扎实、特色鲜明、出口多元\"培养模式 |\n| 湛江市第四中学 | 660分 | 671分 | +11分 | 美术班联考过线率全省第一，40人考入中央美院 |\n| 博雅学校 | 701分（公办班） | 705分 | +4分 | 设立博雅班，超前学习课程，直通高中部博雅班，冲刺清华北大 |\n| 岭南师范学院附中 | 670分 | 674分 | +4分 | 依托高校资源，特控率78%，德语/日语班可直升海外名校 |\n\n**趋势**：2025年各校分数线普遍上涨，湛江二中涨幅最大（+9分），竞争持续加剧。\n\n## 二、全年备考时间轴\n\n| 阶段 | 时间区间 | 核心任务 | 关键事件（湛江特色） |\n|------|---------|---------|-------------------|\n| 基础奠定期 | 9-12月 | 完成新课；重点突破数学函数、物理力学、英语阅读等难点；每周完成2套中考真题 | 10月第一次月考、11月期中考、12月期末复习 |\n| 寒假突破期 | 1-2月 | 查漏补缺+弱科强化+一轮复习 | 1月期末考（推荐生参考成绩） |\n| 专题突破期 | 3-4月 | 二轮专题复习+专项考试备战 | 4月体育中考 |\n| 模拟冲刺期 | 5-6月 | 三轮模拟+回归基础 | 4月一模、5月实验考试、填报志愿，6月30日-7月2日中考 |\n| 衔接准备期 | 7月 | 初高衔接（数学、物理） | 7月查分、录取通知 |\n\n### 体育强化目标\n\n针对性训练长跑（男生1000米/女生800米）和实心球项目，目标体育满分80分。\n\n## 三、英语中考题型分值结构\n\n考试时间90分钟，满分120分（折分后100分满分）。\n\n| 模块 | 题量 | 分值 |\n|------|-----|------|\n| 听说运用 | 30题 | 30分 |\n| 语法选择 | 10题 | 10分 |\n| 完形填空 | 10题 | 10分 |\n| 阅读理解A篇 | 5题 | 10分 |\n| 阅读理解B篇 | 5题 | 10分 |\n| 阅读理解C篇 | 5题 | 10分 |\n| 短文填空 | 10题 | 15分 |\n| 读写综合 | 5题 | 10分 |\n| 书面表达 | 1篇 | 15分 |\n\n**重点**：阅读理解占比约40%，写作占比约15%。英语是容易出现分数两极分化的科目，优秀生可达95分以上，薄弱生可能不足60分。\n\n### 英语备考三轮规划\n\n| 轮次 | 内容 | 目标 |\n|------|-----|------|\n| 一轮语法复习 | 建立语法体系 | 指导做题技巧 |\n| 二轮专题突破 | 强化语言运用能力 | 提高做题速度，培养解题方法 |\n| 三轮综合提升 | 严格限时训练模拟卷和中考真卷 | 强化应试能力 |\n\n### 英语课后学习建议\n\n- **词汇是核心**：需掌握约2500个中考词汇，建议通过卡片记忆法、联想记忆法提升效率\n- **写作模板积累**：建议背诵10篇经典范文，掌握不同文体的写作框架\n- **真题训练**：反复练习近5年中考真题，熟悉题型分布和高频考点\n\n## 四、物理中考各册考点占比及题型分值\n\n### 各册考点占比\n\n| 册别 | 占比 | 重点内容 |\n|------|-----|---------|\n| 八年级上册 | 约15% | 声学、光学和热学基础知识，侧重现象解释和基本概念应用 |\n| 八年级下册 | 约35% | 力学为重点：力与运动、压强、浮力、简单机械和功 |\n| 九年级全一册 | 约50% | 电学为重中之重：电路、欧姆定律、电功电功率及电磁学 |\n\n### 题型与分值分布\n\n| 题型 | 题量 | 分值 | 考查重点 |\n|------|-----|------|---------|\n| 选择题 | 7小题 | 21分（每题3分） | 基础知识和基本技能，概念辨析和简单计算 |\n| 填空题 | 7小题 | 21分（每题3分） | 基础知识应用，实验现象分析和简单计算 |\n| 作图题 | 3小题 | 7分 | 力学受力分析、光学作图、电学电路连接 |\n| 实验题 | 3小题 | 20分 | 实验设计、数据处理和误差分析，强调探究过程 |\n| 计算题 | 2小题 | 11分 | 综合考查物理概念和规律应用，要求规范解题步骤 |\n\n### 物理重点难点\n\n- **力学**：浮力计算、机械效率、力学综合题（需理解公式适用条件，掌握受力分析方法）\n- **电学**：电路动态分析、电功率计算、电学实验设计（要求较强逻辑思维能力）\n- **实验探究**：控制变量法、转换法等科学方法的应用，实验数据处理和误差分析\n\n### 物理复习规划\n\n| 阶段 | 时间 | 内容 |\n|------|-----|------|\n| 寒假 | 1-2月 | 重点复习力学部分（力与运动、压强、浮力、简单机械和功），每周做1套力学综合测试 |\n| 一轮复习 | 2-4月 | 全面梳理初中物理知识点，形成知识网络，完成单元过关测试 |\n| 二轮复习 | 5月 | 专题复习，强化重点难点，每周完成1-2套中考模拟题 |\n| 冲刺阶段 | 6月 | 模拟考试训练，查漏补缺，回归教材，调整心态 |\n\n## 五、分层教学体系\n\n| 层级 | 定位 | 目标学校 |\n|------|-----|---------|\n| 培优体系 | 基础提升 | 一中、二中、附中、四中等优质高中 |\n| 实验体系 | 冲刺实验班 | 一中实验班、二中、省实、博雅、廉实等实验班 |\n| 精英定制 | 顶尖冲刺 | 一中卓越班、二中上善班、省实南山班等精英课程 |\n| 个性化一对一 | 精准补漏 | 针对性解决学生个体差异问题，弥补知识漏洞、适配学习节奏 |\n\n## 六、成功案例\n\n### 2024届成果\n\n助力5名学生从620分提升至700+，成功考入湛江一中。\n\n### 2025届成果\n\n助力5名学生从600分提升至700+，成功考入湛江一中；80%学员成功入读湛江二中、附中等重点高中。\n\n### 团队整体战绩\n\n近3年所带学生平均提分60+，90%学员考入目标高中，多名学生斩获中考单科满分。\n\n## 七、教师团队\n\n| 教师 | 学科 | 核心优势 |\n|------|------|---------|\n| 尤校（尤久勇） | 数学 | 中考数学命题研究组成员，独创\"题型拆解三步法\"，帮助1000+学生数学突破110分（满分120） |\n| 王彩霞 | 英语 | 专注初三英语冲刺，擅长高频考点归纳与作文模板定制，所带班级英语平均分连续5年超市重点线 |\n| 王涵 | 物理 | 注重实验与理论结合，用生活化案例拆解复杂公式，近2年帮助150+学生物理从及格线跃升至90+ |\n| 张桃 | 学业规划 | 深耕教育行业12年，专注小初高专业规划，已助力约2000名学子择校备考 |\n| 高老师 | 学管师 | 10年教育行业经验，擅长学情分析、学习规划与家校沟通，持教师资格证/校长证 |\n\n### 教学保障机制\n\n- 定期开展初三教学研讨会，同步最新中考政策与备考策略\n- \"教师-学管-家长\"三方沟通机制，每周反馈学生学习进度与提升方案\n- 每周《学习进度报告》（任务完成情况、错题分析）\n- 每月1次学情沟通会\n- 提供《初三专项资料包》（中考真题、作文素材、基础手册）\n\n## 八、家校配合建议\n\n- **学习环境营造**：安静的学习环境，合理作息，充足睡眠，营养均衡\n- **学习过程监督**：督促按计划完成复习任务，检查作业质量，关注学习状态变化，及时与老师沟通\n- **心理状态调适**：关注情绪变化，给予积极心理暗示，帮助缓解考试压力\n- **监督执行**：提醒完成\"每日任务\"（背诵、错题整理），拒绝代劳与拖延\n- **信息同步**：及时告知特殊情况（情绪、身体），避免信息差\n\n---\n\n**数据来源**：百分教育2025年11月5日初三家长茶话会PPT《聚焦初三关键期，共筑学业规划路》（主讲人：高老师、张桃、王彩霞、王涵）\n\n**时效性说明**：分数线数据为2024-2025年数据，中考政策及录取规则可能因年度调整而变化，请以湛江市教育局最新公告为准。\n", "lines": 158, "size": 8476}, "03_diagnosis__diagnostic_dimensions_quickref": {"id": "03_diagnosis__diagnostic_dimensions_quickref", "path": "03_diagnosis/diagnostic_dimensions_quickref.md", "name": "diagnostic_dimensions_quickref", "title": "各学科诊断维度速查表 (Diagnostic Dimensions Quickref)", "tags": "[type:reference, role:teacher, subject:general]", "module": "03_diagnosis", "content": "---\ntags: [type:reference, role:teacher, subject:general]\nlast_updated: 2026-03-22\nmaintainer: 教研团队\nrelated_files: [09_agents/diagnostic_report_agent.md, 03_diagnosis/parent_report_template.md, 03_diagnosis/teacher_report_template.md, 02_courses/math/junior_math_curriculum_2025.md, 02_courses/math/primary_math_curriculum_2025.md]\n---\n\n# 各学科诊断维度速查表\n\n> 本文件为诊断报告生成器和教师提供各学科的知识模块清单、常见错误模式和布鲁姆层次对照。\n> 使用方法：根据学生的学科和年级，查找对应的诊断维度，用于逐题归因和模块分析。\n\n---\n\n## 一、数学\n\n### 1.1 小学数学（1-6年级）\n\n#### 知识模块清单\n\n| 模块 | 覆盖年级 | 核心内容 | 对应课程体系 |\n|------|---------|---------|-------------|\n| 数的认识 | 1-4年级 | 整数、小数、分数的认识和大小比较 | 同步班1-4年级 |\n| 四则运算 | 1-6年级 | 整数/小数/分数的加减乘除、混合运算 | 同步班+培优班 |\n| 运算律与巧算 | 3-6年级 | 交换律、结合律、分配律、凑整、裂项 | 培优班+纯奥体系 |\n| 因数与倍数 | 5年级 | 因数、倍数、质数、合数、最大公因数、最小公倍数 | 同步班5年级 |\n| 分数与百分数 | 5-6年级 | 分数四则运算、百分数、分百小转换 | 同步班+培优班5-6年级 |\n| 方程初步 | 5-6年级 | 等式性质、一元一次方程、列方程解应用题 | 同步班5-6年级 |\n| 比和比例 | 6年级 | 比的概念、正反比例、比例尺 | 同步班6年级 |\n| 图形认识 | 1-4年级 | 平面图形、立体图形、角的认识、平行与垂直 | 同步班1-4年级 |\n| 面积与周长 | 3-6年级 | 长方形、正方形、三角形、平行四边形、梯形、圆 | 同步班3-6年级 |\n| 体积与表面积 | 5-6年级 | 长方体、正方体、圆柱、圆锥 | 同步班5-6年级 |\n| 统计与概率 | 3-6年级 | 统计表、统计图、平均数、可能性 | 同步班3-6年级 |\n| 位置与方向 | 1-4年级 | 上下前后左右、东南西北、数对与坐标 | 同步班1-4年级 |\n| 时间与测量 | 1-3年级 | 钟表、时分秒、长度单位、质量单位 | 同步班1-3年级 |\n| 应用题专题 | 3-6年级 | 和差倍、归一归总、盈亏、鸡兔同笼、行程、工程、浓度、利润 | 培优班+纯奥体系 |\n\n#### 常见错误模式\n\n| 年级段 | 错误类型 | 常见表现 | 根源分析 | 布鲁姆层次 |\n|--------|---------|---------|---------|-----------|\n| 1-2年级 | C1概念 | 不理解\"比多\"\"比少\"的关系 | 数量关系概念不清 | L2理解 |\n| 1-2年级 | C2计算 | 20以内加减法进退位错误 | 凑十法/破十法不熟练 | L1记忆 |\n| 3-4年级 | C2计算 | 多位数乘除法笔算出错 | 竖式书写不规范、进位遗漏 | L3应用 |\n| 3-4年级 | C3审题 | 应用题找不出数量关系 | 文字理解能力不足 | L2理解 |\n| 3-4年级 | C1概念 | 混淆面积和周长 | 概念区分不清 | L2理解 |\n| 5-6年级 | C2计算 | 分数通分、小数点定位错误 | 运算规则不熟 | L3应用 |\n| 5-6年级 | C4方法 | 不知道何时列方程、何时用算术法 | 缺乏方法选择策略 | L4分析 |\n| 5-6年级 | C1概念 | 比和分数混淆 | 概念关联理解不足 | L2理解 |\n| 5-6年级 | C4方法 | 行程/工程题无法建立数量关系 | 缺乏建模能力 | L4分析 |\n| 5-6年级 | C3审题 | 单位换算遗漏 | 审题习惯不佳 | L3应用 |\n\n---\n\n### 1.2 初中数学（7-9年级）\n\n#### 知识模块清单\n\n| 模块 | 覆盖年级 | 核心内容 | X体系对应 | Y体系拓展 |\n|------|---------|---------|----------|----------|\n| 有理数 | 7年级 | 概念、运算、绝对值、数轴 | 暑1-6+秋1-3 | 增加裂项、\"四非\"概念 |\n| 整式 | 7年级 | 代数式、整式加减、化简求值 | 暑9-11+秋4-6 | 增加定义新运算、找规律 |\n| 一元一次方程 | 7年级 | 解法、应用题 | 暑12-13+秋8-11 | 增加含参方程 |\n| 相交线与平行线 | 7年级下 | 对顶角、平行线判定与性质 | 寒1-3+春1-2 | 增加猪蹄/铅笔模型 |\n| 实数 | 7年级下 | 平方根、立方根、实数 | 寒4+春3-4 | 增加双重非负性 |\n| 平面直角坐标系 | 7年级下 | 坐标、对称、平移 | 寒5+春5-6 | 增加距离和面积 |\n| 二元一次方程组 | 7年级下 | 消元法、应用题 | 寒6+春8-10 | 增加含参和整数解 |\n| 不等式 | 7年级下 | 不等式（组）解法、应用 | 春11-13 | 增加含参不等式 |\n| 三角形 | 8年级 | 三边关系、内角和、外角 | 暑1-2+秋1-2 | 增加双角平分线模型 |\n| 全等三角形 | 8年级 | 五种判定、角平分线 | 暑3-5+秋3-4 | 增加倍长中线、截长补短 |\n| 轴对称与等腰三角形 | 8年级 | 垂直平分线、等腰性质 | 暑6-8+秋5-6 | 增加将军饮马、弦图 |\n| 整式乘除与因式分解 | 8年级 | 幂运算、乘法公式、因式分解 | 暑9-13+秋8-12 | 增加十字相乘、分组 |\n| 分式 | 8年级 | 分式运算、分式方程 | 暑14+秋13-14 | 增加含参分式方程 |\n| 二次根式 | 8年级下 | 概念、运算 | 寒1-2+春1 | 增加复合二次根式 |\n| 勾股定理 | 8年级下 | 正逆定理、应用 | 寒3-4+春2-3 | 增加推广和折叠 |\n| 四边形 | 8年级下 | 平行四边形、矩形、菱形、正方形 | 寒5-6+春4-8 | 增加中点问题专题 |\n| 函数初步 | 8年级下 | 一次函数图象、性质、应用 | 春9-13 | 增加行程和方案决策 |\n| 一元二次方程 | 9年级 | 解法、判别式、应用 | 暑1-3+秋1-2 | 增加韦达定理 |\n| 二次函数 | 9年级 | 图象、性质、最值、综合 | 暑4-6+秋3-5 | 增加含参问题 |\n| 旋转与中心对称 | 9年级 | 旋转性质、手拉手模型 | 暑8 | 增加旋转模型综合 |\n| 圆 | 9年级 | 垂径定理、圆周角、切线、扇形 | 暑9-10+秋6-9 | 增加圆综合证明 |\n| 相似 | 9年级 | 比例、判定、性质、位似 | 暑11-13+秋12-13 | 增加射影定理、多次相似 |\n| 三角函数 | 9年级 | 锐角三角函数、解直角三角形 | 暑14+秋14 | 增加解斜三角形 |\n| 反比例函数 | 9年级 | 概念、图象、综合 | 秋10-11 | 增加与几何综合 |\n| 概率与统计 | 全学段 | 频率、概率、统计量 | 各学期末 | 增加几何概型 |\n\n#### 常见错误模式\n\n| 年级 | 错误类型 | 常见表现 | 根源分析 | 布鲁姆层次 |\n|------|---------|---------|---------|-----------|\n| 7年级 | C1概念 | 绝对值的代数意义理解不清 | 分类讨论意识缺失 | L2理解 |\n| 7年级 | C2计算 | 有理数混合运算符号错误 | 符号法则不熟练 | L3应用 |\n| 7年级 | C4方法 | 应用题不会列方程 | 文字→代数翻译能力不足 | L4分析 |\n| 7年级 | C3审题 | 方程应用题漏看等量关系 | 审题习惯+数量关系分析 | L3应用 |\n| 8年级 | C4方法 | 全等三角形找不到判定路径 | 缺乏几何证明的思路模型 | L4分析 |\n| 8年级 | C1概念 | 混淆平行四边形/矩形/菱形/正方形的性质 | 四边形性质层级关系不清 | L2理解 |\n| 8年级 | C2计算 | 因式分解不完全 | 分解步骤不规范 | L3应用 |\n| 8年级 | C4方法 | 一次函数与方程/不等式关系不理解 | 函数思想未建立 | L5综合 |\n| 9年级 | C4方法 | 二次函数综合题无从下手 | 多知识点融合能力不足 | L5综合 |\n| 9年级 | C1概念 | 圆的切线判定条件不完整 | 概念记忆不精确 | L1记忆 |\n| 9年级 | C4方法 | 相似模型识别困难 | 缺乏模型化训练 | L4分析 |\n| 9年级 | C3审题 | 函数应用题中漏看自变量范围 | 审题不够严谨 | L3应用 |\n\n---\n\n### 1.3 高中数学\n\n#### 知识模块清单\n\n| 模块 | 覆盖学段 | 核心内容 |\n|------|---------|---------|\n| 集合与逻辑 | 高一上 | 集合运算、命题、充要条件 |\n| 函数概念与性质 | 高一上 | 定义域、值域、单调性、奇偶性、周期性 |\n| 基本初等函数 | 高一上 | 指数函数、对数函数、幂函数 |\n| 三角函数 | 高一下 | 任意角、弧度制、图象性质、正弦型函数 |\n| 三角恒等变换 | 高一下 | 和差角公式、倍角公式、辅助角公式 |\n| 平面向量 | 高一下 | 向量运算、坐标表示、数量积 |\n| 解三角形 | 高一下 | 正弦定理、余弦定理 |\n| 数列 | 高二上 | 等差数列、等比数列、求和方法 |\n| 不等式 | 高二上 | 基本不等式、线性规划 |\n| 立体几何 | 高二上 | 空间几何体、位置关系、空间向量 |\n| 解析几何 | 高二下 | 直线方程、圆、椭圆、双曲线、抛物线 |\n| 概率与统计 | 高二下 | 排列组合、二项式、条件概率、正态分布 |\n| 导数 | 高三/选修 | 导数概念、运算、应用（单调性/极值/最值） |\n\n#### 常见错误模式\n\n| 模块 | 错误类型 | 常见表现 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 函数 | C1概念 | 定义域求解遗漏隐含条件 | L3应用 |\n| 函数 | C4方法 | 抽象函数性质题无思路 | L5综合 |\n| 三角函数 | C2计算 | 诱导公式符号判断错误 | L3应用 |\n| 三角函数 | C4方法 | 正弦型函数图象变换顺序错误 | L4分析 |\n| 数列 | C4方法 | 求和方法选择不当 | L4分析 |\n| 立体几何 | C4方法 | 空间想象困难、辅助线不会作 | L4分析 |\n| 解析几何 | C2计算 | 联立方程计算量大导致出错 | L3应用 |\n| 解析几何 | C4方法 | 圆锥曲线综合题设而不求策略缺失 | L5综合 |\n| 导数 | C4方法 | 构造函数能力不足 | L6创造 |\n| 概率统计 | C1概念 | 排列与组合混淆 | L2理解 |\n\n---\n\n## 二、英语\n\n### 诊断维度\n\n| 维度 | 核心评估内容 | 适用学段 |\n|------|------------|---------|\n| 词汇 | 词汇量、拼写、词义辨析、词性变换 | 全学段 |\n| 语法 | 时态、语态、句型结构、从句、非谓语 | 全学段 |\n| 听力 | 语音辨识、信息捕捉、推理判断 | 全学段 |\n| 阅读理解 | 细节理解、主旨大意、推理判断、词义猜测 | 3年级起 |\n| 完形填空 | 语境理解、逻辑推理、固定搭配 | 初中起 |\n| 写作 | 内容完整性、语言准确性、篇章结构、词汇丰富度 | 3年级起 |\n| 口语表达 | 语音语调、流利度、准确性、交际能力 | 全学段 |\n\n### 各学段知识模块\n\n#### 小学英语\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 字母与语音 | 26个字母、自然拼读规则、音标基础 | 字母混淆（b/d, p/q）、发音规则记忆不全 | L1记忆 |\n| 基础词汇 | 课标词汇（约800词）、分类词汇 | 拼写错误、词义混淆 | L1记忆 |\n| 基础句型 | 陈述句、疑问句、否定句、There be | 语序错误、be动词用错 | L2理解 |\n| 基础时态 | 一般现在时、现在进行时、一般过去时、一般将来时 | 时态标志词不敏感、动词变形错误 | L3应用 |\n| 阅读理解 | 短文理解、图文匹配 | 生词障碍、信息定位不准 | L2理解 |\n| 简单写作 | 看图写话、短文填空 | 句式单一、拼写错误、逻辑不通 | L3应用 |\n\n#### 初中英语\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 词汇与词法 | 课标词汇（约1600词）、词性转换、构词法 | 词形变化错误、近义词混淆 | L1-L2 |\n| 八大时态 | 一般/进行/完成时态体系 | 时态选择错误、have/has混用 | L3应用 |\n| 被动语态 | 主被动转换、各时态被动形式 | 被动语态构成不完整 | L3应用 |\n| 从句 | 宾语从句、定语从句、状语从句 | 连接词选择错误、语序错误 | L4分析 |\n| 非谓语 | 动名词、不定式、分词 | 用法混淆、搭配错误 | L4分析 |\n| 阅读理解 | 细节题、推断题、主旨题、词义题 | 定位不准、过度推理、主旨偏离 | L2-L4 |\n| 完形填空 | 语境理解、逻辑推理 | 只看局部不看整体、固定搭配不熟 | L4分析 |\n| 书面表达 | 应用文、话题作文 | 中式英语、结构混乱、时态不一致 | L5综合 |\n\n#### 高中英语\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 高级词汇 | 课标词汇（约3500词）、高频短语 | 词汇深度不够、一词多义不清 | L1-L2 |\n| 复杂语法 | 虚拟语气、倒装、强调、省略 | 语法规则记忆不全、复杂句理解困难 | L4分析 |\n| 阅读理解 | 长难句、议论文、说明文、推理判断 | 长难句拆分困难、干扰项辨析不准 | L4-L5 |\n| 完形填空 | 篇章逻辑、语境线索 | 逻辑推理能力不足 | L4分析 |\n| 语法填空 | 词法、句法综合 | 词性判断错误、语法知识点遗漏 | L3应用 |\n| 短文改错 | 错误类型识别（词法/句法/行文逻辑） | 改错敏感度不够 | L4分析 |\n| 书面表达 | 应用文、读后续写、概要写作 | 结构不清、逻辑跳跃、高级表达不足 | L5-L6 |\n\n### 英语错误类型对照\n\n| 错误类型 | 英语学科表现 | 诊断关注点 |\n|---------|-------------|-----------|\n| C1概念性 | 语法规则记忆不准确、词义理解偏差 | 检查语法笔记、词汇本 |\n| C2计算性（拼写性） | 拼写错误、词形变化遗漏 | 检查拼写习惯、变化规则掌握度 |\n| C3审题性 | 题目要求没看清、文章信息定位不准 | 检查审题习惯、阅读策略 |\n| C4方法性 | 解题策略缺失（如阅读跳读/精读策略、写作框架） | 检查解题方法训练 |\n\n---\n\n## 三、语文\n\n### 诊断维度\n\n| 维度 | 核心评估内容 | 适用学段 |\n|------|------------|---------|\n| 基础知识 | 字词、拼音、成语、病句、标点、文学常识 | 全学段 |\n| 阅读理解 | 记叙文、说明文、议论文阅读分析 | 全学段 |\n| 文言文/古诗词 | 实词虚词、翻译、理解、鉴赏 | 初中起 |\n| 作文 | 审题立意、结构布局、语言表达、素材运用 | 全学段 |\n| 名著阅读 | 名著情节、人物分析、主题理解 | 初中起 |\n| 综合运用 | 口语交际、综合性学习、情境任务 | 全学段 |\n\n### 各学段知识模块\n\n#### 小学语文\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 拼音与识字 | 声韵母、整体认读、常用字 | 前后鼻音混淆、形近字混淆 | L1记忆 |\n| 词语积累 | 近反义词、成语、词语搭配 | 词义理解不准、成语误用 | L2理解 |\n| 句子 | 句式转换、修辞、缩句扩句、病句 | 语序不当、修辞识别不准 | L3应用 |\n| 阅读理解 | 段意概括、中心思想、信息提取 | 概括不全面、主旨偏离 | L2-L4 |\n| 看图/命题写作 | 内容完整、条理清晰、语句通顺 | 跑题、流水账、缺乏细节 | L3-L5 |\n\n#### 初中语文\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 基础积累 | 字音字形、成语运用、病句辨析、文学常识 | 易混字音字形、成语语境不当 | L1-L2 |\n| 古诗文默写 | 课内必背篇目 | 错别字、记忆混淆 | L1记忆 |\n| 文言文阅读 | 实词虚词、翻译、内容理解 | 一词多义判断不准、翻译不完整 | L2-L3 |\n| 古诗词鉴赏 | 意象、手法、情感分析 | 答题模式不规范、手法识别不准 | L4分析 |\n| 记叙文阅读 | 人物分析、情节理解、写作手法、主旨概括 | 答题不全面、脱离文本 | L3-L4 |\n| 说明文/议论文阅读 | 说明方法/论证方法、结构分析 | 方法识别错误、答题格式不规范 | L3-L4 |\n| 名著阅读 | 情节复述、人物评价、主题探究 | 情节记忆不准、分析浅层 | L2-L4 |\n| 作文 | 审题立意、选材组材、语言表达 | 立意肤浅、素材陈旧、结构散乱 | L5-L6 |\n\n#### 高中语文\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 语言文字运用 | 字音字形、成语、病句、语言表达 | 易混词辨析不准、语病类型混淆 | L1-L3 |\n| 文言文阅读 | 实词虚词、特殊句式、断句、翻译、分析 | 通假字/古今异义遗漏、断句不准 | L2-L4 |\n| 古诗词鉴赏 | 意象意境、表达技巧、思想感情 | 术语使用不当、分析脱离诗句 | L4-L5 |\n| 现代文阅读I | 论述类/实用类文本、信息筛选和整合 | 选项比对不细致、推理过度 | L3-L4 |\n| 现代文阅读II | 文学类文本、鉴赏评价 | 答题要点遗漏、艺术手法分析不到位 | L4-L5 |\n| 作文 | 任务驱动型作文、议论文 | 审题偏离、论证逻辑薄弱、素材老旧 | L5-L6 |\n\n### 语文错误类型对照\n\n| 错误类型 | 语文学科表现 | 诊断关注点 |\n|---------|-------------|-----------|\n| C1概念性 | 语法/修辞/文学概念记忆不准确 | 基础知识掌握度 |\n| C2计算性（书写性） | 错别字、默写错误 | 书写规范和记忆准确性 |\n| C3审题性 | 作文跑题、阅读题答非所问 | 审题训练和题目理解 |\n| C4方法性 | 阅读答题缺乏规范格式、作文缺乏结构意识 | 答题技巧和方法训练 |\n\n---\n\n## 四、物理\n\n### 诊断维度（初中）\n\n| 模块 | 覆盖学段 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|---------|-----------|\n| 声学 | 初二上 | 声音的产生与传播、特性 | 混淆音调和响度 | L1-L2 |\n| 光学 | 初二上 | 光的传播、反射、折射、透镜成像 | 成像规律记忆不全、光路图画错 | L2-L3 |\n| 热学 | 初二上 | 温度、物态变化、内能、热量 | 混淆温度和热量、物态变化判断错误 | L2-L3 |\n| 力学基础 | 初二下 | 力、弹力、重力、摩擦力 | 力的分析遗漏、受力图不完整 | L3-L4 |\n| 运动学 | 初二下 | 速度、匀速运动、参照物 | 速度公式应用错误、参照物判断不清 | L3应用 |\n| 压强 | 初二下 | 固体压强、液体压强、大气压 | 受力面积判断错误、连通器原理不理解 | L3-L4 |\n| 浮力 | 初二下 | 阿基米德原理、浮沉条件 | 排开液体体积判断错误、浮沉条件混淆 | L4分析 |\n| 简单机械 | 初二下 | 杠杆、滑轮、机械效率 | 力臂画错、额外功遗漏 | L3-L4 |\n| 电学基础 | 初三 | 电路、电流、电压、电阻 | 串并联电路判断错误、电表读数不规范 | L2-L3 |\n| 欧姆定律 | 初三 | 欧姆定律、电阻测量 | 公式变形应用错误、实验设计不完整 | L3-L4 |\n| 电功与电功率 | 初三 | 电功、电功率、焦耳定律 | 额定功率和实际功率混淆、公式选择错误 | L4分析 |\n| 电磁学 | 初三 | 磁场、电磁感应、电动机/发电机 | 左右手定则混淆 | L3应用 |\n\n### 诊断维度（高中）\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 运动学 | 匀变速直线运动、运动图象 | 正负号含义理解不清、图象斜率/面积意义不理解 | L3-L4 |\n| 力学 | 牛顿三定律、受力分析 | 隔离法/整体法选择不当、非惯性系问题 | L4-L5 |\n| 曲线运动 | 抛体运动、圆周运动 | 运动分解不准确、向心力分析遗漏 | L4分析 |\n| 万有引力 | 天体运动、卫星问题 | 轨道参数关系混淆 | L4分析 |\n| 功与能 | 动能定理、机械能守恒 | 功的正负判断错误、能量守恒条件遗漏 | L4-L5 |\n| 动量 | 动量守恒、碰撞 | 系统选取不当、内力外力判断 | L5综合 |\n| 电场 | 电场强度、电势、电容 | 等势面/电场线关系不清 | L3-L4 |\n| 恒定电流 | 电路分析、实验设计 | 内外接法选择错误 | L4分析 |\n| 磁场 | 安培力、洛伦兹力 | 左手定则应用错误 | L3应用 |\n| 电磁感应 | 法拉第定律、楞次定律 | 感应电动势方向判断错误 | L4-L5 |\n\n### 物理错误类型对照\n\n| 错误类型 | 物理学科表现 | 诊断关注点 |\n|---------|-------------|-----------|\n| C1概念性 | 物理概念/定律理解偏差 | 概念建立过程、物理量区分 |\n| C2计算性 | 公式代入错误、单位换算错误 | 公式记忆、单位意识 |\n| C3审题性 | 物理情境分析不清、条件遗漏 | 审题方法、物理建模 |\n| C4方法性 | 不知道用什么定律/定理、多过程分析困难 | 解题策略、物理思维方法 |\n\n---\n\n## 五、化学\n\n### 诊断维度（初中）\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 物质的变化与性质 | 物理/化学变化、物理/化学性质 | 变化和性质概念混淆 | L1-L2 |\n| 空气与氧气 | 空气组成、氧气制取和性质 | 实验操作要点记忆不全 | L1-L2 |\n| 水与溶液 | 水的组成、溶解度、溶液配制 | 溶解度曲线读图错误 | L3应用 |\n| 碳及其化合物 | CO/CO2性质、实验室制取 | CO和CO2性质混淆 | L2-L3 |\n| 金属 | 金属活动性顺序、置换反应 | 活动性顺序应用错误 | L3应用 |\n| 酸碱盐 | 酸碱盐概念、复分解反应、中和反应 | 反应条件判断不准确 | L3-L4 |\n| 化学方程式 | 书写、配平、计算 | 配平错误、化学式书写不规范 | L3应用 |\n| 实验探究 | 实验设计、现象描述、结论推理 | 实验步骤遗漏、变量控制不严 | L4-L5 |\n| 计算题 | 根据化学方程式计算 | 摩尔质量计算错误、比例关系混乱 | L3-L4 |\n\n### 诊断维度（高中）\n\n| 模块 | 核心内容 | 常见错误 | 布鲁姆层次 |\n|------|---------|---------|-----------|\n| 物质的量 | 摩尔、摩尔质量、气体摩尔体积、浓度 | 单位换算错误、气体条件限制 | L3应用 |\n| 离子反应 | 电解质、离子方程式 | 拆分规则不清、离子共存判断 | L3-L4 |\n| 氧化还原 | 升降法、电子转移 | 化合价判断错误、电子转移方向 | L3-L4 |\n| 元素周期律 | 周期表、元素性质递变 | 周期/族规律混淆 | L2-L3 |\n| 化学反应与能量 | 热化学方程式、盖斯定律 | 正负号含义、反应热计算 | L4分析 |\n| 化学平衡 | 平衡常数、移动方向 | 勒夏特列原理应用不准 | L4-L5 |\n| 电化学 | 原电池、电解池 | 正负极/阴阳极混淆、电子流向 | L4分析 |\n| 有机化学 | 官能团、反应类型、同分异构 | 官能团性质混淆、计数遗漏 | L3-L5 |\n| 实验综合 | 实验设计、定量分析 | 实验方案不严密、误差分析不全 | L5-L6 |\n\n### 化学错误类型对照\n\n| 错误类型 | 化学学科表现 | 诊断关注点 |\n|---------|-------------|-----------|\n| C1概念性 | 化学概念/反应原理理解偏差 | 微观本质理解、概念辨析 |\n| C2计算性 | 化学计算错误、配平错误 | 计算规范性、配平技巧 |\n| C3审题性 | 实验条件/反应条件忽略 | 审题严谨性、条件敏感度 |\n| C4方法性 | 实验设计不完整、推断方法缺失 | 化学思维方法、实验素养 |\n\n---\n\n## 六、布鲁姆层次通用对照表\n\n| 层次 | 关键词 | 典型题目特征 | 教学策略 |\n|------|--------|-------------|---------|\n| **L1 记忆** | 回忆、列举、定义、识别 | 直接考察公式/定义/事实 | 反复练习、记忆卡片、口诀 |\n| **L2 理解** | 解释、举例、分类、比较 | 用自己的话解释、概念辨析 | 概念图、多种表征、生活实例 |\n| **L3 应用** | 运用、计算、解决、操作 | 常规题型、公式直接套用 | 变式训练、限时练习、规范书写 |\n| **L4 分析** | 区分、组织、归因、对比 | 综合题、多步推理、条件拆分 | 模型化教学、条件标注法、说意训练 |\n| **L5 综合** | 设计、构建、创造、整合 | 压轴题、跨模块综合、实验设计 | 专题训练、真题精练、教师示范拆解 |\n| **L6 创造** | 评价、创新、产生新方案 | 开放题、探究题、竞赛题 | 项目式学习、开放讨论、竞赛辅导 |\n\n---\n\n## 七、使用指南\n\n### 如何为一道错题做诊断标注\n\n```\n第X题 → 确定知识点（查模块清单）\n       → 确定所属模块\n       → 判断错误类型（C1/C2/C3/C4）\n       → 判断布鲁姆层次（L1-L6）\n       → 查该知识点对应的课程讲次\n       → 记入逐题分析表\n```\n\n### 如何识别错误簇\n\n```\n将错题按模块排列\n    → 同一模块有2+道错题？ → 标记为错误簇\n    → 查模块清单中的知识链条（前序→当前→后续）\n    → 判断错误簇的根源知识点\n    → 制定针对性补强方案\n```\n\n### 如何匹配课程\n\n```\n查看学生得分率\n    → <75%：X体系（同步）或一对一\n    → 75%-90%：Y体系（培优）\n    → >90%：Z体系（思维突破）\n    → 参照课程选择器（02_courses/course_selector.md）确认具体班型\n```\n", "lines": 397, "size": 24760}, "03_diagnosis__junior__bio_geo_sprint": {"id": "03_diagnosis__junior__bio_geo_sprint", "path": "03_diagnosis/junior/bio_geo_sprint.md", "name": "bio_geo_sprint", "title": "初中画像：生物地理冲刺需求 (Bio Geo Sprint)", "tags": "[stage:junior, subject:biology, subject:geography, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:biology, subject:geography, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/science/junior_bio_geo.md]\n---\n\n# 初中画像：生物地理冲刺需求\n\n## 背景\n\n初二学生面临生物地理会考/中考，需要在短期内系统复习和提分。\n\n## 典型情况\n\n- 初二下学期，距离会考只有几个月\n- 生物地理平时关注不够，复习不系统\n- 需要短期内集中突破\n\n## 推荐方案\n\n→ `02_courses/science/junior_bio_geo.md`\n\n生物冲刺班 + 地理冲刺班，多个校区均有开设。\n\n## 家长沟通要点\n\n- 生物地理虽然不是主科，但会考成绩影响中考总分\n- 短期集中冲刺效果明显\n- 建议尽早开始，不要等到临考前一个月\n", "lines": 31, "size": 782}, "03_diagnosis__junior__english_three_tiers": {"id": "03_diagnosis__junior__english_three_tiers", "path": "03_diagnosis/junior/english_three_tiers.md", "name": "english_three_tiers", "title": "初中英语画像：三层匹配 (English Three Tiers)", "tags": "[stage:junior, subject:english, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:english, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/english/junior_english_tiers.md]\n---\n\n# 初中英语画像：三层匹配\n\n## 快速匹配表\n\n| 小学英语基础 | 推荐班型 | 学制 |\n|------------|---------|------|\n| 95分+且系统学过剑桥/新概念 | 英语卓越班 | 2.5年 |\n| 补习后达95分 | 英语实验班 | 2年 |\n| 基础中等 | 英语同步培优班 | 同步 |\n\n## 详细诊断标准\n\n### 匹配卓越班的信号\n- 小学英语长期95分以上\n- 系统学习过剑桥英语或新概念英语\n- 具备扎实的语法基础和阅读能力\n- 有明确的超前学习意愿\n- 目标：中考满分+高中125分\n\n### 匹配实验班的信号\n- 小学英语成绩在补习帮助下达到95分\n- 有一定基础但不如卓越班学生扎实\n- 需要兼顾基础巩固和能力拔高\n- 目标：高中110分+\n\n### 匹配同步培优班的信号\n- 英语基础中等\n- 课内知识尚有薄弱点\n- 需要先稳住校内成绩\n- 目标：扎实掌握单元内容，提升考试成绩\n\n→ 详细课程介绍见 `02_courses/english/junior_english_tiers.md`\n", "lines": 40, "size": 1164}, "03_diagnosis__junior__math_advanced_level": {"id": "03_diagnosis__junior__math_advanced_level", "path": "03_diagnosis/junior/math_advanced_level.md", "name": "math_advanced_level", "title": "初中数学画像：拔高冲刺水平 (Math Advanced Level)", "tags": "[stage:junior, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/junior_math_tiers.md]\n---\n\n# 初中数学画像：拔高冲刺水平\n\n## 典型特征\n\n- 课本知识扎实，中等难度题稳定不丢分\n- 对压轴题有兴趣但解题不够稳定\n- 需要从\"单知识点解题\"升级到\"多知识点综合运用\"\n- 适合冲刺满分/接近满分\n\n## 推荐方案\n\n### 推荐：数学卓越班 / 双语班\n→ `02_courses/math/junior_math_tiers.md`\n\n卓越班教学特色：\n- 知识融合教学（圆→相似→旋转→三角函数）\n- 母题模型训练\n- 压轴题模型化爆破\n- 说意训练（复述解题逻辑）\n\n### 初三特色：双语班（尤老师亲授）\n- 中英双语教学数学\n- 思维强度高，持续出成绩\n- 需要学生有主动思考的意愿\n\n## 教学工具\n\n- 《湛江中考几何高频错题模型库》\n- 相似四大模型\n- 旋转在压轴题中的应用\n- 超纲但实用的解题工具（胡不归、阿氏圆）\n\n## 家长沟通要点\n\n- 这个层级的家长关注\"能不能冲满分\"\n- 强调：我们不追求让孩子背更多题，而是训练\"拆解题目→调用模型→组合知识\"的能力\n- 这种能力对高中数学同样适用，是长期竞争力\n", "lines": 45, "size": 1288}, "03_diagnosis__junior__math_sync_level": {"id": "03_diagnosis__junior__math_sync_level", "path": "03_diagnosis/junior/math_sync_level.md", "name": "math_sync_level", "title": "初中数学画像：同步培优水平 (Math Sync Level)", "tags": "[stage:junior, subject:math, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:math, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/math/junior_math_tiers.md]\n---\n\n# 初中数学画像：同步培优水平\n\n## 典型特征\n\n- 课本知识基本掌握，但做题速度和准确率不稳定\n- 中等难度题有时能做对有时做不对\n- 对较复杂的综合题束手无策\n- 学习方法偏记忆型，缺乏系统的解题策略\n\n## 推荐方案\n\n### 推荐：数学培优班\n→ `02_courses/math/junior_math_tiers.md`\n\n- 培优班在课本基础上做能力提升\n- 注重变式题训练和解题策略\n- 逐步建立知识框架和模型思维\n\n### 如果基础确实薄弱\n→ 数学提高班或一对一\n\n## 预期目标\n\n通过1-2个学期的系统训练，实现：\n- 中等难度题稳定不丢分\n- 建立基本的解题策略和模型意识\n- 逐步具备挑战较难题目的能力\n", "lines": 35, "size": 897}, "03_diagnosis__junior__physics_entry": {"id": "03_diagnosis__junior__physics_entry", "path": "03_diagnosis/junior/physics_entry.md", "name": "physics_entry", "title": "初中物理画像：初二起步 (Physics Entry)", "tags": "[stage:junior, subject:physics, type:diagnosis]", "module": "03_diagnosis", "content": "---\ntags: [stage:junior, subject:physics, type:diagnosis]\nlast_updated: 2026-03-19\nmaintainer: 教研团队\nrelated_files: [02_courses/science/junior_physics.md]\n---\n\n# 初中物理画像：初二起步\n\n## 背景\n\n初二开始学习物理，是一个全新科目。学生可能面临：\n- 从文字理解转向物理模型理解的思维转换\n- 实验操作和分析能力尚待建立\n- 不确定自己是否适合理科\n\n## 分层匹配\n\n| 物理成绩 | 推荐班型 | 定位 |\n|---------|---------|------|\n| < 80分 | 物理培优班 | 基础巩固+系统提升 |\n| 80-89分 | 物理提高班/实验班 | 能力拔高 |\n| ≥ 90分 | 满分实验班 | 压轴突破，冲满分 |\n\n## 满分实验班特别说明\n\n入班门槛：90分以上\n\n三大硬核目标：\n1. 压轴题模型化爆破\n2. 超前学构建完整体系\n3. 冲选拔备战名校实验班\n\n特色：不刷题只讲模型，18年教学经验，小班名师辅导\n\n→ 详见 `02_courses/science/junior_physics.md`\n", "lines": 37, "size": 984}, "03_diagnosis__parent_report_template": {"id": "03_diagnosis__parent_report_template", "path": "03_diagnosis/parent_report_template.md", "name": "parent_report_template", "title": "学情诊断报告（家长版）模板 (Parent Report Template)", "tags": "[type:template, role:consultant, role:teacher, role:xueguan, subject:general]", "module": "03_diagnosis", "content": "---\ntags: [type:template, role:consultant, role:teacher, role:xueguan, subject:general]\nlast_updated: 2026-03-22\nmaintainer: 教研团队\nrelated_files: [09_agents/diagnostic_report_agent.md, 03_diagnosis/teacher_report_template.md, 08_rules/communication_redlines.md, 02_courses/course_selector.md]\n---\n\n# 学情诊断报告（家长版）模板\n\n> 本模板供诊断报告生成器使用，也可由教师/学管手动填写。\n> 语言原则：通俗易懂、有温度、先鼓励后建议。逻辑：发现问题 -> 给出希望 -> 明确行动。\n\n---\n\n## 报告结构模板\n\n### 一、报告封面\n\n```\n============================================\n        百分教育 学情诊断报告\n       \"好思维，让学习更轻松\"\n============================================\n\n学生姓名：{{student_name}}\n年    级：{{grade}}\n就读学校：{{school}}\n诊断学科：{{subject}}\n考试名称：{{exam_name}}\n诊断日期：{{diagnosis_date}}\n诊断教师：{{teacher_name}}\n报告编号：{{report_id}}\n\n============================================\n```\n\n### 二、一句话总评\n\n> {{one_line_summary}}\n\n撰写要求：\n- 温暖 + 客观，先肯定再点方向\n- 长度控制在30-50字\n- 示例格式：\"{{student_name}}同学在{{亮点描述}}方面表现不错，如果在{{待提升方向}}上加以针对性训练，提升空间很大。\"\n\n### 三、成绩概览\n\n#### 总分信息\n\n| 项目 | 数据 |\n|------|------|\n| 本次得分 | {{student_score}} / {{total_score}} |\n| 得分率 | {{score_rate}}% |\n| 班级/年级平均分 | {{class_average}}（如有） |\n| 与平均分差距 | {{gap_to_average}}（如有） |\n| 上次成绩 | {{last_score}} / {{last_total}}（如有） |\n| 进步/变化 | {{score_change}}（如有） |\n\n#### 各模块得分率\n\n| 知识模块 | 满分 | 得分 | 得分率 | 评价 |\n|---------|------|------|--------|------|\n| {{module_1}} | {{max_1}} | {{score_1}} | {{rate_1}}% | {{评价_1}} |\n| {{module_2}} | {{max_2}} | {{score_2}} | {{rate_2}}% | {{评价_2}} |\n| {{module_3}} | {{max_3}} | {{score_3}} | {{rate_3}}% | {{评价_3}} |\n| ... | ... | ... | ... | ... |\n\n评价标准：\n- 90%以上 -> \"掌握良好\"\n- 75%-89% -> \"基本掌握\"\n- 60%-74% -> \"有成长空间\"\n- 60%以下 -> \"需重点关注\"\n\n### 四、亮点发现\n\n> 在正式分析问题之前，先看看{{student_name}}做得好的地方：\n\n1. **{{亮点1标题}}**：{{具体描述，用数据支撑}}\n2. **{{亮点2标题}}**：{{具体描述}}\n3. {{如有更多亮点}}\n\n撰写要求：\n- 至少找出2个亮点\n- 用具体数据说明，不用空洞形容词\n- 示例：\"计算模块得分率达到92%，说明基本运算能力扎实\"\n\n### 五、待提升模块（成长空间）\n\n> 以下是{{student_name}}目前的成长空间，也是接下来重点训练的方向：\n\n#### 成长空间 1：{{模块名称}}\n\n- **当前得分率：** {{rate}}%\n- **主要表现：** {{通俗描述孩子在这个模块的具体表现}}\n- **通俗解释：** {{用家长能理解的语言解释为什么会出错}}\n- **好消息：** {{给出希望，如\"这类问题通过针对性训练通常改善较快\"}}\n\n#### 成长空间 2：{{模块名称}}\n\n（同上格式）\n\n#### 成长空间 3（如有）：{{模块名称}}\n\n（同上格式）\n\n### 六、错误类型分析\n\n> 下面用通俗的方式解释{{student_name}}的错误类型分布：\n\n| 错误类型 | 通俗解释 | 占比 | 举例 |\n|---------|---------|------|------|\n| 概念理解偏差 | 对某些知识点的理解还不够透彻，需要重新\"吃透\"概念 | {{ratio_1}}% | {{具体错题举例}} |\n| 计算小失误 | 计算过程中的粗心失误，本来会做但算错了 | {{ratio_2}}% | {{具体错题举例}} |\n| 读题不够仔细 | 没有完整读懂题目的要求，漏掉了重要条件 | {{ratio_3}}% | {{具体错题举例}} |\n| 解题方法不熟 | 面对题目不知道该用什么方法，或用错了方法 | {{ratio_4}}% | {{具体错题举例}} |\n\n> **解读：** {{一段话总结错误分布的含义，如\"计算失误占了较大比例，说明孩子其实是'会做但做不对'，通过规范计算习惯可以快速减少丢分\"}}\n\n### 七、个性化提升方案\n\n> 基于以上分析，为{{student_name}}制定以下优先行动方案（由重要到次要排序）：\n\n#### 行动方案 1：{{方案标题}}\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | {{详细描述要做什么}} |\n| **负责人** | {{教师/学管/家长}} |\n| **时间安排** | {{开始时间}} 至 {{结束时间}} |\n| **预期效果** | 根据同类学员数据，{{预期改善描述}} |\n| **检验方式** | {{如何验证效果，如\"下次月考该模块得分率提升至75%以上\"}} |\n\n#### 行动方案 2：{{方案标题}}\n\n（同上格式）\n\n#### 行动方案 3：{{方案标题}}（如有）\n\n（同上格式）\n\n### 八、家长配合建议\n\n> 家庭环境对学习效果有重要影响，以下是建议家长配合的具体事项：\n\n1. **{{建议1标题}}**\n   - 具体做法：{{描述具体可执行的动作}}\n   - 预计每天/每周耗时：{{时间估算}}\n   - 为什么重要：{{简要说明原因}}\n\n2. **{{建议2标题}}**\n   - 具体做法：{{描述}}\n   - 预计耗时：{{时间}}\n   - 为什么重要：{{原因}}\n\n3. **{{建议3标题}}**（如有）\n\n注意：家长配合建议不超过3条，必须具体可执行，不说\"多关注学习\"这类模糊建议。\n\n### 九、推荐课程方案\n\n> 基于本次诊断结果，为{{student_name}}推荐以下课程安排：\n\n| 项目 | 推荐内容 |\n|------|---------|\n| **推荐班型** | {{班型名称}} |\n| **推荐理由** | {{基于诊断数据的具体理由}} |\n| **课程内容匹配** | {{该班型如何针对性解决诊断发现的问题}} |\n| **预期学习周期** | 根据同类学员数据，预期改善周期为{{X}} |\n| **校区推荐** | {{校区名称}} |\n\n> 如需进一步了解课程详情或预约试听，请联系您的学管老师。\n\n### 十、下次诊断预约\n\n| 项目 | 安排 |\n|------|------|\n| 建议下次诊断时间 | {{建议日期，通常1个月后}} |\n| 届时重点关注模块 | {{本次待提升模块}} |\n| 预约方式 | 请联系学管老师 {{xueguan_name}} 预约 |\n\n---\n\n> **百分教育** | 好思维，让学习更轻松\n> 联系电话：18933824497\n> 诊断教师：{{teacher_name}} | 学管老师：{{xueguan_name}}\n\n---\n\n---\n\n## 完整示例\n\n### 示例A：小学5年级数学，中等偏上，计算粗心为主\n\n```\n============================================\n        百分教育 学情诊断报告\n       \"好思维，让学习更轻松\"\n============================================\n\n学生姓名：陈思远\n年    级：五年级\n就读学校：湛江市第八小学\n诊断学科：数学\n考试名称：2026年春季期中考试\n诊断日期：2026-03-20\n诊断教师：李老师\n报告编号：DX-2026-0320-001\n\n============================================\n```\n\n**一句话总评**\n\n> 陈思远同学的数学基础扎实、思路清晰，如果在计算规范性上加以训练，成绩将稳定在90分以上。\n\n**成绩概览**\n\n| 项目 | 数据 |\n|------|------|\n| 本次得分 | 84 / 100 |\n| 得分率 | 84% |\n| 班级平均分 | 78 |\n| 与平均分差距 | +6分 |\n| 上次成绩 | 81 / 100 |\n| 进步 | +3分 |\n\n各模块得分率：\n\n| 知识模块 | 满分 | 得分 | 得分率 | 评价 |\n|---------|------|------|--------|------|\n| 分数加减法 | 25 | 23 | 92% | 掌握良好 |\n| 因数与倍数 | 20 | 18 | 90% | 掌握良好 |\n| 长方体与正方体 | 25 | 17 | 68% | 有成长空间 |\n| 小数乘除法 | 20 | 16 | 80% | 基本掌握 |\n| 综合应用 | 10 | 10 | 100% | 掌握良好 |\n\n**亮点发现**\n\n1. **综合应用题全对**：最后一道综合应用大题满分完成，说明思远的逻辑推理能力和审题能力在同年级中属于较好水平。\n2. **分数运算扎实**：分数加减法模块得分率92%，基本功过硬，为后续学习分数乘除法打下了好基础。\n3. **成绩稳步上升**：相比上次考试提升了3分，学习方向正确，保持这个节奏即可。\n\n**待提升模块（成长空间）**\n\n成长空间 1：长方体与正方体（得分率68%）\n\n- **当前得分率：** 68%\n- **主要表现：** 在计算长方体表面积和体积时，2道题因计算过程中的数字搬运错误失分；1道题因没有看清\"棱长\"和\"面积\"的关系而用错了公式。\n- **通俗解释：** 这个模块的知识点思远其实是理解的，但面积和体积公式在计算时数字较大，容易在乘法过程中出现笔误。\n- **好消息：** 这类\"会做但做错\"的问题，通过规范计算书写格式和检查习惯，通常2-3周就能有明显改善。\n\n成长空间 2：小数乘除法（得分率80%）\n\n- **当前得分率：** 80%\n- **主要表现：** 小数点定位出现2次失误，导致答案差了一个数量级。\n- **通俗解释：** 小数运算的核心是\"小数点位数管理\"，思远在运算速度快的时候容易忽略这一步。\n- **好消息：** 只要养成\"先估算、再精算、最后检查小数点\"的三步习惯，就能基本杜绝这类失误。\n\n**错误类型分析**\n\n| 错误类型 | 通俗解释 | 占比 | 举例 |\n|---------|---------|------|------|\n| 概念理解偏差 | 对知识点理解还不够透彻 | 12.5% | 第15题：混淆了棱长总和与表面积的计算 |\n| 计算小失误 | 计算过程中的粗心失误 | 62.5% | 第11题：24x15算成了350（实际360） |\n| 读题不够仔细 | 漏掉了题目中的重要条件 | 12.5% | 第18题：没注意\"至少\"这个关键词 |\n| 解题方法不熟 | 面对题目用错了方法 | 12.5% | 第16题：用面积公式计算了体积 |\n\n> **解读：** 思远的错误中有62.5%属于计算失误，说明他其实是\"会做但做不对\"。这个错误结构非常典型，通过计算规范性训练可以快速减少丢分，提升空间至少6-8分。\n\n**个性化提升方案**\n\n行动方案 1：计算规范性专项训练\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 每天完成10道计算题（含长方体面积体积和小数乘除），要求写出完整计算过程，完成后自查一遍 |\n| **负责人** | 教师（出题和批改）+ 家长（监督自查环节） |\n| **时间安排** | 2026-03-22 至 2026-04-20（4周） |\n| **预期效果** | 根据同类学员数据，预期计算失误率下降50%，下次考试可减少丢分4-6分 |\n| **检验方式** | 4周后进行一次同难度测试，计算类错题数量降至2道以内 |\n\n行动方案 2：长方体与正方体专项突破\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 利用实物教具（积木/纸盒）重新建立空间感，配合8道专项练习题，重点区分\"棱长总和/表面积/体积\"三个概念的区别 |\n| **负责人** | 教师（课堂专项讲解） |\n| **时间安排** | 下次课安排15分钟专题回顾 |\n| **预期效果** | 根据同类学员数据，该模块得分率预期提升至85%以上 |\n| **检验方式** | 专项练习正确率达到90% |\n\n行动方案 3：建立\"估算-精算-检查\"三步习惯\n\n| 项目 | 内容 |\n|------|------|\n| **具体行动** | 每道计算题先口头估算答案范围，精算后对比估算结果，发现偏差立即检查 |\n| **负责人** | 教师（课上示范）+ 家长（家庭作业时提醒） |\n| **时间安排** | 长期坚持，首周重点监督 |\n| **预期效果** | 养成自检习惯后，计算失误可减少70%以上 |\n| **检验方式** | 观察作业中计算失误频率的变化 |\n\n**家长配合建议**\n\n1. **监督\"自查\"环节**\n   - 具体做法：思远每次完成数学作业后，要求他用红笔自查一遍计算过程，重点看小数点和进位\n   - 预计每天耗时：5-8分钟\n   - 为什么重要：计算粗心不是\"不会\"，而是没有检查习惯，养成习惯后终身受益\n\n2. **不要额外加刷大量题目**\n   - 具体做法：按照老师布置的练习量完成即可，重质不重量，每道题做对做透比刷10道题更有效\n   - 为什么重要：思远属于\"会做但做不对\"类型，问题不在题量不够，而在计算规范\n\n3. **给予正向反馈**\n   - 具体做法：发现思远自查后改正了计算错误时，及时肯定（如\"自己检查出来的，说明你越来越细心了\"）\n   - 为什么重要：正向反馈能强化好习惯的养成\n\n**推荐课程方案**\n\n| 项目 | 推荐内容 |\n|------|---------|\n| **推荐班型** | 同步培优班（6-12人精品小班） |\n| **推荐理由** | 思远得分率84%，处于\"基本掌握但有提升空间\"阶段，同步培优班可巩固基础的同时拓展解题策略 |\n| **课程内容匹配** | 春季课程包含分数乘除法和长方体正方体综合，正好针对当前的成长空间 |\n| **预期学习周期** | 根据同类学员数据，预期1个学期可稳定在90分以上 |\n| **校区推荐** | 京基校区/盛和园校区 |\n\n**下次诊断预约**\n\n| 项目 | 安排 |\n|------|------|\n| 建议下次诊断时间 | 2026-04-20（约1个月后） |\n| 届时重点关注模块 | 长方体与正方体、小数乘除法、计算失误率 |\n| 预约方式 | 请联系学管老师预约 |\n\n---\n\n### 示例B：初二数学，中等偏下，概念理解薄弱\n\n```\n============================================\n        百分教育 学情诊断报告\n       \"好思维，让学习更轻松\"\n============================================\n\n学生姓名：林梓萱\n年    级：初二\n就读学校：湛江市第二中学\n诊断学科：数学\n考试名称：2026年春季月考\n诊断日期：2026-03-18\n诊断教师：王老师\n报告编号：DX-2026-0318-015\n\n============================================\n```\n\n**一句话总评**\n\n> 梓萱同学的学习态度认真，作业完成度高，目前有几个关键知识漏洞需要补，针对性突破后成绩提升空间较大。\n\n**成绩概览**\n\n| 项目 | 数据 |\n|------|------|\n| 本次得分 | 63 / 120 |\n| 得分率 | 52.5% |\n| 年级平均分 | 78 |\n| 与平均分差距 | -15分 |\n| 上次成绩 | 58 / 120 |\n| 进步 | +5分 |\n\n各模块得分率：\n\n| 知识模块 | 满分 | 得分 | 得分率 | 评价 |\n|---------|------|------|--------|------|\n| 二次根式 | 20 | 14 | 70% | 有成长空间 |\n| 勾股定理 | 25 | 10 | 40% | 需重点关注 |\n| 平行四边形 | 30 | 16 | 53.3% | 需重点关注 |\n| 一次函数 | 30 | 13 | 43.3% | 需重点关注 |\n| 数据分析 | 15 | 10 | 66.7% | 有成长空间 |\n\n**亮点发现**\n\n1. **成绩在进步**：相比上次月考提升了5分（58分->63分），说明梓萱的努力是有效果的，方向正确。\n2. **二次根式模块表现最好**：得分率70%，接近\"基本掌握\"水平，说明代数计算方面有一定基础。\n3. **选择题正确率不错**：前10道选择题答对7道（70%），基础概念的辨识能力在线。\n\n**待提升模块（成长空间）**\n\n成长空间 1：勾股定理（得分率40%）\n\n- **当前得分率：** 40%\n- **主要表现：** 能记住勾股定理公式 a^2+b^2=c^2，但在判断直角三角形、利用勾股定理列方程求边长、以及勾股定理在实际问题中的应用这三类题目上都出现了错误。\n- **通俗解释：** 梓萱目前对勾股定理\"记住了公式\"，但还没有理解\"什么时候用\"以及\"怎么灵活用\"。这就像知道了做菜的配方，但还没有掌握火候。\n- **好消息：** 勾股定理的核心应用场景有限（求边长、判断直角、实际应用三大类），通过系统梳理+专项练习，通常2-3周可以有明显改善。\n\n成长空间 2：一次函数（得分率43.3%）\n\n- **当前得分率：** 43.3%\n- **主要表现：** 画函数图象时正确，但求解析式和利用函数解决实际问题时出错较多。\n- **通俗解释：** 一次函数是初中数学的\"分水岭\"知识，它把代数（方程）和几何（图象）联系起来了。梓萱目前能理解图象，但在\"代数和几何转换\"这个环节还不够熟练。\n- **好消息：** 一次函数的题型相对固定（求解析式、求交点、实际应用），掌握了\"待定系数法\"这个核心方法后，大部分题目都能解决。\n\n成长空间 3：平行四边形（得分率53.3%）\n\n- **当前得分率：** 53.3%\n- **主要表现：** 平行四边形的基本性质能说出来，但在证明和综合应用中缺乏思路。\n- **通俗解释：** 几何证明需要\"有条理地推理\"，梓萱目前的困难在于不知道\"第一步该干什么\"。这不是知识问题，而是解题思路的训练问题。\n- **好消息：** 百分教育的培优体系中有专门的\"辅助线思路训练\"和\"几何证明模型\"教学，帮助孩子建立\"拿到题先找什么\"的思维习惯。\n\n**错误类型分析**\n\n| 错误类型 | 通俗解释 | 占比 | 举例 |\n|---------|---------|------|------|\n| 概念理解偏差 | 知识点没有真正\"吃透\" | 45% | 第14题：误认为平行四边形对角线一定互相垂直 |\n| 计算小失误 | 本来会做但算错了 | 15% | 第8题：根号化简时遗漏了系数 |\n| 读题不够仔细 | 漏掉了重要条件 | 10% | 第20题：未注意\"y>0\"这个限制条件 |\n| 解题方法不熟 | 不知道该用什么方法 | 30% | 第22题：没想到用勾股定理建立方程 |\n\n> **解读：
